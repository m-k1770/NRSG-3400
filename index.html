billed clinical treatment program rather than a self-help group", "c": false, "w": "AA is a self-help group based on peer support and 12 steps, not a professionally led, billable clinical treatment program."}], "rationale": "AA is built on three core concepts: individuals are powerless over their addiction and their lives are unmanageable; though not responsible for the disease, they are responsible for their recovery; and they can no longer blame external factors and must face their problems directly. Spirituality is an important aspect of AA recovery.", "tip": "NCLEX tip: AA's 'powerless but responsible for recovery' concept is frequently tested and often confused with a purely willpower-based framework — know the distinction.", "id": "m8_100", "module": 8}, {"type": "mc", "stem": "A nurse is comparing residential and outpatient treatment programs with a client deciding on the appropriate level of care. Which factor would most strongly support recommending a residential (inpatient) program over outpatient treatment?", "options": [{"t": "The client has a long addiction history and limited social support at home", "c": true, "w": ""}, {"t": "The client has strong social support and wants to remain at work and school during treatment", "c": false, "w": "Strong social support and a desire to maintain work/school responsibilities favor an outpatient approach, which allows flexibility while the person remains embedded in their existing support system."}, {"t": "The client prefers a lower-cost treatment option with maximum flexibility", "c": false, "w": "Outpatient programs are generally more flexible and cost-effective; a preference for low cost and flexibility would favor outpatient rather than residential treatment."}, {"t": "The client has no significant substance use history and only mild symptoms", "c": false, "w": "Mild symptoms and no significant history would not typically warrant the more intensive, structured setting of residential treatment."}], "rationale": "Residential programs are best suited for clients with longer addiction histories, as they provide a 24/7 drug-free structured environment; stays of 90 days or more are associated with significantly decreased illicit drug use/arrests and increased employment, particularly benefiting those with limited social support.", "tip": "NCLEX tip: Choice of inpatient vs. outpatient care depends heavily on addiction history length and available social support — strong support favors outpatient, limited support favors inpatient/residential.", "id": "m8_101", "module": 8}, {"type": "mc", "stem": "A nurse manager observes that a colleague has been volunteering for extra shifts near the medication room, has had several instances of inaccurate controlled substance counts, and appears increasingly irritable and isolated. What is the nurse manager's ethical obligation in this situation?", "options": [{"t": "Report the suspected impairment, since nurses have an ethical obligation to report signs of impaired practice to protect patient safety", "c": true, "w": ""}, {"t": "Say nothing unless the colleague is caught in the act of diverting medication", "c": false, "w": "Waiting for direct proof of diversion is not required; the ethical obligation is to report suspected impairment based on observed behavioral indicators to protect patient safety promptly."}, {"t": "Discuss the concern only informally with other coworkers rather than following a formal reporting process", "c": false, "w": "Informal gossip among coworkers does not fulfill the ethical and professional obligation to formally report suspected impairment through appropriate channels."}, {"t": "Wait to see if the behavior continues for another six months before taking any action", "c": false, "w": "Delaying action for an extended period places patients at ongoing risk; the ethical obligation to report suspected impairment applies promptly once warning signs are observed."}], "rationale": "Per the ANA Code of Ethics (Provision 3), nurses have an ethical obligation to report suspected impairment, since impaired nurses are often under-identified, underreported, and untreated, risking patient safety. Behavioral indicators include volunteering for extra shifts near drug access, inaccurate medication counts, and increasing irritability/isolation.", "tip": "NCLEX tip: The patient is always the nurse's first responsibility — suspected colleague impairment must be reported, and Alternative-to-Discipline (ATD) programs support treatment and safe return to practice.", "id": "m8_102", "module": 8}, {"type": "mc", "stem": "Following a confrontation about suspected substance impairment, a nurse colleague appears distressed and withdrawn. What is the most important safety consideration for the nurse manager at this time?", "options": [{"t": "Ensure the colleague is not left alone, since suicide risk increases after an intervention/confrontation about impairment", "c": true, "w": ""}, {"t": "Immediately terminate employment without any further discussion or support plan", "c": false, "w": "While the employee retains the right to refuse treatment (which could lead to termination), immediate termination without addressing the acute distress and safety risk ignores the priority of monitoring for suicide risk right after a confrontation."}, {"t": "Instruct the colleague to go home alone to rest and process the situation privately", "c": false, "w": "Sending the colleague home alone contradicts the recommended precaution that the person should not be left alone until a safety plan is in place, given increased suicide risk after such confrontations."}, {"t": "Focus solely on completing termination paperwork before addressing any emotional response", "c": false, "w": "Administrative paperwork should not take priority over addressing the acute safety risk; the person should not be left alone until an appropriate plan is established."}], "rationale": "Suicide risk increases after an intervention or confrontation regarding suspected substance impairment; the professional should not be left alone until an appropriate safety plan is in place, reflecting the priority of safety over administrative processes in this acute moment.", "tip": "NCLEX tip: Any confrontation about suspected impairment carries an elevated suicide risk — 'do not leave the person alone' is the priority safety action in this scenario.", "id": "m8_103", "module": 8}, {"type": "mc", "stem": "A nurse is teaching a client about Screening, Brief Intervention, and Referral to Treatment (SBIRT). Which sequence correctly reflects this evidence-based approach?", "options": [{"t": "Screening, followed by brief intervention (feedback and advice), followed by referral to treatment as needed", "c": true, "w": ""}, {"t": "Referral to treatment first, followed by screening, and finally brief intervention", "c": false, "w": "This reverses the correct order; SBIRT begins with screening, not referral, which comes only after screening and brief intervention have been completed."}, {"t": "Brief intervention only, with no screening or referral component at all", "c": false, "w": "SBIRT is a three-part approach; it is not limited to brief intervention alone and includes both screening and referral to treatment as needed."}, {"t": "Screening and referral to treatment only, without any brief intervention component", "c": false, "w": "SBIRT specifically includes a brief intervention step (feedback and advice) between screening and referral, not just screening followed directly by referral."}], "rationale": "SBIRT, an Institute of Medicine-recommended approach, follows a specific sequence: Screening to identify risk, Brief Intervention (providing feedback and advice), and Referral to Treatment for those who need more intensive care.", "tip": "NCLEX tip: Remember the correct order of SBIRT — Screening, Brief Intervention, Referral to Treatment — since sequence-based distractors are common in this type of question.", "id": "m8_104", "module": 8}, {"type": "mc", "stem": "A nurse using motivational interviewing techniques with a client ambivalent about reducing alcohol use says, 'You've mentioned that drinking helps you relax, but you're also worried it's affecting your relationship with your children — tell me more about that.' Which motivational interviewing principle is the nurse demonstrating?", "options": [{"t": "Developing discrepancies between the client's actions and personal goals", "c": true, "w": ""}, {"t": "Rolling with resistance by arguing forcefully against the client's stated reasons for drinking", "c": false, "w": "Rolling with resistance means understanding the client's viewpoint first rather than arguing forcefully; this nurse statement is instead highlighting a discrepancy between the client's actions and goals, not arguing against resistance."}, {"t": "Expressing empathy by simply agreeing that drinking is an effective relaxation technique", "c": false, "w": "Expressing empathy involves understanding feelings without necessarily endorsing the behavior; this response is specifically drawing attention to a discrepancy, not validating drinking as an effective coping method."}, {"t": "Supporting self-efficacy by praising the client's confidence in their ability to change", "c": false, "w": "Supporting self-efficacy involves reinforcing the client's belief that change is possible; this particular statement is focused on pointing out a gap between the client's behavior and their own stated goals, which is the discrepancy principle."}], "rationale": "Developing discrepancies is a core motivational interviewing principle in which the nurse helps the client see the gap between their current behavior and their own personal goals or values, replacing confrontation and labeling with a nonjudgmental exploration of ambivalence.", "tip": "NCLEX tip: Motivational interviewing's four principles are: express empathy, develop discrepancies, roll with resistance, and support self-efficacy — learn to recognize each from example dialogue.", "id": "m8_105", "module": 8}, {"type": "sata", "stem": "Select all evidence-based psychotherapy modalities used in the treatment of substance use disorders described in the source material.", "options": [{"t": "Cognitive-behavioral therapy (CBT)", "c": true, "w": ""}, {"t": "Motivational enhancement therapy (MET)", "c": true, "w": ""}, {"t": "Family therapy", "c": true, "w": ""}, {"t": "Validation therapy", "c": false, "w": "Validation therapy is a communication technique used with clients who have dementia, focusing on emotional content over factual accuracy, not a substance use disorder treatment modality."}, {"t": "Reminiscence therapy", "c": false, "w": "Reminiscence therapy is used with clients who have dementia to discuss past experiences, and is not listed as a treatment modality for substance use disorders."}], "rationale": "Evidence-based psychotherapy modalities for SUD include CBT (recognizing/avoiding triggers), motivational enhancement therapy, SBIRT, motivational interviewing, group therapy, and family therapy, in contrast to dementia-specific communication approaches like validation or reminiscence therapy.", "tip": "NCLEX tip: Keep SUD-specific psychotherapies distinct from dementia-specific communication therapies (validation, reminiscence) that belong to the neurocognitive disorders content.", "id": "m8_106", "module": 8}, {"type": "sata", "stem": "Select all statements that accurately reflect the six principles of treating co-occurring (dual-diagnosis) disorders.", "options": [{"t": "Providers should expect at least one co-occurring disorder in clients with a substance use disorder", "c": true, "w": ""}, {"t": "Substance use disorder and psychiatric disorder should be treated concurrently, as both are considered primary conditions", "c": true, "w": ""}, {"t": "Recovery occurs in stages, and treatment should be matched to the client's needs, motivation, and engagement level", "c": true, "w": ""}, {"t": "Mental health treatment should always be completed in full before any substance use treatment is initiated", "c": false, "w": "The recommended principle is concurrent treatment of both conditions, since both are considered primary, rather than requiring one condition to be fully treated before addressing the other."}, {"t": "Outcomes should be identical and standardized for every client regardless of individual circumstances", "c": false, "w": "The recommended principle calls for individualized outcomes supporting progress in small steps over a long period, not a one-size-fits-all standardized approach."}], "rationale": "The six principles of treating co-occurring disorders include expecting at least one co-occurring disorder, empathic team-based care, dual-focused staff training, concurrent treatment of both conditions as primary, staged recovery matched to client readiness, and individualized outcomes supporting gradual progress.", "tip": "NCLEX tip: The phrase 'both are primary conditions requiring concurrent treatment' is a key, frequently tested principle of dual-diagnosis care.", "id": "m8_107", "module": 8}, {"type": "bowtie", "stem": "A 55-year-old client is admitted for alcohol withdrawal management. The client's last drink was 20 hours ago. Vital signs: BP 158/96, HR 112, temperature 100.8°F. The client is diaphoretic with visible hand tremors and reports feeling anxious, but is oriented to person, place, and time with no hallucinations.", "left": {"label": "Actions to Take", "opts": ["Initiate the CIWA-Ar protocol for ongoing withdrawal assessment", "Administer scheduled or symptom-triggered benzodiazepine per protocol", "Administer thiamine (vitamin B1) as ordered", "Immediately restrain the client to prevent self-injury", "Withhold all fluids until withdrawal resolves"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Early to moderate alcohol withdrawal syndrome", "Opioid overdose", "Alzheimer's disease, moderate stage"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Vital signs and CIWA-Ar score trends", "Level of orientation and presence of hallucinations", "Seizure precautions and fall risk", "Blood glucose only, with no other monitoring needed", "Pupil size using the COWS scale"], "correct": [0, 1, 2]}, "rationale": "This client's presentation (elevated vitals, tremor, diaphoresis, anxiety, but intact orientation, roughly 20 hours after last drink) reflects early-to-moderate alcohol withdrawal syndrome. Priority actions include CIWA-Ar-guided benzodiazepine administration and thiamine to prevent Wernicke-Korsakoff syndrome, while ongoing monitoring should track vital signs, CIWA-Ar trends, orientation, and seizure/fall risk — not COWS pupil scoring, which applies to opioid withdrawal, or restraints/fluid restriction, which are not indicated here.", "tip": "NCLEX tip: Bowtie questions test your ability to link a clinical picture to the right condition, the right actions, and the right ongoing monitoring parameters simultaneously — eliminate any option that belongs to a different condition (like COWS/opioid items in an alcohol withdrawal scenario).", "id": "m8_108", "module": 8}, {"type": "bowtie", "stem": "A 30-year-old client arrives to the emergency department reportedly after opioid use. The client is minimally responsive to voice, respiratory rate is 6 breaths/min, pupils are pinpoint bilaterally, and skin is cool and cyanotic.", "left": {"label": "Actions to Take", "opts": ["Administer naloxone per protocol", "Support and monitor airway and breathing", "Prepare to redose naloxone if sedation/respiratory depression recurs", "Administer disulfiram immediately", "Encourage the client to attend an AA meeting once stabilized as the first action"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Acute opioid overdose", "Alcohol withdrawal delirium", "Cannabinoid hyperemesis syndrome"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Respiratory rate and oxygen saturation", "Level of consciousness", "Pupil size", "CIWA-Ar score", "Presence of tactile hallucinations related to alcohol withdrawal"], "correct": [0, 1, 2]}, "rationale": "The pinpoint pupils, severely depressed respiratory rate, and decreased responsiveness reflect the classic opioid overdose triad. Naloxone administration with airway/breathing support and readiness to redose (given naloxone's short half-life) are priority actions; ongoing monitoring should track respiratory status, consciousness level, and pupil size — not CIWA-Ar or disulfiram, which relate to alcohol use disorder, a different clinical picture entirely.", "tip": "NCLEX tip: When a bowtie scenario centers on the opioid overdose triad, look for naloxone-based actions and respiratory/pupil/consciousness monitoring — avoid mixing in alcohol-specific tools like CIWA-Ar or disulfiram.", "id": "m8_109", "module": 8}, {"type": "bowtie", "stem": "A 68-year-old client with Alzheimer's disease, moderate stage, has become increasingly agitated in the late afternoon, attempting to leave the unit stating she needs to 'pick up the kids from school.' She is calm and cooperative in the mornings.", "left": {"label": "Actions to Take", "opts": ["Maintain a consistent daily routine and minimize environmental changes in the evening", "Acknowledge her feelings and gently redirect rather than arguing about the delusion", "Ensure a well-lit, calm environment during the evening hours", "Firmly inform her that her children are now adults to correct her belief", "Restrain her to a chair to prevent her from attempting to leave the unit"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Sundowning related to major neurocognitive disorder (Alzheimer's disease)", "Acute alcohol withdrawal delirium", "Opioid intoxication"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Wandering behavior and fall/elopement risk", "Level of agitation and response to redirection", "Orientation to person, place, and time", "CIWA-Ar score trends", "Pupil size per the COWS scale"], "correct": [0, 1, 2]}, "rationale": "This presentation, worsening confusion/agitation in the evening with preserved calm in the morning in a client with known Alzheimer's disease, reflects sundowning. Appropriate actions emphasize routine, calm redirection without arguing over the delusion, and a soothing environment; monitoring should focus on wandering/elopement risk, agitation level, and orientation — not alcohol- or opioid-specific tools, which do not apply to this scenario.", "tip": "NCLEX tip: Sundowning bowtie scenarios reward answer choices centered on routine, redirection, and environment — and penalize confrontational or restraint-based choices, plus any misapplied withdrawal-scale monitoring.", "id": "m8_110", "module": 8}], "module9": [{"type": "mc", "stem": "A 16-year-old client is admitted at 65% of ideal body weight with an intense fear of gaining weight and a persistent belief that she is 'still too fat,' despite visible emaciation. Which diagnosis best fits this presentation?", "options": [{"t": "Anorexia nervosa, restricting type", "c": true, "w": ""}, {"t": "Bulimia nervosa", "c": false, "w": "Bulimia nervosa is characterized by binge eating followed by compensatory behaviors in a client who is typically at or near normal body weight, not the significantly low body weight described in this client."}, {"t": "Binge-eating disorder", "c": false, "w": "Binge-eating disorder involves recurrent binge eating without compensatory behaviors, often resulting in obesity, which does not match this client's significantly low body weight and restrictive presentation."}, {"t": "Avoidant/restrictive food-intake disorder (ARFID)", "c": false, "w": "ARFID involves food avoidance/restriction without the intense fear of weight gain or body image disturbance that defines anorexia nervosa; this client's fear of gaining weight and distorted body image point specifically to AN."}], "rationale": "Anorexia nervosa is characterized by restriction of energy intake leading to significantly low body weight, an intense fear of gaining weight, and a disturbance in how body weight or shape is experienced (seeing oneself as fat despite being underweight).", "tip": "NCLEX tip: The defining triad for AN is: significantly low body weight + intense fear of weight gain + distorted body image/self-evaluation tied to weight.", "id": "m9_0", "module": 9}, {"type": "mc", "stem": "According to DSM-5 severity classification for anorexia nervosa in adults, which BMI would correspond to the 'severe' category?", "options": [{"t": "15-15.99 kg/m2", "c": true, "w": ""}, {"t": "Greater than or equal to 17 kg/m2", "c": false, "w": "A BMI of 17 or greater corresponds to the 'mild' severity category for AN, not severe."}, {"t": "16-16.99 kg/m2", "c": false, "w": "A BMI of 16-16.99 corresponds to the 'moderate' severity category, not severe."}, {"t": "Less than 15 kg/m2", "c": false, "w": "A BMI below 15 corresponds to the 'extreme' severity category, which is more severe than the 'severe' category (15-15.99)."}], "rationale": "DSM-5 severity for AN in adults is based on BMI: mild (≥17), moderate (16-16.99), severe (15-15.99), and extreme (<15 kg/m2), providing a standardized way to communicate the medical severity of the disorder.", "tip": "NCLEX tip: Memorize the BMI severity bands for AN in order: mild ≥17, moderate 16-16.99, severe 15-15.99, extreme <15.", "id": "m9_1", "module": 9}, {"type": "mc", "stem": "Which of the following medical complications is most specifically associated with anorexia nervosa rather than bulimia nervosa?", "options": [{"t": "Lanugo (fine, downy hair growth) and carotenemia (yellow-tinged skin)", "c": true, "w": ""}, {"t": "Russell's sign (calluses on the knuckles from self-induced vomiting)", "c": false, "w": "Russell's sign is specifically associated with bulimia nervosa due to repeated self-induced vomiting using the fingers/hand, not a typical finding in restrictive anorexia nervosa without purging."}, {"t": "Severe dental erosion with exposed pulp from frequent vomiting", "c": false, "w": "Severe dental erosion from frequent vomiting is a hallmark complication of bulimia nervosa's compensatory purging behavior, not a primary feature of anorexia nervosa."}, {"t": "Parotid gland enlargement with elevated amylase levels", "c": false, "w": "Parotid gland enlargement and elevated amylase are classic bulimia nervosa findings related to repeated vomiting, not typical anorexia nervosa complications."}], "rationale": "Anorexia nervosa's medical complications include bradycardia, hypotension, lanugo, carotenemia (yellow skin from carotene buildup), leukopenia, osteoporosis, and amenorrhea, largely reflecting a hypometabolic starvation state, in contrast to the purging-related complications (Russell's sign, dental erosion, parotid enlargement) more typical of bulimia nervosa.", "tip": "NCLEX tip: Lanugo and carotenemia point to AN's starvation physiology; Russell's sign and dental erosion point to BN's purging behavior.", "id": "m9_2", "module": 9}, {"type": "mc", "stem": "A nurse is caring for a severely malnourished client with anorexia nervosa who is beginning to receive nutritional rehabilitation. Which finding would most concern the nurse for refeeding syndrome?", "options": [{"t": "New onset of severe hypophosphatemia and cardiac dysrhythmias shortly after feeding begins", "c": true, "w": ""}, {"t": "A gradual, steady weight gain of half a pound per week with stable electrolytes", "c": false, "w": "Gradual weight gain with stable electrolytes is the desired, safe outcome of careful, monitored refeeding, not a sign of refeeding syndrome."}, {"t": "Mild constipation that resolves with increased dietary fiber", "c": false, "w": "Mild constipation is a common, manageable issue during nutritional rehabilitation and is not a hallmark sign of the dangerous metabolic shifts seen in refeeding syndrome."}, {"t": "Slight improvement in mood as nutritional status improves", "c": false, "w": "Improved mood is a positive, expected outcome of nutritional rehabilitation, not a warning sign of the life-threatening complication of refeeding syndrome."}], "rationale": "Refeeding syndrome occurs when a starved body shifts from a catabolic to an anabolic state upon reintroducing calories, causing dangerous fluid/electrolyte shifts (especially hypophosphatemia), which can lead to heart failure, arrhythmias, respiratory failure, and death; prevention requires gradual calorie increases with close monitoring.", "tip": "NCLEX tip: Refeeding syndrome is a high-priority safety concept — the key prevention strategy is a gradual, closely monitored increase in caloric intake, not rapid nutritional replacement.", "id": "m9_3", "module": 9}, {"type": "mc", "stem": "Which nursing intervention is most appropriate when weighing a hospitalized client with anorexia nervosa?", "options": [{"t": "Weigh the client at the same time each day, before breakfast, after voiding, and in a hospital gown", "c": true, "w": ""}, {"t": "Allow the client to weigh themselves privately whenever they choose throughout the day", "c": false, "w": "Allowing self-directed, variable-time weighing creates opportunities for manipulation (such as water-loading) and does not provide the objective, standardized measure needed to accurately track progress."}, {"t": "Weigh the client only once per week regardless of clinical status, wearing whatever clothing they prefer", "c": false, "w": "Standardized conditions (same time, same clothing, after voiding) are needed for an objective measure of progress; allowing variable clothing undermines the accuracy of tracking weight changes."}, {"t": "Avoid discussing the client's weight or the weighing process at all to prevent anxiety", "c": false, "w": "While sensitivity is important, weighing itself is a necessary, standardized nursing intervention that should be performed consistently, not avoided altogether."}], "rationale": "Weighing a client with AN at the same time each day, before breakfast, after voiding, and in a hospital gown, prevents water-loading or other manipulation of the scale and provides an objective, standardized measure of the client's progress toward weight restoration goals.", "tip": "NCLEX tip: Standardized weighing conditions (same time/clothing/after voiding) is a frequently tested detail meant to prevent manipulation of results in AN care.", "id": "m9_4", "module": 9}, {"type": "mc", "stem": "A nurse is caring for a hospitalized client with anorexia nervosa. Which intervention helps prevent post-meal purging behavior?", "options": [{"t": "Supervising the client for one to two hours after meals", "c": true, "w": ""}, {"t": "Allowing the client to eat meals alone in their room for privacy", "c": false, "w": "Eating alone in private removes staff ability to observe and prevent hoarding, food disposal, or purging behaviors, which is why direct observation during and after meals is recommended instead."}, {"t": "Limiting supervision to only during the meal itself, with no monitoring afterward", "c": false, "w": "Continued supervision for one to two hours after the meal, not just during it, is necessary to prevent post-meal purging or disposal of food."}, {"t": "Encouraging vigorous exercise immediately after each meal to help the client relax", "c": false, "w": "Vigorous exercise is a compensatory behavior that should be limited/avoided in AN care, not encouraged, especially not immediately following meals."}], "rationale": "Continued supervision for one to two hours after meals is a key nursing intervention to prevent self-induced vomiting or other purging/disposal behaviors, supporting successful nutritional rehabilitation.", "tip": "NCLEX tip: Supervision windows in AN care extend beyond the meal itself — remember the one-to-two-hour post-meal monitoring period.", "id": "m9_5", "module": 9}, {"type": "mc", "stem": "A client with anorexia nervosa states, 'If I eat this cookie, I'll completely lose control and eat everything in the kitchen.' Which cognitive distortion does this statement best reflect?", "options": [{"t": "All-or-nothing thinking", "c": true, "w": ""}, {"t": "Overgeneralization", "c": false, "w": "Overgeneralization involves a single event affecting unrelated situations broadly (e.g., 'he didn't ask me out because I'm fat'), rather than the extreme, absolute framing of a single food choice leading to total loss of control."}, {"t": "Personalization", "c": false, "w": "Personalization involves overinterpreting events as being personally directed at oneself (e.g., 'everyone is watching me eat'), which is different from the absolute, extreme framing in this statement."}, {"t": "Emotional reasoning", "c": false, "w": "Emotional reasoning involves treating feelings as facts (e.g., 'I know I'm fat because I feel fat'), which is distinct from the extreme, catastrophic all-or-nothing framing in this client's statement."}], "rationale": "All-or-nothing thinking is an absolute, extreme cognitive distortion in which any deviation (like eating one cookie) is framed as leading to total loss of control, exemplified by the textbook example, 'If I have one Popsicle, I must eat five.'", "tip": "NCLEX tip: Learn to distinguish the five cognitive distortions (overgeneralization, all-or-nothing, catastrophizing, personalization, emotional reasoning) by their example phrasing patterns.", "id": "m9_6", "module": 9}, {"type": "mc", "stem": "A hospitalized adolescent with anorexia nervosa tells the nurse, 'Everyone in this unit is staring at me while I eat and judging how much food is on my plate.' Which cognitive distortion is best reflected in this statement?", "options": [{"t": "Personalization", "c": true, "w": ""}, {"t": "Catastrophizing", "c": false, "w": "Catastrophizing involves magnifying the consequences of an event (e.g., 'if I gain weight, my whole weekend is ruined'), which differs from this client's belief that others are specifically focused on and judging her."}, {"t": "All-or-nothing thinking", "c": false, "w": "All-or-nothing thinking involves extreme, absolute framing of a behavior's consequences (e.g., eating one item leads to eating everything), not the belief that others are watching and judging."}, {"t": "Overgeneralization", "c": false, "w": "Overgeneralization involves a single unrelated event being extended to a broader belief about oneself, which is different from this client's specific belief that others are personally focused on her during a meal."}], "rationale": "Personalization is a cognitive distortion in which the person overinterprets events as personally significant, exemplified by the textbook example, 'Everybody is watching me eat,' reflecting a heightened, distorted sense of being observed and judged by others.", "tip": "NCLEX tip: 'Everyone is watching/judging me' statements are the classic tell for personalization as a cognitive distortion.", "id": "m9_7", "module": 9}, {"type": "mc", "stem": "Which criterion, according to Box 14.3 in the textbook, would indicate the need for hospital admission in a client with anorexia nervosa?", "options": [{"t": "A heart rate less than 40 beats per minute", "c": true, "w": ""}, {"t": "A weight loss of 5% over the past 6 months with stable vital signs", "c": false, "w": "The textbook criterion for concerning weight loss is greater than 30% in 6 months, not 5%; a 5% loss with stable vitals would not, by itself, meet hospital admission criteria."}, {"t": "A systolic blood pressure of 110 mmHg with no other symptoms", "c": false, "w": "A systolic BP of 110 mmHg is within a normal range; the hospital admission criterion is a systolic BP less than 70 mmHg, reflecting much more severe hemodynamic compromise."}, {"t": "Mild, intermittent sadness without any other symptoms", "c": false, "w": "Mild, intermittent sadness alone does not meet the more severe psychiatric criteria for hospital admission, such as severe depression, suicidality, or psychosis."}], "rationale": "Criteria for hospital admission in AN include physical findings such as weight loss greater than 30% in 6 months, severe hypothermia (<36°C/96.8°F), heart rate less than 40 bpm, systolic BP less than 70 mmHg, hypokalemia less than 3 mEq/L, and ECG changes, as well as psychiatric criteria such as suicidality, severe depression, or psychosis.", "tip": "NCLEX tip: Memorize the key numeric hospital admission thresholds for AN: >30% weight loss/6 months, HR <40, systolic BP <70, K+ <3 mEq/L, temp <36°C.", "id": "m9_8", "module": 9}, {"type": "mc", "stem": "A nurse assesses a hospitalized client with anorexia nervosa and finds a serum potassium level of 2.8 mEq/L. What is the nurse's priority action?", "options": [{"t": "Assess cardiac status closely, including auscultating heart rate and rhythm, given the risk of dysrhythmia", "c": true, "w": ""}, {"t": "Encourage the client to immediately begin a vigorous exercise program to improve overall health", "c": false, "w": "Vigorous exercise is contraindicated for a client with a dangerously low potassium level and cardiac risk; the priority instead is close cardiac monitoring."}, {"t": "Wait until the next scheduled shift assessment in 8 hours to reassess potassium", "c": false, "w": "A potassium level this low (2.8 mEq/L, below the 3 mEq/L admission threshold) requires prompt assessment and intervention, not a delayed reassessment."}, {"t": "Document the finding without further assessment since electrolyte abnormalities are expected in anorexia nervosa", "c": false, "w": "While electrolyte imbalances are common in AN, a critically low potassium level still requires prompt clinical assessment and likely intervention due to the risk of life-threatening cardiac dysrhythmias."}], "rationale": "Hypokalemia in a client with anorexia nervosa poses a significant risk for life-threatening cardiac dysrhythmias, so the nurse's priority is to assess cardiac status (auscultating heart rate, rhythm, and sounds) and notify the provider promptly for further intervention.", "tip": "NCLEX tip: Whenever an eating disorder question presents an abnormal electrolyte value, the priority next action is almost always to assess cardiac status given the dysrhythmia risk.", "id": "m9_9", "module": 9}, {"type": "mc", "stem": "An adolescent hospitalized for anorexia nervosa says, 'I'm terrified that if I gain weight, I'll be fat and disgusting forever.' Which nursing response best encourages therapeutic exploration of this fear?", "options": [{"t": "\"Tell me more about what being fat would mean for you.\"", "c": true, "w": ""}, {"t": "\"You have nothing to worry about; you look perfectly healthy right now.\"", "c": false, "w": "Reassuring the client that she looks fine dismisses her internal experience and does not encourage exploration of the underlying fear driving her restrictive behavior."}, {"t": "\"That's an irrational fear, and you need to stop thinking that way immediately.\"", "c": false, "w": "Directly labeling the fear as irrational and demanding it stop is confrontational and is not a therapeutic approach; distorted body image should be acknowledged without minimizing or directly challenging it."}, {"t": "\"Let's talk about a strict meal plan instead of discussing your feelings about weight.\"", "c": false, "w": "Changing the subject to a meal plan bypasses an important opportunity to explore the client's underlying beliefs and fears, which is central to therapeutic engagement in AN care."}], "rationale": "Inviting the client to explore what being fat would mean for her ('Tell me how your world would be different if you were fat?') opens a therapeutic dialogue about the underlying beliefs and fears driving the disorder, rather than dismissing, confronting, or avoiding the client's stated fear.", "tip": "NCLEX tip: Open-ended, exploratory questions ('tell me more about...') are almost always the most therapeutic response option in eating disorder communication scenarios.", "id": "m9_10", "module": 9}, {"type": "mc", "stem": "Which statement best reflects an appropriate nursing self-care consideration when working with clients who have anorexia nervosa?", "options": [{"t": "Nurses should actively guard against viewing the client's weight restriction as a simple lifestyle choice rather than a serious psychiatric illness", "c": true, "w": ""}, {"t": "Nurses should view eating disorders as trivial compared to conditions like schizophrenia, since eating disorders are self-imposed", "c": false, "w": "This reflects a harmful bias that the source material specifically warns nurses to guard against; eating disorders are serious, potentially life-threatening psychiatric illnesses, not simply self-imposed lifestyle choices."}, {"t": "Nurses should assume that any client who restricts food intake is doing so purely for attention", "c": false, "w": "Assuming attention-seeking motives dismisses the serious neurobiological, genetic, and psychosocial factors underlying AN and reflects the very bias nurses are cautioned to avoid."}, {"t": "Nurses do not need any specific self-awareness when caring for clients with eating disorders since these conditions are straightforward to manage", "c": false, "w": "The source material specifically emphasizes the need for nurse self-awareness and countertransference recognition, given how challenging and complex eating disorder care can be."}], "rationale": "Nurses may unconsciously see AN/BN as 'trivial' compared to conditions like schizophrenia and mistakenly view weight restriction, bingeing, or purging as self-imposed choices — a bias nurses must actively guard against, since eating disorders are among the most lethal psychiatric diseases.", "tip": "NCLEX tip: Recognizing and countering personal bias toward eating disorders as 'not a real illness' is a key professional self-awareness concept tested on the NCLEX.", "id": "m9_11", "module": 9}, {"type": "mc", "stem": "A nurse is assessing a client with suspected anorexia nervosa using the SCOFF questionnaire. Which finding would contribute a 'yes' response to the 'F' for Food item?", "options": [{"t": "The client reports that thoughts about food dominate most of her day", "c": true, "w": ""}, {"t": "The client reports she has lost 14 pounds (one stone) in the past 3 months", "c": false, "w": "This finding corresponds to the 'O' for One stone item on the SCOFF questionnaire, not the 'F' for Food item."}, {"t": "The client reports making herself vomit when she feels uncomfortably full", "c": false, "w": "This finding corresponds to the 'S' for Sick item on the SCOFF questionnaire, not the 'F' for Food item."}, {"t": "The client believes she is fat even though others tell her she is thin", "c": false, "w": "This finding corresponds to the second 'F' item, which specifically addresses body image ('Fat'), which is a distinct item from the food-preoccupation item in the SCOFF acronym."}], "rationale": "On the SCOFF questionnaire, the final 'F' item asks whether food dominates the person's life; a score of 2 or more 'yes' responses across the five SCOFF items (Sick, Control, One stone, Fat, Food) suggests an eating disorder and warrants further screening.", "tip": "NCLEX tip: Spell out SCOFF fully — Sick, Control, One stone, Fat, Food — and know that a score of 2 or more 'yes' answers suggests further eating disorder evaluation is needed.", "id": "m9_12", "module": 9}, {"type": "mc", "stem": "Which combination of psychotherapy modalities has the best evidence base for treating anorexia nervosa in children and adolescents?", "options": [{"t": "Family-Based Therapy (Maudsley approach)", "c": true, "w": ""}, {"t": "Dialectical behavior therapy (DBT) as the primary and sole treatment modality", "c": false, "w": "DBT has more evidence for bulimia nervosa and binge-eating disorder than as the primary treatment for adolescent anorexia nervosa; Family-Based Therapy has the strongest evidence base for this population."}, {"t": "Interpersonal psychotherapy (IPT) used in isolation without family involvement", "c": false, "w": "While IPT can be beneficial for resolving interpersonal stressors, Family-Based Therapy specifically has the best evidence base for children and adolescents with AN, given the importance of family involvement in this age group."}, {"t": "Motivational enhancement therapy used exclusively, without any structured meal-focused intervention", "c": false, "w": "Motivational enhancement therapy alone, without a structured, family-involved, meal-focused approach, is not identified as having the best evidence base for adolescent AN treatment."}], "rationale": "Family-Based Therapy (FBT), also known as the Maudsley approach, has the best evidence for treating children and adolescents with anorexia nervosa (and is also beneficial for adolescent bulimia nervosa), as it is time/cost-efficient and involves the family directly in the recovery process.", "tip": "NCLEX tip: FBT/Maudsley = best evidence for adolescent AN; CBT-E, MANTRA, and SSCM are more adult-focused approaches for AN treatment.", "id": "m9_13", "module": 9}, {"type": "sata", "stem": "Select all findings that would place a client with anorexia nervosa at risk for refeeding syndrome during nutritional rehabilitation.", "options": [{"t": "Severely malnourished status prior to beginning nutritional therapy", "c": true, "w": ""}, {"t": "A history of prolonged, severe caloric restriction over several months", "c": true, "w": ""}, {"t": "Rapid reintroduction of a full-calorie diet without gradual titration", "c": true, "w": ""}, {"t": "Slow, gradual increase in caloric intake with close electrolyte monitoring", "c": false, "w": "A slow, gradual increase in calories with close monitoring is the recommended prevention strategy for refeeding syndrome, not a risk factor for it."}, {"t": "Stable baseline nutritional status with no history of restriction", "c": false, "w": "Refeeding syndrome specifically occurs in clients transitioning from a starved, catabolic state; a client with stable baseline nutrition and no restriction history would not be at meaningful risk for this complication."}], "rationale": "Refeeding syndrome risk is highest in severely malnourished clients with prolonged caloric restriction who undergo rapid reintroduction of calories; the shift from catabolic to anabolic metabolism causes dangerous fluid/electrolyte shifts, so gradual, closely monitored calorie increases are essential for prevention.", "tip": "NCLEX tip: The key prevention strategy tested for refeeding syndrome is always 'go slow' with calorie reintroduction, paired with close monitoring of electrolytes (especially phosphorus).", "id": "m9_14", "module": 9}, {"type": "sata", "stem": "Select all appropriate nursing interventions for a hospitalized client with anorexia nervosa, based on Table 14.1 of the textbook.", "options": [{"t": "Weigh the client at consistent times under standardized conditions", "c": true, "w": ""}, {"t": "Observe or sit with the client during meals", "c": true, "w": ""}, {"t": "Tie privileges to weight gain as part of a behavioral treatment approach", "c": true, "w": ""}, {"t": "Encourage excessive exercise to help manage the client's anxiety about weight", "c": false, "w": "Excessive exercise should be avoided/limited in AN care, since it is often used as a compensatory behavior rather than encouraged as a coping strategy for anxiety."}, {"t": "Directly challenge and argue against the client's distorted body image during every interaction", "c": false, "w": "The recommended approach is to recognize the distorted body image without minimizing or directly challenging it, to avoid unnecessary power struggles, rather than confronting it in every interaction."}], "rationale": "Appropriate AN interventions include standardized weighing, supervision during/after meals, and tying privileges to weight gain in a structured behavioral approach, while avoiding excessive exercise and direct confrontation of the client's distorted body image, which can create power struggles rather than therapeutic engagement.", "tip": "NCLEX tip: Table 14.1 interventions emphasize structure and observation (weighing, meal supervision) while avoiding confrontation and permissiveness (excessive exercise, arguing about body image).", "id": "m9_15", "module": 9}, {"type": "fib", "stem": "The condition in which a severely malnourished client develops dangerous fluid and electrolyte shifts, particularly hypophosphatemia, as calories are reintroduced too quickly is called _____ syndrome.", "answers": ["refeeding"], "rationale": "Refeeding syndrome is a potentially deadly complication that occurs when a starved body shifts from a catabolic to an anabolic state during nutritional rehabilitation, causing dangerous fluid/electrolyte shifts that can lead to heart failure, arrhythmias, respiratory failure, and death if calories are reintroduced too quickly.", "tip": "NCLEX tip: Prevention of refeeding syndrome centers on a gradual calorie increase with close monitoring — never a rapid return to full nutrition in a severely malnourished client.", "id": "m9_16", "module": 9}, {"type": "fib", "stem": "A callus or scar that develops on the knuckles from repeated self-induced vomiting, seen in clients with bulimia nervosa, is known as _____ sign.", "answers": ["russell's", "russells", "russell"], "rationale": "Russell's sign refers to calluses on the dorsum of the hand or knuckles caused by repeated contact with the teeth during self-induced vomiting, and it is a classic physical examination clue for bulimia nervosa.", "tip": "NCLEX tip: Russell's sign is a testable physical exam finding specific to bulimia nervosa's compensatory purging behavior.", "id": "m9_17", "module": 9}, {"type": "mc", "stem": "A client at a normal body weight reports recurrent episodes of eating an unusually large amount of food within a 2-hour period, accompanied by a sense of loss of control, followed by self-induced vomiting. These episodes occur about twice weekly for the past 4 months. Which diagnosis best fits this presentation?", "options": [{"t": "Bulimia nervosa", "c": true, "w": ""}, {"t": "Anorexia nervosa, binge-eating/purging type", "c": false, "w": "Anorexia nervosa, binge-purge subtype, requires the client to also meet criteria for significantly low body weight, which is not present in this client who is at a normal body weight."}, {"t": "Binge-eating disorder", "c": false, "w": "Binge-eating disorder does not include compensatory behaviors such as self-induced vomiting; this client's purging behavior points specifically to bulimia nervosa."}, {"t": "Avoidant/restrictive food-intake disorder", "c": false, "w": "ARFID involves food avoidance/restriction without binge-purge cycles or body image disturbance, which does not match this client's presentation."}], "rationale": "Bulimia nervosa involves recurrent binge eating (with a sense of loss of control) plus recurrent inappropriate compensatory behavior (such as self-induced vomiting), occurring at least once weekly for 3 months, in a client typically at or near normal body weight.", "tip": "NCLEX tip: The key differentiator between BN and binge-purge-type AN is body weight — BN clients are usually at or near normal weight, while AN clients (even binge-purge subtype) meet criteria for significantly low body weight.", "id": "m9_18", "module": 9}, {"type": "mc", "stem": "According to DSM-5 severity classification for bulimia nervosa, a client who reports 10 compensatory behavior episodes per week would be classified in which severity category?", "options": [{"t": "Severe (8-13 episodes per week)", "c": true, "w": ""}, {"t": "Mild (1-3 episodes per week)", "c": false, "w": "The mild category corresponds to 1-3 episodes per week; 10 episodes per week falls well above this range."}, {"t": "Moderate (4-7 episodes per week)", "c": false, "w": "The moderate category corresponds to 4-7 episodes per week; 10 episodes per week exceeds this range and falls into the severe category."}, {"t": "Extreme (14 or more episodes per week)", "c": false, "w": "The extreme category requires 14 or more episodes per week; 10 episodes per week falls just below that threshold, placing it in the severe category instead."}], "rationale": "DSM-5 severity for BN is based on the frequency of compensatory behaviors per week: mild (1-3), moderate (4-7), severe (8-13), and extreme (14 or more), providing a standardized measure of illness severity.", "tip": "NCLEX tip: Memorize the BN severity frequency bands in order: mild 1-3, moderate 4-7, severe 8-13, extreme ≥14 episodes/week.", "id": "m9_19", "module": 9}, {"type": "mc", "stem": "A nurse is comparing the nursing diagnosis priorities for a client with bulimia nervosa versus anorexia nervosa. Which nursing diagnosis is more specifically associated with bulimia nervosa's core symptom pattern?", "options": [{"t": "Low volition/low self-control related to the binge-purge cycle", "c": true, "w": ""}, {"t": "Impaired nutritional status", "c": false, "w": "Impaired nutritional status is a shared nursing diagnosis relevant to both AN and BN, not one that is more specifically tied to BN's core binge-purge pattern over AN."}, {"t": "Disturbed body image", "c": false, "w": "Disturbed body image applies to both AN and BN, since both conditions involve distorted perceptions of body shape and weight, so it is not uniquely more specific to BN."}, {"t": "Risk for injury", "c": false, "w": "Risk for injury is a shared priority diagnosis for both AN (from cardiac/electrolyte complications of starvation) and BN (from purging-related electrolyte imbalance), not uniquely specific to BN."}], "rationale": "While many nursing diagnoses overlap between AN and BN (impaired nutritional status, disturbed body image, risk for injury), 'low volition/low self-control' specifically reflects BN's characteristic binge-purge cycle and the sense of loss of control central to its diagnostic criteria.", "tip": "NCLEX tip: Nursing diagnosis lists for AN and BN overlap significantly, but low volition/low self-control tied to the binge-purge cycle is a distinguishing feature more specific to BN.", "id": "m9_20", "module": 9}, {"type": "mc", "stem": "Which FDA-approved medication is specifically indicated for the treatment of bulimia nervosa?", "options": [{"t": "Fluoxetine (Prozac)", "c": true, "w": ""}, {"t": "Olanzapine", "c": false, "w": "Olanzapine is used off-label in anorexia nervosa to help with weight gain and obsessive thinking, not as an FDA-approved treatment specifically for bulimia nervosa."}, {"t": "Lisdexamfetamine (Vyvanse)", "c": false, "w": "Lisdexamfetamine is FDA-approved for moderate-to-severe binge-eating disorder in adults, not specifically for bulimia nervosa."}, {"t": "Disulfiram", "c": false, "w": "Disulfiram is used for alcohol use disorder and has no established indication for the treatment of bulimia nervosa."}], "rationale": "Fluoxetine (Prozac), an SSRI, is FDA-approved specifically for bulimia nervosa and significantly decreases binge and purge behaviors, although as with all SSRIs, it carries an increased suicide risk warning in this already vulnerable population.", "tip": "NCLEX tip: Match each eating disorder to its FDA-approved medication: BN = fluoxetine, BED = fluoxetine + lisdexamfetamine, AN = no medication is FDA-approved specifically for AN itself (olanzapine is used off-label).", "id": "m9_21", "module": 9}, {"type": "mc", "stem": "Which topiramate-related teaching point should the nurse include when discussing this medication for a client with bulimia nervosa or binge-eating disorder?", "options": [{"t": "Topiramate is an antiepileptic/mood stabilizer that may help suppress binge urges and reduce preoccupation with food", "c": true, "w": ""}, {"t": "Topiramate is a stimulant medication that directly increases appetite to promote weight restoration", "c": false, "w": "Topiramate is not a stimulant and does not work by increasing appetite; it is an antiepileptic/mood stabilizer thought to help suppress binge urges, not promote appetite."}, {"t": "Topiramate is the first-line, FDA-approved medication specifically for anorexia nervosa", "c": false, "w": "Topiramate is used to help suppress binge urges in BN/BED contexts, not as an FDA-approved treatment specifically for anorexia nervosa."}, {"t": "Topiramate must be combined with disulfiram for any therapeutic effect in eating disorders", "c": false, "w": "There is no requirement that topiramate be combined with disulfiram; these are unrelated medications used for entirely different conditions."}], "rationale": "Topiramate, an antiepileptic/mood stabilizer, may help suppress binge urges and reduce preoccupation with food in bulimia nervosa and binge-eating disorder, offering an alternative or adjunct to SSRIs like fluoxetine.", "tip": "NCLEX tip: Topiramate's role in eating disorder treatment is to reduce binge urges/preoccupation — recognize it alongside fluoxetine as a binge-eating/bulimia-related pharmacologic option.", "id": "m9_22", "module": 9}, {"type": "mc", "stem": "A client is newly diagnosed with binge-eating disorder (BED). Which statement by the nurse accurately reflects a key distinguishing feature of BED compared to bulimia nervosa?", "options": [{"t": "\"Unlike bulimia nervosa, binge-eating disorder does not involve regular compensatory behaviors such as vomiting or laxative misuse.\"", "c": true, "w": ""}, {"t": "\"Binge-eating disorder always occurs at a normal or underweight body weight, just like anorexia nervosa.\"", "c": false, "w": "BED often results in overweight or obesity due to the absence of compensatory behaviors, which is different from the normal-to-low weight typically seen in AN or BN."}, {"t": "\"Binge-eating disorder was first recognized in the DSM many decades before bulimia nervosa was described.\"", "c": false, "w": "BED was first formally recognized as its own diagnosis in DSM-5 (2013), making it a more recently codified diagnosis than bulimia nervosa, not an older one."}, {"t": "\"Obesity itself is classified as binge-eating disorder in the DSM-5.\"", "c": false, "w": "The DSM-5 explicitly distinguishes BED from obesity; most people with obesity do not binge-eat regularly, and obesity itself is not classified as a mental disorder."}], "rationale": "A key distinguishing feature of BED is the absence of regular compensatory behaviors (vomiting, laxative/diuretic use, excessive exercise) that define bulimia nervosa, which often leads to obesity in BED, though the DSM-5 clearly distinguishes BED from obesity itself, since most people with obesity do not binge-eat regularly.", "tip": "NCLEX tip: BED = binge eating WITHOUT compensatory behaviors, often but not always resulting in obesity; BN = binge eating WITH compensatory behaviors.", "id": "m9_23", "module": 9}, {"type": "mc", "stem": "Which population is identified as the fastest-growing group being newly diagnosed with eating disorders?", "options": [{"t": "Middle-aged women", "c": true, "w": ""}, {"t": "Adolescent males younger than 13", "c": false, "w": "While eating disorders do occur in adolescent males, the source material specifically identifies middle-aged women, not young adolescent males, as the fastest-growing newly diagnosed group."}, {"t": "Elderly men older than 80", "c": false, "w": "Elderly men are not identified in the source material as the fastest-growing group being diagnosed with eating disorders; middle-aged women hold that distinction."}, {"t": "Toddlers younger than 3 years old", "c": false, "w": "Toddlers are not the population described as the fastest-growing group for new eating disorder diagnoses in the source material."}], "rationale": "Middle-aged women are identified as the fastest-growing group being diagnosed with eating disorders, challenging the common misconception that eating disorders are exclusively a concern for teenagers and young adults.", "tip": "NCLEX tip: Remember that eating disorders are not limited to adolescents — middle-aged women represent a fast-growing, often under-recognized, diagnosed population.", "id": "m9_24", "module": 9}, {"type": "mc", "stem": "Which comorbid psychiatric condition has the highest reported association with both anorexia nervosa and bulimia nervosa?", "options": [{"t": "Anxiety disorders", "c": true, "w": ""}, {"t": "Intellectual disability", "c": false, "w": "Intellectual disability is not identified as having the highest comorbidity association with eating disorders in the source material; anxiety disorders hold that distinction."}, {"t": "Autism spectrum disorder", "c": false, "w": "While there can be some overlap in restrictive eating patterns, anxiety disorders, not autism spectrum disorder, are specifically identified as having the highest comorbidity rate with AN and BN."}, {"t": "Tourette's disorder", "c": false, "w": "Tourette's disorder is not identified as having a particularly high comorbidity with eating disorders in the source material; anxiety disorders are the most commonly cited comorbid condition."}], "rationale": "Anxiety disorders have the highest reported comorbidity with both AN and BN, with more than 50% of clients with AN and approximately 95% of clients with BN having a concurrent psychiatric disorder overall.", "tip": "NCLEX tip: Anxiety disorders top the comorbidity list for eating disorders — remember the striking statistic that nearly 95% of BN clients have a co-occurring psychiatric diagnosis.", "id": "m9_25", "module": 9}, {"type": "mc", "stem": "A client with bulimia nervosa explains to the nurse that she often fasts for a full day between binge-purge episodes. Which health teaching point should the nurse emphasize?", "options": [{"t": "Fasting perpetuates the binge-purge cycle rather than helping to control it", "c": true, "w": ""}, {"t": "Fasting is an effective, medically recommended way to break the binge-purge cycle", "c": false, "w": "Fasting is not recommended and actually perpetuates the binge-purge cycle by creating physiological and psychological conditions that increase the likelihood of subsequent binge episodes."}, {"t": "Fasting has no relationship at all to the frequency of binge-purge episodes", "c": false, "w": "Fasting is directly linked to perpetuating the binge-purge cycle, so it is inaccurate to say there is no relationship between the two."}, {"t": "Fasting should be encouraged as a form of exercise substitute", "c": false, "w": "Fasting is not a recommended substitute for exercise or any therapeutic intervention; it is specifically identified as a behavior that worsens, rather than helps, the binge-purge cycle."}], "rationale": "A key health teaching point for bulimia nervosa is that fasting perpetuates the binge-purge cycle rather than controlling it, so establishing a regular, balanced meal pattern (rather than restriction/fasting) is part of the nutritional treatment approach.", "tip": "NCLEX tip: Teaching that 'fasting perpetuates the binge-purge cycle' is a frequently tested health-teaching point specific to bulimia nervosa care.", "id": "m9_26", "module": 9}, {"type": "mc", "stem": "A nurse is establishing a therapeutic relationship with a client who has bulimia nervosa. Which factor tends to make the therapeutic alliance easier to build in BN compared with restrictive anorexia nervosa?", "options": [{"t": "The client with BN often also wants to stop the binge-purge cycle, unlike some clients with AN who may not want to gain weight", "c": true, "w": ""}, {"t": "Clients with BN never experience shame or shame-related emotions related to their eating behaviors", "c": false, "w": "Clients with BN commonly experience significant shame and loss-of-control feelings related to bingeing/purging, so shame is very much present, not absent, in BN."}, {"t": "Clients with BN are always fully forthcoming about their symptoms from the first encounter", "c": false, "w": "Like clients with AN, clients with BN may underreport or minimize symptoms due to shame or fear of judgment; forthcoming disclosure from the very first encounter is not guaranteed."}, {"t": "Clients with BN have no comorbid psychiatric conditions that complicate treatment engagement", "c": false, "w": "Nearly 95% of clients with BN have a comorbid psychiatric disorder, which can actually complicate rather than simplify treatment engagement."}], "rationale": "Building a therapeutic alliance is often somewhat easier with BN than with restrictive AN because the client with BN also typically wants to stop the binge-purge cycle, whereas some clients with AN may not share the goal of gaining weight, creating more resistance to treatment engagement.", "tip": "NCLEX tip: BN clients often share the treatment goal of stopping the binge-purge cycle, which can support alliance-building, but shame and comorbidity remain significant challenges in both AN and BN care.", "id": "m9_27", "module": 9}, {"type": "mc", "stem": "Which statement accurately reflects genetic risk factors for eating disorders?", "options": [{"t": "Children of parents with anorexia nervosa have approximately 10 times the lifetime risk of developing AN compared with the general population", "c": true, "w": ""}, {"t": "Genome-wide studies have found no genetic markers associated with anorexia nervosa risk", "c": false, "w": "A genome-wide study (Duncan et al., 2017) found that AN is associated with genetic anomalies on chromosome 12, contradicting the claim that no genetic markers have been identified."}, {"t": "First-degree relatives of people with AN show no increased rate of AN or BN compared to the general population", "c": false, "w": "First-degree female relatives and monozygotic twins of people with AN actually show higher rates of both AN and BN compared to the general population, not the same or lower rates."}, {"t": "Bulimia nervosa shows no familial clustering with other conditions such as substance use disorders", "c": false, "w": "Families of clients with BN show higher rates of substance use disorders (especially alcoholism), affective disorders, and obesity, indicating meaningful familial clustering."}], "rationale": "Genetic risk factors for eating disorders include a roughly 10-fold increased lifetime risk of AN in children of parents with AN (compared to the general population's baseline 5% risk), higher AN/BN rates in first-degree relatives and monozygotic twins, and identified genetic anomalies on chromosome 12 associated with AN.", "tip": "NCLEX tip: The 10x increased risk figure for children of parents with AN, and the chromosome 12 genetic association, are both specific, testable statistics from the source material.", "id": "m9_28", "module": 9}, {"type": "mc", "stem": "A nurse is reviewing neurobiological theories of eating disorders. Which statement best reflects current understanding of dopamine's role?", "options": [{"t": "Clients with AN may have difficulty benefiting from reward and be oversensitive to punishment, while clients with BN show a weaker dopamine reward response driving the desire to binge", "c": true, "w": ""}, {"t": "Dopamine plays no meaningful role in the neurobiology of either anorexia nervosa or bulimia nervosa", "c": false, "w": "Altered dopamine activity is specifically implicated in both AN and BN according to current neurobiological theory, so dopamine does play a meaningful role."}, {"t": "Dopamine dysregulation is only relevant to bulimia nervosa and has no bearing on anorexia nervosa", "c": false, "w": "Altered dopamine activity is implicated in both AN and BN, not exclusively BN; AN specifically shows dorsal striatum changes producing anxiety rather than pleasure."}, {"t": "Serotonin, not dopamine, is the only neurotransmitter implicated in eating disorder neurobiology", "c": false, "w": "While serotonin and norepinephrine abnormalities are also implicated, dopamine plays a well-documented, distinct role in both AN and BN reward processing, so it is inaccurate to say only serotonin is involved."}], "rationale": "Current theory suggests a faulty reward-processing system in eating disorders: AN clients may have difficulty benefiting from reward and be oversensitive to punishment (with dorsal striatum activity producing anxiety instead of pleasure), while BN clients show a weaker dopamine reward response that drives the urge to binge.", "tip": "NCLEX tip: Remember the contrast — AN involves reward-processing difficulty/oversensitivity to punishment, while BN involves a blunted dopamine reward response fueling binge urges.", "id": "m9_29", "module": 9}, {"type": "mc", "stem": "Which of the following best reflects the recommended focus of care shared by all eating disorders (AN, BN, and BED), according to the textbook's four broad goals of treatment?", "options": [{"t": "Stabilize acute medical symptoms, restore nutritional state, modify distorted eating behaviors, and change distorted beliefs about weight/body image", "c": true, "w": ""}, {"t": "Focus exclusively on weight restoration with no attention to underlying psychological beliefs", "c": false, "w": "Treatment for all eating disorders addresses not just nutritional/weight restoration but also distorted eating behaviors and distorted beliefs about weight/body image, reflecting a more comprehensive approach than weight alone."}, {"t": "Prioritize pharmacologic treatment above all psychotherapeutic or nutritional interventions", "c": false, "w": "Psychotherapy is generally considered the cornerstone of eating disorder treatment, with pharmacologic treatment serving a secondary, adjunctive role, especially in BN/BED."}, {"t": "Address only the psychological beliefs about body image, without addressing acute medical stabilization", "c": false, "w": "Acute medical symptom stabilization is explicitly identified as the first priority focus of care for all eating disorders, given the potentially life-threatening physical complications involved."}], "rationale": "The four broad goals of care across all eating disorders are: (1) stabilize acute medical symptoms, (2) restore nutritional state (weight restoration in AN, balanced metabolic state in BN), (3) modify distorted eating behaviors, and (4) change distorted beliefs about weight and body image.", "tip": "NCLEX tip: These four goals apply across AN, BN, and BED alike — medical stabilization always comes first, followed by nutrition, behavior, and cognitive/belief-focused work.", "id": "m9_30", "module": 9}, {"type": "sata", "stem": "Select all statements that accurately describe binge-eating disorder (BED).", "options": [{"t": "BED does not involve regular compensatory behaviors such as vomiting or laxative misuse", "c": true, "w": ""}, {"t": "BED was first formally recognized as a distinct diagnosis in the DSM-5 in 2013", "c": true, "w": ""}, {"t": "Lisdexamfetamine (Vyvanse) is FDA-approved for moderate-to-severe BED in adults", "c": true, "w": ""}, {"t": "BED requires that the client also meet full diagnostic criteria for major depressive disorder", "c": false, "w": "BED does not require a comorbid diagnosis of major depressive disorder to be diagnosed, although it frequently co-occurs with depressive disorders; it is a standalone DSM-5 diagnosis."}, {"t": "Psychological treatment alone is sufficient to address the associated weight/obesity concerns in BED without any obesity management component", "c": false, "w": "The source material specifically states that obesity management is required alongside psychological treatment, since psychiatric treatment alone does not reduce weight in clients with BED and co-occurring obesity."}], "rationale": "BED is characterized by recurrent binge eating without regular compensatory behaviors, was newly recognized in DSM-5 (2013), and often requires both psychological treatment (like CBT) and obesity management, with lisdexamfetamine as one FDA-approved pharmacologic option for moderate-to-severe cases.", "tip": "NCLEX tip: BED treatment specifically requires addressing both the psychological binge-eating behavior AND, separately, obesity management — psychological treatment alone is not sufficient for weight-related concerns.", "id": "m9_31", "module": 9}, {"type": "sata", "stem": "Select all medical complications that are more specifically associated with bulimia nervosa's purging behaviors rather than anorexia nervosa's restrictive/starvation state.", "options": [{"t": "Parotid gland enlargement with elevated amylase", "c": true, "w": ""}, {"t": "Severe dental erosion with exposed pulp", "c": true, "w": ""}, {"t": "Russell's sign", "c": true, "w": ""}, {"t": "Lanugo (fine downy hair growth)", "c": false, "w": "Lanugo is a classic finding in anorexia nervosa's starvation state, not a purging-specific complication of bulimia nervosa."}, {"t": "Carotenemia (yellow-tinged skin)", "c": false, "w": "Carotenemia is associated with the starvation/malnutrition state of anorexia nervosa, not specifically with the purging behaviors of bulimia nervosa."}], "rationale": "Purging-specific complications of bulimia nervosa include parotid gland enlargement (with elevated amylase), severe dental erosion, esophageal tears, and Russell's sign (knuckle calluses from self-induced vomiting), in contrast to the starvation-related findings of lanugo and carotenemia seen in anorexia nervosa.", "tip": "NCLEX tip: Sort eating disorder complications by mechanism — starvation-related (AN: lanugo, carotenemia, amenorrhea) versus purging-related (BN: parotid enlargement, dental erosion, Russell's sign).", "id": "m9_32", "module": 9}, {"type": "fib", "stem": "The screening questionnaire consisting of the items Sick, Control, One stone, Fat, and Food, used to identify possible eating disorders, is known by the acronym _____.", "answers": ["scoff"], "rationale": "The SCOFF questionnaire is a brief screening tool for eating disorders; a score of 2 or more 'yes' responses across its five items suggests the presence of an eating disorder and warrants further evaluation.", "tip": "NCLEX tip: SCOFF's five letters map to five short screening questions — memorize the acronym alongside its 2-or-more threshold for a positive screen.", "id": "m9_33", "module": 9}, {"type": "fib", "stem": "The SSRI medication that is FDA-approved for the treatment of bulimia nervosa and significantly decreases binge and purge behaviors is _____.", "answers": ["fluoxetine", "prozac"], "rationale": "Fluoxetine (Prozac) is the SSRI that is FDA-approved specifically for bulimia nervosa, significantly decreasing binge and purge behaviors, though as with all SSRIs, it carries an increased suicide risk warning in this vulnerable population.", "tip": "NCLEX tip: Fluoxetine is the one medication with a specific FDA-approved indication for bulimia nervosa — a frequently tested pharmacology fact.", "id": "m9_34", "module": 9}, {"type": "mc", "stem": "A 4-year-old client prefers solitary play, spins the wheels of toy cars repeatedly, echoes words spoken to him, and becomes distressed with arm-flapping and crying in crowded settings. Which condition should the nurse suspect?", "options": [{"t": "Autism spectrum disorder (ASD)", "c": true, "w": ""}, {"t": "Attention-deficit/hyperactivity disorder (ADHD)", "c": false, "w": "ADHD is characterized by inattention, impulsivity, and hyperactivity, not the social withdrawal, repetitive behaviors (stimming), and echolalia described in this child."}, {"t": "Oppositional defiant disorder (ODD)", "c": false, "w": "ODD involves a pattern of angry, defiant, and vindictive behavior toward authority figures, not the social/communication deficits and repetitive behaviors described in this child."}, {"t": "Separation anxiety disorder", "c": false, "w": "Separation anxiety disorder centers on developmentally inappropriate fear about separation from an attachment figure, not the repetitive behaviors and echolalia described here."}], "rationale": "This presentation, solitary play, repetitive/stimming behaviors (wheel-spinning), echolalia, and distress with crowds/arm-flapping, reflects deficits in social/emotional interaction plus repetitive behaviors/interests characteristic of autism spectrum disorder.", "tip": "NCLEX tip: Look for the combination of social/communication deficits PLUS repetitive behaviors or stimming as the hallmark pattern distinguishing ASD from other childhood conditions like ADHD.", "id": "m9_35", "module": 9}, {"type": "mc", "stem": "A child with autism spectrum disorder has noticeable social and communication deficits, does not initiate social interaction, and becomes distressed by any change in routine, though the child is not aggressive. Which ASD severity level best fits this presentation?", "options": [{"t": "Level 2 (requiring substantial support)", "c": true, "w": ""}, {"t": "Level 1 (requiring support)", "c": false, "w": "Level 1 involves a more subtle social deficit with normal language/speech and organizational difficulty, which is less severe than the noticeable verbal/nonverbal deficits and lack of social initiation described here."}, {"t": "Level 3 (requiring very substantial support)", "c": false, "w": "Level 3 involves severe deficits including limited/needs-based communication, possible nonverbal status, and markedly interfering repetitive behaviors, along with more common aggression, which is more severe than this presentation."}, {"t": "This description does not correspond to any recognized ASD severity level", "c": false, "w": "This description does correspond to a recognized ASD severity level (Level 2), which involves noticeable verbal/nonverbal deficits, obvious social impairment, lack of social initiation, and distress with routine changes."}], "rationale": "ASD Level 2 (substantial support) involves noticeable verbal and nonverbal communication deficits, obvious social impairment and repetitive behaviors, failure to initiate social interaction, and distress with changes in routine — more severe than Level 1's subtler social deficit but less severe than Level 3's profound communication limitations.", "tip": "NCLEX tip: Sort ASD severity levels by degree of communication impairment and behavioral rigidity: Level 1 (mild/support), Level 2 (substantial), Level 3 (very substantial, often nonverbal, more aggression).", "id": "m9_36", "module": 9}, {"type": "mc", "stem": "Which self-stimulatory behavior pattern, sometimes seen in children with autism spectrum disorder, is referred to as 'stimming'?", "options": [{"t": "Repetitive behaviors such as finger tapping, twirling, or rocking used for self-regulation", "c": true, "w": ""}, {"t": "A structured behavioral therapy technique used by clinicians to reduce problem behaviors", "c": false, "w": "Stimming refers to the child's own self-stimulatory behaviors, not a clinician-led therapeutic technique; behavior modification/CBT would be the clinician-led technique instead."}, {"t": "A formal diagnostic criterion required for a diagnosis of ADHD", "c": false, "w": "Stimming is associated with autism spectrum disorder, not a formal diagnostic criterion for ADHD, which centers on inattention, hyperactivity, and impulsivity instead."}, {"t": "A medication side effect specific to antipsychotic use in children", "c": false, "w": "Stimming is an intrinsic self-stimulatory behavior pattern associated with ASD, not a medication side effect."}], "rationale": "Stimming refers to self-stimulatory behaviors seen in ASD, ranging from mild (finger tapping, toe-walking, arm-flapping, rocking) to severe (head-banging, biting, which can cause injury), often serving a self-regulatory function for the child.", "tip": "NCLEX tip: Recognize 'stimming' as ASD-specific self-stimulatory behavior, ranging from mild and harmless to severe and potentially injurious.", "id": "m9_37", "module": 9}, {"type": "mc", "stem": "Which subtype of ADHD is most specifically linked to variation in the dopamine transporter gene?", "options": [{"t": "Hyperactive-impulsive type", "c": true, "w": ""}, {"t": "Inattentive type", "c": false, "w": "The inattentive type is more specifically linked to the norepinephrine transporter gene, not the dopamine transporter gene variation associated with the hyperactive-impulsive subtype."}, {"t": "Combined type", "c": false, "w": "The combined type is linked to the choline transporter gene according to the source material, not specifically the dopamine transporter gene."}, {"t": "Restrictive type", "c": false, "w": "'Restrictive type' is not a recognized ADHD subtype; it is actually a subtype classification used for anorexia nervosa, not ADHD."}], "rationale": "ADHD subtypes are tied to different genes/neurotransmitters: inattentive type to the norepinephrine transporter gene, hyperactive-impulsive type to dopamine transporter gene variation, and combined type to the choline transporter gene; this is also why stimulants (targeting dopamine) and nonstimulants like atomoxetine (targeting norepinephrine) work differently for different presentations.", "tip": "NCLEX tip: Match ADHD subtype to neurotransmitter/gene: inattentive = norepinephrine, hyperactive-impulsive = dopamine, combined = choline.", "id": "m9_38", "module": 9}, {"type": "mc", "stem": "A parent asks the nurse why their child with ADHD does not typically feel excessive self-blame about their symptoms, unlike some children with other behavioral conditions. Which explanation is most accurate based on the source material?", "options": [{"t": "Normal serotonin levels in ADHD are associated with less self-blame related to symptoms", "c": true, "w": ""}, {"t": "Children with ADHD have elevated cortisol levels that specifically prevent feelings of guilt", "c": false, "w": "Elevated cortisol and guilt prevention is not the mechanism described in the source material; normal serotonin levels are specifically linked to reduced self-blame in ADHD."}, {"t": "Children with ADHD lack the cognitive capacity to experience self-blame at all", "c": false, "w": "This is inaccurate and stigmatizing; children with ADHD are fully capable of experiencing self-blame, but normal serotonin levels are associated with somewhat less self-blame regarding symptoms specifically."}, {"t": "This is unrelated to neurobiology and is purely a matter of parenting style", "c": false, "w": "The source material specifically attributes this phenomenon to normal serotonin levels in ADHD, a neurobiological factor, rather than attributing it purely to parenting style."}], "rationale": "According to the source material, normal serotonin levels in children with ADHD are associated with less self-blame regarding their symptoms, a neurobiological detail distinguishing ADHD from conditions where altered serotonin more directly ties to mood/self-esteem disturbances.", "tip": "NCLEX tip: This detail (normal serotonin → less self-blame in ADHD) is a specific, easily overlooked biochemical fact worth flagging for review.", "id": "m9_39", "module": 9}, {"type": "mc", "stem": "A nurse is caring for a 9-year-old client newly diagnosed with mild intellectual disability. Which expected functional outcome is most consistent with this level of severity?", "options": [{"t": "Near-normal social/communication skills with the capacity for self-care, independent living, and vocational training as an adult", "c": true, "w": ""}, {"t": "Complete inability to acquire any speech, requiring constant supervision and specialized medical equipment for survival", "c": false, "w": "This describes profound intellectual disability, not mild; mild ID (85% of cases) is associated with near-normal social/communication skills and the capacity for eventual independent living."}, {"t": "Elementary-level (1st-3rd grade) conceptual functioning requiring ongoing daily-living assistance throughout adulthood", "c": false, "w": "This describes moderate intellectual disability, which involves more s
