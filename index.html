 rationale:'Hypercalcemia is a recognized risk factor for developing acute pancreatitis, distinct from the hypocalcemia that commonly develops as a consequence of the disease itself and correlates with its severity.',
 tip:'NCLEX tip: keep the two calcium relationships in pancreatitis distinct — hypercalcemia as a risk factor for developing the disease, versus hypocalcemia as a severity marker once the disease is present.'},

{id:'g78',type:'mc',stem:'A client with acute pancreatitis has stable vital signs but ongoing pain. Which nonpharmacologic comfort measure would the nurse include in the plan of care?',
 options:[
  {t:'Relaxation and diversion techniques alongside positioning changes',c:true,why:''},
  {t:'Strict bed rest in a flat supine position with no repositioning',c:false,why:'Flat supine positioning without repositioning is not recommended, since semi-Fowler positioning and periodic repositioning help ease diaphragmatic pressure and prevent skin breakdown.'},
  {t:'Complete sensory deprivation with no stimulation of any kind',c:false,why:'Complete sensory deprivation is not an appropriate or recommended comfort measure; relaxation and diversion techniques are more appropriate.'},
  {t:'Withholding all explanations about the client\'s condition to avoid overstimulation',c:false,why:'Frequent, simple explanations are actually recommended for pancreatitis clients, who are often confused or distressed from pain and fluid shifts, not withheld information.'},
 ],
 rationale:'Nonpharmacologic comfort measures for acute pancreatitis include relaxation and diversion techniques, positioning (such as semi-Fowler), and frequent, simple explanations, since the client is often confused or distressed from pain, fluid shifts, or hypoxia.',
 tip:'NCLEX tip: pair pharmacologic pain control with nonpharmacologic comfort measures (positioning, relaxation, simple explanations) for a complete pancreatitis care picture.'},
{id:'g79',type:'mc',stem:'A client with chronic PPI use develops hypomagnesemia. What is the underlying mechanism?',
 options:[
  {t:'Chronic acid suppression can impair magnesium absorption in the GI tract',c:true,why:''},
  {t:'PPIs directly increase renal magnesium excretion as their primary mechanism',c:false,why:'The mechanism described in the course material relates to impaired GI absorption, not a direct renal excretion effect of PPIs.'},
  {t:'PPIs cause magnesium to shift into cells, lowering the serum level temporarily',c:false,why:'This describes an intracellular shift mechanism (like that seen with insulin or hyperglycemia), not the GI absorption mechanism linked to chronic PPI use.'},
  {t:'PPIs have no recognized relationship to magnesium levels',c:false,why:'Chronic PPI use is specifically listed as a recognized cause of hypomagnesemia through impaired absorption.'},
 ],
 rationale:'Chronic PPI use is a recognized cause of hypomagnesemia, related to impaired magnesium absorption in the gastrointestinal tract with long-term acid suppression.',
 tip:'NCLEX tip: chronic PPI use is a somewhat overlooked but testable cause of hypomagnesemia — pair it with other GI causes like Crohn\'s disease and celiac disease.'},

{id:'g80',type:'mc',stem:'A client with hypomagnesemia also has a low calcium level that is not correcting despite calcium supplementation. What is the most likely explanation?',
 options:[
  {t:'Hypocalcemia will not correct until the magnesium deficiency is also treated, since magnesium is needed for PTH function',c:true,why:''},
  {t:'The client is receiving too much calcium and should have the dose reduced',c:false,why:'The issue is not excess calcium dosing; rather, magnesium must be replaced for PTH to function properly and allow calcium correction.'},
  {t:'Calcium and magnesium levels are unrelated physiologically',c:false,why:'Calcium and magnesium are closely linked physiologically, particularly through PTH function, making this statement inaccurate.'},
  {t:'This finding suggests the client has developed hyperphosphatemia instead',c:false,why:'This scenario does not describe a phosphorus-related issue; the key relationship here is between magnesium and calcium via PTH.'},
 ],
 rationale:'Magnesium is required for proper parathyroid hormone function, so hypocalcemia associated with hypomagnesemia will not correct with calcium supplementation alone until the magnesium deficiency is also treated.',
 tip:'NCLEX tip: "hypocalcemia won\'t correct until magnesium is replaced" is one of the highest-yield linked-electrolyte facts in this unit.'},

{id:'g81',type:'mc',stem:'A client with hypomagnesemia has positive Trousseau and Chvostek signs. What do these findings indicate?',
 options:[
  {t:'Neuromuscular irritability',c:true,why:''},
  {t:'Decreased deep tendon reflexes',c:false,why:'Trousseau and Chvostek signs reflect increased, not decreased, neuromuscular excitability.'},
  {t:'Cardiac conduction delay only',c:false,why:'These signs specifically test for neuromuscular irritability through nerve/muscle stimulation, not cardiac conduction changes.'},
  {t:'Renal impairment specifically',c:false,why:'Trousseau and Chvostek signs are neuromuscular tests, not direct indicators of renal function.'},
 ],
 rationale:'Positive Trousseau and Chvostek signs reflect neuromuscular irritability, commonly seen with hypomagnesemia and hypocalcemia, both of which increase nerve and muscle excitability.',
 tip:'NCLEX tip: Trousseau and Chvostek signs are shared, testable indicators across hypocalcemia and hypomagnesemia — remember they signal irritability, not weakness.'},

{id:'g82',type:'mc',stem:'A client receiving IV magnesium replacement has a urine output of 80 mL over the past 4 hours. What should the nurse do?',
 options:[
  {t:'Notify the provider, since urine output below 100 mL/4 hrs during magnesium therapy requires evaluation',c:true,why:''},
  {t:'Continue the infusion at the current rate with no further action needed',c:false,why:'This urine output falls below the recommended threshold for continued safe magnesium administration and requires provider notification, not simply continuing unchanged.'},
  {t:'Increase the infusion rate to help flush out excess magnesium faster',c:false,why:'Increasing the infusion rate would be unsafe given reduced urine output, since impaired excretion increases the risk of magnesium accumulation and toxicity.'},
  {t:'Discontinue all IV fluids for the client immediately',c:false,why:'The appropriate action is to notify the provider about the low urine output during magnesium therapy, not to stop all IV fluids outright without further guidance.'},
 ],
 rationale:'Urine output should be monitored during IV magnesium administration, and the provider should be notified if output is less than 100 mL over 4 hours, since reduced renal excretion increases the risk of magnesium accumulation and toxicity.',
 tip:'NCLEX tip: "<100 mL/4 hrs, notify provider" is the specific urine output threshold to remember for IV magnesium safety monitoring.'},

{id:'g83',type:'mc',stem:'Which food would the nurse recommend to a client who needs to increase dietary magnesium intake?',
 options:[
  {t:'Spinach and other green leafy vegetables',c:true,why:''},
  {t:'White bread made from refined flour',c:false,why:'Refined flour products are lower in magnesium compared with whole grains, nuts, seeds, and leafy greens.'},
  {t:'Clear broth with no solid ingredients',c:false,why:'Clear broth alone provides minimal nutritional content, including magnesium, compared with magnesium-rich whole foods.'},
  {t:'White rice with no other additions',c:false,why:'Plain white rice is not considered a significant source of dietary magnesium compared with foods like leafy greens, nuts, and legumes.'},
 ],
 rationale:'Green leafy vegetables like spinach, along with nuts, seeds, legumes, whole grains, dairy, and avocados, are good dietary sources of magnesium recommended for clients needing to increase intake.',
 tip:'NCLEX tip: build a simple magnesium-rich food list — greens, nuts/seeds, legumes, whole grains, and avocados — for dietary teaching questions.'},

{id:'g84',type:'mc',stem:'A client receiving IV magnesium sulfate for eclampsia prevention has diminished deep tendon reflexes. What does this finding suggest?',
 options:[
  {t:'Rising or excess magnesium levels, requiring prompt evaluation',c:true,why:''},
  {t:'A normal, expected response to any IV magnesium infusion',c:false,why:'Diminished DTRs are a warning sign of rising magnesium toward toxic levels, not a routine or benign expected finding to disregard.'},
  {t:'Hypocalcemia unrelated to the magnesium infusion',c:false,why:'In this context, diminished reflexes during magnesium infusion are specifically linked to magnesium toxicity risk, not an unrelated calcium issue.'},
  {t:'Improvement in the client\'s underlying preeclampsia',c:false,why:'Diminished reflexes do not indicate improvement in preeclampsia; they are a safety warning sign related to magnesium level, requiring prompt evaluation.'},
 ],
 rationale:'Diminished deep tendon reflexes during IV magnesium administration can signal rising or excess magnesium levels, prompting the nurse to stop the infusion and notify the provider to prevent progression toward more severe toxicity.',
 tip:'NCLEX tip: DTR monitoring during magnesium infusion is a core safety check — diminishing reflexes are an early warning sign of toxicity.'},

{id:'g85',type:'mc',stem:'Which client is at greatest risk for developing hypermagnesemia?',
 options:[
  {t:'A client with kidney injury who frequently uses Milk of Magnesia',c:true,why:''},
  {t:'A client with chronic alcohol use and poor nutritional intake',c:false,why:'Chronic alcohol use and malnutrition are more commonly associated with hypomagnesemia, not hypermagnesemia.'},
  {t:'A client with refeeding syndrome after prolonged malnutrition',c:false,why:'Refeeding syndrome is more classically associated with hypomagnesemia and hypophosphatemia due to intracellular shifts, not hypermagnesemia.'},
  {t:'A client taking loop diuretics for fluid overload',c:false,why:'Loop diuretics increase magnesium excretion and are more commonly linked to hypomagnesemia rather than hypermagnesemia.'},
 ],
 rationale:'Impaired renal excretion combined with ongoing magnesium intake (such as from magnesium-containing laxatives like Milk of Magnesia) places a client with kidney injury at the greatest risk for hypermagnesemia.',
 tip:'NCLEX tip: kidney injury/CKD combined with magnesium-containing product use is the classic hypermagnesemia risk combination to identify in a scenario.'},

{id:'g86',type:'mc',stem:'A client with severe hypermagnesemia develops bradycardia and hypotension. Which ECG change would the nurse expect?',
 options:[
  {t:'Prolonged PR interval and widened QRS',c:true,why:''},
  {t:'Shortened QT interval only, with no other changes',c:false,why:'Hypermagnesemia is more specifically associated with a prolonged PR interval and widened QRS, not an isolated shortened QT interval.'},
  {t:'Peaked P waves with a shortened PR interval',c:false,why:'This does not describe the classic ECG pattern associated with hypermagnesemia, which involves PR prolongation and QRS widening.'},
  {t:'No ECG changes are expected with hypermagnesemia',c:false,why:'ECG changes, including PR prolongation and QRS widening, are expected findings with hypermagnesemia, particularly as levels rise significantly.'},
 ],
 rationale:'Hypermagnesemia is associated with ECG changes including a prolonged PR interval and widened QRS complex, alongside bradycardia, hypotension, and in severe cases, dysrhythmias or cardiac arrest.',
 tip:'NCLEX tip: prolonged PR and widened QRS for hypermagnesemia — contrast this with the Torsades de Pointes risk seen in hypomagnesemia.'},

{id:'g87',type:'mc',stem:'Which intervention would the nurse anticipate for a client with severe hypermagnesemia and adequate renal function?',
 options:[
  {t:'IV fluids such as normal saline or lactated Ringer\'s along with a loop diuretic to increase renal excretion',c:true,why:''},
  {t:'Restriction of all IV fluids to concentrate the client\'s remaining magnesium',c:false,why:'Fluid restriction would not help clear excess magnesium; IV fluids paired with a loop diuretic are used to increase renal excretion, provided renal function is adequate.'},
  {t:'Administration of additional magnesium-containing antacids to balance electrolytes',c:false,why:'This would worsen, not improve, hypermagnesemia; magnesium-containing medications should be discontinued in this situation.'},
  {t:'No treatment is needed since hypermagnesemia always resolves spontaneously',c:false,why:'Severe hypermagnesemia requires active intervention, such as IV fluids and diuretics or, in severe/renal failure cases, hemodialysis, rather than spontaneous resolution alone.'},
 ],
 rationale:'For a client with adequate renal function and hypermagnesemia, IV fluids (such as normal saline or lactated Ringer\'s) combined with a loop diuretic help increase renal excretion of magnesium; severe cases or renal failure may require hemodialysis with magnesium-free dialysate.',
 tip:'NCLEX tip: match the hypermagnesemia treatment to renal function status — adequate function allows fluids/diuretics, while renal failure requires dialysis.'},

{id:'g88',type:'mc',stem:'A client with severe hypophosphatemia (below 1 mg/dL) requires IV phosphorus replacement. What is an important nursing safety consideration during this therapy?',
 options:[
  {t:'Infuse no faster than the recommended rate and closely monitor the IV site for infiltration',c:true,why:''},
  {t:'Administer the entire dose as a rapid IV push for fastest correction',c:false,why:'Rapid IV push administration is unsafe; IV phosphorus must be infused at a controlled, limited rate rather than pushed quickly.'},
  {t:'No special monitoring of the IV site is needed during phosphorus infusion',c:false,why:'Careful IV site monitoring is essential because infiltration of IV phosphorus can cause tissue sloughing or necrosis.'},
  {t:'IV phosphorus replacement can be given regardless of the client\'s renal function',c:false,why:'Renal function should be assessed before supplementation, since impaired kidney function affects phosphorus clearance and safe dosing.'},
 ],
 rationale:'IV phosphorus should be infused no faster than the recommended rate (commonly cited as no more than 3 mmol/hr), with close monitoring of the IV site given the risk of tissue sloughing or necrosis with infiltration, and renal function should be assessed before supplementation.',
 tip:'NCLEX tip: IV phosphorus infusion rate and infiltration risk are specific, testable safety details — remember the site monitoring requirement alongside the rate limit.'},

{id:'g89',type:'mc',stem:'A client with hypophosphatemia reports muscle weakness and shallow respirations. What is the underlying concern with this presentation?',
 options:[
  {t:'Diaphragm weakness that could progress to respiratory failure',c:true,why:''},
  {t:'A benign finding requiring no further monitoring',c:false,why:'This presentation reflects a potentially serious complication (respiratory muscle weakness) and requires close monitoring, not dismissal as benign.'},
  {t:'An unrelated anxiety-related symptom',c:false,why:'While anxiety can cause respiratory changes, in the context of hypophosphatemia, this presentation is specifically linked to diaphragm and respiratory muscle weakness.'},
  {t:'A sign that phosphorus levels have already normalized',c:false,why:'These symptoms suggest ongoing, significant hypophosphatemia rather than resolution or normalization of phosphorus levels.'},
 ],
 rationale:'Severe hypophosphatemia can cause muscle weakness, including diaphragm weakness, which can progress to respiratory failure if not recognized and treated promptly.',
 tip:'NCLEX tip: respiratory muscle weakness is a shared, high-priority concern across both severe hypophosphatemia and severe hypomagnesemia — always assess airway/breathing first.'},

{id:'g90',type:'mc',stem:'A client with hyperphosphatemia is prescribed a phosphate binder. Which teaching point is most important?',
 options:[
  {t:'Take the medication with meals since it works by binding dietary phosphorus',c:true,why:''},
  {t:'Take the medication on an empty stomach between meals',c:false,why:'Phosphate binders need to be taken with meals to bind the phosphorus present in food, not on an empty stomach between meals.'},
  {t:'This medication treats low phosphorus, not high phosphorus',c:false,why:'This is inaccurate; phosphate binders are specifically used to lower elevated phosphorus levels, not to treat hypophosphatemia.'},
  {t:'This medication should be taken only once a month',c:false,why:'Phosphate binders are generally taken with each meal, not on an infrequent monthly schedule.'},
 ],
 rationale:'Phosphate binders such as calcium acetate or sevelamer must be taken with meals because they work by binding dietary phosphorus in the GI tract, reducing its absorption and helping control hyperphosphatemia.',
 tip:'NCLEX tip: "with meals" is the shared, critical timing instruction for both phosphate binders (hyperphosphatemia) and sucralfate (before meals, for a different reason) — don\'t mix these up.'},

{id:'g91',type:'sata',stem:'The nurse is assessing a client with hyperphosphatemia related to CKD. Which findings would the nurse expect? Select all that apply.',
 options:[
  {t:'Positive Trousseau and Chvostek signs from reciprocal hypocalcemia',c:true,why:''},
  {t:'Prolonged ST and QT intervals on ECG',c:true,why:''},
  {t:'Increased bowel motility with cramping and diarrhea',c:true,why:''},
  {t:'Markedly decreased deep tendon reflexes',c:false,why:'Hyperphosphatemia is more commonly associated with hyperactive, not decreased, deep tendon reflexes, related to the reciprocal drop in calcium.'},
  {t:'Long-term risk of soft tissue and vascular calcification',c:true,why:''},
 ],
 rationale:'Hyperphosphatemia produces neuromuscular irritability (positive Trousseau/Chvostek signs, hyperactive reflexes) from reciprocal hypocalcemia, ECG changes (prolonged ST/QT), increased GI motility, and long-term vascular/soft tissue calcification risk.',
 tip:'NCLEX tip: hyperphosphatemia and hypocalcemia findings overlap significantly because of their reciprocal relationship — study them as a linked pair.'},

{id:'g92',type:'sata',stem:'The nurse is caring for a client with hypochloremic metabolic alkalosis from prolonged NG suctioning. Which findings would the nurse expect? Select all that apply.',
 options:[
  {t:'Elevated serum bicarbonate',c:true,why:''},
  {t:'Decreased serum potassium',c:true,why:''},
  {t:'Slow, shallow respirations',c:true,why:''},
  {t:'Decreased serum sodium',c:true,why:''},
  {t:'Kussmaul respirations with deep, rapid breathing',c:false,why:'Kussmaul respirations are a compensatory pattern for metabolic acidosis, not the slow, shallow respiratory pattern seen with metabolic alkalosis.'},
 ],
 rationale:'Hypochloremic metabolic alkalosis from GI losses such as NG suctioning presents with elevated bicarbonate, decreased sodium and potassium, and slow, shallow respirations as a compensatory response, distinct from the Kussmaul pattern seen in metabolic acidosis.',
 tip:'NCLEX tip: hypochloremia\'s lab pattern (low chloride, low sodium, low potassium, high bicarbonate) reflects GI fluid losses — connect this to NG suction and vomiting scenarios.'},

{id:'g93',type:'sata',stem:'The nurse is assessing a client with hyperchloremic metabolic acidosis. Which findings would the nurse expect? Select all that apply.',
 options:[
  {t:'Decreased serum bicarbonate',c:true,why:''},
  {t:'Deep, rapid Kussmaul respirations',c:true,why:''},
  {t:'Decreased cognitive status/lethargy',c:true,why:''},
  {t:'Elevated urinary chloride',c:true,why:''},
  {t:'Slow, shallow respirations as the primary respiratory pattern',c:false,why:'Slow, shallow respirations are more characteristic of metabolic alkalosis, whereas hyperchloremic metabolic acidosis is associated with compensatory Kussmaul respirations.'},
 ],
 rationale:'Hyperchloremic metabolic acidosis presents with decreased bicarbonate, compensatory Kussmaul respirations, declining cognitive status, and elevated urinary chloride, reflecting the acid-base and renal handling changes associated with this imbalance.',
 tip:'NCLEX tip: contrast the respiratory patterns of chloride imbalances — alkalosis brings slow/shallow breathing, acidosis brings Kussmaul (deep/rapid) breathing.'},

{id:'g94',type:'mc',stem:'A client with severe diarrhea from ulcerative colitis develops hyperchloremia. What is the most likely mechanism?',
 options:[
  {t:'GI loss of bicarbonate from diarrhea leads to a compensatory rise in chloride',c:true,why:''},
  {t:'Diarrhea directly increases sodium retention, which secondarily raises chloride',c:false,why:'The mechanism described in the course material relates to bicarbonate loss and its inverse relationship with chloride, not a sodium retention pathway.'},
  {t:'Diarrhea has no established relationship to chloride balance',c:false,why:'Severe diarrhea is specifically listed as a cause of hyperchloremia through bicarbonate loss, so this statement is inaccurate.'},
  {t:'Diarrhea causes excess chloride to be produced by the pancreas',c:false,why:'This is not an accurate mechanism; chloride balance changes with diarrhea relate to bicarbonate loss and the chloride-bicarbonate inverse relationship, not pancreatic chloride production.'},
 ],
 rationale:'Severe diarrhea causes loss of bicarbonate from the GI tract; because chloride and bicarbonate have an inverse relationship, this loss can lead to a compensatory rise in serum chloride, contributing to hyperchloremic metabolic acidosis.',
 tip:'NCLEX tip: remember the chloride-bicarbonate inverse relationship as your key tool for predicting chloride changes in GI fluid loss scenarios.'},

{id:'g95',type:'mc',stem:'A client with GERD who also has asthma asks the nurse about the relationship between the two conditions. What is the most accurate response?',
 options:[
  {t:'"GERD is associated with respiratory conditions like asthma and COPD, and can worsen respiratory symptoms."',c:true,why:''},
  {t:'"GERD and asthma have no established relationship."',c:false,why:'This is inaccurate; GERD is specifically associated with respiratory conditions including asthma, COPD, and cystic fibrosis.'},
  {t:'"Asthma medications are the only cause of GERD symptoms in this situation."',c:false,why:'While some medications can contribute to reflux, GERD\'s association with asthma is broader than being solely caused by asthma medications.'},
  {t:'"Treating GERD will have no effect on asthma symptoms."',c:false,why:'Given the established association between GERD and respiratory conditions, managing GERD may have a beneficial effect on associated respiratory symptoms.'},
 ],
 rationale:'GERD is associated with respiratory conditions including asthma, COPD, and cystic fibrosis, and can contribute to worsening respiratory symptoms through microaspiration and airway irritation.',
 tip:'NCLEX tip: GERD\'s associated conditions list (IBS, COPD, asthma, cystic fibrosis, Barrett esophagus, PUD, angina) is worth reviewing as a group for exam recognition.'},

{id:'g96',type:'mc',stem:'A client with suspected GI bleeding is prescribed a proton pump inhibitor as part of management. What is the primary purpose of this medication in this context?',
 options:[
  {t:'To reduce gastric acid production and support mucosal healing and clot stability',c:true,why:''},
  {t:'To directly stop active arterial bleeding without any other intervention',c:false,why:'PPIs support mucosal healing and clot stability but do not directly stop active arterial bleeding; endoscopic or surgical intervention addresses that directly.'},
  {t:'To replace the need for blood transfusion in significant bleeding',c:false,why:'PPIs do not replace the need for transfusion when significant blood loss has occurred; they support acid-related healing, not volume replacement.'},
  {t:'To increase gastric acid production to help digest clotted blood',c:false,why:'This is inaccurate; PPIs work by reducing, not increasing, gastric acid production.'},
 ],
 rationale:'PPIs are used in GI bleeding management to reduce gastric acid production, which supports mucosal healing and helps stabilize clot formation at the bleeding site, though they do not replace other necessary interventions like endoscopy or transfusion.',
 tip:'NCLEX tip: PPIs in acute GI bleed management support healing and clot stability — they are an adjunct, not a substitute for endoscopic or transfusion therapy when indicated.'},

{id:'g97',type:'mc',stem:'A client recovering from a GI bleed asks about long-term follow-up. Which teaching point is most appropriate?',
 options:[
  {t:'Keep all follow-up appointments and watch for signs of re-bleeding',c:true,why:''},
  {t:'No follow-up is needed once symptoms initially resolve',c:false,why:'Ongoing follow-up is important to monitor for recurrence and manage the underlying cause, not something to skip once symptoms first improve.'},
  {t:'Resume NSAID use freely as soon as symptoms improve',c:false,why:'NSAIDs should be avoided going forward, given their association with GI bleeding risk, not resumed freely.'},
  {t:'Avoid all forms of physical activity permanently',c:false,why:'While stress management and a healthy weight are encouraged, permanent avoidance of all physical activity is not an appropriate or necessary restriction.'},
 ],
 rationale:'Clients recovering from a GI bleed should keep follow-up appointments, watch for signs of re-bleeding, avoid NSAIDs/alcohol/smoking, and manage stress and weight as part of comprehensive follow-up care.',
 tip:'NCLEX tip: GI bleed follow-up teaching pairs monitoring for recurrence with removing the original risk factors (NSAIDs, alcohol, smoking).'},

{id:'g98',type:'mc',stem:'A client asks whether cholesterol-lowering diet changes are relevant to preventing pancreatitis. Which response reflects an accurate connection from the course material?',
 options:[
  {t:'"Hyperlipidemia is a recognized risk factor for acute pancreatitis, so managing your cholesterol and triglycerides may help reduce your risk."',c:true,why:''},
  {t:'"Cholesterol and triglyceride levels have no relationship to pancreatitis risk."',c:false,why:'This is inaccurate; hyperlipidemia is specifically listed as a recognized risk factor for acute pancreatitis.'},
  {t:'"Only low cholesterol levels increase pancreatitis risk."',c:false,why:'It is elevated lipid levels (hyperlipidemia), not low cholesterol, that are associated with increased pancreatitis risk.'},
  {t:'"Diet has no impact on pancreatitis risk in any way."',c:false,why:'Diet-related factors like hyperlipidemia are specifically recognized as contributing to pancreatitis risk, making this statement inaccurate.'},
 ],
 rationale:'Hyperlipidemia is a recognized risk factor for acute pancreatitis, alongside gallstones, alcohol use, and other causes, so managing cholesterol and triglyceride levels can be a relevant part of risk reduction.',
 tip:'NCLEX tip: add hyperlipidemia to your mental list of acute pancreatitis risk factors alongside gallstones and alcohol use.'},

{id:'g99',type:'mc',stem:'Which statement about acute idiopathic pancreatitis is accurate?',
 options:[
  {t:'It accounts for roughly 10% of pancreatitis cases and may be related to occult microlithiasis',c:true,why:''},
  {t:'It accounts for the majority of all pancreatitis cases',c:false,why:'Idiopathic pancreatitis is a minority cause, roughly 10% of cases, while gallstones and alcohol use account for the large majority.'},
  {t:'It has a clearly identified single cause in every case',c:false,why:'By definition, "idiopathic" means the cause is not clearly identified, though it may be related to occult microlithiasis in some cases.'},
  {t:'It is unrelated to any known risk factor',c:false,why:'While the specific cause is unclear, idiopathic pancreatitis is still thought to possibly relate to occult microlithiasis, so it is not entirely disconnected from known risk factors.'},
 ],
 rationale:'Acute idiopathic pancreatitis accounts for roughly 10% of cases and may possibly be related to occult microlithiasis, distinguishing it from the majority of cases caused by gallstones or alcohol use.',
 tip:'NCLEX tip: remember the rough proportions of pancreatitis causes — about 80% gallstones/alcohol combined, about 10% idiopathic, with the remainder from other causes.'},

{id:'g100',type:'fill',stem:'The medication class that includes calcium acetate (PhosLo) and sevelamer, used to lower serum phosphorus by binding it in the GI tract, is known as a phosphate _____.',
 answers:['binder','binders','phosphate binder'],
 rationale:'Phosphate binders, such as calcium acetate (PhosLo) and sevelamer (Renvela), work by binding dietary phosphorus in the GI tract, reducing its absorption and helping manage hyperphosphatemia.',
 tip:'NCLEX tip: know at least two named phosphate binders (PhosLo, Renvela/sevelamer) along with their "take with meals" administration instruction.'}
]};
const MOD10 = {
  key:'hepatic', title:'Module 10', subtitle:'Hepatobiliary Disorders',
  questions: [
{id:'h1',type:'mc',stem:'A client with cholecystitis reports pain in the right upper quadrant that radiates to the right shoulder, along with nausea. What is the underlying cause of this condition?',
 options:[
  {t:'Inflammation of the gallbladder, often associated with gallstone obstruction',c:true,why:''},
  {t:'Inflammation of the pancreas from enzyme autodigestion',c:false,why:'This describes pancreatitis, a different condition, which typically presents with epigastric pain radiating to the back rather than RUQ pain radiating to the shoulder.'},
  {t:'Inflammation of the appendix from luminal obstruction',c:false,why:'Appendicitis presents with periumbilical pain migrating to the right lower quadrant, not RUQ pain radiating to the shoulder.'},
  {t:'Inflammation of the esophagus from acid reflux',c:false,why:'Esophagitis from GERD presents with heartburn and regurgitation, not RUQ pain radiating to the shoulder.'},
 ],
 rationale:'Cholecystitis is inflammation of the gallbladder, most commonly associated with obstruction from gallstones (calculous cholecystitis), producing RUQ pain that can radiate to the midsternal area or right shoulder.',
 tip:'NCLEX tip: RUQ pain radiating to the right shoulder is a classic, testable description of gallbladder disease — commit this referred pain pattern to memory.'},

{id:'h2',type:'mc',stem:'Which client is at greatest risk for developing cholelithiasis based on known risk factors?',
 options:[
  {t:'A middle-aged woman who has experienced frequent weight fluctuations and uses estrogen therapy',c:true,why:''},
  {t:'A young adult male with no chronic health conditions and stable weight',c:false,why:'This profile does not include the recognized risk factors (female sex, weight fluctuation, estrogen therapy, obesity) associated with gallstone formation.'},
  {t:'An older adult male with well-controlled hypertension only',c:false,why:'Hypertension alone, without other risk factors like obesity or estrogen exposure, is not a primary recognized risk factor for cholelithiasis.'},
  {t:'A client who exercises daily and maintains a stable healthy weight',c:false,why:'Stable weight and regular exercise are protective rather than risk-increasing factors for gallstone formation.'},
 ],
 rationale:'Cholelithiasis is two to three times more common in women than men, and risk factors include obesity, frequent weight fluctuations, estrogen therapy, diabetes, and cystic fibrosis.',
 tip:'NCLEX tip: remember the classic (though outdated-sounding) risk profile for gallstones — female sex, weight fluctuation, and estrogen exposure remain high-yield testable risk factors.'},

{id:'h3',type:'mc',stem:'A client with gallstones reports pale, clay-colored stools and dark urine. What is the best explanation for these findings?',
 options:[
  {t:'Obstructed bile flow prevents bilirubin from reaching the intestine, while excess bilirubin is excreted in the urine',c:true,why:''},
  {t:'Excess dietary fat is being malabsorbed and excreted directly in the stool',c:false,why:'While fat malabsorption can occur with bile flow problems, it does not directly explain the specific pale stool and dark urine color changes described, which relate to bilirubin handling.'},
  {t:'The client has a normal variant of stool color unrelated to gallbladder disease',c:false,why:'Pale, clay-colored stool paired with dark urine is not a normal variant; it is a recognized sign of obstructive biliary disease.'},
  {t:'Increased red blood cell breakdown is overwhelming the liver\'s ability to process bilirubin',c:false,why:'This describes prehepatic (hemolytic) jaundice, not the obstructive process caused by gallstones blocking bile flow.'},
 ],
 rationale:'When gallstones obstruct bile flow, bilirubin cannot reach the GI tract to give stool its normal brown color, resulting in pale/clay-colored stools, while excess bilirubin is instead excreted in the urine, darkening it.',
 tip:'NCLEX tip: pale/clay stool plus dark urine is the classic pairing for obstructive (post-hepatic) jaundice — pair this with recognizing gallstones or bile duct obstruction as the cause.'},

{id:'h4',type:'mc',stem:'A client is recovering from a laparoscopic cholecystectomy. Which postoperative nursing action is appropriate?',
 options:[
  {t:'Position the client flat and supine to reduce strain on the incision',c:false,why:'A low Fowler position is generally preferred after this surgery rather than a completely flat supine position, to support comfort and respiratory effort.'},
  {t:'Advance the diet from clear liquids to a soft diet as bowel sounds return',c:true,why:''},
  {t:'Keep the client NPO indefinitely until hospital discharge',c:false,why:'Diet is advanced gradually as bowel sounds return rather than being withheld indefinitely; prolonged unnecessary NPO status is not appropriate.'},
  {t:'Discourage all activity for several weeks after laparoscopic surgery',c:false,why:'Laparoscopic cholecystectomy typically allows for a quicker return to activity, and clients are often discharged the same day with progressive activity, not prolonged inactivity.'},
 ],
 rationale:'Postoperative care after cholecystectomy includes low Fowler positioning, pain relief, monitoring respiratory status, and advancing the diet from clear liquids to a soft diet as bowel sounds return.',
 tip:'NCLEX tip: after most abdominal surgeries, diet advancement is tied to return of bowel sounds, not a fixed time interval — always check for bowel sounds before advancing.'},

{id:'h5',type:'mc',stem:'Which type of viral hepatitis is transmitted exclusively in people who already have hepatitis B?',
 options:[
  {t:'Hepatitis A',c:false,why:'Hepatitis A is transmitted via the fecal-oral route and does not require prior hepatitis B infection.'},
  {t:'Hepatitis C',c:false,why:'Hepatitis C is transmitted through blood exposure and can occur independently of hepatitis B status.'},
  {t:'Hepatitis D',c:true,why:''},
  {t:'Hepatitis E',c:false,why:'Hepatitis E is transmitted via the fecal-oral route, similar to hepatitis A, and does not require coexisting hepatitis B infection.'},
 ],
 rationale:'Hepatitis D can only infect people who are already infected with hepatitis B, since it requires the hepatitis B surface antigen to replicate and cause disease.',
 tip:'NCLEX tip: hepatitis D is the "must have B first" virus — this dependency is a frequently tested, standalone fact.'},

{id:'h6',type:'mc',stem:'A client asks which types of hepatitis can become chronic. Which response is accurate?',
 options:[
  {t:'"Only hepatitis A can become a chronic infection."',c:false,why:'Hepatitis A is acute only and does not progress to chronic disease, making this statement incorrect.'},
  {t:'"Hepatitis B and C can become chronic and may lead to cirrhosis or liver cancer over time."',c:true,why:''},
  {t:'"All types of viral hepatitis eventually become chronic if untreated."',c:false,why:'Hepatitis A and E are self-limiting and do not become chronic, so this generalization is inaccurate.'},
  {t:'"Chronic hepatitis only develops from nonviral causes such as medications."',c:false,why:'While nonviral (drug-induced) hepatitis exists, hepatitis B and C are well-documented viral causes of chronic hepatitis, making this statement inaccurate.'},
 ],
 rationale:'Hepatitis B and C can both progress to chronic infection, cirrhosis, and liver cancer, while hepatitis A and E are acute, self-limiting infections that do not become chronic.',
 tip:'NCLEX tip: sort hepatitis types by route and chronicity together — A and E (fecal-oral, acute only) versus B, C, and D (blood/body fluid, can become chronic).'},

{id:'h7',type:'sata',stem:'The nurse is providing discharge teaching for a client recovering from acute hepatitis A. Which teaching points are appropriate? Select all that apply.',
 options:[
  {t:'Practice thorough hand hygiene, especially after using the bathroom',c:true,why:''},
  {t:'Rest during the acute stage of illness',c:true,why:''},
  {t:'Take prescribed antiviral therapy indefinitely to prevent chronic infection',c:false,why:'Hepatitis A is acute only and does not progress to chronic infection, so there is no indefinite antiviral therapy required for this condition.'},
  {t:'Household contacts may benefit from immunoglobulin for passive immunity',c:true,why:''},
  {t:'Maintain adequate nutritional intake to support recovery',c:true,why:''},
 ],
 rationale:'Hepatitis A teaching emphasizes hand hygiene to prevent fecal-oral transmission, rest and nutritional support during the acute stage, and immunoglobulin for close contacts, since it is a self-limiting acute illness without a chronic antiviral treatment requirement.',
 tip:'NCLEX tip: remember hepatitis A management is entirely supportive — there is no chronic-suppression medication because the disease itself does not become chronic.'},

{id:'h8',type:'mc',stem:'Which laboratory finding confirms a diagnosis of hepatitis B infection?',
 options:[
  {t:'Positive HBsAg',c:true,why:''},
  {t:'Positive anti-HCV',c:false,why:'This marker is used to diagnose chronic hepatitis C infection, not hepatitis B.'},
  {t:'Positive anti-HDV',c:false,why:'This marker is specific to hepatitis D infection, which can only occur alongside hepatitis B, but does not by itself confirm hepatitis B.'},
  {t:'Elevated serum amylase',c:false,why:'Serum amylase is a pancreatic enzyme marker unrelated to hepatitis diagnosis.'},
 ],
 rationale:'A positive hepatitis B surface antigen (HBsAg) is used to confirm active hepatitis B infection, alongside other markers such as anti-HBs to assess immunity.',
 tip:'NCLEX tip: match each hepatitis type to its specific diagnostic marker — HBsAg for B, anti-HCV for C, anti-HDV/HDsAg for D — to avoid mixing them up on exam questions.'},

{id:'h9',type:'mc',stem:'A client with cirrhosis develops ascites. Which pathophysiologic process contributes most directly to fluid accumulation in the peritoneal cavity?',
 options:[
  {t:'Decreased albumin synthesis leading to reduced serum oncotic pressure',c:true,why:''},
  {t:'Increased production of clotting factors by the liver',c:false,why:'Cirrhosis actually decreases clotting factor production, contributing to bleeding risk, not to ascites formation.'},
  {t:'Overproduction of bile salts by the damaged liver',c:false,why:'Overproduction of bile salts is not a recognized mechanism of ascites; the liver in cirrhosis typically has impaired, not increased, bile-related synthetic function.'},
  {t:'Enhanced renal excretion of sodium and water',c:false,why:'Cirrhosis actually causes increased sodium and water retention (due to impaired aldosterone metabolism), not enhanced excretion, which contributes to fluid accumulation rather than preventing it.'},
 ],
 rationale:'In cirrhosis, decreased albumin synthesis lowers serum oncotic pressure, allowing fluid to shift out of the vasculature. Combined with portal hypertension and aldosterone-driven sodium/water retention, this drives fluid accumulation in the peritoneal cavity as ascites.',
 tip:'NCLEX tip: connect three mechanisms for cirrhotic ascites — portal hypertension, low albumin/oncotic pressure, and aldosterone-driven sodium retention — as a trio that reinforces each other.'},

{id:'h10',type:'mc',stem:'A client with refractory ascites undergoes a large-volume paracentesis. Which finding after the procedure requires immediate nursing attention?',
 options:[
  {t:'Mild soreness at the puncture site',c:false,why:'Mild local soreness is an expected, minor finding after paracentesis and does not require urgent intervention.'},
  {t:'Hypotension and tachycardia following removal of several liters of fluid',c:true,why:''},
  {t:'A slight decrease in abdominal girth measurement after the procedure',c:false,why:'A decrease in abdominal girth is an expected and desired outcome of successful paracentesis, not a concerning finding.'},
  {t:'The client reports feeling less short of breath after the procedure',c:false,why:'Improved breathing is an expected positive outcome after removal of ascitic fluid that had been compressing the diaphragm, not a concerning finding.'},
 ],
 rationale:'Removing large volumes of ascitic fluid (5-6 liters) can cause a rapid fluid shift and hypotension with reflex tachycardia; the nurse should monitor vital signs closely during and after the procedure and report significant changes immediately.',
 tip:'NCLEX tip: any large-volume fluid removal procedure (paracentesis, thoracentesis) carries a shared risk of post-procedure hypotension from rapid fluid shifts — monitor vital signs closely afterward.'},

{id:'h11',type:'mc',stem:'A client with cirrhosis and portal hypertension is started on a nonselective beta blocker. What is the primary purpose of this medication in this context?',
 options:[
  {t:'To reduce heart rate and blood pressure for unrelated cardiac protection',c:false,why:'While beta blockers do lower heart rate and blood pressure generally, in this context they are specifically used to reduce portal pressure and prevent variceal bleeding, not for unrelated cardiac reasons.'},
  {t:'To reduce portal venous pressure and help prevent the first episode of variceal bleeding',c:true,why:''},
  {t:'To directly shrink existing esophageal varices',c:false,why:'Beta blockers reduce pressure within the portal system to lower bleeding risk, but they do not directly shrink existing varices.'},
  {t:'To treat hepatic encephalopathy by lowering ammonia levels',c:false,why:'Beta blockers do not lower ammonia levels; lactulose and rifaximin are the medications used specifically to manage hepatic encephalopathy.'},
 ],
 rationale:'Nonselective beta blockers reduce portal venous pressure, which helps prevent the first bleeding episode from esophageal varices in clients with portal hypertension.',
 tip:'NCLEX tip: beta blockers in cirrhosis serve a very specific role — preventing the first variceal bleed by lowering portal pressure — distinguish this from their general cardiac uses.'},

{id:'h12',type:'mc',stem:'A client with esophageal varices develops hematemesis and signs of shock. Which intervention would the nurse anticipate as part of the immediate management?',
 options:[
  {t:'Administration of vasoactive drugs and preparation for emergency endoscopy',c:true,why:''},
  {t:'Immediate discharge home with outpatient follow-up in one week',c:false,why:'Active bleeding from esophageal varices with signs of shock is a medical emergency requiring immediate inpatient intervention, not discharge home.'},
  {t:'Encouraging oral intake of a full liquid diet to settle the stomach',c:false,why:'Oral intake is inappropriate during active variceal hemorrhage; the client requires NPO status and emergency intervention instead.'},
  {t:'Withholding all fluids and medications until the client is fully stable',c:false,why:'Withholding all fluids is inappropriate; the client needs prompt IV fluid resuscitation, vasoactive medications, and preparation for endoscopy, not a delay in all treatment.'},
 ],
 rationale:'Active variceal hemorrhage is a medical emergency; management includes vasoactive drugs to reduce portal pressure and stop bleeding, along with prompt endoscopic evaluation and treatment, with a balloon tamponade tube reserved for refractory cases.',
 tip:'NCLEX tip: bleeding esophageal varices are a top-tier NCLEX emergency — remember the sequence of vasoactive drugs first, then endoscopy, with balloon tamponade as a backup measure.'},

{id:'h13',type:'sata',stem:'The nurse is caring for a client with decompensated cirrhosis. Which findings would the nurse expect to assess? Select all that apply.',
 options:[
  {t:'Ascites',c:true,why:''},
  {t:'Jaundice',c:true,why:''},
  {t:'Palmar erythema only, with no other systemic findings',c:false,why:'Palmar erythema alone is more characteristic of compensated cirrhosis; decompensated disease involves more advanced findings such as ascites, jaundice, and muscle wasting.'},
  {t:'Muscle wasting',c:true,why:''},
  {t:'Continuous fever',c:true,why:''},
 ],
 rationale:'Decompensated cirrhosis is associated with more advanced findings such as ascites, jaundice, continuous fever, muscle wasting, clubbing of fingers, and purpura, distinguishing it from the milder findings of compensated cirrhosis.',
 tip:'NCLEX tip: separate cirrhosis findings into compensated (milder, e.g., palmar erythema, splenomegaly) versus decompensated (more severe, e.g., ascites, jaundice, muscle wasting) to organize your review.'},

{id:'h14',type:'mc',stem:'A transjugular intrahepatic portosystemic shunt (TIPS) procedure is planned for a client with refractory ascites. Which complication should the nurse monitor for after the procedure?',
 options:[
  {t:'Hepatic encephalopathy',c:true,why:''},
  {t:'Immediate resolution of all liver disease',c:false,why:'TIPS relieves portal hypertension and its complications but does not cure the underlying liver disease itself.'},
  {t:'Permanent cure of ascites without any further management needed',c:false,why:'TIPS reduces the recurrence of fluid accumulation and may serve as a bridge to transplant, but it is not described as a permanent cure requiring no further management.'},
  {t:'Improved hepatic synthetic function immediately after shunt placement',c:false,why:'TIPS addresses portal pressure and its downstream effects, not the liver\'s underlying synthetic function, which does not improve simply because the shunt has been placed.'},
 ],
 rationale:'By shunting portal blood directly into the hepatic vein, TIPS bypasses the liver\'s detoxification process, increasing the risk of hepatic encephalopathy, which the nurse must monitor for closely after the procedure.',
 tip:'NCLEX tip: any procedure that increases portosystemic shunting (TIPS, surgical shunts) raises encephalopathy risk because it lets toxins bypass the liver — always link "shunt" with "watch for encephalopathy."'},

{id:'h15',type:'mc',stem:'A client with cirrhosis develops asterixis and fetor hepaticus. What is the underlying cause of these findings?',
 options:[
  {t:'Accumulation of ammonia and other toxic metabolites due to impaired liver detoxification and portosystemic shunting',c:true,why:''},
  {t:'Excessive production of clotting factors by the diseased liver',c:false,why:'Cirrhosis decreases clotting factor production; this option describes an increase, which is inaccurate and unrelated to the findings described.'},
  {t:'A primary lung infection unrelated to liver function',c:false,why:'Fetor hepaticus and asterixis are directly related to hepatic dysfunction and toxin accumulation, not to a primary respiratory infection.'},
  {t:'Excess bile salt deposition in the skin',c:false,why:'Bile salt deposition in the skin is associated with pruritus in liver disease, not with asterixis (flapping tremor) or fetor hepaticus (musty breath odor), which relate to ammonia accumulation.'},
 ],
 rationale:'Hepatic encephalopathy results from ammonia and other toxic metabolite accumulation due to hepatic insufficiency and portosystemic shunting, producing findings such as asterixis (flapping tremor) and fetor hepaticus (musty, sweet breath odor).',
 tip:'NCLEX tip: asterixis and fetor hepaticus are two of the most classic, exam-favorite physical findings of hepatic encephalopathy — know both by name and mechanism.'},

{id:'h16',type:'mc',stem:'A client with hepatic encephalopathy is started on lactulose. What is the expected therapeutic goal of this medication?',
 options:[
  {t:'Three to five soft or loose bowel movements per day with improved mental status',c:true,why:''},
  {t:'Complete cessation of all bowel movements to rest the GI tract',c:false,why:'Stopping bowel movements entirely would be counterproductive, since lactulose works specifically by promoting ammonia excretion through increased stool output.'},
  {t:'A single formed bowel movement every other day',c:false,why:'This bowel pattern would not achieve the therapeutic goal of adequately clearing ammonia through the stool; more frequent soft stools are the target.'},
  {t:'Increased serum ammonia levels to stimulate liver regeneration',c:false,why:'The goal of lactulose is to decrease, not increase, serum ammonia levels, and it does not work by stimulating liver regeneration.'},
 ],
 rationale:'Lactulose reduces serum ammonia by trapping it in the colon and promoting its excretion; the therapeutic goal is typically three to five soft or loose bowel movements per day along with a clearing mental status.',
 tip:'NCLEX tip: memorize the specific therapeutic target for lactulose — "3 to 5 soft stools per day" — as this exact number is a common exam detail.'},

{id:'h17',type:'mc',stem:'Which of the following is a recognized trigger for hepatic encephalopathy?',
 options:[
  {t:'Constipation and GI bleeding',c:true,why:''},
  {t:'Regular use of a stool softener as prescribed',c:false,why:'A prescribed stool softener used appropriately is not a recognized trigger; in fact, preventing constipation helps reduce encephalopathy risk.'},
  {t:'Adequate hydration with normal renal function',c:false,why:'Adequate hydration and normal kidney function are protective, not triggering, factors for hepatic encephalopathy; dehydration and kidney problems are the recognized triggers instead.'},
  {t:'Routine daily ambulation',c:false,why:'Regular ambulation is a healthy behavior and is not associated with triggering hepatic encephalopathy.'},
 ],
 rationale:'Constipation and GI bleeding are well-recognized triggers of hepatic encephalopathy because they increase the ammonia and nitrogenous waste load presented to an already impaired liver.',
 tip:'NCLEX tip: build a mental list of HE triggers — constipation, dehydration, GI bleeding, infection, sedative use, and electrolyte imbalance — since trigger-identification questions are common.'},

{id:'h18',type:'mc',stem:'A client with cirrhosis is being assessed for hepatic encephalopathy using the West Haven grading system. The client is confused, cannot perform basic mental tasks, appears extremely anxious, but can still be aroused. Which grade best matches this presentation?',
 options:[
  {t:'Grade 1',c:false,why:'Grade 1 is much milder, involving only a short attention span and mild mood changes such as irritability, not marked confusion and inability to perform mental tasks.'},
  {t:'Grade 2',c:false,why:'Grade 2 involves forgetfulness and slurred speech but the client is not described as extremely anxious and unable to perform basic mental tasks to this degree.'},
  {t:'Grade 3',c:true,why:''},
  {t:'Grade 4',c:false,why:'Grade 4 represents coma, meaning the client is unconscious and cannot be aroused, which does not match this client who can still be woken.'},
 ],
 rationale:'West Haven Grade 3 (severe HE) is characterized by confusion, inability to perform basic mental tasks, and extreme anxiety, while the client can still be aroused, distinguishing it from Grade 4 coma.',
 tip:'NCLEX tip: the key differentiator between Grade 3 and Grade 4 HE is arousability — Grade 3 clients can still be woken, Grade 4 clients cannot.'},

{id:'h19',type:'sata',stem:'The nurse is caring for a client with hepatic encephalopathy. Which nursing interventions are appropriate? Select all that apply.',
 options:[
  {t:'Perform frequent neurologic checks and monitor level of consciousness',c:true,why:''},
  {t:'Administer lactulose and monitor the number and consistency of stools',c:true,why:''},
  {t:'Encourage a high-protein diet to promote liver healing',c:false,why:'Protein intake is typically restricted, not increased, in significant hepatic encephalopathy, since protein breakdown contributes to ammonia production.'},
  {t:'Monitor serial ammonia levels and electrolytes',c:true,why:''},
  {t:'Administer sedatives liberally to manage the client\'s agitation',c:false,why:'Sedatives, analgesics, and tranquilizers are generally avoided or used very cautiously in hepatic encephalopathy because they can worsen mental status and precipitate further decline.'},
 ],
 rationale:'Nursing care for hepatic encephalopathy includes frequent neuro checks, administering and monitoring the response to lactulose, tracking ammonia and electrolyte levels, and protein restriction, while avoiding sedating medications that can worsen mental status.',
 tip:'NCLEX tip: "avoid sedatives" is a key safety point in hepatic encephalopathy — a request for a sleep aid or anxiolytic in this population should raise a red flag.'},

{id:'h20',type:'fill',stem:'The grading system used to classify hepatic encephalopathy severity from Grade 0 (minimal) to Grade 4 (coma) is called the _____ grading system.',
 answers:['west haven','west haven grading system'],
 rationale:'The West Haven grading system classifies hepatic encephalopathy severity from Grade 0 (minimal HE) through Grade 4 (coma), providing a standardized way to describe clinical severity.',
 tip:'NCLEX tip: don\'t confuse the West Haven grading system (0-4) with the older four-stage clinical/EEG staging table — both describe HE severity but use different numbering and reference points.'},

{id:'h21',type:'mc',stem:'A client with a new diagnosis of chronic hepatitis C asks about long-term risks. Which response is most accurate?',
 options:[
  {t:'"Hepatitis C is a leading cause of liver cancer and the most common reason for liver transplant."',c:true,why:''},
  {t:'"Hepatitis C never leads to any long-term liver complications."',c:false,why:'This is inaccurate; hepatitis C is a well-documented cause of chronic liver disease, cirrhosis, and liver cancer over time.'},
  {t:'"Hepatitis C only affects the liver temporarily and always resolves on its own."',c:false,why:'While some hepatitis C infections do clear spontaneously, it is well known for its ability to become chronic and progress to serious complications, so this generalization is misleading.'},
  {t:'"Hepatitis C is spread only through respiratory droplets."',c:false,why:'Hepatitis C is bloodborne, spread through routes such as IV drug use, sexual contact, and pre-1992 blood transfusions, not through respiratory droplets.'},
 ],
 rationale:'Hepatitis C is the most common bloodborne infection, responsible for about one-third of liver cancer cases, and is the leading indication for liver transplant.',
 tip:'NCLEX tip: remember hepatitis C\'s three big associated facts together — most common bloodborne infection, major cause of liver cancer, and leading cause for liver transplant.'},

{id:'h22',type:'mc',stem:'Which of the following best describes the pathway of blood flow through the liver, starting with nutrient-rich but low-oxygen blood from the digestive organs?',
 options:[
  {t:'Hepatic artery → sinusoids → portal vein → central vein → hepatic veins',c:false,why:'This sequence incorrectly starts with the hepatic artery, which carries oxygenated blood, rather than beginning with the portal vein, which carries nutrient-rich blood from the digestive organs.'},
  {t:'Portal vein → sinusoids → central vein → hepatic veins',c:true,why:''},
  {t:'Central vein → sinusoids → portal vein → hepatic artery',c:false,why:'This sequence reverses the correct direction of blood flow through the liver lobule.'},
  {t:'Hepatic veins → sinusoids → portal vein → central vein',c:false,why:'This sequence also reverses the correct flow, since hepatic veins are the final step where blood exits the liver, not the starting point.'},
 ],
 rationale:'Nutrient-rich, low-oxygen blood from the digestive organs enters the liver through the portal vein, passes through the sinusoids where it contacts liver cells, collects in the central vein of each lobule, and exits through the hepatic veins into the inferior vena cava.',
 tip:'NCLEX tip: memorize the hepatic blood flow order as a simple chain — portal vein in, sinusoids process, central vein collects, hepatic veins out — and add the hepatic artery as the separate oxygen-supplying vessel joining at the sinusoids.'},

{id:'h23',type:'mc',stem:'A client with cirrhosis has a prolonged prothrombin time and easy bruising. Which liver function best explains this finding?',
 options:[
  {t:'Impaired synthesis of clotting factors by the diseased liver',c:true,why:''},
  {t:'Impaired bile production affecting fat digestion only',c:false,why:'While impaired bile production affects fat and fat-soluble vitamin absorption, it is the liver\'s reduced synthesis of clotting factors that most directly explains a prolonged PT and bruising.'},
  {t:'Impaired hormone regulation causing excess insulin production',c:false,why:'Hormone regulation problems in liver disease are not the direct cause of a prolonged prothrombin time or easy bruising.'},
  {t:'Impaired cholesterol regulation leading to excess triglycerides',c:false,why:'Cholesterol/lipid regulation changes in liver disease do not explain bleeding tendencies or a prolonged PT.'},
 ],
 rationale:'The liver normally synthesizes clotting factors as part of its protein synthesis function; in cirrhosis this ability is impaired, leading to a prolonged prothrombin time and increased bleeding/bruising tendency.',
 tip:'NCLEX tip: tie every liver-disease lab abnormality back to one of the liver\'s core functions — clotting factor and albumin synthesis, detoxification, bile production, and vitamin storage — to reason through unfamiliar questions.'},

{id:'h24',type:'mc',stem:'Which client statement about fat-soluble vitamins would prompt the nurse to further assess for chronic biliary obstruction?',
 options:[
  {t:'"I\'ve noticed my vision seems worse at night and I bruise more easily than before."',c:true,why:''},
  {t:'"I have been having occasional mild heartburn after spicy meals."',c:false,why:'Occasional heartburn after spicy food is a common, nonspecific symptom and does not specifically suggest fat-soluble vitamin deficiency from biliary obstruction.'},
  {t:'"My blood pressure has been running a little high at my last two appointments."',c:false,why:'Elevated blood pressure is not a typical sign of fat-soluble vitamin deficiency associated with impaired bile flow.'},
  {t:'"I feel like my hearing has been a little muffled lately."',c:false,why:'Hearing changes are not a recognized sign of fat-soluble vitamin deficiency related to biliary obstruction.'},
 ],
 rationale:'Chronic biliary obstruction impairs fat digestion and absorption, which can cause deficiencies in fat-soluble vitamins A, D, E, and K — vitamin A deficiency can cause night vision changes, and vitamin K deficiency can cause increased bruising from impaired clotting.',
 tip:'NCLEX tip: remember the fat-soluble vitamins as "A, D, E, K" and connect each to a clinical clue — A to vision, D to bone health, E to neuromuscular function, K to bleeding/bruising.'},

{id:'h25',type:'mc',stem:'A client is scheduled for a liver transplant. Which preoperative nursing priority is most appropriate?',
 options:[
  {t:'Providing psychological support and education to help the client and family prepare for surgery',c:true,why:''},
  {t:'Discontinuing all current medications without further discussion',c:false,why:'Medications should be reviewed individually with the transplant team rather than universally discontinued without discussion, since some may need to be continued or carefully managed.'},
  {t:'Withholding all information about the surgery to avoid causing anxiety',c:false,why:'Withholding information is not appropriate; providing clear education and support actually helps reduce anxiety and better prepares the client and family for the procedure.'},
  {t:'Focusing exclusively on the physical aspects of surgical preparation with no attention to emotional needs',c:false,why:'Emotional and psychosocial preparation is an important part of preoperative care for major surgery like liver transplant, not something to be excluded.'},
 ],
 rationale:'Preoperative nursing care for liver transplant candidates emphasizes support, education, and encouragement to help the client and family prepare psychologically for the surgery, in addition to physical preparation.',
 tip:'NCLEX tip: for major, life-altering surgeries like transplant, expect NCLEX to test psychosocial support alongside physical care — don\'t overlook the emotional preparation component.'},

{id:'h26',type:'mc',stem:'A client is 3 weeks post-liver transplant and reports fever and increasing fatigue. What should the nurse consider as a priority concern?',
 options:[
  {t:'Possible infection or rejection requiring prompt evaluation',c:true,why:''},
  {t:'A normal, expected part of recovery that requires no further action',c:false,why:'New fever and worsening fatigue after transplant are not expected, benign findings; they require prompt evaluation for infection or rejection.'},
  {t:'Dietary noncompliance as the most likely explanation',c:false,why:'While diet is part of long-term management, fever and fatigue point more urgently toward infection or rejection, which must be ruled out first.'},
  {t:'A medication side effect that should simply be monitored without further workup',c:false,why:'Given the transplant status, these symptoms require active evaluation rather than passive monitoring, since infection and rejection are time-sensitive and serious complications.'},
 ],
 rationale:'Post-transplant clients are immunosuppressed and at risk for infection and organ rejection; new fever and fatigue require prompt evaluation and close monitoring rather than being dismissed as routine recovery.',
 tip:'NCLEX tip: in any post-transplant scenario, new fever should immediately raise concern for infection or rejection given the client\'s immunosuppressed state.'},

{id:'h27',type:'sata',stem:'The nurse is teaching a liver transplant recipient about long-term self-care. Which statements indicate correct understanding? Select all that apply.',
 options:[
  {t:'"I need to take my immunosuppressive medications exactly as prescribed, without skipping doses."',c:true,why:''},
  {t:'"I should keep all my follow-up lab and clinic appointments with the transplant team."',c:true,why:''},
  {t:'"I can stop my anti-rejection medications once I start feeling completely healthy."',c:false,why:'Immunosuppressive therapy must be continued long-term as prescribed, since stopping it, even when feeling well, significantly increases the risk of organ rejection.'},
  {t:'"I should report any new signs of infection or unusual symptoms to the transplant team promptly."',c:true,why:''},
  {t:'"Since I have a new liver, I no longer need to avoid alcohol."',c:false,why:'Alcohol avoidance remains an important part of long-term care after liver transplant to protect the new organ, regardless of the reason for the original transplant.'},
 ],
 rationale:'Long-term liver transplant self-care includes strict adherence to immunosuppressive therapy, keeping follow-up appointments, promptly reporting signs of infection or complications, and continuing to avoid alcohol to protect the transplanted liver.',
 tip:'NCLEX tip: "stopping medication because I feel better" is a common wrong-understanding distractor across transplant and chronic disease teaching questions — always flag it.'},

{id:'h28',type:'mc',stem:'A client with NAFLD (nonalcoholic fatty liver disease) asks what puts people at risk for this condition. Which response is most accurate?',
 options:[
  {t:'"NAFLD is strongly associated with obesity, diabetes, and a sedentary lifestyle."',c:true,why:''},
  {t:'"NAFLD only occurs in people who drink alcohol heavily."',c:false,why:'This is inaccurate — by definition, NAFLD occurs in the absence of significant alcohol use, distinguishing it from alcoholic liver disease.'},
  {t:'"NAFLD is caused exclusively by viral hepatitis infection."',c:false,why:'NAFLD is not caused by viral hepatitis; it is related to metabolic risk factors such as obesity and insulin resistance rather than viral infection.'},
  {t:'"NAFLD has no known risk factors and occurs randomly."',c:false,why:'NAFLD has well-established risk factors, including obesity, diabetes, and metabolic syndrome, so this statement is inaccurate.'},
 ],
 rationale:'NAFLD and its more severe form, NASH, are strongly associated with obesity, diabetes mellitus, and a sedentary lifestyle, reflecting excess fat deposition in the liver unrelated to alcohol use.',
 tip:'NCLEX tip: NAFLD is defined by what it is not — significant alcohol use — while sharing many risk factors with metabolic syndrome (obesity, diabetes, sedentary lifestyle).'},

{id:'h29',type:'hotspot',stem:'The nurse is reviewing a client\'s cirrhosis history and current status. Click the finding that indicates the client has progressed to decompensated, rather than compensated, cirrhosis.',
 passage:[
  {t:'The client has intermittent mild fevers and a firm, enlarged liver on palpation.',c:false},
  {t:'The client has new-onset ascites, jaundice, and muscle wasting.',c:true},
  {t:'The client has palmar erythema and vague morning indigestion.',c:false},
  {t:'The client has splenomegaly noted on a recent ultrasound.',c:false},
 ],
 rationale:'Ascites, jaundice, and muscle wasting are hallmark findings of decompensated cirrhosis, reflecting more advanced liver failure, whereas findings like palmar erythema, splenomegaly, mild fever, and morning indigestion are more typical of compensated cirrhosis.',
 tip:'NCLEX tip: build a simple mental checklist — compensated cirrhosis is "quieter" (mild fever, palmar erythema, splenomegaly), while decompensated cirrhosis brings clear systemic decline (ascites, jaundice, muscle wasting, purpura).'},

{id:'h30',type:'mc',stem:'A client with chronic liver disease has hepatic encephalopathy triggered by a recent GI bleed. Which additional nursing action is most important given this specific trigger?',
 options:[
  {t:'Monitor for further bleeding and anticipate correction of blood loss along with ammonia-lowering therapy',c:true,why:''},
  {t:'Encourage a high-protein diet immediately to replace lost blood volume',c:false,why:'A high-protein diet would increase the ammonia load at a time when the client\'s liver is already struggling to clear it, worsening rather than helping the encephalopathy.'},
  {t:'Withhold lactulose until the GI bleed has completely resolved',c:false,why:'Lactulose should not be withheld; it remains an important treatment to reduce ammonia levels even while the GI bleed is being managed, since blood in the gut is itself a major ammonia source.'},
  {t:'Focus solely on neurologic assessment without addressing the GI bleeding',c:false,why:'Both issues must be addressed together — the GI bleed is the trigger for the encephalopathy, so ignoring it would allow the underlying cause to persist and worsen mental status.'},
 ],
 rationale:'Blood in the GI tract is a significant source of nitrogenous waste that worsens hepatic encephalopathy; the nurse should monitor for and help correct ongoing bleeding while continuing ammonia-lowering therapy such as lactulose, since both problems are directly linked.',
 tip:'NCLEX tip: when a stem gives you a specific HE trigger (GI bleed, constipation, infection), always connect your nursing priorities back to treating that root trigger, not just the encephalopathy symptoms alone.'},
{id:'h31',type:'mc',stem:'A client asks why acalculous cholecystitis can occur without gallstones. What is the best explanation?',
 options:[
  {t:'Gallbladder inflammation can occur from causes other than stone obstruction, such as critical illness or reduced blood flow',c:true,why:''},
  {t:'Acalculous cholecystitis only occurs in clients who have already had their gallbladder removed',c:false,why:'This is inaccurate; acalculous cholecystitis occurs in a gallbladder that is still present but inflamed without stone obstruction.'},
  {t:'Acalculous cholecystitis is simply a mild variant of calculous cholecystitis with identical causes',c:false,why:'Acalculous cholecystitis has a distinct mechanism (inflammation without stones) rather than being identical in cause to the more common calculous form.'},
  {t:'Acalculous cholecystitis cannot cause any of the classic RUQ pain symptoms',c:false,why:'Acalculous cholecystitis can still present with classic RUQ pain and related symptoms, similar to calculous cholecystitis.'},
 ],
 rationale:'Acalculous cholecystitis refers to gallbladder inflammation without stone obstruction, which can occur in critically ill clients or those with reduced gallbladder blood flow, distinguishing it from the more common calculous (stone-related) form.',
 tip:'NCLEX tip: remember that cholecystitis can occur with (calculous, more common) or without (acalculous) gallstones — both present similarly but differ in underlying cause.'},

{id:'h32',type:'mc',stem:'Approximately what percentage of gallstones are cholesterol-based, according to the course material?',
 options:[
  {t:'About 75%',c:true,why:''},
  {t:'About 10%',c:false,why:'This understates the proportion of cholesterol-based gallstones described in the course material.'},
  {t:'About 25%',c:false,why:'This also understates the proportion; cholesterol-based stones make up a much larger majority.'},
  {t:'Nearly 100%',c:false,why:'This overstates the proportion; while cholesterol stones are the majority, not all gallstones are cholesterol-based.'},
 ],
 rationale:'Approximately 75% of gallstones are cholesterol-based, making cholesterol composition the most common type of gallstone described in the course material.',
 tip:'NCLEX tip: "about 75% cholesterol-based" is a specific, testable statistic for gallstone composition.'},

{id:'h33',type:'mc',stem:'A client with cholelithiasis reports epigastric distress that follows a high-fat meal. What is the best explanation for this pattern?',
 options:[
  {t:'Fatty meals stimulate gallbladder contraction, which can trigger biliary colic in the presence of stones',c:true,why:''},
  {t:'High-fat meals directly dissolve gallstones, causing temporary discomfort',c:false,why:'High-fat meals do not dissolve gallstones; rather, they stimulate gallbladder contraction, which can cause pain when stones are present.'},
  {t:'This pattern is unrelated to gallbladder function and reflects a separate GI condition',c:false,why:'This symptom pattern is a classic, well-documented presentation of gallstone-related biliary colic tied to fatty food intake.'},
  {t:'Fatty meals reduce bile production, which prevents any gallbladder-related symptoms',c:false,why:'Fatty meals actually stimulate, rather than reduce, gallbladder contraction and bile release, which is what can provoke symptoms in cholelithiasis.'},
 ],
 rationale:'High-fat meals stimulate gallbladder contraction (via cholecystokinin release), which can trigger biliary colic or epigastric distress when gallstones are present, explaining the classic post-fatty-meal symptom pattern.',
 tip:'NCLEX tip: "symptoms after a fatty meal" is one of the most reliable, testable clues pointing toward gallbladder disease.'},

{id:'h34',type:'mc',stem:'Which diagnostic imaging study can detect biliary tract obstruction in a client with suspected cholelithiasis?',
 options:[
  {t:'Magnetic resonance cholangiopancreatography (MRCP)',c:true,why:''},
  {t:'Plain chest X-ray',c:false,why:'A plain chest X-ray is not the imaging modality used to detect biliary tract obstruction related to gallstones.'},
  {t:'Electrocardiogram (ECG)',c:false,why:'An ECG assesses cardiac electrical activity and has no role in detecting biliary tract obstruction.'},
  {t:'Peak flow measurement',c:false,why:'Peak flow measurement assesses respiratory function and is unrelated to evaluating biliary tract obstruction.'},
 ],
 rationale:'Magnetic resonance cholangiopancreatography (MRCP) can detect biliary tract obstruction in clients with suspected cholelithiasis, providing detailed imaging of the bile ducts.',
 tip:'NCLEX tip: MRCP is the specific imaging test to associate with biliary tract obstruction detection in gallstone disease.'},

{id:'h35',type:'mc',stem:'Which statement about medication therapy to dissolve gallstones is accurate?',
 options:[
  {t:'Medications to dissolve stones over months are rarely effective and have a high recurrence rate',c:true,why:''},
  {t:'Medications are the first-line, most effective treatment for all gallstones',c:false,why:'Medication therapy to dissolve stones is described as rarely effective with high recurrence, not as the most effective first-line treatment.'},
  {t:'Medications permanently prevent any future gallstone formation once stones are dissolved',c:false,why:'Even when medication therapy does dissolve stones, recurrence is high, so this option overstates the durability of the effect.'},
  {t:'Medication therapy works within days for nearly all clients',c:false,why:'Medication therapy to dissolve gallstones, when used, generally takes months, not days, and is rarely effective overall.'},
 ],
 rationale:'Medications used to dissolve gallstones over months are rarely effective, and recurrence is high, which is why surgical management (laparoscopic cholecystectomy) is generally preferred for symptomatic cholelithiasis.',
 tip:'NCLEX tip: don\'t assume dissolving medications are a reliable primary treatment for gallstones — surgery remains the definitive management for symptomatic cases.'},

{id:'h36',type:'mc',stem:'A client asks about lithotripsy as a treatment for gallstones. What is the best explanation?',
 options:[
  {t:'It is a temporary solution that is rarely used for gallstone management',c:true,why:''},
  {t:'It is the definitive, first-line surgical treatment for all gallstones',c:false,why:'Lithotripsy is described as a temporary solution rarely used, not as the definitive, first-line treatment; laparoscopic cholecystectomy fills that role.'},
  {t:'It permanently removes the gallbladder without any surgery',c:false,why:'Lithotripsy does not remove the gallbladder; it is a method aimed at breaking up stones, and it is rarely used as a lasting solution.'},
  {t:'It is used only for kidney stones and never for gallstones',c:false,why:'Lithotripsy is mentioned specifically in the context of gallstone management options, even though it is rarely used and considered temporary.'},
 ],
 rationale:'Lithotripsy is described as a temporary solution for gallstones that is rarely used, in contrast to laparoscopic cholecystectomy, which is the more definitive surgical management once symptoms subside.',
 tip:'NCLEX tip: rank gallstone management options by durability — lithotripsy (temporary, rare) versus laparoscopic cholecystectomy (definitive, common).'},

{id:'h37',type:'mc',stem:'A client recovering from a laparoscopic cholecystectomy asks about diet advancement. What should the nurse explain?',
 options:[
  {t:'The diet advances from clear liquids to a soft diet as bowel sounds return',c:true,why:''},
  {t:'A regular diet should be resumed immediately regardless of bowel sounds',c:false,why:'Diet advancement is tied to the return of bowel sounds and gradual progression, not an immediate resumption of a regular diet.'},
  {t:'The client must remain NPO for the duration of the hospital stay',c:false,why:'Prolonged NPO status for the entire hospital stay is not appropriate once bowel sounds return and the client can tolerate oral intake.'},
  {t:'Only a high-fat diet should be introduced first to stimulate bile flow',c:false,why:'A high-fat diet is not the recommended first step; diet advancement starts with clear liquids progressing to a soft diet.'},
 ],
 rationale:'After cholecystectomy, the diet is advanced from clear liquids to a soft diet as bowel sounds return, following a gradual, individualized progression rather than an immediate jump to a regular or high-fat diet.',
 tip:'NCLEX tip: post-cholecystectomy diet progression follows the same general principle as other abdominal surgeries — advance based on returning bowel function.'},

{id:'h38',type:'sata',stem:'The nurse is providing discharge teaching for a client after a cholecystectomy. Which teaching points are appropriate? Select all that apply.',
 options:[
  {t:'Report any signs of infection at the incision site',c:true,why:''},
  {t:'Gradually resume normal activity as tolerated',c:true,why:''},
  {t:'Coordinate follow-up with home health care if needed',c:true,why:''},
  {t:'Avoid all follow-up appointments since the gallbladder has been removed',c:false,why:'Follow-up appointments remain important after cholecystectomy to monitor recovery, even though the gallbladder itself has been removed.'},
  {t:'Immediately resume heavy lifting the day after surgery',c:false,why:'Heavy lifting should be avoided initially after surgery and gradually resumed as tolerated, not immediately the day after the procedure.'},
 ],
 rationale:'Post-cholecystectomy discharge teaching includes monitoring for infection, gradually resuming activity, and coordinating home health care as needed, while continuing follow-up appointments and avoiding early heavy lifting.',
 tip:'NCLEX tip: post-op discharge teaching generally follows the same pattern across abdominal surgeries — infection monitoring, gradual activity progression, and follow-up care.'},

{id:'h39',type:'mc',stem:'Which client factor listed in the course material increases the risk of developing cholelithiasis?',
 options:[
  {t:'Cystic fibrosis',c:true,why:''},
  {t:'Regular moderate physical activity',c:false,why:'Regular physical activity is a protective health behavior, not a recognized risk factor for gallstone formation.'},
  {t:'Stable body weight over many years',c:false,why:'Stable weight is protective; it is frequent weight fluctuation, not stability, that is associated with increased gallstone risk.'},
  {t:'Younger age, under 20 years old',c:false,why:'Cholelithiasis becomes more prevalent with increasing age, so younger age is not a recognized risk factor.'},
 ],
 rationale:'Cystic fibrosis is a recognized risk factor for cholelithiasis, alongside diabetes mellitus, frequent weight fluctuations, estrogen therapy, obesity, and rapid weight loss.',
 tip:'NCLEX tip: cystic fibrosis as a gallstone risk factor is a less obvious but specifically listed fact worth remembering.'},

{id:'h40',type:'mc',stem:'A client with fat-soluble vitamin deficiency from chronic biliary obstruction asks which vitamins are affected. What is the correct answer?',
 options:[
  {t:'Vitamins A, D, E, and K',c:true,why:''},
