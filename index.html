inked to eating disorders differ somewhat by gender: sexual abuse and physical neglect in men, versus sexual abuse and emotional abuse in women, highlighting how trauma history should be assessed as part of a comprehensive eating disorder risk evaluation.", "tip": "NCLEX tip: Note the gender-specific trauma linkage pattern: men (sexual abuse + physical neglect) vs. women (sexual abuse + emotional abuse) — a subtle but testable distinction.", "id": "m9_92", "module": 9}, {"type": "mc", "stem": "A nurse caring for a hospitalized adolescent with anorexia nervosa overhears a staff member say, 'She just needs to eat a sandwich and get over it — this isn't a real illness like schizophrenia.' What is the nurse's most appropriate next action?", "options": [{"t": "Privately address the insensitivity and inaccuracy of the comment with the staff member", "c": true, "w": ""}, {"t": "Ignore the comment since it was not said directly to the client and caused no harm", "c": false, "w": "Even comments not made directly to the client reflect a harmful bias that can affect the quality of care and unit culture; the nurse should address this rather than ignoring it."}, {"t": "Report the comment to the client immediately so she can defend herself", "c": false, "w": "Involving the client directly in this staff conflict is not appropriate or therapeutic; addressing the issue privately and professionally with the staff member is the recommended approach."}, {"t": "Publicly reprimand the staff member in front of other clients and colleagues", "c": false, "w": "A private conversation is more appropriate and professional than a public reprimand, which could embarrass the staff member unnecessarily and is not the best approach to correcting the bias."}], "rationale": "Eating disorders are among the most lethal psychiatric diseases, and nurses must actively counter the harmful bias that minimizes them as a simple lifestyle choice; the most appropriate response is to privately and professionally address the insensitive, inaccurate comment with the staff member.", "tip": "NCLEX tip: NCLEX questions about addressing insensitive staff comments typically favor a private, professional, direct conversation over ignoring, public confrontation, or involving the client.", "id": "m9_93", "module": 9}, {"type": "mc", "stem": "A nurse is teaching a support group about the difference between healthy online eating-disorder recovery communities and harmful ones. Which statement reflects accurate health teaching?", "options": [{"t": "Pro-ana and pro-mia websites perpetuate myths about eating disorders, while resources like NEDA can support healthy recovery, especially when combined with a treatment provider", "c": true, "w": ""}, {"t": "All online eating disorder communities, regardless of content, are equally therapeutic and should be equally encouraged", "c": false, "w": "Pro-ana/pro-mia sites specifically perpetuate myths and are not equivalent in therapeutic value to evidence-informed resources like NEDA; distinguishing between healthy and harmful online communities is an important teaching point."}, {"t": "Online resources should never be recommended to clients recovering from an eating disorder under any circumstances", "c": false, "w": "Appropriately selected online resources (such as NEDA) can support healthy recovery, especially when combined with a treatment provider, so a blanket avoidance of all online resources is not accurate teaching."}, {"t": "Pro-ana and pro-mia communities provide medically accurate nutritional guidance for safe weight loss", "c": false, "w": "Pro-ana/pro-mia sites are specifically described as perpetuating myths, not providing medically accurate guidance, despite sometimes offering a sense of community or belonging to members."}], "rationale": "While pro-ana/pro-mia ('e-Ana,' 'e-Mia') sites perpetuate myths about eating disorders, resources like NEDA and similar apps/sites can support healthy recovery (self-monitoring without calorie counting, logging thoughts/feelings, coping strategies), and are most effective when combined with a treatment provider.", "tip": "NCLEX tip: Distinguish pro-ana/pro-mia sites (harmful, myth-perpetuating) from NEDA and similar evidence-informed recovery resources (helpful, especially alongside professional treatment).", "id": "m9_94", "module": 9}, {"type": "mc", "stem": "A nurse caring for a client with chronic, treatment-resistant anorexia nervosa discusses a harm-reduction approach with the treatment team. Which goal best reflects this approach?", "options": [{"t": "Improving quality of life and minimizing harm through symptom management and skill development, even without full symptom remission", "c": true, "w": ""}, {"t": "Requiring complete abstinence from all disordered eating behaviors before any care can be provided", "c": false, "w": "A harm-reduction approach specifically does not require complete abstinence/full remission as a precondition for care; it focuses on improving quality of life and minimizing harm even when full remission is not achieved."}, {"t": "Withholding any medical monitoring until the client agrees to full nutritional rehabilitation", "c": false, "w": "Harm reduction specifically continues to provide medical monitoring and support even when the client is not pursuing full nutritional rehabilitation, rather than withholding care until abstinence is achieved."}, {"t": "Focusing solely on weight restoration with no attention to quality of life or coping skills", "c": false, "w": "The harm-reduction approach specifically emphasizes quality of life and symptom management/coping skill development, not an exclusive focus on weight restoration numbers alone."}], "rationale": "For clients with chronic, treatment-resistant anorexia nervosa, a harm-reduction approach focuses on improving quality of life and minimizing harm through symptom management and skill development, rather than requiring full abstinence or complete symptom remission as a precondition for support.", "tip": "NCLEX tip: Harm reduction in chronic AN parallels harm reduction in substance use disorders — both prioritize quality of life and reduced harm over an all-or-nothing abstinence requirement.", "id": "m9_95", "module": 9}, {"type": "sata", "stem": "Select all statements that accurately describe prevalence and demographic patterns of eating disorders according to the source material.", "options": [{"t": "Middle-aged women are the fastest-growing group being diagnosed with eating disorders", "c": true, "w": ""}, {"t": "At least 5%-10% of individuals with anorexia nervosa or bulimia nervosa are male", "c": true, "w": ""}, {"t": "Binge-eating disorder has a higher lifetime prevalence than either anorexia nervosa or bulimia nervosa", "c": true, "w": ""}, {"t": "Eating disorders are exclusively a concern for adolescent females and do not affect any other population", "c": false, "w": "Eating disorders affect multiple populations beyond adolescent females, including males (5%-10% of AN/BN cases), middle-aged women (fastest-growing diagnosed group), and older adults, making this an inaccurate blanket statement."}, {"t": "Anorexia nervosa has a higher lifetime prevalence than bulimia nervosa", "c": false, "w": "Bulimia nervosa's lifetime prevalence (1.0%) is actually higher than anorexia nervosa's lifetime prevalence (0.6%), making this statement inaccurate."}], "rationale": "Key eating disorder epidemiology facts include: middle-aged women are the fastest-growing newly diagnosed group, at least 5%-10% of AN/BN cases occur in males, and BED has the highest lifetime prevalence (2.8%) compared to BN (1.0%) and AN (0.6%).", "tip": "NCLEX tip: Memorize the lifetime prevalence ranking: BED (2.8%) > BN (1.0%) > AN (0.6%) — a frequently tested numeric comparison.", "id": "m9_96", "module": 9}, {"type": "bowtie", "stem": "A 15-year-old client is admitted at 68% of ideal body weight with bradycardia (HR 42), orthostatic hypotension, and a potassium level of 2.9 mEq/L. She reports an intense fear of gaining weight and restricts intake severely, sometimes going a full day without eating.", "left": {"label": "Actions to Take", "opts": ["Initiate continuous cardiac monitoring and notify the provider of the abnormal vital signs and labs", "Begin a gradual, closely monitored refeeding plan to prevent refeeding syndrome", "Weigh the client daily at a consistent time under standardized conditions", "Encourage a vigorous daily exercise regimen to help the client cope with anxiety about eating", "Allow the client to eat all meals alone in her room without supervision"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Anorexia nervosa, restricting type, with medical instability", "Binge-eating disorder", "Reactive attachment disorder"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Cardiac rhythm and vital sign trends", "Serum electrolytes, especially potassium and phosphorus", "Weight trends under standardized conditions", "COWS opioid withdrawal score", "CIWA-Ar alcohol withdrawal score"], "correct": [0, 1, 2]}, "rationale": "This client's significantly low body weight, bradycardia, orthostatic hypotension, hypokalemia, and intense fear of weight gain reflect anorexia nervosa with medical instability requiring hospital admission. Priority actions include cardiac monitoring, gradual refeeding to prevent refeeding syndrome, and standardized weighing; monitoring should track cardiac status, electrolytes, and weight trends — not COWS or CIWA-Ar, which apply to substance withdrawal scenarios unrelated to this client's presentation.", "tip": "NCLEX tip: In bowtie scenarios blending eating disorder and cardiac risk, prioritize cardiac monitoring, electrolyte correction, and standardized weight tracking — and eliminate any withdrawal-scale distractors that belong to unrelated substance use content.", "id": "m9_97", "module": 9}, {"type": "bowtie", "stem": "A 6-year-old client in foster care, with a history of three placement changes in the past year, rarely seeks comfort from the new foster parent, shows minimal positive affect, and appears withdrawn and unresponsive to soothing even during distress.", "left": {"label": "Actions to Take", "opts": ["Support the development of a consistent, predictable caregiving relationship with the foster parent", "Refer the family for trauma-informed individual and family therapy", "Educate the foster parent about the impact of past inconsistent caregiving on the child's attachment behavior", "Recommend the child be immediately moved to yet another new placement to 'start fresh'", "Dismiss the withdrawn behavior as simple shyness requiring no further evaluation"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Reactive attachment disorder", "Autism spectrum disorder, Level 3", "Oppositional defiant disorder"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Quality and consistency of caregiver-child interactions over time", "Child's responsiveness to comfort and soothing attempts", "Presence of positive affect during interactions", "CIWA-Ar score trends", "Pupil size using the COWS scale"], "correct": [0, 1, 2]}, "rationale": "This presentation, a history of inconsistent caregiving/multiple placements plus emotionally withdrawn, minimally comfort-seeking behavior, reflects reactive attachment disorder. Appropriate actions focus on building a consistent caregiving relationship and trauma-informed therapy, while monitoring should track the quality of caregiver-child interaction and the child's responsiveness to comfort — not substance-withdrawal scales, which are irrelevant to this pediatric attachment scenario.", "tip": "NCLEX tip: RAD bowtie scenarios reward continuity-of-care answer choices and penalize any suggestion of further placement disruption or unrelated substance-withdrawal monitoring tools.", "id": "m9_98", "module": 9}, {"type": "mc", "stem": "A nurse is caring for a client recovering from bariatric surgery who admits to a history of binge eating prior to surgery, without having completed the required pre-operative nutrition/counseling classes. Which nursing action best reflects the priority KSA (knowledge, skills, attitudes) competencies of safety and teamwork for this client?", "options": [{"t": "Involve the surgeon, social services, and dietician in a coordinated plan while providing supportive RN presence and education", "c": true, "w": ""}, {"t": "Manage the client's care entirely independently without involving any other disciplines", "c": false, "w": "Coordinated, interdisciplinary involvement (surgeon, social services, dietician) is emphasized as the appropriate approach for this complex case, not an entirely independent nursing-only management plan."}, {"t": "Focus solely on physical wound care with no attention to the client's eating-behavior history", "c": false, "w": "The client's pre-operative binge-eating history and lack of required counseling participation are directly relevant to post-operative risk and require ongoing attention, not exclusive focus on wound care."}, {"t": "Withhold any further nutritional counseling since the surgery has already been performed", "c": false, "w": "Continued nutritional counseling, dietician involvement, and support remain important even after surgery has been performed, especially given the client's pre-operative binge-eating history."}], "rationale": "This bariatric surgery case illustrates the importance of safety (preventing surgical complications) and teamwork/collaboration (RN, surgeon, social services, dietician) given the client's history of binge eating and non-participation in required pre-operative counseling, emphasizing coordinated, interdisciplinary care.", "tip": "NCLEX tip: Bariatric surgery cases combining a binge-eating history with incomplete pre-op preparation test your ability to identify the correct interdisciplinary team members needed for safe, coordinated care.", "id": "m9_99", "module": 9}, {"type": "mc", "stem": "Which of the following statements about substance use among adolescents, as presented in the children/adolescents chapter, is accurate?", "options": [{"t": "More than half of 12th graders report using alcohol in the past year", "c": true, "w": ""}, {"t": "Illicit drug use among high schoolers is exceedingly rare, affecting fewer than 1% of students", "c": false, "w": "Approximately 27.2% of high schoolers reported using illicit drugs in the past year, which is far higher than 1%, reflecting a significant public health concern among this population."}, {"t": "Substance use disorders are estimated to affect fewer than 1% of youth ages 12-17", "c": false, "w": "Substance use disorders are estimated to affect approximately 5% of youth ages 12-17, not fewer than 1%, according to the source material."}, {"t": "Alcohol use among 8th graders is higher than among 12th graders", "c": false, "w": "The reported rate of past-year alcohol use is higher among 12th graders (55.6%) than among 8th graders (17.6%), which is the opposite of what this statement claims."}], "rationale": "Among adolescents, an estimated 5% of youth ages 12-17 have a substance use disorder; 17.6% of 8th graders and 55.6% of 12th graders reported alcohol use in the past year, and 27.2% of high schoolers reported illicit drug use in the past year.", "tip": "NCLEX tip: Note the increasing trend from 8th to 12th grade in reported alcohol use (17.6% to 55.6%) — a testable statistic illustrating rising substance use risk through adolescence.", "id": "m9_100", "module": 9}, {"type": "mc", "stem": "A nurse is teaching new parents about resilience in children. Which statement best reflects an accurate understanding of this concept?", "options": [{"t": "Resilience is the ability to adapt to or overcome stressors, and it can be learned and strengthened over time", "c": true, "w": ""}, {"t": "Resilience is an entirely fixed, innate trait that cannot be developed or influenced after birth", "c": false, "w": "Resilience is specifically described as something that can be learned, involving thoughts/behaviors/actions triggered by stress, rather than being an entirely fixed trait unaffected by later development or support."}, {"t": "Resilience means a child never experiences stress or adversity in their life", "c": false, "w": "Resilience is about how a child adapts to or overcomes stressors, not the absence of stress or adversity altogether; children with resilience still face stress but respond adaptively."}, {"t": "Resilience has no relationship to a child's temperament or access to supportive relationships", "c": false, "w": "Resilience is aided by temperament, problem-solving skills, and nurturing adult support, so it is inaccurate to say it has no relationship to these factors."}], "rationale": "Resilience is the ability to adapt to or overcome stressors and can be learned; it involves thoughts, behaviors, and actions triggered by stress, and is aided by factors such as temperament, problem-solving skills, and the presence of nurturing adult support.", "tip": "NCLEX tip: Resilience is framed as a learnable, buildable capacity — not a fixed trait — supported by temperament, skills, and relationships, which is an empowering teaching point for parents and caregivers.", "id": "m9_101", "module": 9}, {"type": "mc", "stem": "Which statement accurately reflects specific phobias in childhood, according to the source material?", "options": [{"t": "Specific phobias occur in about 5% of children and 16% of adolescents", "c": true, "w": ""}, {"t": "Specific phobias in childhood are exceedingly rare, occurring in fewer than 0.1% of children", "c": false, "w": "Specific phobias occur in about 5% of children and 16% of adolescents, which is far more common than a rate of fewer than 0.1%."}, {"t": "Common childhood specific phobias include only fear of heights, with no other recognized categories", "c": false, "w": "Common childhood specific phobias described in the source material include fear of the dark, monsters, costumed characters, injections, water, and certain animals — a broader range than heights alone."}, {"t": "Specific phobias are more prevalent in adolescents than in adults, but do not occur at all in young children", "c": false, "w": "Specific phobias are explicitly described as occurring in childhood (about 5% of children), so it is inaccurate to say they do not occur at all in young children."}], "rationale": "Specific phobias in childhood, including fear of the dark, monsters, costumed characters, injections, water, and certain animals, occur in about 5% of children and 16% of adolescents, reflecting a relatively common category of childhood anxiety.", "tip": "NCLEX tip: Memorize the specific phobia prevalence figures (5% children, 16% adolescents) alongside separation anxiety disorder's prevalence (4% children, 1.6% adolescents) for comparison.", "id": "m9_102", "module": 9}], "module7": [{"type": "mc", "stem": "A client has experienced one manic episode that required hospitalization, along with several major depressive episodes over the years, but has never had a hypomanic-only presentation. Which diagnosis best fits this history?", "options": [{"t": "Bipolar I disorder", "c": true, "w": ""}, {"t": "Bipolar II disorder", "c": false, "w": "Bipolar II disorder specifically requires at least one hypomanic episode alternating with depressive episodes, but never a full manic episode; this client's history includes a full manic episode, which rules out Bipolar II."}, {"t": "Cyclothymic disorder", "c": false, "w": "Cyclothymic disorder involves hypomanic and persistent depressive symptoms that do not meet full criteria for a manic or major depressive episode, lasting at least two years; this client's history of a full manic episode requiring hospitalization is far more severe than cyclothymia."}, {"t": "Schizoaffective disorder", "c": false, "w": "Schizoaffective disorder requires features of both schizophrenia and a mood disorder; nothing in this history suggests psychotic symptoms independent of mood episodes."}], "rationale": "Bipolar I disorder is defined by at least one manic episode, which may be preceded or followed by hypomanic or major depressive episodes. The presence of even one full manic episode meeting DSM-5 criteria establishes the Bipolar I diagnosis.", "tip": "NCLEX tip: The presence of even a single manic episode is sufficient for a Bipolar I diagnosis — memorize this as a clean rule to quickly distinguish Bipolar I from Bipolar II.", "id": "m7_0", "module": 7}, {"type": "mc", "stem": "A young woman reports several depressive episodes over the past three years, along with distinct periods of elevated mood, increased energy, and decreased need for sleep lasting about five days at a time that never impaired her ability to work. Which diagnosis is most consistent with this presentation?", "options": [{"t": "Bipolar I disorder", "c": false, "w": "Bipolar I disorder requires at least one full manic episode causing marked impairment or requiring hospitalization; this client's elevated periods did not impair her functioning, which is inconsistent with mania."}, {"t": "Bipolar II disorder", "c": true, "w": ""}, {"t": "Major depressive disorder, recurrent", "c": false, "w": "Recurrent major depressive disorder would not account for the distinct hypomanic periods of elevated mood and decreased sleep need described in this history."}, {"t": "Cyclothymic disorder", "c": false, "w": "Cyclothymic disorder involves milder, more chronic mood fluctuations that do not meet full criteria for a hypomanic or major depressive episode; this client's history describes episodes that do meet full criteria for both."}], "rationale": "Bipolar II disorder requires at least one hypomanic episode (lasting four or more days without marked functional impairment) alternating with one or more major depressive episodes, and never a full manic episode.", "tip": "NCLEX tip: Bipolar II clients often spend more time in the depressive phase and experience more severe depressive symptoms than Bipolar I clients, and women are more likely to initially present during a depressive episode.", "id": "m7_1", "module": 7}, {"type": "mc", "stem": "A client has experienced fluctuating hypomanic and depressive symptoms for the past two and a half years that have never met full criteria for a hypomanic or major depressive episode. Which diagnosis should the nurse anticipate?", "options": [{"t": "Cyclothymic disorder", "c": true, "w": ""}, {"t": "Bipolar I disorder", "c": false, "w": "Bipolar I disorder requires at least one episode that fully meets manic episode criteria, which is a much more severe and clearly defined presentation than the chronic subthreshold symptoms described here."}, {"t": "Bipolar II disorder", "c": false, "w": "Bipolar II disorder requires episodes that fully meet criteria for hypomania and major depression, whereas this client's symptoms have never met full episode criteria."}, {"t": "Major depressive disorder with seasonal pattern", "c": false, "w": "A seasonal pattern would show a clear seasonal timing to depressive episodes, not the mixed, subthreshold hypomanic and depressive fluctuations described here."}], "rationale": "Cyclothymic disorder involves numerous periods of hypomanic and depressive symptoms that do not meet full criteria for a hypomanic or major depressive episode, persisting for at least two years in adults (one year in children/adolescents).", "tip": "NCLEX tip: Remember that 15%–50% of people with cyclothymic disorder go on to develop Bipolar I or II disorder, making early recognition and monitoring important.", "id": "m7_2", "module": 7}, {"type": "mc", "stem": "Using the DIG FAST mnemonic, which client statement best reflects the 'G' component of a manic episode?", "options": [{"t": "\"I've realized I have a special gift that will let me cure cancer within the year.\"", "c": true, "w": ""}, {"t": "\"I've only slept about three hours a night this week, but I feel completely rested.\"", "c": false, "w": "This statement reflects the 'S' for decreased need for sleep component of DIG FAST, not grandiosity."}, {"t": "\"My thoughts are racing so fast I can barely keep up with them.\"", "c": false, "w": "This statement reflects the 'F' for flight of ideas/racing thoughts component of DIG FAST, not grandiosity."}, {"t": "\"I keep starting new projects around the house but can't seem to finish any of them.\"", "c": false, "w": "This statement reflects the 'D' for distractibility component of DIG FAST, not grandiosity."}], "rationale": "The 'G' in DIG FAST stands for grandiosity, an inflated sense of self-esteem or exaggerated belief in one's own abilities, importance, or powers, which can escalate into grandiose delusions in severe mania.", "tip": "NCLEX tip: DIG FAST — Distractibility, Impulsivity, Grandiosity, Flight of ideas, Activity/energy increase, Sleep need decrease, Talkativeness — is essential for recognizing the seven core symptoms of a manic episode.", "id": "m7_3", "module": 7}, {"type": "mc", "stem": "A client meets criteria for a manic episode but reports mood that is irritable rather than elevated or expansive. According to DSM-5 criteria, how many of the DIG FAST symptoms must be present in this case?", "options": [{"t": "Three symptoms, the same as with elevated mood", "c": false, "w": "When mood is irritable only (rather than elevated or expansive), DSM-5 requires four symptoms, not three, to establish the diagnosis."}, {"t": "Four symptoms, one more than required with elevated or expansive mood", "c": true, "w": ""}, {"t": "Two symptoms, fewer than required with elevated mood", "c": false, "w": "DSM-5 requires more, not fewer, symptoms when the mood disturbance is irritability alone; two symptoms would be insufficient under either mood presentation."}, {"t": "Symptom count is not affected by the type of mood disturbance present", "c": false, "w": "DSM-5 criteria specifically require an additional symptom (four rather than three) when irritability is the sole mood disturbance rather than elevated or expansive mood."}], "rationale": "DSM-5 criteria for a manic episode require three or more DIG FAST symptoms when mood is elevated or expansive, but four or more symptoms when the mood disturbance is irritability only, reflecting the need for more evidence when the mood change is less specific to mania.", "tip": "NCLEX tip: Remember the 3-vs-4 rule for manic episode symptom counts — this exact numeric detail is a classic exam trap.", "id": "m7_4", "module": 7}, {"type": "mc", "stem": "Which client presentation best distinguishes a hypomanic episode from acute mania?", "options": [{"t": "Elevated mood and increased energy lasting four days with no impairment in the client's job performance", "c": true, "w": ""}, {"t": "Grandiose delusions and disorganized, chaotic behavior lasting over a week", "c": false, "w": "Grandiose delusions and disorganized, chaotic behavior reflect the psychotic features and severe impairment seen in acute mania, not hypomania, which by definition does not include psychotic symptoms."}, {"t": "Extreme restlessness with no time for sleep, progressing toward physical exhaustion", "c": false, "w": "This level of severity, with exhaustion risk, is characteristic of acute mania rather than the milder, non-impairing presentation of hypomania."}, {"t": "Pressured speech with flight of ideas and clang associations", "c": false, "w": "Clang associations and flight of ideas severe enough to disrupt speech coherence are more typical of acute mania; hypomania involves milder pressured or tangential speech."}], "rationale": "Hypomania involves the same symptom categories as mania but at a less severe intensity, lasting at least four days, without marked impairment in social or occupational functioning and without psychotic features — distinguishing it from the more severe, impairing, and potentially psychotic presentation of acute mania.", "tip": "NCLEX tip: The hallmark distinguishing features of hypomania are the absence of marked functional impairment and the absence of psychotic symptoms — memorize both criteria together.", "id": "m7_5", "module": 7}, {"type": "mc", "stem": "A client with bipolar disorder is observed to cry inconsolably one moment and laugh loudly the next, with no clear triggering worsening or improvement in circumstances, alongside a decreased need for sleep and severe irritability. Which presentation does this best describe?", "options": [{"t": "A mixed episode", "c": true, "w": ""}, {"t": "A hypomanic episode", "c": false, "w": "Hypomania does not typically include intense, alternating tearfulness and euphoria in rapid succession; this combined presentation of depressive and manic features is more consistent with a mixed episode."}, {"t": "Cyclothymic disorder", "c": false, "w": "Cyclothymic disorder describes a chronic pattern of subthreshold mood symptoms over years, not an acute concurrent presentation of both depressive and manic features."}, {"t": "Rapid cycling", "c": false, "w": "Rapid cycling refers to four or more distinct mood episodes within a 12-month period, not the simultaneous co-occurrence of depressive and manic symptoms within a single presentation."}], "rationale": "A mixed episode (mixed features) involves concurrent symptoms of both depression and mania occurring together, and carries a significant suicide risk due to the combination of low mood, hopelessness, and the impulsivity and energy of mania.", "tip": "NCLEX tip: Mixed features carry one of the highest suicide risks in bipolar disorder because the client has the energy and impulsivity of mania paired with the despair of depression — treat this combination as a safety priority.", "id": "m7_6", "module": 7}, {"type": "mc", "stem": "A client with bipolar disorder has experienced five distinct mood episodes within the past 12 months. Which term describes this pattern, and what is its clinical significance?", "options": [{"t": "Rapid cycling, which is associated with lower global functioning and greater treatment resistance", "c": true, "w": ""}, {"t": "Delirious mania, which requires urgent treatment with benzodiazepines or ECT", "c": false, "w": "Delirious mania is a distinct, severe presentation involving clouded consciousness and catatonia, not a pattern defined by episode frequency over a year."}, {"t": "A mixed episode, which combines depressive and manic symptoms simultaneously", "c": false, "w": "A mixed episode refers to concurrent depressive and manic symptoms within one episode, not a count of separate episodes over a year."}, {"t": "Cyclothymic disorder, which requires at least two years of subthreshold symptoms", "c": false, "w": "Cyclothymic disorder is a distinct diagnosis based on chronic subthreshold symptoms over two years, not a description of episode frequency in someone already diagnosed with bipolar disorder."}], "rationale": "Rapid cycling is defined as four or more mood episodes within a 12-month period and is associated with lower global functioning and greater resistance to standard treatment approaches.", "tip": "NCLEX tip: The number '4' is the key detail to memorize for rapid cycling — four or more episodes in 12 months.", "id": "m7_7", "module": 7}, {"type": "mc", "stem": "A client is admitted with acute onset of severe confusion, disorientation, psychotic symptoms, and catatonic features that developed and progressed rapidly over 24 hours in the context of a manic episode. Which condition should the nurse suspect, and what is the recommended treatment?", "options": [{"t": "Delirious mania, treated with high-dose benzodiazepines and/or ECT", "c": true, "w": ""}, {"t": "Rapid cycling, treated with an increased dose of the client's current mood stabilizer", "c": false, "w": "Rapid cycling refers to episode frequency over a year, not an acute, rapidly progressing state of clouded consciousness and catatonia, and would not be treated as an emergency with high-dose benzodiazepines or ECT."}, {"t": "Hypomania, treated with outpatient psychotherapy alone", "c": false, "w": "Hypomania is a mild, non-impairing presentation without psychosis or clouded consciousness, which does not match this client's acute, severe presentation requiring urgent intervention."}, {"t": "Neuroleptic malignant syndrome, treated with dantrolene", "c": false, "w": "Neuroleptic malignant syndrome is triggered specifically by antipsychotic medication use and presents with fever, rigidity, and elevated CPK, which is a different clinical entity from delirious mania, though both require urgent recognition."}], "rationale": "Delirious mania is the most severe and rare form of mania, with acute onset and rapid progression of symptoms combining features of both delirium and mania, including severe clouding of consciousness, disorientation, psychosis, and catatonia. Treatment involves high-dose benzodiazepines (such as lorazepam) and/or electroconvulsive therapy (ECT).", "tip": "NCLEX tip: Delirious mania is a psychiatric emergency — recognize the combination of clouded consciousness, catatonia, and mania together as a distinct, high-acuity presentation requiring urgent treatment.", "id": "m7_8", "module": 7}, {"type": "mc", "stem": "A nurse is teaching a nursing student about the male-to-female presentation patterns of bipolar disorder subtypes. Which statement by the student reflects accurate understanding?", "options": [{"t": "\"Men are more likely to first present with a manic episode, while women are more likely to first present with depression.\"", "c": true, "w": ""}, {"t": "\"Bipolar I and Bipolar II disorders affect men and women in identical patterns of initial presentation.\"", "c": false, "w": "This is inaccurate; while Bipolar I has a roughly equal male-to-female ratio, the initial presenting episode differs by sex, with men more often presenting with mania and women more often presenting with depression."}, {"t": "\"Bipolar II disorder is more common in men than in women.\"", "c": false, "w": "Bipolar II disorder actually has a male-to-female ratio of roughly 1:2, meaning it is more commonly diagnosed in women, not men."}, {"t": "\"Women with bipolar disorder typically spend less time in depressive episodes than men.\"", "c": false, "w": "Women with Bipolar II disorder in particular tend to spend more time in the depressive phase with more severe depressive symptoms, not less, compared to men."}], "rationale": "In Bipolar I disorder, the male-to-female ratio is roughly equal, but men typically first present with a manic episode while women typically first present during a depressive episode; Bipolar II disorder is more common in women (ratio ~1:2), who tend to spend more time in and experience more severe depressive symptoms.", "tip": "NCLEX tip: Sex-based patterns of initial presentation (mania in men, depression in women) are a subtle but testable detail distinguishing Bipolar I from Bipolar II epidemiology.", "id": "m7_9", "module": 7}, {"type": "mc", "stem": "Approximately what percentage of individuals with bipolar spectrum disorder will attempt suicide during their lifetime?", "options": [{"t": "Less than 5%", "c": false, "w": "This significantly understates the documented suicide attempt rate among individuals with bipolar spectrum disorder."}, {"t": "25% to 50%", "c": true, "w": ""}, {"t": "Nearly 100%", "c": false, "w": "This significantly overstates the documented rate; not all individuals with bipolar spectrum disorder attempt suicide, though the risk is substantial."}, {"t": "Approximately 10%", "c": false, "w": "This understates the documented rate; the actual figure is considerably higher, in the range of 25% to 50%."}], "rationale": "Approximately 25% to 50% of people with bipolar spectrum disorder attempt suicide during their lifetime, and 15% to 20% ultimately complete suicide, with bipolar spectrum disorders accounting for about one-quarter of all completed suicides among those with any mental disorder.", "tip": "NCLEX tip: The 25%–50% attempt rate and 15%–20% completion rate for bipolar spectrum disorder are high-yield statistics reflecting the seriousness of suicide risk assessment in this population.", "id": "m7_10", "module": 7}, {"type": "mc", "stem": "A client's child has two parents who both have bipolar disorder. What is the approximate risk that this child will also develop bipolar disorder?", "options": [{"t": "Up to 50%", "c": true, "w": ""}, {"t": "Approximately 7%–10%, the same as with one affected first-degree relative", "c": false, "w": "The 7–10 times increased risk applies to having one affected first-degree relative; having two parents with bipolar disorder confers a substantially higher risk, up to 50%."}, {"t": "Less than 5%, similar to the general population risk", "c": false, "w": "This significantly understates the risk; having two parents with bipolar disorder confers a much higher risk than the general population baseline."}, {"t": "Up to 80%, the same as with an identical twin who has bipolar disorder", "c": false, "w": "The up to 80% risk figure applies specifically to identical twins, a much closer genetic relationship than a child having two affected parents, whose risk is up to 50%."}], "rationale": "A child with two parents who both have bipolar disorder has up to a 50% chance of also developing the disorder, reflecting the strong genetic component and multiple genes involved in bipolar spectrum disorders.", "tip": "NCLEX tip: Memorize the genetic risk ladder for bipolar disorder — first-degree relative (7–10x), two affected parents (up to 50%), identical twin (up to 80%) — as a stepwise progression.", "id": "m7_11", "module": 7}, {"type": "mc", "stem": "Which neurotransmitter is described as significantly blunted in bipolar disorder, contributing to mood dysregulation?", "options": [{"t": "GABA", "c": true, "w": ""}, {"t": "Acetylcholine", "c": false, "w": "Acetylcholine is not the neurotransmitter specifically described as significantly blunted in bipolar disorder within this content; GABA is the neurotransmitter highlighted in this context."}, {"t": "Histamine", "c": false, "w": "Histamine is not implicated as a primary neurotransmitter abnormality in bipolar disorder within this content."}, {"t": "Substance P", "c": false, "w": "Substance P is not among the neurotransmitters specifically described as abnormal in bipolar disorder within this content."}], "rationale": "GABA (gamma-aminobutyric acid) is significantly blunted in bipolar disorder, contributing to reduced inhibitory control over neural circuits alongside abnormalities in dopamine, norepinephrine, glutamate, and serotonin.", "tip": "NCLEX tip: Remember that higher dopamine, norepinephrine, and glutamate are linked to manic phases, while lower dopamine and norepinephrine are linked to bipolar depression, with GABA blunted throughout.", "id": "m7_12", "module": 7}, {"type": "mc", "stem": "A nurse is explaining the biological underpinnings of poor sleep in bipolar disorder to a client's family. Which explanation is most accurate?", "options": [{"t": "\"Altered melatonin release contributes to the poor sleep often seen in bipolar disorder.\"", "c": true, "w": ""}, {"t": "\"Poor sleep in bipolar disorder is caused entirely by voluntary behavioral choices rather than any biological process.\"", "c": false, "w": "This is inaccurate; altered melatonin release is a recognized biological contributor to poor sleep in bipolar disorder, not solely a behavioral choice."}, {"t": "\"Sleep disturbances in bipolar disorder are unrelated to any neurobiological process.\"", "c": false, "w": "This is inaccurate; sleep disturbance in bipolar disorder is linked to altered melatonin release, a clear neurobiological mechanism."}, {"t": "\"Poor sleep only occurs during depressive episodes, never during mania.\"", "c": false, "w": "Sleep disturbance occurs in both phases — decreased need for sleep is a hallmark of mania, while insomnia or hypersomnia can occur in depressive episodes."}], "rationale": "Altered melatonin release is a recognized neurobiological factor contributing to poor sleep in bipolar disorder, alongside HPA axis abnormalities and a confirmed chronic inflammatory state.", "tip": "NCLEX tip: Sleep disturbance in bipolar disorder has a real biological basis (altered melatonin, HPA axis dysfunction), which supports why sleep hygiene interventions are a core part of relapse prevention.", "id": "m7_13", "module": 7}, {"type": "mc", "stem": "Which neuroanatomical finding is associated with bipolar disorder?", "options": [{"t": "Reduced hippocampal volume", "c": true, "w": ""}, {"t": "Enlarged hippocampal volume", "c": false, "w": "Bipolar disorder is associated with reduced, not enlarged, hippocampal volume."}, {"t": "Increased amygdala and striatal volumes", "c": false, "w": "Bipolar disorder is associated with reduced, not increased, amygdala and striatal volumes, contributing to problems with cognition and emotion."}, {"t": "No detectable structural brain changes", "c": false, "w": "Bipolar disorder is associated with detectable structural changes, including reduced hippocampal volume and dysfunction in the prefrontal cortex and limbic system."}], "rationale": "Bipolar disorder is associated with reduced hippocampal volume, dysfunction in the prefrontal cortex and limbic system, and reduced amygdala and striatal volumes, which contribute to problems with cognition and emotional regulation.", "tip": "NCLEX tip: Reduced volume (hippocampus, amygdala, striatum) is the consistent neuroanatomical theme in bipolar disorder — pair this with the prefrontal cortex/limbic system dysfunction.", "id": "m7_14", "module": 7}, {"type": "mc", "stem": "Which theoretical model describes bipolar disorder as resulting from extreme fluctuations in an individual's behavioral activation system?", "options": [{"t": "BAS dysregulation model", "c": true, "w": ""}, {"t": "Social rhythm theory", "c": false, "w": "Social rhythm theory focuses on disruptions in circadian rhythms and social zeitgebers as triggers for mood episodes, not fluctuations in the behavioral activation system specifically."}, {"t": "Dopamine hypothesis", "c": false, "w": "The dopamine hypothesis is a neurochemical theory most closely associated with schizophrenia, not the behavioral activation model used to explain bipolar disorder."}, {"t": "Cognitive triad model", "c": false, "w": "The cognitive triad model is associated with Beck's theory of depression, not a model specific to fluctuations in the behavioral activation system in bipolar disorder."}], "rationale": "The BAS (behavioral activation system) dysregulation model describes bipolar disorder as resulting from extreme fluctuations in the behavioral activation system, which governs approach-related motivation and reward-seeking behavior.", "tip": "NCLEX tip: Pair the BAS dysregulation model with social rhythm theory as the two key environmental/psychological models of bipolar disorder discussed in this content.", "id": "m7_15", "module": 7}, {"type": "mc", "stem": "A nurse is assessing a client for bipolar disorder risk using the Mood Disorder Questionnaire (MDQ). Which combination of responses constitutes a positive screen?", "options": [{"t": "\"Yes\" to seven or more events in question 1, \"Yes\" to question 2, and \"moderate\" or \"serious problem\" to question 3", "c": true, "w": ""}, {"t": "\"Yes\" to any single event in question 1 alone, regardless of responses to questions 2 and 3", "c": false, "w": "A single \"yes\" response to question 1 alone is not sufficient for a positive screen; at least seven events in question 1 are required, along with specific responses to questions 2 and 3."}, {"t": "\"No\" to question 2 but \"yes\" to at least seven events in question 1", "c": false, "w": "A positive screen specifically requires a \"yes\" response to question 2, not a \"no\" response, in addition to the other criteria."}, {"t": "Any combination of responses, since the MDQ is a diagnostic tool rather than a screening tool", "c": false, "w": "The MDQ is a screening tool, not a diagnostic tool, and requires a specific combination of responses (not any combination) to be considered a positive screen."}], "rationale": "A positive MDQ screen requires a \"yes\" response to seven or more events in question 1, a \"yes\" response to question 2 (indicating several symptoms occurred together), and a rating of \"moderate\" or \"serious problem\" for question 3 (indicating functional impact); the MDQ is a screening tool, not a diagnostic instrument.", "tip": "NCLEX tip: Remember that the MDQ, like most mental health screening tools, is used to identify clients who need further diagnostic evaluation, not to establish a definitive diagnosis on its own.", "id": "m7_16", "module": 7}, {"type": "mc", "stem": "A nurse is caring for a client in acute mania. Which assessment finding represents the highest priority safety concern?", "options": [{"t": "The client has not slept in over 48 hours and appears increasingly disheveled and dehydrated", "c": true, "w": ""}, {"t": "The client has been overly talkative with staff and other clients on the unit", "c": false, "w": "While talkativeness is characteristic of mania, it is not the priority safety concern compared to physiological compromise from lack of sleep and dehydration."}, {"t": "The client has been wearing brightly colored, mismatched clothing", "c": false, "w": "Flamboyant dress is a common finding in mania related to poor judgment, but it does not represent an urgent physiological safety concern compared to dehydration and sleep deprivation."}, {"t": "The client has been initiating conversations with several other clients on the unit", "c": false, "w": "Increased social initiation, while consistent with mania, is not the priority safety concern compared to the physiological risks of prolonged sleep deprivation and dehydration."}], "rationale": "Prolonged lack of sleep and inadequate fluid intake in acute mania can progress to severe dehydration, cardiac compromise, exhaustion, and even death if untreated, making physiological safety the top nursing priority in this phase.", "tip": "NCLEX tip: In acute mania, always prioritize physiological safety findings (dehydration, sleep deprivation, cardiac status) over psychosocial or behavioral findings when ranking nursing priorities.", "id": "m7_17", "module": 7}, {"type": "mc", "stem": "A client with acute mania says, \"I need to go to the cinema, I and II, last row. Row, row, row your boat, gently down the stream.\" Which speech pattern does this best illustrate?", "options": [{"t": "Clang association", "c": true, "w": ""}, {"t": "Flight of ideas", "c": false, "w": "Flight of ideas involves a nearly continuous flow of speech with abrupt topic changes based on understandable associations or environmental stimuli, whereas this example strings words together based purely on rhyming sound rather than meaning."}, {"t": "Neologisms", "c": false, "w": "Neologisms are made-up words with special meaning to the client, which is not what is illustrated in this example of rhyming, real words strung together."}, {"t": "Echolalia", "c": false, "w": "Echolalia involves pathological repetition of another person's words, which is not demonstrated in this spontaneous, self-generated rhyming speech."}], "rationale": "Clang associations involve stringing words together based on rhyming sounds rather than logical meaning, as illustrated by the shift from \"cinema\" to \"row\" based purely on sound association.", "tip": "NCLEX tip: Clang associations are identified by rhyming or sound-based connections between words or phrases, distinguishing them from flight of ideas, which is driven by (sometimes loose) meaningful associations.", "id": "m7_18", "module": 7}, {"type": "mc", "stem": "Which of the following best describes pressured speech as seen in mania?", "options": [{"t": "Loud, rapid speech that is difficult to interrupt", "c": true, "w": ""}, {"t": "Speech that is slow, halting, and difficult to initiate", "c": false, "w": "This describes psychomotor retardation in speech often seen in depression, which is the opposite of the rapid, loud, difficult-to-interrupt pattern of pressured speech in mania."}, {"t": "Speech limited to one-word answers with minimal content", "c": false, "w": "This describes poverty of speech, a negative symptom associated with schizophrenia, not the pressured, rapid speech pattern of mania."}, {"t": "Speech that trails off into silence mid-sentence", "c": false, "w": "This describes thought blocking, which is associated with schizophrenia, not the loud, rapid, difficult-to-interrupt quality of pressured speech in mania."}], "rationale": "Pressured speech in mania is loud, rapid, and difficult to interrupt, reflecting the racing thoughts and increased energy characteristic of manic and hypomanic episodes.", "tip": "NCLEX tip: Pressured speech (mania) and poverty of speech (schizophrenia negative symptom) sound similar in name but describe opposite speech patterns — don't confuse them.", "id": "m7_19", "module": 7}, {"type": "mc", "stem": "When comparing hypomania to acute mania along a symptom continuum, which finding would the nurse expect specifically in acute mania rather than hypomania?", "options": [{"t": "Grandiose delusions rather than elaborate but plausible schemes", "c": true, "w": ""}, {"t": "Elevated, expansive, or irritable mood", "c": false, "w": "Elevated, expansive, or irritable mood can occur in both hypomania and acute mania, so this does not specifically distinguish the two on the continuum."}, {"t": "Pressured or tangential speech", "c": false, "w": "Pressured or tangential speech can occur in hypomania as well; acute mania is distinguished by more severe features such as flight of ideas and clang associations, and by grandiose delusions rather than plausible schemes."}, {"t": "Overactive, busily occupied behavior", "c": false, "w": "Overactivity is present on both ends of the continuum; acute mania is distinguished by extreme restlessness and disorganized, chaotic behavior rather than simply being busily occupied."}], "rationale": "On the mania continuum, hypomania involves elaborate but still plausible schemes and elevated mood without psychosis, while acute mania can progress to frank grandiose delusions, disorganized and chaotic behavior, and extremely poor judgment.", "tip": "NCLEX tip: Use the mania continuum table as a mental model — hypomania is the 'milder cousin' of acute mania across every symptom category (mood, speech, judgment, behavior, sleep).", "id": "m7_20", "module": 7}, {"type": "mc", "stem": "A client in acute mania states, \"I am the greatest inventor who ever lived, and soon the whole world will recognize my genius.\" How should the nurse classify this statement?", "options": [{"t": "Grandiosity, potentially progressing to a grandiose delusion", "c": true, "w": ""}, {"t": "An illusion, because the client is misinterpreting a real environmental stimulus", "c": false, "w": "An illusion involves misinterpretation of a real external stimulus, whereas this statement reflects an inflated self-belief unrelated to any specific environmental stimulus."}, {"t": "A hallucination, because the client is perceiving something that does not exist", "c": false, "w": "A hallucination is a false sensory perception, not an inflated belief about one's own importance or abilities, which is what this statement reflects."}, {"t": "Echolalia, because the client is repeating words spoken by someone else", "c": false, "w": "Echolalia involves repeating another person's words verbatim, which is not demonstrated in this original, self-generated statement about the client's own perceived greatness."}], "rationale": "Grandiosity is an inflated sense of self-esteem or exaggerated belief in one's own importance, abilities, or powers; in severe mania, this can escalate into frank grandiose delusions that are fixed and clearly false.", "tip": "NCLEX tip: Grandiosity exists on a spectrum from mild inflated self-esteem to full grandiose delusions — assess the client's insight and the fixed, unshakeable nature of the belief to gauge severity.", "id": "m7_21", "module": 7}, {"type": "mc", "stem": "Approximately what percentage of individuals with bipolar spectrum disorder have a comorbid substance use disorder?", "options": [{"t": "More than 50%", "c": true, "w": ""}, {"t": "Less than 5%", "c": false, "w": "This significantly understates the documented comorbidity rate between bipolar spectrum disorder and substance use disorders."}, {"t": "Approximately 10%", "c": false, "w": "This understates the documented comorbidity rate, which exceeds 50% according to this content."}, {"t": "Nearly 100%, with almost no exceptions", "c": false, "w": "This overstates the rate; while comorbidity is very common (over 50%), it is not universal."}], "rationale": "More than 50% of individuals with bipolar spectrum disorder have a comorbid substance use disorder, reflecting a significant overlap that complicates both diagnosis and treatment planning.", "tip": "NCLEX tip: High comorbidity between bipolar disorder and substance use (over 50%) means the nurse should always screen for substance use during a bipolar disorder assessment, and vice versa.", "id": "m7_22", "module": 7}, {"type": "mc", "stem": "At what average age does bipolar disorder typically first present, and what proportion of individuals experience initial symptoms before age 13?", "options": [{"t": "Average onset around age 18, with about one-third of initial symptoms occurring before age 13", "c": true, "w": ""}, {"t": "Average onset around age 45, with symptoms rarely appearing before adulthood", "c": false, "w": "This significantly overstates the average age of onset for bipolar disorder, which typically presents much earlier, around age 18."}, {"t": "Average onset around age 30, with almost no cases beginning in childhood or adolescence", "c": false, "w": "This overstates the average age of onset and understates the proportion of cases beginning before age 13, which is about one-third according to this content."}, {"t": "Average onset around age 8, with symptoms almost always appearing in early childhood", "c": false, "w": "This understates the average age of onset; while about one-third of initial symptoms occur before age 13, the average age of onset overall is around 18."}], "rationale": "The average age of onset for bipolar spectrum disorder is 18 years, though about one-third of individuals experience their initial symptoms before age 13, highlighting the importance of early recognition in children and adolescents.", "tip": "NCLEX tip: Remember both figures together — average onset age 18, with one-third of cases beginning before age 13 — since NCLEX may test either detail.", "id": "m7_23", "module": 7}, {"type": "mc", "stem": "A nurse is assessing a client newly admitted for acute mania. Which assessment finding warrants the most immediate intervention?", "options": [{"t": "Poor skin turgor and dark, scant urine output", "c": true, "w": ""}, {"t": "Reports of inappropriate, uncharacteristic spending over the past week", "c": false, "w": "While financial impulsivity is an important safety concern requiring intervention such as protecting assets, it is not as immediately life-threatening as signs of dehydration."}, {"t": "Report from family that the client has been unusually talkative and outgoing", "c": false, "w": "Increased talkativeness and sociability, while characteristic of mania, do not represent an urgent physiological safety concern compared to dehydration."}, {"t": "Observation that the client has been wearing several pieces of jewelry at once", "c": false, "w": "Flamboyant dress reflects poor judgment common in mania but is not an urgent physiological safety concern compared to signs of dehydration."}], "rationale": "Poor skin turgor and dark, scant urine output are signs of dehydration, which is a top-priority physiological safety concern in acute mania because the client's hyperactivity often prevents adequate fluid intake, risking rapid physiological deterioration.", "tip": "NCLEX tip: Always prioritize physiological findings (hydration, cardiac status, sleep) over behavioral or psychosocial findings when assessing a client in acute mania.", "id": "m7_24", "module": 7}, {"type": "mc", "stem": "Which nursing approach is most appropriate when communicating with a client experiencing acute mania who is attempting to argue about unit rules?", "options": [{"t": "Remain neutral and avoid engaging in the power struggle", "c": true, "w": ""}, {"t": "Engage thoroughly in the argument to help the client feel heard and validated", "c": false, "w": "Engaging in the argument risks a power struggle, since the client may use any inconsistency in the nurse's responses to justify continued arguing; remaining neutral is the more therapeutic approach."}, {"t": "Give in to the client's requests to avoid escalating the situation", "c": false, "w": "Giving in undermines consistent limit-setting, which is essential in managing manic behavior, and can reinforce manipulative or escalating behavior."}, {"t": "Ignore the client entirely until the behavior stops on its own", "c": false, "w": "Ignoring the client entirely is not therapeutic; using short, concise, firm, and calm communication while remaining neutral is more appropriate than complete disengagement."}], "rationale": "Remaining neutral and avoiding power struggles is essential when communicating with a manic client, since the patient may use any inconsistency in staff responses to justify continued arguing; firm, calm, and consistent limit-setting is more therapeutic than either engaging fully or giving in.", "tip": "NCLEX tip: Consistency among all staff members in approach and expectations is essential to minimize a manic client's ability to manipulate or \"split\" the care team.", "id": "m7_25", "module": 7}, {"type": "mc", "stem": "Which nursing intervention is described as the nurse's most effective tool when managing a client in acute mania?", "options": [{"t": "Distraction", "c": true, "w": ""}, {"t": "Confrontation of grandiose statements", "c": false, "w": "Confronting grandiose statements directly can increase agitation and defensiveness; distraction is identified as the more effective tool for redirecting manic energy."}, {"t": "Prolonged one-on-one psychotherapy sessions", "c": false, "w": "Prolonged, in-depth psychotherapy is not appropriate during acute mania due to the client's short attention span and impaired concentration; distraction is the more effective immediate tool."}, {"t": "Strict physical restraint as a first-line intervention", "c": false, "w": "Physical restraint is a last-resort intervention used only when less restrictive measures fail, not a first-line communication tool; distraction is used well before restraint is considered."}], "rationale": "Distraction is identified as the nurse's most effective tool in managing acute mania because it redirects the client's excessive energy and racing thoughts toward a more manageable, structured activity.", "tip": "NCLEX tip: When choosing a nursing intervention for a client in acute mania, distraction should be your default first-line communication strategy before escalating to more restrictive measures.", "id": "m7_26", "module": 7}, {"type": "mc", "stem": "Which environmental modification is most appropriate for a client experiencing acute mania?", "options": [{"t": "A low-stimulation environment away from bright lights and loud noises", "c": true, "w": ""}, {"t": "A brightly lit, socially active common area to encourage engagement with peers", "c": false, "w": "High-stimulation environments can worsen agitation and escalate manic symptoms; a low-stimulation environment is the appropriate milieu intervention."}, {"t": "Group therapy sessions with extensive verbal processing", "c": false, "w": "Extensive verbal processing in group settings is difficult for a manic client with a short attention span and can increase stimulation; structured, non-competitive activities in a low-stimulation setting are preferred."}, {"t": "Competitive recreational activities to channel excess energy", "c": false, "w": "Competitive activities can escalate agitation and conflict in a manic client; non-competitive structured activities are recommended instead."}], "rationale": "A low-stimulation milieu, away from bright lights and loud noises, along with structured, non-competitive activities, helps reduce escalation of manic symptoms and supports the client's ability to redirect excess energy safely.", "tip": "NCLEX tip: Milieu management for mania mirrors that of delirium in valuing a calm, low-stimulation environment — but mania also emphasizes redirecting energy through structured physical activity.", "id": "m7_27", "module": 7}, {"type": "mc", "stem": "A client in acute mania is too active to sit through meals. Which nutritional intervention is most appropriate?", "options": [{"t": "Offer frequent high-calorie, high-protein finger foods such as sandwiches and fruit", "c": true, "w": ""}, {"t": "Insist the client sit at the dining table for the full duration of each meal", "c": false, "w": "Insisting on a full sit-down meal is unrealistic given the client's hyperactivity and short attention span; portable finger foods better accommodate the client's activity level while still meeting nutritional needs."}, {"t": "Restrict food intake until the client is calm enough to eat a full meal", "c": false, "w": "Restricting food intake would worsen the client's nutritional and hydration status, which is already at risk due to hyperactivity; frequent accessible foods are needed instead."}, {"t": "Provide only clear liquids until mania resolves", "c": false, "w": "Clear liquids alone would not meet the client's significantly increased caloric and protein needs during a hypermetabolic manic state."}], "rationale": "Because a hyperactive, manic client is often too active to sit through a full meal, frequent high-calorie, high-protein finger foods and drinks (such as sandwiches and fruit) that can be eaten on the go help meet increased nutritional needs while accommodating the client's activity level.", "tip": "NCLEX tip: Manic clients burn enormous calories through constant activity — anticipate significantly increased caloric needs and make food easily accessible in a portable form.", "id": "m7_28", "module": 7}, {"type": "mc", "stem": "Under which circumstance is seclusion an appropriate intervention for a client in acute mania?", "options": [{"t": "When the patient is unable to control actions and less restrictive measures have failed", "c": true, "w": ""}, {"t": "As a routine first-line intervention for any client exhibiting talkativeness", "c": false, "w": "Seclusion is not a routine first-line intervention for mild manic symptoms like talkativeness; it is reserved for situations where safety is at substantial risk and less restrictive measures have failed."}, {"t": "Whenever a client requests a quiet space to rest", "c": false, "w": "A client's voluntary request for a quiet space does not require seclusion as a restrictive intervention; seclusion is used specifically when safety is at risk and behavior cannot be controlled through less restrictive means."}, {"t": "As a punitive measure for repeated rule-breaking on the unit", "c": false, "w": "Seclusion is a clinical safety intervention, not a punitive measure, and must be reserved for situations involving substantial risk of harm when less restrictive interventions have failed."}], "rationale": "Seclusion is warranted when there is a substantial risk of harm to others or self, the patient is unable to control their own actions, problematic behavior continues or escalates despite other measures, and less restrictive interventions have failed.", "tip": "NCLEX tip: Seclusion and restraint are always last-resort interventions in mental health nursing — always identify and attempt less restrictive measures first, and clearly document why they were insufficient.", "id": "m7_29", "module": 7}, {"type": "mc", "stem": "Which nursing diagnosis is most appropriate during the acute phase of a manic episode, given the client's excessive activity and poor oral intake?", "options": [{"t": "Deficient fluid volume related to hyperactivity and insufficient fluid intake", "c": true, "w": ""}, {"t": "Impaired role performance related to difficulty maintaining employment", "c": false, "w": "Impaired role performance is more relevant to the continuation/maintenance phase of bipolar disorder, not the acute phase, where physiological needs such as fluid volume take priority."}, {"t": "Caregiver role strain related to family stress", "c": false, "w": "Caregiver role strain is a concern more relevant to family members during the continuation/maintenance phase, not the client's own acute physiological needs during mania."}, {"t": "Impaired social interaction related to withdrawal from peers", "c": false, "w": "Mania is typically characterized by increased, not withdrawn, social interaction, and impaired social interaction is not the priority acute-phase diagnosis compared to a physiological concern like fluid volume."}], "rationale": "During the acute phase of mania, deficient fluid volume is a priority nursing diagnosis because hyperactivity, poor oral intake, and excessive energy expenditure place the client at high risk for dehydration and its complications.", "tip": "NCLEX tip: Acute-phase bipolar nursing diagnoses cluster around physiological safety (fluid volume, sleep, nutrition, cardiac status), while continuation/maintenance-phase diagnoses shift toward role performance and family coping.", "id": "m7_30", "module": 7}, {"type": "mc", "stem": "Which outcome would be appropriate for a client in Phase I (acute mania) of bipolar disorder treatment?", "options": [{"t": "The client will be well hydrated within 4 hours, as evidenced by good skin turgor and normal urinary output", "c": true, "w": ""}, {"t": "The client will attend psychoeducational classes about bipolar disorder within the next week", "c": false, "w": "Attending psychoeducational classes is an appropriate outcome for the continuation/maintenance phase, not the acute phase, when the priority is physiological stabilization and safety."}, {"t": "The client will participate in a support group for individuals with bipolar disorder", "c": false, "w": "Support group participation is a continuation/maintenance phase outcome, not an appropriate acute-phase goal focused on immediate safety and stabilization."}, {"t": "The client will engage in interpersonal and social rhythm therapy sessions", "c": false, "w": "IPSRT is a psychosocial intervention used in the continuation/maintenance phase, not an appropriate acute-phase outcome focused on physiological stabilization."}], "rationale": "Phase I (acute mania) outcomes focus on immediate physiological safety and stabilization, such as achieving adequate hydration within a short timeframe, stable cardiac status, adequate sleep, and self-control with the aid of staff or medication.", "tip": "NCLEX tip: Match outcomes to their treatment phase — acute phase outcomes are short-term and physiological, while continuation/maintenance phase outcomes involve longer-term psychosocial engagement.", "id": "m7_31", "module": 7}, {"type": "mc", "stem": "A nurse is teaching a nursing student about protecting a manic client's finances during hospitalization. Which action is most appropriate?", "options": [{"t": "Hold the client's valuables and money in the hospital safe and limit access to credit cards or large sums of cash", "c": true, "w": ""}, {"t": "Allow the client full, unrestricted access to personal finances to preserve autonomy", "c": false, "w": "Full unrestricted access is inappropriate given the client's impaired judgment and impulsivity during mania, which places them at high risk for giving away money or possessions inappropriately."}, {"t": "Encourage the client's family to make all future financial decisions permanently", "c": false, "w": "Permanent transfer of financial decision-making is an overreach; the goal during acute mania is short-term protection of assets, not permanent removal of the client's financial autonomy."}, {"t": "Wait until the client specifically requests help before restricting financial access", "c": false, "w": "Given the impaired judgment characteristic of mania, the nurse should proactively protect the client's finances rather than waiting for the client to request help, since impaired insight may prevent such a request."}], "rationale": "Protecting a manic client from giving away money or possessions by holding valuables in the hospital safe is an appropriate short-term safety measure, given the impaired judgment and impulsivity characteristic of acute mania.", "tip": "NCLEX tip: Financial protection during acute mania is a temporary safety measure tied to impaired judgment, not a permanent restriction of the client's autonomy.", "id": "m7_32", "module": 7}, {"type": "mc", "stem": "Which client behavior during acute mania requires the nurse to intervene with antipsychotics, sedatives, or seclusion as clinically indicated?", "options": [{"t": "Inappropriate sexual activity toward other clients on the unit", "c": true, "w": ""}, {"t": "Wearing several bright, mismatched articles of clothing", "c": false, "w": "While flamboyant dress requires gentle guidance and step-by-step reminders about appropriate attire, it does not typically require antipsychotics, sedatives, or seclusion."}, {"t": "Talking rapidly and jumping between topics during a conversation with staff", "c": false, "w": "Pressured speech and flight of ideas are managed through communication techniques like distraction and short explanations, not necessarily antipsychotics, sedatives, or seclusion alone."}, {"t": "Repeatedly starting new craft projects without finishing them", "c": false, "w": "Distractibility is managed with redirection and structured activities, not typically requiring antipsychotics, sedatives, or seclusion."}], "rationale": "Inappropriate sexual activity is a significant safety and dignity concern in acute mania that may require protective interventions, including antipsychotics, sedatives, or seclusion when clinically indicated, to protect both the client and others on the unit.", "tip": "NCLEX tip: Recognize that behavioral disinhibition (inappropriate sexual behavior) in mania is a safety issue requiring more assertive intervention than milder manic behaviors like talkativeness or flamboyant dress.", "id": "m7_33", "module": 7}, {"type": "mc", "stem": "A client taking lithium for bipolar disorder has a serum level of 1.8 mEq/L. Which finding would the nurse expect at this level?", "options": [{"t": "Coarse hand tremor, persistent GI upset, and mental confusion", "c": true, "w": ""}, {"t": "Fine tremor and mild nausea only, consistent with a therapeutic level", "c": false, "w": "A level of 1.8 mEq/L falls within the advanced toxicity range, which produces more severe symptoms than the fine tremor and mild nausea expected at therapeutic levels (0.4–1.0 mEq/L)."}, {"t": "Seizures, coma, and severe hypotension, consistent with life-threatening toxicity", "c": false, "w": "Seizures, coma, and severe hypotension are associated with severe toxicity (2.0–2.5 mEq/L) or life-threatening levels (>2.5 mEq/L), which are higher than the 1.8 mEq/L level described."}, {"t": "No symptoms at all, since lithium toxicity does not produce symptoms until levels exceed 2.5 mEq/L", "c": false, "w": "This is inaccurate; lithium toxicity produces a graded symptom progression starting well below 2.5 mEq/L, with advanced toxicity symptoms appearing in the 1.5–2.0 mEq/L range."}], "rationale": "A lithium level of 1.8 mEq/L falls within the advanced toxicity range (1.5–2.0 mEq/L), which produces coarse hand tremor, persistent gastrointestinal upset, mental confusion, and incoordination.", "tip": "NCLEX tip: Memorize the lithium toxicity ladder by range: 0.4–1.0 therapeutic, <1.5 early toxicity, 1.5–2.0 advanced toxicity, 2.0–2.5 severe toxicity, >2.5 life-threatening.", "id": "m7_34", "module": 7}, {"type": "mc", "stem": "A client on lithium therapy reports increased thirst, polyuria, and a fine hand tremor. The nurse checks the most recent lithium level, which is 0.9 mEq/L. How should the nurse interpret this finding?", "options": [{"t": "These are common, non-toxic side effects consistent with a therapeutic lithium level", "c": true, "w": ""}, {"t": "These findings indicate early lithium toxicity requiring the dose to be held immediately", "c": false, "w": "A level of 0.9 mEq/L falls within the therapeutic range (0.4–1.0 mEq/L); these symptoms are common, expected side effects at a therapeutic level, not early toxicity."}, {"t": "These findings indicate advanced toxicity requiring emergency intervention", "c": false, "w": "Advanced toxicity occurs at levels of 1.5–2.0 mEq/L and produces more severe symptoms like coarse tremor and confusion; this client's level and symptoms are consistent with a therapeutic, non-toxic presentation."}, {"t": "These findings are unrelated to lithium and require an unrelated medical workup", "c": false, "w": "These are well-documented common side effects of therapeutic lithium levels (fine tremor, polyuria, mild thirst), directly related to the medication rather than an unrelated condition."}], "rationale": "Fine tremor, polyuria, and mild thirst are common, non-toxic side effects that occur even at therapeutic lithium levels (0.4–1.0 mEq/L) and do not necessarily require the medication to be held, though ongoing monitoring is appropriate.", "tip": "NCLEX tip: Don't assume every lithium side effect equals toxicity — fine tremor, mild GI upset, polyuria, and mild thirst are expected findings even within the therapeutic range.", "id": "m7_35", "module": 7}, {"type": "mc", "stem": "Which of the following conditions would place a client on lithium therapy at increased risk for toxicity?", "options": [{"t": "A new prescription for an NSAID for chronic joint pain", "c": true, "w": ""}, {"t": "A recent increase in daily water intake to 10 glasses per day", "c": false, "w": "Consistent fluid intake, including around 8–12 glasses per day, is part of appropriate lithium teaching and helps maintain stable lithium levels rather than increasing toxicity risk."}, {"t": "A stable, unchanged low-sodium diet the client has followed for years", "c": false, "w": "It is a sudden change in sodium intake, not a stable, unchanged diet, that increases lithium toxicity risk; a consistent diet does not pose the same risk."}, {"t": "Regular, moderate daily exercise without excessive sweating", "c": false, "w": "Regular moderate exercise without excessive sweating does not significantly increase toxicity risk; it is excessive sweating and dehydration that raise lithium levels toward toxicity."}], "rationale": "NSAIDs can increase lithium levels and raise the risk of toxicity, along with dehydration, excessive sweating, excessive diarrhea or vomiting, a sudden increase in dietary sodium, and diuretic use.", "tip": "NCLEX tip: Build a lithium toxicity risk-factor list — NSAIDs, diuretics, dehydration, excessive sweating/diarrhea/vomiting, and sudden sodium changes — since these frequently appear as distractors or correct answers on medication-safety questions.", "id": "m7_36", "module": 7}, {"type": "mc", "stem": "A client newly started on lithium asks the nurse when blood levels will be checked relative to the daily dose. What is the most accurate response?", "options": [{"t": "\"Your blood will be drawn about 10 to 12 hours after your last dose.\"", "c": true, "w": ""}, {"t": "\"Your blood will be drawn immediately before your next dose, regardless of timing.\"", "c": false, "w": "While this may coincidentally align with the 10–12 hour window depending on dosing schedule, the specific standard is drawing levels 10–12 hours after the last dose, not simply \"immediately before the next dose\" without regard to timing."}, {"t": "\"Your blood will be drawn right after you take your dose, within the first hour.\"", "c": false, "w": "Drawing levels immediately after a dose would reflect peak, not trough, lithium concentration and would not accurately represent steady-state therapeutic or toxic levels."}, {"t": "\"Timing of the blood draw relative to your dose does not matter for lithium level monitoring.\"", "c": false, "w": "Timing matters significantly for accurate lithium level interpretation; levels are specifically drawn 10–12 hours after the last dose for consistency and accuracy."}], "rationale": "Lithium blood levels are drawn 10 to 12 hours after the last dose to provide a consistent, standardized measurement (similar to a trough level) that reliably reflects therapeutic versus toxic status.", "tip": "NCLEX tip: The \"10 to 12 hours after last dose\" timing detail for lithium level draws is a specific, testable fact — don't confuse it with peak-level timing.", "id": "m7_37", "module": 7}, {"type": "mc", "stem": "A client taking lithium develops excessive vomiting and diarrhea for several days due to a stomach virus. What is the priority nursing action?", "options": [{"t": "Instruct the client to stop the lithium and contact the prescriber promptly", "c": true, "w": ""}, {"t": "Encourage the client to double the next lithium dose to maintain steady blood levels", "c": false, "w": "Doubling the dose during a period of fluid loss would significantly increase the risk of toxicity, since dehydration from vomiting and diarrhea already raises lithium levels."}, {"t": "Advise the client to continue the lithium as prescribed with no changes", "c": false, "w": "Continuing lithium unchanged during a period of significant fluid loss increases the risk of toxicity, since dehydration concentrates the drug in the bloodstream."}, {"t": "Tell the client this is an expected side effect requiring no action", "c": false, "w": "Excessive vomiting and diarrhea are specific warning signs requiring the client to stop the lithium and contact the provider, not an expected side effect to ignore."}], "rationale": "Clients on lithium therapy are taught to stop the medication and contact their provider promptly if they experience excessive diarrhea, vomiting, or sweating, since these conditions cause dehydration that can rapidly raise lithium levels into the toxic range.", "tip": "NCLEX tip: \"Stop and call the provider\" for excessive GI losses is one of the most important lithium safety teaching points to reinforce with clients and caregivers.", "id": "m7_38", "module": 7}, {"type": "mc", "stem": "Which laboratory value should the nurse monitor long-term in a client on maintenance lithium therapy, given the medication's effect on the thyroid?", "options": [{"t": "Thyroid-stimulating hormone (TSH)", "c": true, "w": ""}, {"t": "Serum amylase", "c": false, "w": "Serum amylase is a pancreatic marker unrelated to lithium's known effect on thyroid function."}, {"t": "Serum albumin", "c": false, "w": "Serum albumin reflects nutritional and hepatic synthetic status, not the thyroid function affected by long-term lithium use."}, {"t": "Hemoglobin A1c", "c": false, "w": "Hemoglobin A1c reflects average blood glucose control, not the thyroid dysfunction associated with long-term lithium therapy."}], "rationale": "Long-term lithium therapy is associated with medication-induced hypothyroidism and goiter, so TSH should be monitored regularly, along with creatinine, BUN, and GFR to screen for lithium-related kidney dysfunction.", "tip": "NCLEX tip: Pair the two key long-term lithium monitoring targets together — thyroid function (TSH
