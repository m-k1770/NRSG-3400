<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRSG 3400 Exam Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0E1A2B;
  --bg-deep: #0A1420;
  --surface: #132338;
  --surface-2: #182B45;
  --ink: #EAF2F8;
  --ink-soft: #9FB4CC;
  --ink-mute: #6C7F98;
  --navy: #EAF2F8;
  --teal: #3FE0B0;
  --teal-dark: #1E6B57;
  --teal-pale: rgba(63,224,176,0.10);
  --amber: #F5B942;
  --amber-dark: #7A5A1E;
  --coral: #FF6E63;
  --coral-pale: rgba(255,110,99,0.10);
  --green: #5FE08A;
  --line: #28405E;
  --line-soft: #1E3350;
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
  --radius: 14px;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(ellipse at top, #102338 0%, var(--bg-deep) 70%);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  min-height: 100vh;
}
h1,h2,h3,h4,.display{
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.mono{font-family: var(--font-mono); letter-spacing: 0.02em;}
button{font-family: var(--font-body); cursor:pointer;}
::selection{background: var(--amber); color:#1a1200;}

#app{max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }
@media (max-width: 640px){ #app{padding: 0 14px 60px;} }

/* ---------- ECG Pulse strip (signature element) ---------- */
.pulse-strip{
  width:100%;
  height:40px;
  overflow:hidden;
  position:relative;
  margin-bottom: 6px;
}
.pulse-strip svg{width:100%; height:100%; display:block;}
.pulse-line{
  fill:none;
  stroke: var(--teal);
  stroke-width:1.6;
  stroke-linecap:round;
  stroke-linejoin:round;
  opacity:0.32;
}
.pulse-progress{
  fill:none;
  stroke: var(--amber);
  stroke-width:2.4;
  stroke-linecap:round;
  stroke-linejoin:round;
  transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
}

/* ---------- Top bar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 22px 0 8px;
  flex-wrap: wrap; gap: 10px;
}
.brand{
  display:flex; align-items:center; gap:12px;
}
.brand .mark{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 4px 9px;
  border-radius: 20px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.brand h1{font-size: 20px; margin:0; letter-spacing:0.2px;}
.topbar-actions{display:flex; gap:8px; flex-wrap:wrap;}

.btn{
  border:1px solid var(--line); border-radius: 10px; padding: 10px 16px;
  font-size: 14px; font-weight: 500;
  display:inline-flex; align-items:center; gap:6px;
  background: var(--surface); color: var(--ink);
  transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease, transform 0.1s ease;
}
.btn:active{transform: translateY(1px);}
.btn-ghost{
  background: transparent;
  color: var(--ink-soft);
}
.btn-ghost:hover{ border-color: var(--teal-dark); color: var(--teal); }
.btn-primary{
  background: var(--teal);
  color: #062A22;
  border-color: var(--teal);
  font-weight:600;
}
.btn-primary:hover{ background: #57e8bd; }
.btn-primary:disabled{ background: var(--teal-dark); color:#0b1f1a; border-color: var(--teal-dark); opacity:0.6; cursor:not-allowed;}
.btn-amber{
  background: var(--amber);
  color: #3A2900;
  border-color: var(--amber);
  font-weight:600;
}
.btn-amber:hover{background: #ffca63;}
.btn-coral{
  background: var(--coral);
  color:#3a0a05;
  border-color: var(--coral);
  font-weight:600;
}
.btn-coral:hover{background:#ff8a81;}
.btn-sm{padding:7px 13px; font-size:12.5px;}
.btn-icon{width:38px; height:38px; padding:0; display:inline-flex; align-items:center; justify-content:center; font-size:16px;}

/* ---------- Home screen ---------- */
.hero{
  padding: 20px 0 10px;
}
.hero .eyebrow{
  font-family: var(--font-mono); font-size: 12px; letter-spacing:0.14em; text-transform:uppercase;
  color: var(--amber); margin: 0 0 10px;
}
.hero h2{
  font-size: clamp(26px, 5vw, 38px);
  margin: 0 0 12px;
  line-height:1.15;
}
.hero p.lead{
  font-size: 15.5px; color: var(--ink-soft); max-width: 580px; margin: 0;
}

.type-filter{
  margin: 4px 0 22px;
}
.type-filter-label{
  font-family: var(--font-mono); font-size: 11px; letter-spacing:0.1em; text-transform:uppercase;
  color: var(--ink-mute); margin-bottom: 10px;
}
.type-chip-row{
  display:flex; flex-wrap:wrap; gap: 8px;
}
.type-chip{
  font-family: var(--font-body); font-size: 13.5px; font-weight:500;
  padding: 9px 16px; border-radius: 20px; border: 1px solid var(--line);
  background: var(--surface); color: var(--ink-mute);
  transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.type-chip:hover{ border-color: var(--teal-dark); color: var(--ink-soft); }
.type-chip.active{
  border-color: var(--teal); background: var(--teal-pale); color: var(--teal);
}
.tag.tag-off{ opacity: 0.35; }

.module-grid{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 16px; margin: 22px 0;
}
@media (max-width: 700px){ .module-grid{grid-template-columns: 1fr;} }


.module-card{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  position:relative;
  overflow:hidden;
  cursor: pointer;
  transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
}
.module-card:hover{ transform: translateY(-2px); border-color: var(--teal-dark); }
.module-card:focus-visible{ outline: 2px solid var(--teal); outline-offset: 2px; }
.module-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--line);
  transition: background 0.15s ease;
}
.module-card.active{ border-color: var(--teal); background: var(--surface-2); }
.module-card.active::before{ background: var(--teal); }
.module-card-top{
  display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 12px;
}
.module-card .module-title{
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  margin: 0;
  line-height: 1.1;
}
.module-card.active .module-title{ color: var(--teal); }
.select-indicator{
  font-family: var(--font-mono); font-size: 11px; letter-spacing:0.04em;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--line);
  color: var(--ink-mute); white-space:nowrap;
}
.module-card.active .select-indicator{
  color: var(--teal); border-color: var(--teal-dark); background: var(--teal-pale);
}
.module-theme{
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  line-height:1.4;
  margin: 2px 0 16px;
  color: var(--ink-soft);
}
.module-card.active .module-theme{ color: var(--ink); }

.qty-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 12px;}
.qty-row label{ font-size: 12.5px; color: var(--ink-mute); font-family: var(--font-mono);}
.qty-row input[type=number]{
  width: 70px; padding: 7px 8px; border-radius: 8px; border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 14px; text-align:center; color: var(--ink);
  background: var(--bg-deep);
}
.qty-row input[type=number]:focus{ outline:none; border-color: var(--teal-dark);}
.qty-row input[type=number]::-webkit-outer-spin-button,.qty-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}

.breakdown{
  display:flex; flex-wrap:wrap; gap:6px; margin-top: 6px;
}
.tag{
  font-family: var(--font-mono); font-size: 11px; padding: 3px 8px;
  border-radius: 20px; background: var(--surface-2); color: var(--ink-mute);
  border: 1px solid var(--line-soft);
}

.start-panel{
  display:flex; align-items:center; justify-content:space-between; gap: 16px;
  background: var(--surface-2); border-radius: var(--radius); padding: 20px 24px; flex-wrap: wrap;
  box-shadow: var(--shadow); border: 1px solid var(--line);
}
.start-panel .summary{ color: var(--ink-soft); font-size: 14px; }
.start-panel .summary strong{ color: var(--teal); font-family: var(--font-mono); }
.start-panel .btn-primary{ font-size:15px; padding: 12px 24px; }

.remediation-note{
  margin-top: 18px; padding: 16px 20px; border-radius: var(--radius);
  background: var(--surface-2); border: 1px solid var(--amber-dark); color: var(--ink);
  font-size: 13.5px; display:flex; align-items:center; justify-content:space-between; gap: 14px; flex-wrap: wrap;
}
.remediation-note strong{ color: var(--amber); }

/* ---------- Quiz screen ---------- */
.quiz-meta{
  display:flex; align-items:center; justify-content:space-between; padding: 4px 0 14px; flex-wrap:wrap; gap:10px;
}
.quiz-progress-label{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-mute); text-transform:uppercase; letter-spacing:0.05em;}
.quiz-progress-label b{ color: var(--ink); font-weight:600; }

.card{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 26px 26px 22px;
  box-shadow: var(--shadow);
  margin-bottom: 18px;
}
.q-eyebrow{
  display:inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing:1px; text-transform:uppercase;
  color: var(--teal); background: var(--teal-pale); padding: 4px 10px; border-radius:20px; margin-bottom: 16px;
}
.q-eyebrow .dot{display:none;}
.q-stem{ font-size: 17px; line-height:1.55; color: var(--ink); margin: 0 0 20px; }
.q-stem .blank{
  display:inline-block; min-width: 110px; border-bottom: 2px solid var(--teal);
  text-align:center; font-family: var(--font-mono); color: var(--teal); font-weight:600;
}

.options{ display:flex; flex-direction:column; gap:10px; }
.option{
  border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px;
  display:flex; align-items:flex-start; gap:12px; font-size: 14.5px; position:relative;
  transition: border-color 0.12s ease, background 0.12s ease;
  background: var(--surface-2);
}
.option:not(.locked):not(.selected):hover{ border-color: var(--line); background: #1c3151; cursor:pointer;}
.option .marker{
  flex-shrink:0; width:26px; height:26px; border-radius: 50%; background: var(--bg-deep); border: 1px solid var(--line);
  display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size:12px;
  color: var(--ink-soft); margin-top:1px; font-weight:500;
}
.option.sata .marker{ border-radius:6px; }
.option.selected{ border-color: var(--teal); background: var(--teal-pale); }
.option.selected .marker{ background: var(--teal); color:#062A22; border-color: var(--teal);}

.option.locked{ cursor: default; }
.option.correct-answer{ border-color: var(--green); background: rgba(95,224,138,0.10); }
.option.correct-answer .marker{ background: var(--green); color:#08300f; border-color: var(--green);}
.option.wrong-answer{ border-color: var(--coral); background: var(--coral-pale); }
.option.wrong-answer .marker{ background: var(--coral); color:#3a0a05; border-color: var(--coral);}
.option.wrong-answer:hover{ cursor: help; }
.option .why-tip{
  display:none; position:absolute; left:0; top:calc(100% + 6px); z-index:5; background: var(--bg-deep);
  border: 1px solid var(--coral); border-radius:8px; padding:10px 13px; font-size:12.5px; color: var(--ink-soft);
  width:100%; box-shadow: 0 8px 24px rgba(0,0,0,0.45);
}
.option.locked:hover{ cursor: help; }
.option.locked:hover .why-tip{ display:block; }

.result-icon{ margin-left:auto; font-weight:700; font-family: var(--font-display); }

.fib-row{ display:flex; align-items:center; gap: 12px; flex-wrap:wrap; }
.fib-row input[type=text]{
  flex: 1; min-width:220px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
  font-family: var(--font-body); font-size: 15px; color: var(--ink); background: var(--surface-2);
}
.fib-row input[type=text]:focus{ outline:none; border-color: var(--teal);}
.fib-row input.correct-answer{ border-color: var(--green); background: rgba(95,224,138,0.08); }
.fib-row input.wrong-answer{ border-color: var(--coral); background: var(--coral-pale); }

.bowtie-wrap{ display:flex; flex-direction:column; gap: 22px; }
.bowtie-col-title{ font-family: var(--font-mono); font-size:11.5px; color: var(--ink-mute); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.06em;}
.bowtie-col-hint{ font-weight:400; color: var(--ink-mute); text-transform:none; letter-spacing:0; }

.confirm-row{ margin-top: 20px; display:flex; gap:10px; flex-wrap:wrap; }

.feedback{
  margin-top: 20px; border-top: 1px dashed var(--line); padding-top: 18px;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
.feedback .verdict{
  font-family: var(--font-display); font-weight:600; font-size: 16px; margin-bottom: 12px;
  display:flex; align-items:center; gap:8px;
}
.feedback.is-correct .verdict{ color: var(--green); }
.feedback.is-wrong .verdict{ color: var(--coral); }
.feedback h4{
  font-family: var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:1px;
  margin: 14px 0 6px; display:flex; align-items:center; gap:6px;
}
.feedback h4:first-of-type{margin-top:2px;}
.feedback .is-correct ~ h4, .feedback h4{ color: var(--teal); }
.feedback p{ margin: 0; font-size: 14px; color: var(--ink-soft); line-height:1.6; background: var(--teal-pale); border: 1px solid var(--teal-dark); border-radius:10px; padding:14px 16px; }
.feedback h4:nth-of-type(2) + p{ background: rgba(245,185,66,0.07); border-color: var(--amber-dark); }

.nav-row{
  display:flex; align-items:center; justify-content:space-between; gap: 10px; flex-wrap:wrap; margin-top: 4px;
}
.nav-row .left-group, .nav-row .right-group{ display:flex; gap:8px; flex-wrap:wrap; }

/* ---------- Celebration screen ---------- */
.celebrate{
  text-align:center; padding: 50px 20px 30px;
}
.celebrate .big-pulse{ width:100%; max-width: 460px; margin: 0 auto 8px; }
.celebrate h2{ font-size: clamp(24px,5vw,34px); margin: 8px 0 10px; }
.celebrate p.msg{ font-size: 15px; color: var(--ink-soft); max-width: 480px; margin: 0 auto 26px; }
.score-badge{
  display:inline-flex; align-items:baseline; gap:8px; font-family: var(--font-mono);
  background: var(--surface); border: 1px solid var(--line); border-radius: 999px;
  padding: 10px 22px; margin-bottom: 26px; box-shadow: var(--shadow);
}
.score-badge .num{ font-size: 26px; font-weight:600; color: var(--teal); }
.score-badge .of{ font-size: 13px; color: var(--ink-mute); }
.celebrate .actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

/* ---------- Remediation ---------- */
.remediation-list{ display:flex; flex-direction:column; gap:10px; margin: 20px 0; }
.remediation-item{
  background: var(--surface); border:1px solid var(--coral-dim, var(--line)); border-radius:10px; padding:14px 16px;
  font-size: 13.5px; color: var(--ink-soft); display:flex; justify-content:space-between; gap:10px; align-items:center;
  border-left: 3px solid var(--coral);
}
.remediation-item .rq-eyebrow{font-family:var(--font-mono); font-size:10.5px; color: var(--coral); text-transform:uppercase; margin-bottom:4px; display:block;}

.empty-state{
  text-align:center; padding: 50px 20px; color: var(--ink-mute); font-size:14px;
}
.empty-state .big-emoji{ font-size: 40px; margin-bottom: 14px; }

footer.foot{
  text-align:center; padding: 30px 0 10px; color: var(--ink-mute); font-size:12px; font-family: var(--font-mono);
}
</style>
</head>

<script>
const QUIZ_DATA = {"module8": [{"type": "mc", "stem": "A nurse is caring for a 78-year-old client on the third postoperative day following hip surgery. The client is intermittently drowsy, has difficulty sustaining attention, and became suddenly disoriented to place this afternoon after being oriented this morning. Which condition should the nurse suspect first?", "options": [{"t": "Delirium", "c": true, "w": ""}, {"t": "Major neurocognitive disorder (dementia)", "c": false, "w": "Dementia develops gradually over months to years and does not typically present with an acute, fluctuating onset like this client's sudden afternoon change."}, {"t": "Pseudodementia related to untreated depression", "c": false, "w": "Pseudodementia mimics cognitive loss but has a gradual onset tied to mood symptoms, not an abrupt fluctuating course tied to a physiologic stressor like surgery."}, {"t": "Normal age-related forgetfulness", "c": false, "w": "Normal aging does not cause fluctuating disorientation or attention disturbance; this presentation is abnormal and requires prompt evaluation."}], "rationale": "Delirium is defined by an acute onset and a fluctuating course of disturbed attention and awareness, frequently triggered by a physiologic stressor such as surgery, anesthesia, infection, or medication effects. The postoperative period is a classic high-risk window.", "tip": "NCLEX tip: Whenever a stem describes a sudden change in mental status that fluctuates through the day, especially in a postoperative or hospitalized older adult, think delirium first and look for the underlying medical cause.", "id": "m8_0", "module": 8}, {"type": "mc", "stem": "Which type of delirium is most likely to be missed by nursing staff because the client appears merely sluggish and quiet rather than disturbed?", "options": [{"t": "Hyperactive delirium", "c": false, "w": "Hyperactive delirium presents with obvious restlessness, agitation, and rapid mood swings, making it far easier for staff to recognize than the quiet, withdrawn hypoactive form."}, {"t": "Hypoactive delirium", "c": true, "w": ""}, {"t": "Mixed delirium", "c": false, "w": "Mixed delirium alternates between hyperactive and hypoactive symptoms, so the more dramatic hyperactive phase tends to draw staff attention even though the hypoactive phase can still be under-recognized."}, {"t": "Subclinical delirium", "c": false, "w": "This is not one of the three recognized clinical types of delirium described in the textbook (hyperactive, hypoactive, mixed)."}], "rationale": "Hypoactive delirium presents with reduced motor activity, sluggishness, drowsiness, or a dazed appearance, and is the least recognized presentation because it is mistaken for fatigue, depression, or simply an older adult resting quietly.", "tip": "NCLEX tip: Quiet, withdrawn, and lethargic does not mean safe from delirium — hypoactive delirium is the most commonly overlooked subtype.", "id": "m8_1", "module": 8}, {"type": "mc", "stem": "The nurse is screening a newly admitted older adult for delirium risk using the MINDSPACES mnemonic. Which finding represents the 'S' for Surgery/invasive procedures component?", "options": [{"t": "The client had a hip replacement with general anesthesia two days ago", "c": true, "w": ""}, {"t": "The client takes six different prescription medications daily", "c": false, "w": "Multiple prescription medications correspond to the 'M' for Medications component of MINDSPACES, not the surgery component."}, {"t": "The client has a diagnosed urinary tract infection", "c": false, "w": "An active infection corresponds to the 'I' for Infection and advanced illness component, not the surgery component."}, {"t": "The client reports chronic uncontrolled low back pain", "c": false, "w": "Uncontrolled pain corresponds to the 'P' for Pain component of MINDSPACES, not the surgery component."}], "rationale": "In the MINDSPACES mnemonic, 'S' stands for Surgery and/or invasive procedures, including exposure to anesthesia medications, which are well-documented precipitants of postoperative delirium in older adults.", "tip": "NCLEX tip: Memorize MINDSPACES as a risk-screening tool: Medications, Infection, Number of comorbidities, Disorders of substance use, Surgery, Pain/perfusion, Age, Cognitive impairment, Emotional illness, Sleep disturbance.", "id": "m8_2", "module": 8}, {"type": "mc", "stem": "A client with delirium reports seeing bugs crawling on the bedsheets when the nurse observes only wrinkled linen at the bedside. How should the nurse best classify this perceptual disturbance?", "options": [{"t": "A hallucination, because the client is perceiving something that is not there at all", "c": false, "w": "A hallucination is a false sensory perception without any real external stimulus; here, an actual stimulus (wrinkled linen) is present but misinterpreted, so this is not a hallucination."}, {"t": "An illusion, because the client is misinterpreting an actual stimulus in the environment", "c": true, "w": ""}, {"t": "A delusion, because the client holds a fixed false belief", "c": false, "w": "A delusion is a fixed false belief not amenable to correction with evidence; this client is misperceiving a real sensory stimulus, which is a perceptual rather than a belief-based disturbance."}, {"t": "Confabulation, because the client is filling in memory gaps with fabricated details", "c": false, "w": "Confabulation involves unconsciously making up answers or stories to cover memory deficits, which is a feature of dementia assessment, not a perceptual disturbance in delirium."}], "rationale": "Illusions are errors in the interpretation of real external sensory stimuli, such as mistaking folds in bedclothes for insects or rodents. Because a real stimulus is involved, illusions can often be clarified and explained to the client, unlike hallucinations.", "tip": "NCLEX tip: If the stem includes a real object that is being misperceived, choose 'illusion.' If there is no real stimulus at all, choose 'hallucination.'", "id": "m8_3", "module": 8}, {"type": "mc", "stem": "Which nursing action takes priority in the plan of care for a client experiencing acute delirium?", "options": [{"t": "Ensuring physical safety and preventing injury", "c": true, "w": ""}, {"t": "Reorienting the client to the current news events of the day", "c": false, "w": "While orientation is important, engaging a confused client with complex current events is less useful than simple orientation to person, place, and time, and it does not address the most urgent safety concern."}, {"t": "Encouraging the client to reminisce about pleasant childhood memories", "c": false, "w": "Reminiscence therapy is beneficial for clients with dementia to support identity and mood, but it is not the priority intervention for a client in the midst of acute delirium."}, {"t": "Restricting all visitors to reduce environmental stimulation", "c": false, "w": "Family presence is actually encouraged to help orient and calm a delirious client; blanket visitor restriction is not an evidence-based priority action."}], "rationale": "Because delirium involves fluctuating attention, disorientation, and possible agitation or hallucinations, the client is at high risk for falls, wandering, and self-extubation of lines/tubes. Physical safety is always the top-priority nursing diagnosis and intervention in delirium.", "tip": "NCLEX tip: When ranking priorities in a confused or delirious client, safety interventions almost always outrank communication, psychosocial, or comfort interventions on the NCLEX.", "id": "m8_4", "module": 8}, {"type": "mc", "stem": "A student nurse asks why an older adult admitted for pneumonia is now confused and agitated at night after being clear-headed all day. Which explanation by the charge nurse best reflects an evidence-based understanding of delirium?", "options": [{"t": "This is expected sundowning, and the underlying infection and fluctuating course make delirium the most likely explanation", "c": true, "w": ""}, {"t": "This client most likely has undiagnosed Alzheimer's disease that is only now becoming apparent because of the hospitalization", "c": false, "w": "Alzheimer's disease has an insidious, gradual onset over months to years and would not explain a new, fluctuating confusion tied temporally to an acute infection."}, {"t": "This is a normal reaction to an unfamiliar hospital environment and requires no further assessment", "c": false, "w": "Environmental unfamiliarity can contribute to confusion, but new fluctuating confusion in the setting of infection must be worked up as delirium, not dismissed as normal."}, {"t": "This client is intentionally being difficult because he dislikes the nursing staff on the night shift", "c": false, "w": "Attributing new confusion to intentional behavior ignores the underlying physiologic cause and could lead to a missed or delayed diagnosis of a medical emergency."}], "rationale": "Delirium is always secondary to another condition — here, pneumonia (infection) is the likely precipitant. Sundown syndrome, worsening confusion in the evening/night, is a hallmark fluctuating feature of delirium and dementia alike, but the acute new onset in an infected client points to delirium.", "tip": "NCLEX tip: Always link new confusion in an acutely ill hospitalized client to a possible underlying medical cause — infection is one of the most common reversible causes of delirium.", "id": "m8_5", "module": 8}, {"type": "mc", "stem": "Which statement by a new nurse about caring for a client with acute delirium requires correction by the charge nurse?", "options": [{"t": "\"I'll ask his daughter to sit with him tonight since I have four other patients to monitor.\"", "c": true, "w": ""}, {"t": "\"I will keep his room well-lit and place his eyeglasses within reach.\"", "c": false, "w": "This is an appropriate intervention; adequate lighting and sensory aids help reduce illusions and support orientation in delirium."}, {"t": "\"I will reorient him to person, place, and time each time I enter the room.\"", "c": false, "w": "This is an appropriate and recommended intervention for a client experiencing delirium."}, {"t": "\"I will monitor his oxygen saturation closely since hypoxia can worsen confusion.\"", "c": false, "w": "This is an appropriate action; hypoxia is a common reversible contributor to delirium and should be assessed and corrected."}], "rationale": "Family and visiting friends should never be given sole responsibility for sitting with or monitoring a confused patient; trained staff or sitters remain responsible for ensuring safety. A patient in acute delirium should never be left unsupervised, and that responsibility cannot be delegated to family members.", "tip": "NCLEX tip: Family can help orient and comfort a delirious client, but safety monitoring responsibility always remains with trained staff, not family or friends.", "id": "m8_6", "module": 8}, {"type": "mc", "stem": "A nurse assessing a client with delirium notes elevated heart rate, diaphoresis, flushed face, and dilated pupils. These findings best reflect which aspect of delirium's physical presentation?", "options": [{"t": "Autonomic nervous system hyperactivity", "c": true, "w": ""}, {"t": "A normal, expected response to hospitalization stress that needs no documentation", "c": false, "w": "Autonomic changes in delirium can signal a serious underlying physiologic disturbance and must be documented and reported, not dismissed as an unremarkable stress response."}, {"t": "Classic signs of opioid withdrawal that occur in all delirious clients", "c": false, "w": "Autonomic hyperactivity occurs across many causes of delirium, not exclusively opioid withdrawal; the stem gives no history suggesting opioid use."}, {"t": "An expected finding of hypoactive delirium", "c": false, "w": "These sympathetic, hyperaroused findings are more consistent with hyperactive features and biophysical instability, not the sluggish, low-arousal hypoactive subtype."}], "rationale": "Elevations in autonomic responses — tachycardia, diaphoresis, flushing, and pupil dilation — reflect biophysical instability that requires prompt monitoring and documentation, as they can indicate a worsening underlying medical condition requiring immediate attention.", "tip": "NCLEX tip: Vital sign and autonomic changes in a confused client are never 'just stress' — they must be reported because they may reflect a treatable underlying cause of delirium.", "id": "m8_7", "module": 8}, {"type": "mc", "stem": "According to Table 18.3 in the textbook, which feature best differentiates delirium from major neurocognitive disorder (dementia)?", "options": [{"t": "Delirium has an altered level of consciousness, while consciousness is typically not altered in dementia", "c": true, "w": ""}, {"t": "Delirium always produces a fixed, unchanging level of impaired memory, while dementia fluctuates throughout the day", "c": false, "w": "This describes the features backwards — it is delirium, not dementia, that characteristically fluctuates throughout the day, while dementia's decline is generally steady and progressive."}, {"t": "Delirium has a slow insidious onset over years, while dementia has a sudden onset over hours", "c": false, "w": "This is reversed; delirium has a sudden onset over hours to days, while dementia develops slowly over months to years."}, {"t": "Delirium is never reversible, while dementia is always reversible with treatment", "c": false, "w": "This is essentially backwards — delirium is potentially reversible if the underlying cause is corrected promptly, whereas most major neurocognitive disorders (e.g., Alzheimer's disease) are progressive and irreversible."}], "rationale": "A defining differentiator is level of consciousness: it is altered/fluctuating in delirium (from hypervigilant to lethargic) but generally not altered in dementia. Delirium also has a sudden onset and is often reversible, while dementia has a slow, usually irreversible, progressive course.", "tip": "NCLEX tip: Build a simple mental table for delirium vs. dementia vs. depression — onset speed, course (fluctuating vs. steady), consciousness level, and reversibility are the four fastest discriminators on exam questions.", "id": "m8_8", "module": 8}, {"type": "mc", "stem": "A nurse is caring for a client with delirium who becomes combative and yells insults at staff during morning care. What is the nurse's most therapeutic response?", "options": [{"t": "Acknowledge how upset the client feels while ignoring the personal insults", "c": true, "w": ""}, {"t": "Firmly tell the client that such language will not be tolerated on the unit", "c": false, "w": "A confrontational, limit-setting response to a delirious client's verbal outburst can escalate agitation; the disturbance is physiologically driven and not a matter of intentional disrespect requiring discipline."}, {"t": "Leave the room immediately to allow the client time to calm down alone", "c": false, "w": "Leaving a delirious, combative client alone raises the risk of injury and abandons monitoring responsibilities; the client should not be left unsupervised."}, {"t": "Document the exact insults for a formal complaint against the client", "c": false, "w": "Personal insults during delirium reflect the underlying confusional state, not intentional harm, and should be handled therapeutically rather than escalated as a formal grievance."}], "rationale": "For combative behavior during delirium, the recommended approach is to ignore personal insults (which stem from confusion, not intentional malice) while acknowledging and validating how upset the person feels, maintaining a calm and nonjudgmental presence.", "tip": "NCLEX tip: With confused or delirious clients, address the emotion behind aggressive behavior rather than the literal words or behavior itself.", "id": "m8_9", "module": 8}, {"type": "mc", "stem": "Which of the following is the single greatest overall risk factor for developing delirium in a hospitalized client?", "options": [{"t": "Advanced age combined with an acute medical illness", "c": true, "w": ""}, {"t": "A family history of Alzheimer's disease alone", "c": false, "w": "Family history is a risk factor for Alzheimer's disease specifically, but it is not the primary driver of an acute delirium episode, which is tied to a current physiologic disturbance."}, {"t": "Being younger than 40 years of age with no comorbidities", "c": false, "w": "While delirium can occur at any age, young age with no comorbidities is a lower-risk profile, not the highest risk profile described in the text."}, {"t": "A stable chronic diagnosis of hypertension well-controlled on medication", "c": false, "w": "A single well-controlled chronic condition is a much lower risk factor compared to an acute superimposed illness, especially combined with older age."}], "rationale": "Delirium prevalence rates are strikingly high in vulnerable groups: 15%-53% of postsurgical older adults, up to 60% of older nursing home residents, and 70%-87% of ICU patients — reflecting how advanced age combined with acute illness, surgery, or critical illness sharply raises risk.", "tip": "NCLEX tip: When a question stem combines 'older adult' with 'acute illness, surgery, or ICU stay,' delirium risk should be at the top of your differential.", "id": "m8_10", "module": 8}, {"type": "mc", "stem": "The nurse reviews orders for a client with severe agitation related to delirium. Which class of medication may be used cautiously and only in specific, infrequent situations to help manage behavioral symptoms?", "options": [{"t": "Antipsychotics or antianxiety agents", "c": true, "w": ""}, {"t": "Long-term daily benzodiazepine maintenance therapy as a first-line standard for all delirium", "c": false, "w": "Benzodiazepines are not a first-line standard treatment for delirium in general (except delirium related to alcohol/sedative withdrawal) and are used cautiously due to risk of worsening confusion."}, {"t": "Routine scheduled opioid analgesics regardless of pain assessment", "c": false, "w": "Opioids should be given based on an individualized pain assessment, not administered routinely without cause, and unnecessary opioid use can actually worsen delirium."}, {"t": "High-dose stimulant medication to increase alertness", "c": false, "w": "Stimulants are not an evidence-based treatment for delirium and could worsen autonomic instability and agitation."}], "rationale": "Antipsychotic or antianxiety agents may be used in very specific and infrequent situations to help control behavioral symptoms of delirium, but the priority intervention remains identifying and treating the underlying medical cause.", "tip": "NCLEX tip: Medications for delirium are adjuncts for safety, not the primary treatment — the primary treatment is always correcting the underlying physiological cause.", "id": "m8_11", "module": 8}, {"type": "mc", "stem": "A nurse is developing a plan of care for a hospitalized client at high risk for delirium. Which intervention is most appropriate for promoting early progressive mobility?", "options": [{"t": "Assisting the client out of bed to a chair or for ambulation two to four times per day", "c": true, "w": ""}, {"t": "Keeping the client on strict bedrest to conserve energy and prevent falls", "c": false, "w": "Prolonged immobility is actually a risk factor for delirium and functional decline; strict bedrest is not the recommended intervention for delirium prevention."}, {"t": "Applying soft wrist restraints to prevent the client from getting out of bed unsupervised", "c": false, "w": "Restraints are not a first-line delirium prevention strategy and may increase agitation; trained sitters and mobility, not restraints, are recommended."}, {"t": "Limiting mobility to once daily to avoid overexertion", "c": false, "w": "Recommended guidelines call for mobilizing the client two to four times per day, not just once, to reduce delirium risk and preserve function."}], "rationale": "Evidence-based delirium prevention protocols recommend early progressive mobility, mobilizing the client two to four times per day, since immobility contributes to functional decline, increased delirium risk, and complications such as pressure injuries and deconditioning.", "tip": "NCLEX tip: 'Early progressive mobility' is a recurring evidence-based delirium-prevention concept — pair it mentally with the number two to four times daily.", "id": "m8_12", "module": 8}, {"type": "sata", "stem": "Select all findings that are consistent with hyperactive delirium.", "options": [{"t": "Restlessness and pacing", "c": true, "w": ""}, {"t": "Rapid mood swings", "c": true, "w": ""}, {"t": "Visual hallucinations", "c": true, "w": ""}, {"t": "Profound drowsiness and reduced motor activity", "c": false, "w": "Reduced motor activity and drowsiness describe the hypoactive subtype, which is the opposite presentation of hyperactive delirium."}, {"t": "Sluggishness and seeming dazed", "c": false, "w": "Sluggishness and a dazed appearance are hallmark features of hypoactive delirium, not hyperactive delirium."}], "rationale": "Hyperactive delirium is characterized by restlessness, pacing, agitation, rapid mood swings, and sometimes hallucinations, in direct contrast to the reduced motor activity and drowsiness seen in hypoactive delirium.", "tip": "NCLEX tip: For SATA questions on delirium subtypes, sort each option into 'busy and agitated' (hyperactive) versus 'quiet and slow' (hypoactive) to quickly identify matches.", "id": "m8_13", "module": 8}, {"type": "fib", "stem": "The mnemonic used to screen hospitalized clients for delirium risk factors, which includes Medications, Infection, Number of comorbidities, Disorders of substance use, Surgery, Pain, Age, Cognitive impairment, Emotional illness, and Sleep disturbance, is called _____.", "answers": ["mindspaces"], "rationale": "MINDSPACES is the mnemonic nurses use to systematically screen for delirium risk factors on admission and throughout a hospital stay, allowing for early prevention and intervention strategies.", "tip": "NCLEX tip: Spelling out mnemonics like MINDSPACES letter by letter during study sessions helps you recall the full risk-factor list under exam pressure.", "id": "m8_14", "module": 8}, {"type": "fib", "stem": "A validated bedside screening tool commonly used to diagnose delirium, based on assessing acute onset and fluctuating course, inattention, disorganized thinking, and altered level of consciousness, is called the Confusion Assessment Method, abbreviated _____.", "answers": ["cam"], "rationale": "The CAM (and its short form, CAM-S, or the b-CAM used in busy settings like the emergency department) is a validated, widely used tool for rapid delirium screening at the bedside.", "tip": "NCLEX tip: Recognize 'CAM' as the go-to validated delirium screening instrument distinct from cognitive tests like the MMSE, which assess dementia-type cognitive decline.", "id": "m8_15", "module": 8}, {"type": "mc", "stem": "A 72-year-old client can still manage bill paying and cooking but takes noticeably longer and relies on written lists to compensate for memory lapses. Which level of cognitive impairment best fits this presentation?", "options": [{"t": "Mild cognitive impairment (mild neurocognitive disorder)", "c": true, "w": ""}, {"t": "Major neurocognitive disorder (dementia)", "c": false, "w": "Major NCD involves impairment substantial enough to interfere with independence in everyday activities; this client is still independently managing finances and cooking, just with more effort and compensatory strategies."}, {"t": "Delirium", "c": false, "w": "Delirium presents with an acute, fluctuating disturbance in attention and awareness, not a gradual, compensated decline in instrumental activities of daily living."}, {"t": "Normal, unremarkable aging with no clinical significance", "c": false, "w": "A modest but real decline requiring greater time, effort, and compensatory strategies for tasks is clinically significant and meets criteria for mild neurocognitive disorder, not normal aging."}], "rationale": "Mild neurocognitive disorder involves modest cognitive impairment that does not interfere with the capacity for independent everyday activities, though greater time, effort, or compensatory strategies (like lists) may be needed to complete tasks.", "tip": "NCLEX tip: The key differentiator between mild and major NCD is whether the person remains independent in daily activities (mild) or has lost independence (major).", "id": "m8_16", "module": 8}, {"type": "mc", "stem": "Which statement about Alzheimer's disease (AD) is accurate?", "options": [{"t": "AD is the most common cause of major neurocognitive disorder (dementia), accounting for 60%-80% of cases", "c": true, "w": ""}, {"t": "AD is one of the least common causes of dementia, accounting for less than 5% of cases", "c": false, "w": "This is incorrect; Alzheimer's disease is in fact the most common cause of dementia, accounting for the large majority (60%-80%) of dementia cases, not a rare cause."}, {"t": "AD always develops more rapidly than delirium and has an acute, hours-long onset", "c": false, "w": "This reverses the actual pattern — dementia, including AD, usually develops more slowly than delirium, over months to years rather than hours to days."}, {"t": "AD is fully reversible if caught in the earliest stage", "c": false, "w": "Alzheimer's disease is a primary, progressive neurocognitive disorder that is not reversible; available medications may slow but do not reverse or cure the disease."}], "rationale": "Alzheimer's disease is the most common subtype of major neurocognitive disorder and the leading cause of dementia overall, accounting for 60%-80% of cases, and it develops more slowly than delirium with a progressive, irreversible course.", "tip": "NCLEX tip: Know your percentages — AD (60%-80% of dementia) is far more common than vascular dementia, which is the second leading cause.", "id": "m8_17", "module": 8}, {"type": "mc", "stem": "Genetic testing reveals that a 42-year-old client has a mutation in the presenilin-1 (PS-1) gene on chromosome 14. What should the nurse understand about this finding?", "options": [{"t": "This mutation confers a 95%-100% chance of developing early-onset Alzheimer's disease", "c": true, "w": ""}, {"t": "This mutation is the APOE e4 allele, which only modestly increases the risk of late-onset AD", "c": false, "w": "APOE e4 is a separate genetic risk factor located on a different chromosome that increases risk without guaranteeing disease; PS-1 mutations are deterministic mutations causing early-onset AD specifically."}, {"t": "This mutation has no established link to Alzheimer's disease risk", "c": false, "w": "PS-1 mutations are one of three well-established genetic mutations (with APP and PS-2) known to cause a very high likelihood of early-onset Alzheimer's disease."}, {"t": "This mutation is protective and reduces the client's lifetime risk of dementia", "c": false, "w": "PS-1 mutations dramatically increase, rather than reduce, the risk of developing early-onset Alzheimer's disease."}], "rationale": "Mutations in three specific genes — APP (chromosome 21), PS-1 (chromosome 14), and PS-2 (chromosome 1) — are associated with a 95%-100% chance of developing early-onset Alzheimer's disease, which typically develops between ages 30 and 60 and accounts for only about 5% of AD cases.", "tip": "NCLEX tip: Distinguish APOE e4 (increases risk of late-onset AD, does not guarantee disease) from APP/PS-1/PS-2 mutations (deterministic, near-certain cause of early-onset AD).", "id": "m8_18", "module": 8}, {"type": "mc", "stem": "A nurse is teaching a family about the four defense behaviors commonly seen in early Alzheimer's disease. Which behavior is best described as the unconscious fabrication of stories or answers to preserve self-esteem?", "options": [{"t": "Confabulation", "c": true, "w": ""}, {"t": "Perseveration", "c": false, "w": "Perseveration refers to the repetition of phrases or behaviors, often intensified under stress, not the fabrication of stories to fill memory gaps."}, {"t": "Denial", "c": false, "w": "Denial refers to a covering-up defense mechanism in which the person minimizes or refuses to acknowledge the deficit itself, rather than actively fabricating detailed answers."}, {"t": "Avoidance of questions", "c": false, "w": "Avoidance of questions involves sidestepping or deflecting direct questioning altogether, rather than unconsciously inventing plausible-sounding answers."}], "rationale": "Confabulation is the unconscious fabrication of answers or stories in an attempt to maintain self-esteem when memory fails; it is not intentional lying, but rather a defense mechanism against the threat of exposed memory loss.", "tip": "NCLEX tip: Remember confabulation is unconscious, not deliberate deception — this distinction is frequently tested.", "id": "m8_19", "module": 8}, {"type": "mc", "stem": "Which of the 'Four A's' of cognitive impairment describes the progressive loss of the ability to recognize familiar objects or people, despite normal sensory function?", "options": [{"t": "Agnosia", "c": true, "w": ""}, {"t": "Aphasia", "c": false, "w": "Aphasia refers to a loss of language ability, such as word-finding difficulty, not the loss of recognition of previously familiar objects or people."}, {"t": "Apraxia", "c": false, "w": "Apraxia refers to loss of purposeful movement in the absence of motor or sensory impairment, such as difficulty performing a learned motor task, not a recognition deficit."}, {"t": "Amnesia", "c": false, "w": "Amnesia refers to memory impairment itself, whereas agnosia specifically involves losing the ability to interpret sensory information to recognize objects or people despite intact sensory organs."}], "rationale": "Agnosia is the loss of the sensory ability to recognize objects, sounds, or touch (auditory, visual, or tactile), and in advanced Alzheimer's disease, this can progress to the point where a person no longer recognizes loved ones or even parts of their own body.", "tip": "NCLEX tip: Keep the Four A's straight: Amnesia = memory, Aphasia = language, Apraxia = purposeful movement, Agnosia = recognition.", "id": "m8_20", "module": 8}, {"type": "mc", "stem": "A family member describes their loved one with Alzheimer's disease as having significant memory gaps, apraxia, labile mood, and difficulty with self-care, but the person can still recognize immediate family members. Which stage of Alzheimer's disease does this best represent?", "options": [{"t": "Stage 2 (moderate)", "c": true, "w": ""}, {"t": "Stage 1 (mild)", "c": false, "w": "Stage 1 is characterized primarily by forgetfulness and possible depression, without the self-care gaps and apraxia described in this scenario."}, {"t": "Stage 3 (moderate to severe)", "c": false, "w": "Stage 3 is marked by an inability to identify familiar objects or people, with advanced agnosia and apraxia, which is more severe than this client's continued recognition of family members."}, {"t": "Stage 4 (late/end-stage)", "c": false, "w": "Stage 4 involves end-stage features such as agraphia, hyperorality, and hypermetamorphosis, which are far more advanced than the moderate impairment described here."}], "rationale": "Stage 2 (moderate) Alzheimer's disease is characterized by confusion, memory gaps, self-care gaps, apraxia, and labile mood, while some recognition of family may still be preserved, distinguishing it from the more advanced agnosia of Stage 3.", "tip": "NCLEX tip: Map the four AD stages sequentially: Stage 1 forgetfulness, Stage 2 confusion/self-care gaps, Stage 3 loss of recognition (agnosia/apraxia advance), Stage 4 end-stage (mute, primitive reflexes).", "id": "m8_21", "module": 8}, {"type": "mc", "stem": "Which nursing communication technique is most appropriate when a client with Alzheimer's disease insists that her deceased husband is coming to pick her up for dinner?", "options": [{"t": "Acknowledge her feelings and gently reinforce reality without directly arguing about the delusion", "c": true, "w": ""}, {"t": "Firmly explain that her husband has died so she does not continue to believe the delusion", "c": false, "w": "Bluntly confronting the delusion with the fact of the spouse's death can cause acute grief reactions and emotional distress, and does not align with the recommended approach of not arguing directly with delusions."}, {"t": "Agree enthusiastically that her husband will indeed be arriving soon to avoid upsetting her", "c": false, "w": "Actively reinforcing a false belief is not therapeutic; the goal is to acknowledge feelings and reinforce reality gently, not to affirm the delusion as true."}, {"t": "Ignore the statement completely and change the subject without any acknowledgment", "c": false, "w": "Completely ignoring the client's expressed feelings misses an opportunity to validate emotion and does not align with acknowledging feelings while reinforcing reality."}], "rationale": "When a client with dementia is delusional, the nurse should acknowledge the client's feelings and reinforce reality, without directly arguing about or refuting the delusion, which helps maintain trust and reduces distress.", "tip": "NCLEX tip: With dementia-related delusions, validate the emotion, gently reorient to reality, but avoid direct confrontation or argument.", "id": "m8_22", "module": 8}, {"type": "mc", "stem": "A nurse caring for a client with moderate Alzheimer's disease plans communication strategies for the client's care. Which technique is most appropriate?", "options": [{"t": "Standing one to two arm lengths away and maintaining face-to-face contact while speaking slowly", "c": true, "w": ""}, {"t": "Speaking quickly and using complex medical terminology to convey full information efficiently", "c": false, "w": "Quick speech and complex terminology overwhelm clients with cognitive impairment; short, simple words and unhurried pacing are recommended instead."}, {"t": "Presenting several pieces of information simultaneously so the client receives a complete picture at once", "c": false, "w": "The recommended approach is to focus on one piece of information at a time, as clients with dementia can become overwhelmed or confused by multiple simultaneous messages."}, {"t": "Standing behind the client while speaking to avoid startling them", "c": false, "w": "Face-to-face contact, not speaking from behind, is recommended to help the client see and process the communication, reducing confusion and improving comprehension."}], "rationale": "Recommended communication guidelines for clients with Alzheimer's disease include maintaining face-to-face contact, standing one to two arm lengths away, speaking slowly, using short simple words/phrases, and focusing on one piece of information at a time.", "tip": "NCLEX tip: For dementia communication questions, look for options describing simple, slow, one-idea-at-a-time, face-to-face techniques as the correct choice.", "id": "m8_23", "module": 8}, {"type": "mc", "stem": "Which class of medication works primarily by preventing the breakdown of acetylcholine and is FDA-approved for mild-to-moderate Alzheimer's disease?", "options": [{"t": "Cholinesterase inhibitors", "c": true, "w": ""}, {"t": "NMDA receptor antagonists", "c": false, "w": "NMDA antagonists such as memantine work by regulating glutamate activity and are used for moderate-to-severe AD, not by preventing acetylcholine breakdown."}, {"t": "Selective serotonin reuptake inhibitors", "c": false, "w": "SSRIs are used to address coexisting depression in AD, not to directly target the cholinergic pathway involved in AD's core cognitive symptoms."}, {"t": "Typical antipsychotics", "c": false, "w": "Typical antipsychotics are not first-line AD treatments and are not related to acetylcholine preservation; they carry a black box warning for increased mortality in dementia patients."}], "rationale": "Cholinesterase inhibitors (galantamine/Razadyne, rivastigmine/Exelon, donepezil/Aricept) prevent the breakdown of acetylcholine and stimulate nicotinic receptors to release more acetylcholine, delaying symptom worsening for a limited time in mild-to-moderate AD.", "tip": "NCLEX tip: Remember the three cholinesterase inhibitors for AD (Razadyne, Exelon, Aricept) versus the one NMDA antagonist (Namenda) used for more advanced disease.", "id": "m8_24", "module": 8}, {"type": "mc", "stem": "A client with moderate-to-severe Alzheimer's disease is prescribed memantine hydrochloride (Namenda). The nurse understands this medication works by which mechanism?", "options": [{"t": "Regulating glutamate activity and inhibiting excess intracellular calcium influx", "c": true, "w": ""}, {"t": "Preventing breakdown of acetylcholine at the synaptic cleft", "c": false, "w": "This describes the mechanism of cholinesterase inhibitors like donepezil, not memantine, which acts on the glutamatergic (NMDA) system instead."}, {"t": "Blocking dopamine D2 receptors in the mesolimbic pathway", "c": false, "w": "Dopamine D2 receptor blockade describes the mechanism of antipsychotic medications, not memantine's NMDA-receptor mechanism."}, {"t": "Increasing serotonin availability in the synaptic cleft", "c": false, "w": "Increasing serotonin availability describes SSRIs used for comorbid depression, not memantine's distinct glutamate-regulating mechanism."}], "rationale": "Memantine (Namenda) is an NMDA receptor antagonist that regulates glutamate and inhibits toxic intracellular calcium influx, and it is indicated for moderate-to-severe Alzheimer's disease, often alongside a cholinesterase inhibitor.", "tip": "NCLEX tip: Memantine = glutamate/NMDA; cholinesterase inhibitors = acetylcholine. Keep these two AD drug mechanisms distinctly separate in your mind.", "id": "m8_25", "module": 8}, {"type": "mc", "stem": "Which finding in a client with Alzheimer's disease is most consistent with end-stage (Stage 4) disease?", "options": [{"t": "Loss of the ability to eat, swallow, or chew, with return of primitive infantile reflexes", "c": true, "w": ""}, {"t": "Mild forgetfulness with intact self-care abilities and possible depression", "c": false, "w": "This describes Stage 1 (mild) disease, which is far less advanced than the profound physical decline of end-stage disease."}, {"t": "Progressive memory loss requiring assistance with money management and transportation but preserved ambulation", "c": false, "w": "This describes Stage 2 (moderate) disease, in which instrumental activities of daily living are impaired but basic physical functions like ambulation are typically preserved."}, {"t": "Inability to identify familiar objects with advanced agnosia and apraxia but preserved ambulation", "c": false, "w": "This describes Stage 3 (moderate to severe) disease; end-stage disease progresses further to nonambulatory status and loss of purposeful activity."}], "rationale": "End-stage (Stage 4) Alzheimer's disease is characterized by an inability to eat, swallow, or chew, immobility, incontinence, muteness, and the return of primitive (infantile) reflexes, reflecting near-total loss of higher brain function.", "tip": "NCLEX tip: Primitive reflex return is a hallmark, testable clue for identifying the most advanced (end) stage of Alzheimer's disease.", "id": "m8_26", "module": 8}, {"type": "mc", "stem": "A nurse educates a caregiver about community resources available to support a family caring for a relative with Alzheimer's disease. Which resource would best provide the caregiver with scheduled short-term relief from caregiving duties?", "options": [{"t": "Respite and residential services", "c": true, "w": ""}, {"t": "Meals on Wheels", "c": false, "w": "Meals on Wheels addresses nutritional needs by delivering food to the home; it does not provide the caregiver with a break from caregiving responsibilities."}, {"t": "Legal services", "c": false, "w": "Legal services assist with matters such as power of attorney or advance directives; they do not directly provide caregiver relief from day-to-day care demands."}, {"t": "Transportation services", "c": false, "w": "Transportation services help with mobility to appointments or activities, but they do not specifically provide the caregiver with scheduled time off from caregiving."}], "rationale": "Respite and residential services are specifically designed to give family caregivers scheduled relief from the demands of caregiving, helping to prevent caregiver burnout and supporting the caregiver's own health and well-being.", "tip": "NCLEX tip: When a question asks about caregiver relief specifically, look for 'respite' among the answer choices — it is the term most directly tied to caregiver breaks.", "id": "m8_27", "module": 8}, {"type": "mc", "stem": "Which of the following best explains why cultural considerations are important when caring for diverse populations affected by Alzheimer's disease?", "options": [{"t": "Variations in health, lifestyle, and socioeconomic risk factors across racial and ethnic groups, rather than genetics alone, largely account for differences in AD risk and acceptance of the diagnosis", "c": true, "w": ""}, {"t": "Alzheimer's disease has entirely different underlying pathology and brain lesions in different racial groups", "c": false, "w": "The core neuropathology of AD, such as amyloid plaques and neurofibrillary tangles, does not differ by race; rather, differences in risk are primarily linked to lifestyle and socioeconomic factors."}, {"t": "Only genetic factors, not lifestyle or socioeconomic factors, explain differences in AD incidence between racial groups", "c": false, "w": "The text specifically states that variations in health, lifestyle, and socioeconomic risk factors, not genetic factors alone, account for most of the differences in AD risk between racial groups."}, {"t": "Cultural background has no bearing on how families understand or accept an Alzheimer's diagnosis", "c": false, "w": "The text explicitly states that acceptance of Alzheimer's disease varies greatly among cultural groups, making this option factually incorrect."}], "rationale": "Although AD symptom presentation is similar across groups, differences in incidence by race/ethnicity are more likely explained by variations in health, lifestyle, and socioeconomic risk factors than by genetic differences, and acceptance of the diagnosis varies widely by culture.", "tip": "NCLEX tip: When a question addresses racial/ethnic disparities in a chronic disease, consider social determinants of health as the more likely explanation over genetics alone.", "id": "m8_28", "module": 8}, {"type": "sata", "stem": "Select all appropriate nursing interventions for a client with moderate Alzheimer's disease who becomes anxious and agitated in the late afternoon (sundowning).", "options": [{"t": "Maintain a consistent daily routine and minimize environmental changes", "c": true, "w": ""}, {"t": "Decrease excessive noise and stimulation in the environment", "c": true, "w": ""}, {"t": "Provide a calm, well-lit environment during the evening hours", "c": true, "w": ""}, {"t": "Introduce several new unfamiliar staff members each evening to provide variety", "c": false, "w": "Frequent, unfamiliar staff changes increase confusion and anxiety in clients with dementia; consistency of caregivers is recommended instead."}, {"t": "Abruptly confront the client about the irrationality of the anxious feelings", "c": false, "w": "Direct confrontation about the irrationality of feelings is not therapeutic and can increase agitation; listening, reassurance, and environmental modification are recommended instead."}], "rationale": "Appropriate interventions for anxiety and agitation (including sundowning) in dementia include maintaining routines, modifying the environment to reduce noise and overstimulation, and ensuring a calm, familiar, and well-lit setting, rather than introducing unfamiliar people or confrontation.", "tip": "NCLEX tip: For sundowning/agitation SATA items, choose consistency, calm environment, and reassurance; avoid options describing change, confrontation, or unfamiliar stimulation.", "id": "m8_29", "module": 8}, {"type": "sata", "stem": "Select all risk factors associated with the development of Alzheimer's disease.", "options": [{"t": "Advancing age beyond 65 years", "c": true, "w": ""}, {"t": "Presence of the APOE e4 allele", "c": true, "w": ""}, {"t": "History of traumatic brain injury", "c": true, "w": ""}, {"t": "Regular cardiovascular exercise throughout adulthood", "c": false, "w": "Regular physical activity and cardiovascular risk management are associated with reduced, not increased, risk of cognitive decline."}, {"t": "Higher level of formal education and ongoing lifelong learning", "c": false, "w": "Higher education and continued mental engagement are associated with a reduced risk of cognitive decline, not an increased risk."}], "rationale": "Established AD risk factors include advancing age (the single greatest risk factor, doubling after age 65), the APOE e4 allele, family history, cardiovascular disease/risk factors, lower education, and traumatic brain injury, while physical activity, healthy diet, and lifelong learning are protective factors.", "tip": "NCLEX tip: In SATA risk-factor questions, watch for 'protective factor' distractors disguised as risk factors — regular exercise and higher education reduce risk rather than increase it.", "id": "m8_30", "module": 8}, {"type": "fib", "stem": "The two hallmark neuropathological brain lesions found in Alzheimer's disease are amyloid (senile) plaques and neurofibrillary _____.", "answers": ["tangles"], "rationale": "The two main brain lesions in Alzheimer's disease are amyloid/senile plaques (extracellular deposits of beta-amyloid) and neurofibrillary tangles (intracellular accumulations of abnormal tau protein), both of which disrupt neuronal communication and contribute to cell death.", "tip": "NCLEX tip: Pair 'plaques' with amyloid/beta-amyloid and 'tangles' with tau protein to keep the two hallmark AD lesions straight.", "id": "m8_31", "module": 8}, {"type": "fib", "stem": "The scale used to quantify intellectual and personality deterioration in dementia to help plan interventions and track disease progression is called the _____ Dementia Scale.", "answers": ["blessed"], "rationale": "The Blessed Dementia Scale quantifies intellectual and personality deterioration, helping the interdisciplinary team plan appropriate interventions and monitor disease progression over time.", "tip": "NCLEX tip: Recognize named assessment scales (Blessed Dementia Scale, MMSE, MoCA, SLUMS, Mini-Cog) and know which condition or purpose each serves.", "id": "m8_32", "module": 8}, {"type": "mc", "stem": "A client tells the nurse, 'I've tried to cut back on drinking so many times, but I just can't seem to stop once I start, and I keep drinking way more than I plan to.' This statement best reflects which DSM-5 diagnostic criterion for substance use disorder?", "options": [{"t": "Substance taken in larger amounts or over a longer period than intended, plus unsuccessful efforts to cut down", "c": true, "w": ""}, {"t": "Tolerance, defined as needing increasing amounts of the substance to achieve the same effect", "c": false, "w": "The client's statement centers on quantity and unsuccessful attempts to control use, not specifically on needing progressively higher doses for the same effect, which defines tolerance."}, {"t": "Withdrawal, defined as substance-specific physical symptoms upon cessation", "c": false, "w": "Withdrawal refers to physical/psychological symptoms after stopping or reducing use, which is not what the client is describing in this statement about ongoing use patterns."}, {"t": "Craving, defined as a strong desire or urge to use the substance", "c": false, "w": "While craving is a related criterion, this statement specifically emphasizes taking more than intended and failed attempts to cut down, which maps most directly onto the amount/duration and control criteria."}], "rationale": "Two of the eleven DSM-5 SUD criteria are: (1) substance taken in larger amounts/longer than intended, and (2) persistent desire or unsuccessful efforts to cut down or control use — both of which are directly reflected in this client's statement.", "tip": "NCLEX tip: When a stem quotes a client describing a specific behavior, match the wording closely to the specific DSM-5 criterion rather than a related but distinct concept like tolerance or withdrawal.", "id": "m8_33", "module": 8}, {"type": "mc", "stem": "A client with a long history of heavy drinking now requires nearly twice the amount of alcohol to feel intoxicated compared to a few years ago. This phenomenon is known as:", "options": [{"t": "Tolerance", "c": true, "w": ""}, {"t": "Cross-dependence", "c": false, "w": "Cross-dependence describes substituting dependence on one drug for another (e.g., methadone replacing heroin), not the need for higher doses of the same substance to achieve the same effect."}, {"t": "Synergistic effect", "c": false, "w": "A synergistic effect describes the combined effect of two different drugs being greater than the sum of their individual effects, not an increased requirement for a single substance over time."}, {"t": "Flashback", "c": false, "w": "A flashback is a transitory recurrence of a perceptual disturbance from earlier hallucinogen use occurring in a drug-free state, unrelated to needing more of a substance for the same effect."}], "rationale": "Tolerance is the phenomenon in which increasing doses of a substance are needed over time to achieve the same effect that was previously obtained with a lower dose, reflecting neuroadaptation to repeated substance exposure.", "tip": "NCLEX tip: Distinguish tolerance (need more for the same effect) from withdrawal (symptoms upon stopping) — they are related but distinct SUD phenomena.", "id": "m8_34", "module": 8}, {"type": "mc", "stem": "A client who has developed tolerance to alcohol also finds that she now requires higher-than-typical doses of a prescribed benzodiazepine to achieve sedation. This is an example of:", "options": [{"t": "Cross-tolerance", "c": true, "w": ""}, {"t": "Antagonistic effect", "c": false, "w": "An antagonistic effect describes one drug weakening or inhibiting another drug's effect (such as naloxone reversing opioid overdose), not needing higher doses of a related drug class due to tolerance."}, {"t": "Codependency", "c": false, "w": "Codependency describes a dysfunctional relationship pattern in which one person enables another's addictive behavior; it is unrelated to needing higher medication doses due to pharmacologic tolerance."}, {"t": "Blackout", "c": false, "w": "A blackout refers to amnesia for events that occurred during a drinking episode without loss of consciousness, which is unrelated to needing higher medication doses for sedation."}], "rationale": "Cross-tolerance occurs when tolerance to one drug confers tolerance to a pharmacologically related drug, as seen with alcohol and benzodiazepines, both of which act on GABA receptors — this is why heavy drinkers often require higher benzodiazepine doses.", "tip": "NCLEX tip: Alcohol and benzodiazepines share a GABA mechanism, explaining their well-documented cross-tolerance and cross-dependence relationship.", "id": "m8_35", "module": 8}, {"type": "mc", "stem": "Which statement best describes the neurobiological basis of addiction according to current theory?", "options": [{"t": "Psychoactive drugs release far more dopamine in the brain's reward circuit than natural rewards, strongly reinforcing repeated use", "c": true, "w": ""}, {"t": "Addiction results exclusively from a personal moral failing with no identifiable neurobiological basis", "c": false, "w": "This reflects an outdated, stigmatizing view; addiction is understood as a chronic, relapsing brain disease with a well-documented neurobiological basis involving the reward circuit."}, {"t": "The reward circuit involved in addiction is located exclusively in the cerebellum and has no connection to the limbic system", "c": false, "w": "The brain's reward circuit centers on the limbic system (ventral tegmental area, nucleus accumbens) and connects with the cerebral cortex, not the cerebellum."}, {"t": "Dopamine has no meaningful role in the reinforcement of substance use behaviors", "c": false, "w": "Dopamine is central to the brain's reward pathway and plays a critical role in reinforcing the pleasurable effects of psychoactive substances."}], "rationale": "The brain's reward circuit — the ventral tegmental area, nucleus accumbens, and connections to the cerebral cortex — is activated by both natural rewards and psychoactive substances, but drugs release far more dopamine, powerfully reinforcing repeated substance-seeking behavior.", "tip": "NCLEX tip: Addiction is framed as a chronic, relapsing brain disease rooted in reward-circuit neurobiology, not simply a matter of willpower or moral failing.", "id": "m8_36", "module": 8}, {"type": "mc", "stem": "A client in early recovery reports intense cravings to drink whenever he drives past his old neighborhood bar, even though he has had no alcohol in months. Which neurobiological mechanism best explains this phenomenon?", "options": [{"t": "Glutamate-related changes creating cue-associated cravings", "c": true, "w": ""}, {"t": "Loss of endogenous opioid receptor sensitivity", "c": false, "w": "Reduced endogenous opioid receptor sensitivity relates more to physical dependence on opioids and the need for the drug to feel 'normal,' not specifically to environmental cue-triggered cravings."}, {"t": "Increased GABA synthesis in the brainstem", "c": false, "w": "Increased GABA synthesis is not the mechanism described for environmental cue-triggered cravings; in fact, decreased GABA synthesis contributes to withdrawal hyperexcitability, a different phenomenon."}, {"t": "Acetylcholine depletion in the hippocampus", "c": false, "w": "Acetylcholine depletion in the hippocampus is more associated with memory impairment in conditions like Alzheimer's disease, not with environmental cue-triggered substance cravings."}], "rationale": "Glutamate-related neuroadaptations create strong cue-associated cravings, so previously neutral stimuli (like a bar or a certain street) become powerfully linked with drug use and can trigger intense cravings — this is why people in recovery are advised to avoid known triggers.", "tip": "NCLEX tip: Recognize environmental or situational triggers for craving as a glutamate-mediated learning phenomenon, distinct from the dopamine-driven 'high' itself.", "id": "m8_37", "module": 8}, {"type": "mc", "stem": "A client asks the nurse how much of their risk for developing an alcohol use disorder is inherited. Which response is most accurate?", "options": [{"t": "\"Genetic factors are believed to account for about 40% to 60% of a person's vulnerability to addiction.\"", "c": true, "w": ""}, {"t": "\"Genetics play no meaningful role — addiction is entirely determined by environment and choice.\"", "c": false, "w": "This is inaccurate; genetic factors are estimated to account for a substantial 40%-60% of vulnerability to addiction, so genetics do play a meaningful role."}, {"t": "\"Genetics account for nearly 100% of the risk, meaning environment plays almost no role at all.\"", "c": false, "w": "This overstates the genetic contribution; while significant, genetics account for only about 40%-60% of vulnerability, leaving substantial room for environmental and psychosocial factors."}, {"t": "\"There is no reliable research on the heritability of substance use disorders.\"", "c": false, "w": "There is well-established research, cited in the textbook, indicating that genetic factors account for 40%-60% of vulnerability to addiction."}], "rationale": "Genetic factors are believed to account for between 40% and 60% of a person's vulnerability to addiction, reflecting a substantial but not deterministic genetic contribution alongside environmental and psychosocial risk factors.", "tip": "NCLEX tip: Memorize the 40%-60% genetic contribution figure for addiction vulnerability — it is a frequently tested statistic.", "id": "m8_38", "module": 8}, {"type": "mc", "stem": "Which of the following describes an antagonistic drug effect?", "options": [{"t": "Naloxone reversing the respiratory depression caused by an opioid overdose", "c": true, "w": ""}, {"t": "Alcohol combined with a benzodiazepine causing far greater central nervous system depression than either drug alone", "c": false, "w": "This describes a synergistic effect, in which the combined effect exceeds the sum of the individual effects, which is the opposite of an antagonistic (effect-weakening) relationship."}, {"t": "A client switching from heroin dependence to methadone dependence during treatment", "c": false, "w": "This describes cross-dependence, substituting dependence on one drug for another, not one drug canceling out the effect of another."}, {"t": "A heavy drinker requiring higher doses of a sedative to achieve the same calming effect", "c": false, "w": "This describes cross-tolerance between alcohol and sedative-hypnotics, not an antagonistic relationship where one drug counteracts another's effects."}], "rationale": "An antagonistic effect occurs when one drug weakens or inhibits the effect of another, exemplified by naloxone (an opioid antagonist) reversing the respiratory and CNS depression of opioid overdose.", "tip": "NCLEX tip: Naloxone reversing an opioid overdose is the textbook example of an antagonistic drug effect — commit this pairing to memory.", "id": "m8_39", "module": 8}, {"type": "mc", "stem": "A nurse is caring for a client who died of a drug overdose. Autopsy toxicology reveals both alcohol and benzodiazepine use immediately prior to death. Which concept best explains why this combination is so frequently associated with unintentional overdose death?", "options": [{"t": "Synergistic CNS depressant effects that are greater than the sum of either drug alone", "c": true, "w": ""}, {"t": "Antagonistic effects that should have protected against overdose", "c": false, "w": "Antagonistic effects would counteract one another and reduce risk, which is the opposite of what happens with alcohol and benzodiazepines, a combination that dangerously amplifies CNS depression."}, {"t": "Cross-dependence, in which one drug substitutes for the other", "c": false, "w": "Cross-dependence describes substituting one drug's use for another over time in a treatment context, not the acute combined toxic effect of taking two CNS depressants together."}, {"t": "Codependency between the user and a family member", "c": false, "w": "Codependency is a relationship-based concept involving an enabling family member, which is unrelated to the pharmacologic mechanism behind a combined-drug overdose death."}], "rationale": "Alcohol and benzodiazepines produce a synergistic effect, in which combined central nervous system depression is far greater than the sum of the individual drug effects, making this combination a common cause of unintentional overdose death.", "tip": "NCLEX tip: Synergistic CNS depressant combinations (alcohol + benzodiazepines, or opioids + benzodiazepines) are classic, frequently tested overdose-risk scenarios.", "id": "m8_40", "module": 8}, {"type": "mc", "stem": "A spouse of a client with a long-standing alcohol use disorder consistently calls the client's employer to make excuses for absences, hides bottles of alcohol to control access, and manages all of the family's finances due to the client's impaired judgment. This behavior pattern is best described as:", "options": [{"t": "Codependency", "c": true, "w": ""}, {"t": "Cross-dependence", "c": false, "w": "Cross-dependence describes substituting dependence from one drug to another in the person with the substance use disorder, not the enabling behavior pattern of a family member."}, {"t": "Harm reduction", "c": false, "w": "Harm reduction is a public-health strategy (such as needle-exchange programs) aimed at reducing the impact of drug use on the community, not a description of an enabling family relationship."}, {"t": "Motivational interviewing", "c": false, "w": "Motivational interviewing is a therapeutic counseling technique used by clinicians to help clients build motivation for change, not a description of a family member's enabling behaviors."}], "rationale": "Codependency describes a dysfunctional helping relationship in which one person enables another's compulsive or addictive behavior — behaviors include covering up, excusing, controlling finances, and hiding substances — often at significant cost to the codependent person's own well-being.", "tip": "NCLEX tip: Codependency questions typically describe a family member's enabling behaviors (excusing, covering, controlling) rather than the substance user's own symptoms.", "id": "m8_41", "module": 8}, {"type": "mc", "stem": "A nurse is assessing psychosocial and cultural risk factors for substance use disorder in an adolescent client. Which of the following, according to the textbook, is identified as a risk factor?", "options": [{"t": "Adverse childhood experiences (ACEs) and inadequate parental supervision", "c": true, "w": ""}, {"t": "Strong, consistent parental supervision paired with high socioeconomic stability", "c": false, "w": "Strong parental supervision and socioeconomic stability are protective factors rather than risk factors for the development of a substance use disorder."}, {"t": "High levels of self-image, self-control, and social competence", "c": false, "w": "High self-image, self-control, and social competence are protective, not risk, factors; the text identifies poor self-image, self-control, or social competence as risk factors instead."}, {"t": "Living in a high-income neighborhood with abundant employment opportunities", "c": false, "w": "Lack of employment and neighborhood poverty are listed as risk factors; a high-income neighborhood with abundant opportunity would not be considered a risk factor."}], "rationale": "Psychosocial and cultural risk factors for SUD include adverse childhood experiences (ACEs), inadequate parental supervision, racism, lack of economic opportunity, poor self-image/self-control/social competence, unemployment, neighborhood poverty, and peer group behavior.", "tip": "NCLEX tip: For SUD risk-factor questions, be alert to answer choices that describe protective factors worded to sound like risks — read carefully before selecting.", "id": "m8_42", "module": 8}, {"type": "mc", "stem": "A pregnant client with a history of heavy alcohol use throughout pregnancy delivers an infant with intellectual disability, delayed growth, and distinctive facial abnormalities. Which condition should the nurse suspect?", "options": [{"t": "Fetal alcohol syndrome (FAS)", "c": true, "w": ""}, {"t": "Neonatal abstinence syndrome", "c": false, "w": "Neonatal abstinence syndrome is associated with maternal opioid use and presents with CNS irritability such as high-pitched crying and tremors, not the intellectual disability/growth delay/facial abnormality triad described here."}, {"t": "Fetal hydantoin syndrome", "c": false, "w": "This is not the condition described in the source material; the classic triad of intellectual disability, delayed growth, and facial abnormalities associated with prenatal alcohol exposure is fetal alcohol syndrome."}, {"t": "Cerebral palsy secondary to nicotine exposure", "c": false, "w": "Cerebral palsy is associated with nicotine exposure risk in the source material, but the specific triad described (intellectual disability, growth delay, facial abnormalities) defines fetal
