  remediationIdx:0,
};

function getModule(key){ return MODULES.find(m=>m.key===key); }

function loadProgress(){
  try{
    const raw = sessionStorage.getItem('examProgress');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveProgress(){
  try{
    sessionStorage.setItem('examProgress', JSON.stringify({answers:state.answers}));
  }catch(e){}
}
state.answers = loadProgress().answers || {};

function shuffleArr(a){
  const arr = a.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function qKey(modKey, qid){ return modKey+':'+qid; }

function startModule(key, count){
  state.moduleKey = key;
  const mod = getModule(key);
  const total = mod.questions.length;
  let ids = mod.questions.map(q=>q.id);

  let n = null;
  if(count !== null && count !== undefined && !isNaN(count)){
    n = Math.floor(count);
  }
  if(n !== null && n > 0 && n < total){
    ids = shuffleArr(ids).slice(0, n);
  }
  // if n is invalid (<=0), NaN, blank, or >= total, use the full question set in its original order

  state.order = ids;
  state.idx = 0;
  state.screen = 'quiz';
  state.remediationMode = false;
  render();
}

function swapCurrentQuestion(){
  const modKey = state.moduleKey;
  const mod = getModule(modKey);
  const currentId = state.order[state.idx];
  const ans = state.answers[qKey(modKey, currentId)];
  if(ans && ans.confirmed) return; // don't swap out a question that's already been answered

  const usedIds = new Set(state.order);
  const unusedPool = mod.questions.map(q=>q.id).filter(id=>!usedIds.has(id));
  if(unusedPool.length === 0) return; // no fresh question left in the bank to swap in

  const newId = unusedPool[Math.floor(Math.random()*unusedPool.length)];
  state.order[state.idx] = newId;
  render();
}

function goHome(){
  state.screen='home';
  state.moduleKey = null;
  render();
}

function nextQ(){
  const list = state.remediationMode ? state.remediationOrder : state.order;
  const cur = state.remediationMode ? state.remediationIdx : state.idx;
  if(cur < list.length-1){
    if(state.remediationMode) state.remediationIdx++; else state.idx++;
    render();
  } else {
    if(state.remediationMode){ state.screen='remediation-done'; }
    else { state.screen='celebrate'; }
    render();
  }
}
function prevQ(){
  const cur = state.remediationMode ? state.remediationIdx : state.idx;
  if(cur>0){
    if(state.remediationMode) state.remediationIdx--; else state.idx--;
    render();
  }
}

function currentQuestion(){
  if(state.remediationMode){
    const entry = state.remediationOrder[state.remediationIdx];
    return {q: findQuestionById(entry.modKey, entry.qid), modKey: entry.modKey};
  }
  const qid = state.order[state.idx];
  return {q: findQuestionById(state.moduleKey, qid), modKey: state.moduleKey};
}

function findQuestionById(modKey, qid){
  return getModule(modKey).questions.find(q=>q.id===qid);
}

function confirmAnswer(modKey, q){
  const key = qKey(modKey, q.id);
  const ans = state.answers[key];
  if(!ans || ans.confirmed) return;
  let correct = false;
  if(q.type==='mc'){
    correct = ans.selected!==undefined && q.options[ans.selected].c;
  } else if(q.type==='sata'){
    const correctSet = q.options.map((o,i)=>o.c?i:null).filter(i=>i!==null);
    const selSet = (ans.selected||[]).slice().sort();
    correct = correctSet.length===selSet.length && correctSet.every((v,i)=>v===selSet[i]);
  } else if(q.type==='fill'){
    const val = (ans.text||'').trim().toLowerCase();
    correct = q.answers.some(a=>a.toLowerCase()===val);
  } else if(q.type==='bowtie'){
    correct = q.sections.every((sec,si)=>{
      const correctSet = sec.options.map((o,i)=>o.c?i:null).filter(i=>i!==null);
      const sel = (ans.selected && ans.selected[si]) || [];
      const selSorted = sel.slice().sort();
      return correctSet.length===selSorted.length && correctSet.every((v,i)=>v===selSorted[i]);
    });
  } else if(q.type==='hotspot'){
    const correctSet = q.passage.map((p,i)=>p.c?i:null).filter(i=>i!==null);
    const sel = (ans.selected||[]).slice().sort();
    correct = correctSet.length===sel.length && correctSet.every((v,i)=>v===sel[i]);
  }
  ans.confirmed = true;
  ans.correct = correct;
  saveProgress();
  if(!correct){
    const exists = state.remediationQueue.find(r=>r.modKey===modKey && r.qid===q.id);
    if(!exists) state.remediationQueue.push({modKey, qid:q.id});
  } else {
    state.remediationQueue = state.remediationQueue.filter(r=>!(r.modKey===modKey && r.qid===q.id));
  }
  render();
}

function setSelection(modKey, qid, value, type){
  const key = qKey(modKey, qid);
  if(!state.answers[key]) state.answers[key] = {};
  const ans = state.answers[key];
  if(ans.confirmed) return;
  if(type==='mc'){
    ans.selected = value;
  } else if(type==='sata' || type==='hotspot'){
    ans.selected = ans.selected || [];
    const i = ans.selected.indexOf(value);
    if(i>-1) ans.selected.splice(i,1); else ans.selected.push(value);
  } else if(type==='fill'){
    ans.text = value;
  } else if(type==='bowtie'){
    ans.selected = ans.selected || [[],[],[]];
    const secIdx = value.sec, optIdx = value.opt;
    const arr = ans.selected[secIdx] || [];
    const pos = arr.indexOf(optIdx);
    if(pos>-1) arr.splice(pos,1); else arr.push(optIdx);
    ans.selected[secIdx] = arr;
  }
  render();
}

function startRemediation(){
  state.remediationOrder = state.remediationQueue.slice();
  state.remediationIdx = 0;
  state.remediationMode = true;
  state.screen = 'quiz';
  render();
}

function moduleStats(key){
  const mod = getModule(key);
  let answered=0, correct=0;
  mod.questions.forEach(q=>{
    const a = state.answers[qKey(key,q.id)];
    if(a && a.confirmed){ answered++; if(a.correct) correct++; }
  });
  return {total:mod.questions.length, answered, correct};
}

function escapeHtml(s){
  return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const LETTERS = ['A','B','C','D','E','F'];

function ecgSvg(){
  return '<svg viewBox="0 0 800 34" preserveAspectRatio="none"><path class="ecg-line" d="M0,17 L120,17 L135,17 L145,4 L155,30 L165,17 L200,17 L215,17 L225,10 L235,24 L245,17 L400,17 L415,17 L425,4 L435,30 L445,17 L480,17 L495,17 L505,10 L515,24 L525,17 L680,17 L695,17 L705,4 L715,30 L725,17 L800,17"/></svg>';
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==='home'){ app.innerHTML = renderHome(); attachHomeHandlers(); return; }
  if(state.screen==='quiz'){ app.innerHTML = renderQuizShell(); attachQuizHandlers(); return; }
  if(state.screen==='celebrate'){ app.innerHTML = renderCelebrate(); attachCelebrateHandlers(); return; }
  if(state.screen==='remediation-list'){ app.innerHTML = renderRemediationList(); attachRemediationHandlers(); return; }
  if(state.screen==='remediation-done'){ app.innerHTML = renderRemediationDone(); attachRemediationDoneHandlers(); return; }
}

function renderTopbar(showHome){
  return '<div class="topbar">'
    + '<div class="brand"><svg class="brand-mark" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="#3FE0B0" stroke-width="1.5" opacity="0.5"/><path d="M4,20 L13,20 L16,9 L20,31 L23,14 L26,20 L36,20" fill="none" stroke="#3FE0B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      + '<div class="brand-text"><h1>Adults I Exam 3 Practice</h1><p>NRSG 3320 &middot; Renal, GI &amp; Hepatobiliary review</p></div></div>'
    + (showHome? '<button class="home-btn" id="btnHome"><i>&#8962;</i> Home</button>' : '')
    + '</div>'
    + '<div class="ecg-strip">'+ecgSvg()+'</div>';
}

function renderHome(){
  let html = renderTopbar(false);
  html += '<div class="hero"><div class="eyebrow">Exam 3 &middot; Modules 8&ndash;10</div>'
    + '<h2>Chart review before you round on the real thing.</h2>'
    + '<p>Three modules, 300 questions total (100 per module), five item types &mdash; multiple choice, SATA, fill-in-the-blank, bowtie, and hotspot. Choose how many questions you want per session, then confirm each answer to reveal the rationale and an NCLEX tip, and hover any wrong choice to see why it\'s wrong.</p></div>';

  html += '<div class="module-grid">';
  MODULES.forEach(m=>{
    const stats = moduleStats(m.key);
    const total = m.questions.length;
    html += '<div class="mod-card" data-mod="'+m.key+'"><div class="bar"></div>'
      + '<div class="tag">'+m.title+'</div>'
      + '<h3>'+m.subtitle+'</h3>'
      + '<div class="desc">'+total+' practice questions covering the module\'s highest-yield content.</div>'
      + '<div class="stats"><span><b>'+stats.answered+'</b>/'+stats.total+' done</span><span><b>'+stats.correct+'</b> correct</span></div>'
      + '<div class="qcount-row">'
        + '<label>Questions: <input type="number" class="qcount-input" data-mod="'+m.key+'" min="1" max="'+total+'" placeholder="'+total+'"></label>'
        + '<button class="btn btn-primary btn-sm btn-start" data-mod="'+m.key+'">Start Quiz</button>'
        + '<span class="qcount-hint">Leave blank for all '+total+', or type 1&ndash;'+total+'.</span>'
      + '</div>'
      + '</div>';
  });
  html += '</div>';

  if(state.remediationQueue.length>0){
    html += '<div class="remediation-banner"><div class="txt"><strong>Remediation available.</strong>'
      + '<p>You have '+state.remediationQueue.length+' missed question'+(state.remediationQueue.length===1?'':'s')+' saved for review.</p></div>'
      + '<button class="btn btn-amber" id="btnGoRemediation">Review missed questions</button></div>';
  }
  return html;
}

function attachHomeHandlers(){
  document.querySelectorAll('.btn-start').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const key = btn.getAttribute('data-mod');
      const input = document.querySelector('.qcount-input[data-mod="'+key+'"]');
      const raw = input ? input.value.trim() : '';
      const count = raw === '' ? null : parseInt(raw, 10);
      startModule(key, count);
    });
  });
  document.querySelectorAll('.qcount-input').forEach(inp=>{
    inp.addEventListener('click', (e)=> e.stopPropagation());
    inp.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const key = inp.getAttribute('data-mod');
        const raw = inp.value.trim();
        const count = raw === '' ? null : parseInt(raw, 10);
        startModule(key, count);
      }
    });
  });
  const rb = document.getElementById('btnGoRemediation');
  if(rb) rb.addEventListener('click', ()=>{ state.screen='remediation-list'; render(); });
}

function renderQuizShell(){
  const mod = state.remediationMode ? null : getModule(state.moduleKey);
  const {q, modKey} = currentQuestion();
  const list = state.remediationMode ? state.remediationOrder : state.order;
  const cur = state.remediationMode ? state.remediationIdx : state.idx;
  const stats = state.remediationMode ? null : moduleStats(state.moduleKey);

  let html = renderTopbar(true);
  html += '<div class="quiz-head"><div class="modname">'+(state.remediationMode? 'Remediation review' : mod.title+' &middot; '+mod.subtitle)+'</div>';
  html += '<div class="progress-wrap">';
  if(!state.remediationMode){
    html += '<span class="score-pill">'+stats.correct+' / '+stats.answered+' correct</span>';
  }
  html += '<div class="progress-track"><div class="progress-fill" style="width:'+Math.round(((cur+1)/list.length)*100)+'%"></div></div>';
  html += '<span class="progress-txt">'+(cur+1)+' / '+list.length+'</span></div></div>';

  html += renderQuestionCard(q, modKey);

  html += '<div class="qfooter">';
  html += '<div class="nav-group">';
  html += '<button class="btn" id="btnPrev" '+(cur===0?'disabled':'')+'>&larr; Previous</button>';
  html += '<button class="btn" id="btnNext">'+(cur===list.length-1? 'Finish':'Next &rarr;')+'</button>';
  html += '</div>';
  html += '<div class="nav-group">';
  if(!state.remediationMode){
    const curConfirmed = !!optAnsweredData(modKey, q).confirmed;
    if(!curConfirmed) html += '<button class="btn" id="btnShuffle"><i>&#8635;</i> New question</button>';
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function optAnsweredData(modKey, q){
  return state.answers[qKey(modKey,q.id)] || {};
}

function renderQuestionCard(q, modKey){
  const ans = optAnsweredData(modKey, q);
  const confirmed = !!ans.confirmed;
  let html = '<div class="qcard">';
  const badgeClass = {mc:'qtype-mc',sata:'qtype-sata',fill:'qtype-fill',bowtie:'qtype-bowtie',hotspot:'qtype-hotspot'}[q.type];
  const badgeLabel = {mc:'Multiple choice',sata:'Select all that apply',fill:'Fill in the blank',bowtie:'Bowtie',hotspot:'Hotspot'}[q.type];
  html += '<span class="qtype-badge '+badgeClass+'">'+badgeLabel+'</span>';
  html += '<div class="qstem">'+escapeHtml(q.stem)+'</div>';

  if(q.type==='mc'){
    q.options.forEach((o,i)=>{
      let cls='opt';
      if(!confirmed && ans.selected===i) cls+=' selected';
      if(confirmed && o.c) cls+=' correct-reveal';
      if(confirmed && !o.c && ans.selected===i) cls+=' incorrect-reveal';
      html += '<div class="'+cls+'" data-idx="'+i+'">'
        + '<div class="letter">'+LETTERS[i]+'</div><div class="otext">'+escapeHtml(o.t)+'</div>';
      if(confirmed && !o.c) html += '<div class="why-tip">'+escapeHtml(o.why)+'</div>';
      html += '</div>';
    });
  } else if(q.type==='sata'){
    html += '<div class="sata-hint">Select every option that applies, then confirm your answer.</div>';
    q.options.forEach((o,i)=>{
      const sel = (ans.selected||[]).includes(i);
      let cls='opt';
      if(!confirmed && sel) cls+=' selected';
      if(confirmed && o.c) cls+=' correct-reveal';
      if(confirmed && !o.c && sel) cls+=' incorrect-reveal';
      html += '<div class="'+cls+'" data-idx="'+i+'">'
        + '<div class="letter">'+LETTERS[i]+'</div><div class="otext">'+escapeHtml(o.t)+'</div>';
      if(confirmed && !o.c) html += '<div class="why-tip">'+escapeHtml(o.why)+'</div>';
      html += '</div>';
    });
  } else if(q.type==='fill'){
    html += '<div class="fill-row"><input type="text" id="fillInput" placeholder="Type your answer" value="'+escapeHtml(ans.text||'')+'" '+(confirmed?'disabled':'')+'/></div>';
    if(confirmed){
      html += '<div class="fill-result '+(ans.correct?'ok':'no')+'">'+(ans.correct? 'Correct.' : 'Not quite. Accepted answer: '+escapeHtml(q.answers[0]))+'</div>';
    }
  } else if(q.type==='bowtie'){
    html += '<div class="bowtie-wrap">';
    q.sections.forEach((sec,si)=>{
      html += '<div class="bowtie-col"><h4>'+escapeHtml(sec.label)+'</h4>';
      sec.options.forEach((o,oi)=>{
        const selArr = (ans.selected && ans.selected[si]) || [];
        const sel = selArr.includes(oi);
        let cls='bowtie-opt';
        if(!confirmed && sel) cls+=' selected';
        if(confirmed && o.c) cls+=' correct-reveal';
        if(confirmed && !o.c && sel) cls+=' incorrect-reveal';
        html += '<div class="'+cls+'" data-sec="'+si+'" data-opt="'+oi+'">'+escapeHtml(o.t)+'</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  } else if(q.type==='hotspot'){
    html += '<div class="hotspot-passage">';
    q.passage.forEach((p,i)=>{
      const sel = (ans.selected||[]).includes(i);
      let cls='hs-span';
      if(!confirmed && sel) cls+=' selected';
      if(confirmed && p.c) cls+=' correct-reveal';
      if(confirmed && !p.c && sel) cls+=' incorrect-reveal';
      html += '<span class="'+cls+'" data-idx="'+i+'">'+escapeHtml(p.t)+'</span> ';
    });
    html += '</div>';
  }

  html += '<div style="margin-top:18px;">';
  if(!confirmed){
    html += '<button class="btn btn-primary" id="btnConfirm">Confirm answer</button>';
  }
  html += '</div>';

  if(confirmed){
    html += '<div class="reveal">';
    html += '<div class="reveal-block reveal-rationale"><div class="lbl">Rationale</div><p>'+escapeHtml(q.rationale)+'</p></div>';
    html += '<div class="reveal-block reveal-tip"><div class="lbl">NCLEX tip</div><p>'+escapeHtml(q.tip)+'</p></div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function attachQuizHandlers(){
  const {q, modKey} = currentQuestion();
  const btnHome = document.getElementById('btnHome');
  if(btnHome) btnHome.addEventListener('click', goHome);
  const btnPrev = document.getElementById('btnPrev');
  if(btnPrev) btnPrev.addEventListener('click', prevQ);
  const btnNext = document.getElementById('btnNext');
  if(btnNext) btnNext.addEventListener('click', nextQ);
  const btnShuffle = document.getElementById('btnShuffle');
  if(btnShuffle) btnShuffle.addEventListener('click', swapCurrentQuestion);

  const ans = optAnsweredData(modKey, q);
  const confirmed = !!ans.confirmed;

  if(!confirmed){
    if(q.type==='mc'){
      document.querySelectorAll('.qcard .opt').forEach(el=>{
        el.addEventListener('click', ()=> setSelection(modKey, q.id, parseInt(el.getAttribute('data-idx')), 'mc'));
      });
    } else if(q.type==='sata'){
      document.querySelectorAll('.qcard .opt').forEach(el=>{
        el.addEventListener('click', ()=> setSelection(modKey, q.id, parseInt(el.getAttribute('data-idx')), 'sata'));
      });
    } else if(q.type==='fill'){
      const inp = document.getElementById('fillInput');
      if(inp) inp.addEventListener('input', (e)=>{
        const key = qKey(modKey,q.id);
        if(!state.answers[key]) state.answers[key]={};
        state.answers[key].text = e.target.value;
      });
    } else if(q.type==='bowtie'){
      document.querySelectorAll('.bowtie-opt').forEach(el=>{
        el.addEventListener('click', ()=> setSelection(modKey, q.id, {sec:parseInt(el.getAttribute('data-sec')), opt:parseInt(el.getAttribute('data-opt'))}, 'bowtie'));
      });
    } else if(q.type==='hotspot'){
      document.querySelectorAll('.hs-span').forEach(el=>{
        el.addEventListener('click', ()=> setSelection(modKey, q.id, parseInt(el.getAttribute('data-idx')), 'hotspot'));
      });
    }
  }

  const btnConfirm = document.getElementById('btnConfirm');
  if(btnConfirm) btnConfirm.addEventListener('click', ()=> confirmAnswer(modKey, q));
}

function renderCelebrate(){
  let totalQ=0, totalCorrect=0, totalAnswered=0;
  MODULES.forEach(m=>{
    const s = moduleStats(m.key);
    totalQ += s.total; totalCorrect += s.correct; totalAnswered += s.answered;
  });
  const pct = totalAnswered>0 ? Math.round((totalCorrect/totalAnswered)*100) : 0;
  let msg = 'You showed up, you worked the chart, and you finished the module. That\'s the job.';
  if(pct>=90) msg = 'That\'s a strong, confident pass through the material \u2014 you\'re thinking like a nurse who trusts their assessment.';
  else if(pct>=75) msg = 'Solid work. You clearly know this content \u2014 tighten up the missed items and you\'re exam-ready.';
  else if(pct>=50) msg = 'You\'re building real clinical reasoning here. Use the remediation review to lock in the tricky ones.';
  else msg = 'Every missed question just showed you exactly what to study next. That\'s progress, not failure.';

  let html = renderTopbar(true);
  html += '<div class="celebrate">';
  html += '<div class="big">'+pct+'%</div>';
  html += '<h2>Module complete.</h2>';
  html += '<p>'+msg+'</p>';
  html += '<div class="stat-row">';
  html += '<div class="stat-box"><div class="num">'+moduleStats(state.moduleKey).correct+'/'+moduleStats(state.moduleKey).answered+'</div><div class="lbl">This module</div></div>';
  html += '<div class="stat-box"><div class="num">'+totalCorrect+'/'+totalAnswered+'</div><div class="lbl">All modules so far</div></div>';
  html += '<div class="stat-box"><div class="num">'+state.remediationQueue.length+'</div><div class="lbl">Flagged for review</div></div>';
  html += '</div>';
  html += '<div class="nav-group" style="justify-content:center;display:flex;gap:10px;flex-wrap:wrap;">';
  if(state.remediationQueue.length>0) html += '<button class="btn btn-amber" id="btnCelebrateRemediate">Review missed questions</button>';
  html += '<button class="btn btn-primary" id="btnCelebrateHome">Back to modules</button>';
  html += '</div></div>';
  return html;
}
function attachCelebrateHandlers(){
  const bh = document.getElementById('btnHome'); if(bh) bh.addEventListener('click', goHome);
  const b1 = document.getElementById('btnCelebrateHome'); if(b1) b1.addEventListener('click', goHome);
  const b2 = document.getElementById('btnCelebrateRemediate'); if(b2) b2.addEventListener('click', ()=>{ state.screen='remediation-list'; render(); });
}

function renderRemediationList(){
  let html = renderTopbar(true);
  html += '<div class="hero"><div class="eyebrow">Remediation</div><h2>Missed questions, ready for a second look.</h2>'
    + '<p>These are every question you\'ve gotten wrong so far across all modules. Re-attempt them whenever you\'re ready \u2014 answering correctly removes a question from this list.</p></div>';
  if(state.remediationQueue.length===0){
    html += '<div class="empty-note">Nothing here right now. Missed questions will show up as soon as you confirm an incorrect answer.</div>';
  } else {
    html += '<div class="rem-list">';
    state.remediationQueue.forEach(r=>{
      const q = findQuestionById(r.modKey, r.qid);
      const mod = getModule(r.modKey);
      html += '<div class="rem-item"><div><div class="qmod">'+mod.title+'</div><div class="qtxt">'+escapeHtml(q.stem.slice(0,110))+(q.stem.length>110?'...':'')+'</div></div></div>';
    });
    html += '</div>';
    html += '<div style="margin-top:20px;"><button class="btn btn-primary" id="btnStartRemediation">Re-attempt all missed questions</button></div>';
  }

}
function attachRemediationHandlers(){
  const bh = document.getElementById('btnHome'); if(bh) bh.addEventListener('click', goHome);
  const b = document.getElementById('btnStartRemediation'); if(b) b.addEventListener('click', startRemediation);
}

function renderRemediationDone(){
  let html = renderTopbar(true);
  html += '<div class="celebrate">';
  html += '<div class="big">'+(state.remediationQueue.length===0? '0':state.remediationQueue.length)+'</div>';
  html += '<h2>Remediation round complete.</h2>';
  html += '<p>'+(state.remediationQueue.length===0
    ? 'Every previously missed question has now been answered correctly. That content is locked in.'
    : 'Great effort. '+state.remediationQueue.length+' question'+(state.remediationQueue.length===1?'':'s')+' could still use another pass.')+'</p>';

  html += '<button class="btn btn-primary" id="btnDoneHome">Back to modules</button>';
  html += '</div></div>';
  return html;
}
function attachRemediationDoneHandlers(){
  const bh = document.getElementById('btnHome'); if(bh) bh.addEventListener('click', goHome);
  const b1 = document.getElementById('btnDoneHome'); if(b1) b1.addEventListener('click', goHome);
  const b2 = document.getElementById('btnAgain'); if(b2) b2.addEventListener('click', startRemediation);
}

render();
