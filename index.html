ignificant ongoing assistance needs than mild ID's near-normal functioning and eventual independence."}, {"t": "Nonverbal communication using only single words or gestures, needing daily-living assistance and supervised living arrangements", "c": false, "w": "This describes severe intellectual disability, which is more impaired than mild ID's near-normal functioning capacity."}], "rationale": "Mild intellectual disability accounts for approximately 85% of ID cases and is associated with near-normal social/communication skills, a mid-elementary conceptual level, and the capacity for self-care, independent living, and vocational training, with more than half eventually owning a home, marrying, or having children.", "tip": "NCLEX tip: Sort ID severity by expected functional outcome: mild (near-independent), moderate (elementary-level, needs ongoing assistance), severe (limited speech, needs daily assistance), profound (nonverbal, needs constant supervision).", "id": "m9_40", "module": 9}, {"type": "mc", "stem": "An 8-year-old client held back a grade has poor reading comprehension, delayed social skills, small stature, wide-set eyes, and a small head circumference. Which condition should the nurse suspect, given this cluster of findings?", "options": [{"t": "Fetal alcohol syndrome", "c": true, "w": ""}, {"t": "Down syndrome", "c": false, "w": "While Down syndrome is also an embryonic developmental cause of intellectual disability, the specific facial and growth findings described (wide-set eyes, small head circumference, small stature) combined with the case context point to fetal alcohol syndrome rather than the classic features of Down syndrome."}, {"t": "Fragile X syndrome", "c": false, "w": "Fragile X syndrome is a hereditary cause of intellectual disability, but the physical findings described in the vignette (wide-set eyes, small head circumference, small stature) are the hallmark presentation associated with fetal alcohol syndrome."}, {"t": "Reactive attachment disorder", "c": false, "w": "Reactive attachment disorder is a trauma/attachment-related condition involving emotionally withdrawn behavior, not a condition with these specific physical/facial characteristics."}], "rationale": "Suspected fetal alcohol syndrome presents with a triad of intellectual disability, delayed growth/development, and distinctive facial abnormalities (such as small head circumference and wide-set eyes), consistent with this child's presentation of small stature, wide-set eyes, small head circumference, and academic/social delays.", "tip": "NCLEX tip: This vignette-style question tests recognition of FAS's classic triad and physical features — a recurring theme across both the SUD/pregnancy content and the children's chapter.", "id": "m9_41", "module": 9}, {"type": "mc", "stem": "Which childhood-onset communication disorder is characterized by broken speech, word substitution, and often causes physical tension, anxiety, and risk of teasing or bullying?", "options": [{"t": "Childhood-onset fluency disorder (stuttering)", "c": true, "w": ""}, {"t": "Selective mutism", "c": false, "w": "Selective mutism involves a consistent failure to speak in specific expected situations despite being able to speak elsewhere, not the broken speech/word substitution pattern described here."}, {"t": "Social communication disorder", "c": false, "w": "Social communication disorder involves broader pragmatic language and social communication deficits, not specifically the broken speech and word substitution pattern that defines stuttering."}, {"t": "Separation anxiety disorder", "c": false, "w": "Separation anxiety disorder is an anxiety-related condition about separation from an attachment figure, not a speech/communication disorder involving broken speech patterns."}], "rationale": "Childhood-onset fluency disorder, commonly known as stuttering, usually begins before age 6 and involves broken speech and word substitution, often causing physical tension and anxiety, with increased risk of teasing or bullying from peers.", "tip": "NCLEX tip: Stuttering (childhood-onset fluency disorder) usually has an onset before age 6 — a specific age detail worth remembering.", "id": "m9_42", "module": 9}, {"type": "mc", "stem": "A school nurse notes that a 7-year-old client consistently does not speak at school despite being fully verbal and talkative at home with family. Which condition does this best describe?", "options": [{"t": "Selective mutism", "c": true, "w": ""}, {"t": "Childhood-onset fluency disorder (stuttering)", "c": false, "w": "Stuttering involves broken speech and word substitution wherever the child speaks, not a consistent failure to speak only in certain settings despite being able to speak elsewhere."}, {"t": "Reactive attachment disorder", "c": false, "w": "Reactive attachment disorder involves emotionally withdrawn behavior and limited positive affect broadly, not a specific, situational failure to speak despite verbal capability elsewhere."}, {"t": "Social communication disorder", "c": false, "w": "Social communication disorder involves broader pragmatic language/social communication challenges across settings, not the specific situational silence pattern that defines selective mutism."}], "rationale": "Selective mutism is a consistent failure to speak in specific expected situations (such as school) despite being able to speak in other settings (such as at home), and it interferes with academic, social, or occupational functioning.", "tip": "NCLEX tip: The hallmark of selective mutism is situational — the child CAN speak, but consistently does NOT in specific settings, distinguishing it from a general speech/language disorder.", "id": "m9_43", "module": 9}, {"type": "mc", "stem": "Which motor disorder is characterized by both motor and vocal tics with early childhood onset, ranging in severity from mild (throat clearing) to severe (loud vocal outbursts and spasms)?", "options": [{"t": "Tourette's disorder", "c": true, "w": ""}, {"t": "Developmental coordination disorder", "c": false, "w": "Developmental coordination disorder involves delayed coordinated motor skills such as clumsiness and handwriting difficulty, not the combination of motor and vocal tics that defines Tourette's disorder."}, {"t": "Trichotillomania", "c": false, "w": "Trichotillomania is an obsessive-compulsive-related disorder involving recurrent hair pulling, not a motor/vocal tic disorder."}, {"t": "Excoriation disorder", "c": false, "w": "Excoriation disorder is an obsessive-compulsive-related disorder involving recurrent skin-picking, not a motor/vocal tic disorder like Tourette's."}], "rationale": "Tourette's disorder involves both motor and vocal tics with early childhood onset, ranging from mild (throat clearing, limb jerk) to severe (loud vocal outbursts, spasms strong enough to throw the patient from a chair), and it can be especially socially embarrassing during dating and social situations.", "tip": "NCLEX tip: Tourette's = BOTH motor AND vocal tics; a disorder with only motor tics or only vocal tics would not meet full criteria for Tourette's disorder specifically.", "id": "m9_44", "module": 9}, {"type": "sata", "stem": "Select all statements that accurately describe genetic and biochemical factors in childhood neurodevelopmental and mental health disorders.", "options": [{"t": "Approximately 75% of children with ADHD have a family member with a mental health disorder", "c": true, "w": ""}, {"t": "More than 1,000 genetic changes have been linked to autism spectrum disorder", "c": true, "w": ""}, {"t": "Inadequate norepinephrine and serotonin are linked to depression and suicide risk in children", "c": true, "w": ""}, {"t": "100% of autism spectrum disorder risk factors are genetic, with no environmental contribution", "c": false, "w": "Approximately 40% of ASD risk factors are identified as non-genetic, meaning environmental factors do contribute meaningfully to ASD risk, contrary to a claim of 100% genetic causation."}, {"t": "Temperament traits are entirely learned and have no genetic component", "c": false, "w": "Temperament traits are described as genetically influenced as well as learned through relationships, so it is inaccurate to describe them as entirely learned with no genetic component."}], "rationale": "Key genetic/biochemical facts include: ~75% of children with ADHD have a family member with a mental health disorder, over 1,000 genetic changes are linked to ASD (with ~40% of ASD risk being non-genetic/environmental), and neurotransmitter alterations (norepinephrine, serotonin) are linked to depression/suicide risk; temperament is both genetically influenced and learned.", "tip": "NCLEX tip: The 40% non-genetic ASD risk factor statistic is a commonly overlooked but testable detail emphasizing environment's role alongside genetics.", "id": "m9_45", "module": 9}, {"type": "sata", "stem": "Select all findings from the Adverse Childhood Experiences (ACE) study that are associated with a higher ACE score.", "options": [{"t": "Increased risk of depression in adulthood", "c": true, "w": ""}, {"t": "Increased risk of adult substance use and suicide attempts", "c": true, "w": ""}, {"t": "Earlier and more severe onset of disease/disability", "c": true, "w": ""}, {"t": "Decreased risk of high-risk sexual behavior", "c": false, "w": "A higher ACE score is associated with an increased, not decreased, risk of high-risk sexual behavior, according to the source material."}, {"t": "No relationship to respiratory distress or early heart attacks", "c": false, "w": "A higher ACE score is specifically linked to increased risk of respiratory distress and early heart attacks, so there is a documented relationship, not an absence of one."}], "rationale": "A higher ACE score is linked to greater social/emotional/cognitive impairment, high-risk behaviors, and earlier/more severe disease or disability, including depression, adult substance use, suicide attempts, high-risk sexual behavior, early heart attacks, and respiratory distress.", "tip": "NCLEX tip: The ACE study demonstrates a dose-response relationship — the higher the ACE score, the greater the risk across multiple adverse adult health outcomes.", "id": "m9_46", "module": 9}, {"type": "fib", "stem": "The self-stimulatory behaviors seen in children with autism spectrum disorder, such as hand-flapping, rocking, or toe-walking, are collectively referred to as _____.", "answers": ["stimming"], "rationale": "Stimming refers to self-stimulatory behaviors in ASD, ranging from mild (finger tapping, toe-walking) to severe (head-banging, biting, which can cause injury), and often serves a self-regulatory function for the child.", "tip": "NCLEX tip: Recognize 'stimming' terminology quickly on the exam — it is specific to ASD and ranges widely in severity.", "id": "m9_47", "module": 9}, {"type": "fib", "stem": "The most common childhood mental health condition, affecting an estimated 6.8% of children ages 3-17, characterized by inattention, hyperactivity, and impulsivity, is abbreviated _____.", "answers": ["adhd"], "rationale": "ADHD (Attention-Deficit/Hyperactivity Disorder) is the most common childhood mental health condition, affecting approximately 6.8% of children ages 3-17, with roughly half of affected children also having another co-occurring behavioral or mental health condition.", "tip": "NCLEX tip: ADHD's prevalence (6.8% of ages 3-17) and high comorbidity rate (~50% with another condition) are both frequently tested statistics.", "id": "m9_48", "module": 9}, {"type": "mc", "stem": "A 12-year-old client has experienced recurrent, severe temper outbursts disproportionate to the situation, occurring at least three times per week, along with a persistently angry/irritable mood between outbursts, beginning before age 10. Which diagnosis is most consistent with this presentation?", "options": [{"t": "Disruptive mood dysregulation disorder (DMDD)", "c": true, "w": ""}, {"t": "Bipolar disorder, manic episode", "c": false, "w": "DMDD was specifically added to the DSM-5 to reduce misdiagnosis of this presentation as bipolar disorder in children; the chronic irritability and frequent outbursts described are more consistent with DMDD than a discrete manic episode."}, {"t": "Oppositional defiant disorder", "c": false, "w": "While ODD also involves anger and defiance, DMDD is specifically characterized by severe temper outbursts occurring at least 3 times weekly plus a persistently irritable mood between outbursts, matching this vignette more precisely."}, {"t": "Conduct disorder", "c": false, "w": "Conduct disorder involves more severe rule-violating and aggressive behaviors (such as cruelty to animals, theft, or fire-setting), not primarily a pattern of temper outbursts and chronic irritability as described here."}], "rationale": "DMDD, a new DSM-5 depressive disorder diagnosis, is characterized by severe recurrent temper outbursts (verbal or behavioral) grossly disproportionate to the situation, occurring 3 or more times per week, plus a persistently angry/irritable mood between outbursts, with onset before age 10 (though not diagnosed until age 6).", "tip": "NCLEX tip: DMDD was added specifically to reduce over-diagnosis of pediatric bipolar disorder — remember the onset-before-10, diagnosed-not-before-6, and 3-times-weekly-outburst criteria.", "id": "m9_49", "module": 9}, {"type": "mc", "stem": "A 7-year-old client refuses to attend school, reports recurring nightmares about being separated from his mother, and experiences stomach aches whenever anticipating being away from his primary caregiver. Which diagnosis is most consistent with this presentation?", "options": [{"t": "Separation anxiety disorder", "c": true, "w": ""}, {"t": "Generalized anxiety disorder", "c": false, "w": "Generalized anxiety disorder involves broader, diffuse worry across multiple areas of life, not specifically anxiety focused on separation from an attachment figure as described in this vignette."}, {"t": "Selective mutism", "c": false, "w": "Selective mutism involves a consistent failure to speak in specific settings, not the separation-focused fear, nightmares, and somatic complaints described in this child."}, {"t": "Reactive attachment disorder", "c": false, "w": "Reactive attachment disorder involves emotionally withdrawn, minimally responsive behavior toward caregivers due to a history of inconsistent care, not developmentally inappropriate fear of separation from an attachment figure."}], "rationale": "Separation anxiety disorder, only diagnosed in children, involves developmentally inappropriate fear/anxiety about separation from a primary attachment figure, including worry about losing loved ones, refusal to stay with others, nightmares of separation, and somatic complaints anticipating separation.", "tip": "NCLEX tip: Separation anxiety disorder prevalence is about 4% in children and 1.6% in adolescents — a specific statistic that may be tested directly.", "id": "m9_50", "module": 9}, {"type": "mc", "stem": "A 10-year-old client repeatedly pulls out strands of hair from her scalp, resulting in noticeable hair loss, and reports feeling unable to stop despite trying. Which condition should the nurse suspect?", "options": [{"t": "Trichotillomania", "c": true, "w": ""}, {"t": "Excoriation disorder", "c": false, "w": "Excoriation disorder involves recurrent skin-picking leading to lesions, not hair-pulling behavior; this child's presentation of hair-pulling and hair loss specifically describes trichotillomania."}, {"t": "Tourette's disorder", "c": false, "w": "Tourette's disorder involves motor and vocal tics, not the recurrent hair-pulling behavior described in this child, which is specifically classified as an obsessive-compulsive-related disorder."}, {"t": "Pica", "c": false, "w": "Pica involves the persistent eating of nonfood substances, not hair-pulling behavior, which is a distinct condition (trichotillomania)."}], "rationale": "Trichotillomania is an obsessive-compulsive-related disorder involving recurrent hair pulling/twisting leading to hair loss or damage, with unsuccessful attempts to stop and associated distress; it has a prevalence of 1%-2% and is more common in females.", "tip": "NCLEX tip: Trichotillomania (hair-pulling) and excoriation disorder (skin-picking) are both OCD-related disorders, more common in females, with similar 1%-2% prevalence rates — keep the specific behavior (hair vs. skin) straight.", "id": "m9_51", "module": 9}, {"type": "mc", "stem": "A 3-year-old child in foster care, with a history of multiple caregiver changes, shows minimal positive affect, rarely seeks or responds to comforting, and displays limited social responsiveness even with a consistent new caregiver. Which condition is most consistent with this presentation?", "options": [{"t": "Reactive attachment disorder (RAD)", "c": true, "w": ""}, {"t": "Autism spectrum disorder", "c": false, "w": "While ASD also involves social/communication challenges, RAD is specifically linked to a history of inconsistent care, frequent caregiver changes, or institutional living, and centers on emotionally withdrawn behavior toward caregivers rather than the broader repetitive-behavior pattern of ASD."}, {"t": "Separation anxiety disorder", "c": false, "w": "Separation anxiety disorder involves excessive fear about separation from an attachment figure, which is different from the emotionally withdrawn, minimally responsive pattern described in RAD."}, {"t": "Oppositional defiant disorder", "c": false, "w": "ODD involves a pattern of angry, defiant behavior toward authority figures, not the emotionally withdrawn, minimally responsive attachment pattern described in this child."}], "rationale": "Reactive attachment disorder involves a consistent pattern of inhibited, emotionally withdrawn behavior toward caregivers, rarely seeking or responding to comfort, with limited positive affect and minimal social responsiveness, typically resulting from inconsistent care, frequent caregiver changes, or living in foster care/orphanage settings.", "tip": "NCLEX tip: RAD's defining feature is a history of inconsistent/disrupted caregiving PLUS a pattern of emotional withdrawal and minimal comfort-seeking from caregivers.", "id": "m9_52", "module": 9}, {"type": "mc", "stem": "A toddler is observed repeatedly eating chalk, sand, and paint chips over a period of more than one month, and this behavior is not part of any culturally sanctioned practice. Which feeding/eating disorder does this describe?", "options": [{"t": "Pica", "c": true, "w": ""}, {"t": "Rumination disorder", "c": false, "w": "Rumination disorder involves repeated regurgitation of previously swallowed food, not the ingestion of nonfood substances like chalk or paint chips, which specifically defines pica."}, {"t": "Avoidant/restrictive food-intake disorder (ARFID)", "c": false, "w": "ARFID involves a persistent failure to meet nutritional needs through avoidance/restriction of food, not the ingestion of nonfood substances that characterizes pica."}, {"t": "Anorexia nervosa", "c": false, "w": "Anorexia nervosa involves restriction of caloric intake tied to a fear of weight gain and body image disturbance, not the ingestion of nonfood substances described in pica."}], "rationale": "Pica involves the persistent eating of nonfood substances (such as sand, dirt, chalk, paint chips, ice, cloth, or hair) that is not culturally sanctioned, and it carries potential for harm or even death depending on the substance ingested.", "tip": "NCLEX tip: Pica is a distinct feeding/eating disorder in children involving nonfood substance ingestion — do not confuse it with rumination disorder (regurgitation of food) or ARFID (restriction/avoidance of food).", "id": "m9_53", "module": 9}, {"type": "mc", "stem": "An infant is observed regurgitating swallowed food, re-chewing it, and either re-swallowing or spitting it out repeatedly, in a pattern that appears to be self-soothing. Which condition does this best describe?", "options": [{"t": "Rumination disorder", "c": true, "w": ""}, {"t": "Pica", "c": false, "w": "Pica involves eating nonfood substances, not the repeated regurgitation and re-chewing of previously swallowed food described in this infant."}, {"t": "Avoidant/restrictive food-intake disorder", "c": false, "w": "ARFID involves food avoidance/restriction leading to nutritional deficiency, not the specific regurgitation/re-chewing pattern that defines rumination disorder."}, {"t": "Encopresis", "c": false, "w": "Encopresis involves repeated passage of feces in inappropriate places, an elimination disorder unrelated to the regurgitation/re-chewing pattern described here."}], "rationale": "Rumination disorder involves repeated regurgitation of food, which may be re-chewed, re-swallowed, or spit out; it may serve a self-soothing function in some infants and often self-corrects during infancy without intervention.", "tip": "NCLEX tip: Rumination disorder often self-corrects in infancy — a distinguishing prognostic detail from other more persistent feeding/eating disorders in children.", "id": "m9_54", "module": 9}, {"type": "mc", "stem": "A 6-year-old client has repeated involuntary voiding of urine during the day and at night, occurring at least twice weekly for 3 months, with no identified medical cause. Which condition does this describe, and at what age does this become considered abnormal?", "options": [{"t": "Enuresis; abnormal after age 5", "c": true, "w": ""}, {"t": "Encopresis; abnormal after age 4", "c": false, "w": "Encopresis refers to repeated passage of feces, not urine, so this term does not describe the urinary symptoms in this vignette, which specifically define enuresis."}, {"t": "Enuresis; abnormal after age 8", "c": false, "w": "Enuresis is considered abnormal after age 5, not age 8, according to the source material; using age 8 as the threshold would be inaccurate."}, {"t": "Pica; no specific age threshold applies", "c": false, "w": "Pica involves eating nonfood substances, an entirely different condition from the urinary symptoms described in this vignette, which define enuresis."}], "rationale": "Enuresis is the repeated voiding of urine (voluntary or involuntary) and is considered abnormal after age 5; medical causes should be ruled out first, and first-line non-medication interventions include limiting fluids before bed, scheduled nighttime waking, and bedwetting alarms.", "tip": "NCLEX tip: Enuresis (urine) is abnormal after age 5; encopresis (feces) is abnormal after age 4 — a commonly confused pair of age thresholds.", "id": "m9_55", "module": 9}, {"type": "mc", "stem": "A 5-year-old client has repeated, voluntary passage of feces in inappropriate locations, with a retentive subtype pattern noted on assessment. Which potential complication should the nurse monitor for if this condition remains untreated?", "options": [{"t": "Megacolon", "c": true, "w": ""}, {"t": "Wernicke-Korsakoff syndrome", "c": false, "w": "Wernicke-Korsakoff syndrome is related to chronic alcohol use and thiamine deficiency, unrelated to untreated encopresis in a child."}, {"t": "Neonatal abstinence syndrome", "c": false, "w": "Neonatal abstinence syndrome relates to newborn opioid withdrawal, unrelated to the elimination disorder of encopresis in an older child."}, {"t": "Amotivational syndrome", "c": false, "w": "Amotivational syndrome is associated with chronic heavy marijuana use, unrelated to untreated encopresis in a young child."}], "rationale": "Encopresis, the repeated passage of feces (voluntary or involuntary) considered abnormal after age 4, most commonly presents as the retentive subtype (80%-90% of cases); if left untreated, it carries a risk of progressing to megacolon.", "tip": "NCLEX tip: Encopresis' retentive subtype is far more common (80%-90%) than the nonretentive subtype, and untreated cases risk progressing to megacolon.", "id": "m9_56", "module": 9}, {"type": "mc", "stem": "A nurse is differentiating oppositional defiant disorder (ODD) from conduct disorder (CD) in a 14-year-old client. Which finding would be more consistent with conduct disorder than ODD?", "options": [{"t": "The client has stolen items while directly confronting the victim and has been physically cruel to animals", "c": true, "w": ""}, {"t": "The client frequently loses their temper and argues with authority figures", "c": false, "w": "Frequently losing temper and arguing with authority figures are ODD criteria; while some overlap exists, physically cruel and confrontational-theft behaviors are specifically identified as CD criteria, reflecting a more severe pattern."}, {"t": "The client is often easily annoyed and deliberately annoys others", "c": false, "w": "Being easily annoyed and deliberately annoying others are specific ODD criteria, representing a less severe pattern than the CD-level behaviors of cruelty and confrontational theft."}, {"t": "The client is vindictive and blames others for their own mistakes", "c": false, "w": "Vindictiveness and blaming others are ODD criteria; while overlapping with some CD themes, the specific act of stealing while confronting a victim and cruelty to animals reflects the more severe CD criteria set."}], "rationale": "Conduct disorder is more severe than ODD and includes behaviors such as bullying, physical fights, weapon use, cruelty to people/animals, stealing while confronting a victim, fire-setting, and property destruction, distinguishing it from ODD's pattern of losing temper, arguing, defiance, and vindictiveness without these more severe rule-violating behaviors.", "tip": "NCLEX tip: CD criteria involve aggression toward people/animals, property destruction, deceitfulness/theft, and serious rule violations — a clearly more severe behavioral pattern than ODD's anger/defiance/vindictiveness criteria.", "id": "m9_57", "module": 9}, {"type": "mc", "stem": "A 12-year-old client has recurring stomach aches related to stress over her parents' ongoing divorce discussions, with no identified medical cause found on workup. Which nonpharmacologic intervention would be most appropriate for the nurse to teach this client?", "options": [{"t": "Guided imagery for anxiety management", "c": true, "w": ""}, {"t": "Deep brain stimulation", "c": false, "w": "Deep brain stimulation is an investigational treatment being studied for Alzheimer's disease, not an appropriate first-line nonpharmacologic intervention for a child's stress-related somatic symptoms."}, {"t": "Disulfiram administration", "c": false, "w": "Disulfiram is a medication used for alcohol use disorder in adults, entirely unrelated to managing a child's anxiety-related somatic symptoms."}, {"t": "Cholinesterase inhibitor therapy", "c": false, "w": "Cholinesterase inhibitors are used for Alzheimer's disease, not appropriate for managing a child's stress/anxiety-related somatic complaints."}], "rationale": "Guided imagery is an appropriate nonpharmacologic anxiety-management technique for children experiencing somatic symptoms (like stomach aches) related to psychosocial stressors such as parental conflict or divorce, helping the child develop coping skills without medication.", "tip": "NCLEX tip: Somatic complaints (stomach aches, headaches) in children are a common presentation of anxiety/stress and should prompt exploration of psychosocial stressors alongside teaching age-appropriate coping techniques like guided imagery.", "id": "m9_58", "module": 9}, {"type": "mc", "stem": "Which statement about depression in children is most accurate?", "options": [{"t": "Depression in children may present as anger or irritability rather than overt sadness, often with somatic symptoms such as stomach aches or headaches", "c": true, "w": ""}, {"t": "Depression in children always presents identically to depression in adults, with sadness as the primary and only symptom", "c": false, "w": "Depression in children frequently presents differently than in adults, often as irritability/anger with somatic complaints, rather than presenting identically to the classic adult sadness-predominant picture."}, {"t": "Somatic complaints in a depressed child should never be medically evaluated since they are always psychological in origin", "c": false, "w": "Somatic symptoms should still be evaluated to rule out medical causes, even when a psychological contributor like depression is suspected, rather than assuming a psychological cause without medical workup."}, {"t": "Children cannot experience clinically significant depression before adolescence", "c": false, "w": "Depression can occur in children well before adolescence; the mean age of first major depressive/manic/hypomanic episode is 18-20, but such episodes can occur mid-childhood as well."}], "rationale": "Depression in children may present as anger or irritability rather than sadness, with somatic symptoms (stomach aches, nausea, headaches) common; medical causes should still be ruled out even as a psychological cause is considered, and vigilance for both typical and atypical depression presentations is important given adolescents' higher suicide rate.", "tip": "NCLEX tip: Irritability, not sadness, is often the presenting mood symptom of depression in children — a frequently tested distinguishing feature from adult depression presentation.", "id": "m9_59", "module": 9}, {"type": "sata", "stem": "Select all conditions that are classified under 'Disruptive, Impulse-Control, and Conduct Disorders' according to the source material.", "options": [{"t": "Oppositional defiant disorder (ODD)", "c": true, "w": ""}, {"t": "Conduct disorder (CD)", "c": true, "w": ""}, {"t": "Disruptive mood dysregulation disorder (DMDD)", "c": false, "w": "DMDD is classified as a depressive disorder in the DSM-5, not under the disruptive, impulse-control, and conduct disorders category."}, {"t": "Reactive attachment disorder", "c": false, "w": "Reactive attachment disorder is classified under trauma- and stressor-related disorders, not under the disruptive, impulse-control, and conduct disorders category."}, {"t": "Separation anxiety disorder", "c": false, "w": "Separation anxiety disorder is classified under anxiety disorders, not under the disruptive, impulse-control, and conduct disorders category."}], "rationale": "Oppositional defiant disorder and conduct disorder are classified under 'Disruptive, Impulse-Control, and Conduct Disorders,' while DMDD (a depressive disorder), RAD (a trauma/stressor-related disorder), and separation anxiety disorder (an anxiety disorder) belong to distinct DSM-5 categories despite some overlapping behavioral features.", "tip": "NCLEX tip: Sorting disorders into their correct DSM-5 category (mood, anxiety, trauma-related, disruptive/conduct) is a recurring exam skill — don't group by surface-level behavior alone.", "id": "m9_60", "module": 9}, {"type": "sata", "stem": "Select all criteria that are part of the diagnostic picture for conduct disorder (CD) as described in the source material.", "options": [{"t": "Has used a weapon that could cause serious physical harm to others", "c": true, "w": ""}, {"t": "Has been physically cruel to people or animals", "c": true, "w": ""}, {"t": "Deliberate fire-setting with intention to cause damage", "c": true, "w": ""}, {"t": "Often loses temper and argues with authority figures", "c": false, "w": "Losing temper and arguing with authority figures are diagnostic criteria for oppositional defiant disorder (ODD), a less severe disruptive behavior disorder than conduct disorder."}, {"t": "Easily annoyed by others and deliberately annoys others in return", "c": false, "w": "Being easily annoyed and deliberately annoying others are ODD criteria, not part of the more severe conduct disorder criteria set, which involves aggression, property destruction, deceit, and serious rule violations."}], "rationale": "Conduct disorder criteria include serious behaviors such as weapon use, physical cruelty to people/animals, fire-setting, property destruction, theft, and serious rule violations (staying out overnight, running away, truancy), which are more severe than the anger/argumentativeness/vindictiveness pattern that defines the less severe oppositional defiant disorder.", "tip": "NCLEX tip: When sorting behaviors into ODD vs. CD, look for severity — CD criteria involve aggression/property destruction/serious rule violations, while ODD criteria involve anger, argumentativeness, and vindictiveness without these more severe acts.", "id": "m9_61", "module": 9}, {"type": "fib", "stem": "The new DSM-5 (2013) depressive disorder diagnosis in children, characterized by chronic irritability and severe recurrent temper outbursts disproportionate to the situation, occurring at least 3 times per week, is abbreviated _____.", "answers": ["dmdd"], "rationale": "DMDD (Disruptive Mood Dysregulation Disorder) was added to the DSM-5 specifically to reduce the misdiagnosis of severely irritable, tantrum-prone children as having pediatric bipolar disorder, since DMDD's course and treatment differ from bipolar disorder.", "tip": "NCLEX tip: DMDD was created specifically to address over-diagnosis of bipolar disorder in children — a key historical/diagnostic rationale worth remembering.", "id": "m9_62", "module": 9}, {"type": "fib", "stem": "The elimination disorder involving repeated, voluntary or involuntary passage of feces in inappropriate locations, considered abnormal after age 4, is called _____.", "answers": ["encopresis"], "rationale": "Encopresis is the repeated passage of feces (voluntary or involuntary) in inappropriate locations, considered abnormal after age 4; the retentive subtype accounts for 80%-90% of cases, and untreated cases carry a risk of megacolon.", "tip": "NCLEX tip: Encopresis (feces, abnormal after age 4) vs. enuresis (urine, abnormal after age 5) — keep both the substance and the age threshold straight.", "id": "m9_63", "module": 9}, {"type": "mc", "stem": "A nurse observes a 6-year-old client during a play therapy session using a dollhouse and family figures, moving the child figure far away from the parent figures. Which purpose of play therapy is best reflected in this observation?", "options": [{"t": "Play therapy is being used to assess the child's emotional status and reveal inner conflicts or family relationships", "c": true, "w": ""}, {"t": "Play therapy is being used exclusively as a recreational activity with no assessment or therapeutic value", "c": false, "w": "Play is described as the 'work of childhood' and serves important assessment, diagnostic, and therapeutic functions, not merely recreational value without clinical significance."}, {"t": "Play therapy is only appropriate for adolescents, not for a 6-year-old child", "c": false, "w": "Play-based therapy is specifically recommended for younger children, while older children/adolescents are more likely to engage in talk therapy; a 6-year-old is an appropriate candidate for play therapy."}, {"t": "Play therapy replaces the need for any further mental status assessment", "c": false, "w": "Play therapy is a valuable assessment and intervention tool, but it complements rather than replaces a comprehensive mental status assessment and other data-gathering methods."}], "rationale": "Play, described as the 'work of childhood,' is used in play therapy to assess developmental and emotional status, aid diagnosis, and deliver therapeutic intervention; the use of dolls, dollhouses, puppets, and drawings can reveal inner conflicts and family relationships, such as this child placing the child figure far from parent figures.", "tip": "NCLEX tip: Play therapy is not just recreational — it is a diagnostic and therapeutic tool for younger children, especially useful for revealing family dynamics and inner conflict.", "id": "m9_64", "module": 9}, {"type": "mc", "stem": "A nurse reviewing a child's spontaneous drawing notes that the child drew a family portrait with unusually large body proportions and a scribbled, tightly clenched fist. Which interpretation is most consistent with recommended guidance on therapeutic drawing analysis?", "options": [{"t": "Very large figure size in a drawing may suggest aggression or poor impulse control", "c": true, "w": ""}, {"t": "Very large figure size always indicates high self-esteem and no psychological concerns", "c": false, "w": "Very large figure size is specifically associated with aggression or poor impulse control according to the source material, not simply high self-esteem without further clinical significance."}, {"t": "Figure size in children's drawings has no established clinical significance", "c": false, "w": "Figure size is specifically identified as clinically significant in interpreting children's drawings — very large size can suggest aggression/poor impulse control, and very small size can suggest shyness/insecurity."}, {"t": "Omitted body parts in a drawing are simply an artistic style with no psychological meaning", "c": false, "w": "Omitted body parts are specifically linked to psychological meaning in the source material — for example, omitted hands may suggest trauma/insecurity, and omitted arms may suggest inadequacy/powerlessness."}], "rationale": "In therapeutic drawing interpretation, very large figure size may suggest aggression or poor impulse control (while very small size may suggest shyness/insecurity), and specific omitted body parts carry distinct meanings (e.g., omitted hands = trauma/insecurity, omitted arms = inadequacy/powerlessness, omitted legs = lack of support, omitted feet = insecurity/helplessness, omitted mouth = difficulty expressing self).", "tip": "NCLEX tip: Memorize the figure-size and omitted-body-part interpretations for therapeutic drawing analysis — these are specific, testable details from the textbook.", "id": "m9_65", "module": 9}, {"type": "mc", "stem": "Which therapeutic modality for children involves older children or adolescent groups acting out emotional problems and trying out new behaviors, and is generally not recommended for youth experiencing psychosis?", "options": [{"t": "Dramatic play therapy (psychodrama)", "c": true, "w": ""}, {"t": "Bibliotherapy", "c": false, "w": "Bibliotherapy uses children's literature to help express feelings and gain insight, not the acting-out/role-play format of dramatic play therapy, and this restriction against use in psychotic youth is specifically noted for psychodrama."}, {"t": "Music therapy", "c": false, "w": "Music therapy uses recorded music, songwriting, and instruments for relaxation and social interaction, not the acting-out/role-play format described in dramatic play therapy."}, {"t": "Recreational therapy", "c": false, "w": "Recreational therapy involves game-based psychomotor/social skill building activities like volleyball or swimming, not the acting-out/role-play format of dramatic play therapy."}], "rationale": "Dramatic play therapy (psychodrama) is used with older children/adolescent groups to act out emotional problems and try new behaviors, and can be videotaped for review, but it is not recommended for youth experiencing psychosis.", "tip": "NCLEX tip: Remember the specific caution that psychodrama/dramatic play therapy is NOT recommended for psychotic youth — a detail that may be tested as a 'which intervention should be avoided' question.", "id": "m9_66", "module": 9}, {"type": "mc", "stem": "A nurse is selecting an appropriate therapeutic modality for a young child who has experienced trauma and has difficulty verbalizing feelings directly. Which approach uses children's literature matched to the child's situation to help the child gain insight and learn coping strategies?", "options": [{"t": "Bibliotherapy", "c": true, "w": ""}, {"t": "Recreational therapy", "c": false, "w": "Recreational therapy uses off-unit, game-based psychomotor and social skill-building activities, not literature-based intervention, which is the specific approach used in bibliotherapy."}, {"t": "Movement and dance therapy", "c": false, "w": "Movement and dance therapy uses physical movement to increase body awareness and dissipate tension, not literature to help the child process feelings, which is the defining feature of bibliotherapy."}, {"t": "Milieu therapy", "c": false, "w": "Milieu therapy refers to structuring the overall inpatient or long-term treatment environment for growth and safety, not the specific literature-based individual intervention described in bibliotherapy."}], "rationale": "Bibliotherapy uses children's literature selected to match the child's specific situation, helping the child express feelings, gain insight, and learn coping strategies in an indirect, less threatening way than direct discussion.", "tip": "NCLEX tip: Bibliotherapy is a distinct, literature-based therapeutic modality — remember to match the selected book to the child's specific situation for maximum therapeutic benefit.", "id": "m9_67", "module": 9}, {"type": "mc", "stem": "Which statement about the use of restraints and seclusion in child/adolescent psychiatric care is most accurate, according to current recommended practice?", "options": [{"t": "Most facilities are now largely restraint-free, reserving restraints for emergent danger situations only, with close monitoring for short periods", "c": true, "w": ""}, {"t": "Restraints should be used routinely as a first-line behavioral management strategy for any disruptive child", "c": false, "w": "Restraints are described as dangerous and controversial, reserved only for emergent danger situations, not used routinely as a first-line strategy for general disruptive behavior."}, {"t": "Seclusion has completely replaced all other behavior management alternatives in modern child psychiatric units", "c": false, "w": "Alternatives such as gentle therapeutic holding, protective helmets, unlocked quiet rooms, and time-outs are specifically emphasized as preferred approaches over routine seclusion."}, {"t": "There are no recommended alternatives to restraints for managing dangerous behaviors in children", "c": false, "w": "Recommended alternatives to restraints include gentle therapeutic holding, protective helmets (for head-banging), unlocked quiet rooms, and time-outs."}], "rationale": "Restraints and seclusion are considered dangerous and controversial; most facilities are now largely restraint-free except in emergent danger situations, with close monitoring for short periods, and preferred alternatives include gentle therapeutic holding, protective helmets, unlocked quiet rooms, and time-outs.", "tip": "NCLEX tip: Always look for the least restrictive alternative first in child psychiatric care — restraints/seclusion are reserved strictly for emergent danger situations.", "id": "m9_68", "module": 9}, {"type": "mc", "stem": "A nurse is explaining to parents why 'just playing games' during their child's recreational therapy sessions has genuine therapeutic value. Which explanation is most accurate?", "options": [{"t": "Recreational therapy, led by a recreational therapist, builds psychomotor and social skills through game-based activities and field trips that improve self-control and self-esteem", "c": true, "w": ""}, {"t": "Recreational therapy has no evidence-based therapeutic value and is used purely to occupy the child's time", "c": false, "w": "Recreational therapy is specifically described as having real therapeutic purpose, building psychomotor and social skills and improving self-control/self-esteem, not merely occupying time without benefit."}, {"t": "Recreational therapy is only appropriate for adult clients, not for children or adolescents", "c": false, "w": "Recreational therapy is specifically described in the context of child/adolescent treatment, using activities like volleyball, swimming, and field trips."}, {"t": "Recreational therapy replaces the need for individual or family therapy entirely", "c": false, "w": "Recreational therapy is one component of a broader collaborative treatment approach and does not replace the need for individual, group, or family therapy."}], "rationale": "Recreational therapy, conducted off the unit and led by a recreational therapist, uses game-based psychomotor and social skill-building activities (such as volleyball, swimming, and field trips) to build self-control and self-esteem, and nurses should reassure parents that this has genuine therapeutic purpose beyond simple recreation.", "tip": "NCLEX tip: Recreational therapy specifically targets psychomotor/social skill-building and self-esteem — remember to reassure families this is a legitimate, evidence-informed therapeutic modality.", "id": "m9_69", "module": 9}, {"type": "mc", "stem": "A 9-year-old client with ADHD is prescribed methylphenidate (Ritalin). Which statement by the nurse best reflects appropriate teaching regarding pharmacologic treatment approach for children?", "options": [{"t": "\"Medication is generally used after other behavioral and support interventions have been tried or when those approaches alone are insufficient.\"", "c": true, "w": ""}, {"t": "\"Medication should always be the very first intervention tried, before any behavioral strategies are considered.\"", "c": false, "w": "The recommended approach is to use psychopharmacology only after addressing behavior/support needs first, or when other approaches fail, not as the universal first-line intervention before any behavioral strategies."}, {"t": "\"Once started, this medication should never be paired with any behavioral or psychosocial intervention.\"", "c": false, "w": "Medication is typically used alongside, not instead of, behavioral and psychosocial interventions as part of a comprehensive treatment plan."}, {"t": "\"This medication works by blocking dopamine receptors to calm hyperactive behavior.\"", "c": false, "w": "Stimulant medications like methylphenidate affect dopamine transporter activity to improve attention/focus; they do not work by blocking dopamine receptors, which would describe an antipsychotic mechanism instead."}], "rationale": "Psychopharmacology in children is generally used only after addressing behavior/support needs first or when other approaches fail; for ADHD, stimulants such as methylphenidate (Ritalin), amphetamine salts (Adderall), and lisdexamfetamine (Vyvanse) are used, often alongside behavioral interventions rather than as a stand-alone approach.", "tip": "NCLEX tip: The stepwise principle — behavioral/support interventions first, medication added when needed — is a recurring theme in child psychopharmacology teaching questions.", "id": "m9_70", "module": 9}, {"type": "mc", "stem": "A child with autism spectrum disorder is prescribed risperidone (Risperdal). Which target symptom is this medication most specifically intended to address?", "options": [{"t": "Aggression and irritability", "c": true, "w": ""}, {"t": "Core social communication deficits", "c": false, "w": "Risperidone and other antipsychotics are used for aggression/irritability in ASD; they are not indicated to directly treat the core social communication deficits that define the disorder."}, {"t": "Elimination disorder symptoms such as bedwetting", "c": false, "w": "Risperidone is not indicated for elimination disorders in children; desmopressin is the medication specifically used for enuresis, an entirely separate indication."}, {"t": "Prevention of febrile seizures", "c": false, "w": "Risperidone is an antipsychotic used for aggression/irritability in ASD, not an anticonvulsant or seizure-prevention medication."}], "rationale": "Antipsychotics such as risperidone (Risperdal) and aripiprazole (Abilify) are used in ASD specifically to target aggression and irritability, while SSRIs (fluoxetine, sertraline) may be used for anxiety/obsessive traits; neither medication class treats the core social communication deficits of ASD itself.", "tip": "NCLEX tip: In ASD pharmacotherapy, remember antipsychotics target aggression/irritability, while SSRIs target anxiety/obsessive traits — neither treats the core diagnostic features directly.", "id": "m9_71", "module": 9}, {"type": "mc", "stem": "A nurse is providing teaching to the parents of a child newly prescribed an SSRI for anxiety. Which teaching point is most important to include?", "options": [{"t": "SSRIs carry a black box warning for increased suicidal ideation risk in children and young adults, so suicide assessment should occur at every contact", "c": true, "w": ""}, {"t": "SSRIs have no significant risks in children and require no additional monitoring beyond routine visits", "c": false, "w": "SSRIs carry a specific black box warning for increased suicidal ideation risk in children and young adults, requiring close monitoring and suicide assessment at every contact, not simply routine monitoring with no added vigilance."}, {"t": "SSRIs should be started at the highest possible dose to achieve rapid symptom relief in children", "c": false, "w": "The recommended approach for pediatric SSRI use is to start at a low dose and monitor closely, not to start at the highest possible dose."}, {"t": "SSRIs are not appropriate for use in any child or adolescent under any circumstances", "c": false, "w": "SSRIs are used as first-line pharmacologic treatment for anxiety/depression in children, despite the black box warning, when used with appropriate monitoring — they are not universally prohibited in this population."}], "rationale": "SSRIs are first-line pharmacologic treatment for anxiety/depression in children, but they carry a black box warning for increased suicidal ideation risk in children and young adults; treatment should start at a low dose with close monitoring, and suicide assessment should occur at every contact.", "tip": "NCLEX tip: The SSRI black box warning for pediatric suicidal ideation risk, paired with 'start low, monitor closely, assess suicide risk at every visit,' is one of the most frequently tested pediatric psychopharmacology safety points.", "id": "m9_72", "module": 9}, {"type": "mc", "stem": "A child with disruptive mood dysregulation disorder (DMDD) continues to have significant outbursts despite behavioral interventions. Which medication class, according to the source material, may help reduce these outbursts?", "options": [{"t": "Guanfacine or clonidine", "c": true, "w": ""}, {"t": "Cholinesterase inhibitors", "c": false, "w": "Cholinesterase inhibitors are used for Alzheimer's disease, not for reducing outbursts in DMDD, which is a distinct pediatric mood disorder with different pharmacologic options."}, {"t": "Naloxone", "c": false, "w": "Naloxone is an opioid antagonist used for opioid overdose reversal, entirely unrelated to the pharmacologic management of DMDD outbursts."}, {"t": "Disulfiram", "c": false, "w": "Disulfiram is used for alcohol use disorder treatment in adults, unrelated to managing outbursts in a child with DMDD."}], "rationale": "Guanfacine and clonidine may help reduce outbursts in DMDD, and risperidone/aripiprazole can help with mood and behavior; mood stabilizers such as valproic acid, carbamazepine, and oxcarbazepine may also be considered, though no medication is specifically FDA-approved for DMDD.", "tip": "NCLEX tip: Recognize guanfacine/clonidine as options for reducing DMDD outbursts, alongside risperidone/aripiprazole for mood/behavior and mood stabilizers as additional options.", "id": "m9_73", "module": 9}, {"type": "mc", "stem": "A 7-year-old client with enuresis is being evaluated for treatment options. Which nonpharmacologic intervention should be tried first, according to recommended practice?", "options": [{"t": "Bedwetting alarms and scheduled nighttime waking", "c": true, "w": ""}, {"t": "Desmopressin (DDAVP) as the very first intervention, before any behavioral strategies", "c": false, "w": "Desmopressin is a pharmacologic option, but nonpharmacologic first-line interventions (limiting fluids before bed, scheduled nighttime waking, bedwetting alarms) should be tried first, along with ruling out medical causes."}, {"t": "Long-term daily use of stool softeners", "c": false, "w": "Stool softeners/laxatives are used for elimination disorders involving constipation (encopresis), not for enuresis, which is a urinary elimination disorder."}, {"t": "Immediate referral for surgical intervention", "c": false, "w": "Surgical intervention is not the recommended first-line approach for enuresis; behavioral and, if needed, pharmacologic options are tried first after ruling out medical causes."}], "rationale": "For enuresis, medical causes should be ruled out first, and non-medication interventions (limiting fluids before bed, scheduled nighttime waking, bedwetting alarms) are recommended as first-line treatment before considering desmopressin (DDAVP) or other pharmacologic options.", "tip": "NCLEX tip: For pediatric elimination disorders, always rule out medical causes and try nonpharmacologic strategies first before moving to pharmacologic treatment.", "id": "m9_74", "module": 9}, {"type": "sata", "stem": "Select all appropriate nonpharmacological therapeutic modalities for children and adolescents described in the source material.", "options": [{"t": "Play therapy", "c": true, "w": ""}, {"t": "Bibliotherapy", "c": true, "w": ""}, {"t": "Movement and dance therapy", "c": true, "w": ""}, {"t": "Disulfiram administration", "c": false, "w": "Disulfiram is a pharmacologic medication used for alcohol use disorder in adults, not a nonpharmacological therapeutic modality for children/adolescents."}, {"t": "Naltrexone administration", "c": false, "w": "Naltrexone is a pharmacologic medication used for alcohol/opioid use disorder, not a nonpharmacological therapeutic modality described for children and adolescents."}], "rationale": "Nonpharmacological therapeutic modalities for children and adolescents include play therapy, bibliotherapy, movement/dance therapy, music therapy, recreational therapy, dramatic play therapy (psychodrama), therapeutic games, and therapeutic drawing — all distinct from pharmacologic treatments like disulfiram or naltrexone, which are adult SUD medications.", "tip": "NCLEX tip: Keep pediatric nonpharmacologic modalities distinct from adult pharmacologic SUD treatments when sorting SATA answer choices.", "id": "m9_75", "module": 9}, {"type": "sata", "stem": "Select all statements that accurately reflect recommended psychopharmacologic principles for treating children and adolescents.", "options": [{"t": "Medication should generally be used only after addressing behavior/support needs first, or when other approaches fail", "c": true, "w": ""}, {"t": "SSRIs carry a black box warning for increased suicidal ideation risk in children and young adults", "c": true, "w": ""}, {"t": "There is no FDA-approved medication specifically for oppositional defiant disorder or conduct disorder, though stimulants, mood stabilizers, or antipsychotics may help with anger/irritability", "c": true, "w": ""}, {"t": "Stimulant medication should always be started at the maximum adult dose for children with ADHD", "c": false, "w": "Pediatric dosing follows a careful, individualized approach rather than starting at maximum adult doses; this contradicts the general safety principle of using the lowest effective dose with close monitoring in children."}, {"t": "Elimination disorder medications like desmopressin should be used before ruling out any medical causes of enuresis", "c": false, "w": "Medical causes should always be ruled out first before initiating pharmacologic treatment such as desmopressin for enuresis, not the reverse order."}], "rationale": "Pediatric psychopharmacology principles include using medication only after behavioral approaches, monitoring closely for SSRI-related suicidality risk, recognizing that ODD/CD have no FDA-approved medication (though various agents may help with anger/irritability), and always ruling out medical causes before starting medications like desmopressin for enuresis.", "tip": "NCLEX tip: A recurring pattern across pediatric psychopharm questions: behavioral-first approach, careful/individualized dosing, and ruling out medical causes before starting medication.", "id": "m9_76", "module": 9}, {"type": "fib", "stem": "The therapeutic modality in which older children or adolescent groups act out emotional problems and try new behaviors, sometimes videotaped for review, but which is not recommended for psychotic youth, is called dramatic play therapy, also known as _____.", "answers": ["psychodrama"], "rationale": "Dramatic play therapy, also known as psychodrama, allows older children and adolescents to act out emotional problems and try new behaviors in a group setting, though it is not recommended for youth experiencing psychosis.", "tip": "NCLEX tip: Psychodrama = dramatic play therapy for older children/adolescents — remember the specific caution against use in psychotic youth.", "id": "m9_77", "module": 9}, {"type": "fib", "stem": "The therapeutic modality that uses puppets, dolls, dollhouses, and action figures, and is described as the 'work of childhood,' used both to assess developmental/emotional status and to deliver therapeutic intervention, is called _____ therapy.", "answers": ["play"], "rationale": "Play therapy is described as the 'work of childhood' and uses tools such as puppets, dolls, dollhouses, and action figures to assess a child's developmental and emotional status while also delivering therapeutic intervention.", "tip": "NCLEX tip: Play therapy serves a dual purpose — both assessment/diagnosis AND therapeutic intervention — remember this dual function when answering related questions.", "id": "m9_78", "module": 9}, {"type": "mc", "stem": "A nurse is conducting a mental status assessment on an 8-year-old client suspected of experiencing abuse at home. Which approach is most appropriate?", "options": [{"t": "Interview the child alone at some point during the assessment to allow disclosure of abuse without a caregiver present", "c": true, "w": ""}, {"t": "Always interview the child exclusively in front of the parents to ensure full transparency", "c": false, "w": "Children may fear disclosing abuse in front of a caregiver, especially if the caregiver is the source of harm; interviewing the child alone at some point is recommended to allow safe disclosure."}, {"t": "Avoid any direct questioning of the child and rely solely on parent report", "c": false, "w": "Relying solely on parent report misses the opportunity for the child's own disclosure, especially important when abuse by a caregiver is suspected; direct, developmentally appropriate interviewing of the child is recommended."}, {"t": "Use complex, abstract language to assess the child's cognitive sophistication", "c": false, "w": "Children are concrete, literal thinkers, so assessment should use simple, concrete, developmentally appropriate language rather than complex abstract language."}], "rationale": "Because children are concrete, literal thinkers and may fear disclosing problems, it is recommended to interview the child alone at some point during assessment, which allows for potential disclosure of abuse that might not occur with a caregiver present.", "tip": "NCLEX tip: When abuse is suspected, always plan to interview the child alone at some point — a caregiver's presence, especially if they are a potential perpetrator, can suppress disclosure.", "id": "m9_79", "module": 9}, {"type": "mc", "stem": "Which of the following best describes the multidisciplinary team members who may be involved in diagnosing a child with a suspected neurodevelopmental disorder?", "options": [{"t": "Primary care provider, school psychologist, speech/language therapists, and a developmental pediatrician or child/adolescent psychiatrist", "c": true, "w": ""}, {"t": "Only the child's primary care provider, with no additional specialists required in any case", "c": false, "w": "Diagnosis of neurodevelopmental disorders typically requires a multidisciplinary team beyond the primary care provider alone, including specialists such as speech/language therapists, school psychologists, and developmental pediatricians or child/adolescent psychiatrists."}, {"t": "Exclusively a geneticist, with no behavioral health or educational team members involved", "c": false, "w": "While geneticists may be involved in some cases, the full multidisciplinary team also includes behavioral health and educational professionals such as school psychologists and therapists/counselors."}, {"t": "Only law enforcement personnel, since these are primarily legal rather than medical concerns", "c": false, "w": "Neurodevelopmental disorder diagnosis is a medical/psychological/educational process involving healthcare and educational professionals, not primarily a law enforcement matter."}], "rationale": "Diagnosis of neurodevelopmental disorders typically involves a multidisciplinary team including the primary care provider (initial screening/referral), speech/language therapists, PT/OT, school psychologists (learning/IQ testing), geneticists, child/adolescent psychiatrists or PMHNPs, neuropsychologists/developmental pediatricians, and therapists/counselors.", "tip": "NCLEX tip: Recognize the full range of multidisciplinary team members involved in pediatric neurodevelopmental diagnosis — this reflects the collaborative nature of care emphasized throughout the chapter.", "id": "m9_80", "module": 9}, {"type": "mc", "stem": "Which statement best reflects the recommended approach to assessing children and adolescents for mental health concerns, according to the source material?", "options": [{"t": "Assess strengths and protective factors in addition to risks, since this is key for treatment planning in younger populations", "c": true, "w": ""}, {"t": "Focus exclusively on identifying risks and pathology, without any consideration of the child's strengths", "c": false, "w": "The source material specifically emphasizes assessing strengths and protective factors, not focusing exclusively on risks/pathology, as this is key for developing an effective, individualized treatment plan."}, {"t": "Avoid gathering any history from parents, caregivers, or teachers to protect the child's privacy", "c": false, "w": "Data collection specifically includes histories from parents/caregivers/teachers as an important source of information, not something to avoid."}, {"t": "Skip physical examination since childhood mental health concerns are purely psychological", "c": false, "w": "A holistic assessment approach includes physical examination alongside presenting problem, developmental history, family history, and mental status assessment."}], "rationale": "A holistic, strengths-based nursing assessment for children and adolescents includes the presenting problem, medical/developmental history, family history, physical exam, and mental status assessment, along with identifying strengths and protective factors (not just risks), which is key for treatment planning in this population.", "tip": "NCLEX tip: Look for a strengths-based, holistic assessment approach as the 'best answer' pattern in pediatric mental health assessment questions.", "id": "m9_81", "module": 9}, {"type": "mc", "stem": "Which statistic reflects the scope of unmet mental health needs among children and adolescents in the United States?", "options": [{"t": "Only about one-fifth of youth with a serious mental illness receive needed care in a given year", "c": true, "w": ""}, {"t": "Nearly all children and adolescents with a mental health condition receive appropriate treatment each year", "c": false, "w": "This significantly overstates access to care; only about one-fifth of youth with a serious mental illness receive needed care yearly, reflecting substantial unmet need."}, {"t": "Fewer than 1% of children and adolescents in the U.S. experience a serious mental illness", "c": false, "w": "Approximately 21% of 9-21 year-olds in the U.S. have a serious mental illness, which is far higher than 1% and reflects a substantial public health concern."}, {"t": "Mental health treatment gaps are unique to adults and do not apply to children/adolescents", "c": false, "w": "Significant treatment gaps are specifically documented among children/adolescents, not just adults, with only about one-fifth of youth with serious mental illness receiving needed yearly care."}], "rationale": "Approximately 21% of 9-21 year-olds in the U.S. have a serious mental illness, yet only about one-fifth of youth receive needed care yearly, reflecting a substantial treatment gap; untreated mental illness in childhood often leads to more serious complications later in life.", "tip": "NCLEX tip: The statistic 'only 1 in 5 youth with serious mental illness receive needed care' underscores the importance of nurses actively screening and facilitating access to services.", "id": "m9_82", "module": 9}, {"type": "mc", "stem": "Which statement about the relationship between temperament and mental health risk in children is most accurate?", "options": [{"t": "A difficult-child temperament combined with an unresponsive caregiver increases the risk of insecure attachment and developmental/mental health problems", "c": true, "w": ""}, {"t": "Temperament has no bearing on the risk of developing mental health or attachment problems in childhood", "c": false, "w": "Temperament, especially when combined with caregiver responsiveness, plays a meaningful role in attachment and developmental outcomes, contrary to this statement that dismisses any relationship."}, {"t": "A difficult-child temperament always leads to poor outcomes regardless of caregiver responsiveness", "c": false, "w": "It is specifically the combination of difficult temperament WITH an unresponsive caregiver that increases risk; a difficult temperament paired with a responsive, attuned caregiver does not automatically lead to poor outcomes."}, {"t": "Temperament is entirely fixed at birth and cannot be influenced by relationships or environment", "c": false, "w": "Temperament traits are described as genetically influenced but also learned through relationships, meaning they are not entirely fixed and unaffected by environment."}], "rationale": "Temperament involves nine traits (activity level, biological rhythms, sensitivity, intensity of reaction, adaptability, approach/withdrawal, persistence, distractibility, mood) that are genetically influenced and also learned through relationships; a difficult-child temperament combined with an unresponsive caregiver increases the risk of insecure attachment and developmental/mental health problems.", "tip": "NCLEX tip: The temperament-caregiver interaction (difficult temperament + unresponsive caregiver = increased risk) is a key 'goodness of fit' concept worth remembering.", "id": "m9_83", "module": 9}, {"type": "mc", "stem": "A nurse is completing Box 26.1, the child-adolescent mental status assessment, for a hospitalized adolescent client. Which of the following would be included as a specific category in this assessment?", "options": [{"t": "Characteristics of the child's play", "c": true, "w": ""}, {"t": "CIWA-Ar withdrawal severity score", "c": false, "w": "The CIWA-Ar is a scale specific to adult alcohol withdrawal assessment, not a category included in the child/adolescent mental status assessment described in Box 26.1."}, {"t": "COWS opioid withdrawal severity score", "c": false, "w": "The COWS is a scale specific to opioid withdrawal assessment, not a category included in the child/adolescent mental status assessment described in Box 26.1."}, {"t": "SCOFF eating disorder screening score", "c": false, "w": "SCOFF is a specific eating disorder screening tool, not one of the general categories listed in the child/adolescent mental status assessment (Box 26.1), though eating disorder screening could occur as part of a broader assessment."}], "rationale": "Box 26.1 outlines the child-adolescent mental status assessment categories: general appearance, activity level, speech, coordination/motor function, affect, manner of relating, intellectual functions, thought processes/content, and characteristics of the child's play — reflecting the centrality of play in assessing this population.", "tip": "NCLEX tip: 'Characteristics of play' as a distinct mental status assessment category is a detail unique to pediatric assessment, reflecting how young children communicate through play rather than words alone.", "id": "m9_84", "module": 9}, {"type": "mc", "stem": "Which of the following is the safety priority when assessing a child with significant cognitive delays and impulse-control issues in the home environment?", "options": [{"t": "Assessing for hazards such as pica risk, wandering, and poor safety awareness (e.g., following strangers)", "c": true, "w": ""}, {"t": "Assessing only academic performance, since safety concerns are not relevant to cognitive delays", "c": false, "w": "Safety is described as always a priority in this population, given impulse-control issues and cognitive delays that impair safety awareness; academic performance alone is not the priority focus in a home safety assessment."}, {"t": "Assuming that cognitive delays automatically mean the child has no safety risks since they are closely supervised", "c": false, "w": "Cognitive delays are specifically associated with poor safety awareness, making this population MORE at risk, not less, despite supervision, and warranting careful home safety assessment."}, {"t": "Deferring all safety assessment to the school system rather than including it in the nursing assessment", "c": false, "w": "Safety assessment, including home visits that may reveal additional hazards, is an important component of the nurse's own assessment, not something to defer entirely to the school system."}], "rationale": "Safety is always a priority in children with impulse-control issues or cognitive delays, given risks such as unsafe actions, poor safety awareness (e.g., following strangers), and pica risk; home visits may reveal additional hazards that inform the overall nursing assessment and care plan.", "tip": "NCLEX tip: Safety assessment for children with cognitive/developmental impairments should specifically consider impulse control, safety awareness, and pica risk, and may extend to the home environment.", "id": "m9_85", "module": 9}, {"type": "sata", "stem": "Select all appropriate priority actions when assessing an adolescent client for a suspected mental health concern, according to the source material.", "options": [{"t": "Assess for substance use, sexual activity, self-harm, and suicidal thoughts", "c": true, "w": ""}, {"t": "Gather developmental, medical, and family history", "c": true, "w": ""}, {"t": "Assess strengths and protective factors, not just risks", "c": true, "w": ""}, {"t": "Avoid ever interviewing the adolescent alone under any circumstances", "c": false, "w": "Interviewing the child/adolescent alone at some point is specifically recommended to allow disclosure of sensitive information such as abuse, contrary to a blanket avoidance of ever doing so."}, {"t": "Use complex psychiatric terminology to ensure a thorough, professional-sounding assessment", "c": false, "w": "Assessment language and approach should be developmentally appropriate and understandable to the client, not focused on using complex psychiatric terminology for its own sake."}], "rationale": "A comprehensive adolescent mental health assessment includes screening for substance use, sexual activity, self-harm, and suicidal thoughts, gathering developmental/medical/family history, and identifying strengths/protective factors, while allowing for private interview time and using developmentally appropriate communication.", "tip": "NCLEX tip: Adolescent assessments expand beyond younger childhood assessments to specifically include substance use, sexual activity, and self-harm/suicide screening.", "id": "m9_86", "module": 9}, {"type": "fib", "stem": "The document used to plan and coordinate a child's educational accommodations, often developed with the help of the school nurse acting as case manager, is abbreviated _____.", "answers": ["iep"], "rationale": "An Individualized Education Plan (IEP) is developed to coordinate a child's educational accommodations, and the school nurse may play a key role in helping to develop this plan as part of the child's overall care team.", "tip": "NCLEX tip: Recognize the school nurse's case-manager role in IEP development as part of the broader collaborative care team for children with mental health or developmental needs.", "id": "m9_87", "module": 9}, {"type": "mc", "stem": "A nurse is reviewing prevalence statistics for eating disorders as part of a community health presentation. Which statistic is accurate?", "options": [{"t": "An estimated 1 in 5 women struggles with an eating disorder or disordered eating", "c": true, "w": ""}, {"t": "Eating disorders affect fewer than 100,000 Americans in total", "c": false, "w": "Eating disorders are estimated to affect up to 30 million Americans, a figure vastly higher than 100,000, reflecting their significant public health impact."}, {"t": "Anorexia nervosa is more prevalent than bulimia nervosa across the general population", "c": false, "w": "Bulimia nervosa has a higher lifetime prevalence (1.0%) than anorexia nervosa (0.6%), making this statement inaccurate."}, {"t": "Bullying about body size/appearance is a rare form of school bullying", "c": false, "w": "Bullying about body size/appearance is identified as the most common form of school bullying, not a rare occurrence."}], "rationale": "Eating disorders affect up to 30 million Americans, and an estimated 1 in 5 women struggles with an eating disorder or disordered eating; bullying about body size/appearance is the most common form of school bullying, underscoring the broad public health impact of these conditions.", "tip": "NCLEX tip: The '1 in 5 women' and '30 million Americans affected' statistics are commonly tested figures emphasizing the widespread impact of eating disorders.", "id": "m9_88", "module": 9}, {"type": "mc", "stem": "Which age range is identified as carrying the highest risk for the onset of an eating disorder?", "options": [{"t": "13 to 17 years", "c": true, "w": ""}, {"t": "45 to 55 years", "c": false, "w": "While middle-aged women are the fastest-growing group being newly diagnosed, the highest overall risk age range for onset is 13-17 years, according to NICE (2017), not 45-55."}, {"t": "65 years and older", "c": false, "w": "The highest risk age range for eating disorder onset is adolescence (13-17 years), not older adulthood."}, {"t": "Birth to 5 years", "c": false, "w": "Eating disorders as classically defined (AN, BN, BED) are not typically associated with onset in infancy/toddlerhood; the highest risk age range is adolescence (13-17 years)."}], "rationale": "According to NICE (2017), the highest risk age range for eating disorder onset is 13-17 years, though binge-eating disorder often has a later typical onset in the mid-20s, and eating disorders can occur across the lifespan, including in middle-aged and older women.", "tip": "NCLEX tip: Distinguish the highest-risk onset age for eating disorders overall (13-17 years) from BED's typically later onset (mid-20s).", "id": "m9_89", "module": 9}, {"type": "mc", "stem": "Which population is specifically noted to be at increased risk of 'diabulimia,' the deliberate omission of insulin to promote weight loss?", "options": [{"t": "Adolescent girls with type 1 diabetes", "c": true, "w": ""}, {"t": "Adult males with type 2 diabetes", "c": false, "w": "The specific increased risk for diabulimia described in the source material is among adolescent girls with type 1 diabetes, not adult males with type 2 diabetes."}, {"t": "Older adults with well-controlled type 2 diabetes and no psychiatric history", "c": false, "w": "Diabulimia risk is specifically elevated in adolescent girls with type 1 diabetes, not this population."}, {"t": "Infants with congenital diabetes insipidus", "c": false, "w": "Diabetes insipidus is an unrelated endocrine condition; the diabulimia risk described in the source material pertains specifically to adolescent girls with type 1 diabetes mellitus."}], "rationale": "Adolescent girls with type 1 diabetes are twice as likely to have disordered eating and may omit insulin doses to lose weight, a practice known as 'diabulimia,' which carries significant medical risk given the resulting hyperglycemia and complications.", "tip": "NCLEX tip: 'Diabulimia' is a specific, testable term describing insulin omission for weight loss in adolescent girls with type 1 diabetes.", "id": "m9_90", "module": 9}, {"type": "mc", "stem": "Which cultural consideration regarding eating disorders is accurate, according to the source material?", "options": [{"t": "First-generation daughters of Asian immigrants are at higher risk of developing an eating disorder than their U.S.-born peers", "c": true, "w": ""}, {"t": "Eating disorders are equally prevalent across all cultures regardless of industrialization or thinness ideals", "c": false, "w": "Eating disorders are more common in industrialized societies where food abundance and thinness are culturally valued, indicating that prevalence is not equally distributed across all cultural contexts."}, {"t": "African American women are more likely to develop restrictive anorexia nervosa than bulimia nervosa", "c": false, "w": "African American women are described as more likely to develop bulimia and to purge, not restrictive anorexia nervosa specifically, according to the source material."}, {"t": "Male athletes and bodybuilders show no elevated risk for eating disorders", "c": false, "w": "Male bodybuilders/wrestlers and female athletes in thin-emphasis sports are specifically identified as being at increased risk for eating disorders."}], "rationale": "Cultural considerations in eating disorders include higher risk in industrialized societies (food abundance + thin ideal), increased risk among first-generation daughters of Asian immigrants compared to U.S.-born peers, and a tendency for African American women to develop bulimia and purge more than restrictive anorexia, alongside elevated risk in thin-emphasis sports and male bodybuilding/wrestling.", "tip": "NCLEX tip: Note the specific cultural risk patterns: first-generation Asian immigrant daughters (higher risk than peers), African American women (more BN/purging than AN), and industrialized societies overall (higher prevalence).", "id": "m9_91", "module": 9}, {"type": "mc", "stem": "A nurse is assessing psychosocial risk factors for eating disorders. Which trauma history is most specifically linked to eating disorders in men, according to the source material?", "options": [{"t": "Sexual abuse and physical neglect", "c": true, "w": ""}, {"t": "Sexual abuse and emotional abuse", "c": false, "w": "This combination (sexual abuse and emotional abuse) is specifically linked to eating disorders in women, according to the source material, not the combination most specifically linked to men."}, {"t": "Physical abuse and educational neglect only, with no link to sexual abuse", "c": false, "w": "Sexual abuse is specifically included in the trauma types most linked to eating disorders in men, alongside physical neglect, so excluding sexual abuse would be inaccurate."}, {"t": "There is no established link between childhood trauma and eating disorder risk in men", "c": false, "w": "The source material specifically identifies child maltreatment types (sexual abuse and physical neglect in men; sexual abuse and emotional abuse in women) as linked to eating disorder risk, so a claim of no established link is inaccurate."}], "rationale": "The child maltreatment types most l
