 tip:'NCLEX tip: "enteral over parenteral when possible" is a recurring nutrition-support theme across many GI conditions, not just pancreatitis — look for it as a pattern.'},

{id:'g14',type:'sata',stem:'The nurse is caring for a client with acute pancreatitis. Which nursing interventions are appropriate? Select all that apply.',
 options:[
  {t:'Position the client in semi-Fowler position to ease pressure on the diaphragm',c:true,why:''},
  {t:'Administer high-dose opioids liberally without regard to bowel function',c:false,why:'High-dose opioids should be used cautiously because of the risk of GI paralysis or ileus; opioid use is balanced with monitoring bowel function, not given without regard to it.'},
  {t:'Monitor blood glucose every four to six hours',c:true,why:''},
  {t:'Turn the client every two hours and encourage incentive spirometry hourly',c:true,why:''},
  {t:'Encourage a large, high-fat meal as soon as bowel sounds return to promote pancreatic rest',c:false,why:'A large, high-fat meal would stimulate the pancreas rather than rest it; oral intake is reintroduced gradually with a low-fat, low-protein diet.'},
 ],
 rationale:'Nursing care for acute pancreatitis includes semi-Fowler positioning, cautious opioid use with attention to bowel function, frequent glucose monitoring, and aggressive pulmonary care including turning and incentive spirometry.',
 tip:'NCLEX tip: group pancreatitis nursing actions into three buckets — pain/positioning, glucose/nutrition, and pulmonary care — to organize your studying.'},

{id:'g15',type:'mc',stem:'A client with chronic pancreatitis reports foul-smelling, greasy, frothy stools. What is the most likely explanation for this finding?',
 options:[
  {t:'Steatorrhea from malabsorption due to insufficient pancreatic enzyme production',c:true,why:''},
  {t:'Normal variation in stool related to increased dietary fiber intake',c:false,why:'This description of stool is not a normal variant; it reflects a specific pathologic process (fat malabsorption) rather than simple dietary fiber changes.'},
  {t:'An acute infectious gastroenteritis unrelated to the pancreatic disease',c:false,why:'While infectious causes of diarrhea exist, the described greasy, foul-smelling stool pattern is specifically characteristic of fat malabsorption tied to chronic pancreatitis.'},
  {t:'Excess bile production overwhelming normal digestion',c:false,why:'Excess bile production is not the mechanism behind steatorrhea; the problem is insufficient pancreatic enzymes needed to digest fat, not excess bile.'},
 ],
 rationale:'Steatorrhea — frothy, foul-smelling, high-fat stools — occurs in chronic pancreatitis due to malabsorption from insufficient pancreatic enzyme production, and typically appears late in the disease course when most exocrine function has been lost.',
 tip:'NCLEX tip: steatorrhea plus significant weight loss in a client with a history of chronic alcohol use should point you toward chronic pancreatitis and malabsorption.'},

{id:'g16',type:'fill',stem:'Pancreatic pseudocysts typically develop approximately _____ to _____ weeks after an episode of acute pancreatitis.',
 answers:['4 to 6','4-6','4 to 6 weeks','four to six'],
 rationale:'Pseudocysts form from pancreatic necrosis or ductal leakage and typically develop about 4–6 weeks after an acute pancreatitis episode; they are lined by fibrous granulation tissue rather than true epithelium.',
 tip:'NCLEX tip: remember that a pancreatic pseudocyst is not a true cyst because it lacks an epithelial lining — this distinction is a common test point.'},

{id:'g17',type:'mc',stem:'A client is diagnosed with Crohn\'s disease during an acute exacerbation. Which nursing action is the priority during this phase?',
 options:[
  {t:'Encourage a high-fiber diet with raw vegetables to stimulate healthy bowel movements',c:false,why:'High-fiber foods and raw vegetables can worsen irritation and cramping during an acute flare and are generally avoided until the disease is better controlled.'},
  {t:'Maintain NPO status with IV fluids, electrolytes, and possible parenteral nutrition',c:true,why:''},
  {t:'Increase physical activity to promote intestinal motility',c:false,why:'Activity is typically restricted, not increased, during an acute flare to help reduce intestinal activity and cramping.'},
  {t:'Begin oral antidiarrheal medications immediately without further assessment',c:false,why:'Antidiarrheals may be used but should not be started without further assessment, since masking symptoms in acute IBD can obscure worsening disease or complications.'},
 ],
 rationale:'During the acute phase of Crohn\'s disease or ulcerative colitis, the bowel is rested with NPO status, IV fluid and electrolyte replacement, and parenteral nutrition if needed, while activity is restricted to reduce intestinal activity.',
 tip:'NCLEX tip: IBD nursing care follows a clear progression — acute (NPO/IV) to sub-acute (advancing diet from clear liquids to low fiber to high protein) — memorize this sequence.'},

{id:'g18',type:'mc',stem:'A client with ulcerative colitis undergoes a total proctocolectomy with permanent ileostomy. Which statement by the client indicates correct understanding of this surgery?',
 options:[
  {t:'"This surgery removes only the diseased portion of my colon and preserves the rest."',c:false,why:'A total proctocolectomy removes the entire large intestine and rectum, not just a diseased segment, which distinguishes it from a partial colon resection.'},
  {t:'"I will have a permanent stoma since my entire large and small intestine involved in this process has been removed."',c:true,why:''},
  {t:'"This procedure preserves my anal sphincter so I will not need a permanent stoma."',c:false,why:'This describes the ileal pouch-anal anastomosis procedure, which preserves the sphincter, not the total proctocolectomy with permanent ileostomy described in this scenario.'},
  {t:'"I will need to return in a few months to have this stoma reversed."',c:false,why:'A total proctocolectomy with permanent ileostomy is not intended to be reversed, unlike a temporary diverting ileostomy that might be used with other procedures.'},
 ],
 rationale:'A total proctocolectomy with permanent ileostomy removes the entire colon and rectum, resulting in a permanent stoma, and is distinct from the ileal pouch-anal anastomosis procedure, which preserves the anal sphincter.',
 tip:'NCLEX tip: contrast RPC-IPAA (sphincter preserved, internal pouch) with total proctocolectomy with permanent ileostomy (sphincter removed, permanent external stoma) — these are commonly compared on exams.'},

{id:'g19',type:'sata',stem:'The nurse is teaching a client with inflammatory bowel disease about dietary triggers to avoid during a flare. Which foods should the nurse instruct the client to avoid? Select all that apply.',
 options:[
  {t:'Nuts and seeds',c:true,why:''},
  {t:'Raw fruits and vegetables',c:true,why:''},
  {t:'Well-cooked, peeled potatoes',c:false,why:'Well-cooked, peeled, low-fiber foods like potatoes are generally better tolerated during a flare and are not typically included among the foods to avoid.'},
  {t:'Carbonated and alcoholic beverages',c:true,why:''},
  {t:'Whole wheat and whole grain products',c:true,why:''},
 ],
 rationale:'During an IBD flare, gas-forming foods, raw fruits/vegetables, whole grains, nuts, and alcohol are generally avoided to reduce bowel irritation and cramping, while well-cooked, low-fiber foods are typically better tolerated.',
 tip:'NCLEX tip: for IBD diet SATA items, think "low residue, low irritation" as your filter — anything coarse, raw, gas-forming, or fermentable is usually on the avoid list during a flare.'},

{id:'g20',type:'mc',stem:'Which serum marker remains elevated longer than the others in a client with acute pancreatitis, making it useful days after symptom onset?',
 options:[
  {t:'Serum amylase',c:false,why:'Serum amylase rises early in acute pancreatitis but typically normalizes sooner than lipase, making it less useful several days after onset.'},
  {t:'Serum lipase',c:true,why:''},
  {t:'Serum bilirubin',c:false,why:'Bilirubin may be elevated if biliary obstruction is present, but it is not the marker specifically known for remaining elevated longer in pancreatitis diagnosis.'},
  {t:'Serum albumin',c:false,why:'Albumin is not a diagnostic marker of pancreatitis; it reflects nutritional and synthetic liver status rather than pancreatic enzyme activity.'},
 ],
 rationale:'Serum lipase rises with acute pancreatitis and remains elevated longer than amylase, making it a more useful marker when a client presents several days after symptom onset.',
 tip:'NCLEX tip: remember "lipase lasts longer" as a simple memory phrase to distinguish it from amylase on timing-based exam questions.'},

{id:'g21',type:'mc',stem:'A client\'s serum magnesium level is 1.2 mg/dL. Which assessment finding would the nurse expect?',
 options:[
  {t:'Diminished deep tendon reflexes and flaccid muscle tone',c:false,why:'Diminished reflexes and flaccidity are associated with hypermagnesemia, not the hypomagnesemia reflected by this low value.'},
  {t:'Positive Trousseau and Chvostek signs with hyperreflexia',c:true,why:''},
  {t:'Bradycardia with a widened QRS complex on ECG',c:false,why:'Bradycardia and a widened QRS are more characteristic of hypermagnesemia; hypomagnesemia is more often associated with tachycardia and Torsades de Pointes risk.'},
  {t:'Decreased respiratory rate and lethargy progressing to coma',c:false,why:'Respiratory depression and progressive lethargy to coma describe severe hypermagnesemia, not the neuromuscular irritability seen in hypomagnesemia.'},
 ],
 rationale:'Hypomagnesemia (below 1.8 mg/dL) produces neuromuscular irritability, including hyperreflexia, tetany, and positive Trousseau and Chvostek signs, along with cardiac risks such as Torsades de Pointes.',
 tip:'NCLEX tip: for magnesium, remember "low Mg = irritable/twitchy" and "high Mg = sedated/sluggish" — this opposite pattern applies to most of the clinical findings.'},

{id:'g22',type:'mc',stem:'A client is receiving IV magnesium sulfate for severe preeclampsia. Which assessment finding should prompt the nurse to stop the infusion and notify the provider immediately?',
 options:[
  {t:'Deep tendon reflexes that are diminished compared with baseline',c:true,why:''},
  {t:'Mild nausea reported shortly after the infusion begins',c:false,why:'Mild nausea alone is a less specific and less urgent finding compared with diminished deep tendon reflexes, which can herald magnesium toxicity.'},
  {t:'Urine output of 40 mL over the past hour',c:false,why:'While urine output should be monitored, this value alone (above the 25 mL/hr concern threshold commonly cited) is not the most urgent finding compared with a change in reflexes.'},
  {t:'Client reports feeling warm and flushed',c:false,why:'A sensation of warmth or flushing can be an expected, less dangerous side effect of magnesium infusion, unlike diminishing reflexes, which signal rising magnesium toward toxic levels.'},
 ],
 rationale:'Diminished or absent deep tendon reflexes are an early and important sign of magnesium toxicity during IV magnesium administration; the nurse should stop the infusion and notify the provider promptly to prevent progression to respiratory depression or cardiac arrest.',
 tip:'NCLEX tip: for IV magnesium safety questions, monitor DTRs, respiratory rate, and urine output as your three key safety parameters — a change in any of these should trigger prompt action.'},

{id:'g23',type:'mc',stem:'Which client is at greatest risk for developing hypermagnesemia?',
 options:[
  {t:'A client with chronic kidney disease who frequently uses magnesium-containing antacids',c:true,why:''},
  {t:'A client recovering from alcohol withdrawal with poor nutritional intake',c:false,why:'Alcohol withdrawal and malnutrition are more commonly associated with hypomagnesemia due to increased excretion and poor intake, not hypermagnesemia.'},
  {t:'A client with chronic diarrhea from ulcerative colitis',c:false,why:'Chronic diarrhea causes magnesium loss through the GI tract, predisposing to hypomagnesemia rather than hypermagnesemia.'},
  {t:'A client taking loop diuretics for heart failure',c:false,why:'Loop diuretics increase magnesium excretion and are more commonly associated with hypomagnesemia, not hypermagnesemia.'},
 ],
 rationale:'The kidneys are the primary route of magnesium excretion, so impaired renal function combined with ongoing magnesium intake (such as from magnesium-containing antacids or laxatives) places a client at the greatest risk for hypermagnesemia.',
 tip:'NCLEX tip: kidney injury/CKD is the most common cause of hypermagnesemia — always check renal function first when magnesium is abnormally high.'},

{id:'g24',type:'mc',stem:'A client\'s serum phosphorus level is 1.8 mg/dL and the nurse notes shallow respirations and muscle weakness. Which action should the nurse take first?',
 options:[
  {t:'Assess respiratory status and effort closely given the risk of diaphragm weakness',c:true,why:''},
  {t:'Encourage the client to increase intake of dairy products at the next meal only',c:false,why:'While dietary phosphorus is part of long-term management, this client has severe hypophosphatemia with respiratory symptoms, requiring more urgent assessment first.'},
  {t:'Restrict all oral fluids until the phosphorus level improves',c:false,why:'Fluid restriction is not an appropriate or relevant intervention for hypophosphatemia and does not address the client\'s respiratory risk.'},
  {t:'Administer a phosphate binder such as sevelamer immediately',c:false,why:'Phosphate binders lower phosphorus and are used for hyperphosphatemia, which is the opposite problem; this client has low phosphorus and needs supplementation, not a binder.'},
 ],
 rationale:'Severe hypophosphatemia can cause diaphragm and respiratory muscle weakness, potentially leading to respiratory failure, so the nurse\'s priority is to closely assess respiratory status before proceeding with other interventions such as IV phosphorus replacement.',
 tip:'NCLEX tip: for any severe electrolyte imbalance question, use airway/breathing as your first priority filter before addressing the specific electrolyte replacement.'},

{id:'g25',type:'mc',stem:'Which client is at greatest risk for hyperphosphatemia?',
 options:[
  {t:'A client with chronic kidney disease',c:true,why:''},
  {t:'A client with chronic diarrhea and malabsorption',c:false,why:'Chronic diarrhea and malabsorption are more commonly associated with hypophosphatemia due to nutrient loss, not hyperphosphatemia.'},
  {t:'A client recovering from refeeding after prolonged malnutrition',c:false,why:'Refeeding syndrome classically causes a shift of phosphorus into cells, leading to hypophosphatemia rather than hyperphosphatemia.'},
  {t:'A client with hyperparathyroidism',c:false,why:'Hyperparathyroidism increases urinary phosphate wasting, which tends to lower serum phosphorus rather than raise it.'},
 ],
 rationale:'Chronic kidney disease is the most common cause of hyperphosphatemia because the kidneys lose their ability to excrete excess phosphorus, which can also worsen the CKD mineral-bone disease cycle.',
 tip:'NCLEX tip: CKD is a recurring root cause across multiple electrolyte imbalances (phosphorus, potassium, magnesium) — always consider renal function first when interpreting abnormal electrolytes.'},

{id:'g26',type:'sata',stem:'A client has a serum chloride of 92 mEq/L after several days of nasogastric suction. Which findings would the nurse expect to assess? Select all that apply.',
 options:[
  {t:'Muscle cramps and hyperactive deep tendon reflexes',c:true,why:''},
  {t:'Slow, shallow respirations',c:true,why:''},
  {t:'Elevated serum bicarbonate consistent with metabolic alkalosis',c:true,why:''},
  {t:'Deep, rapid Kussmaul respirations',c:false,why:'Kussmaul respirations are a compensatory response seen in metabolic acidosis, which is more associated with hyperchloremia, not the hypochloremic alkalosis described here.'},
  {t:'Agitation and tremors',c:true,why:''},
 ],
 rationale:'Hypochloremia, often from GI losses such as NG suction, produces hypochloremic metabolic alkalosis with elevated bicarbonate, along with agitation, tremors, muscle cramps, hyperactive reflexes, and slow, shallow respirations as a compensatory response.',
 tip:'NCLEX tip: link chloride to acid-base status — low chloride pairs with metabolic alkalosis, high chloride pairs with metabolic acidosis, due to their inverse relationship with bicarbonate.'},

{id:'g27',type:'fill',stem:'The normal serum chloride range is generally cited as _____ to _____ mEq/L.',
 answers:['97 to 107','97-107','97 to 107 meq/l','97 to 107 mmol/l'],
 rationale:'Normal serum chloride is generally 97–107 mEq/L (97–107 mmol/L). Chloride is the major anion of the extracellular fluid and has an inverse relationship with bicarbonate.',
 tip:'NCLEX tip: chloride, sodium, and bicarbonate are physiologically linked — when one shifts, predict how the others will likely move in the opposite or same direction based on the acid-base relationship.'},

{id:'g28',type:'bowtie',stem:'A client recovering from bariatric (gastric) surgery reports sweating, weakness, and heart palpitations about 20 minutes after eating a meal high in simple sugars. Complete the bowtie: select the most likely complication, two priority nursing actions, and two teaching points for prevention.',
 sections:[
  {label:'Likely complication (select 1)', correctCount:1, options:[
    {t:'Dumping syndrome',c:true},
    {t:'Acute cholecystitis',c:false},
    {t:'Bowel obstruction',c:false},
    {t:'Peptic ulcer perforation',c:false},
  ]},
  {label:'Priority actions (select 2)', correctCount:2, options:[
    {t:'Have the client lie down or recline after eating',c:true},
    {t:'Assess vital signs and blood glucose',c:true},
    {t:'Encourage the client to walk briskly immediately after eating',c:false},
    {t:'Administer a large glass of fruit juice to raise blood sugar quickly',c:false},
    {t:'Withhold all future oral intake indefinitely',c:false},
  ]},
  {label:'Prevention teaching (select 2)', correctCount:2, options:[
    {t:'Eat smaller, more frequent meals',c:true},
    {t:'Avoid simple sugars and concentrated sweets',c:true},
    {t:'Drink large amounts of fluid with each meal',c:false},
    {t:'Eat larger meals less often to reduce meal frequency',c:false},
  ]},
 ],
 rationale:'This presentation is consistent with dumping syndrome from rapid gastric emptying of simple sugars. The nurse should assess vitals/glucose and have the client recline, then teach smaller frequent meals and avoidance of concentrated sweets to prevent recurrence; fluids are best limited with meals and taken between meals instead.',
 tip:'NCLEX tip: dumping syndrome prevention teaching centers on slowing gastric emptying — small frequent low-sugar meals, lying down after eating, and separating fluids from meals.'},

{id:'g29',type:'hotspot',stem:'The nurse is reviewing a client\'s history for risk factors of peptic ulcer disease. Click the factor in the client\'s history that is most directly linked to PUD development.',
 passage:[
  {t:'The client has taken ibuprofen daily for chronic joint pain for the past two years.',c:true},
  {t:'The client drinks two cups of decaffeinated tea each morning.',c:false},
  {t:'The client walks for exercise three times a week.',c:false},
  {t:'The client had a tonsillectomy as a child.',c:false},
 ],
 rationale:'Chronic NSAID use, such as daily ibuprofen, is a well-established risk factor for peptic ulcer disease because NSAIDs impair the protective prostaglandin-mediated mucosal barrier of the stomach and duodenum.',
 tip:'NCLEX tip: whenever a stem mentions long-term NSAID use, connect it to GI mucosal injury and PUD risk — this is one of the most frequently tested medication-related GI risk factors.'},

{id:'g30',type:'mc',stem:'A client with active upper GI bleeding is admitted. Which nursing action is the priority?',
 options:[
  {t:'Encourage oral intake of clear liquids to maintain hydration',c:false,why:'Clients with active GI bleeding are typically kept NPO, not given oral fluids, until the source of bleeding is identified and controlled.'},
  {t:'Establish IV access and prepare for fluid resuscitation while monitoring vital signs closely',c:true,why:''},
  {t:'Administer a laxative to clear the bowel before endoscopy',c:false,why:'A laxative is not appropriate in the setting of active GI bleeding and could worsen the client\'s hemodynamic status; NPO status and stabilization take priority.'},
  {t:'Delay any intervention until the client has been NPO for eight hours',c:false,why:'Waiting a fixed period before intervening is inappropriate and dangerous in active GI bleeding, which requires prompt stabilization rather than a delay.'},
 ],
 rationale:'In active GI bleeding, the priority is to establish IV access for fluid resuscitation, closely monitor vital signs for signs of hypovolemic shock, and prepare for possible blood transfusion and endoscopy, while maintaining NPO status.',
 tip:'NCLEX tip: for any acute GI bleed question, prioritize circulation first — IV access, fluids, and vital sign monitoring — before diagnostic or definitive treatment steps.'},
{id:'g31',type:'mc',stem:'A client with GERD has a hiatal hernia identified on imaging. How does this condition contribute to reflux symptoms?',
 options:[
  {t:'Part of the stomach protrudes above the diaphragm, contributing to LES incompetence and reflux',c:true,why:''},
  {t:'It causes the stomach to produce less acid, paradoxically increasing reflux symptoms',c:false,why:'Hiatal hernia does not reduce acid production; its contribution to GERD relates to LES competence and anatomic positioning, not acid output.'},
  {t:'It blocks the pyloric sphincter, preventing stomach emptying entirely',c:false,why:'A hiatal hernia involves the upper stomach and diaphragm, not the pyloric sphincter, and does not cause complete gastric outlet obstruction.'},
  {t:'It has no established relationship to GERD symptoms',c:false,why:'Hiatal hernia is a recognized contributing factor to GERD, not an unrelated finding.'},
 ],
 rationale:'A hiatal hernia allows part of the stomach to protrude above the diaphragm, which can disrupt the normal anti-reflux barrier of the lower esophageal sphincter and contribute to GERD symptoms.',
 tip:'NCLEX tip: hiatal hernia, incompetent LES, and pyloric stenosis are grouped together as anatomic/functional contributors to GERD — know all three.'},

{id:'g32',type:'mc',stem:'A client with GERD is prescribed a proton pump inhibitor. What is the mechanism of action the nurse should explain?',
 options:[
  {t:'It reduces gastric acid secretion, allowing esophageal tissue to heal and reducing reflux symptoms',c:true,why:''},
  {t:'It directly strengthens the lower esophageal sphincter muscle tone',c:false,why:'PPIs work by reducing acid secretion, not by directly strengthening sphincter muscle tone.'},
  {t:'It increases gastric emptying time to prevent reflux',c:false,why:'PPIs are not primarily prokinetic agents; their main action is acid suppression rather than altering gastric emptying speed.'},
  {t:'It neutralizes stomach acid immediately upon administration, similar to an antacid',c:false,why:'PPIs work by blocking acid production over time rather than providing the immediate neutralizing effect of an antacid.'},
 ],
 rationale:'Proton pump inhibitors reduce gastric acid secretion by blocking the proton pump in gastric parietal cells, allowing inflamed esophageal tissue to heal and reducing GERD symptoms over time.',
 tip:'NCLEX tip: distinguish antacids (immediate neutralization) from H2 blockers and PPIs (reduce acid production, slower onset) when explaining GERD medication classes.'},

{id:'g33',type:'mc',stem:'Which lifestyle modification is most appropriate for a client with GERD who reports nighttime symptoms?',
 options:[
  {t:'Elevate the head of the bed and avoid eating for several hours before lying down',c:true,why:''},
  {t:'Lie flat immediately after eating to help with digestion',c:false,why:'Lying flat right after eating promotes reflux and would worsen nighttime GERD symptoms rather than help.'},
  {t:'Eat a large meal right before bedtime to ensure a full night without hunger',c:false,why:'A large meal before bedtime increases gastric volume and pressure, worsening nighttime reflux.'},
  {t:'Increase intake of citrus fruits and chocolate in the evening',c:false,why:'Citrus and chocolate are recognized GERD trigger foods and would likely worsen symptoms, not help them.'},
 ],
 rationale:'Elevating the head of the bed and avoiding eating for a few hours before lying down reduces nighttime reflux by using gravity to help keep stomach contents down and allowing digestion to occur before recumbency.',
 tip:'NCLEX tip: "elevate the head of the bed, avoid eating before bed" is one of the most consistently tested GERD lifestyle teaching points.'},

{id:'g34',type:'mc',stem:'A client with severe, medication-refractory GERD is being considered for surgical management. Which procedure would the nurse expect to be discussed?',
 options:[
  {t:'Nissen fundoplication',c:true,why:''},
  {t:'Total proctocolectomy',c:false,why:'This procedure is used for severe inflammatory bowel disease affecting the colon, not for GERD.'},
  {t:'Whipple procedure',c:false,why:'The Whipple procedure addresses pancreatic head disease, not GERD.'},
  {t:'Restorative proctocolectomy with ileal pouch-anal anastomosis',c:false,why:'This procedure is specific to ulcerative colitis management, not GERD.'},
 ],
 rationale:'Nissen fundoplication, which wraps the gastric fundus around the lower esophageal sphincter, is the surgical option considered when medical management of GERD fails.',
 tip:'NCLEX tip: Nissen fundoplication is the single surgical procedure to associate specifically with refractory GERD.'},

{id:'g35',type:'mc',stem:'A client with long-standing GERD is found to have Barrett esophagus on endoscopy. Which demographic is most classically associated with this condition?',
 options:[
  {t:'White men age 50 or older with a history of GERD, smoking, and obesity',c:true,why:''},
  {t:'Young adult women with no history of reflux symptoms',c:false,why:'This demographic does not reflect the population classically associated with Barrett esophagus in the course material.'},
  {t:'Children under age 10 with recurrent vomiting',c:false,why:'Barrett esophagus predominates in older adults, not young children, and is linked to long-standing GERD and other risk factors.'},
  {t:'Clients with no history of tobacco use or obesity',c:false,why:'Smoking and obesity are recognized risk factors for Barrett esophagus, so a client without either would not represent the classic demographic profile.'},
 ],
 rationale:'Barrett esophagus predominates in White men age 50 or older and is associated with GERD, smoking, obesity, and family history.',
 tip:'NCLEX tip: connect the Barrett esophagus demographic profile (older White men) with its major risk factors (GERD, smoking, obesity) as a package of testable facts.'},

{id:'g36',type:'mc',stem:'A client with Barrett esophagus undergoes endoscopic ablation for dysplasia. What is the expected outcome discussed in the course material?',
 options:[
  {t:'Endoscopic ablation can eliminate Barrett esophagus in up to 80% of cases',c:true,why:''},
  {t:'Endoscopic ablation is completely ineffective and rarely used',c:false,why:'This understates the described effectiveness; ablation is noted to eliminate Barrett esophagus in a high percentage of cases.'},
  {t:'Endoscopic ablation guarantees that esophageal cancer will never develop',c:false,why:'While ablation reduces risk, it does not offer an absolute guarantee against future cancer development, so ongoing surveillance remains important.'},
  {t:'Endoscopic ablation is used only for esophageal varices, not Barrett esophagus',c:false,why:'Endoscopic ablation in this context is specifically used for Barrett esophagus with dysplasia, not for esophageal varices.'},
 ],
 rationale:'Endoscopic ablation can eliminate Barrett esophagus in up to 80% of cases, making it an important treatment option for dysplasia, alongside endoscopic resection and ongoing surveillance biopsies.',
 tip:'NCLEX tip: "up to 80%" is the specific ablation success statistic worth remembering for Barrett esophagus treatment questions.'},

{id:'g37',type:'mc',stem:'A client asks how often follow-up surveillance biopsies are needed after a negative dysplasia finding in Barrett esophagus. What is the most accurate response?',
 options:[
  {t:'"Follow-up biopsies are generally recommended no sooner than three to five years after a negative finding."',c:true,why:''},
  {t:'"You will need a follow-up biopsy every week for the first year."',c:false,why:'This is far too frequent and does not reflect the recommended surveillance interval described in the course material.'},
  {t:'"No further surveillance biopsies are ever needed once one negative result is obtained."',c:false,why:'Ongoing surveillance remains important even after a negative finding, given the malignant potential of Barrett esophagus.'},
  {t:'"Follow-up biopsies are only needed if new symptoms develop."',c:false,why:'Surveillance biopsies are recommended on an ongoing schedule regardless of new symptoms, since dysplasia can progress silently.'},
 ],
 rationale:'Follow-up surveillance biopsies for Barrett esophagus are recommended no sooner than three to five years after a negative dysplasia finding, balancing ongoing cancer risk monitoring with avoiding unnecessary frequent procedures.',
 tip:'NCLEX tip: "3 to 5 years after a negative finding" is the specific surveillance interval to remember for Barrett esophagus follow-up.'},

{id:'g38',type:'mc',stem:'Which statement about H. pylori infection is accurate?',
 options:[
  {t:'It is a leading cause of chronic gastritis and peptic ulcer disease, and is often asymptomatic unless complicated',c:true,why:''},
  {t:'It always produces severe, immediate symptoms in every infected client',c:false,why:'H. pylori infection is often asymptomatic unless complications develop, so this statement overstates the typical presentation.'},
  {t:'It is diagnosed exclusively through blood pressure monitoring',c:false,why:'H. pylori is diagnosed using a breath test, not blood pressure monitoring, which is unrelated to this infection.'},
  {t:'It cannot be treated with antibiotics and requires surgery in all cases',c:false,why:'H. pylori is typically treated with a combination of a PPI and antibiotics, not surgery, in the majority of cases.'},
 ],
 rationale:'H. pylori is a bacterium infecting the stomach and duodenum that is often asymptomatic unless complicated, and is a leading cause of chronic gastritis and peptic ulcer disease; it is diagnosed with a breath test and treated with a PPI plus antibiotics.',
 tip:'NCLEX tip: connect H. pylori\'s diagnostic test (breath test) with its treatment (PPI plus antibiotics) as a linked fact pair.'},

{id:'g39',type:'mc',stem:'A client with peptic ulcer disease is prescribed sucralfate. When should this medication be administered for maximum effectiveness?',
 options:[
  {t:'About one hour before meals',c:true,why:''},
  {t:'Immediately after meals, with food still present in the stomach',c:false,why:'Sucralfate is most effective when given before meals so it can coat the mucosa before food and acid exposure, not after eating.'},
  {t:'Only at bedtime, regardless of meal timing',c:false,why:'Sucralfate timing is tied to meals (about one hour before), not simply to bedtime administration.'},
  {t:'At the same time as an antacid, for enhanced effect',c:false,why:'Taking sucralfate at the same time as an antacid can actually reduce its effectiveness, since antacids can interfere with its mucosal-coating action.'},
 ],
 rationale:'Sucralfate is a mucosal barrier protectant that works best when given about one hour before meals, allowing it to coat and protect the ulcerated mucosa before food and acid exposure.',
 tip:'NCLEX tip: sucralfate timing (before meals) and its potential interaction with antacids are both classic testable medication-administration details.'},

{id:'g40',type:'mc',stem:'A client recovering from gastric surgery for PUD develops symptoms of B12 deficiency several months later. What is the underlying mechanism?',
 options:[
  {t:'Loss of intrinsic factor-producing stomach tissue impairs B12 absorption',c:true,why:''},
  {t:'Excess dietary intake of B12 has overwhelmed normal metabolism',c:false,why:'B12 deficiency after gastric surgery results from impaired absorption, not from excess intake.'},
  {t:'The surgery directly destroyed the client\'s bone marrow function',c:false,why:'Gastric surgery does not directly affect bone marrow; the B12 deficiency mechanism relates to loss of intrinsic factor production in the stomach.'},
  {t:'B12 deficiency is unrelated to gastric surgery and is a coincidental finding',c:false,why:'B12 deficiency is a recognized, mechanistically linked postoperative complication of gastric surgery, not a coincidental finding.'},
 ],
 rationale:'Intrinsic factor, produced by stomach cells, is necessary for B12 absorption in the small intestine; removal or alteration of stomach tissue during gastric surgery can impair intrinsic factor production, leading to B12 deficiency over time.',
 tip:'NCLEX tip: intrinsic factor is the key link between gastric surgery and delayed B12 deficiency — remember this mechanism, not just the association.'},

{id:'g41',type:'mc',stem:'A client with active upper GI bleeding from a peptic ulcer is being monitored. Which finding would most concern the nurse?',
 options:[
  {t:'Heart rate increasing from 82 to 118 bpm with a drop in blood pressure',c:true,why:''},
  {t:'A single episode of dark stool several days ago that has since resolved',c:false,why:'A resolved, isolated episode from several days ago is less immediately concerning than new, active hemodynamic changes.'},
  {t:'Client reports mild fatigue that has been stable for the past week',c:false,why:'Stable, longstanding fatigue is less urgent than an acute change in heart rate and blood pressure suggesting active bleeding.'},
  {t:'Hemoglobin that is unchanged from the admission baseline',c:false,why:'An unchanged hemoglobin is reassuring rather than concerning, unlike new tachycardia and hypotension, which suggest ongoing blood loss.'},
 ],
 rationale:'Rising heart rate with falling blood pressure suggests ongoing blood loss and impending hypovolemic shock, requiring immediate nursing attention and provider notification in a client with active GI bleeding.',
 tip:'NCLEX tip: tachycardia plus hypotension together are the classic early warning sign combination for hypovolemic shock in any bleeding scenario.'},

{id:'g42',type:'sata',stem:'The nurse is providing discharge teaching for a client recovering from PUD. Which statements indicate correct understanding? Select all that apply.',
 options:[
  {t:'"I will avoid NSAIDs like ibuprofen for pain relief going forward."',c:true,why:''},
  {t:'"I should continue my acid-suppressing medication for the full prescribed course."',c:true,why:''},
  {t:'"I will call my provider right away if I notice black, tarry stools."',c:true,why:''},
  {t:'"It\'s fine to keep smoking as long as I take my medication."',c:false,why:'Smoking is a recognized irritant that should be avoided in PUD management, regardless of medication use, since it can worsen mucosal injury and delay healing.'},
  {t:'"I can drink alcohol and coffee as long as I limit it to special occasions."',c:false,why:'Alcohol and caffeine are recognized irritants that should generally be avoided in PUD management, not simply limited to special occasions.'},
 ],
 rationale:'PUD discharge teaching includes avoiding NSAIDs, alcohol, caffeine, and smoking, completing the full course of prescribed acid-suppressing medication, and promptly reporting signs of GI bleeding such as melena.',
 tip:'NCLEX tip: build a consistent "avoid list" for PUD — NSAIDs, alcohol, caffeine, and smoking — since it\'s repeatedly tested across different question formats.'},

{id:'g43',type:'mc',stem:'Which of the following is a recognized trigger food commonly associated with worsening GERD symptoms?',
 options:[
  {t:'Chocolate',c:true,why:''},
  {t:'Plain white rice',c:false,why:'Plain white rice is a bland food and not among the classic GERD trigger foods.'},
  {t:'Steamed, unseasoned vegetables',c:false,why:'Steamed, unseasoned vegetables are generally well tolerated and are not classic GERD triggers.'},
  {t:'Plain crackers',c:false,why:'Plain crackers are a bland food not typically associated with triggering GERD symptoms.'},
 ],
 rationale:'Chocolate is a recognized GERD trigger food, along with citrus, tomatoes, coffee, and fried or fatty foods, all of which can relax the LES or increase acid production.',
 tip:'NCLEX tip: memorize the classic GERD trigger food list — citrus, tomatoes, coffee, chocolate, and fried/fatty foods — as a set.'},

{id:'g44',type:'mc',stem:'A client with Crohn\'s disease in the sub-acute recovery phase is progressing through diet advancement. What is the correct order of diet progression described in the course material?',
 options:[
  {t:'Clear liquids, then low fiber, then high protein',c:true,why:''},
  {t:'High protein, then low fiber, then clear liquids',c:false,why:'This reverses the correct progression order described for advancing the diet during the sub-acute phase.'},
  {t:'Regular diet immediately, with no gradual progression needed',c:false,why:'A gradual progression is used rather than immediately resuming a regular diet, to avoid overwhelming a healing bowel.'},
  {t:'High fiber, then clear liquids, then low fiber',c:false,why:'This is not the correct order; high-fiber foods are generally avoided early in recovery, not introduced first.'},
 ],
 rationale:'During the sub-acute phase of IBD recovery, the diet is advanced from clear liquids to a low-fiber diet, and then to a high-protein diet as tolerance improves.',
 tip:'NCLEX tip: memorize the IBD diet advancement sequence as a simple three-step progression: clear liquids, low fiber, high protein.'},

{id:'g45',type:'mc',stem:'A client with ulcerative colitis is prescribed a salicylate medication. What is the general purpose of this medication class in IBD management?',
 options:[
  {t:'To reduce inflammation in the bowel',c:true,why:''},
  {t:'To directly kill bacteria causing the disease',c:false,why:'Salicylates work primarily as anti-inflammatory agents in IBD, not as direct antibacterial agents.'},
  {t:'To replace the need for dietary modification entirely',c:false,why:'Medication does not replace the need for dietary modification; both are typically used together in IBD management.'},
  {t:'To suppress the immune system as their primary mechanism',c:false,why:'Immunosuppression is more characteristic of a different medication class used in IBD, not the primary mechanism of salicylates.'},
 ],
 rationale:'Salicylate medications used in IBD management work primarily to reduce inflammation in the bowel, and are one of several medication classes (along with corticosteroids, antibiotics, and immunosuppressants) used to manage the disease.',
 tip:'NCLEX tip: group IBD medications by general mechanism — salicylates/corticosteroids for inflammation, immunosuppressants for immune modulation, antibiotics for infection, antidiarrheals for symptom control.'},

{id:'g46',type:'mc',stem:'Which food would the nurse instruct a client with IBD to avoid during an acute flare?',
 options:[
  {t:'Popcorn',c:true,why:''},
  {t:'Well-cooked white rice',c:false,why:'Well-cooked, low-fiber foods like white rice are generally better tolerated during a flare, unlike popcorn.'},
  {t:'Clear broth',c:false,why:'Clear broth is an appropriate low-residue choice during a flare, not a food to avoid.'},
  {t:'Plain, peeled applesauce',c:false,why:'Plain, peeled, low-fiber foods like applesauce are typically well tolerated and are not on the avoid list during a flare.'},
 ],
 rationale:'Popcorn is a gas-forming, high-fiber food that can irritate the bowel and worsen cramping during an acute IBD flare, unlike well-cooked, low-fiber foods, which are generally better tolerated.',
 tip:'NCLEX tip: popcorn, nuts, and seeds are frequently used together as classic "avoid during a flare" answer choices in IBD nutrition questions.'},

{id:'g47',type:'mc',stem:'A client with diverticulitis develops a palpable, tender rectal mass along with fever. What should the nurse recognize about this finding?',
 options:[
  {t:'It may indicate a localized abscess or significant inflammation requiring further evaluation',c:true,why:''},
  {t:'It is a benign, expected finding requiring no further workup',c:false,why:'A palpable, tender rectal mass with fever is a concerning finding that requires further evaluation, not one to dismiss as benign.'},
  {t:'It confirms the client has fully recovered from the acute episode',c:false,why:'This finding suggests ongoing or worsening inflammation, not recovery, and should prompt further assessment.'},
  {t:'It is unrelated to the diverticulitis diagnosis and should be ignored',c:false,why:'This finding is specifically associated with diverticulitis and its potential complications, so it should not be disregarded.'},
 ],
 rationale:'A palpable, tender rectal mass in a client with diverticulitis may indicate a localized abscess or more significant inflammation, both recognized potential findings that warrant further evaluation.',
 tip:'NCLEX tip: any new mass or worsening tenderness in a client with known diverticulitis should raise concern for a complication such as abscess or perforation.'},

{id:'g48',type:'mc',stem:'Which nursing instruction is appropriate for a client recovering from an acute diverticulitis episode who is being discharged home?',
 options:[
  {t:'Gradually reintroduce a high-fiber diet once the inflammation has resolved, and avoid straining or heavy lifting',c:true,why:''},
  {t:'Maintain a permanent low-fiber diet indefinitely to prevent future episodes',c:false,why:'Long-term, a high-fiber diet is actually recommended to help prevent recurrence, once the acute inflammation has resolved, not a permanent low-fiber diet.'},
  {t:'Resume heavy lifting and strenuous activity immediately upon discharge',c:false,why:'Straining, lifting, and strenuous activity should be avoided during recovery to reduce the risk of complications.'},
  {t:'Restrict all fluid intake to reduce bowel activity',c:false,why:'Fluid intake should actually be increased (generally 2500-3000 mL/day unless contraindicated), not restricted, to support healthy bowel function.'},
 ],
 rationale:'After acute diverticulitis resolves, clients are taught to gradually reintroduce high-fiber foods to help prevent recurrence, increase fluid intake, and avoid straining, lifting, bending, or coughing that raises intra-abdominal pressure.',
 tip:'NCLEX tip: diverticulitis discharge teaching flips the acute-phase restrictions — high fiber becomes protective long-term, but straining/lifting avoidance continues.'},

{id:'g49',type:'mc',stem:'A client with suspected appendicitis has a CRP drawn within the first 12 hours of symptom onset. What should the nurse expect regarding this result over time if the disease progresses?',
 options:[
  {t:'CRP is often elevated early and may normalize after 24 hours in prolonged cases',c:true,why:''},
  {t:'CRP is always normal in appendicitis regardless of timing',c:false,why:'CRP is typically elevated in appendicitis, especially early in the process, not consistently normal.'},
  {t:'CRP only becomes abnormal after the appendix has already ruptured',c:false,why:'CRP can be elevated even before rupture, particularly within the first 12 hours, rather than only becoming abnormal after rupture occurs.'},
  {t:'CRP results are not used in the evaluation of suspected appendicitis',c:false,why:'CRP is, in fact, used as part of the diagnostic workup for suspected appendicitis, alongside WBC count and imaging.'},
 ],
 rationale:'CRP is often elevated in appendicitis, especially within the first 12 hours of symptom onset, though it may normalize after 24 hours in prolonged cases, making early timing important when interpreting this lab value.',
 tip:'NCLEX tip: CRP and WBC count are used together in appendicitis workups — CRP\'s timing sensitivity (early elevation, possible normalization later) is a specific, testable detail.'},

{id:'g50',type:'mc',stem:'A client is diagnosed with a perforated appendix during surgery. Compared with a nonperforated case, what should the nurse anticipate regarding postoperative care?',
 options:[
  {t:'A longer hospital stay with closer monitoring for secondary abscess formation',c:true,why:''},
  {t:'Same-day discharge regardless of the perforation',c:false,why:'Same-day discharge is more typical of uncomplicated laparoscopic cases, not perforated or complicated appendicitis requiring longer monitoring.'},
  {t:'No need for antibiotic therapy since the appendix has already been removed',c:false,why:'Antibiotic prophylaxis is still needed, often for a longer duration in perforated cases, rather than being unnecessary after removal.'},
  {t:'Immediate return to unrestricted activity the same day as surgery',c:false,why:'A complicated, perforated case typically requires more cautious activity progression and closer monitoring than an uncomplicated case.'},
 ],
 rationale:'Complicated appendicitis cases, such as perforated or gangrenous appendix, typically require a longer hospital stay, closer monitoring for secondary abscess formation, and may need home health follow-up, unlike uncomplicated laparoscopic cases that may allow same-day discharge.',
 tip:'NCLEX tip: perforation status is the key variable that changes appendicitis postoperative expectations — complicated cases mean longer stays and more monitoring.'},

{id:'g51',type:'mc',stem:'Which combination best reflects the pathophysiology of acute pancreatitis?',
 options:[
  {t:'Autodigestion of the pancreas by its own enzymes, particularly trypsin, following enzyme activation',c:true,why:''},
  {t:'Direct viral destruction of pancreatic beta cells only',c:false,why:'While viral infection is a recognized cause, the core pathophysiology of acute pancreatitis is enzymatic autodigestion, not a description limited to beta cell destruction.'},
  {t:'Complete atrophy of the pancreas from chronic disuse',c:false,why:'This does not describe the mechanism of acute pancreatitis, which involves active enzyme-mediated tissue injury, not atrophy from disuse.'},
  {t:'An autoimmune process targeting only the exocrine pancreatic ducts',c:false,why:'While autoimmune pancreatitis exists as a rare entity, the classic pathophysiology described in this course centers on enzymatic autodigestion, not a primarily autoimmune ductal process.'},
 ],
 rationale:'Acute pancreatitis involves autodigestion of the pancreas by its own enzymes, particularly trypsin; gallstones obstructing the ampulla of Vater can cause reflux of bile into the pancreatic duct, activating enzymes that lead to vasodilation, increased permeability, necrosis, and hemorrhage.',
 tip:'NCLEX tip: "autodigestion by trypsin" is the core phrase to remember for acute pancreatitis pathophysiology questions.'},

{id:'g52',type:'mc',stem:'According to the Revised Atlanta Classification, which category of acute pancreatitis is defined by persistent organ failure lasting more than 48 hours?',
 options:[
  {t:'Mild',c:false,why:'Mild acute pancreatitis is defined by the absence of organ failure or local/systemic complications, not by persistent organ failure.'},
  {t:'Moderately severe',c:false,why:'Moderately severe pancreatitis involves transient organ failure or local/systemic complications, not persistent organ failure beyond 48 hours.'},
  {t:'Severe',c:true,why:''},
  {t:'Chronic',c:false,why:'Chronic pancreatitis is a distinct, separate long-term condition and is not part of the acute severity classification described here.'},
 ],
 rationale:'The Revised Atlanta Classification defines severe acute pancreatitis as persistent organ failure lasting more than 48 hours, distinguishing it from mild (no organ failure) and moderately severe (transient organ failure) categories.',
 tip:'NCLEX tip: remember the three Atlanta categories in order of severity — mild (no organ failure), moderately severe (transient), severe (persistent, >48 hrs).'},

{id:'g53',type:'mc',stem:'Which score or tool is used to help predict mortality risk in acute pancreatitis based on criteria measured on admission and within 48 hours?',
 options:[
  {t:'Ranson Criteria',c:true,why:''},
  {t:'Glasgow Coma Scale',c:false,why:'The Glasgow Coma Scale assesses level of consciousness and is unrelated to predicting pancreatitis mortality specifically.'},
  {t:'RIFLE classification',c:false,why:'RIFLE is used to classify acute kidney injury severity, not to predict pancreatitis mortality.'},
  {t:'West Haven grading system',c:false,why:'The West Haven grading system is used for hepatic encephalopathy severity, not pancreatitis mortality prediction.'},
 ],
 rationale:'Ranson Criteria is a scoring tool that uses specific admission and 48-hour lab and clinical values to help predict mortality risk in acute pancreatitis, alongside other tools like APACHE II and BISAP.',
 tip:'NCLEX tip: keep pancreatitis-specific tools (Ranson, APACHE II, BISAP) separate from unrelated scoring systems used in other body systems (RIFLE for kidneys, West Haven for liver).'},

{id:'g54',type:'mc',stem:'A client with acute pancreatitis has a WBC of 17,200/mm³ and glucose of 210 mg/dL on admission. According to Ranson Criteria concepts, what does this suggest?',
 options:[
  {t:'These values represent admission risk factors that contribute to a higher predicted mortality score',c:true,why:''},
  {t:'These values have no relationship to prognostic scoring in pancreatitis',c:false,why:'WBC and glucose are, in fact, specific Ranson admission criteria used to help predict pancreatitis mortality risk.'},
  {t:'These values indicate the client\'s pancreatitis has already fully resolved',c:false,why:'Elevated WBC and glucose on admission reflect ongoing acute illness and risk, not resolution of the condition.'},
  {t:'These values are only relevant to chronic, not acute, pancreatitis',c:false,why:'These specific admission criteria (WBC >16,000, glucose >200) are part of the Ranson Criteria used specifically for acute pancreatitis mortality prediction.'},
 ],
 rationale:'Admission WBC greater than 16,000/mm³ and glucose greater than 200 mg/dL are two of the specific Ranson Criteria admission risk factors used to help predict mortality in acute pancreatitis; more positive signs correlate with higher mortality risk.',
 tip:'NCLEX tip: familiarize yourself with a few key Ranson admission values (age >55, WBC >16,000, glucose >200) since NCLEX may test recognition of these specific numbers.'},

{id:'g55',type:'mc',stem:'A client with acute pancreatitis is noted to have ecchymosis around the umbilicus. What does this finding suggest?',
 options:[
  {t:'Severe disease with possible hemorrhagic pancreatitis',c:true,why:''},
  {t:'A normal, expected finding with no clinical significance',c:false,why:'Ecchymosis in the flank or around the umbilicus is a concerning finding associated with more severe, hemorrhagic disease, not a benign or expected finding.'},
  {t:'Resolution of the acute pancreatitis episode',c:false,why:'This finding suggests worsening, severe disease rather than resolution of the condition.'},
  {t:'An unrelated dermatologic condition requiring only topical treatment',c:false,why:'This finding is directly related to the severity of the underlying pancreatitis, not an unrelated skin condition.'},
 ],
 rationale:'Ecchymosis in the flank or around the umbilicus in acute pancreatitis suggests severe disease with possible hemorrhagic pancreatitis, reflecting significant vascular injury and bleeding into the tissues.',
 tip:'NCLEX tip: ecchymosis around the umbilicus or in the flank in a pancreatitis client is a red flag for severe, hemorrhagic disease requiring close monitoring.'},

{id:'g56',type:'mc',stem:'Which diagnostic criterion set is used to confirm a diagnosis of acute pancreatitis?',
 options:[
  {t:'Two of three: characteristic abdominal pain, serum amylase/lipase greater than three times normal, and characteristic imaging findings',c:true,why:''},
  {t:'All three: elevated WBC, elevated glucose, and elevated bilirubin, with no other criteria needed',c:false,why:'This is not the diagnostic criterion set used for acute pancreatitis; the recognized criteria involve pain, enzyme levels, and imaging.'},
  {t:'A single finding of abdominal pain alone is sufficient for diagnosis',c:false,why:'Abdominal pain alone is not sufficient; at least two of the three specific criteria (pain, enzyme elevation, imaging) are needed for diagnosis.'},
  {t:'Diagnosis requires ERCP in every case before treatment can begin',c:false,why:'ERCP is rarely used diagnostically in acute pancreatitis because the client is often too acutely ill; it is more useful later for treating gallstone pancreatitis.'},
 ],
 rationale:'Acute pancreatitis diagnosis generally requires meeting two of three criteria: history of characteristic upper abdominal pain, serum amylase/lipase greater than three times the normal value, and characteristic findings on imaging such as CT, MRI, or ultrasound.',
 tip:'NCLEX tip: "two out of three" is the specific diagnostic rule to memorize for acute pancreatitis — pain, enzymes, and imaging are the three criteria.'},

{id:'g57',type:'mc',stem:'A client with acute pancreatitis is started on enteral feeding rather than parenteral nutrition. What is the primary rationale for this choice?',
 options:[
  {t:'Enteral feeding is safer, more cost-effective, and reduces infection risk compared with parenteral nutrition',c:true,why:''},
  {t:'Enteral feeding provides significantly more calories than parenteral nutrition ever could',c:false,why:'Caloric content is not the primary rationale; the preference for enteral feeding is based on safety, cost, and infection risk reduction.'},
  {t:'Enteral feeding eliminates the need for any pain management',c:false,why:'Enteral feeding does not affect the need for pain management, which is addressed separately in acute pancreatitis care.'},
  {t:'Enteral feeding is used only when the client refuses IV access',c:false,why:'Enteral feeding is preferred based on clinical evidence regarding safety and outcomes, not simply as a fallback for refused IV access.'},
 ],
 rationale:'Enteral nutrition is preferred over parenteral nutrition in acute pancreatitis when tolerated because it is safer, more cost-effective, and reduces infection risk; parenteral nutrition is reserved for those who cannot tolerate enteral feeding.',
 tip:'NCLEX tip: "enteral over parenteral when possible" is a recurring nutrition-support theme tested across several GI conditions, not unique to pancreatitis.'},

{id:'g58',type:'mc',stem:'A client with acute pancreatitis is receiving opioids for pain control. Why must the nurse use caution with high-dose opioid administration in this population?',
 options:[
  {t:'High-dose opioids increase the risk of GI paralysis or ileus',c:true,why:''},
  {t:'High-dose opioids directly worsen serum lipase levels',c:false,why:'Opioids do not directly affect lipase levels; the concern with high-dose opioids relates to their effect on bowel motility.'},
  {t:'High-dose opioids are completely contraindicated in all pancreatitis clients regardless of severity',c:false,why:'Opioids are used for pain control in pancreatitis, just with caution around dosing, rather than being entirely contraindicated.'},
  {t:'High-dose opioids increase the risk of hypercalcemia',c:false,why:'Opioids are not linked to causing hypercalcemia; the specific concern in pancreatitis is their effect on bowel motility (ileus risk).'},
 ],
 rationale:'High-dose opioids used for pain control in acute pancreatitis carry a risk of GI paralysis or ileus, so the nurse must use caution and follow a stepwise pain management approach, such as the WHO pain ladder.',
 tip:'NCLEX tip: connect opioid dosing caution in pancreatitis specifically to ileus risk — this is the key rationale tested rather than a blanket opioid contraindication.'},

{id:'g59',type:'mc',stem:'A client with acute pancreatitis develops infected pancreatic necrosis. What is the recommended initial approach according to the "step-up" strategy described in the course material?',
 options:[
  {t:'Percutaneous or endoscopic catheter drainage first, followed by minimally invasive débridement if needed',c:true,why:''},
  {t:'Immediate open surgical débridement as the very first step in all cases',c:false,why:'The step-up approach favors starting with less invasive drainage methods before proceeding to more invasive débridement, rather than jumping straight to open surgery.'},
  {t:'Prophylactic antibiotics alone, without any drainage or surgical intervention',c:false,why:'Prophylactic antibiotics are not recommended as a standalone approach; drainage and, if needed, débridement are the recommended steps.'},
  {t:'No intervention is needed since infected necrosis resolves spontaneously',c:false,why:'Infected pancreatic necrosis is a serious complication requiring active intervention, not spontaneous resolution without treatment.'},
 ],
 rationale:'The "step-up" approach for infected pancreatic necrosis begins with percutaneous or endoscopic catheter drainage, followed by minimally invasive débridement only if needed, and prophylactic antibiotics are not recommended as a standalone strategy.',
 tip:'NCLEX tip: remember "step-up" means starting minimally invasive (drainage) before escalating to more invasive débridement — and that routine prophylactic antibiotics are not recommended.'},

{id:'g60',type:'mc',stem:'Which nursing position is most appropriate for a client with acute pancreatitis to reduce pressure on the diaphragm and ease pain?',
 options:[
  {t:'Semi-Fowler position',c:true,why:''},
  {t:'Flat supine position',c:false,why:'A flat supine position increases pressure on the diaphragm and abdominal organs, which can worsen both pain and breathing difficulty.'},
  {t:'Trendelenburg position',c:false,why:'Trendelenburg position would increase abdominal and diaphragmatic pressure, worsening rather than relieving pancreatitis-related discomfort.'},
  {t:'Prone position',c:false,why:'Prone positioning is not the recommended position for pancreatitis-related pain relief and diaphragmatic pressure reduction.'},
 ],
 rationale:'Semi-Fowler positioning helps ease pressure on the diaphragm in acute pancreatitis, improving comfort and supporting more effective breathing.',
 tip:'NCLEX tip: semi-Fowler for pancreatitis, high Fowler for post-abdominal surgery — both reduce diaphragmatic pressure but are used in slightly different contexts.'},

{id:'g61',type:'sata',stem:'The nurse is providing discharge teaching for a client recovering from acute pancreatitis. Which teaching points are appropriate? Select all that apply.',
 options:[
  {t:'Gradually reintroduce oral intake with a low-fat, low-protein diet initially',c:true,why:''},
  {t:'Eliminate caffeine and alcohol intake',c:true,why:''},
  {t:'Report any recurrence of severe abdominal pain promptly',c:true,why:''},
  {t:'Resume a high-fat diet immediately to regain lost weight quickly',c:false,why:'A high-fat diet immediately after recovery could trigger another episode; oral intake should be reintroduced gradually with low-fat foods initially.'},
  {t:'If alcohol-related, total avoidance of alcohol should be reinforced, with referral to support groups as needed',c:true,why:''},
 ],
 rationale:'Pancreatitis discharge teaching includes gradual low-fat/low-protein oral refeeding, eliminating caffeine and alcohol, reporting recurrence of severe pain, and for alcohol-related cases, reinforcing total alcohol avoidance with referral to support resources like AA.',
 tip:'NCLEX tip: pancreatitis discharge teaching mirrors many of its acute-phase precautions — avoid triggers (alcohol, high fat) even after the acute episode resolves.'},

{id:'g62',type:'mc',stem:'A client with chronic pancreatitis reports that their pain has actually decreased in intensity over several years despite ongoing disease. What term describes this phenomenon?',
 options:[
  {t:'"Burnout," a recognized pattern of decreasing pain over time in some chronic pancreatitis clients',c:true,why:''},
  {t:'Complete cure of the underlying pancreatic disease',c:false,why:'A decrease in pain does not indicate the underlying chronic pancreatitis has been cured; it reflects a recognized pattern sometimes called "burnout."'},
  {t:'An adverse reaction to pancreatic enzyme replacement therapy',c:false,why:'This decreasing pain pattern is not described as a medication reaction, but rather as a natural disease-course phenomenon in some clients.'},
  {t:'A sign that the client has developed pancreatic cancer',c:false,why:'Decreasing pain over time in chronic pancreatitis is described as a benign "burnout" pattern, not a sign of malignancy.'},
 ],
 rationale:'Some clients with chronic pancreatitis experience "burnout," a pattern of decreasing pain over time, even though the underlying pancreatic destruction and dysfunction persist.',
 tip:'NCLEX tip: "burnout" is a specific, somewhat counterintuitive chronic pancreatitis term — don\'t assume decreasing pain always means the disease is resolving.'},

{id:'g63',type:'mc',stem:'A client with chronic pancreatitis has significant steatorrhea. At approximately what point in disease progression does this finding typically appear?',
 options:[
  {t:'Late in the disease course, when only about 10% of pancreatic function remains',c:true,why:''},
  {t:'Immediately at disease onset, before any other symptoms develop',c:false,why:'Steatorrhea typically appears late in the disease course, not immediately at onset, since substantial functional loss must occur first.'},
  {t:'Only after a client has undergone pancreatic surgery',c:false,why:'Steatorrhea is related to progressive loss of exocrine pancreatic function over time, not specifically tied to prior surgery.'},
  {t:'Steatorrhea is unrelated to the amount of remaining pancreatic function',c:false,why:'Steatorrhea is specifically tied to the loss of exocrine pancreatic function, appearing once function has dropped to a very low level.'},
 ],
 rationale:'Malabsorption and steatorrhea typically appear late in chronic pancreatitis, once only about 10% of pancreatic exocrine function remains, reflecting significant, longstanding organ damage.',
 tip:'NCLEX tip: "steatorrhea = late finding, only ~10% function left" is a specific, testable detail distinguishing early from late chronic pancreatitis presentation.'},

{id:'g64',type:'mc',stem:'Which diagnostic test is considered the initial test of choice for evaluating suspected chronic pancreatitis?',
 options:[
  {t:'CT scan',c:true,why:''},
  {t:'Fecal fat analysis',c:false,why:'Fecal fat analysis confirms steatorrhea but is not the initial imaging test of choice for evaluating suspected chronic pancreatitis.'},
  {t:'Glucose tolerance test',c:false,why:'A glucose tolerance test evaluates islet cell function, but it is not the initial test used to assess for chronic pancreatitis structurally.'},
  {t:'ERCP',c:false,why:'ERCP provides detailed anatomy and is used later in the workup, often when CT is equivocal, rather than being the initial test of choice.'},
 ],
 rationale:'CT scan is the initial test of choice for suspected chronic pancreatitis, looking for characteristic findings such as calcifications and ductal changes, with MRCP or ERCP used for further evaluation if CT is equivocal.',
 tip:'NCLEX tip: rank chronic pancreatitis diagnostics by order of use — CT first, then MRCP or EUS, with ERCP reserved for detailed anatomy or when other tests are unclear.'},

{id:'g65',type:'mc',stem:'A client with chronic pancreatitis undergoes a pancreaticojejunostomy (Roux-en-Y procedure) for refractory pain. What outcome is generally expected based on the course material?',
 options:[
  {t:'Pain relief within six months in more than 85% of clients, though pain may return as disease progresses',c:true,why:''},
  {t:'Permanent, guaranteed pain relief in 100% of clients with no risk of recurrence',c:false,why:'While the success rate is high, it is not described as an absolute guarantee, and pain may return as the disease progresses.'},
  {t:'No meaningful pain relief is expected from this procedure',c:false,why:'This procedure is associated with a high rate of pain relief within six months, not an absence of benefit.'},
  {t:'This procedure is used only for acute, not chronic, pancreatitis',c:false,why:'Pancreaticojejunostomy is a surgical option specifically used for chronic pancreatitis with refractory pain, not for acute pancreatitis management.'},
 ],
 rationale:'Pancreaticojejunostomy (Roux-en-Y) provides pain relief within six months in more than 85% of clients with chronic pancreatitis, though pain may return over time as the underlying disease continues to progress.',
 tip:'NCLEX tip: ">85% within 6 months" is the specific statistic to remember for pancreaticojejunostomy outcomes in chronic pancreatitis.'},

{id:'g66',type:'mc',stem:'A client asks about the Whipple procedure. Which condition is this surgery specifically used to treat?',
 options:[
  {t:'Disease affecting the head of the pancreas',c:true,why:''},
  {t:'Gallbladder inflammation without any pancreatic involvement',c:false,why:'The Whipple procedure addresses pancreatic head disease specifically, not isolated gallbladder inflammation.'},
  {t:'Esophageal varices from portal hypertension',c:false,why:'This describes a hepatic/portal complication, unrelated to the Whipple procedure, which addresses pancreatic head pathology.'},
  {t:'Uncomplicated gastroesophageal reflux disease',c:false,why:'GERD is managed with different approaches (lifestyle, medication, or Nissen fundoplication), not the Whipple procedure.'},
 ],
 rationale:'The Whipple procedure (pancreaticoduodenectomy) is used specifically for disease affecting the head of the pancreas, distinguishing it from other chronic pancreatitis surgical options like pancreaticojejunostomy or the Beger/Frey procedures.',
 tip:'NCLEX tip: pair the Whipple procedure specifically with "head-of-pancreas disease" to distinguish it from other pancreatic surgical options.'},

{id:'g67',type:'mc',stem:'A client asks about pancreatic pseudocysts. How do they differ from true pancreatic cysts?',
 options:[
  {t:'Pseudocysts are lined by fibrous granulation tissue rather than a true epithelial lining',c:true,why:''},
  {t:'Pseudocysts are always malignant, while true cysts are always benign',c:false,why:'Malignancy status is not the defining difference described; the distinction is based on the type of lining tissue.'},
  {t:'Pseudocysts form only in clients who have never had pancreatitis',c:false,why:'Pseudocysts specifically form from pancreatic necrosis or ductal leakage following an episode of acute pancreatitis, not in clients without a pancreatitis history.'},
  {t:'Pseudocysts require no diagnostic imaging to identify',c:false,why:'Pseudocysts are typically diagnosed using imaging methods such as ultrasound, CT, or ERCP, not without any diagnostic workup.'},
 ],
 rationale:'Pancreatic pseudocysts are lined by fibrous granulation tissue rather than a true epithelial lining, distinguishing them from true cysts, and they typically form 4-6 weeks after an acute pancreatitis episode.',
 tip:'NCLEX tip: "fibrous granulation tissue, not epithelium" is the key distinguishing detail between a pseudocyst and a true pancreatic cyst.'},

{id:'g68',type:'mc',stem:'A client with a draining pancreatic pseudocyst is at risk for skin breakdown. What is the most appropriate nursing intervention?',
 options:[
  {t:'Protect the surrounding skin and consult a WOC nurse as needed',c:true,why:''},
  {t:'Avoid any skin care since the drainage will resolve on its own without intervention',c:false,why:'Active skin protection is needed given the enzyme-rich nature of pseudocyst drainage, rather than waiting passively for resolution.'},
  {t:'Apply a tight occlusive dressing directly over the draining site with no barrier protection',c:false,why:'A tight occlusive dressing without proper skin barrier protection would not adequately protect the skin from enzyme-rich drainage.'},
  {t:'Discontinue all wound care once drainage is first noted',c:false,why:'Ongoing wound and skin care is needed for as long as drainage continues, not discontinued as soon as it is first noticed.'},
 ],
 rationale:'Pancreatic pseudocyst drainage is enzyme-rich and can cause skin breakdown, so the nurse should protect the surrounding skin and consult a WOC (wound, ostomy, continence) nurse as needed to prevent complications.',
 tip:'NCLEX tip: enzyme-rich drainage (pancreatic, sometimes ileostomy) is a recurring theme requiring proactive skin protection — always flag this as a nursing priority.'},

{id:'g69',type:'mc',stem:'Which of the following is a recognized risk factor for pancreatic cancer?',
 options:[
  {t:'Smoking',c:true,why:''},
  {t:'Regular moderate exercise',c:false,why:'Regular exercise is a protective health behavior, not a recognized risk factor for pancreatic cancer.'},
  {t:'A diet low in fat and processed meat',c:false,why:'A diet low in fat and processed meat is generally protective, whereas a high-fat, high-meat diet is more closely associated with increased risk.'},
  {t:'Young age, under 30 years old',c:false,why:'Pancreatic cancer is rare before age 45 and most commonly presents in the 60s-70s, so young age is not a risk factor.'},
 ],
 rationale:'Smoking is a well-established risk factor for pancreatic cancer, along with high alcohol intake, diabetes, chronic or hereditary pancreatitis, obesity, and industrial chemical exposure.',
 tip:'NCLEX tip: pancreatic cancer risk factors overlap significantly with chronic pancreatitis risk factors (smoking, alcohol, diabetes) — study them together.'},

{id:'g70',type:'fill',stem:'The three-step framework used to guide pain management in chronic pancreatitis, moving from nonopioid to weak opioid combinations to stronger opioids, is known as the WHO _____ ladder.',
 answers:['analgesic','pain','3-step analgesic','three-step analgesic'],
 rationale:'The WHO analgesic ladder is a three-step framework moving from nonopioid analgesics to weak opioid combinations and finally to stronger opioids, used to guide pain management in chronic pancreatitis while remaining mindful of opioid misuse risk.',
 tip:'NCLEX tip: the WHO pain ladder concept appears across multiple chronic pain conditions in nursing school, not just pancreatitis — recognize it as a general framework.'},

{id:'g71',type:'fill',stem:'Diverticulitis classically presents with pain localized to the _____ quadrant of the abdomen.',
 answers:['left lower','llq','left lower quadrant'],
 rationale:'Diverticulitis classically presents with left lower quadrant (LLQ) abdominal pain, often worsened by coughing, straining, or lifting, along with fever and GI symptoms.',
 tip:'NCLEX tip: LLQ pain for diverticulitis, RLQ pain for appendicitis — keep these two quadrant associations clearly separated in your memory.'},

{id:'g72',type:'bowtie',stem:'A client presents with mid-epigastric pain radiating to the back, worse after a heavy meal and alcohol use, along with nausea and vomiting. Labs show lipase three times the upper limit of normal. Complete the bowtie: select the most likely diagnosis, two priority nursing actions, and two parameters to monitor.',
 sections:[
  {label:'Likely diagnosis (select 1)', correctCount:1, options:[
    {t:'Acute pancreatitis',c:true},
    {t:'Uncomplicated GERD',c:false},
    {t:'Diverticulitis',c:false},
    {t:'Acute appendicitis',c:false},
  ]},
  {label:'Priority actions (select 2)', correctCount:2, options:[
    {t:'Maintain NPO status and prepare for IV fluid resuscitation',c:true},
    {t:'Position the client in semi-Fowler position for comfort',c:true},
    {t:'Encourage a high-fat meal to stimulate digestion',c:false},
    {t:'Administer a large, unmonitored dose of opioids without further assessment',c:false},
    {t:'Discharge home immediately with no further workup',c:false},
  ]},
  {label:'Parameters to monitor (select 2)', correctCount:2, options:[
    {t:'Serum calcium',c:true},
    {t:'Blood glucose',c:true},
    {t:'Visual acuity',c:false},
    {t:'Ankle-brachial index',c:false},
  ]},
 ],
 rationale:'Epigastric pain radiating to the back with nausea/vomiting and a significantly elevated lipase is classic for acute pancreatitis. Priority nursing actions include NPO status, IV fluids, and semi-Fowler positioning, while calcium and glucose are key parameters to monitor given the risk of hypocalcemia and hyperglycemia in this condition.',
 tip:'NCLEX tip: epigastric-to-back pain plus an elevated lipase is one of the most classic, reliable pancreatitis presentations tested on NCLEX-style items.'},

{id:'g73',type:'mc',stem:'A client asks the nurse why NG suction might be used in acute pancreatitis. What is the most accurate explanation?',
 options:[
  {t:'"NG suction may relieve nausea, vomiting, and distention, but it is not routinely used specifically to reduce pancreatic secretion."',c:true,why:''},
  {t:'"NG suction is the primary treatment that cures acute pancreatitis."',c:false,why:'NG suction is a supportive symptom-relief measure, not a curative treatment for the underlying disease process.'},
  {t:'"NG suction is required for every client with acute pancreatitis regardless of symptoms."',c:false,why:'NG suction is used selectively for symptom relief (nausea, vomiting, distention), not as a mandatory intervention for every client.'},
  {t:'"NG suction directly lowers serum lipase and amylase levels."',c:false,why:'NG suction does not have a direct effect on serum lipase or amylase levels; its role is symptomatic relief of nausea, vomiting, and distention.'},
 ],
 rationale:'NG suction may be used in acute pancreatitis to relieve nausea, vomiting, or distention, but it is not routinely used specifically to reduce pancreatic secretion, a nuance important to understand about its actual clinical role.',
 tip:'NCLEX tip: don\'t assume every supportive intervention (like NG suction) directly treats the underlying disease process — some are purely for symptom relief.'},

{id:'g74',type:'mc',stem:'A client with chronic pancreatitis develops new-onset diabetes. What is the most likely underlying mechanism?',
 options:[
  {t:'Progressive destruction of pancreatic islet cells impairing insulin production',c:true,why:''},
  {t:'An unrelated autoimmune process affecting only the thyroid',c:false,why:'This does not explain diabetes onset in chronic pancreatitis, which is directly related to progressive pancreatic tissue destruction, including islet cells.'},
  {t:'Excess dietary sugar intake unrelated to pancreatic function',c:false,why:'While diet affects glucose control generally, the mechanism specific to chronic pancreatitis is progressive islet cell destruction, not simply dietary sugar intake.'},
  {t:'A side effect of pancreatic enzyme replacement therapy',c:false,why:'Enzyme replacement therapy addresses malabsorption and is not the cause of diabetes; islet cell destruction from the underlying disease is the mechanism.'},
 ],
 rationale:'Chronic pancreatitis involves progressive destruction of pancreatic tissue, including the insulin-producing islet cells, which can lead to diabetes as exocrine and endocrine pancreatic function decline together.',
 tip:'NCLEX tip: remember that chronic pancreatitis affects both exocrine function (digestive enzymes, causing steatorrhea) and endocrine function (insulin, causing diabetes) over time.'},

{id:'g75',type:'mc',stem:'A client asks why a sphincterotomy might be performed in the setting of chronic pancreatitis. What is the best explanation?',
 options:[
  {t:'"It can be used when gallbladder disease is contributing to your pancreatic condition."',c:true,why:''},
  {t:'"It is used only to treat esophageal varices."',c:false,why:'Sphincterotomy in this context relates to biliary/pancreatic duct issues, not esophageal varices, which are managed differently.'},
  {t:'"It replaces the need for any pancreatic enzyme replacement therapy."',c:false,why:'Sphincterotomy addresses a specific anatomic or obstructive issue and does not replace the need for enzyme replacement therapy if malabsorption is present.'},
  {t:'"It is performed only in cases of acute, not chronic, pancreatitis."',c:false,why:'Sphincterotomy is listed as a management option specifically in the chronic pancreatitis surgical management section, not limited to acute cases.'},
 ],
 rationale:'Sphincterotomy is a surgical management option used in chronic pancreatitis when gallbladder disease is a contributing cause, helping to relieve obstruction and improve pancreatic drainage.',
 tip:'NCLEX tip: connect sphincterotomy specifically to gallbladder-related causes of chronic pancreatitis, distinguishing it from other surgical options aimed at pain relief alone.'},

{id:'g76',type:'mc',stem:'Which of the following medications is recognized as a possible contributing cause of acute pancreatitis?',
 options:[
  {t:'Thiazide diuretics',c:true,why:''},
  {t:'Acetaminophen at standard therapeutic doses',c:false,why:'Standard-dose acetaminophen is not among the medications recognized as a contributing cause of pancreatitis in the course material.'},
  {t:'Vitamin C supplements',c:false,why:'Vitamin C supplementation is not listed as a recognized cause of pancreatitis.'},
  {t:'Topical antifungal creams',c:false,why:'Topical antifungal medications are not associated with causing pancreatitis.'},
 ],
 rationale:'Thiazide diuretics, along with corticosteroids and oral contraceptives, are recognized medications that can contribute to the development of acute pancreatitis.',
 tip:'NCLEX tip: keep a short list of pancreatitis-associated medications handy — corticosteroids, thiazide diuretics, and oral contraceptives are the ones specifically named.'},

{id:'g77',type:'mc',stem:'A client asks about the relationship between hypercalcemia and acute pancreatitis. What is the best response?',
 options:[
  {t:'"Hypercalcemia is a recognized risk factor that can contribute to the development of acute pancreatitis."',c:true,why:''},
  {t:'"Calcium levels have no relationship to pancreatitis risk in either direction."',c:false,why:'Hypercalcemia is specifically listed as a recognized risk factor for developing acute pancreatitis, so there is a documented relationship.'},
  {t:'"Only low calcium levels, not high levels, are linked to pancreatitis risk."',c:false,why:'While hypocalcemia is a common consequence during acute pancreatitis (correlating with severity), hypercalcemia is specifically listed as a contributing risk factor for developing the condition in the first place.'},
  {t:'"Hypercalcemia only affects bone health and is unrelated to the pancreas."',c:false,why:'Hypercalcemia has a specific, documented relationship to pancreatitis risk, beyond its effects on bone health alone.'},
 ],
