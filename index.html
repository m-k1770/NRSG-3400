 alcohol syndrome, not a nicotine-related outcome."}], "rationale": "Fetal alcohol syndrome is the most extreme and common cause of preventable intellectual disability from prenatal substance exposure, diagnosed based on three criteria: intellectual disability, delayed growth/development, and distinctive facial abnormalities. Alcohol is considered the most toxic teratogen for fetuses.", "tip": "NCLEX tip: Alcohol is the single most toxic substance to a developing fetus among commonly used psychoactive substances — no amount of alcohol during pregnancy is considered safe.", "id": "m8_43", "module": 8}, {"type": "mc", "stem": "A newborn of a mother with opioid use disorder during pregnancy displays a high-pitched cry, tremors, and irritability shortly after birth. The nurse recognizes these findings as consistent with:", "options": [{"t": "Neonatal abstinence syndrome", "c": true, "w": ""}, {"t": "Fetal alcohol syndrome", "c": false, "w": "Fetal alcohol syndrome presents with intellectual disability, growth delay, and facial abnormalities from prenatal alcohol exposure, not the acute CNS irritability pattern of opioid withdrawal in a newborn."}, {"t": "Wernicke's encephalopathy", "c": false, "w": "Wernicke's encephalopathy is an adult neurological emergency from thiamine deficiency related to chronic alcohol use, not a neonatal condition."}, {"t": "Korsakoff's psychosis", "c": false, "w": "Korsakoff's psychosis is a chronic adult memory disorder related to thiamine deficiency from chronic alcoholism, unrelated to newborn opioid withdrawal."}], "rationale": "Neonatal abstinence syndrome occurs in infants born to opioid-dependent mothers and includes CNS irritability (high-pitched cry, tremors/jitteriness, possible convulsions), GI symptoms, and fever/mottled skin, requiring careful monitoring and supportive management.", "tip": "NCLEX tip: Recognize the newborn opioid withdrawal presentation (high-pitched cry, tremors, irritability) as neonatal abstinence syndrome, distinct from FAS, which is alcohol-related.", "id": "m8_44", "module": 8}, {"type": "mc", "stem": "Which screening tool consists of four yes/no questions (Cut down, Annoyed, Guilty, Eye-opener) used to identify possible alcohol or drug problems?", "options": [{"t": "CAGE questionnaire", "c": true, "w": ""}, {"t": "AUDIT (Alcohol Use Disorders Identification Test)", "c": false, "w": "AUDIT is a longer, validated alcohol screening instrument, but it is not the four-item Cut down/Annoyed/Guilty/Eye-opener tool described in this question, which specifically refers to CAGE."}, {"t": "B-DAST (Brief Drug Abuse Screening Test)", "c": false, "w": "B-DAST is a 20-item yes/no drug abuse screening test, not the specific four-question CAGE tool described in the stem."}, {"t": "SCOFF questionnaire", "c": false, "w": "SCOFF is a screening tool for eating disorders (Sick, Control, One stone, Fat, Food), not a substance use screening instrument."}], "rationale": "The CAGE questionnaire is a brief four-item screening tool (Cut down, Annoyed, Guilty, Eye-opener) used to identify possible alcohol or drug problems; a score of two or more affirmative answers is considered clinically significant.", "tip": "NCLEX tip: Memorize CAGE as C-A-G-E: Cut down, Annoyed, Guilty, Eye-opener — a classic, frequently tested brief screening tool.", "id": "m8_45", "module": 8}, {"type": "mc", "stem": "A client scores 8 out of 20 on the Brief Drug Abuse Screening Test (B-DAST). How should the nurse interpret this score?", "options": [{"t": "A score of 6 or higher suggests a significant drug-related problem, so this result warrants further assessment", "c": true, "w": ""}, {"t": "This score is within the normal range and requires no further follow-up", "c": false, "w": "A score of 8, which is above the threshold of 6, is considered suggestive of a significant problem and should prompt further assessment rather than being dismissed as normal."}, {"t": "This score indicates the client definitely does not use any illicit substances", "c": false, "w": "The B-DAST is a screening tool for identifying possible problems, not a definitive diagnostic test proving the absence of substance use; an elevated score should prompt further evaluation."}, {"t": "The B-DAST score is only valid when combined with a blood alcohol concentration test", "c": false, "w": "The B-DAST is a stand-alone drug abuse screening tool and does not require a blood alcohol concentration test to be interpreted."}], "rationale": "A B-DAST score of 6 or greater suggests a significant drug-related problem requiring further assessment; this client's score of 8 falls above that threshold and should prompt the nurse to pursue additional evaluation.", "tip": "NCLEX tip: Know the B-DAST threshold (≥6 significant) alongside the CAGE threshold (≥2 significant) — these numeric cutoffs are commonly tested.", "id": "m8_46", "module": 8}, {"type": "sata", "stem": "Select all statements that accurately describe substance use disorder (SUD) according to the DSM-5 framework.", "options": [{"t": "The DSM-5 removed the word 'abuse' from official diagnostic terminology to reduce stigma", "c": true, "w": ""}, {"t": "SUD severity is classified as mild, moderate, or severe based on the number of criteria met", "c": true, "w": ""}, {"t": "Tolerance and withdrawal are two of the eleven possible diagnostic criteria", "c": true, "w": ""}, {"t": "A diagnosis of SUD requires meeting all eleven criteria simultaneously", "c": false, "w": "A diagnosis requires meeting at least two of the eleven criteria, not all eleven; severity increases with the number of criteria met (mild 2-3, moderate 4-5, severe 6+)."}, {"t": "SUD is diagnosed solely based on a single elevated blood alcohol concentration reading", "c": false, "w": "A single BAC reading reflects intoxication level at one point in time; it is not, by itself, diagnostic of a substance use disorder, which requires a pattern of behavioral/physiological criteria over time."}], "rationale": "The DSM-5 uses eleven criteria (spanning impaired control, social impairment, risky use, and pharmacological criteria like tolerance/withdrawal) to diagnose SUD on a severity spectrum: mild (2-3 criteria), moderate (4-5), and severe (6 or more) — and it eliminated the stigmatizing term 'abuse.'", "tip": "NCLEX tip: Know the SUD severity spectrum numbers cold: 2-3 = mild, 4-5 = moderate, 6+ = severe.", "id": "m8_47", "module": 8}, {"type": "sata", "stem": "Select all phenomena that are commonly encountered when working with clients who have substance use disorders.", "options": [{"t": "Blackouts", "c": true, "w": ""}, {"t": "Flashbacks", "c": true, "w": ""}, {"t": "Cross-tolerance", "c": true, "w": ""}, {"t": "Reminiscence therapy", "c": false, "w": "Reminiscence therapy is a therapeutic communication technique used with clients experiencing dementia, not a phenomenon associated with substance use disorders."}, {"t": "Confabulation", "c": false, "w": "Confabulation is a defense mechanism associated with Alzheimer's disease/dementia assessment, not one of the phenomena specifically listed under substance use disorder encounters."}], "rationale": "Phenomena commonly encountered in substance use work include blackouts, intoxication, tolerance, cross-tolerance, withdrawal, synergistic effects, cross-dependence, antagonistic effects, flashbacks, co-occurring disease, and codependency.", "tip": "NCLEX tip: Keep the list of SUD-specific phenomena separate from cognitive-disorder-specific concepts (confabulation, perseveration, reminiscence therapy) that belong to the neurocognitive disorders module.", "id": "m8_48", "module": 8}, {"type": "fib", "stem": "When a person needs progressively higher doses of a drug to achieve the same effect that a lower dose once produced, this phenomenon is called _____.", "answers": ["tolerance"], "rationale": "Tolerance describes the need for increasing doses of a substance over time to achieve the same desired effect, reflecting the body's neuroadaptation to repeated substance exposure.", "tip": "NCLEX tip: Tolerance is about needing MORE for the SAME effect — do not confuse it with withdrawal, which occurs when the substance is stopped or reduced.", "id": "m8_49", "module": 8}, {"type": "fib", "stem": "Amnesia for events that occurred during a drinking episode, occurring without any loss of consciousness, is known as a(n) _____.", "answers": ["blackout"], "rationale": "A blackout is a period of amnesia for events that occurred while drinking, even though the person did not lose consciousness and may have appeared to be functioning normally to observers at the time.", "tip": "NCLEX tip: Blackouts involve amnesia WITHOUT loss of consciousness — this distinguishes them from passing out or losing consciousness entirely.", "id": "m8_50", "module": 8}, {"type": "mc", "stem": "A nurse is assessing a client 18 hours after their last drink. The client has hand tremors, diaphoresis, elevated blood pressure, and mild anxiety, but is oriented and has no hallucinations. This presentation is most consistent with which stage of alcohol withdrawal?", "options": [{"t": "Early/minor withdrawal", "c": true, "w": ""}, {"t": "Moderate withdrawal with psychiatric symptoms", "c": false, "w": "Moderate withdrawal includes worsening autonomic/motor symptoms plus psychiatric symptoms such as hallucinations, illusions, or combativeness, which are not present in this client."}, {"t": "Severe withdrawal progressing to delirium tremens", "c": false, "w": "Severe withdrawal/DTs includes disorientation, confusion, and significant sensorium disturbance; this client remains oriented with no hallucinations, ruling out this most severe stage."}, {"t": "Post-acute withdrawal syndrome (PAWS)", "c": false, "w": "PAWS is a later withdrawal phase characterized by fewer physical but more emotional/psychological symptoms lasting up to two years, not the early autonomic/motor symptoms seen within the first day of cessation."}], "rationale": "Early/minor alcohol withdrawal can begin as soon as two hours after the last drink and usually develops within 7-48 hours, presenting with autonomic symptoms (elevated vitals, diaphoresis, GI upset) and motor symptoms (tremors, jerky movements) without significant psychiatric or sensorium disturbance.", "tip": "NCLEX tip: Track the alcohol withdrawal timeline: early/minor (autonomic + motor) → moderate (adds psychiatric symptoms) → severe/DTs (adds disorientation and profound sensorium disturbance).", "id": "m8_51", "module": 8}, {"type": "mc", "stem": "Which of the following is considered a medical emergency that can be fatal even with treatment, typically peaking 48 to 72 hours after the last drink?", "options": [{"t": "Alcohol withdrawal delirium (delirium tremens)", "c": true, "w": ""}, {"t": "Post-acute withdrawal syndrome (PAWS)", "c": false, "w": "PAWS involves emotional and psychological symptoms that can persist for up to two years but is not itself an acute, potentially fatal medical emergency like delirium tremens."}, {"t": "Early/minor alcohol withdrawal", "c": false, "w": "Early/minor withdrawal presents with milder autonomic and motor symptoms and is not, by itself, classified as an immediately life-threatening medical emergency the way DTs is."}, {"t": "Mild cognitive impairment", "c": false, "w": "Mild cognitive impairment is a chronic, gradually developing condition unrelated to the acute, potentially fatal course of alcohol withdrawal delirium."}], "rationale": "Alcohol withdrawal delirium (delirium tremens) is a medical emergency that can be fatal even with treatment, usually peaking 48-72 hours after cessation or reduction of alcohol, and features autonomic hyperactivity, fever, severe sensorium disturbance, hallucinations, and seizures.", "tip": "NCLEX tip: The 48-72 hour peak timing for DTs is a frequently tested detail — commit this window to memory.", "id": "m8_52", "module": 8}, {"type": "mc", "stem": "A client's CIWA-Ar score is calculated at 22. Based on this score, how should the nurse interpret the client's withdrawal severity?", "options": [{"t": "Severe alcohol withdrawal", "c": true, "w": ""}, {"t": "Absent or minimal withdrawal", "c": false, "w": "A score in the 0-9 range reflects absent or minimal withdrawal; a score of 22 is well above that range and indicates severe withdrawal."}, {"t": "Mild to moderate withdrawal", "c": false, "w": "A score of 10-19 reflects mild to moderate withdrawal; a score of 22 exceeds this range and falls into the severe category (greater than 20)."}, {"t": "The CIWA-Ar does not provide severity categories, only a pass/fail result", "c": false, "w": "The CIWA-Ar does provide clear severity categories: 0-9 absent/minimal, 10-19 mild to moderate, and greater than 20 severe."}], "rationale": "On the CIWA-Ar scale, a total score greater than 20 indicates severe alcohol withdrawal, warranting close monitoring, likely more frequent reassessment, and probable additional PRN medication administration.", "tip": "NCLEX tip: Memorize the three CIWA-Ar score bands: 0-9 minimal, 10-19 mild-moderate, >20 severe — and that a score of 8 or higher typically triggers initiation of withdrawal medication.", "id": "m8_53", "module": 8}, {"type": "mc", "stem": "According to the CIWA-Ar protocol, at what total score should a nurse initiate prophylactic withdrawal medication if the client is being managed with a symptom-triggered (PRN-only) dosing approach?", "options": [{"t": "A score of 8 or greater", "c": true, "w": ""}, {"t": "A score of 20 or greater only", "c": false, "w": "Waiting until a score of 20 or greater would significantly delay treatment; medication should begin at a score of 8 or greater under the symptom-triggered protocol."}, {"t": "A score of 2 or greater", "c": false, "w": "A score of 2 is within the minimal/absent withdrawal range and does not meet the threshold for initiating withdrawal medication."}, {"t": "Medication should be given only after the client develops hallucinations", "c": false, "w": "Waiting for hallucinations to appear would mean withholding treatment until the client has already progressed to significant psychiatric symptoms; medication should begin much earlier, at a score of 8 or greater."}], "rationale": "According to CIWA-Ar protocol, a total score of 8 or greater is the threshold to begin prophylactic (symptom-triggered) withdrawal medication, allowing early intervention before symptoms progress to a more severe or dangerous stage.", "tip": "NCLEX tip: Score ≥8 = start medication; score ≥15 (if already on scheduled medication) = give additional PRN dosing. These two numbers are commonly tested together.", "id": "m8_54", "module": 8}, {"type": "mc", "stem": "A client on a scheduled dosing protocol for alcohol withdrawal has a CIWA-Ar score of 17. According to protocol, what should the nurse do?", "options": [{"t": "Administer additional PRN medication since the score meets the threshold of 15 or greater for clients already on scheduled dosing", "c": true, "w": ""}, {"t": "Withhold all medication since the score is below 20 and therefore not severe", "c": false, "w": "For a client on scheduled medication, a score of 15 or greater already warrants additional PRN dosing; waiting until the score reaches the 'severe' threshold of >20 would delay needed treatment."}, {"t": "Immediately transfer the client to the ICU regardless of any other clinical findings", "c": false, "w": "ICU transfer criteria involve additional factors, such as a total score above 35 with prolonged q1h assessment, high medication requirements, or respiratory distress — a score of 17 alone does not automatically require ICU transfer."}, {"t": "Discontinue the CIWA-Ar assessment protocol since the client is stable", "c": false, "w": "A score of 17 reflects ongoing, worsening withdrawal requiring continued frequent assessment and additional medication, not discontinuation of monitoring."}], "rationale": "For clients already receiving scheduled withdrawal medication, an additional PRN dose should be given when the CIWA-Ar score reaches 15 or greater, reflecting inadequate control of withdrawal symptoms on the current regimen.", "tip": "NCLEX tip: The 15-point threshold applies specifically to clients already on scheduled medication — a distinct number from the 8-point threshold used for symptom-triggered-only dosing.", "id": "m8_55", "module": 8}, {"type": "mc", "stem": "Which of the following would be an appropriate reason to consider transferring a client with alcohol withdrawal to the ICU?", "options": [{"t": "A total CIWA-Ar score greater than 35 requiring hourly assessment for more than 8 hours", "c": true, "w": ""}, {"t": "A CIWA-Ar score of 9 that has remained stable for the past 24 hours", "c": false, "w": "A stable score of 9 falls within the minimal/absent withdrawal category and would not warrant ICU-level care; ICU transfer criteria involve much higher scores or other severe indicators."}, {"t": "The client requesting a private room for personal comfort", "c": false, "w": "A client's preference for a private room is unrelated to withdrawal severity or medical necessity for ICU-level monitoring."}, {"t": "The client tolerating oral intake well with a stable appetite", "c": false, "w": "Tolerating oral intake well is a reassuring, stable finding and would not indicate the need for a higher level of care."}], "rationale": "ICU transfer for alcohol withdrawal should be considered for a total CIWA-Ar score greater than 35 requiring hourly assessments for more than 8 hours, a requirement of more than 4 mg/hr of lorazepam (or more than 20 mg/hr of diazepam) for 3 hours, or respiratory distress.", "tip": "NCLEX tip: Note the specific ICU transfer thresholds for the CIWA-Ar protocol — total score >35 with prolonged q1h monitoring, high benzodiazepine dosing requirements, or respiratory compromise.", "id": "m8_56", "module": 8}, {"type": "mc", "stem": "A client with chronic alcohol use disorder is admitted with acute confusion, nystagmus, and ataxia. The nurse recognizes this presentation requires urgent treatment with which vitamin, to prevent progression to a chronic, irreversible memory disorder?", "options": [{"t": "Thiamine (vitamin B1)", "c": true, "w": ""}, {"t": "Vitamin B12 (cobalamin)", "c": false, "w": "Vitamin B12 deficiency is addressed to correct megaloblastic anemia and can help halt peripheral neuropathy, but the acute confusion/nystagmus/ataxia triad specifically points to thiamine deficiency (Wernicke's encephalopathy), not B12."}, {"t": "Folic acid", "c": false, "w": "Folic acid replacement corrects megaloblastic anemia in chronic alcohol use, but it is not the urgent treatment for the acute triad of confusion, nystagmus, and ataxia described here."}, {"t": "Vitamin D", "c": false, "w": "Vitamin D is not identified in the source material as the urgent treatment for this acute neurological presentation associated with chronic alcohol use."}], "rationale": "This presentation describes Wernicke's encephalopathy, an acute/subacute neurological emergency from thiamine (B1) deficiency, most often due to chronic alcohol use. It is often reversible if treated early with thiamine, but if untreated, it can progress to chronic dementia or the irreversible memory impairment of Korsakoff's psychosis.", "tip": "NCLEX tip: Confusion + nystagmus + ataxia = Wernicke's encephalopathy → treat urgently with thiamine (B1) to prevent progression to Korsakoff's psychosis.", "id": "m8_57", "module": 8}, {"type": "mc", "stem": "A client recovering from alcohol use disorder has significant, permanent short-term memory impairment and confabulates to fill memory gaps, though other cognitive/social skills remain relatively intact. This presentation is most consistent with:", "options": [{"t": "Korsakoff's psychosis", "c": true, "w": ""}, {"t": "Wernicke's encephalopathy", "c": false, "w": "Wernicke's encephalopathy is the acute, often reversible phase presenting with confusion, nystagmus, and ataxia; the chronic, largely irreversible memory impairment described here is characteristic of Korsakoff's psychosis, which can follow untreated Wernicke's encephalopathy."}, {"t": "Delirium tremens", "c": false, "w": "Delirium tremens is an acute withdrawal medical emergency with autonomic instability and severe sensorium disturbance, not the chronic memory impairment pattern described in this client."}, {"t": "Post-acute withdrawal syndrome", "c": false, "w": "PAWS involves emotional/psychological symptoms like mood swings and anxiety, not the chronic anterograde memory impairment and confabulation characteristic of Korsakoff's psychosis."}], "rationale": "Korsakoff's psychosis is a chronic condition marked by an inability to learn new information or remember recent events, with long-term memory gaps often filled by confabulation, while other cognitive and social skills remain relatively unaffected; it results from thiamine deficiency, often following untreated Wernicke's encephalopathy.", "tip": "NCLEX tip: Wernicke's = acute triad (confusion, ataxia, nystagmus), often reversible. Korsakoff's = chronic memory disorder with confabulation, often irreversible. They form a continuum: Wernicke-Korsakoff syndrome.", "id": "m8_58", "module": 8}, {"type": "mc", "stem": "A nurse is providing medication-assisted treatment (MAT) teaching to a client newly prescribed disulfiram (Antabuse) for alcohol use disorder. Which statement by the client indicates a need for further teaching?", "options": [{"t": "\"I can use my regular alcohol-based mouthwash as long as I don't actually drink alcohol.\"", "c": true, "w": ""}, {"t": "\"I understand I need to be alcohol-free for at least 14 days before starting this medication.\"", "c": false, "w": "This statement is correct; clients should be alcohol-free for at least 14 days before starting disulfiram, so no further teaching is needed here."}, {"t": "\"I will avoid cooking with wine or vinegar-based sauces while taking this medication.\"", "c": false, "w": "This statement is correct and reflects appropriate understanding, since hidden sources of alcohol such as cooking wine and vinegar can trigger a disulfiram reaction."}, {"t": "\"The effects of this medication can last up to two weeks after I stop taking it.\"", "c": false, "w": "This statement is accurate; disulfiram's effects can persist for up to two weeks after discontinuation, so this reflects correct understanding, not a need for further teaching."}], "rationale": "Disulfiram (Antabuse) can react with any source of alcohol, including hidden sources such as alcohol-based mouthwash, cooking wine, vinegar, and hand sanitizer, causing a severe reaction (nausea, vomiting, flushing, hypotension, potentially death); clients must avoid all these hidden sources, not just beverage alcohol.", "tip": "NCLEX tip: Disulfiram teaching questions often hide the wrong answer in an overlooked alcohol source like mouthwash, hand sanitizer, or cooking ingredients — teach clients to avoid ALL of these.", "id": "m8_59", "module": 8}, {"type": "mc", "stem": "A client with alcohol use disorder and a strong family history of the disease is prescribed naltrexone (Vivitrol) as part of treatment. The nurse should prioritize assessing which of the following before administration?", "options": [{"t": "Current use of any opioid medications, since naltrexone can precipitate acute opioid withdrawal", "c": true, "w": ""}, {"t": "Current use of any benzodiazepine medications, since naltrexone is contraindicated with all benzodiazepines", "c": false, "w": "Naltrexone's key contraindication/precaution relates specifically to opioid use (precipitating withdrawal), not a general contraindication with benzodiazepines."}, {"t": "Recent intake of any vinegar-based foods, since this could trigger a severe reaction", "c": false, "w": "The vinegar/hidden-alcohol-source concern applies specifically to disulfiram (Antabuse), not naltrexone, which works through opioid receptor blockade."}, {"t": "Whether the client has been alcohol-free for at least 14 days, since this is a requirement specific to naltrexone", "c": false, "w": "The 14-day alcohol-free requirement before starting is specific to disulfiram; naltrexone does not have this same pre-treatment alcohol-free requirement."}], "rationale": "Naltrexone (ReVia, Vivitrol) blocks opioid receptors, reducing the rewarding 'high' and cravings associated with alcohol use, but because of this opioid-receptor blockade, it can precipitate acute opioid withdrawal in a client currently using opioids, so opioid use history must be assessed first.", "tip": "NCLEX tip: Naltrexone + current opioid use = precipitated withdrawal risk. Always screen for current opioid use before starting naltrexone for AUD or OUD.", "id": "m8_60", "module": 8}, {"type": "mc", "stem": "A client asks the nurse how acamprosate (Campral) helps maintain sobriety from alcohol. Which explanation is most accurate?", "options": [{"t": "It reduces unpleasant abstinence symptoms such as anxiety and dysphoria, decreasing secondary cravings", "c": true, "w": ""}, {"t": "It causes a severe physical reaction if the client drinks any alcohol, deterring further use", "c": false, "w": "This describes disulfiram's (Antabuse) mechanism, not acamprosate, which works by reducing abstinence-related distress rather than punishing alcohol consumption directly."}, {"t": "It blocks opioid receptors to prevent the pleasurable effects of alcohol", "c": false, "w": "This describes naltrexone's mechanism, not acamprosate, which acts on abstinence-related neurochemical imbalance rather than opioid receptors."}, {"t": "It provides a cross-tolerant substitute for alcohol that is gradually tapered", "c": false, "w": "This describes the general strategy behind benzodiazepine substitution during acute alcohol withdrawal, not the long-term maintenance mechanism of acamprosate."}], "rationale": "Acamprosate (Campral) reduces unpleasant abstinence symptoms such as anxiety and dysphoria, thereby decreasing secondary cravings; it requires at least 7 days of abstinence before starting and should be used cautiously in clients with renal impairment.", "tip": "NCLEX tip: Three MAT medications for alcohol have three distinct mechanisms: disulfiram (aversive reaction), naltrexone (blocks opioid receptors/reduces high), acamprosate (reduces abstinence-related distress).", "id": "m8_61", "module": 8}, {"type": "mc", "stem": "Which laboratory or physical assessment finding would the nurse expect in a client with long-standing alcohol use disorder and associated liver damage?", "options": [{"t": "Elevated liver enzymes with signs of cirrhosis or fatty liver degeneration", "c": true, "w": ""}, {"t": "Significantly elevated hemoglobin and hematocrit due to increased red blood cell production", "c": false, "w": "Chronic alcohol use is more commonly associated with anemia (e.g., from nutritional deficiencies) rather than elevated hemoglobin/hematocrit from increased red blood cell production."}, {"t": "Decreased triglyceride levels due to improved lipid metabolism", "c": false, "w": "Chronic alcohol use is associated with elevated, not decreased, triglyceride levels, which contribute to cardiovascular risks such as stroke and cardiomyopathy."}, {"t": "Consistently low blood pressure with no cardiovascular risk", "c": false, "w": "Chronic alcohol use is associated with increased cardiovascular risk, including cardiomyopathy, dysrhythmia, and sudden cardiac death, not a protective low-risk cardiovascular profile."}], "rationale": "Chronic alcohol use is associated with significant GI and hepatic complications, including esophagitis, gastritis, pancreatitis, hepatitis, and cirrhosis, along with elevated triglycerides contributing to cardiovascular complications such as stroke, cardiomyopathy, and dysrhythmia.", "tip": "NCLEX tip: Link chronic heavy alcohol use to a predictable cluster of complications: GI/hepatic (cirrhosis, pancreatitis), cardiovascular (cardiomyopathy, dysrhythmia), and neurological (Wernicke-Korsakoff, peripheral neuropathy).", "id": "m8_62", "module": 8}, {"type": "sata", "stem": "Select all findings that would be assessed using the CIWA-Ar scale.", "options": [{"t": "Presence and severity of tactile, auditory, or visual disturbances", "c": true, "w": ""}, {"t": "Level of agitation and anxiety", "c": true, "w": ""}, {"t": "Orientation and clouding of sensorium", "c": true, "w": ""}, {"t": "Pupil size and dilation", "c": false, "w": "Pupil size is a component of the COWS (Clinical Opiate Withdrawal Scale) used for opioid withdrawal, not a component of the CIWA-Ar, which assesses alcohol withdrawal."}, {"t": "Presence of piloerection (gooseflesh skin)", "c": false, "w": "Gooseflesh skin/piloerection is a component of the COWS scale for opioid withdrawal assessment, not a category included in the CIWA-Ar for alcohol withdrawal."}], "rationale": "The CIWA-Ar assesses ten categories relevant to alcohol withdrawal: nausea/vomiting, tremors, paroxysmal sweats, anxiety, agitation, tactile/auditory/visual disturbances, headache, and orientation/clouding of sensorium — distinct from the COWS categories used for opioid withdrawal (like pupil size and piloerection).", "tip": "NCLEX tip: Keep CIWA-Ar (alcohol) categories separate from COWS (opioid) categories — pupil size and gooseflesh skin belong to COWS, not CIWA-Ar.", "id": "m8_63", "module": 8}, {"type": "sata", "stem": "Select all signs and symptoms consistent with alcohol withdrawal syndrome (AWS).", "options": [{"t": "Hand tremors and hyperreflexia", "c": true, "w": ""}, {"t": "Elevated blood pressure, pulse, and temperature", "c": true, "w": ""}, {"t": "Insomnia and disorientation", "c": true, "w": ""}, {"t": "Pinpoint pupils and significantly decreased respiratory rate", "c": false, "w": "Pinpoint pupils and respiratory depression are hallmark findings of opioid intoxication/overdose, not alcohol withdrawal, which instead produces autonomic hyperactivity."}, {"t": "Marked bradycardia and hypotension", "c": false, "w": "Alcohol withdrawal is characterized by autonomic hyperactivity, including elevated (not decreased) blood pressure and pulse, the opposite of bradycardia and hypotension."}], "rationale": "Alcohol withdrawal syndrome produces autonomic overactivity (elevated BP/pulse/temperature, diaphoresis, GI symptoms), motor symptoms (tremor, hyperreflexia, ataxia, seizures), and awareness/psychiatric symptoms (agitation, insomnia, disorientation, hallucinations) — a very different picture from the CNS/respiratory depression of opioid intoxication.", "tip": "NCLEX tip: Contrast alcohol withdrawal (autonomic hyperactivity, elevated vitals) with opioid intoxication/overdose (pinpoint pupils, respiratory depression) — they are near-opposite presentations.", "id": "m8_64", "module": 8}, {"type": "fib", "stem": "The validated 10-category tool used to assess the severity of alcohol withdrawal and guide medication dosing, taking less than 5 minutes to complete, is abbreviated _____.", "answers": ["ciwa-ar", "ciwaar", "ciwa ar"], "rationale": "The CIWA-Ar (Clinical Institute Withdrawal Assessment for Alcohol – Revised) is a validated, quick bedside tool assessing 10 categories of alcohol withdrawal severity to guide symptom-triggered or scheduled medication dosing.", "tip": "NCLEX tip: CIWA-Ar is for ALCOHOL withdrawal; COWS is for OPIOID withdrawal — do not mix these two scales up on exam questions.", "id": "m8_65", "module": 8}, {"type": "fib", "stem": "A client in alcohol withdrawal who develops a fever, severe sensorium disturbance, hallucinations, and fluctuating consciousness 60 hours after their last drink is most likely experiencing alcohol withdrawal _____, also known as delirium tremens.", "answers": ["delirium"], "rationale": "Alcohol withdrawal delirium (delirium tremens/DTs) usually peaks 48-72 hours after cessation and is a medical emergency featuring autonomic hyperactivity, fever, severe sensorium disturbance, perceptual disturbances, fluctuating consciousness, and seizures.", "tip": "NCLEX tip: The 48-72 hour window after the last drink is prime time for DTs to develop — heightened monitoring is essential during this period.", "id": "m8_66", "module": 8}, {"type": "mc", "stem": "A client is found unresponsive with pinpoint pupils, a respiratory rate of 4 breaths/min, and cyanosis. Which substance overdose should the nurse suspect first?", "options": [{"t": "Opioid overdose", "c": true, "w": ""}, {"t": "Alcohol withdrawal", "c": false, "w": "Alcohol withdrawal produces autonomic hyperactivity (elevated vitals, agitation) rather than the classic triad of pinpoint pupils, severe respiratory depression, and decreased consciousness seen in opioid overdose."}, {"t": "Cocaine intoxication", "c": false, "w": "Cocaine intoxication typically causes dilated pupils, increased heart rate, and stimulant effects, which is essentially the opposite presentation of the pinpoint pupils and respiratory depression described here."}, {"t": "Methamphetamine intoxication", "c": false, "w": "Methamphetamine intoxication is associated with dilated pupils and excessive motor activity as a stimulant, not the pinpoint pupils and profound respiratory depression of opioid overdose."}], "rationale": "The classic opioid overdose triad is pinpoint pupils, respiratory depression, and decreased level of consciousness. This presentation requires immediate reversal with naloxone and supportive respiratory management.", "tip": "NCLEX tip: Memorize the opioid overdose triad — pinpoint pupils, respiratory depression, decreased LOC — as one of the most frequently tested toxidrome patterns on the NCLEX.", "id": "m8_67", "module": 8}, {"type": "mc", "stem": "The nurse administers intranasal naloxone (Narcan) to a client found unresponsive after a suspected opioid overdose. Which nursing action is most important after the initial dose?", "options": [{"t": "Monitor closely and prepare to administer repeat doses, since naloxone is short-acting and the opioid may outlast its effect", "c": true, "w": ""}, {"t": "Assume the client is fully treated and safe for discharge within 15 minutes", "c": false, "w": "Because naloxone has a shorter duration of action than many opioids, repeated dosing and close monitoring are required, and discharge safety cannot be assumed this quickly."}, {"t": "Withhold any further naloxone doses regardless of the client's respiratory status", "c": false, "w": "Repeated naloxone dosing is often necessary because its short half-life may not outlast the effects of the opioid, especially with long-acting opioids or fentanyl."}, {"t": "Administer a full dose of methadone immediately to prevent future opioid cravings", "c": false, "w": "Methadone is not an emergent overdose reversal agent; it is used for detoxification and maintenance treatment, not the acute crisis management naloxone provides."}], "rationale": "Naloxone is short-acting and reverses opioid-induced respiratory and CNS depression, but because many opioids have a longer duration of action, repeated dosing and close monitoring are often required until the opioid is no longer at toxic levels.", "tip": "NCLEX tip: Naloxone is short-acting — always monitor for re-sedation and be prepared to redose, especially with long-acting opioids or potent synthetics like fentanyl.", "id": "m8_68", "module": 8}, {"type": "mc", "stem": "A client is being monitored during opioid withdrawal using the Clinical Opiate Withdrawal Scale (COWS). A total score of 30 is documented. How should the nurse classify this level of withdrawal?", "options": [{"t": "Moderately severe withdrawal", "c": true, "w": ""}, {"t": "Mild withdrawal", "c": false, "w": "Mild withdrawal on the COWS corresponds to a score of 5-12; a score of 30 is far above this range."}, {"t": "Moderate withdrawal", "c": false, "w": "Moderate withdrawal corresponds to a score of 13-24; a score of 30 exceeds this range and falls into the moderately severe category."}, {"t": "The COWS scale does not have severity categories, only a total numeric score with no clinical meaning", "c": false, "w": "The COWS scale does have clearly defined severity categories: 5-12 mild, 13-24 moderate, 25-36 moderately severe, and >36 severe."}], "rationale": "On the COWS scale, a score of 25-36 reflects moderately severe opioid withdrawal, while scores of 5-12 are mild, 13-24 are moderate, and scores greater than 36 are classified as severe.", "tip": "NCLEX tip: Memorize the COWS severity bands: 5-12 mild, 13-24 moderate, 25-36 moderately severe, >36 severe.", "id": "m8_69", "module": 8}, {"type": "mc", "stem": "Which finding would the nurse assess for and score under the 'Pupil Size' category of the COWS scale?", "options": [{"t": "Degree of pupil dilation, ranging from pinned/normal to so dilated only the rim of the iris is visible", "c": true, "w": ""}, {"t": "Presence of nystagmus during extraocular movement testing", "c": false, "w": "Nystagmus assessment is not part of the COWS pupil-size scoring; the COWS specifically rates the degree of dilation, not eye movement abnormalities."}, {"t": "Pupillary response to light (direct and consensual)", "c": false, "w": "Direct/consensual light reflex testing is a general neurological assessment, not the specific dilation-based scoring method used in the COWS pupil-size category."}, {"t": "Color change of the iris under different lighting conditions", "c": false, "w": "Iris color change is not an assessed feature in the COWS; the tool scores degree of pupillary dilation only."}], "rationale": "The COWS pupil-size item scores the degree of dilation, from pinned or normal for room light (score 0) up to pupils so dilated that only the rim of the iris is visible (score 5), reflecting the sympathetic hyperactivity of opioid withdrawal.", "tip": "NCLEX tip: In opioid withdrawal, pupils dilate (in contrast to the pinpoint pupils of opioid intoxication/overdose) — this is a key, easily tested contrast.", "id": "m8_70", "module": 8}, {"type": "mc", "stem": "A client in opioid withdrawal is being assessed using the COWS. The nurse notes the client has a resting pulse rate of 118 beats/min after sitting quietly for one minute. How many points should this finding contribute to the total COWS score?", "options": [{"t": "2 points", "c": true, "w": ""}, {"t": "0 points", "c": false, "w": "A resting pulse of ≤80 would score 0 points; a pulse of 118 falls into a higher-scoring range on the COWS pulse category."}, {"t": "4 points", "c": false, "w": "A resting pulse greater than 120 would score 4 points; 118 falls just below that threshold, into the 101-120 range, which scores 2 points."}, {"t": "1 point", "c": false, "w": "The COWS resting pulse category does not have a 1-point option; the scoring bands are 0 (≤80), 1 (81-100), 2 (101-120), and 4 (>120)."}], "rationale": "On the COWS resting pulse rate category, a pulse of 101-120 beats/min scores 2 points, reflecting the sympathetic hyperactivity that occurs during opioid withdrawal, distinguishing it from the higher 4-point score assigned for a pulse greater than 120.", "tip": "NCLEX tip: Practice the exact numeric cutoffs of the COWS pulse category (≤80=0, 81-100=1, 101-120=2, >120=4) since calculation-style questions may ask you to score a single vital sign.", "id": "m8_71", "module": 8}, {"type": "mc", "stem": "A client is prescribed clonidine as an adjunct during opioid withdrawal management. What is the primary purpose of this medication in this context?", "options": [{"t": "To reduce autonomic instability symptoms associated with withdrawal, such as elevated blood pressure and heart rate", "c": true, "w": ""}, {"t": "To serve as a long-term opioid replacement for maintenance treatment", "c": false, "w": "Clonidine is not an opioid and does not serve as a long-term substitution/maintenance therapy the way methadone or buprenorphine do; it targets autonomic symptoms of withdrawal instead."}, {"t": "To rapidly reverse an acute opioid overdose in an emergency", "c": false, "w": "Naloxone, not clonidine, is used for rapid reversal of acute opioid overdose; clonidine is used to help manage ongoing withdrawal symptoms, not to treat overdose."}, {"t": "To directly bind and block opioid receptors, preventing any future opioid effect", "c": false, "w": "This describes naltrexone's mechanism, not clonidine, which works on the autonomic nervous system rather than opioid receptors directly."}], "rationale": "Clonidine helps manage the autonomic instability symptoms of opioid withdrawal, such as elevated blood pressure, heart rate, sweating, and anxiety, though it does not address the craving or psychological aspects of withdrawal the way opioid-based treatments can.", "tip": "NCLEX tip: Clonidine = autonomic symptom relief during withdrawal, not a replacement/maintenance therapy and not an overdose antidote.", "id": "m8_72", "module": 8}, {"type": "mc", "stem": "Which of the following medications is a partial opioid agonist used for both detoxification and long-term maintenance treatment, offering a lower overdose risk than full opioid agonists?", "options": [{"t": "Buprenorphine", "c": true, "w": ""}, {"t": "Naloxone", "c": false, "w": "Naloxone is a pure opioid antagonist used for emergency reversal of opioid overdose, not a partial agonist used for maintenance treatment."}, {"t": "Methadone", "c": false, "w": "Methadone is a full opioid agonist used for detoxification and maintenance, but it does not have the lower overdose risk profile that distinguishes buprenorphine as a partial agonist."}, {"t": "Nalmefene", "c": false, "w": "Nalmefene is an opioid antagonist with a longer half-life than naloxone, used to reverse opioid or alcohol toxicity, not a partial agonist used for maintenance treatment."}], "rationale": "Buprenorphine is a partial opioid agonist used for detoxification and longer-term maintenance treatment; because it is only a partial agonist, it has a ceiling effect on respiratory depression, giving it a lower overdose risk profile than full agonists like methadone.", "tip": "NCLEX tip: Buprenorphine's partial-agonist property (\"ceiling effect\") is the key reason it carries a lower overdose risk than full-agonist methadone.", "id": "m8_73", "module": 8}, {"type": "mc", "stem": "A client asks why their prescribed Suboxone contains both buprenorphine and naloxone. Which explanation by the nurse is most accurate?", "options": [{"t": "The naloxone component discourages misuse of the medication by injection, since it would precipitate withdrawal if the combination product were injected", "c": true, "w": ""}, {"t": "The naloxone component provides the primary therapeutic craving-reduction effect of the medication", "c": false, "w": "Buprenorphine, not naloxone, is the component that provides the primary opioid-receptor-based craving reduction and maintenance effect; naloxone's role is to deter misuse."}, {"t": "The naloxone component treats coexisting depression that is common in opioid use disorder", "c": false, "w": "Naloxone is an opioid antagonist and has no antidepressant properties; it is included specifically to discourage diversion/misuse, not to treat mood symptoms."}, {"t": "The naloxone component is included only to improve the medication's taste and shelf stability", "c": false, "w": "Naloxone's inclusion serves a specific pharmacologic misuse-deterrent purpose, not a cosmetic or shelf-stability function."}], "rationale": "Suboxone combines buprenorphine (a partial opioid agonist providing therapeutic effect) with naloxone (an antagonist that has poor oral bioavailability but would precipitate withdrawal if the medication were injected), which discourages misuse of the combination product.", "tip": "NCLEX tip: Suboxone = buprenorphine (treatment effect) + naloxone (misuse deterrent, not a treatment effect itself).", "id": "m8_74", "module": 8}, {"type": "mc", "stem": "A client asks the nurse about Lucemyra, a medication recently approved for opioid withdrawal. Which statement by the nurse accurately describes this medication?", "options": [{"t": "It is a nonopioid medication that reduces the severity of withdrawal symptoms by acting as an alpha-2 agonist", "c": true, "w": ""}, {"t": "It is a full opioid agonist used exclusively for long-term maintenance treatment", "c": false, "w": "Lucemyra is specifically notable for being a nonopioid treatment; it does not act as a full opioid agonist and is used to reduce withdrawal severity rather than for long-term opioid replacement maintenance."}, {"t": "It works by permanently blocking all opioid receptors in the brain", "c": false, "w": "Lucemyra's mechanism is reducing norepinephrine release as an alpha-2 agonist, not permanently blocking opioid receptors, which is more characteristic of antagonists like naltrexone."}, {"t": "It is only effective when combined with high-dose benzodiazepines", "c": false, "w": "There is no requirement described in the source material that Lucemyra must be combined with high-dose benzodiazepines to be effective."}], "rationale": "Lucemyra, FDA-approved in 2018, is the first nonopioid treatment specifically for reducing the severity of opioid withdrawal; as an oral alpha-2 agonist, it reduces norepinephrine release, though side effects include hypotension, bradycardia, and sedation.", "tip": "NCLEX tip: Lucemyra stands out as the nonopioid option among opioid withdrawal treatments (versus methadone, buprenorphine, which are opioid-based).", "id": "m8_75", "module": 8}, {"type": "mc", "stem": "A client using heroin combines it with cocaine, referring to the mixture as a 'speedball.' What is the primary reason clients report using this combination?", "options": [{"t": "The cocaine's stimulant 'up' softens the letdown of cocaine withdrawal while opioids blunt the comedown, an antagonistic-style interaction between the two effects", "c": true, "w": ""}, {"t": "The combination completely eliminates the risk of overdose from either drug", "c": false, "w": "Combining two potent psychoactive substances does not eliminate overdose risk; in fact, polysubstance use of this kind carries substantial additional danger, not a safety benefit."}, {"t": "The combination is used medically to treat withdrawal in a hospital setting", "c": false, "w": "Speedballing is an illicit recreational practice, not a medically sanctioned treatment approach used in supervised withdrawal management."}, {"t": "The combination has no significant additional risk compared with using either drug alone", "c": false, "w": "Combining a stimulant and an opioid substantially increases risk of adverse cardiovascular and respiratory events compared with either substance alone."}], "rationale": "A 'speedball' mixes heroin with cocaine; this is described as an antagonistic-effect example in the text, where the combination is used recreationally to counteract the depressive letdown of cocaine withdrawal with the opioid, despite substantial added danger.", "tip": "NCLEX tip: 'Speedball' is a testable term referencing the heroin-cocaine combination and its relationship to antagonistic drug effects described in the textbook.", "id": "m8_76", "module": 8}, {"type": "mc", "stem": "Which statement about opioid withdrawal timing is accurate?", "options": [{"t": "Acute withdrawal symptoms can begin within 1 hour of the last opioid use, typically starting around 12 hours, and peak in 3-5 days", "c": true, "w": ""}, {"t": "Opioid withdrawal never begins until at least one week after the last dose", "c": false, "w": "Acute opioid withdrawal typically begins much sooner, often within 12 hours of the last use, not after a full week."}, {"t": "Opioid withdrawal symptoms resolve completely within 24 hours in all cases with no lingering effects", "c": false, "w": "While acute symptoms usually last 1-4 weeks, a post-acute phase with mood swings, anxiety, and insomnia can persist for up to two years in some individuals."}, {"t": "Opioid withdrawal has an identical onset and course regardless of which specific opioid was used", "c": false, "w": "Onset and duration vary depending on the specific opioid used (e.g., short-acting versus long-acting agents), though the general pattern described (onset ~12 hours, peak 3-5 days) applies broadly."}], "rationale": "Acute opioid withdrawal can begin within 1 hour of last use, usually starting around 12 hours after the last dose, peaking at 3-5 days, and lasting 1-4 weeks, with a post-acute phase of mood symptoms potentially persisting up to two years.", "tip": "NCLEX tip: Memorize the opioid withdrawal timeline: onset ~12 hrs, peak 3-5 days, acute phase 1-4 weeks, post-acute phase up to 2 years.", "id": "m8_77", "module": 8}, {"type": "mc", "stem": "Which of the following opioids is estimated to be 50 to 100 times more potent than morphine and is increasingly implicated in overdose deaths?", "options": [{"t": "Fentanyl", "c": true, "w": ""}, {"t": "Codeine", "c": false, "w": "Codeine is a much weaker opioid compared to morphine, not a highly potent synthetic like fentanyl that is 50-100 times more potent than morphine."}, {"t": "Hydrocodone", "c": false, "w": "Hydrocodone is a commonly misused prescription opioid, but it is not the specific synthetic opioid described as 50-100 times more potent than morphine; that description applies to fentanyl."}, {"t": "Methadone", "c": false, "w": "Methadone is a long-acting opioid used in detoxification/maintenance, not the specific ultra-potent synthetic opioid (50-100x morphine) described in this question."}], "rationale": "Fentanyl is estimated to be 50-100 times more potent than morphine, and carfentanil is even more potent still (about 100 times more potent than fentanyl); both are increasingly implicated in a growing number of opioid overdose deaths.", "tip": "NCLEX tip: Fentanyl (50-100x morphine) and carfentanil (100x fentanyl) are key potency comparisons tested for their contribution to the overdose crisis.", "id": "m8_78", "module": 8}, {"type": "sata", "stem": "Select all findings that would be scored on the Clinical Opiate Withdrawal Scale (COWS).", "options": [{"t": "Yawning frequency", "c": true, "w": ""}, {"t": "Bone or joint aches", "c": true, "w": ""}, {"t": "Gooseflesh skin (piloerection)", "c": true, "w": ""}, {"t": "Tactile hallucinations", "c": false, "w": "Tactile hallucinations are assessed as part of the CIWA-Ar for alcohol withdrawal, not a listed category on the COWS, which focuses on physical opioid withdrawal signs."}, {"t": "Orientation and clouding of sensorium", "c": false, "w": "Orientation/clouding of sensorium is a CIWA-Ar category for alcohol withdrawal, not one of the eleven COWS items used for opioid withdrawal assessment."}], "rationale": "The COWS assesses eleven physical items specific to opioid withdrawal: resting pulse, sweating, restlessness, pupil size, bone/joint aches, runny nose/tearing, GI upset, tremor, yawning, anxiety/irritability, and gooseflesh skin — distinct from the sensorium/hallucination-focused CIWA-Ar categories used for alcohol withdrawal.", "tip": "NCLEX tip: The COWS is almost entirely made up of physical/autonomic signs; only anxiety/irritability touches on a psychological symptom, unlike CIWA-Ar which includes multiple perceptual/sensorium categories.", "id": "m8_79", "module": 8}, {"type": "fib", "stem": "The 11-item flow-sheet scale used to rate the severity of opioid withdrawal signs and symptoms over time is abbreviated _____.", "answers": ["cows"], "rationale": "COWS (Clinical Opiate Withdrawal Scale) is an 11-item scale rating common opioid withdrawal signs and symptoms, used to monitor withdrawal severity over time and guide treatment decisions.", "tip": "NCLEX tip: COWS = opioid withdrawal (Clinical Opiate Withdrawal Scale); CIWA-Ar = alcohol withdrawal. Keep the 'O' in COWS tied to 'Opiate' to avoid mixing them up.", "id": "m8_80", "module": 8}, {"type": "mc", "stem": "A client who smokes crack cocaine describes the high as intense but very short-lived, followed quickly by a deep emotional low that drives them to use again. Which physiological detail best explains the rapid onset and brief duration of a smoked crack high?", "options": [{"t": "Smoked crack takes effect in 4 to 6 seconds and produces a fleeting high lasting only about 5 to 7 minutes", "c": true, "w": ""}, {"t": "Smoked crack takes about 30 minutes to take effect and produces a high lasting 6 to 8 hours", "c": false, "w": "This vastly overstates both onset time and duration; smoked crack has an extremely rapid onset (4-6 seconds) and a very brief high (5-7 minutes), which is part of why it drives compulsive repeated use."}, {"t": "Smoked crack has a delayed onset of several hours, similar to oral opioid medications", "c": false, "w": "Smoking produces a much faster onset than oral routes; crack's effects begin within seconds, not hours."}, {"t": "Smoked crack produces a high that lasts several days without need for redosing", "c": false, "w": "The high from smoked crack is characteristically brief (5-7 minutes), which is precisely why the cycle of repeated use and craving is so rapid and compulsive."}], "rationale": "Smoked crack cocaine takes effect in just 4-6 seconds and produces a fleeting high lasting only about 5-7 minutes, followed by a significant emotional letdown, which reinforces a rapid, compulsive cycle of repeated use.", "tip": "NCLEX tip: The extremely rapid onset and brief duration of smoked crack is a key reason it is considered highly addictive compared to other routes of cocaine administration.", "id": "m8_81", "module": 8}, {"type": "mc", "stem": "Which withdrawal symptom cluster would the nurse expect in a client recovering from chronic cocaine use?", "options": [{"t": "Depression, paranoia, lethargy, anxiety, insomnia, and sweating/chills", "c": true, "w": ""}, {"t": "Elevated blood pressure, dilated pupils, and hyperthermia identical to intoxication", "c": false, "w": "These findings describe intoxication/stimulant effects, not withdrawal; cocaine withdrawal is marked by a depressive, lethargic cluster rather than continued stimulant-type hyperarousal."}, {"t": "Pinpoint pupils and severe respiratory depression", "c": false, "w": "Pinpoint pupils and respiratory depression describe opioid intoxication/overdose, not cocaine withdrawal, which produces a very different symptom pattern."}, {"t": "Piloerection, rhinorrhea, and diarrhea", "c": false, "w": "These findings are characteristic of opioid withdrawal (assessed via the COWS), not the depression/lethargy/anxiety pattern seen in cocaine withdrawal."}], "rationale": "Cocaine and crack withdrawal produces an imbalance in neurotransmitters resulting in depression, paranoia, lethargy, anxiety, insomnia, nausea/vomiting, and sweating/chills — largely the opposite of the stimulant effects experienced during intoxication.", "tip": "NCLEX tip: Stimulant withdrawal (cocaine, methamphetamine) tends to cause a depressive 'crash,' which is essentially a mirror-image contrast to the hyperaroused intoxication state.", "id": "m8_82", "module": 8}, {"type": "mc", "stem": "A client with a long history of methamphetamine use develops new-onset visual hallucinations, paranoia, and delusions that closely resemble a primary psychotic disorder. The nurse understands this is most likely explained by which mechanism?", "options": [{"t": "The neurotoxic effects of methamphetamine damaging dopamine- and serotonin-containing brain cells", "c": true, "w": ""}, {"t": "A normal, expected, and reversible finding with no lasting brain changes", "c": false, "w": "Methamphetamine's neurotoxic effects can cause lasting brain damage and long-term psychiatric symptoms, so this is not simply a benign, fully reversible finding."}, {"t": "An allergic reaction to the drug that resolves spontaneously within hours", "c": false, "w": "This presentation reflects neurotoxic brain changes from chronic use, not a transient allergic reaction."}, {"t": "A vitamin B1 (thiamine) deficiency, similar to Wernicke's encephalopathy", "c": false, "w": "Thiamine deficiency and Wernicke's encephalopathy are specifically linked to chronic alcohol use, not methamphetamine's neurotoxic mechanism."}], "rationale": "Methamphetamine is neurotoxic, damaging dopamine- and serotonin-containing brain cells; long-term use can produce psychosis resembling schizophrenia, and reduced dopamine can also cause parkinsonian symptoms with chronic use.", "tip": "NCLEX tip: Methamphetamine's neurotoxicity (schizophrenia-like psychosis, parkinsonian symptoms) distinguishes it from cocaine's shorter-acting, less overtly neurotoxic stimulant profile.", "id": "m8_83", "module": 8}, {"type": "mc", "stem": "Which statement about nicotine and smoking-related mortality is accurate?", "options": [{"t": "Nicotine use is the greatest single cause of preventable illness and premature death, causing hundreds of thousands of U.S. deaths yearly", "c": true, "w": ""}, {"t": "Nicotine use causes fewer preventable deaths annually than alcohol use in the United States", "c": false, "w": "Nicotine is identified as the greatest single cause of preventable illness and premature death, causing far more annual deaths (443,000) than most other single substances discussed."}, {"t": "E-cigarettes contain only nicotine with no other harmful chemicals", "c": false, "w": "E-cigarettes contain nicotine plus additional toxic ingredients such as formaldehyde and acetaldehyde, and high-voltage vaping may significantly increase lifetime cancer risk."}, {"t": "Smokers on average have the same life expectancy as nonsmokers", "c": false, "w": "Smokers die approximately 10 years earlier on average compared to nonsmokers, reflecting the substantial mortality impact of chronic nicotine/tobacco use."}], "rationale": "Nicotine is the single greatest cause of preventable illness and premature death, contributing to approximately 443,000 U.S. deaths per year, with smokers dying roughly 10 years earlier on average; nicotine can act as a stimulant, depressant, or tranquilizer.", "tip": "NCLEX tip: Memorize nicotine's staggering mortality burden (443,000 U.S. deaths/year, ~10 years of life lost) as a frequently tested statistic emphasizing its public health impact.", "id": "m8_84", "module": 8}, {"type": "mc", "stem": "A client trying to quit smoking asks about first-line pharmacologic options. Which medication would the nurse identify as an appropriate first choice for a smoker who also has coexisting depression?", "options": [{"t": "Bupropion (Zyban)", "c": true, "w": ""}, {"t": "Varenicline (Chantix) as the only appropriate option regardless of psychiatric history", "c": false, "w": "While varenicline is an approved nicotine-free cessation aid, bupropion is specifically noted as the first choice for smokers with coexisting depression given its antidepressant properties."}, {"t": "Disulfiram (Antabuse)", "c": false, "w": "Disulfiram is used for alcohol use disorder, not smoking cessation, and is unrelated to nicotine cessation pharmacotherapy."}, {"t": "Naltrexone (ReVia)", "c": false, "w": "Naltrexone is used for alcohol and opioid use disorders, not as an FDA-approved smoking cessation aid."}], "rationale": "Bupropion (Zyban), a nicotine-free cessation aid, is identified as the first choice for smokers who also have coexisting depression, given its additional antidepressant properties, distinct from nicotine replacement products (patches, gum) or varenicline (Chantix).", "tip": "NCLEX tip: When a smoking-cessation question specifies coexisting depression, bupropion is the preferred first-choice nicotine-free option.", "id": "m8_85", "module": 8}, {"type": "mc", "stem": "A client who uses high-potency marijuana products daily presents with recurrent, severe cyclical vomiting, abdominal pain, and unintentional weight loss that improves temporarily with hot showers. Which condition should the nurse suspect?", "options": [{"t": "Cannabinoid hyperemesis syndrome (CHS)", "c": true, "w": ""}, {"t": "Amotivational syndrome", "c": false, "w": "Amotivational syndrome involves apathy, lethargy, and decreased productivity from chronic heavy marijuana use, not the cyclical vomiting and abdominal pain pattern described in CHS."}, {"t": "Opioid withdrawal", "c": false, "w": "Opioid withdrawal produces GI upset among many other symptoms (piloerection, rhinorrhea, tremor), but the specific pattern of severe cyclical vomiting relieved by hot showers in a chronic high-potency marijuana user is characteristic of CHS."}, {"t": "Alcohol withdrawal delirium", "c": false, "w": "Alcohol withdrawal delirium presents with autonomic instability, fever, and sensorium disturbance, not the cyclical vomiting/hot-shower-relief pattern specific to cannabinoid hyperemesis syndrome."}], "rationale": "Cannabinoid hyperemesis syndrome (CHS) is a paradoxical condition from prolonged high-potency marijuana use, causing severe cyclical vomiting, abdominal discomfort, weight loss, and sweating; clients may find temporary relief with hot showers, and severe cases require emergency treatment for dehydration and kidney toxicity risk.", "tip": "NCLEX tip: Cyclical vomiting relieved temporarily by hot showers in a chronic heavy marijuana user is a classic testable clue for cannabinoid hyperemesis syndrome.", "id": "m8_86", "module": 8}, {"type": "mc", "stem": "Which long-term effect is most specifically associated with chronic, heavy marijuana use, characterized by apathy, decreased productivity, and preoccupation with drug use?", "options": [{"t": "Amotivational syndrome", "c": true, "w": ""}, {"t": "Post-acute withdrawal syndrome (PAWS)", "c": false, "w": "PAWS is a withdrawal-related phenomenon most classically described with alcohol/opioids, involving mood swings and anxiety, not the specific apathy/decreased achievement pattern of amotivational syndrome."}, {"t": "Wernicke-Korsakoff syndrome", "c": false, "w": "Wernicke-Korsakoff syndrome is specifically linked to thiamine deficiency from chronic alcohol use, not chronic marijuana use."}, {"t": "Neonatal abstinence syndrome", "c": false, "w": "Neonatal abstinence syndrome describes newborn opioid withdrawal, unrelated to the long-term marijuana-associated apathy syndrome described in this question."}], "rationale": "Amotivational syndrome, associated with chronic heavy marijuana use, is characterized by apathy, loss of achievement motivation, decreased productivity, poor hygiene, and preoccupation with drug use.", "tip": "NCLEX tip: Amotivational syndrome is the specific, testable term for long-term heavy marijuana use effects on drive and productivity.", "id": "m8_87", "module": 8}, {"type": "mc", "stem": "Which club drug is most strongly associated with facilitating sexual assault due to its fast-acting sedative effect, muscle relaxation, and ability to cause anterograde amnesia?", "options": [{"t": "Flunitrazepam (Rohypnol)", "c": true, "w": ""}, {"t": "MDMA (ecstasy/molly)", "c": false, "w": "MDMA increases energy, sociability, and euphoria and is not primarily known for causing rapid sedation and anterograde amnesia the way Rohypnol is."}, {"t": "LSD", "c": false, "w": "LSD is a hallucinogen producing dreamlike unreality and perceptual distortion, not the rapid-onset sedation and amnesia specifically associated with flunitrazepam."}, {"t": "Marijuana", "c": false, "w": "Marijuana produces euphoria, relaxation, and altered perception but is not specifically identified as a classic 'date rape' drug causing rapid sedation and amnesia the way Rohypnol is."}], "rationale": "Flunitrazepam (Rohypnol, or 'roofies') is a fast-acting benzodiazepine implicated in sexual assault because of its rapid disinhibition, muscle relaxation, unconsciousness, and anterograde amnesia, and it can be easily mixed into drinks undetected.", "tip": "NCLEX tip: Rohypnol, GHB, and ketamine are all commonly cited 'date rape' drugs due to their rapid sedative/amnestic/dissociative properties.", "id": "m8_88", "module": 8}, {"type": "mc", "stem": "A client at a music festival reports using a substance that caused a dissociative, out-of-body sensation, which they describe as sometimes pleasant and sometimes terrifying. Which drug best fits this description?", "options": [{"t": "Ketamine", "c": true, "w": ""}, {"t": "Cocaine", "c": false, "w": "Cocaine is a stimulant/anesthetic producing euphoria and increased energy, not the dissociative, out-of-body sensations characteristic of ketamine."}, {"t": "Nicotine", "c": false, "w": "Nicotine can act as a stimulant, depressant, or tranquilizer but does not produce the characteristic dissociative floating/out-of-body sensation described here."}, {"t": "Buprenorphine", "c": false, "w": "Buprenorphine is a medication used for opioid use disorder treatment, not a recreational dissociative club drug producing out-of-body sensations."}], "rationale": "Ketamine is a dissociative anesthetic that can produce a floating or out-of-body sensation, which may be pleasant or terrifying; it can also cause delirium, respiratory depression/arrest, and amnesia, and is implicated in sexual assault.", "tip": "NCLEX tip: Ketamine's hallmark is the dissociative 'out-of-body' experience, distinguishing it from purely stimulant (MDMA, cocaine) or purely sedative (GHB, Rohypnol) club drugs.", "id": "m8_89", "module": 8}, {"type": "mc", "stem": "A client reports feelings of superhuman strength, extreme agitation, and paranoia after using a cheap, unregulated stimulant substitute purchased online, sometimes referred to as 'bath salts.' The nurse recognizes this substance class as:", "options": [{"t": "Synthetic cathinones", "c": true, "w": ""}, {"t": "Opiates", "c": false, "w": "Opiates produce sedation, analgesia, and respiratory depression, which is essentially the opposite presentation of the extreme agitation and perceived superhuman strength described in this stimulant-type intoxication."}, {"t": "Benzodiazepines", "c": false, "w": "Benzodiazepines are CNS depressants causing sedation, not the agitation, dissociation, and perceived superhuman strength associated with synthetic cathinone use."}, {"t": "Cholinesterase inhibitors", "c": false, "w": "Cholinesterase inhibitors are medications used for Alzheimer's disease, unrelated to recreational stimulant substances like synthetic cathinones."}], "rationale": "Synthetic cathinones ('bath salts') are human-made new psychoactive substances (NPS) used as cheap substitutes for methamphetamine/cocaine, producing hallucinogenic-delusional properties, dissociation, extreme agitation, and feelings of superhuman strength/combativeness.", "tip": "NCLEX tip: 'Bath salts' is testable terminology for synthetic cathinones — a stimulant-type NPS class distinct from synthetic cannabinoids (K2/Spice), which mimic marijuana.", "id": "m8_90", "module": 8}, {"type": "mc", "stem": "An adolescent client is brought to the emergency department after inhaling fumes from an aerosol computer-cleaning product. The nurse should monitor most urgently for which life-threatening complication?", "options": [{"t": "Sudden cardiac or respiratory arrest from irregular heart rhythms", "c": true, "w": ""}, {"t": "Delayed onset of neonatal abstinence syndrome", "c": false, "w": "Neonatal abstinence syndrome is specific to newborns of opioid-dependent mothers and is not relevant to an adolescent client who has inhaled aerosol fumes."}, {"t": "Development of Korsakoff's psychosis within 24 hours", "c": false, "w": "Korsakoff's psychosis develops from chronic thiamine deficiency related to long-term alcohol use, not from acute inhalant exposure."}, {"t": "Immediate onset of alcohol withdrawal delirium", "c": false, "w": "Alcohol withdrawal delirium is specific to cessation of chronic alcohol use, not an acute complication of inhalant use."}], "rationale": "Inhalants starve the body of oxygen and can cause irregular, rapid heartbeat, with sudden death from cardiac or respiratory arrest possible even after a single use episode — a critical safety concern, especially given that inhalants are most often used by adolescents due to easy access.", "tip": "NCLEX tip: Sudden cardiac/respiratory arrest ('sudden sniffing death') is the most urgent, life-threatening risk of inhalant use and a key safety teaching point for adolescents.", "id": "m8_91", "module": 8}, {"type": "sata", "stem": "Select all substances classified as 'club drugs' according to the source material.", "options": [{"t": "MDMA (ecstasy/molly)", "c": true, "w": ""}, {"t": "GHB (gamma-hydroxybutyrate)", "c": true, "w": ""}, {"t": "Ketamine", "c": true, "w": ""}, {"t": "Buprenorphine", "c": false, "w": "Buprenorphine is a medication used to treat opioid use disorder, not a recreational club drug used at parties or clubs."}, {"t": "Acamprosate", "c": false, "w": "Acamprosate is a medication used to help maintain alcohol abstinence, not a recreational club drug."}], "rationale": "Club drugs, typically used by young adults in group settings like dance parties and clubs, include MDMA, GHB, ketamine, Rohypnol, methamphetamine, and LSD, all of which produce effects resembling stimulants and/or hallucinogens and whose risks are potentiated by alcohol.", "tip": "NCLEX tip: Club drugs cluster around party/social settings; remember MDMA, GHB, ketamine, Rohypnol, methamphetamine, and LSD as the core group.", "id": "m8_92", "module": 8}, {"type": "sata", "stem": "Select all statements that are true regarding route of substance ingestion and associated medical risks.", "options": [{"t": "Intravenous (IV) drug use increases risk of venous sclerosis and HIV/hepatitis transmission", "c": true, "w": ""}, {"t": "Intranasal ('snorting') use can cause chronic sinusitis and a perforated nasal septum", "c": true, "w": ""}, {"t": "Smoking a substance generally produces a slower onset of effect than oral ingestion", "c": false, "w": "Smoking generally produces a much faster onset of effect than oral ingestion, which is part of why smoked routes (like crack) are considered particularly reinforcing and addictive."}, {"t": "Route of ingestion has no bearing on overall addiction risk or medical complications", "c": false, "w": "Route of ingestion significantly affects both the speed of onset (reinforcing repeated use) and the specific medical complications encountered, such as IV-related infections or intranasal nasal damage."}, {"t": "Splinter hemorrhages in an IV drug user may signal endocarditis", "c": true, "w": ""}], "rationale": "Route of ingestion strongly influences both addiction risk and complications: IV use raises risk of infection, venous sclerosis, and HIV/hepatitis (with splinter hemorrhages signaling possible endocarditis); intranasal use causes chronic sinusitis/perforated septum; and rapid-onset routes like smoking or IV use reinforce repeated use to recapture the high.", "tip": "NCLEX tip: Match each route of ingestion (IV, intranasal, smoking) to its classic complication — this pairing is a recurring exam theme.", "id": "m8_93", "module": 8}, {"type": "fib", "stem": "The class of drugs that includes LSD, mescaline (peyote), and psilocybin (magic mushrooms), producing dreamlike unreality and perceptual distortion, is known as _____.", "answers": ["hallucinogens"], "rationale": "Hallucinogens such as LSD, mescaline, and psilocybin produce dreamlike unreality and hallucinations, and flashbacks or persistent perception disorders can occur days to weeks after use, even in a drug-free state.", "tip": "NCLEX tip: A 'flashback' occurring in a drug-free state, days to weeks after use, is a classic testable feature tied specifically to hallucinogen use.", "id": "m8_94", "module": 8}, {"type": "fib", "stem": "A stimulant substance extracted from the leaf of the coca bush that has both anesthetic and stimulant properties, and whose smoked/alkalinized form is known as crack, is called _____.", "answers": ["cocaine"], "rationale": "Cocaine is extracted from the coca leaf and has both anesthetic and stimulant properties; when smoked in its alkalinized, inexpensive form (crack), it produces a rapid but very brief high that strongly reinforces compulsive repeated use.", "tip": "NCLEX tip: Remember cocaine is a Schedule II substance with both anesthetic and stimulant properties — a detail sometimes tested directly.", "id": "m8_95", "module": 8}, {"type": "mc", "stem": "A client in early recovery relapses after 3 months of sobriety and expresses deep shame, saying, 'I've failed at recovery completely.' Which response by the nurse best reflects an evidence-based understanding of relapse?", "options": [{"t": "\"Relapse is a common and expected part of the recovery process, not evidence that treatment has failed — let's look at what led up to it.\"", "c": true, "w": ""}, {"t": "\"You are right that this means the treatment program was not effective for you and you need a completely different approach.\"", "c": false, "w": "This response reinforces the client's shame and mischaracterizes relapse as proof of treatment failure, when relapse rates of 40%-60% are considered an expected part of the chronic, relapsing course of substance use disorder."}, {"t": "\"This proves that you were not really committed to recovery in the first place.\"", "c": false, "w": "This judgmental response blames the client's character rather than recognizing relapse as an expected feature of a chronic, relapsing brain disease, and it could worsen shame and disengagement from treatment."}, {"t": "\"There is no point in continuing treatment now since the relapse already happened.\"", "c": false, "w": "Discouraging continued treatment after a relapse contradicts the recovery model, which frames relapse as an opportunity to learn and strengthen the relapse-prevention plan, not a reason to abandon treatment."}], "rationale": "Relapse is a common, expected symptom of substance use disorders, occurring in an estimated 40%-60% of cases, and should be framed as part of the chronic, relapsing course of the disease rather than as a moral failure or definitive treatment failure.", "tip": "NCLEX tip: NCLEX favors responses that normalize relapse as part of a chronic disease process rather than responses that blame the client or suggest treatment is pointless.", "id": "m8_96", "module": 8}, {"type": "mc", "stem": "Which of the following best exemplifies the harm reduction approach to substance use disorders?", "options": [{"t": "A community needle-exchange program that provides clean syringes to people who inject drugs", "c": true, "w": ""}, {"t": "Requiring complete abstinence before any medical or social services can be provided to a person who uses drugs", "c": false, "w": "Harm reduction specifically serves people who are not yet ready or able to stop using, rather than requiring abstinence as a precondition for receiving services."}, {"t": "Mandatory incarceration for any person found in possession of a controlled substance", "c": false, "w": "Incarceration-focused approaches are a criminal justice response, not a harm reduction strategy, which instead focuses on reducing the negative health/community impact of ongoing drug use."}, {"t": "Refusing to renew a client's naloxone prescription until they enter an inpatient treatment program", "c": false, "w": "Restricting access to naloxone contradicts harm reduction principles, which specifically promote easy availability of naloxone as an overdose-prevention tool."}], "rationale": "Harm reduction is a set of practices designed to reduce the impact of specific drug-using behaviors and buffer the community from the full impact of addiction, exemplified by methadone maintenance programs, needle-exchange programs, and easy availability of naloxone.", "tip": "NCLEX tip: Harm reduction strategies (needle exchange, easy naloxone access, methadone maintenance) do not require abstinence as a precondition for support.", "id": "m8_97", "module": 8}, {"type": "mc", "stem": "A nurse is developing a relapse prevention plan with a client in early recovery. Which client statement indicates an understanding of relapse warning cues?", "options": [{"t": "\"I've noticed I start glamorizing my past drinking and getting secretive again right before I relapse.\"", "c": true, "w": ""}, {"t": "\"As long as I keep going to work every day, I have no risk of relapse.\"", "c": false, "w": "Maintaining employment alone does not eliminate relapse risk; emotional, mental, and physical cues (mood changes, glamorizing past use, stopping counseling) are the key warning signs to monitor, regardless of work attendance."}, {"t": "\"Relapse only happens without any warning signs at all, so there's nothing I can really watch for.\"", "c": false, "w": "Relapse typically follows identifiable emotional, mental, and physical cues (such as increased anxiety, secretive behavior, or stopping meetings), which clients can learn to recognize and act on."}, {"t": "\"I don't need a plan for cravings since I'll just tough it out on my own if they happen.\"", "c": false, "w": "An effective relapse prevention plan includes a specific craving-response plan, such as who to call or distraction techniques, rather than relying solely on willpower."}], "rationale": "Mental cues to relapse include glamorizing past use, secrecy or lying, and increased thinking about using — recognizing these cues early allows the client and treatment team to intervene before a full relapse occurs.", "tip": "NCLEX tip: Sort relapse cues into three categories — emotional (anxiety, mood swings), mental (glamorizing use, secrecy), and physical (stopping meetings, hanging out with old using friends) — for quick identification on exam questions.", "id": "m8_98", "module": 8}, {"type": "mc", "stem": "Which of the four dimensions of the SAMHSA Recovery Model refers to having a safe and stable place to live?", "options": [{"t": "Home", "c": true, "w": ""}, {"t": "Health", "c": false, "w": "Health refers to overcoming or managing one's disease and making informed, healthy choices, not specifically to housing stability."}, {"t": "Purpose", "c": false, "w": "Purpose refers to engaging in meaningful daily activities such as work, school, or volunteering, not to housing status."}, {"t": "Community", "c": false, "w": "Community refers to having relationships and social networks that provide support, friendship, and hope, not specifically to stable housing."}], "rationale": "The SAMHSA Recovery Model identifies four dimensions: Health (managing one's disease), Home (a safe, stable living situation), Purpose (meaningful activities), and Community (supportive relationships and social networks) as essential elements of a self-directed recovery process.", "tip": "NCLEX tip: Remember the four Recovery Model dimensions with the mnemonic 'Health, Home, Purpose, Community' — each represents a distinct pillar of sustained recovery.", "id": "m8_99", "module": 8}, {"type": "mc", "stem": "A client new to Alcoholics Anonymous (AA) asks the nurse to explain a core concept of the 12-step program. Which explanation is most accurate?", "options": [{"t": "Individuals are considered powerless over their addiction, yet are responsible for their own recovery and can no longer blame external circumstances", "c": true, "w": ""}, {"t": "AA teaches that willpower alone, without any spiritual or group component, is the most effective path to recovery", "c": false, "w": "AA emphasizes spirituality and mutual support as important aspects of recovery, not a purely individual willpower-based approach without spiritual or group elements."}, {"t": "AA requires members to prove they are not responsible for their own recovery process", "c": false, "w": "AA's core philosophy holds that while individuals are not responsible for causing the disease, they are responsible for their own recovery — the opposite of what this statement describes."}, {"t": "AA is a professionally led, insurance-
