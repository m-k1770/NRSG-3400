  {t:'Vitamins B1, B6, and B12 only',c:false,why:'These are water-soluble B vitamins, not the fat-soluble vitamins affected by impaired fat digestion from biliary obstruction.'},
  {t:'Vitamin C only',c:false,why:'Vitamin C is water-soluble and is not the group of vitamins specifically affected by impaired bile flow and fat malabsorption.'},
  {t:'All vitamins are affected equally regardless of solubility',c:false,why:'Fat-soluble vitamins specifically (A, D, E, K) are affected by impaired fat digestion from biliary obstruction, not all vitamins equally.'},
 ],
 rationale:'Chronic biliary obstruction impairs fat digestion, leading to deficiency in the fat-soluble vitamins A, D, E, and K, which require adequate bile and fat absorption to be properly absorbed.',
 tip:'NCLEX tip: "A, D, E, K" is the fat-soluble vitamin group to remember whenever bile flow or fat digestion is impaired, across gallbladder, liver, or pancreatic disease.'},

{id:'h41',type:'mc',stem:'Which viral hepatitis type is transmitted via contaminated water and resembles hepatitis A in its clinical course?',
 options:[
  {t:'Hepatitis E',c:true,why:''},
  {t:'Hepatitis B',c:false,why:'Hepatitis B is bloodborne, not transmitted via contaminated water, and can become chronic, unlike the self-limiting course described here.'},
  {t:'Hepatitis C',c:false,why:'Hepatitis C is bloodborne and can become chronic, which does not match the fecal-oral, self-limiting pattern described.'},
  {t:'Hepatitis D',c:false,why:'Hepatitis D requires coexisting hepatitis B infection and is transmitted via blood, sex, or IV drug use, not contaminated water.'},
 ],
 rationale:'Hepatitis E is transmitted via the fecal-oral route, often through contaminated water, and resembles hepatitis A in being self-limiting, with an abrupt onset and no progression to chronic disease.',
 tip:'NCLEX tip: pair hepatitis A and E together as the fecal-oral, acute-only hepatitis types, with E specifically linked to contaminated water sources.'},

{id:'h42',type:'mc',stem:'A client asks about the incubation period for hepatitis B. What should the nurse explain?',
 options:[
  {t:'The incubation period is relatively long, generally one to six months',c:true,why:''},
  {t:'The incubation period is very short, generally under 24 hours',c:false,why:'This significantly understates the actual incubation period for hepatitis B, which is much longer.'},
  {t:'Hepatitis B has no defined incubation period',c:false,why:'Hepatitis B does have a defined, relatively long incubation period, generally cited as one to six months.'},
  {t:'The incubation period is identical to that of hepatitis A',c:false,why:'Hepatitis A has a shorter incubation period (2-6 weeks) compared with the much longer incubation period of hepatitis B (1-6 months).'},
 ],
 rationale:'Hepatitis B has a relatively long incubation period, generally cited as one to six months, distinguishing it from the shorter incubation period of hepatitis A (2-6 weeks).',
 tip:'NCLEX tip: compare incubation periods across hepatitis types — A is weeks, B is months — as a way to distinguish them on exam questions.'},

{id:'h43',type:'mc',stem:'Which population is specifically noted as being at increased risk for hepatitis B due to perinatal transmission?',
 options:[
  {t:'Infants born to mothers with hepatitis B',c:true,why:''},
  {t:'Older adults with no other risk factors',c:false,why:'Perinatal transmission specifically applies to infants born to infected mothers, not older adults as a general risk group.'},
  {t:'Clients who have received the hepatitis B vaccine series',c:false,why:'Vaccination reduces risk rather than increasing it; the perinatal transmission risk applies to unvaccinated infants born to infected mothers.'},
  {t:'Clients with a family history of hepatitis A only',c:false,why:'A family history of hepatitis A does not relate to hepatitis B perinatal transmission risk, which is specific to maternal hepatitis B status.'},
 ],
 rationale:'Hepatitis B can be transmitted to an infant at birth (perinatal transmission) from a mother who is infected, which is why routine vaccination of infants is an important prevention strategy.',
 tip:'NCLEX tip: perinatal transmission is a key hepatitis B fact tied directly to the importance of routine infant vaccination.'},

{id:'h44',type:'mc',stem:'A client with chronic hepatitis B is prescribed an oral antiviral agent. Which medication would the nurse expect to be used for this purpose?',
 options:[
  {t:'Entecavir or tenofovir',c:true,why:''},
  {t:'Interferon alfa only, with no oral options available',c:false,why:'Oral antiviral agents such as entecavir and tenofovir are available for chronic hepatitis B, in addition to interferon options.'},
  {t:'Sucralfate',c:false,why:'Sucralfate is a mucosal protectant used in peptic ulcer disease, not an antiviral agent for hepatitis B.'},
  {t:'Rifaximin',c:false,why:'Rifaximin is an antibiotic used for hepatic encephalopathy, not an antiviral for chronic hepatitis B.'},
 ],
 rationale:'Chronic hepatitis B management includes oral antiviral agents such as entecavir (ETV) and tenofovir (TDF), in addition to subcutaneous alpha interferon.',
 tip:'NCLEX tip: entecavir and tenofovir are the two named oral antivirals to remember specifically for chronic hepatitis B management.'},

{id:'h45',type:'mc',stem:'A client asks how hepatitis C is most commonly transmitted. What is the best response?',
 options:[
  {t:'"It is most commonly transmitted through blood exposure, such as IV drug use or, historically, blood transfusion before 1992."',c:true,why:''},
  {t:'"It is transmitted primarily through the fecal-oral route, like hepatitis A."',c:false,why:'This describes hepatitis A and E transmission, not hepatitis C, which is bloodborne.'},
  {t:'"It is transmitted only through respiratory droplets."',c:false,why:'Hepatitis C is not transmitted through respiratory droplets; it is a bloodborne virus.'},
  {t:'"It cannot be transmitted through blood transfusion under any circumstances."',c:false,why:'Historically, blood transfusion before 1992 was a recognized transmission route for hepatitis C, before blood supply screening improved.'},
 ],
 rationale:'Hepatitis C is most commonly transmitted through blood exposure, including IV drug use, sexual contact, and historically through blood transfusions before 1992, prior to improved blood supply screening.',
 tip:'NCLEX tip: "pre-1992 blood transfusion" is a specific historical detail worth remembering for hepatitis C transmission questions.'},

{id:'h46',type:'mc',stem:'Which statement about hepatitis D is accurate?',
 options:[
  {t:'It can only infect people who are already infected with hepatitis B',c:true,why:''},
  {t:'It is diagnosed using the same test as hepatitis A',c:false,why:'Hepatitis D has its own specific diagnostic markers (anti-HDV, HDsAg), distinct from those used for hepatitis A.'},
  {t:'It is transmitted only via the fecal-oral route',c:false,why:'Hepatitis D is transmitted via blood, sexual contact, IV drug use, and blood transfusions, not the fecal-oral route.'},
  {t:'It cannot become a chronic infection under any circumstances',c:false,why:'Hepatitis D can be either acute or chronic, so this statement is inaccurate.'},
 ],
 rationale:'Hepatitis D can only infect people already infected with hepatitis B, is transmitted via blood, sexual contact, IV drug use, or transfusion, can be acute or chronic, and is diagnosed with anti-HDV and HDsAg testing.',
 tip:'NCLEX tip: hepatitis D\'s dependency on hepatitis B is its single most important, most frequently tested characteristic.'},

{id:'h47',type:'mc',stem:'A client recovering from acute hepatitis A asks how long the illness typically lasts. What is the most accurate response?',
 options:[
  {t:'"The illness may last about four to eight weeks."',c:true,why:''},
  {t:'"The illness typically lasts only one to two days."',c:false,why:'This significantly understates the typical duration of acute hepatitis A illness.'},
  {t:'"The illness is expected to last one to two years."',c:false,why:'This significantly overstates the typical duration, since hepatitis A is a self-limiting, acute illness lasting weeks, not years.'},
  {t:'"There is no typical timeframe and it cannot be estimated."',c:false,why:'A general expected timeframe (4-8 weeks) can be shared with clients for hepatitis A, so this statement is inaccurate.'},
 ],
 rationale:'Hepatitis A illness may last about four to eight weeks, consistent with its nature as a self-limiting, acute infection that does not progress to chronic disease.',
 tip:'NCLEX tip: "4 to 8 weeks" is the specific duration to remember for hepatitis A illness, alongside its 2-6 week incubation period.'},

{id:'h48',type:'mc',stem:'A client asks about the risk of liver cancer associated with chronic hepatitis B and C. What is the most accurate response?',
 options:[
  {t:'"Both chronic hepatitis B and C can progress to cirrhosis and increase the risk of liver cancer over time."',c:true,why:''},
  {t:'"Only hepatitis B increases liver cancer risk; hepatitis C has no such association."',c:false,why:'Hepatitis C is actually responsible for about one-third of liver cancer cases, so it clearly carries an association with increased risk as well.'},
  {t:'"Neither hepatitis B nor C is associated with an increased risk of liver cancer."',c:false,why:'Both hepatitis B and C are well-documented risk factors for liver cancer, making this statement inaccurate.'},
  {t:'"Liver cancer risk from hepatitis B and C only applies to acute infections."',c:false,why:'The liver cancer risk is specifically associated with chronic infection over time, not limited to the acute phase.'},
 ],
 rationale:'Chronic hepatitis B and C infection can both progress to cirrhosis and increase the risk of liver cancer over time, with hepatitis C responsible for about one-third of liver cancer cases specifically.',
 tip:'NCLEX tip: both hepatitis B and C carry long-term liver cancer risk — don\'t assume this risk is unique to only one of the two.'},

{id:'h49',type:'mc',stem:'A client with nonviral (drug-induced) hepatitis asks what caused this condition. What is the best explanation?',
 options:[
  {t:'Certain medications can cause liver inflammation independent of viral infection',c:true,why:''},
  {t:'Nonviral hepatitis is always caused by a bacterial infection of the liver',c:false,why:'Nonviral hepatitis in this context refers specifically to drug- or medication-induced causes, not bacterial infection.'},
  {t:'Nonviral hepatitis cannot occur without a preceding viral hepatitis infection',c:false,why:'Nonviral hepatitis is a distinct category caused by drugs or medications, and does not require a preceding viral infection to occur.'},
  {t:'Nonviral hepatitis is always more severe than any viral form of hepatitis',c:false,why:'Severity varies and is not a defining characteristic distinguishing nonviral from viral hepatitis; the key distinction is the causative agent (drugs vs. virus).'},
 ],
 rationale:'Nonviral hepatitis is caused by drugs or medications leading to liver inflammation, distinguishing it from the viral hepatitis types (A through E) caused by specific viruses.',
 tip:'NCLEX tip: keep nonviral (drug-induced) hepatitis as a separate category from the five viral hepatitis types when reviewing causes of liver inflammation.'},

{id:'h50',type:'mc',stem:'Which of the following best reflects the liver\'s detoxification function?',
 options:[
  {t:'Filtering drugs, alcohol, and other toxins from the blood',c:true,why:''},
  {t:'Producing insulin to regulate blood glucose directly',c:false,why:'Insulin production is a pancreatic function, not part of the liver\'s detoxification role.'},
  {t:'Filtering air to remove particulate matter before it reaches the lungs',c:false,why:'This describes a respiratory system function, unrelated to the liver\'s role in the body.'},
  {t:'Producing red blood cells throughout adult life',c:false,why:'Red blood cell production in adults primarily occurs in the bone marrow, not as a detoxification function of the liver.'},
 ],
 rationale:'The liver\'s detoxification function involves filtering drugs, alcohol, and other toxins from the blood, one of its several critical roles alongside bile production, nutrient metabolism, and protein synthesis.',
 tip:'NCLEX tip: memorize the liver\'s core functions as a set — bile production, nutrient metabolism, detoxification, storage, protein synthesis, immune support, hormone regulation, and cholesterol management.'},

{id:'h51',type:'mc',stem:'A client asks which body system relies on the liver for producing substances necessary for normal blood clotting. What is the best response?',
 options:[
  {t:'"The liver produces clotting factors as part of its protein synthesis function."',c:true,why:''},
  {t:'"The liver has no role in blood clotting; that is entirely a bone marrow function."',c:false,why:'This is inaccurate; the liver specifically synthesizes many of the clotting factors necessary for normal coagulation.'},
  {t:'"The liver only affects clotting indirectly through bile production."',c:false,why:'The liver\'s primary role in clotting is direct synthesis of clotting factors as part of its protein synthesis function, not solely an indirect effect through bile.'},
  {t:'"The liver produces red blood cells, which are responsible for clotting."',c:false,why:'Clotting is primarily related to clotting factors and platelets, not red blood cells; the liver\'s relevant role is synthesizing clotting factors.'},
 ],
 rationale:'The liver produces clotting factors as part of its protein synthesis function, which is why liver disease such as cirrhosis is associated with prolonged clotting times and increased bleeding risk.',
 tip:'NCLEX tip: connect impaired clotting factor synthesis directly to cirrhosis-related bleeding risk whenever you see a prolonged PT/INR in a liver disease client.'},

{id:'h52',type:'mc',stem:'Chronic liver disease is cited as approximately which leading cause of death in young to middle-aged adults, according to the course material?',
 options:[
  {t:'The 12th leading cause of death',c:true,why:''},
  {t:'The leading cause of death overall',c:false,why:'This overstates the ranking described in the course material, which cites chronic liver disease as the 12th leading cause, not the overall leading cause.'},
  {t:'The 50th leading cause of death',c:false,why:'This understates the ranking; chronic liver disease is cited as a more prominent cause of death than this ranking would suggest.'},
  {t:'It is not among the top 100 causes of death',c:false,why:'This significantly understates the actual ranking described in the course material.'},
 ],
 rationale:'Chronic liver disease is cited as the 12th leading cause of death in young to middle-aged adults, with about 40% of those deaths related to alcohol abuse.',
 tip:'NCLEX tip: pair the "12th leading cause of death" statistic with the "40% related to alcohol abuse" statistic as linked facts about chronic liver disease.'},

{id:'h53',type:'mc',stem:'A client asks about the difference between NAFLD and NASH. What is the best explanation?',
 options:[
  {t:'NASH is a more severe form of fatty liver disease compared with simple NAFLD',c:true,why:''},
  {t:'NAFLD and NASH are two names for the exact same condition with no difference in severity',c:false,why:'NASH represents a more severe form along the fatty liver disease spectrum, not simply an alternate name for NAFLD with no distinction.'},
  {t:'NASH is caused exclusively by viral hepatitis infection',c:false,why:'NASH, like NAFLD, is related to metabolic risk factors such as obesity, not viral hepatitis infection.'},
  {t:'NAFLD is more severe than NASH',c:false,why:'This reverses the actual relationship; NASH is the more severe form along the fatty liver disease spectrum, not NAFLD.'},
 ],
 rationale:'NASH (nonalcoholic steatohepatitis) represents a more severe form of fatty liver disease compared with simple NAFLD (nonalcoholic fatty liver disease), both related to fat deposition in the liver in the absence of significant alcohol use.',
 tip:'NCLEX tip: think of NAFLD to NASH as a spectrum of severity, similar to how compensated cirrhosis progresses to decompensated cirrhosis.'},

{id:'h54',type:'mc',stem:'A client with cirrhosis has hepatomegaly and splenomegaly on exam. What is the best explanation for the splenomegaly?',
 options:[
  {t:'Portal hypertension causes increased pressure that backs up into the splenic circulation',c:true,why:''},
  {t:'The spleen is directly infected by the same process causing the liver disease',c:false,why:'Splenomegaly in cirrhosis is related to portal hypertension\'s hemodynamic effects, not a direct infectious process affecting the spleen.'},
  {t:'Splenomegaly in this context is unrelated to the liver disease',c:false,why:'Splenomegaly is a recognized, directly related finding in cirrhosis due to portal hypertension, not an unrelated coincidental finding.'},
  {t:'The spleen enlarges due to excess bile salt deposition',c:false,why:'Splenomegaly relates to portal venous pressure changes, not bile salt deposition, which is more associated with pruritus in liver disease.'},
 ],
 rationale:'Portal hypertension from cirrhosis increases pressure in the portal venous system, which backs up into the splenic circulation, causing splenomegaly, a recognized finding of both compensated and decompensated cirrhosis.',
 tip:'NCLEX tip: connect splenomegaly directly to portal hypertension\'s hemodynamic backup, the same mechanism responsible for esophageal varices and ascites.'},

{id:'h55',type:'mc',stem:'Which type of cirrhosis is characterized by scar tissue that characteristically surrounds the portal areas?',
 options:[
  {t:'Alcoholic cirrhosis',c:true,why:''},
  {t:'Post-necrotic cirrhosis',c:false,why:'Post-necrotic cirrhosis is characterized by broad bands of scar tissue, not scarring specifically surrounding the portal areas.'},
  {t:'Biliary cirrhosis',c:false,why:'Biliary cirrhosis involves scarring around the bile ducts specifically, not the portal-area pattern described in this question.'},
  {t:'Hemochromatosis-related cirrhosis',c:false,why:'This type is related to iron overload rather than the portal-area scarring pattern specifically described for alcoholic cirrhosis.'},
 ],
 rationale:'Alcoholic cirrhosis is characterized by scar tissue that characteristically surrounds the portal areas, distinguishing its pattern from post-necrotic (broad bands) or biliary (around bile ducts) cirrhosis.',
 tip:'NCLEX tip: match each cirrhosis type to its scarring pattern — alcoholic (portal areas), post-necrotic (broad bands), biliary (around bile ducts).'},

{id:'h56',type:'mc',stem:'A client with compensated cirrhosis asks what "compensated" means in this context. What is the best explanation?',
 options:[
  {t:'"Your liver is damaged but is still managing to perform its necessary functions relatively well."',c:true,why:''},
  {t:'"Your liver has completely recovered and cirrhosis is no longer present."',c:false,why:'Compensated cirrhosis still involves significant liver damage; it has not resolved, but the liver is managing to maintain function despite the damage.'},
  {t:'"Compensated cirrhosis means you will need dialysis very soon."',c:false,why:'Dialysis relates to kidney function, not liver function, and compensated cirrhosis does not imply an imminent need for dialysis.'},
  {t:'"Compensated cirrhosis is more severe than decompensated cirrhosis."',c:false,why:'This reverses the actual relationship; decompensated cirrhosis represents more advanced, severe disease compared with compensated cirrhosis.'},
 ],
 rationale:'Compensated cirrhosis means the liver, despite significant damage, is still managing to perform its necessary functions relatively well, with milder findings like ankle edema, splenomegaly, and palmar erythema, in contrast to the more severe findings of decompensated cirrhosis.',
 tip:'NCLEX tip: "compensated vs. decompensated" mirrors "earlier vs. later stage" in terms of how much liver function remains intact.'},

{id:'h57',type:'mc',stem:'Which nursing intervention addresses the risk of injury in a client with cirrhosis and impaired clotting?',
 options:[
  {t:'Use a soft-bristle toothbrush and electric razor, and handle the client gently during care',c:true,why:''},
  {t:'Encourage vigorous tooth brushing to maintain oral hygiene',c:false,why:'Vigorous brushing increases bleeding risk in a client with impaired clotting; gentle oral care with a soft-bristle brush is more appropriate.'},
  {t:'Use a standard razor for shaving to save time',c:false,why:'A standard razor increases the risk of cuts and bleeding; an electric razor is safer for a client with impaired clotting.'},
  {t:'Encourage frequent intramuscular injections for medication administration when oral options exist',c:false,why:'Intramuscular injections increase bleeding and bruising risk in a client with impaired clotting; oral or other lower-risk routes should be used when possible.'},
 ],
 rationale:'Reducing risk of injury in a client with cirrhosis and impaired clotting includes using a soft-bristle toothbrush, an electric razor, gentle handling during care, and avoiding unnecessary injections, all aimed at minimizing bleeding and bruising risk.',
 tip:'NCLEX tip: bleeding precaution teaching for cirrhosis mirrors that used for any client with a coagulopathy or thrombocytopenia — soft brush, electric razor, gentle handling.'},

{id:'h58',type:'mc',stem:'A client with cirrhosis has hypoalbuminemia. What is the most direct consequence of this finding related to fluid balance?',
 options:[
  {t:'Decreased serum oncotic pressure, allowing fluid to shift out of the vasculature',c:true,why:''},
  {t:'Increased serum oncotic pressure, pulling fluid into the vasculature',c:false,why:'This is the opposite effect; low albumin decreases, rather than increases, oncotic pressure, which promotes fluid shifting out of the vasculature.'},
  {t:'No effect on fluid balance since albumin only affects clotting',c:false,why:'Albumin plays a significant role in maintaining oncotic pressure and fluid balance, not just clotting, so this statement is inaccurate.'},
  {t:'Increased renal excretion of sodium and water',c:false,why:'Hypoalbuminemia does not directly increase renal sodium and water excretion; in cirrhosis, sodium and water retention is actually increased due to other mechanisms like aldosterone dysregulation.'},
 ],
 rationale:'Hypoalbuminemia decreases serum oncotic pressure, which allows fluid to shift out of the vasculature and into interstitial spaces or the peritoneal cavity, contributing to edema and ascites in cirrhosis.',
 tip:'NCLEX tip: albumin\'s oncotic pressure role is central to understanding both ascites and generalized edema in liver disease.'},

{id:'h59',type:'mc',stem:'Which combination of findings would the nurse expect in a client with ascites related to cirrhosis?',
 options:[
  {t:'Increased abdominal girth, rapid weight gain, and shortness of breath',c:true,why:''},
  {t:'Decreased abdominal girth with rapid weight loss',c:false,why:'Ascites causes increased, not decreased, abdominal girth, along with weight gain rather than weight loss.'},
  {t:'No change in abdominal girth with improved breathing',c:false,why:'Ascites typically causes increased abdominal girth and can worsen breathing due to diaphragmatic compression, not improve it.'},
  {t:'Decreased serum sodium with no other associated findings',c:false,why:'While sodium retention is part of the mechanism, ascites presents with a recognizable cluster of findings (girth increase, weight gain, dyspnea), not an isolated sodium finding alone.'},
 ],
 rationale:'Ascites related to cirrhosis presents with increased abdominal girth, rapid weight gain from fluid accumulation, and shortness of breath from diaphragmatic compression by the enlarged abdomen.',
 tip:'NCLEX tip: "girth up, weight up, breathing harder" is a simple way to remember the classic ascites symptom triad.'},

{id:'h60',type:'mc',stem:'A client with ascites is placed on a 2 g sodium diet. What is the primary purpose of this dietary restriction?',
 options:[
  {t:'To help achieve a negative sodium balance and reduce fluid retention',c:true,why:''},
  {t:'To increase serum albumin levels directly',c:false,why:'Sodium restriction does not directly raise albumin levels; its purpose is to reduce fluid retention by limiting sodium intake.'},
  {t:'To prevent hepatic encephalopathy specifically',c:false,why:'Sodium restriction targets fluid balance and ascites management, not hepatic encephalopathy, which is addressed with different interventions like lactulose and protein management.'},
  {t:'To reduce the client\'s risk of esophageal variceal bleeding',c:false,why:'Sodium restriction is aimed at fluid balance/ascites control, not directly at reducing variceal bleeding risk, which is addressed with beta blockers and endoscopic therapy.'},
 ],
 rationale:'A sodium-restricted diet, commonly around 2 grams per day, helps achieve a negative sodium balance, reducing fluid retention and helping manage ascites in cirrhosis.',
 tip:'NCLEX tip: "2 g sodium diet" is a specific, testable numeric detail to remember for ascites dietary management.'},
{id:'h61',type:'mc',stem:'A client with cirrhosis undergoes a paracentesis for symptomatic ascites. Which teaching point should the nurse include about the procedure?',
 options:[
  {t:'It may involve removal of approximately five to six liters of fluid for severe ascites',c:true,why:''},
  {t:'It permanently cures cirrhosis and eliminates the need for any further management',c:false,why:'Paracentesis relieves symptomatic ascites temporarily but does not cure the underlying cirrhosis or eliminate the need for ongoing management.'},
  {t:'It is performed only in an outpatient setting with no monitoring required afterward',c:false,why:'Close monitoring of vital signs is needed after paracentesis given the risk of hypotension from rapid fluid shifts, regardless of setting.'},
  {t:'It is used exclusively to diagnose hepatic encephalopathy',c:false,why:'Paracentesis is primarily used to relieve symptomatic ascites or obtain fluid for analysis, not specifically to diagnose hepatic encephalopathy.'},
 ],
 rationale:'Large-volume paracentesis for severe ascites may involve removal of approximately five to six liters of fluid, and the client requires close monitoring afterward for hypotension from rapid fluid shifts.',
 tip:'NCLEX tip: "5 to 6 liters" is the specific volume range to remember for large-volume paracentesis in ascites management.'},

{id:'h62',type:'mc',stem:'A client asks how TIPS helps with refractory ascites. What is the best explanation?',
 options:[
  {t:'"TIPS creates a shunt that decreases sodium retention and helps prevent recurrence of fluid accumulation."',c:true,why:''},
  {t:'"TIPS directly removes fluid from the abdominal cavity, similar to paracentesis."',c:false,why:'TIPS works by creating a shunt to reduce portal pressure, not by directly draining abdominal fluid like paracentesis does.'},
  {t:'"TIPS is used only to treat esophageal varices, not ascites."',c:false,why:'While TIPS can help manage variceal bleeding as well, it is also specifically effective for refractory ascites by reducing portal pressure and sodium retention.'},
  {t:'"TIPS eliminates the need for any future liver transplant."',c:false,why:'TIPS can serve as a bridge to transplant, but it does not eliminate the potential future need for a liver transplant.'},
 ],
 rationale:'TIPS (transjugular intrahepatic portosystemic shunt) creates a shunt between the portal circulation and hepatic vein, decreasing sodium retention and helping prevent recurrence of fluid accumulation, making it effective for refractory ascites and a possible bridge to liver transplant.',
 tip:'NCLEX tip: TIPS\'s dual role — managing refractory ascites and serving as a bridge to transplant — is an important pairing of facts to remember.'},

{id:'h63',type:'mc',stem:'Following a TIPS procedure, which complication should the nurse monitor for most closely?',
 options:[
  {t:'Hepatic encephalopathy',c:true,why:''},
  {t:'Improved liver synthetic function immediately',c:false,why:'TIPS does not directly improve the liver\'s synthetic function; it primarily addresses portal pressure and its downstream complications.'},
  {t:'Resolution of all underlying liver disease',c:false,why:'TIPS manages complications of portal hypertension but does not resolve the underlying liver disease itself.'},
  {t:'Complete elimination of bleeding risk with no further monitoring needed',c:false,why:'While TIPS can help manage variceal bleeding risk, ongoing monitoring is still needed, and this option overstates the elimination of risk.'},
 ],
 rationale:'Because TIPS shunts portal blood directly into the hepatic vein, bypassing the liver\'s detoxification process, hepatic encephalopathy is a key complication the nurse must monitor for after the procedure.',
 tip:'NCLEX tip: any question involving TIPS should trigger the same "watch for encephalopathy" response, since shunting bypasses liver detoxification.'},

{id:'h64',type:'mc',stem:'A client with esophageal varices asks why beta blockers are prescribed even though they do not shrink the varices themselves. What is the best explanation?',
 options:[
  {t:'"Beta blockers reduce portal pressure, which helps prevent the first bleeding episode."',c:true,why:''},
  {t:'"Beta blockers directly seal off the varices to prevent any future bleeding."',c:false,why:'Beta blockers work by lowering portal pressure rather than directly sealing or shrinking the varices themselves.'},
  {t:'"Beta blockers are given only to treat unrelated high blood pressure in this population."',c:false,why:'While beta blockers do lower blood pressure generally, in this context they are specifically used to reduce portal pressure and variceal bleeding risk.'},
  {t:'"Beta blockers replace the need for endoscopic monitoring of varices."',c:false,why:'Beta blockers do not replace the need for endoscopic monitoring; both play complementary roles in managing variceal bleeding risk.'},
 ],
 rationale:'Nonselective beta blockers reduce portal venous pressure, which helps prevent the first bleeding episode from esophageal varices, even though they do not directly shrink existing varices or replace the need for endoscopic monitoring.',
 tip:'NCLEX tip: beta blockers in this context are about pressure reduction and prevention, not direct treatment of the varices themselves.'},

{id:'h65',type:'mc',stem:'What is the approximate first-hemorrhage mortality rate associated with esophageal variceal bleeding, according to the course material?',
 options:[
  {t:'10% to 30%',c:true,why:''},
  {t:'1% to 2%',c:false,why:'This significantly understates the mortality risk associated with a first variceal hemorrhage.'},
  {t:'50% to 60%',c:false,why:'This overstates the specific first-hemorrhage mortality range described in the course material.'},
  {t:'Nearly 100%',c:false,why:'This overstates the mortality rate; while serious, the first hemorrhage mortality rate is cited as 10-30%, not close to 100%.'},
 ],
 rationale:'The first hemorrhage from esophageal varices carries a mortality rate of 10-30%, making it one of the leading causes of death in clients with cirrhosis.',
 tip:'NCLEX tip: "10 to 30% first-bleed mortality" is a specific statistic worth memorizing for esophageal variceal hemorrhage questions.'},

{id:'h66',type:'mc',stem:'A client with cirrhosis has esophageal varices identified on endoscopy but has not yet bled. What is the most accurate statement about this finding?',
 options:[
  {t:'Varices are often asymptomatic until they bleed',c:true,why:''},
  {t:'Varices always cause noticeable symptoms even before any bleeding occurs',c:false,why:'This is inaccurate; varices are typically asymptomatic until a bleeding episode occurs.'},
  {t:'Varices found without bleeding require no monitoring or management',c:false,why:'Even asymptomatic varices require monitoring and preventive management, such as beta blockers, given their bleeding risk.'},
  {t:'Varices without bleeding indicate the client no longer has portal hypertension',c:false,why:'The presence of varices, even without bleeding, still reflects underlying portal hypertension that requires ongoing management.'},
 ],
 rationale:'Esophageal varices are often asymptomatic unless bleeding occurs, which is why beta blockers and monitoring are important even before a first bleeding episode happens, given the significant mortality risk associated with variceal hemorrhage.',
 tip:'NCLEX tip: don\'t assume "no symptoms" means "no risk" — varices can be silent until a potentially life-threatening bleed occurs.'},

{id:'h67',type:'mc',stem:'A client with active variceal bleeding is being treated with a Sengstaken-Blakemore tube. What should the nurse understand about this intervention?',
 options:[
  {t:'It is a balloon tamponade device used in some cases of refractory variceal bleeding',c:true,why:''},
  {t:'It is a first-line, routine treatment used for all clients with esophageal varices',c:false,why:'This device is reserved for some cases of refractory bleeding, not used routinely as a first-line treatment for all clients with varices.'},
  {t:'It permanently seals the varices to prevent any future bleeding episodes',c:false,why:'This device is a temporary measure to control acute bleeding, not a permanent solution preventing future variceal bleeding.'},
  {t:'It is used to treat hepatic encephalopathy rather than variceal bleeding',c:false,why:'This device specifically addresses active variceal bleeding through balloon tamponade, not hepatic encephalopathy.'},
 ],
 rationale:'A Sengstaken-Blakemore tube uses balloon tamponade and is used in some cases of refractory variceal bleeding, providing temporary control while other treatments (vasoactive drugs, endoscopy) are pursued.',
 tip:'NCLEX tip: Sengstaken-Blakemore tube is a "backup" measure for refractory variceal bleeding, not a routine or permanent treatment.'},

{id:'h68',type:'mc',stem:'Which of the following best reflects the percentage of clients with decompensated cirrhosis who have esophageal varices, according to the course material?',
 options:[
  {t:'About 60%',c:true,why:''},
  {t:'About 5%',c:false,why:'This significantly understates the prevalence described for decompensated cirrhosis.'},
  {t:'About 30%',c:false,why:'This figure corresponds to the prevalence in compensated, not decompensated, cirrhosis.'},
  {t:'Nearly 100%',c:false,why:'This overstates the described prevalence; the course material cites about 60% for decompensated cirrhosis, not close to 100%.'},
 ],
 rationale:'Esophageal varices are present in about 60% of clients with decompensated cirrhosis, compared with about 30% of those with compensated cirrhosis, reflecting the progression of portal hypertension with worsening liver disease.',
 tip:'NCLEX tip: remember both variceal prevalence figures — 30% in compensated cirrhosis, 60% in decompensated — as a pair showing disease progression.'},

{id:'h69',type:'mc',stem:'A client with cirrhosis and ascites asks why the nurse is measuring abdominal girth daily. What is the best explanation?',
 options:[
  {t:'"Daily abdominal girth measurement helps track changes in your fluid accumulation over time."',c:true,why:''},
  {t:'"Abdominal girth measurement replaces the need for daily weights."',c:false,why:'Abdominal girth measurement complements, rather than replaces, daily weights as part of monitoring fluid status.'},
  {t:'"This measurement is done only once, at the time of diagnosis."',c:false,why:'Abdominal girth is measured regularly, often daily, to track ongoing changes in ascites, not just once at diagnosis.'},
  {t:'"This measurement has no relationship to your fluid status."',c:false,why:'Abdominal girth measurement is specifically used to monitor ascites and fluid status changes over time.'},
 ],
 rationale:'Daily abdominal girth measurement, along with daily weights, helps the nurse track changes in ascites and overall fluid status in a client with cirrhosis, supporting timely intervention if fluid accumulation worsens.',
 tip:'NCLEX tip: pair daily weights with daily abdominal girth measurement as the two key trend-tracking tools for ascites monitoring.'},

{id:'h70',type:'sata',stem:'The nurse is caring for a client with cirrhosis and monitoring for potential complications. Which complications should the nurse watch for? Select all that apply.',
 options:[
  {t:'Bleeding and hemorrhage',c:true,why:''},
  {t:'Hepatic encephalopathy',c:true,why:''},
  {t:'Fluid volume excess',c:true,why:''},
  {t:'Hypertension as the primary long-term concern, with no risk of hypotension',c:false,why:'While hypertension can occur, cirrhosis is more specifically associated with monitoring for bleeding, encephalopathy, and fluid volume excess as its major recognized complications, not hypertension as the primary concern.'},
  {t:'Hyperthyroidism as a direct complication of cirrhosis',c:false,why:'Hyperthyroidism is not a recognized direct complication of cirrhosis in this course material; the key complications are bleeding, encephalopathy, and fluid volume excess.'},
 ],
 rationale:'Key complications the nurse monitors for in cirrhosis include bleeding/hemorrhage, hepatic encephalopathy, and fluid volume excess, reflecting the major systemic effects of advanced liver disease.',
 tip:'NCLEX tip: memorize this trio of cirrhosis complications together — bleeding, encephalopathy, and fluid volume excess — as the core nursing monitoring priorities.'},

{id:'h71',type:'mc',stem:'A client with hepatic encephalopathy has an ammonia level that continues to rise despite lactulose therapy. Which additional medication might the nurse expect to be added?',
 options:[
  {t:'Rifaximin',c:true,why:''},
  {t:'Furosemide',c:false,why:'Furosemide is a diuretic used for fluid management, not specifically for lowering ammonia levels in hepatic encephalopathy.'},
  {t:'Phenazopyridine',c:false,why:'Phenazopyridine is a urinary analgesic unrelated to hepatic encephalopathy management.'},
  {t:'Sucralfate',c:false,why:'Sucralfate is a mucosal protectant used in peptic ulcer disease, not a treatment for hepatic encephalopathy.'},
 ],
 rationale:'Rifaximin is an oral antibiotic used in hepatic encephalopathy management, often added alongside lactulose, to reduce ammonia-producing bacteria in the gut when lactulose alone is insufficient.',
 tip:'NCLEX tip: lactulose and rifaximin are the two core medications to remember together for hepatic encephalopathy management.'},

{id:'h72',type:'mc',stem:'A client with hepatic encephalopathy is noted to have impaired writing and difficulty drawing simple line figures, with a normal EEG. According to the four-stage clinical/EEG table, which stage is most consistent with this presentation?',
 options:[
  {t:'Stage 1',c:true,why:''},
  {t:'Stage 2',c:false,why:'Stage 2 includes more pronounced findings such as asterixis and fetor hepaticus with an abnormal EEG showing generalized slowing, which is more advanced than described here.'},
  {t:'Stage 3',c:false,why:'Stage 3 involves stuporous, difficult-to-rouse presentation with a markedly abnormal EEG, which is far more advanced than the mild findings described.'},
  {t:'Stage 4',c:false,why:'Stage 4 represents coma with an absence of DTRs, which does not match the relatively mild findings in this client.'},
 ],
 rationale:'Stage 1 hepatic encephalopathy presents with normal level of consciousness, periods of lethargy/euphoria, reversal of day-night sleep patterns, impaired writing and difficulty drawing line figures, and a normal EEG.',
 tip:'NCLEX tip: impaired writing/drawing with a normal EEG is a distinguishing early clue for Stage 1 hepatic encephalopathy.'},

{id:'h73',type:'mc',stem:'A client with hepatic encephalopathy is in Stage 3 according to the four-stage clinical/EEG table. Which finding would the nurse expect?',
 options:[
  {t:'Stuporous, difficult to rouse, with markedly abnormal EEG and increased deep tendon reflexes',c:true,why:''},
  {t:'Comatose with absence of asterixis and flaccidity of extremities',c:false,why:'This describes Stage 4, not Stage 3, which is characterized by a stuporous but rousable state rather than coma.'},
  {t:'Normal level of consciousness with only mild lethargy and a normal EEG',c:false,why:'This describes Stage 1, a much milder presentation than Stage 3.'},
  {t:'Increased drowsiness with mood swings and an abnormal EEG showing generalized slowing',c:false,why:'This describes Stage 2, which is less severe than the stuporous, markedly abnormal EEG findings of Stage 3.'},
 ],
 rationale:'Stage 3 hepatic encephalopathy presents with a stuporous state that is difficult to rouse, marked confusion, incoherent speech, asterixis, increased deep tendon reflexes, rigidity of extremities, and a markedly abnormal EEG.',
 tip:'NCLEX tip: Stage 3 is distinguished from Stage 4 by the client still being rousable and having increased (not absent) deep tendon reflexes.'},

{id:'h74',type:'mc',stem:'A client with hepatic encephalopathy is assessed to have absence of deep tendon reflexes and flaccidity of extremities, with no response to painful stimuli. According to the four-stage clinical/EEG table, which stage is this?',
 options:[
  {t:'Stage 4',c:true,why:''},
  {t:'Stage 1',c:false,why:'Stage 1 involves much milder findings such as impaired writing and a normal EEG, not coma with absent reflexes.'},
  {t:'Stage 2',c:false,why:'Stage 2 involves increased drowsiness and mood changes with an abnormal EEG showing generalized slowing, not coma with absent reflexes.'},
  {t:'Stage 3',c:false,why:'Stage 3 involves a stuporous but still rousable state with increased, not absent, deep tendon reflexes.'},
 ],
 rationale:'Stage 4 hepatic encephalopathy is characterized by coma, no response to painful stimuli, absence of asterixis, absence of deep tendon reflexes, flaccidity of extremities, and a markedly abnormal EEG.',
 tip:'NCLEX tip: Stage 4 is the "everything absent" stage — absent reflexes, absent asterixis, no response to stimuli, distinguishing it clearly from Stage 3.'},

{id:'h75',type:'mc',stem:'A client with hepatic encephalopathy asks why protein intake is being restricted. What is the best explanation?',
 options:[
  {t:'"Protein breakdown produces ammonia, which your liver currently has difficulty clearing."',c:true,why:''},
  {t:'"Protein restriction is done to help you lose weight quickly."',c:false,why:'The purpose of protein restriction in hepatic encephalopathy is to reduce ammonia production, not for weight loss purposes.'},
  {t:'"Protein restriction directly treats the underlying liver disease."',c:false,why:'Protein restriction helps manage ammonia levels and encephalopathy symptoms, but it does not directly treat the underlying liver disease itself.'},
  {t:'"Protein restriction is permanent and unrelated to your current encephalopathy symptoms."',c:false,why:'Protein restriction is specifically tied to managing current encephalopathy symptoms and may be adjusted as the client\'s condition changes.'},
 ],
 rationale:'Protein breakdown produces ammonia, which a liver affected by significant hepatic dysfunction has difficulty clearing; protein restriction helps reduce this ammonia load and manage hepatic encephalopathy symptoms.',
 tip:'NCLEX tip: connect protein restriction directly to ammonia production, the root cause targeted by both diet changes and lactulose therapy in hepatic encephalopathy.'},

{id:'h76',type:'mc',stem:'A client with hepatic encephalopathy is prescribed lactulose but continues to have minimal bowel movements after the first dose. What should the nurse anticipate?',
 options:[
  {t:'The dose may need to be titrated to achieve the therapeutic goal of three to five soft stools per day',c:true,why:''},
  {t:'Lactulose should be immediately discontinued after one ineffective dose',c:false,why:'Lactulose is typically titrated to effect rather than discontinued after a single dose that has not yet achieved the therapeutic goal.'},
  {t:'No further action is needed since lactulose does not need to produce any bowel movements',c:false,why:'The therapeutic goal of lactulose specifically involves producing several soft bowel movements per day to help clear ammonia, so this statement is inaccurate.'},
  {t:'The nurse should switch immediately to rifaximin instead of continuing lactulose',c:false,why:'Rifaximin may be added alongside lactulose if needed, but the priority action here is titrating the lactulose dose to reach its therapeutic goal, not stopping lactulose immediately.'},
 ],
 rationale:'Lactulose dosing is often titrated to achieve the therapeutic goal of three to five soft or loose bowel movements per day, which helps ensure adequate ammonia clearance through the stool.',
 tip:'NCLEX tip: remember that lactulose is titrated to effect (3-5 soft stools/day), not given at a single fixed dose regardless of response.'},

{id:'h77',type:'mc',stem:'A client with cirrhosis and hepatic encephalopathy is prescribed a sleep aid for insomnia. What should the nurse do?',
 options:[
  {t:'Question the order, since sedatives are generally avoided or used very cautiously in hepatic encephalopathy',c:true,why:''},
  {t:'Administer the medication as prescribed without any additional consideration',c:false,why:'Given the risk of worsening mental status, the nurse should question this order rather than administering it without further consideration.'},
  {t:'Double the prescribed dose to ensure effectiveness',c:false,why:'Doubling the dose would increase the risk of worsening encephalopathy and is not an appropriate independent nursing action.'},
  {t:'Administer the medication only if the client specifically requests it, without further evaluation',c:false,why:'The nurse should proactively question this order given the known risk of sedatives worsening hepatic encephalopathy, not simply defer to the client\'s request.'},
 ],
 rationale:'Sedatives, analgesics, and tranquilizers are generally avoided or used very cautiously in hepatic encephalopathy because they can worsen mental status; the nurse should question a sleep aid order for this client rather than administering it without further consideration.',
 tip:'NCLEX tip: "question the order" is the correct response whenever a sedating medication is prescribed for a client with hepatic encephalopathy risk.'},

{id:'h78',type:'mc',stem:'Which of the following is listed as a trigger for hepatic encephalopathy related to recent medical intervention?',
 options:[
  {t:'Recent surgery',c:true,why:''},
  {t:'Routine annual physical examination with no procedures performed',c:false,why:'A routine physical exam without any procedures is not associated with triggering hepatic encephalopathy.'},
  {t:'Daily prescribed vitamin supplementation',c:false,why:'Routine, appropriately prescribed vitamin supplementation is not a recognized trigger for hepatic encephalopathy.'},
  {t:'Scheduled outpatient physical therapy sessions',c:false,why:'Routine physical therapy is not listed as a trigger for hepatic encephalopathy.'},
 ],
 rationale:'Recent surgery is listed as a recognized trigger for hepatic encephalopathy, along with infections, constipation, dehydration, GI bleeding, certain medications, kidney problems, alcohol binges, and portosystemic shunting.',
 tip:'NCLEX tip: recent surgery as an HE trigger connects to the broader theme that any major physiologic stressor can precipitate encephalopathy in a vulnerable liver.'},

{id:'h79',type:'mc',stem:'A client with hepatic encephalopathy has jumbled, slurred speech that cannot be understood, along with extreme sleepiness and slowed movement. Using the physical symptom categories described in the course material, which severity level is this?',
 options:[
  {t:'Severe',c:true,why:''},
  {t:'Mild',c:false,why:'Mild physical symptoms include things like day/night sleep reversal and difficulty with fine hand movements, not jumbled speech that cannot be understood.'},
  {t:'Moderate',c:false,why:'Moderate physical symptoms include difficulty with basic math and slurred speech, but not to the degree of being completely unintelligible as described here.'},
  {t:'Minimal',c:false,why:'Minimal HE mainly affects coordination relevant to activities like driving, not the severe speech and movement findings described here.'},
 ],
 rationale:'Severe physical symptoms of hepatic encephalopathy include extreme sleepiness, slowed/sluggish movement, asterixis, and jumbled/slurred speech that cannot be understood, reflecting a significant decline in neurologic function.',
 tip:'NCLEX tip: "jumbled speech that cannot be understood" is a specific phrase marking the severe symptom category in hepatic encephalopathy.'},

{id:'h80',type:'mc',stem:'A client asks about Grade 0 (minimal) hepatic encephalopathy on the West Haven scale. What is the best explanation of its clinical significance?',
 options:[
  {t:'"Even at this minimal stage, coordination may be affected enough to impact activities like driving."',c:true,why:''},
  {t:'"Grade 0 means there is no clinical significance at all and no monitoring is needed."',c:false,why:'Even Grade 0 (minimal) HE is described as having clinical significance, particularly related to coordination and activities like driving.'},
  {t:'"Grade 0 is more severe than Grade 1 on this scale."',c:false,why:'Grade 0 (minimal) is actually less severe than Grade 1 (mild) on the West Haven scale, not more severe.'},
  {t:'"Grade 0 means the client is comatose."',c:false,why:'Coma corresponds to Grade 4 on the West Haven scale, not Grade 0, which represents minimal, subtle impairment.'},
 ],
 rationale:'Even Grade 0 (minimal) hepatic encephalopathy on the West Haven scale can affect coordination enough to impact activities like driving and work performance, making it clinically relevant despite being the mildest category.',
 tip:'NCLEX tip: don\'t dismiss Grade 0 (minimal) HE as clinically unimportant — it can still have real safety implications, especially around driving.'},

{id:'h81',type:'mc',stem:'A client with Grade 2 hepatic encephalopathy on the West Haven scale would be expected to have which finding?',
 options:[
  {t:'Forgetfulness, lack of energy, and difficulty with basic math, along with slurred speech',c:true,why:''},
  {t:'Coma with no response to stimuli',c:false,why:'Coma corresponds to Grade 4 on the West Haven scale, a much more severe presentation than Grade 2.'},
  {t:'Only short attention span and mood changes such as depression or irritability',c:false,why:'This describes Grade 1 (mild), a less severe presentation than Grade 2.'},
  {t:'Coordination affected enough to impact driving, with no other symptoms',c:false,why:'This describes Grade 0 (minimal), the mildest category, not the more pronounced findings of Grade 2.'},
 ],
 rationale:'Grade 2 (moderate) hepatic encephalopathy on the West Haven scale includes forgetfulness, lack of energy, inappropriate behavior, slurred speech, trouble with basic mental tasks like math, and shaking of hands with difficulty writing.',
 tip:'NCLEX tip: build a simple mental ladder of West Haven grades from 0 to 4, matching increasing severity of mental and physical symptoms at each step.'},

{id:'h82',type:'mc',stem:'Which statement accurately reflects preoperative nursing care for a client awaiting liver transplant?',
 options:[
  {t:'Providing psychological support and education helps the client and family prepare for the surgery',c:true,why:''},
  {t:'Physical preparation is the only relevant nursing focus before transplant surgery',c:false,why:'Physical preparation is important, but psychosocial support and education are also essential parts of preoperative nursing care for transplant candidates.'},
  {t:'Family involvement should be minimized to reduce the client\'s stress',c:false,why:'Involving family in the process and educating them on their role is actually part of appropriate caregiver support, not something to minimize.'},
  {t:'No specific preoperative teaching is needed since the client will learn everything after surgery',c:false,why:'Preoperative education is an important part of preparing the client and family before the transplant, not something deferred entirely until after surgery.'},
 ],
 rationale:'Preoperative nursing care for liver transplant candidates includes support, education, and encouragement to help the client psychologically prepare for surgery, alongside physical preparation and caregiver involvement.',
 tip:'NCLEX tip: transplant preoperative care combines physical readiness with psychosocial and family-centered support — don\'t focus on only one dimension.'},

{id:'h83',type:'mc',stem:'Which postoperative nursing priority is most important for a client immediately following liver transplant surgery?',
 options:[
  {t:'Close monitoring for infection, vascular complications, and respiratory or liver dysfunction',c:true,why:''},
  {t:'Immediate discharge planning with no need for close monitoring',c:false,why:'Close, constant monitoring is essential immediately after liver transplant surgery, not immediate discharge planning without careful observation.'},
  {t:'Encouraging unrestricted activity right away to promote recovery',c:false,why:'Activity progression should be gradual and carefully monitored after major transplant surgery, not unrestricted immediately.'},
  {t:'Withholding immunosuppressive medication until the client is fully recovered',c:false,why:'Immunosuppressive medication is a critical part of the postoperative regimen from the start, not something withheld until full recovery.'},
 ],
 rationale:'Immediate postoperative nursing care after liver transplant focuses on constant close monitoring for infection, vascular complications, and respiratory or liver dysfunction, given the significant risks in this early recovery period.',
 tip:'NCLEX tip: "constant close monitoring" is the defining postoperative nursing priority phrase for liver transplant recovery.'},

{id:'h84',type:'mc',stem:'A client who received a liver transplant three years ago asks about long-term follow-up needs. What is the best response?',
 options:[
  {t:'"You will need to continue regular follow-up labs and appointments with the transplant team indefinitely."',c:true,why:''},
  {t:'"You no longer need any follow-up once you reach the one-year mark after transplant."',c:false,why:'Long-term follow-up with the transplant team continues well beyond the first year, given the ongoing need for immunosuppression monitoring.'},
  {t:'"Follow-up appointments are optional once you feel completely well."',c:false,why:'Follow-up appointments are not optional; they remain an essential part of long-term post-transplant management regardless of how well the client feels.'},
  {t:'"You only need follow-up if you experience new symptoms."',c:false,why:'Regular follow-up is needed on an ongoing schedule, not only in response to new symptoms, to monitor for rejection, infection, and medication levels.'},
 ],
 rationale:'Liver transplant recipients need ongoing, indefinite follow-up with the transplant team, including regular laboratory monitoring, to catch signs of rejection, infection, or medication-related complications early.',
 tip:'NCLEX tip: post-transplant follow-up is lifelong, not something that ends after a fixed period — this is a key long-term teaching point.'},

{id:'h85',type:'mc',stem:'A client on long-term immunosuppressive therapy after liver transplant asks why regular lab monitoring is so important. What is the best explanation?',
 options:[
  {t:'"Regular labs help detect early signs of rejection or medication-related complications."',c:true,why:''},
  {t:'"Labs are done only to check for unrelated conditions, not transplant-specific issues."',c:false,why:'Labs are specifically important for monitoring transplant-related issues like rejection and medication levels, not just unrelated conditions.'},
  {t:'"Labs are optional once the client feels well."',c:false,why:'Regular lab monitoring remains essential regardless of how the client feels, since rejection or complications can occur without obvious symptoms.'},
  {t:'"Labs are only needed during the first month after transplant."',c:false,why:'Lab monitoring continues long-term, not just during the first month, given the ongoing risks of rejection and medication toxicity.'},
 ],
 rationale:'Regular laboratory monitoring after liver transplant helps detect early signs of rejection or medication-related complications, supporting timely intervention before serious problems develop.',
 tip:'NCLEX tip: connect ongoing lab monitoring directly to early detection of silent, asymptomatic rejection — a key reason it cannot be skipped even when a client feels well.'},

{id:'h86',type:'mc',stem:'A client asks why alcohol must be avoided after a liver transplant, even though the new liver is healthy. What is the best explanation?',
 options:[
  {t:'"Alcohol avoidance helps protect your new liver from damage, regardless of the reason for your original transplant."',c:true,why:''},
  {t:'"Alcohol avoidance is only necessary if the original transplant was due to alcohol-related liver disease."',c:false,why:'Alcohol avoidance is recommended for all liver transplant recipients to protect the new organ, not only those whose original disease was alcohol-related.'},
  {t:'"Alcohol has no effect on a transplanted liver."',c:false,why:'Alcohol can still damage a transplanted liver, so this statement is inaccurate and could lead to harmful behavior if believed.'},
  {t:'"Alcohol avoidance is only needed for the first month after transplant."',c:false,why:'Alcohol avoidance is a long-term recommendation, not limited to just the first month after transplant.'},
 ],
 rationale:'Alcohol avoidance remains an important part of long-term care after liver transplant to protect the new organ from damage, regardless of the reason for the original transplant.',
 tip:'NCLEX tip: alcohol avoidance after transplant applies universally, not just to clients whose original diagnosis was alcohol-related liver disease.'},

{id:'h87',type:'sata',stem:'The nurse is caring for a client three days after liver transplant. Which findings would require prompt notification of the transplant team? Select all that apply.',
 options:[
  {t:'New fever',c:true,why:''},
  {t:'Increasing jaundice',c:true,why:''},
  {t:'Sudden change in mental status',c:true,why:''},
  {t:'Stable vital signs with the client resting comfortably',c:false,why:'Stable vital signs and a comfortable, resting client are reassuring findings and would not require urgent notification.'},
  {t:'Decreasing abdominal drain output that is trending toward the expected postoperative pattern',c:false,why:'A decreasing drain output following the expected postoperative trend is a reassuring finding, not one requiring urgent notification.'},
 ],
 rationale:'New fever, increasing jaundice, and sudden mental status changes after liver transplant may indicate infection, rejection, or graft dysfunction, all requiring prompt notification of the transplant team, unlike stable vital signs or an expected drain output trend.',
 tip:'NCLEX tip: fever, jaundice, and mental status changes together form a "red flag trio" for possible transplant rejection or infection.'},

{id:'h88',type:'sata',stem:'The nurse is teaching a client about self-care after liver transplant. Which statements indicate correct understanding? Select all that apply.',
 options:[
  {t:'"I will take my immunosuppressive medications at the same time every day as prescribed."',c:true,why:''},
  {t:'"I will avoid people who are obviously sick to reduce my infection risk."',c:true,why:''},
  {t:'"I will call the transplant team if I notice new fever or unusual symptoms."',c:true,why:''},
  {t:'"I can skip my immunosuppressive medication occasionally if I forget, since one dose won\'t matter."',c:false,why:'Missing doses of immunosuppressive medication, even occasionally, increases the risk of rejection and should not be treated as inconsequential.'},
  {t:'"I no longer need regular follow-up appointments once I feel back to normal."',c:false,why:'Regular follow-up appointments remain necessary long-term, regardless of how well the client feels.'},
 ],
 rationale:'Correct post-transplant self-care includes strict adherence to immunosuppressive therapy, avoiding infection exposure, promptly reporting new symptoms, and maintaining lifelong follow-up care.',
 tip:'NCLEX tip: "skipping a dose occasionally is fine" and "no more follow-up once I feel better" are both classic wrong-understanding distractors in transplant teaching questions.'},

{id:'h89',type:'mc',stem:'A client asks about the relationship between hepatitis B vaccination and prevention strategy. What is the best response?',
 options:[
  {t:'"The vaccine is recommended for high-risk individuals and is part of routine infant vaccination."',c:true,why:''},
  {t:'"The vaccine is only recommended for adults over age 65."',c:false,why:'Hepatitis B vaccination is recommended for high-risk individuals of various ages and is part of routine infant vaccination, not limited to older adults.'},
  {t:'"There is no vaccine available for hepatitis B."',c:false,why:'A vaccine is available for hepatitis B and is part of both routine infant immunization and high-risk adult vaccination recommendations.'},
  {t:'"The vaccine treats active hepatitis B infection."',c:false,why:'The hepatitis B vaccine is a preventive measure, not a treatment for an already active infection.'},
 ],
 rationale:'Hepatitis B prevention includes vaccination for persons at high risk and routine vaccination of infants, along with passive immunization for those exposed, standard precautions, and screening of blood products.',
 tip:'NCLEX tip: hepatitis B prevention combines active vaccination (high-risk groups, infants) with passive immunization (post-exposure) — know both strategies.'},

{id:'h90',type:'mc',stem:'A healthcare worker sustains a needlestick injury from a client with known hepatitis B. What immediate action should be anticipated?',
 options:[
  {t:'Passive immunization to provide immediate protection while an active immune response develops',c:true,why:''},
  {t:'No action is needed since hepatitis B cannot be transmitted through needlestick injury',c:false,why:'Hepatitis B can be transmitted through blood exposure such as a needlestick injury, making this statement inaccurate and unsafe.'},
  {t:'Immediate administration of lactulose to prevent liver damage',c:false,why:'Lactulose is used for hepatic encephalopathy management, not for post-exposure prophylaxis after a needlestick injury involving hepatitis B.'},
  {t:'Waiting six months before any evaluation or intervention is needed',c:false,why:'Prompt evaluation and intervention, including passive immunization, are needed immediately after a significant exposure, not delayed for six months.'},
 ],
 rationale:'Passive immunization provides immediate protection after a significant hepatitis B exposure, such as a needlestick injury, while the body\'s own active immune response develops, making prompt post-exposure management essential.',
 tip:'NCLEX tip: needlestick injury with hepatitis B exposure should immediately trigger consideration of passive immunization as part of post-exposure protocol.'},

{id:'h91',type:'mc',stem:'A client asks which type of jaundice occurs when red blood cell breakdown overwhelms the liver\'s ability to process bilirubin. What is the correct classification?',
 options:[
  {t:'Pre-hepatic jaundice',c:true,why:''},
  {t:'Hepatic jaundice',c:false,why:'Hepatic jaundice reflects the liver\'s own impaired ability to process bilirubin, not an overload from excessive RBC breakdown occurring before the liver is involved.'},
  {t:'Post-hepatic jaundice',c:false,why:'Post-hepatic (obstructive) jaundice results from blocked bile flow after bilirubin has already been processed by the liver, not from excess RBC breakdown.'},
  {t:'Congenital jaundice',c:false,why:'This is not one of the three classification categories (pre-hepatic, hepatic, post-hepatic) described in the course material.'},
 ],
 rationale:'Pre-hepatic jaundice occurs when excessive breakdown of red blood cells, such as in hemolytic anemia, overwhelms the liver\'s ability to process the resulting bilirubin.',
 tip:'NCLEX tip: match each jaundice type to its mechanism — pre-hepatic (excess RBC breakdown), hepatic (impaired liver processing), post-hepatic (blocked bile flow).'},

{id:'h92',type:'mc',stem:'A client with liver disease develops hepatic jaundice. Which underlying conditions are associated with this classification?',
 options:[
  {t:'Hepatitis, cirrhosis, and drug-induced liver injury',c:true,why:''},
  {t:'Hemolytic anemia only',c:false,why:'Hemolytic anemia is associated with pre-hepatic jaundice, not the hepatic classification, which relates to impaired liver processing.'},
  {t:'Gallstones and bile duct tumors only',c:false,why:'These conditions are associated with post-hepatic (obstructive) jaundice, not the hepatic classification.'},
  {t:'Kidney disease exclusively',c:false,why:'Kidney disease is not one of the conditions associated with hepatic jaundice; the liver\'s own impaired bilirubin processing is the defining feature.'},
 ],
 rationale:'Hepatic jaundice occurs due to the liver\'s impaired ability to process bilirubin and is associated with conditions such as hepatitis, cirrhosis, and drug-induced liver injury.',
 tip:'NCLEX tip: hepatic jaundice causes (hepatitis, cirrhosis, drug-induced injury) all reflect direct liver cell dysfunction, distinguishing this category from pre- or post-hepatic causes.'},

{id:'h93',type:'mc',stem:'A client with obstructive (post-hepatic) jaundice reports pale, clay-colored stools. What is the underlying reason for this finding?',
 options:[
  {t:'Lack of bilirubin reaching the GI tract due to blocked bile flow',c:true,why:''},
  {t:'Excess bilirubin being deposited directly into the stool',c:false,why:'The opposite is true; obstructive jaundice results in less, not more, bilirubin reaching the GI tract, which is why the stool becomes pale.'},
  {t:'Increased red blood cell breakdown overwhelming the liver',c:false,why:'This describes the mechanism of pre-hepatic jaundice, not the pale stool finding specific to bile flow obstruction.'},
  {t:'A dietary deficiency unrelated to bile flow',c:false,why:'This finding is specifically related to blocked bile flow, not a dietary deficiency.'},
 ],
 rationale:'In obstructive (post-hepatic) jaundice, blocked bile flow prevents bilirubin from reaching the GI tract, resulting in pale or clay-colored stools due to the lack of bilirubin that normally gives stool its brown color.',
 tip:'NCLEX tip: pale/clay-colored stool is specifically tied to obstructive/post-hepatic jaundice — pair it with dark urine as the classic finding combination.'},

{id:'h94',type:'mc',stem:'Which finding is associated with jaundice depending on the underlying cause, in addition to the typical yellowing of skin and eyes?',
 options:[
  {t:'Hepatomegaly and splenomegaly',c:true,why:''},
  {t:'Improved cognitive function',c:false,why:'Jaundice is more commonly associated with cognitive changes as a possible finding, not improved cognitive function.'},
  {t:'Decreased fatigue and increased energy',c:false,why:'Fatigue and weakness are more typically associated findings with jaundice, not decreased fatigue or increased energy.'},
  {t:'Improved bleeding tendency with no risk of bruising',c:false,why:'Jaundice-related liver dysfunction is more often associated with an increased, not decreased, bleeding tendency.'},
 ],
 rationale:'Depending on the underlying cause, jaundice can be accompanied by hepatomegaly, splenomegaly, abdominal pain, fatigue and weakness, cognitive changes, and bleeding, reflecting the broader systemic effects of the causative liver or hematologic condition.',
 tip:'NCLEX tip: don\'t think of jaundice as just "yellow skin" — remember its broader associated findings depending on the underlying cause.'},

{id:'h95',type:'mc',stem:'A client asks whether pruritus in liver disease is dangerous. What is the best nursing response?',
 options:[
  {t:'"Pruritus itself isn\'t dangerous, but it can be very uncomfortable and increase the risk of skin breakdown from scratching."',c:true,why:''},
  {t:'"Pruritus is always a sign of a life-threatening complication."',c:false,why:'While pruritus reflects underlying liver dysfunction and bile salt effects, it is not itself described as a directly life-threatening finding.'},
  {t:'"Pruritus has no relationship to liver disease and is a coincidental finding."',c:false,why:'Pruritus is a recognized, related symptom of jaundice and liver disease, not an unrelated coincidental finding.'},
  {t:'"Pruritus only occurs in clients who have already had a liver transplant."',c:false,why:'Pruritus is a symptom that can occur in various stages and types of liver disease, not something limited to post-transplant clients.'},
 ],
 rationale:'Pruritus in liver disease is uncomfortable and can lead to skin breakdown from scratching, though it is not itself immediately life-threatening; supportive skin care and addressing the underlying cause help manage this symptom.',
 tip:'NCLEX tip: pruritus is a comfort and skin-integrity concern in liver disease, not a direct marker of acute life-threatening decompensation by itself.'},

{id:'h96',type:'mc',stem:'A client asks about the connection between cholestasis (impaired bile flow) and pruritus. What is the best explanation?',
 options:[
  {t:'"Bile salts that build up in the skin when bile flow is impaired are thought to contribute to the itching."',c:true,why:''},
  {t:'"Pruritus in this context is caused by excess red blood cell production."',c:false,why:'This is not the mechanism described for pruritus related to impaired bile flow; bile salt buildup in the skin is the relevant factor.'},
  {t:'"Pruritus is caused by low blood pressure related to liver disease."',c:false,why:'Blood pressure changes are not the described mechanism for pruritus in cholestatic liver disease; bile salt accumulation is the relevant factor.'},
  {t:'"Pruritus in cholestasis is unrelated to bile flow and has no known cause."',c:false,why:'Bile salt buildup in the skin is specifically identified as a contributing factor to pruritus in cholestatic conditions.'},
 ],
 rationale:'When bile flow is impaired (cholestasis), bile salts can accumulate in the skin, which is thought to contribute to the pruritus commonly experienced in liver disease.',
 tip:'NCLEX tip: bile salt accumulation in the skin is the specific mechanism to connect cholestasis with pruritus in liver disease questions.'},

{id:'h97',type:'mc',stem:'A client with cirrhosis asks why spider angiomas and palmar erythema develop. What is the most likely underlying explanation discussed in liver disease pathophysiology?',
 options:[
  {t:'Altered hormone metabolism by the diseased liver contributes to these vascular skin changes',c:true,why:''},
  {t:'These findings are caused directly by low blood glucose levels',c:false,why:'Blood glucose is not the mechanism linked to spider angiomas or palmar erythema; altered hormone metabolism by the liver is the more relevant factor.'},
  {t:'These findings indicate the client\'s liver disease has fully resolved',c:false,why:'Spider angiomas and palmar erythema are findings associated with ongoing liver dysfunction, not resolution of the disease.'},
  {t:'These findings are unrelated to liver function and reflect only aging skin changes',c:false,why:'These specific vascular skin findings are associated with liver disease and altered hormone metabolism, not simply normal aging changes.'},
 ],
 rationale:'The liver\'s role in hormone regulation is impaired in cirrhosis, contributing to vascular skin changes such as spider angiomas and palmar erythema, both recognized findings of compensated cirrhosis.',
 tip:'NCLEX tip: connect spider angiomas and palmar erythema to the liver\'s hormone regulation function being impaired in cirrhosis.'},

{id:'h98',type:'mc',stem:'Which combination of findings would the nurse expect to differentiate compensated from decompensated cirrhosis in a client assessment?',
 options:[
  {t:'Compensated cirrhosis shows milder findings like splenomegaly and palmar erythema; decompensated shows more severe findings like ascites and jaundice',c:true,why:''},
  {t:'Both compensated and decompensated cirrhosis present with identical findings in every case',c:false,why:'Compensated and decompensated cirrhosis are distinguished by differing severity of findings, not identical presentations.'},
  {t:'Decompensated cirrhosis always presents with milder findings than compensated cirrhosis',c:false,why:'This reverses the actual relationship; decompensated cirrhosis reflects more advanced, severe disease compared with compensated cirrhosis.'},
  {t:'Compensated cirrhosis always requires immediate liver transplant',c:false,why:'Compensated cirrhosis reflects earlier, milder disease and does not automatically require immediate transplant, unlike more severe decompensated presentations.'},
 ],
 rationale:'Compensated cirrhosis presents with milder findings such as splenomegaly, palmar erythema, and intermittent mild fever, while decompensated cirrhosis presents with more severe findings such as ascites, jaundice, muscle wasting, and continuous fever.',
 tip:'NCLEX tip: build a simple two-column comparison of compensated versus decompensated cirrhosis findings to quickly answer differentiation questions.'},

{id:'h99',type:'fill',stem:'The term for the musty, sweet breath odor associated with hepatic encephalopathy is fetor _____.',
 answers:['hepaticus'],
 rationale:'Fetor hepaticus is the musty, sweet breath odor associated with hepatic encephalopathy, resulting from the accumulation of toxic metabolites the liver can no longer adequately clear.',
 tip:'NCLEX tip: fetor hepaticus and asterixis are the two classic physical exam findings most often paired together in hepatic encephalopathy questions.'},

{id:'h100',type:'bowtie',stem:'A client with cirrhosis develops sudden hematemesis, tachycardia, and hypotension. Complete the bowtie: select the most likely cause, two priority nursing actions, and two parameters to monitor.',
 sections:[
  {label:'Likely cause (select 1)', correctCount:1, options:[
    {t:'Bleeding esophageal varices',c:true},
    {t:'Uncomplicated ascites',c:false},
    {t:'Stable compensated cirrhosis with no active complication',c:false},
    {t:'Chronic pruritus from cholestasis',c:false},
  ]},
  {label:'Priority actions (select 2)', correctCount:2, options:[
    {t:'Establish IV access and prepare for fluid resuscitation',c:true},
    {t:'Prepare for possible emergency endoscopy and administration of vasoactive drugs',c:true},
    {t:'Encourage oral intake of a full liquid diet immediately',c:false},
    {t:'Delay all intervention until the client is fully asymptomatic',c:false},
    {t:'Apply firm abdominal massage to help stop the bleeding',c:false},
  ]},
  {label:'Parameters to monitor (select 2)', correctCount:2, options:[
    {t:'Vital signs and level of consciousness',c:true},
    {t:'Hemoglobin and hematocrit trends',c:true},
    {t:'Visual acuity',c:false},
    {t:'Range of motion in the extremities',c:false},
  ]},
 ],
 rationale:'Sudden hematemesis with tachycardia and hypotension in a client with cirrhosis strongly suggests bleeding esophageal varices, a medical emergency. Priority actions include IV access/fluid resuscitation and preparing for vasoactive drugs and emergency endoscopy, with close monitoring of vital signs, mental status, and H&H trends.',
 tip:'NCLEX tip: hematemesis plus hemodynamic instability in a cirrhosis client should immediately raise suspicion for variceal hemorrhage, one of the highest-priority emergencies in this content area.'}
]};
const MODULES = [MOD8, MOD9, MOD10];

(function normalizeAnswerDistribution(){
  let mcCounter = 0;
  MODULES.forEach(mod=>{
    mod.questions.forEach(q=>{
      if(q.type==='mc'){
        const n = q.options.length;
        const targetIdx = mcCounter % n;
        mcCounter++;
        const correctIdx = q.options.findIndex(o=>o.c);
        if(correctIdx===targetIdx) return;
        const shift = (correctIdx - targetIdx + n) % n;
        const rotated = q.options.slice(shift).concat(q.options.slice(0, shift));
        q.options = rotated;
      }
    });
  });
})();
