inked to eating disorders differ somewhat by gender: sexual abuse and physical neglect in men, versus sexual abuse and emotional abuse in women, highlighting how trauma history should be assessed as part of a comprehensive eating disorder risk evaluation.", "tip": "NCLEX tip: Note the gender-specific trauma linkage pattern: men (sexual abuse + physical neglect) vs. women (sexual abuse + emotional abuse) — a subtle but testable distinction.", "id": "m9_92", "module": 9}, {"type": "mc", "stem": "A nurse caring for a hospitalized adolescent with anorexia nervosa overhears a staff member say, 'She just needs to eat a sandwich and get over it — this isn't a real illness like schizophrenia.' What is the nurse's most appropriate next action?", "options": [{"t": "Privately address the insensitivity and inaccuracy of the comment with the staff member", "c": true, "w": ""}, {"t": "Ignore the comment since it was not said directly to the client and caused no harm", "c": false, "w": "Even comments not made directly to the client reflect a harmful bias that can affect the quality of care and unit culture; the nurse should address this rather than ignoring it."}, {"t": "Report the comment to the client immediately so she can defend herself", "c": false, "w": "Involving the client directly in this staff conflict is not appropriate or therapeutic; addressing the issue privately and professionally with the staff member is the recommended approach."}, {"t": "Publicly reprimand the staff member in front of other clients and colleagues", "c": false, "w": "A private conversation is more appropriate and professional than a public reprimand, which could embarrass the staff member unnecessarily and is not the best approach to correcting the bias."}], "rationale": "Eating disorders are among the most lethal psychiatric diseases, and nurses must actively counter the harmful bias that minimizes them as a simple lifestyle choice; the most appropriate response is to privately and professionally address the insensitive, inaccurate comment with the staff member.", "tip": "NCLEX tip: NCLEX questions about addressing insensitive staff comments typically favor a private, professional, direct conversation over ignoring, public confrontation, or involving the client.", "id": "m9_93", "module": 9}, {"type": "mc", "stem": "A nurse is teaching a support group about the difference between healthy online eating-disorder recovery communities and harmful ones. Which statement reflects accurate health teaching?", "options": [{"t": "Pro-ana and pro-mia websites perpetuate myths about eating disorders, while resources like NEDA can support healthy recovery, especially when combined with a treatment provider", "c": true, "w": ""}, {"t": "All online eating disorder communities, regardless of content, are equally therapeutic and should be equally encouraged", "c": false, "w": "Pro-ana/pro-mia sites specifically perpetuate myths and are not equivalent in therapeutic value to evidence-informed resources like NEDA; distinguishing between healthy and harmful online communities is an important teaching point."}, {"t": "Online resources should never be recommended to clients recovering from an eating disorder under any circumstances", "c": false, "w": "Appropriately selected online resources (such as NEDA) can support healthy recovery, especially when combined with a treatment provider, so a blanket avoidance of all online resources is not accurate teaching."}, {"t": "Pro-ana and pro-mia communities provide medically accurate nutritional guidance for safe weight loss", "c": false, "w": "Pro-ana/pro-mia sites are specifically described as perpetuating myths, not providing medically accurate guidance, despite sometimes offering a sense of community or belonging to members."}], "rationale": "While pro-ana/pro-mia ('e-Ana,' 'e-Mia') sites perpetuate myths about eating disorders, resources like NEDA and similar apps/sites can support healthy recovery (self-monitoring without calorie counting, logging thoughts/feelings, coping strategies), and are most effective when combined with a treatment provider.", "tip": "NCLEX tip: Distinguish pro-ana/pro-mia sites (harmful, myth-perpetuating) from NEDA and similar evidence-informed recovery resources (helpful, especially alongside professional treatment).", "id": "m9_94", "module": 9}, {"type": "mc", "stem": "A nurse caring for a client with chronic, treatment-resistant anorexia nervosa discusses a harm-reduction approach with the treatment team. Which goal best reflects this approach?", "options": [{"t": "Improving quality of life and minimizing harm through symptom management and skill development, even without full symptom remission", "c": true, "w": ""}, {"t": "Requiring complete abstinence from all disordered eating behaviors before any care can be provided", "c": false, "w": "A harm-reduction approach specifically does not require complete abstinence/full remission as a precondition for care; it focuses on improving quality of life and minimizing harm even when full remission is not achieved."}, {"t": "Withholding any medical monitoring until the client agrees to full nutritional rehabilitation", "c": false, "w": "Harm reduction specifically continues to provide medical monitoring and support even when the client is not pursuing full nutritional rehabilitation, rather than withholding care until abstinence is achieved."}, {"t": "Focusing solely on weight restoration with no attention to quality of life or coping skills", "c": false, "w": "The harm-reduction approach specifically emphasizes quality of life and symptom management/coping skill development, not an exclusive focus on weight restoration numbers alone."}], "rationale": "For clients with chronic, treatment-resistant anorexia nervosa, a harm-reduction approach focuses on improving quality of life and minimizing harm through symptom management and skill development, rather than requiring full abstinence or complete symptom remission as a precondition for support.", "tip": "NCLEX tip: Harm reduction in chronic AN parallels harm reduction in substance use disorders — both prioritize quality of life and reduced harm over an all-or-nothing abstinence requirement.", "id": "m9_95", "module": 9}, {"type": "sata", "stem": "Select all statements that accurately describe prevalence and demographic patterns of eating disorders according to the source material.", "options": [{"t": "Middle-aged women are the fastest-growing group being diagnosed with eating disorders", "c": true, "w": ""}, {"t": "At least 5%-10% of individuals with anorexia nervosa or bulimia nervosa are male", "c": true, "w": ""}, {"t": "Binge-eating disorder has a higher lifetime prevalence than either anorexia nervosa or bulimia nervosa", "c": true, "w": ""}, {"t": "Eating disorders are exclusively a concern for adolescent females and do not affect any other population", "c": false, "w": "Eating disorders affect multiple populations beyond adolescent females, including males (5%-10% of AN/BN cases), middle-aged women (fastest-growing diagnosed group), and older adults, making this an inaccurate blanket statement."}, {"t": "Anorexia nervosa has a higher lifetime prevalence than bulimia nervosa", "c": false, "w": "Bulimia nervosa's lifetime prevalence (1.0%) is actually higher than anorexia nervosa's lifetime prevalence (0.6%), making this statement inaccurate."}], "rationale": "Key eating disorder epidemiology facts include: middle-aged women are the fastest-growing newly diagnosed group, at least 5%-10% of AN/BN cases occur in males, and BED has the highest lifetime prevalence (2.8%) compared to BN (1.0%) and AN (0.6%).", "tip": "NCLEX tip: Memorize the lifetime prevalence ranking: BED (2.8%) > BN (1.0%) > AN (0.6%) — a frequently tested numeric comparison.", "id": "m9_96", "module": 9}, {"type": "bowtie", "stem": "A 15-year-old client is admitted at 68% of ideal body weight with bradycardia (HR 42), orthostatic hypotension, and a potassium level of 2.9 mEq/L. She reports an intense fear of gaining weight and restricts intake severely, sometimes going a full day without eating.", "left": {"label": "Actions to Take", "opts": ["Initiate continuous cardiac monitoring and notify the provider of the abnormal vital signs and labs", "Begin a gradual, closely monitored refeeding plan to prevent refeeding syndrome", "Weigh the client daily at a consistent time under standardized conditions", "Encourage a vigorous daily exercise regimen to help the client cope with anxiety about eating", "Allow the client to eat all meals alone in her room without supervision"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Anorexia nervosa, restricting type, with medical instability", "Binge-eating disorder", "Reactive attachment disorder"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Cardiac rhythm and vital sign trends", "Serum electrolytes, especially potassium and phosphorus", "Weight trends under standardized conditions", "COWS opioid withdrawal score", "CIWA-Ar alcohol withdrawal score"], "correct": [0, 1, 2]}, "rationale": "This client's significantly low body weight, bradycardia, orthostatic hypotension, hypokalemia, and intense fear of weight gain reflect anorexia nervosa with medical instability requiring hospital admission. Priority actions include cardiac monitoring, gradual refeeding to prevent refeeding syndrome, and standardized weighing; monitoring should track cardiac status, electrolytes, and weight trends — not COWS or CIWA-Ar, which apply to substance withdrawal scenarios unrelated to this client's presentation.", "tip": "NCLEX tip: In bowtie scenarios blending eating disorder and cardiac risk, prioritize cardiac monitoring, electrolyte correction, and standardized weight tracking — and eliminate any withdrawal-scale distractors that belong to unrelated substance use content.", "id": "m9_97", "module": 9}, {"type": "bowtie", "stem": "A 6-year-old client in foster care, with a history of three placement changes in the past year, rarely seeks comfort from the new foster parent, shows minimal positive affect, and appears withdrawn and unresponsive to soothing even during distress.", "left": {"label": "Actions to Take", "opts": ["Support the development of a consistent, predictable caregiving relationship with the foster parent", "Refer the family for trauma-informed individual and family therapy", "Educate the foster parent about the impact of past inconsistent caregiving on the child's attachment behavior", "Recommend the child be immediately moved to yet another new placement to 'start fresh'", "Dismiss the withdrawn behavior as simple shyness requiring no further evaluation"], "correct": [0, 1, 2]}, "center": {"label": "Condition Most Likely", "opts": ["Reactive attachment disorder", "Autism spectrum disorder, Level 3", "Oppositional defiant disorder"], "correct": [0]}, "right": {"label": "Parameters to Monitor", "opts": ["Quality and consistency of caregiver-child interactions over time", "Child's responsiveness to comfort and soothing attempts", "Presence of positive affect during interactions", "CIWA-Ar score trends", "Pupil size using the COWS scale"], "correct": [0, 1, 2]}, "rationale": "This presentation, a history of inconsistent caregiving/multiple placements plus emotionally withdrawn, minimally comfort-seeking behavior, reflects reactive attachment disorder. Appropriate actions focus on building a consistent caregiving relationship and trauma-informed therapy, while monitoring should track the quality of caregiver-child interaction and the child's responsiveness to comfort — not substance-withdrawal scales, which are irrelevant to this pediatric attachment scenario.", "tip": "NCLEX tip: RAD bowtie scenarios reward continuity-of-care answer choices and penalize any suggestion of further placement disruption or unrelated substance-withdrawal monitoring tools.", "id": "m9_98", "module": 9}, {"type": "mc", "stem": "A nurse is caring for a client recovering from bariatric surgery who admits to a history of binge eating prior to surgery, without having completed the required pre-operative nutrition/counseling classes. Which nursing action best reflects the priority KSA (knowledge, skills, attitudes) competencies of safety and teamwork for this client?", "options": [{"t": "Involve the surgeon, social services, and dietician in a coordinated plan while providing supportive RN presence and education", "c": true, "w": ""}, {"t": "Manage the client's care entirely independently without involving any other disciplines", "c": false, "w": "Coordinated, interdisciplinary involvement (surgeon, social services, dietician) is emphasized as the appropriate approach for this complex case, not an entirely independent nursing-only management plan."}, {"t": "Focus solely on physical wound care with no attention to the client's eating-behavior history", "c": false, "w": "The client's pre-operative binge-eating history and lack of required counseling participation are directly relevant to post-operative risk and require ongoing attention, not exclusive focus on wound care."}, {"t": "Withhold any further nutritional counseling since the surgery has already been performed", "c": false, "w": "Continued nutritional counseling, dietician involvement, and support remain important even after surgery has been performed, especially given the client's pre-operative binge-eating history."}], "rationale": "This bariatric surgery case illustrates the importance of safety (preventing surgical complications) and teamwork/collaboration (RN, surgeon, social services, dietician) given the client's history of binge eating and non-participation in required pre-operative counseling, emphasizing coordinated, interdisciplinary care.", "tip": "NCLEX tip: Bariatric surgery cases combining a binge-eating history with incomplete pre-op preparation test your ability to identify the correct interdisciplinary team members needed for safe, coordinated care.", "id": "m9_99", "module": 9}, {"type": "mc", "stem": "Which of the following statements about substance use among adolescents, as presented in the children/adolescents chapter, is accurate?", "options": [{"t": "More than half of 12th graders report using alcohol in the past year", "c": true, "w": ""}, {"t": "Illicit drug use among high schoolers is exceedingly rare, affecting fewer than 1% of students", "c": false, "w": "Approximately 27.2% of high schoolers reported using illicit drugs in the past year, which is far higher than 1%, reflecting a significant public health concern among this population."}, {"t": "Substance use disorders are estimated to affect fewer than 1% of youth ages 12-17", "c": false, "w": "Substance use disorders are estimated to affect approximately 5% of youth ages 12-17, not fewer than 1%, according to the source material."}, {"t": "Alcohol use among 8th graders is higher than among 12th graders", "c": false, "w": "The reported rate of past-year alcohol use is higher among 12th graders (55.6%) than among 8th graders (17.6%), which is the opposite of what this statement claims."}], "rationale": "Among adolescents, an estimated 5% of youth ages 12-17 have a substance use disorder; 17.6% of 8th graders and 55.6% of 12th graders reported alcohol use in the past year, and 27.2% of high schoolers reported illicit drug use in the past year.", "tip": "NCLEX tip: Note the increasing trend from 8th to 12th grade in reported alcohol use (17.6% to 55.6%) — a testable statistic illustrating rising substance use risk through adolescence.", "id": "m9_100", "module": 9}, {"type": "mc", "stem": "A nurse is teaching new parents about resilience in children. Which statement best reflects an accurate understanding of this concept?", "options": [{"t": "Resilience is the ability to adapt to or overcome stressors, and it can be learned and strengthened over time", "c": true, "w": ""}, {"t": "Resilience is an entirely fixed, innate trait that cannot be developed or influenced after birth", "c": false, "w": "Resilience is specifically described as something that can be learned, involving thoughts/behaviors/actions triggered by stress, rather than being an entirely fixed trait unaffected by later development or support."}, {"t": "Resilience means a child never experiences stress or adversity in their life", "c": false, "w": "Resilience is about how a child adapts to or overcomes stressors, not the absence of stress or adversity altogether; children with resilience still face stress but respond adaptively."}, {"t": "Resilience has no relationship to a child's temperament or access to supportive relationships", "c": false, "w": "Resilience is aided by temperament, problem-solving skills, and nurturing adult support, so it is inaccurate to say it has no relationship to these factors."}], "rationale": "Resilience is the ability to adapt to or overcome stressors and can be learned; it involves thoughts, behaviors, and actions triggered by stress, and is aided by factors such as temperament, problem-solving skills, and the presence of nurturing adult support.", "tip": "NCLEX tip: Resilience is framed as a learnable, buildable capacity — not a fixed trait — supported by temperament, skills, and relationships, which is an empowering teaching point for parents and caregivers.", "id": "m9_101", "module": 9}, {"type": "mc", "stem": "Which statement accurately reflects specific phobias in childhood, according to the source material?", "options": [{"t": "Specific phobias occur in about 5% of children and 16% of adolescents", "c": true, "w": ""}, {"t": "Specific phobias in childhood are exceedingly rare, occurring in fewer than 0.1% of children", "c": false, "w": "Specific phobias occur in about 5% of children and 16% of adolescents, which is far more common than a rate of fewer than 0.1%."}, {"t": "Common childhood specific phobias include only fear of heights, with no other recognized categories", "c": false, "w": "Common childhood specific phobias described in the source material include fear of the dark, monsters, costumed characters, injections, water, and certain animals — a broader range than heights alone."}, {"t": "Specific phobias are more prevalent in adolescents than in adults, but do not occur at all in young children", "c": false, "w": "Specific phobias are explicitly described as occurring in childhood (about 5% of children), so it is inaccurate to say they do not occur at all in young children."}], "rationale": "Specific phobias in childhood, including fear of the dark, monsters, costumed characters, injections, water, and certain animals, occur in about 5% of children and 16% of adolescents, reflecting a relatively common category of childhood anxiety.", "tip": "NCLEX tip: Memorize the specific phobia prevalence figures (5% children, 16% adolescents) alongside separation anxiety disorder's prevalence (4% children, 1.6% adolescents) for comparison.", "id": "m9_102", "module": 9}]};
</script>
<script>
(function(){
"use strict";

const MODULE_META = {
  8: { title: "Module 8", subtitle: "Neurocognitive Disorders & Substance-Related Disorders", tab: "CH.18\u201319" },
  9: { title: "Module 9", subtitle: "Eating Disorders & Children/Adolescents", tab: "CH.14\u201926" }
};

const bank = {
  8: QUIZ_DATA.module8,
  9: QUIZ_DATA.module9
};

const TYPE_LABEL = { mc: "Multiple Choice", sata: "Select All That Apply", fib: "Fill in the Blank", bowtie: "Bowtie" };

function countByType(mod){
  const c = { mc:0, sata:0, fib:0, bowtie:0 };
  bank[mod].forEach(q=>{ c[q.type]++; });
  return c;
}

// ---------------- App State ----------------
let state = {
  screen: "home", // home | quiz | celebrate | remediationHome | remediationCelebrate
  selectedModules: {8: true, 9: true},
  selectedTypes: {mc: true, sata: true, fib: true, bowtie: true},
  desiredCounts: {8: 10, 9: 10},
  queue: [],       // array of runtime question wrappers
  index: 0,
  wrongBank: [],   // array of {id, module} for missed questions across the whole session
  isRemediation: false,
  remediationSourceIds: [] // ids being remediated this round
};

function filteredPool(mod){
  return bank[mod].filter(q => state.selectedTypes[q.type]);
}

function cloneQ(q){ return JSON.parse(JSON.stringify(q)); }

function findById(id){
  for(const m of [8,9]){
    const f = bank[m].find(q=>q.id===id);
    if(f) return f;
  }
  return null;
}

function sample(arr, n){
  const pool = arr.slice();
  const out = [];
  n = Math.min(n, pool.length);
  for(let i=0;i<n;i++){
    const idx = Math.floor(Math.random()*pool.length);
    out.push(pool.splice(idx,1)[0]);
  }
  return out;
}

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function makeRuntime(q){
  const rq = cloneQ(q);
  // shuffle options order for mc/sata so correct answer letter varies by render, options already vary by authoring
  if(rq.type === "mc" || rq.type === "sata"){
    rq.options = shuffleArr(rq.options.map((o,i)=>({...o, _origIndex:i})));
  }
  if(rq.type === "bowtie"){
    ["left","center","right"].forEach(col=>{
      const opts = rq[col].opts.map((t,i)=>({t, isCorrect: rq[col].correct.includes(i)}));
      rq[col]._shuffled = shuffleArr(opts);
    });
  }
  return {
    q: rq,
    selected: rq.type==="sata" ? [] : (rq.type==="bowtie" ? {left:[],center:[],right:[]} : null),
    fibValue: "",
    confirmed: false,
    correct: null
  };
}

// ---------------- Build Quiz ----------------
function buildQuiz(){
  let combined = [];
  [8,9].forEach(m=>{
    if(state.selectedModules[m] && state.desiredCounts[m] > 0){
      const picked = sample(filteredPool(m), state.desiredCounts[m]);
      combined = combined.concat(picked);
    }
  });
  combined = shuffleArr(combined);
  state.queue = combined.map(makeRuntime);
  state.index = 0;
  state.isRemediation = false;
}

function buildRemediationQuiz(){
  const ids = state.wrongBank.map(w=>w.id);
  const qs = ids.map(findById).filter(Boolean);
  state.remediationSourceIds = ids.slice();
  state.queue = shuffleArr(qs).map(makeRuntime);
  state.index = 0;
  state.isRemediation = true;
}

// ---------------- Grading ----------------
function gradeCurrent(){
  const rt = state.queue[state.index];
  const q = rt.q;
  let correct = false;
  if(q.type === "mc"){
    const chosen = rt.selected;
    correct = chosen !== null && q.options[chosen].c === true;
  } else if(q.type === "sata"){
    const correctIdxs = q.options.map((o,i)=>o.c?i:null).filter(i=>i!==null).sort();
    const chosen = rt.selected.slice().sort();
    correct = JSON.stringify(correctIdxs) === JSON.stringify(chosen);
  } else if(q.type === "fib"){
    const val = rt.fibValue.trim().toLowerCase().replace(/\s+/g,' ');
    correct = q.answers.some(a=> a === val );
  } else if(q.type === "bowtie"){
    let allMatch = true;
    ["left","center","right"].forEach(col=>{
      const opts = q[col]._shuffled;
      const correctIdxs = opts.map((o,i)=>o.isCorrect?i:null).filter(i=>i!==null).sort();
      const chosen = rt.selected[col].slice().sort();
      if(JSON.stringify(correctIdxs) !== JSON.stringify(chosen)) allMatch = false;
    });
    correct = allMatch;
  }
  rt.confirmed = true;
  rt.correct = correct;

  // track wrong bank (dedupe by id)
  if(!correct){
    if(!state.wrongBank.find(w=>w.id===q.id)){
      state.wrongBank.push({id:q.id, module:q.module});
    }
  } else if(state.isRemediation){
    // remove from wrongBank if now correct during remediation
    state.wrongBank = state.wrongBank.filter(w=>w.id!==q.id);
  }
  return correct;
}

// ---------------- Rendering ----------------
const app = document.getElementById("app");

function render(){
  if(state.screen === "home") renderHome();
  else if(state.screen === "quiz") renderQuiz();
  else if(state.screen === "celebrate") renderCelebrate(false);
  else if(state.screen === "remediationCelebrate") renderCelebrate(true);
}

function pulseStripSVG(progressPct){
  // A stylized ECG waveform path, drawn once in teal, with amber overlay showing progress
  const w = 900, h = 54;
  const path = "M0,27 L60,27 L80,10 L100,44 L120,4 L140,50 L160,27 L220,27 L240,14 L260,40 L280,27 L340,27 " +
               "L360,10 L380,44 L400,4 L420,50 L440,27 L500,27 L520,14 L540,40 L560,27 L620,27 " +
               "L640,10 L660,44 L680,4 L700,50 L720,27 L780,27 L800,14 L820,40 L840,27 L900,27";
  const totalLen = 2600; // approximate for dasharray purposes
  const offset = totalLen - (totalLen * progressPct);
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path class="pulse-line" d="${path}" opacity="0.35"/>
    <path class="pulse-progress" d="${path}" stroke-dasharray="${totalLen}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function topbar(showHome){
  return `<div class="topbar">
    <div class="brand"><span class="mark">RN &middot; EXAM PREP</span><h1>NRSG 3400 Exam Practice</h1></div>
    <div class="topbar-actions">
      ${showHome ? '<button class="btn btn-ghost btn-sm" data-action="go-home">&larr; Home</button>' : ''}
    </div>
  </div>`;
}

function renderHome(){
  const c8 = countByType(8), c9 = countByType(9);
  const wrongCount = state.wrongBank.length;
  app.innerHTML = `
    <div class="pulse-strip">${pulseStripSVG(0.15)}</div>
    ${topbar(false)}
    <div class="hero">
      <p class="eyebrow">Unit 3 &middot; Chart Review</p>
      <h2>Build your practice set.</h2>
      <p class="lead">Pick one or both modules, choose which question types to include, set how many questions you want from each, and start a mixed quiz pulled fresh from the full question bank.</p>
    </div>

    <div class="type-filter">
      <div class="type-filter-label">Question types</div>
      <div class="type-chip-row">
        ${Object.keys(TYPE_LABEL).map(t=>`
          <button type="button" class="type-chip ${state.selectedTypes[t] ? 'active' : ''}" data-type="${t}" aria-pressed="${state.selectedTypes[t]?'true':'false'}">${TYPE_LABEL[t]}</button>
        `).join('')}
      </div>
    </div>

    <div class="module-grid">
      ${moduleCard(8, c8)}
      ${moduleCard(9, c9)}
    </div>

    <div class="start-panel">
      <div class="summary">Ready to start: <strong id="total-count">0</strong> questions queued</div>
      <button class="btn btn-primary" id="start-btn" data-action="start-quiz">Start Quiz</button>
    </div>

    ${wrongCount > 0 ? `<div class="remediation-note">
      <span>You have <strong>${wrongCount}</strong> missed question${wrongCount===1?'':'s'} saved for remediation from this session.</span>
      <button class="btn btn-coral btn-sm" data-action="go-remediation-home">Review Missed Questions</button>
    </div>` : ''}

    <footer class="foot">NRSG 3400 &middot; Module 8 &amp; 9 &middot; Practice bank for study purposes only</footer>
  `;
  attachHomeEvents();
  updateTotalCount();
}

function moduleCard(mod, counts){
  const meta = MODULE_META[mod];
  const total = bank[mod].length;
  const availableNow = filteredPool(mod).length;
  const activeClass = state.selectedModules[mod] ? "active" : "";
  return `<div class="module-card ${activeClass}" data-modcard="${mod}" role="button" tabindex="0" aria-pressed="${state.selectedModules[mod]?'true':'false'}">
    <div class="module-card-top">
      <h3 class="module-title">${meta.title}</h3>
      <span class="select-indicator">${state.selectedModules[mod] ? '&#10003; Included' : 'Tap to include'}</span>
    </div>
    <h4 class="module-theme">${meta.subtitle}</h4>
    <div class="qty-row">
      <label for="qty-${mod}"># of questions (max ${availableNow})</label>
      <input type="number" id="qty-${mod}" data-mod="${mod}" min="0" max="${availableNow}" value="${Math.min(state.desiredCounts[mod], availableNow)}">
    </div>
    <div class="breakdown">
      <span class="tag">${meta.tab}</span>
      <span class="tag ${state.selectedTypes.mc ? '' : 'tag-off'}">MC ${counts.mc}</span>
      <span class="tag ${state.selectedTypes.sata ? '' : 'tag-off'}">SATA ${counts.sata}</span>
      <span class="tag ${state.selectedTypes.fib ? '' : 'tag-off'}">FIB ${counts.fib}</span>
      <span class="tag ${state.selectedTypes.bowtie ? '' : 'tag-off'}">Bowtie ${counts.bowtie}</span>
      <span class="tag">${availableNow} of ${total} available</span>
    </div>
  </div>`;
}

function updateTotalCount(){
  let total = 0;
  [8,9].forEach(m=>{ if(state.selectedModules[m]) total += clampQty(m); });
  const el = document.getElementById("total-count");
  if(el) el.textContent = total;
  const startBtn = document.getElementById("start-btn");
  if(startBtn) startBtn.disabled = total <= 0;
}

function clampQty(mod){
  const total = filteredPool(mod).length;
  let v = state.desiredCounts[mod];
  if(isNaN(v) || v < 0) v = 0;
  if(v > total) v = total;
  return v;
}

function attachHomeEvents(){
  document.querySelectorAll(".type-chip").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const type = chip.getAttribute("data-type");
      const willBeActive = !state.selectedTypes[type];
      // prevent deselecting the last remaining active type
      const activeCount = Object.values(state.selectedTypes).filter(Boolean).length;
      if(!willBeActive && activeCount <= 1) return;
      state.selectedTypes[type] = willBeActive;
      [8,9].forEach(m=> state.desiredCounts[m] = clampQty(m));
      render();
    });
  });
  [8,9].forEach(mod=>{
    const cardEl = document.querySelector(`[data-modcard="${mod}"]`);
    const toggleSelection = ()=>{
      state.selectedModules[mod] = !state.selectedModules[mod];
      cardEl.classList.toggle("active", state.selectedModules[mod]);
      cardEl.setAttribute("aria-pressed", state.selectedModules[mod] ? "true" : "false");
      const indicator = cardEl.querySelector(".select-indicator");
      if(indicator) indicator.innerHTML = state.selectedModules[mod] ? "&#10003; Included" : "Tap to include";
      updateTotalCount();
    };
    cardEl.addEventListener("click", toggleSelection);
    cardEl.addEventListener("keydown", e=>{
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggleSelection(); }
    });
    const qty = document.getElementById(`qty-${mod}`);
    qty.addEventListener("click", e=> e.stopPropagation());
    qty.addEventListener("input", e=>{
      let v = parseInt(e.target.value,10);
      state.desiredCounts[mod] = isNaN(v) ? 0 : v;
      updateTotalCount();
    });
    qty.addEventListener("blur", e=>{
      const clamped = clampQty(mod);
      state.desiredCounts[mod] = clamped;
      e.target.value = clamped;
      updateTotalCount();
    });
  });
  document.getElementById("start-btn").addEventListener("click", ()=>{
    [8,9].forEach(m=> state.desiredCounts[m] = clampQty(m));
    buildQuiz();
    if(state.queue.length === 0) return;
    state.screen = "quiz";
    render();
  });
  const remBtn = document.querySelector('[data-action="go-remediation-home"]');
  if(remBtn) remBtn.addEventListener("click", ()=>{
    buildRemediationQuiz();
    if(state.queue.length===0){ render(); return; }
    state.isRemediation = true;
    state.screen = "quiz";
    render();
  });
}

// ---------------- Quiz Screen ----------------
function renderQuiz(){
  const rt = state.queue[state.index];
  const q = rt.q;
  const total = state.queue.length;
  const progressPct = (state.index) / Math.max(total,1);

  app.innerHTML = `
    <div class="pulse-strip">${pulseStripSVG(Math.max(progressPct,0.03))}</div>
    ${topbar(true)}
    <div class="quiz-meta">
      <div class="quiz-progress-label">${state.isRemediation ? 'Remediation &middot; ' : ''}Question <b>${state.index+1}</b> / ${total}</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" data-action="shuffle">&#8635; Shuffle</button>
      </div>
    </div>
    <div class="card" id="question-card">
      ${renderQuestionBody(rt)}
    </div>
    <div class="nav-row">
      <div class="left-group">
        <button class="btn btn-ghost btn-sm" data-action="prev" ${state.index===0?'disabled':''}>&larr; Previous</button>
        <button class="btn btn-ghost btn-sm" data-action="go-home">Home</button>
      </div>
      <div class="right-group">
        <button class="btn btn-primary btn-sm" data-action="next">${state.index===total-1 ? 'Finish' : 'Next \u2192'}</button>
      </div>
    </div>
  `;
  attachQuizEvents();
}

function renderQuestionBody(rt){
  const q = rt.q;
  const meta = MODULE_META[q.module];
  let body = `<div class="q-eyebrow"><span class="dot"></span>${meta.title} &middot; ${TYPE_LABEL[q.type]}</div>
  <p class="q-stem">${escapeHtml(q.stem)}</p>`;

  if(q.type === "mc") body += renderMC(rt);
  else if(q.type === "sata") body += renderSATA(rt);
  else if(q.type === "fib") body += renderFIB(rt);
  else if(q.type === "bowtie") body += renderBowtie(rt);

  if(!rt.confirmed){
    body += `<div class="confirm-row"><button class="btn btn-primary" id="confirm-btn" data-action="confirm">Confirm Answer</button></div>`;
  } else {
    body += renderFeedback(rt);
  }
  return body;
}

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMC(rt){
  const q = rt.q;
  let html = `<div class="options">`;
  q.options.forEach((o,i)=>{
    let cls = "option";
    if(!rt.confirmed && rt.selected === i) cls += " selected";
    let locked = rt.confirmed ? "locked" : "";
    if(rt.confirmed){
      cls += " " + locked;
      if(o.c) cls += " correct-answer";
      else if(rt.selected === i) cls += " wrong-answer";
    }
    const marker = String.fromCharCode(65+i);
    html += `<div class="${cls}" data-opt="${i}" data-action="${rt.confirmed?'':'select-mc'}">
      <span class="marker">${marker}</span><span>${escapeHtml(o.t)}</span>
      ${rt.confirmed && o.c ? '<span class="result-icon">&#10003;</span>' : ''}
      ${rt.confirmed && !o.c && rt.selected===i ? '<span class="result-icon">&#10007;</span>' : ''}
      ${rt.confirmed && !o.c ? `<div class="why-tip">${escapeHtml(o.w||'')}</div>` : ''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderSATA(rt){
  const q = rt.q;
  let html = `<div class="options">`;
  q.options.forEach((o,i)=>{
    let cls = "option sata";
    const isSel = rt.selected.includes(i);
    if(!rt.confirmed && isSel) cls += " selected";
    if(rt.confirmed){
      cls += " locked";
      if(o.c) cls += " correct-answer";
      else if(isSel) cls += " wrong-answer";
    }
    const marker = isSel ? "&#10003;" : (i+1);
    html += `<div class="${cls}" data-opt="${i}" data-action="${rt.confirmed?'':'select-sata'}">
      <span class="marker">${marker}</span><span>${escapeHtml(o.t)}</span>
      ${rt.confirmed && o.c ? '<span class="result-icon">&#10003;</span>' : ''}
      ${rt.confirmed && !o.c && isSel ? '<span class="result-icon">&#10007;</span>' : ''}
      ${rt.confirmed && !o.c ? `<div class="why-tip">${escapeHtml(o.w||'')}</div>` : ''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderFIB(rt){
  const disabled = rt.confirmed ? "disabled" : "";
  let cls = "";
  if(rt.confirmed) cls = rt.correct ? "correct-answer" : "wrong-answer";
  const val = rt.confirmed ? (rt.fibValue || "") : rt.fibValue;
  return `<div class="fib-row">
    <input type="text" id="fib-input" placeholder="Type your answer..." value="${escapeHtml(val)}" class="${cls}" ${disabled}>
  </div>`;
}

function renderBowtie(rt){
  const q = rt.q;
  let html = `<div class="bowtie-wrap">`;
  [["left","Actions to Take"],["center","Condition Most Likely"],["right","Parameters to Monitor"]].forEach(([col,fallbackLabel])=>{
    const label = q[col].label || fallbackLabel;
    const needed = q[col].correct.length;
    html += `<div class="bowtie-col">
      <div class="bowtie-col-title">${escapeHtml(label)} <span class="bowtie-col-hint">(select ${needed})</span></div>
      <div class="options">`;
    q[col]._shuffled.forEach((o,i)=>{
      let cls = "option sata";
      const isSel = rt.selected[col].includes(i);
      if(!rt.confirmed && isSel) cls += " selected";
      if(rt.confirmed){
        cls += " locked";
        if(o.isCorrect) cls += " correct-answer";
        else if(isSel) cls += " wrong-answer";
      }
      const marker = isSel ? "&#10003;" : (i+1);
      html += `<div class="${cls}" data-col="${col}" data-opt="${i}" data-action="${rt.confirmed?'':'select-bowtie'}">
        <span class="marker">${marker}</span><span>${escapeHtml(o.t)}</span>
        ${rt.confirmed && o.isCorrect ? '<span class="result-icon">&#10003;</span>' : ''}
        ${rt.confirmed && !o.isCorrect && isSel ? '<span class="result-icon">&#10007;</span>' : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function renderFeedback(rt){
  const q = rt.q;
  const verdict = rt.correct ? "&#10003; Correct" : "&#10007; Not quite";
  return `<div class="feedback ${rt.correct ? 'is-correct':'is-wrong'}">
    <div class="verdict">${verdict}</div>
    <h4>Rationale</h4>
    <p>${escapeHtml(q.rationale)}</p>
    <h4>NCLEX Tip</h4>
    <p>${escapeHtml(q.tip)}</p>
    ${(q.type==='mc'||q.type==='sata') ? '<h4>Hover any incorrect option above to see why it\'s wrong.</h4>' : ''}
  </div>`;
}

function attachQuizEvents(){
  // Page-level controls (attached once per full quiz screen render)
  document.querySelectorAll('[data-action="go-home"]').forEach(b=>b.addEventListener("click", ()=>{
    state.screen = "home"; render();
  }));
  const shuffleBtn = document.querySelector('[data-action="shuffle"]');
  if(shuffleBtn) shuffleBtn.addEventListener("click", shuffleCurrentQuestion);

  document.querySelector('[data-action="prev"]').addEventListener("click", ()=>{
    if(state.index>0){ state.index--; render(); }
  });
  document.querySelector('[data-action="next"]').addEventListener("click", ()=>{
    if(state.index < state.queue.length-1){ state.index++; render(); }
    else {
      finishQuiz();
    }
  });

  attachCardEvents();
}

// Attaches events scoped to just the question card (options, fib input, confirm button).
// Safe to call repeatedly after re-rendering only the card, since it does not touch
// the page-level nav buttons (which would otherwise accumulate duplicate listeners).
function attachCardEvents(){
  const rt = state.queue[state.index];
  const q = rt.q;

  if(rt.confirmed) return;

  if(q.type === "mc"){
    document.querySelectorAll('[data-action="select-mc"]').forEach(el=>{
      el.addEventListener("click", ()=>{
        rt.selected = parseInt(el.dataset.opt,10);
        renderInPlace();
      });
    });
  } else if(q.type === "sata"){
    document.querySelectorAll('[data-action="select-sata"]').forEach(el=>{
      el.addEventListener("click", ()=>{
        const i = parseInt(el.dataset.opt,10);
        const pos = rt.selected.indexOf(i);
        if(pos>=0) rt.selected.splice(pos,1); else rt.selected.push(i);
        renderInPlace();
      });
    });
  } else if(q.type === "fib"){
    const inp = document.getElementById("fib-input");
    if(inp){
      inp.addEventListener("input", e=>{ rt.fibValue = e.target.value; });
      inp.addEventListener("keydown", e=>{
        if(e.key === "Enter"){ gradeCurrent(); renderQuiz(); }
      });
    }
  } else if(q.type === "bowtie"){
    document.querySelectorAll('[data-action="select-bowtie"]').forEach(el=>{
      el.addEventListener("click", ()=>{
        const col = el.dataset.col;
        const i = parseInt(el.dataset.opt,10);
        const arr = rt.selected[col];
        const pos = arr.indexOf(i);
        const maxAllowed = q[col].correct.length;
        if(pos>=0){ arr.splice(pos,1); }
        else {
          if(arr.length < maxAllowed) arr.push(i);
        }
        renderInPlace();
      });
    });
  }
  const confirmBtn = document.getElementById("confirm-btn");
  if(confirmBtn) confirmBtn.addEventListener("click", ()=>{
    gradeCurrent();
    renderQuiz();
  });
}

function renderInPlace(){
  const card = document.getElementById("question-card");
  card.innerHTML = renderQuestionBody(state.queue[state.index]);
  attachCardEvents();
}

function shuffleCurrentQuestion(){
  const rt = state.queue[state.index];
  const mod = rt.q.module;
  const usedIds = new Set(state.queue.map(r=>r.q.id));
  const modPool = filteredPool(mod);
  let pool = modPool.filter(q => !usedIds.has(q.id));
  if(pool.length === 0){
    pool = modPool.filter(q => q.id !== rt.q.id);
  }
  if(pool.length === 0) return; // nothing else to swap to
  const newQ = pool[Math.floor(Math.random()*pool.length)];
  state.queue[state.index] = makeRuntime(newQ);
  render();
}

function finishQuiz(){
  state.screen = state.isRemediation ? "remediationCelebrate" : "celebrate";
  render();
}

// ---------------- Celebration ----------------
const ENCOURAGEMENTS = [
  "Every question review strengthens your clinical judgment for the real thing.",
  "Steady progress beats a perfect run \u2014 you're building real exam-day instincts.",
  "Nice work sticking with it. Your future patients are lucky to have a nurse this thorough.",
  "You showed up and did the reps. That's exactly how NCLEX readiness gets built.",
  "Rationales stick better after you've wrestled with the question first \u2014 well done."
];

function renderCelebrate(isRemediation){
  const total = state.queue.length;
  const correctCount = state.queue.filter(r=>r.correct).length;
  const pct = total ? Math.round((correctCount/total)*100) : 0;
  const msg = ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)];
  const wrongCount = state.wrongBank.length;

  app.innerHTML = `
    <div class="pulse-strip">${pulseStripSVG(1)}</div>
    ${topbar(false)}
    <div class="celebrate">
      <div class="big-pulse">${celebrateSVG()}</div>
      <h2>${isRemediation ? 'Remediation complete!' : 'Quiz complete!'}</h2>
      <div class="score-badge"><span class="num">${pct}%</span><span class="of">${correctCount} / ${total} correct</span></div>
      <p class="msg">${msg}</p>
      <div class="actions">
        ${wrongCount>0 ? `<button class="btn btn-coral" data-action="review-missed">Review ${wrongCount} Missed Question${wrongCount===1?'':'s'}</button>` : ''}
        <button class="btn btn-primary" data-action="new-quiz">Build a New Quiz</button>
        <button class="btn btn-ghost" data-action="go-home">Return Home</button>
      </div>
    </div>
    <footer class="foot">NRSG 3400 &middot; Module 8 &amp; 9 &middot; Keep going, future nurse.</footer>
  `;

  document.querySelectorAll('[data-action="go-home"]').forEach(b=>b.addEventListener("click", ()=>{ state.screen="home"; render(); }));
  document.querySelector('[data-action="new-quiz"]').addEventListener("click", ()=>{ state.screen="home"; render(); });
  const reviewBtn = document.querySelector('[data-action="review-missed"]');
  if(reviewBtn) reviewBtn.addEventListener("click", ()=>{
    buildRemediationQuiz();
    if(state.queue.length===0){ state.screen="home"; render(); return; }
    state.screen = "quiz";
    render();
  });
}

function celebrateSVG(){
  return `<svg viewBox="0 0 480 90" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,45 L100,45 L120,15 L140,75 L160,5 L180,80 L200,45 L260,45 L280,25 L300,60 L320,45 L480,45"
      fill="none" stroke="#1C8C82" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="320" cy="45" r="6" fill="#E0A63E"/>
  </svg>`;
}

// ---------------- Init ----------------
render();

})();

</script>
</body>
