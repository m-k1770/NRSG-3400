dness immediately is unrealistic and can increase distrust; the nurse should instead identify with and gently share in the client's cautious stance."}], "rationale": "Communication with a paranoid client should include speaking indirectly (avoiding excessive \"you\" and \"I\" statements), identifying with rather than fighting the patient's guardedness, and sharing mistrust in a way that aligns with the client's need to feel cautious without supporting delusional content.", "tip": "NCLEX tip: The three key paranoid communication techniques — indirect speech, identifying with the patient, and sharing mistrust — work together to build trust without confronting or reinforcing delusions.", "id": "m7_92", "module": 7}, {"type": "mc", "stem": "Which client presentation and prognosis pattern is most consistent with the disorganized subtype of schizophrenia?", "options": [{"t": "Early onset in the teenage years, poor premorbid functioning, and a generally poor prognosis", "c": true, "w": ""}, {"t": "Later onset in the late 20s to 30s with better cognitive functioning and better long-term outcomes", "c": false, "w": "This pattern describes the paranoid presentation of schizophrenia, which has a later onset and generally better prognosis compared to the disorganized subtype."}, {"t": "Sudden onset following an identifiable stressor with full return to baseline functioning", "c": false, "w": "This pattern is more consistent with brief psychotic disorder, not the disorganized subtype of schizophrenia, which has an early, insidious onset and poor premorbid functioning."}, {"t": "Symptoms limited to an isolated, nonbizarre delusion with preserved functioning", "c": false, "w": "This pattern describes delusional disorder, not the disorganized subtype of schizophrenia, which involves broader impairment, incoherent speech, and social withdrawal."}], "rationale": "The disorganized presentation of schizophrenia is the most regressed and socially impaired, with marked looseness of associations, grossly inappropriate affect, incoherent speech, and extreme social withdrawal; it has an earlier onset (early to middle teens), poor premorbid functioning, and a generally poor prognosis.", "tip": "NCLEX tip: Contrast disorganized schizophrenia (early onset, poor prognosis, marked impairment) with paranoid features (later onset, better cognitive function, better prognosis) as two ends of a presentation spectrum.", "id": "m7_93", "module": 7}, {"type": "mc", "stem": "A nurse is caring for a client who believes their food is being poisoned. Which nursing intervention is most appropriate to address this concern while respecting the client's need for safety?", "options": [{"t": "Offer food in closed containers, such as a sealed carton of milk or an unpeeled piece of fruit", "c": true, "w": ""}, {"t": "Insist the client eat all meals exactly as served on the hospital tray without modification", "c": false, "w": "Insisting the client eat unmodified meals ignores their delusional concern and does not provide a practical way to help the client feel safe enough to eat."}, {"t": "Argue with the client using logical evidence that the food is not poisoned", "c": false, "w": "Arguing or using logical evidence to correct a delusion typically increases the client's defensiveness and reinforces the false belief rather than resolving the underlying safety concern."}, {"t": "Withhold food entirely until the client's delusional belief resolves completely", "c": false, "w": "Withholding food is unsafe and does not address the underlying need for the client to feel secure enough to eat; offering food in tamper-evident packaging is the appropriate intervention."}], "rationale": "Offering food in closed, tamper-evident containers such as a sealed milk carton, unpeeled fruit, or a hardboiled egg allows a client with a poisoning delusion to see that the food is \"untampered\" and therefore safe, without directly arguing against the delusional belief.", "tip": "NCLEX tip: This closed-container food strategy is a classic, specific nursing intervention for delusions of poisoning — recognize it as a practical, non-confrontational safety measure.", "id": "m7_94", "module": 7}, {"type": "mc", "stem": "A client with a persecutory delusion states, \"The nurses on this unit are working with the government to spy on me.\" Which nursing response best reflects therapeutic communication?", "options": [{"t": "\"It sounds like you're feeling very unsafe right now — can you tell me more about what's worrying you?\"", "c": true, "w": ""}, {"t": "\"That's not true, none of us are spies, and there is no government conspiracy against you.\"", "c": false, "w": "Directly arguing against the delusion with logical facts tends to increase the client's defensiveness and reinforce the false belief rather than build trust."}, {"t": "\"You need to stop saying things like that, or I will have to report you to the treatment team.\"", "c": false, "w": "This response is confrontational and threatening, which can increase the client's anxiety and mistrust rather than build a therapeutic relationship."}, {"t": "\"I understand completely — I've actually noticed the same suspicious behavior from the staff.\"", "c": false, "w": "Validating or agreeing with the content of a delusion is not therapeutic and can reinforce the false belief rather than helping the client explore the underlying feelings."}], "rationale": "Therapeutic communication with a delusional client focuses on identifying and addressing the underlying feelings (such as fear or helplessness) rather than arguing about or validating the specific content of the delusion itself.", "tip": "NCLEX tip: When responding to delusional content, redirect your therapeutic response toward the underlying emotion the client is experiencing, rather than debating the factual accuracy of the delusion.", "id": "m7_95", "module": 7}, {"type": "mc", "stem": "A nurse is speaking with a client who exhibits associative looseness and becomes confused trying to follow the client's shifting, illogical train of thought. Which statement by the nurse reflects the most therapeutic approach?", "options": [{"t": "\"I'm having trouble following what you're telling me — can we go back to what you were saying about your family?\"", "c": true, "w": ""}, {"t": "\"You're not making any sense right now, so let's stop this conversation.\"", "c": false, "w": "Placing blame on the client for not making sense is not therapeutic and can increase feelings of shame or frustration; the nurse should place the difficulty on themselves instead."}, {"t": "Nodding and pretending to understand fully so the client does not feel embarrassed", "c": false, "w": "Pretending to understand when confused is not therapeutic and does not help clarify the client's thinking; being honest about difficulty following the conversation is more appropriate."}, {"t": "Immediately changing the subject to something completely unrelated to redirect the client", "c": false, "w": "Abruptly changing the subject does not address the client's disorganized thinking or attempt to find recurring themes; acknowledging difficulty and returning to a specific, concrete topic is more therapeutic."}], "rationale": "When a client demonstrates associative looseness, the nurse should avoid pretending to understand, place the difficulty on themselves rather than the client (\"I'm having trouble following\" rather than \"you're not making sense\"), and redirect toward concrete, here-and-now topics.", "tip": "NCLEX tip: Placing communication difficulty on yourself rather than the client is a core therapeutic communication principle that applies broadly across confused, disorganized, or cognitively impaired clients.", "id": "m7_96", "module": 7}, {"type": "bowtie", "stem": "A client with schizophrenia reports hearing voices commanding them to harm their roommate. The client appears frightened, is pacing, and states, \"I don't know if I can stop myself from listening to them.\" Complete the bowtie: select the priority nursing concern, two immediate nursing actions, and two assessment questions to ask.", "left": {"label": "Priority nursing concern", "opts": ["Risk for violence toward others due to command hallucinations", "Social isolation related to negative symptoms", "Impaired verbal communication related to poverty of speech", "Self-care deficit related to avolition"], "correct": [0]}, "center": {"label": "Immediate nursing actions", "opts": ["Initiate continuous close observation and ensure the roommate's safety", "Notify the treatment team immediately", "Leave the client alone in the room to de-escalate independently", "Encourage the client to engage in an unsupervised group activity with the roommate", "Argue with the client that the voices are not real"], "correct": [0, 1]}, "right": {"label": "Assessment questions to ask", "opts": ["\"Do you plan to follow what the voices are telling you to do?\"", "\"Do you feel able to resist the voices right now?\"", "\"What is your favorite hobby outside of the hospital?\"", "\"How many siblings do you have?\""], "correct": [0, 1]}, "rationale": "Command hallucinations instructing harm to another person represent a psychiatric emergency requiring immediate safety intervention, including continuous observation, prompt notification of the treatment team, and direct assessment of the client's intent and ability to resist acting on the voices.", "tip": "NCLEX tip: Command hallucinations involving harm to self or others always take top priority over other nursing concerns — safety assessment and intervention must happen immediately, not after other lower-priority actions.", "id": "m7_97", "module": 7}, {"type": "mc", "stem": "Which class of antipsychotic medications is generally chosen as first-line treatment for schizophrenia, with one notable exception reserved for treatment-resistant cases?", "options": [{"t": "Second-generation antipsychotics (SGAs), except for clozapine", "c": true, "w": ""}, {"t": "First-generation antipsychotics (FGAs), except for haloperidol", "c": false, "w": "FGAs are not generally chosen as first-line treatment; SGAs are typically preferred first-line, with clozapine specifically reserved for treatment-resistant cases."}, {"t": "First-generation antipsychotics (FGAs), with no exceptions", "c": false, "w": "FGAs are not the first-line class chosen in current practice; SGAs are generally preferred, with one specific exception (clozapine) reserved for treatment-resistant cases."}, {"t": "Second-generation antipsychotics (SGAs), except for quetiapine", "c": false, "w": "Quetiapine is not the SGA reserved for treatment-resistant cases; clozapine is specifically reserved for treatment-resistant schizophrenia due to its side-effect profile and monitoring requirements."}], "rationale": "Second-generation antipsychotics (SGAs) are usually chosen as first-line treatment for schizophrenia, with the exception of clozapine, which is reserved specifically for treatment-resistant schizophrenia due to its risk of agranulocytosis and need for regular WBC monitoring.", "tip": "NCLEX tip: Clozapine's role as a treatment-resistant, not first-line, option is one of the most consistently tested facts about SGAs — remember this exception clearly.", "id": "m7_98", "module": 7}, {"type": "mc", "stem": "A client taking clozapine for treatment-resistant schizophrenia requires which specific ongoing laboratory monitoring due to a risk of a serious blood disorder?", "options": [{"t": "Regular white blood cell (WBC) count monitoring for agranulocytosis", "c": true, "w": ""}, {"t": "Regular thyroid-stimulating hormone (TSH) monitoring for hypothyroidism", "c": false, "w": "TSH monitoring is specifically associated with lithium therapy, not clozapine, which requires WBC monitoring due to agranulocytosis risk."}, {"t": "Regular liver enzyme monitoring for hepatotoxicity as the primary concern", "c": false, "w": "While general monitoring is important with many psychiatric medications, the defining, required monitoring specifically associated with clozapine is WBC count due to agranulocytosis risk."}, {"t": "Regular serum drug level monitoring similar to lithium", "c": false, "w": "Clozapine does not require the same type of serum trough level monitoring as lithium; its defining required monitoring is WBC count due to the risk of agranulocytosis."}], "rationale": "Clozapine requires regular WBC count monitoring due to the risk of agranulocytosis (occurring in about 0.8% of clients) and neutropenia (about 2%), making this ongoing monitoring essential and a defining feature of clozapine therapy.", "tip": "NCLEX tip: Clozapine's mandatory WBC monitoring for agranulocytosis is one of the single most important, most frequently tested facts in psychiatric pharmacology.", "id": "m7_99", "module": 7}, {"type": "mc", "stem": "A client taking quetiapine (Seroquel) for schizophrenia should be monitored for which potentially serious cardiac effect?", "options": [{"t": "QTc prolongation", "c": true, "w": ""}, {"t": "Bradycardia with heart block as the primary cardiac concern", "c": false, "w": "While cardiac monitoring is important, the specific, defining cardiac risk associated with quetiapine highlighted in this content is QTc prolongation, not primarily bradycardia with heart block."}, {"t": "Hypertensive crisis as the primary cardiac concern", "c": false, "w": "Quetiapine's cardiac risk profile centers on QTc prolongation and related dysrhythmias, not hypertensive crisis."}, {"t": "Pericarditis as the primary cardiac concern", "c": false, "w": "Pericarditis is not identified as a recognized cardiac risk associated with quetiapine therapy in this content."}], "rationale": "Quetiapine (Seroquel) carries a risk of QTc prolongation, which can lead to serious cardiac dysrhythmias, syncope, and other significant cardiovascular events, making ECG monitoring an important safety consideration.", "tip": "NCLEX tip: QTc prolongation is a shared risk among several SGAs, including quetiapine and ziprasidone — always consider baseline and follow-up ECG monitoring needs for clients on these medications.", "id": "m7_100", "module": 7}, {"type": "mc", "stem": "A client is prescribed ziprasidone (Geodon) for schizophrenia. Which administration instruction is essential for the nurse to include?", "options": [{"t": "Take the medication with food to enhance absorption", "c": true, "w": ""}, {"t": "Take the medication on an empty stomach at least one hour before eating", "c": false, "w": "Ziprasidone should be taken with food, not on an empty stomach, to enhance its absorption and effectiveness."}, {"t": "Avoid all food and beverages for two hours after taking the medication", "c": false, "w": "There is no requirement to avoid food and beverages after taking ziprasidone; in fact, taking it with food is specifically recommended."}, {"t": "The medication can be taken with or without food with no difference in effectiveness", "c": false, "w": "Food intake does affect ziprasidone's absorption; taking it with food is specifically recommended to enhance its effectiveness."}], "rationale": "Ziprasidone (Geodon) should be taken with food to enhance absorption, in addition to requiring ECG monitoring due to its risk of QTc prolongation, similar to quetiapine.", "tip": "NCLEX tip: Ziprasidone and lurasidone both require administration with food for proper absorption — group these two medications together for this specific teaching point.", "id": "m7_101", "module": 7}, {"type": "mc", "stem": "A client taking olanzapine (Zyprexa) for schizophrenia should be monitored for which significant metabolic concern?", "options": [{"t": "Significant weight gain and increased risk of diabetes", "c": true, "w": ""}, {"t": "Significant weight loss and decreased appetite", "c": false, "w": "Olanzapine is specifically associated with significant weight gain (around 34%), not weight loss, along with increased diabetes risk."}, {"t": "Hypocalcemia as the primary metabolic concern", "c": false, "w": "Hypocalcemia is not the metabolic concern specifically associated with olanzapine; significant weight gain and increased diabetes risk are the key concerns."}, {"t": "Hyperkalemia as the primary metabolic concern", "c": false, "w": "Hyperkalemia is not the metabolic concern specifically associated with olanzapine; weight gain and diabetes risk are the key metabolic concerns to monitor."}], "rationale": "Olanzapine (Zyprexa) is associated with significant weight gain (approximately 34%) and an increased risk of diabetes, making metabolic monitoring, including weight, blood glucose, and lipid panels, an essential part of ongoing care.", "tip": "NCLEX tip: Olanzapine and clozapine both carry particularly high weight gain and metabolic risk among the SGAs — group these two medications together when studying metabolic side effects.", "id": "m7_102", "module": 7}, {"type": "mc", "stem": "Which second-generation antipsychotic is specifically noted as contraindicated for use in elderly clients with dementia, in addition to the general warning that applies to all antipsychotics in this population?", "options": [{"t": "Olanzapine", "c": true, "w": ""}, {"t": "Aripiprazole", "c": false, "w": "While all antipsychotics carry the general dementia-related mortality warning, olanzapine is specifically noted as not approved for elderly clients with dementia in this content, distinguishing it from aripiprazole."}, {"t": "Asenapine", "c": false, "w": "Asenapine is not the specific SGA highlighted as not approved for elderly clients with dementia in this content; olanzapine is specifically noted for this."}, {"t": "Brexpiprazole", "c": false, "w": "Brexpiprazole is not the specific SGA highlighted as not approved for elderly clients with dementia in this content; olanzapine is specifically noted for this."}], "rationale": "Olanzapine is specifically noted as not approved for use in elderly clients with dementia, in addition to the broader class warning that all antipsychotics are contraindicated in elderly clients with dementia due to a doubled mortality risk.", "tip": "NCLEX tip: Remember the universal antipsychotic warning (all antipsychotics double mortality risk in elderly clients with dementia) as a standalone safety fact, regardless of which specific drug is being discussed.", "id": "m7_103", "module": 7}, {"type": "mc", "stem": "Which first-generation antipsychotic is described as having the highest sedative and anticholinergic effects, along with a risk of sun sensitivity?", "options": [{"t": "Chlorpromazine (Thorazine)", "c": true, "w": ""}, {"t": "Haloperidol (Haldol)", "c": false, "w": "Haloperidol is a high-potency FGA with low sedation and low anticholinergic effects but high EPS risk, which is the opposite profile from the low-potency, highly sedating chlorpromazine."}, {"t": "Fluphenazine (Prolixin)", "c": false, "w": "Fluphenazine is a high-potency FGA with high EPS risk and low sedation, not the high sedation and anticholinergic profile described here."}, {"t": "Trifluoperazine (Stelazine)", "c": false, "w": "Trifluoperazine is a high-potency FGA with high EPS and low sedation, which is the opposite profile from the low-potency, highly sedating chlorpromazine."}], "rationale": "Chlorpromazine (Thorazine) is a low-potency FGA with the highest sedative and hypotensive effects and high anticholinergic activity among the FGAs, along with a risk of sun sensitivity and a lowered seizure threshold.", "tip": "NCLEX tip: Remember the potency-side effect relationship for FGAs — low potency (chlorpromazine, thioridazine) means higher sedation/anticholinergic effects but fewer EPS, while high potency (haloperidol, fluphenazine, trifluoperazine) means the reverse.", "id": "m7_104", "module": 7}, {"type": "mc", "stem": "Why is thioridazine (Mellaril) generally not recommended as a first-line antipsychotic despite being effective for treatment-resistant schizophrenia?", "options": [{"t": "It carries a risk of severe, dose-related QTc prolongation that can cause fatal cardiac arrhythmias", "c": true, "w": ""}, {"t": "It has no significant side effects but is prohibitively expensive for most clients", "c": false, "w": "Cost is not the reason thioridazine is avoided as first-line therapy; its serious dose-related cardiac risk (fatal arrhythmias from QTc prolongation) is the primary concern."}, {"t": "It has been shown to be completely ineffective for treating any psychotic symptoms", "c": false, "w": "Thioridazine is not ineffective; it is used specifically for treatment-resistant schizophrenia, but its serious cardiac risk profile makes it inappropriate as first-line therapy."}, {"t": "It requires the same WBC monitoring protocol as clozapine, making it impractical", "c": false, "w": "Thioridazine's primary safety concern is severe dose-related ECG changes leading to fatal arrhythmias, not a WBC monitoring requirement like clozapine."}], "rationale": "Thioridazine (Mellaril) is reserved for treatment-resistant schizophrenia only and is not recommended as first-line therapy due to severe, dose-related ECG changes (prolonged QTc) that can result in fatal cardiac arrhythmias.", "tip": "NCLEX tip: Thioridazine's fatal arrhythmia risk from QTc prolongation is one of the most serious, specifically named cardiac risks among all antipsychotics — treat this as a high-priority safety fact.", "id": "m7_105", "module": 7}, {"type": "mc", "stem": "A client taking haloperidol develops masklike facial expression, a stiff and stooped posture, shuffling gait, and drooling. Which extrapyramidal symptom is this, and what is the typical onset window?", "options": [{"t": "Pseudoparkinsonism, with onset typically between 5 hours and 30 days", "c": true, "w": ""}, {"t": "Acute dystonic reaction, with onset typically between a few hours and 5 days", "c": false, "w": "Acute dystonic reaction presents with acute muscle spasms of the tongue, face, neck, and back, not the masklike facies, shuffling gait, and drooling described here, which are characteristic of pseudoparkinsonism."}, {"t": "Akathisia, with onset typically between 2 hours and 60 days", "c": false, "w": "Akathisia presents with restless, inner-driven motor agitation such as foot tapping or rocking, not the masklike facies and shuffling gait described here, which are characteristic of pseudoparkinsonism."}, {"t": "Tardive dyskinesia, with onset typically after months to years", "c": false, "w": "Tardive dyskinesia presents with involuntary facial and limb movements such as tongue protrusion and choreic movements, not the masklike facies and shuffling gait described here, which are characteristic of pseudoparkinsonism."}], "rationale": "Pseudoparkinsonism, with onset typically between 5 hours and 30 days after starting an antipsychotic, presents with masklike facies, a stiff or stooped posture, shuffling gait, drooling, and a characteristic \"pill-rolling\" tremor.", "tip": "NCLEX tip: Memorize the four major EPS types together with their onset windows — pseudoparkinsonism (5 hrs–30 days), acute dystonia (hrs–5 days), akathisia (2 hrs–60 days), and tardive dyskinesia (months–years).", "id": "m7_106", "module": 7}, {"type": "mc", "stem": "A client taking an antipsychotic medication suddenly develops severe spasms of the tongue and neck, with the eyes locked in an upward gaze. Which intervention should the nurse anticipate as the priority treatment?", "options": [{"t": "Administer diphenhydramine (Benadryl) or benztropine IM or IV", "c": true, "w": ""}, {"t": "Administer a beta blocker to manage the client's distress", "c": false, "w": "Beta blockers are used for akathisia, not acute dystonic reactions, which require diphenhydramine or benztropine for rapid relief."}, {"t": "Increase the dose of the current antipsychotic to override the reaction", "c": false, "w": "Increasing the antipsychotic dose would worsen, not treat, an acute dystonic reaction; the priority is administering diphenhydramine or benztropine for rapid relief."}, {"t": "Reassure the client that this reaction will resolve on its own without any treatment within a few hours", "c": false, "w": "Acute dystonic reactions are treated promptly with diphenhydramine or benztropine, since they are very frightening for the client and require rapid intervention rather than being left to resolve untreated."}], "rationale": "An acute dystonic reaction, including oculogyric crisis (eyes locked upward) and opisthotonos (tetanic heightening of the entire body), is treated with diphenhydramine (Benadryl) or benztropine given IM or IV, which typically provides relief within minutes; the nurse should stay with the frightened client until symptoms are relieved.", "tip": "NCLEX tip: Acute dystonic reactions are dramatic and frightening but respond rapidly to diphenhydramine or benztropine — recognize the oculogyric crisis and opisthotonos presentations as the classic exam description.", "id": "m7_107", "module": 7}, {"type": "mc", "stem": "A client taking an antipsychotic medication reports an inner sense of restlessness and is observed repeatedly tapping their foot and shifting their weight from side to side. This is sometimes mistaken for which other condition?", "options": [{"t": "Psychotic agitation", "c": true, "w": ""}, {"t": "Tardive dyskinesia", "c": false, "w": "Tardive dyskinesia involves involuntary facial and limb movements such as tongue protrusion, not the inner restlessness and foot tapping described here, which is characteristic of akathisia."}, {"t": "Pseudoparkinsonism", "c": false, "w": "Pseudoparkinsonism involves masklike facies, rigidity, and shuffling gait, not the inner restlessness and repetitive motor activity described here, which is characteristic of akathisia."}, {"t": "Neuroleptic malignant syndrome", "c": false, "w": "Neuroleptic malignant syndrome involves fever, severe rigidity, and autonomic instability, which is a distinct and more severe presentation from the restlessness described here, which is characteristic of akathisia."}], "rationale": "Akathisia, a distressing inner-driven motor restlessness with behaviors like foot tapping, rocking, or weight shifting, is sometimes mistaken for psychotic agitation, which can lead to an inappropriate increase in antipsychotic dosage rather than the appropriate treatment for akathisia.", "tip": "NCLEX tip: Misidentifying akathisia as psychotic agitation is a dangerous clinical trap — increasing the antipsychotic dose in response would worsen the akathisia rather than treat the underlying issue.", "id": "m7_108", "module": 7}, {"type": "mc", "stem": "A client who has taken an antipsychotic medication for several years develops involuntary tongue protrusion, lip smacking, and choreic movements of the limbs. What should the nurse understand about this condition?", "options": [{"t": "This is tardive dyskinesia, which has no known cure and does not always resolve even after the medication is discontinued", "c": true, "w": ""}, {"t": "This is acute dystonia, which will resolve quickly with diphenhydramine", "c": false, "w": "Acute dystonia involves sudden muscle spasms occurring within hours to days of starting a medication, not the involuntary tongue and limb movements developing after years of therapy, which is characteristic of tardive dyskinesia."}, {"t": "This is pseudoparkinsonism, which will resolve with an anticholinergic medication", "c": false, "w": "Pseudoparkinsonism involves rigidity, shuffling gait, and tremor, not the choreic limb movements and orofacial movements described here, which is characteristic of tardive dyskinesia."}, {"t": "This is a normal, expected long-term effect that requires no further evaluation", "c": false, "w": "Tardive dyskinesia is a serious, potentially irreversible condition requiring prompt recognition and evaluation, not something to be dismissed as normal or requiring no further action."}], "rationale": "Tardive dyskinesia (TD) develops after months to years of antipsychotic use and presents with involuntary orofacial movements (tongue protrusion, lip smacking) and choreic or athetoid limb movements; there is no known cure, and discontinuing the drug does not always relieve symptoms, occurring in 15-20% of those taking antipsychotics for more than 2 years.", "tip": "NCLEX tip: Use the AIMS (Abnormal Involuntary Movement Scale) test for early detection of tardive dyskinesia, and remember valbenazine (Ingrezza) as the first FDA-approved treatment specifically for TD.", "id": "m7_109", "module": 7}, {"type": "mc", "stem": "Which medication was the first FDA-approved treatment specifically for tardive dyskinesia?", "options": [{"t": "Valbenazine (Ingrezza)", "c": true, "w": ""}, {"t": "Trihexyphenidyl (Artane)", "c": false, "w": "Trihexyphenidyl is an anticholinergic agent used for pseudoparkinsonism, not the first FDA-approved treatment specifically for tardive dyskinesia."}, {"t": "Bromocriptine (Parlodel)", "c": false, "w": "Bromocriptine is a dopamine agonist used to treat NMS and pseudoparkinsonism, not the first FDA-approved treatment specifically for tardive dyskinesia."}, {"t": "Dantrolene (Dantrium)", "c": false, "w": "Dantrolene is used to treat neuroleptic malignant syndrome by reducing muscle rigidity, not the first FDA-approved treatment specifically for tardive dyskinesia."}], "rationale": "Valbenazine (Ingrezza), approved in 2017, was the first FDA-approved treatment specifically for tardive dyskinesia, representing an important advancement given that TD has no known cure and does not always resolve with drug discontinuation.", "tip": "NCLEX tip: Valbenazine's 2017 FDA approval specifically for TD is a distinct, memorable fact — don't confuse it with the anticholinergic agents used for other EPS types.", "id": "m7_110", "module": 7}, {"type": "mc", "stem": "Using the F-E-V-E-R mnemonic, which finding represents the 'R' component of neuroleptic malignant syndrome (NMS)?", "options": [{"t": "Severe muscle rigidity", "c": true, "w": ""}, {"t": "Rapid heart rate as the primary finding", "c": false, "w": "While vital sign instability including tachycardia is part of NMS, the specific 'R' in the F-E-V-E-R mnemonic refers to rigidity, not rapid heart rate specifically."}, {"t": "Restlessness with inability to sit still", "c": false, "w": "Restlessness is more characteristic of akathisia, not the specific 'R' for rigidity in the F-E-V-E-R mnemonic for NMS."}, {"t": "Rash appearing on the trunk and extremities", "c": false, "w": "A rash is not part of the F-E-V-E-R mnemonic for NMS; rash is more associated with a Stevens-Johnson type reaction from medications like lamotrigine."}], "rationale": "In the F-E-V-E-R mnemonic for neuroleptic malignant syndrome, 'R' stands for severe muscle Rigidity, alongside Fever, Elevated CPK/WBC, Vital sign instability, and Encephalopathy.", "tip": "NCLEX tip: F-E-V-E-R — Fever, Elevated CPK/WBC, Vital sign instability, Encephalopathy, Rigidity — is essential for quickly recognizing NMS, a potentially fatal complication of antipsychotic therapy.", "id": "m7_111", "module": 7}, {"type": "mc", "stem": "A client taking an antipsychotic medication develops a temperature of 104°F, severe muscle rigidity, confusion, and unstable blood pressure. What is the priority nursing action?", "options": [{"t": "Stop the neuroleptic medication immediately and transfer the client to a medical unit", "c": true, "w": ""}, {"t": "Administer an additional dose of the same antipsychotic to calm the client", "c": false, "w": "Administering an additional dose of the antipsychotic would worsen neuroleptic malignant syndrome; the medication must be stopped immediately."}, {"t": "Apply only comfort measures and continue to monitor without notifying the provider", "c": false, "w": "This presentation represents a potentially fatal emergency requiring immediate medication discontinuation, provider notification, and transfer to a medical unit, not simply continued observation."}, {"t": "Wait 24 hours to see if symptoms improve before taking any action", "c": false, "w": "Neuroleptic malignant syndrome requires immediate action; waiting 24 hours risks rapid progression and significant mortality risk."}], "rationale": "Neuroleptic malignant syndrome (NMS) is a potentially fatal complication (5-11% mortality) requiring the neuroleptic to be stopped immediately, transfer to a medical unit, and aggressive treatment including antipyretics, dantrolene to reduce muscle rigidity, and IV fluids for dehydration.", "tip": "NCLEX tip: NMS management follows a clear sequence — stop the drug immediately, transfer to medical care, then treat with antipyretics, dantrolene, and supportive fluids; early detection improves the chance of full recovery.", "id": "m7_112", "module": 7}, {"type": "mc", "stem": "Which of the following is a recognized risk factor for developing neuroleptic malignant syndrome (NMS)?", "options": [{"t": "Rapid dose titration and use of long-acting depot antipsychotic formulations", "c": true, "w": ""}, {"t": "Slow, gradual dose titration over several months", "c": false, "w": "Slow, gradual titration is protective compared to rapid dose titration, which is specifically identified as a risk factor for NMS."}, {"t": "Younger age at the time of antipsychotic initiation", "c": false, "w": "Older age, not younger age, is identified as a risk factor for NMS in this content."}, {"t": "Male gender at a ratio of 3:2 compared to female gender", "c": false, "w": "NMS risk is actually higher in females at a 3:2 ratio compared to males, which is the reverse of this statement."}], "rationale": "Risk factors for neuroleptic malignant syndrome include concomitant use of multiple psychotropic medications, older age, female gender (3:2 ratio), presence of a mood disorder (40%), rapid dose titration, higher dosages, and use of long-acting (depot) antipsychotic formulations.", "tip": "NCLEX tip: Remember that NMS risk is higher with rapid titration and depot formulations — this has direct implications for how cautiously new antipsychotic regimens should be initiated and adjusted.", "id": "m7_113", "module": 7}, {"type": "mc", "stem": "A client taking an antipsychotic medication is also prescribed an anticholinergic medication for an unrelated condition. Which combination effect should the nurse monitor for?", "options": [{"t": "Anticholinergic delirium, presenting with agitation, pressured speech, and hallucinations", "c": true, "w": ""}, {"t": "Serotonin syndrome, presenting with hyperreflexia and shivering", "c": false, "w": "Serotonin syndrome results from excess serotonergic activity, typically from combining serotonergic agents like SSRIs and MAOIs, not specifically from combining antipsychotics with anticholinergic medications."}, {"t": "Neuroleptic malignant syndrome, presenting with fever and severe rigidity", "c": false, "w": "While NMS is a risk of antipsychotic therapy generally, the specific combination effect of antipsychotics plus anticholinergic medications described in this content is anticholinergic delirium, not NMS."}, {"t": "Tardive dyskinesia, presenting with involuntary facial movements", "c": false, "w": "Tardive dyskinesia develops from long-term antipsychotic use itself, not specifically from the combination of an antipsychotic with an anticholinergic medication."}], "rationale": "The concurrent use of antipsychotics (which have their own anticholinergic properties) with additional anticholinergic medications can cause anticholinergic delirium, presenting with agitation, pressured and incoherent speech, and visual or auditory hallucinations.", "tip": "NCLEX tip: Anticholinergic delirium is a specific, additive drug-interaction risk to watch for whenever antipsychotics are combined with other anticholinergic agents, such as those used for EPS management.", "id": "m7_114", "module": 7}, {"type": "mc", "stem": "A client is prescribed lurasidone (Latuda) for bipolar depression. Which administration instruction is most important for the nurse to include?", "options": [{"t": "Take the medication with food totaling at least 350 calories", "c": true, "w": ""}, {"t": "Take the medication on a completely empty stomach for at least four hours", "c": false, "w": "Lurasidone should be taken with food (at least 350 calories), not on an empty stomach, to ensure adequate absorption."}, {"t": "Avoid taking the medication with any food or beverages containing calories", "c": false, "w": "This is the opposite of the correct instruction; lurasidone specifically requires food (at least 350 calories) for proper absorption."}, {"t": "Food intake has no effect on the absorption or effectiveness of this medication", "c": false, "w": "Food intake significantly affects lurasidone's absorption, which is why it must be taken with a meal containing at least 350 calories."}], "rationale": "Lurasidone (Latuda) should be taken with food totaling at least 350 calories to ensure adequate absorption; common side effects include sleepiness, akathisia, metabolic changes, and low WBC count.", "tip": "NCLEX tip: The specific '350 calorie' food requirement for lurasidone is a precise, testable detail distinguishing its administration instructions from other antipsychotics.", "id": "m7_115", "module": 7}, {"type": "bowtie", "stem": "A client taking haloperidol for schizophrenia develops a temperature of 103.5°F, severe muscle rigidity, an elevated CPK level, and confusion, with a heart rate of 128 and fluctuating blood pressure. Complete the bowtie: select the most likely condition, two priority nursing actions, and two parameters to monitor closely.", "left": {"label": "Most likely condition", "opts": ["Neuroleptic malignant syndrome (NMS)", "Acute dystonic reaction", "Tardive dyskinesia", "Akathisia"], "correct": [0]}, "center": {"label": "Priority nursing actions", "opts": ["Stop the antipsychotic medication immediately", "Notify the provider and prepare for transfer to a medical unit", "Administer an additional dose of haloperidol to reduce agitation", "Apply only a cooling blanket with no further action or notification needed", "Encourage the client to attend group therapy to distract from symptoms"], "correct": [0, 1]}, "right": {"label": "Parameters to monitor closely", "opts": ["Temperature and vital sign trends", "Level of consciousness and CPK trend", "Visual acuity", "Range of motion in fingers only"], "correct": [0, 1]}, "rationale": "This presentation of hyperthermia, severe rigidity, elevated CPK, encephalopathy, and vital sign instability is classic for neuroleptic malignant syndrome, a potentially fatal complication requiring the antipsychotic to be stopped immediately, transfer to a medical unit, and close monitoring of vital signs, CPK trend, and mental status while aggressive treatment is initiated.", "tip": "NCLEX tip: Recognize the F-E-V-E-R pattern (Fever, Elevated CPK/WBC, Vital sign instability, Encephalopathy, Rigidity) as the fastest way to identify NMS in a bowtie or scenario-based question.", "id": "m7_116", "module": 7}, {"type": "mc", "stem": "Which psychosocial program provides 24/7 team-based case management for marginally adjusted, poorly functioning clients with schizophrenia, addressing nearly all aspects of daily living?", "options": [{"t": "Program of Assertive Community Treatment (PACT/ACT)", "c": true, "w": ""}, {"t": "Family-Focused Therapy (FFT)", "c": false, "w": "FFT is a family-based psychoeducation and communication skills intervention, not a 24/7 team-based case management program for marginally functioning clients."}, {"t": "Cognitive Remediation", "c": false, "w": "Cognitive remediation focuses on improving attention, memory, and executive function through learning activities, not 24/7 case management addressing daily living needs."}, {"t": "Social Skills Training (SST)", "c": false, "w": "SST focuses specifically on improving social interactions and community functioning, not the broad 24/7 case management addressing food, shelter, grooming, and other daily living needs."}], "rationale": "PACT (Program of Assertive Community Treatment) provides 24/7 team-based case management for the most marginally adjusted, poorly functioning clients with schizophrenia, addressing nearly all aspects of daily living including food, shelter, grooming, budgeting, and transportation, and has been shown to reduce hospital admissions and improve quality of life.", "tip": "NCLEX tip: PACT/ACT is specifically targeted at the most functionally impaired clients — recognize this distinguishing feature compared to other psychosocial therapies aimed at higher-functioning individuals.", "id": "m7_117", "module": 7}, {"type": "mc", "stem": "A family caring for a member with schizophrenia frequently engages in yelling, criticism, and overinvolvement in the client's daily activities. Which concept does this represent, and what is its clinical significance?", "options": [{"t": "High expressed emotion (EE), which is correlated with higher relapse rates", "c": true, "w": ""}, {"t": "Low expressed emotion (EE), which is correlated with higher relapse rates", "c": false, "w": "This reverses the actual relationship; high, not low, expressed emotion is correlated with higher relapse rates in schizophrenia."}, {"t": "Family enmeshment, which has no established relationship to relapse rates", "c": false, "w": "While the family pattern described could be considered enmeshed, the specific, named concept from this content is expressed emotion, and it does have an established, documented relationship to relapse rates."}, {"t": "Codependency, which is unrelated to schizophrenia relapse risk", "c": false, "w": "Codependency is not the specific concept described in this content; expressed emotion (EE) is the concept, and it is directly correlated with relapse risk in schizophrenia."}], "rationale": "High expressed emotion (EE), characterized by overinvolvement, yelling, fighting, and critical comments within a family, is correlated with higher relapse rates in schizophrenia; teaching families low-EE skills can reduce relapse and improve caregiver well-being.", "tip": "NCLEX tip: Expressed emotion (EE) is a key, testable family dynamics concept — high EE increases relapse risk, so family psychoeducation aimed at reducing EE is a core evidence-based intervention.", "id": "m7_118", "module": 7}, {"type": "mc", "stem": "Which psychosocial intervention for schizophrenia is described as most effective when implemented early in the course of the illness, focusing on improving attention, memory, language, and executive function through structured learning activities?", "options": [{"t": "Cognitive remediation", "c": true, "w": ""}, {"t": "Program of Assertive Community Treatment (PACT)", "c": false, "w": "PACT focuses on case management and daily living support for marginally functioning clients, not specifically structured learning activities targeting cognitive domains."}, {"t": "Family psychoeducation", "c": false, "w": "Family psychoeducation focuses on educating and supporting the family unit, not structured learning activities targeting the client's own cognitive domains."}, {"t": "Recovery-oriented cognitive-behavioral therapy (CT-R)", "c": false, "w": "CT-R targets distress from psychotic symptoms and self-defeating beliefs, which is related to but distinct from cognitive remediation's specific focus on structured learning activities for attention, memory, and executive function."}], "rationale": "Cognitive remediation uses structured learning activities to improve attention, memory, language, and executive function, and is most effective when implemented early in the course of schizophrenia, before more entrenched cognitive decline occurs.", "tip": "NCLEX tip: Cognitive remediation's 'early course' timing detail is important — like many interventions in schizophrenia, earlier implementation is associated with better outcomes.", "id": "m7_119", "module": 7}, {"type": "mc", "stem": "Which psychosocial therapy for schizophrenia specifically improves social interactions and community functioning while reducing relapse rates and improving quality of life?", "options": [{"t": "Social Skills Training (SST)", "c": true, "w": ""}, {"t": "Cognitive-Behavioral Therapy (CT-R)", "c": false, "w": "CT-R targets distress from psychotic symptoms and self-defeating beliefs rather than specifically focusing on social interaction skills and community functioning."}, {"t": "Cognitive remediation", "c": false, "w": "Cognitive remediation focuses on attention, memory, and executive function through structured learning activities, not specifically social interaction skills."}, {"t": "Program of Assertive Community Treatment (PACT)", "c": false, "w": "PACT focuses on comprehensive case management and daily living support, not specifically structured social skills training."}], "rationale": "Social Skills Training (SST) improves social interactions and community functioning, reduces relapse rates, and improves quality of life for individuals with schizophrenia by teaching and practicing specific interpersonal skills.", "tip": "NCLEX tip: Match each schizophrenia psychosocial therapy to its primary focus — SST for social skills, cognitive remediation for cognitive domains, CT-R for psychotic symptom distress, PACT for comprehensive case management.", "id": "m7_120", "module": 7}, {"type": "mc", "stem": "According to the Recovery Model of Mental Illness, which four dimensions support recovery for individuals with schizophrenia?", "options": [{"t": "Health, home, purpose, and community", "c": true, "w": ""}, {"t": "Medication, therapy, hospitalization, and case management", "c": false, "w": "While these are treatment components, they are not the four specific dimensions of the Recovery Model, which are health, home, purpose, and community."}, {"t": "Diagnosis, prognosis, treatment, and follow-up", "c": false, "w": "These are general clinical care concepts, not the four specific dimensions of the Recovery Model described in this content."}, {"t": "Insight, adherence, stability, and independence", "c": false, "w": "While these concepts relate to recovery broadly, they are not the four specific named dimensions of the Recovery Model, which are health, home, purpose, and community."}], "rationale": "The Recovery Model of Mental Illness identifies four dimensions supporting recovery: health (overcoming or managing disease), home (a stable place to live), purpose (meaningful daily activities and resources), and community (supportive relationships and hope).", "tip": "NCLEX tip: Memorize the four Recovery Model dimensions (health, home, purpose, community) as a set, since this framework applies broadly across serious mental illness, not just schizophrenia.", "id": "m7_121", "module": 7}, {"type": "mc", "stem": "Which program specifically combines medication management, psychosocial therapies, case management, family involvement, and supported education/employment for individuals experiencing their first episode of psychosis?", "options": [{"t": "RAISE Project (Recovery After an Initial Schizophrenia Episode)", "c": true, "w": ""}, {"t": "Program of Assertive Community Treatment (PACT)", "c": false, "w": "PACT is designed for the most marginally functioning, chronically ill clients rather than specifically targeting individuals experiencing their first episode of psychosis."}, {"t": "WRAP (Wellness Recovery Action Plan)", "c": false, "w": "WRAP is a formalized recovery program emphasizing hope, personal responsibility, and self-advocacy, but it is not the specific program combining medication, psychosocial therapy, case management, and supported education/employment for first-episode psychosis."}, {"t": "Family-Focused Therapy (FFT)", "c": false, "w": "FFT is a family-based psychoeducation intervention, not the comprehensive first-episode psychosis program combining medication, case management, and supported education/employment described here."}], "rationale": "The RAISE Project (Recovery After an Initial Schizophrenia Episode) combines medication, psychosocial therapies, case management, family involvement, and supported education/employment specifically for individuals experiencing first-episode psychosis, leading to improved symptoms, interpersonal relationships, and quality of life.", "tip": "NCLEX tip: RAISE is specifically targeted at first-episode psychosis, reflecting the broader theme in this content that earlier, comprehensive intervention leads to better long-term outcomes in schizophrenia.", "id": "m7_122", "module": 7}, {"type": "mc", "stem": "A nurse is explaining WRAP (Wellness Recovery Action Plan) to a client with schizophrenia. Which statement best reflects the core philosophy of this program?", "options": [{"t": "\"WRAP emphasizes hope, personal responsibility, self-advocacy, and support as core elements of your recovery.\"", "c": true, "w": ""}, {"t": "\"WRAP requires you to give full control of your treatment decisions to your case manager.\"", "c": false, "w": "This contradicts the core philosophy of WRAP, which specifically emphasizes personal responsibility and self-advocacy on the part of the client, not transferring control to a case manager."}, {"t": "\"WRAP is only appropriate for clients who have never experienced a relapse.\"", "c": false, "w": "WRAP is not restricted to clients who have never relapsed; it is a broadly applicable, evidence-based recovery program listed in the SAMHSA National Registry."}, {"t": "\"WRAP focuses exclusively on medication management and does not address other areas of daily functioning.\"", "c": false, "w": "WRAP is a broader wellness and recovery framework emphasizing hope, responsibility, self-advocacy, and support, not an exclusively medication-focused program."}], "rationale": "WRAP (Wellness Recovery Action Plan) is a formalized recovery program emphasizing hope, personal responsibility, self-advocacy, and support, and is listed in the SAMHSA National Registry of Evidence-Based Programs.", "tip": "NCLEX tip: WRAP's four core themes — hope, personal responsibility, self-advocacy, and support — reflect the broader recovery-oriented philosophy that underlies modern schizophrenia care.", "id": "m7_123", "module": 7}, {"type": "sata", "stem": "A nurse is teaching a client and family about lithium therapy. Which statements by the client indicate correct understanding? Select all that apply.", "options": [{"t": "\"I will take my lithium with food to help prevent stomach upset.\"", "c": true, "w": ""}, {"t": "\"I need to keep my salt and fluid intake fairly consistent from day to day.\"", "c": true, "w": ""}, {"t": "\"If I get a bad stomach virus with a lot of vomiting, I should call my provider and may need to stop the lithium temporarily.\"", "c": true, "w": ""}, {"t": "\"I can take ibuprofen whenever I need it for headaches without any concern.\"", "c": false, "w": "NSAIDs like ibuprofen can increase lithium levels and raise the risk of toxicity, so this statement reflects a need for further teaching, not correct understanding."}, {"t": "\"Since lithium isn't addictive, I can stop taking it abruptly whenever I want without any risk.\"", "c": false, "w": "While lithium is not addictive, it should be tapered gradually rather than stopped abruptly, since abrupt discontinuation increases the risk of relapse."}], "rationale": "Correct lithium teaching includes taking the medication with food, maintaining consistent salt and fluid intake, and knowing to contact the provider during illness involving significant fluid loss; clients should avoid NSAIDs and should not stop the medication abruptly without provider guidance.", "tip": "NCLEX tip: Lithium teaching questions often mix accurate statements about administration and monitoring with dangerous misconceptions about NSAID use or abrupt discontinuation — read each option carefully.", "id": "m7_124", "module": 7}, {"type": "sata", "stem": "A nurse is caring for a client in acute mania. Which nursing interventions are appropriate for this client? Select all that apply.", "options": [{"t": "Provide a low-stimulation environment away from bright lights and loud noises", "c": true, "w": ""}, {"t": "Offer frequent high-calorie, high-protein finger foods", "c": true, "w": ""}, {"t": "Use firm, calm, and consistent communication with clear limits", "c": true, "w": ""}, {"t": "Encourage extensive group therapy sessions with detailed verbal processing", "c": false, "w": "Extensive verbal processing in group settings is difficult for a manic client with a short attention span and can increase stimulation; structured, low-stimulation activities are preferred."}, {"t": "Allow the client unrestricted access to personal finances and valuables during hospitalization", "c": false, "w": "Given the impaired judgment characteristic of mania, the client's valuables and finances should be protected, such as by holding them in the hospital safe, rather than allowing unrestricted access."}], "rationale": "Appropriate nursing interventions for acute mania include a low-stimulation environment, frequent accessible high-calorie foods, and firm, calm, consistent communication with clear limits, while extensive group processing and unrestricted financial access are avoided given the client's impaired judgment and attention span.", "tip": "NCLEX tip: Group acute mania interventions into three categories — environment (low stimulation), physical needs (nutrition, hydration, sleep), and communication (firm, calm, consistent) — to organize your review.", "id": "m7_125", "module": 7}, {"type": "sata", "stem": "Which of the following are recognized types of delusions that may be experienced by a client with schizophrenia? Select all that apply.", "options": [{"t": "Persecutory delusion", "c": true, "w": ""}, {"t": "Grandiose delusion", "c": true, "w": ""}, {"t": "Somatic delusion", "c": true, "w": ""}, {"t": "Circumstantiality", "c": false, "w": "Circumstantiality is a formal thought disorder involving excessive irrelevant detail before eventually answering a question, not a type of delusion."}, {"t": "Echopraxia", "c": false, "w": "Echopraxia is the mimicking of another person's movements, associated with catatonia, not a type of delusion."}], "rationale": "Recognized types of delusions include persecutory (false belief of being harmed), grandiose (unrealistic sense of superiority or special powers), and somatic (false belief about body changes), among others such as ideas of reference, jealousy, erotomania, nihilistic, and bizarre delusions.", "tip": "NCLEX tip: Keep delusions (fixed false beliefs) conceptually separate from formal thought disorders (associative looseness, circumstantiality, tangentiality) and catatonic features (echopraxia, waxy flexibility) when studying schizophrenia symptoms.", "id": "m7_126", "module": 7}, {"type": "sata", "stem": "A nurse is assessing a client with schizophrenia for negative symptoms. Which findings would the nurse expect to observe? Select all that apply.", "options": [{"t": "Flat, unchanging facial expression with minimal eye contact", "c": true, "w": ""}, {"t": "Lack of motivation to complete activities of daily living", "c": true, "w": ""}, {"t": "Restricted speech output, such as one-word answers", "c": true, "w": ""}, {"t": "Fixed false belief that neighbors are spying through the walls", "c": false, "w": "This describes a persecutory delusion, which is a positive symptom, not a negative symptom of schizophrenia."}, {"t": "Auditory hallucinations commenting on the client's behavior", "c": false, "w": "Auditory hallucinations are a positive symptom of schizophrenia, not a negative symptom."}], "rationale": "Negative symptoms of schizophrenia include affective blunting (flat affect), avolition (lack of motivation), and poverty of speech (restricted speech output), which are distinct from positive symptoms such as delusions and hallucinations.", "tip": "NCLEX tip: When a SATA item mixes negative symptoms with positive symptoms as distractors, use the 'add-on vs. deficit' framework — positive symptoms add something (delusions, hallucinations), negative symptoms take something away (motivation, expression, speech).", "id": "m7_127", "module": 7}, {"type": "sata", "stem": "Which of the following are recognized extrapyramidal symptoms (EPSs) associated with antipsychotic medication use? Select all that apply.", "options": [{"t": "Pseudoparkinsonism", "c": true, "w": ""}, {"t": "Acute dystonic reaction", "c": true, "w": ""}, {"t": "Akathisia", "c": true, "w": ""}, {"t": "Tardive dyskinesia", "c": true, "w": ""}, {"t": "Neuroleptic malignant syndrome", "c": false, "w": "Neuroleptic malignant syndrome is a separate, potentially fatal syndrome involving fever, rigidity, and autonomic instability; while related to antipsychotic use, it is not classified as one of the four classic extrapyramidal symptoms."}], "rationale": "The four classic extrapyramidal symptoms (EPSs) associated with antipsychotic use are pseudoparkinsonism, acute dystonic reaction, akathisia, and tardive dyskinesia; neuroleptic malignant syndrome is a distinct, separate, and more acutely life-threatening complication.", "tip": "NCLEX tip: Keep the four EPS types grouped together as a set, and remember that NMS, while related to antipsychotic therapy, is treated as a separate and more urgent complication requiring its own recognition pathway.", "id": "m7_128", "module": 7}, {"type": "sata", "stem": "A nurse is teaching a client's family about communication strategies when the client experiences auditory hallucinations. Which statements reflect appropriate teaching? Select all that apply.", "options": [{"t": "\"Ask directly whether the voices are telling them to hurt themselves or someone else.\"", "c": true, "w": ""}, {"t": "\"Acknowledge that the voices are real to them, even though you don't hear them yourself.\"", "c": true, "w": ""}, {"t": "\"Try to keep the environment calm and reduce excess noise or stimulation.\"", "c": true, "w": ""}, {"t": "\"Argue with your family member to convince them the voices aren't real.\"", "c": false, "w": "Arguing about the reality of the voices is not therapeutic and can increase defensiveness; acknowledging the experience while gently noting you don't hear them yourself is more appropriate."}, {"t": "\"Encourage them to isolate completely in a dark, silent room whenever voices occur.\"", "c": false, "w": "While reducing overstimulation is helpful, complete isolation is not the recommended approach; staying with the person and redirecting to reality-based activity is more therapeutic than promoting isolation."}], "rationale": "Appropriate strategies for hallucinations include directly assessing for command hallucinations, acknowledging that the voices are real to the client while gently noting the family member does not hear them, and maintaining a calm, low-stimulation environment, rather than arguing or promoting isolation.", "tip": "NCLEX tip: Hallucination communication strategies balance validation of the client's experience with gentle reality orientation — never fully agree that the voices are real, but never dismiss the client's experience either.", "id": "m7_129", "module": 7}, {"type": "fib", "stem": "According to DSM-5 criteria, a hypomanic episode must last at least _____ days.", "answers": ["4", "four"], "rationale": "A hypomanic episode must last at least four days, distinguishing it from a manic episode, which requires a duration of at least one week (or any duration if hospitalization is required).", "tip": "NCLEX tip: Remember the duration contrast — hypomania requires at least 4 days, while mania requires at least 1 week (or any duration with hospitalization).", "id": "m7_130", "module": 7}, {"type": "fib", "stem": "A client with bipolar disorder who has experienced four or more mood episodes within a 12-month period is described as having _____ cycling.", "answers": ["rapid"], "rationale": "Rapid cycling describes four or more mood episodes within a 12-month period and is associated with lower global functioning and greater resistance to standard treatment.", "tip": "NCLEX tip: 'Four or more episodes in 12 months' should immediately trigger the term 'rapid cycling' in your mind on any exam question.", "id": "m7_131", "module": 7}, {"type": "fib", "stem": "The most severe and rare form of mania, involving acute onset, rapid progression, clouded consciousness, disorientation, psychosis, and catatonia, is called _____ mania.", "answers": ["delirious"], "rationale": "Delirious mania is the most severe and rare form of mania, combining features of both delirium and mania, and is treated with high-dose benzodiazepines (such as lorazepam) and/or ECT.", "tip": "NCLEX tip: Delirious mania is a psychiatric emergency — don't confuse it with ordinary rapid cycling or a routine mixed episode.", "id": "m7_132", "module": 7}, {"type": "fib", "stem": "A client taking lithium has a serum level of 2.3 mEq/L. According to the lithium toxicity ranges, this level falls within the _____ toxicity range.", "answers": ["severe"], "rationale": "A lithium level of 2.3 mEq/L falls within the severe toxicity range (2.0–2.5 mEq/L), which can produce ataxia, blurred vision, clonic movements, seizures, stupor, severe hypotension, and coma.", "tip": "NCLEX tip: Practice quickly sorting a given lithium level into its correct toxicity range (therapeutic, early, advanced, severe, life-threatening) since NCLEX often tests this as a numeric matching question.", "id": "m7_133", "module": 7}, {"type": "fib", "stem": "The mnemonic used to remember the seven core symptoms of a manic episode is _____ _____.", "answers": ["dig fast"], "rationale": "DIG FAST stands for Distractibility, Impulsivity/reckless behavior, Grandiosity, Flight of ideas, Activity/energy increase, Sleep needs diminish, and Talkativeness — the seven core symptoms assessed in a manic episode.", "tip": "NCLEX tip: DIG FAST is one of the most important mnemonics in this module — be able to name all seven components without hesitation.", "id": "m7_134", "module": 7}, {"type": "fib", "stem": "The delusion in which a client believes that thoughts are being placed into their mind by an outside force is called thought _____.", "answers": ["insertion"], "rationale": "Thought insertion is the delusional belief that another person or force is placing thoughts into one's mind, distinct from thought broadcasting (others can hear my thoughts) and thought withdrawal (thoughts are being removed).", "tip": "NCLEX tip: Keep the three thought-related delusions distinct — insertion (putting thoughts in), withdrawal (taking thoughts out), and broadcasting (others hearing my thoughts).", "id": "m7_135", "module": 7}, {"type": "fib", "stem": "The catatonic feature in which a client performs all simple commands in a robot-like manner is called automatic _____.", "answers": ["obedience"], "rationale": "Automatic obedience is a catatonic feature in which the client performs all simple commands in a robot-like fashion, reflecting the profound abnormalities in motor behavior and volition seen in catatonia.", "tip": "NCLEX tip: Automatic obedience is essentially the opposite of negativism (which involves resisting or refusing commands) — understanding this contrast helps distinguish the various catatonic features.", "id": "m7_136", "module": 7}, {"type": "fib", "stem": "The potentially fatal complication of antipsychotic therapy characterized by fever, elevated CPK, vital sign instability, encephalopathy, and rigidity is called neuroleptic malignant _____.", "answers": ["syndrome"], "rationale": "Neuroleptic malignant syndrome (NMS) is a potentially fatal complication of antipsychotic therapy with a mortality rate of approximately 5-11%, requiring immediate recognition, discontinuation of the causative drug, and aggressive supportive treatment.", "tip": "NCLEX tip: Use the F-E-V-E-R mnemonic (Fever, Elevated CPK/WBC, Vital sign instability, Encephalopathy, Rigidity) to quickly recall the defining features of NMS.", "id": "m7_137", "module": 7}, {"type": "fib", "stem": "The rare but serious complication of clozapine therapy requiring regular white blood cell count monitoring is called _____.", "answers": ["agranulocytosis"], "rationale": "Agranulocytosis, occurring in approximately 0.8% of clients taking clozapine, is a serious blood disorder requiring regular WBC count monitoring throughout clozapine therapy.", "tip": "NCLEX tip: Agranulocytosis risk is the defining reason clozapine requires mandatory WBC monitoring and is reserved for treatment-resistant schizophrenia rather than first-line use.", "id": "m7_138", "module": 7}, {"type": "fib", "stem": "The medication given IV or IM to rapidly relieve an acute dystonic reaction, in addition to benztropine, is diphenhydramine, also known by the trade name _____.", "answers": ["benadryl"], "rationale": "Diphenhydramine (Benadryl) given IM or IV provides relief from an acute dystonic reaction within minutes, alongside benztropine, and the nurse should stay with the frightened client until the medication takes effect.", "tip": "NCLEX tip: Diphenhydramine and benztropine are the two go-to medications for rapid relief of an acute dystonic reaction — know both by generic and trade name.", "id": "m7_139", "module": 7}, {"type": "sata", "stem": "A nurse is assessing a client for risk factors of bipolar disorder. Which of the following are recognized risk factors? Select all that apply.", "options": [{"t": "A first-degree relative with bipolar disorder", "c": true, "w": ""}, {"t": "A history of disrupted sleep-wake patterns and circadian rhythm instability", "c": true, "w": ""}, {"t": "A recent history of significant stressful life events", "c": true, "w": ""}, {"t": "Regular, consistent daily exercise with adequate sleep hygiene", "c": false, "w": "Regular exercise and good sleep hygiene are protective health behaviors, not recognized risk factors for developing bipolar disorder."}, {"t": "A stable, low-stress home environment with strong family support", "c": false, "w": "A stable, supportive, low-stress environment is protective rather than a risk factor for developing bipolar disorder."}], "rationale": "Recognized risk factors for bipolar disorder include a family history in first-degree relatives, disrupted circadian rhythms and sleep-wake patterns (consistent with social rhythm theory), and significant stressful life events, while stable routines, adequate sleep, and strong support are protective rather than risk-increasing factors.", "tip": "NCLEX tip: Bipolar disorder risk factors cluster around genetics, disrupted rhythms, and stress — the same themes reflected in the BAS dysregulation model and social rhythm theory.", "id": "m7_140", "module": 7}, {"type": "sata", "stem": "Which of the following are appropriate nursing interventions when caring for a client experiencing a persecutory delusion? Select all that apply.", "options": [{"t": "Avoid arguing with or attempting to logically correct the delusional belief", "c": true, "w": ""}, {"t": "Avoid touching the client without warning, since this may be misinterpreted as threatening", "c": true, "w": ""}, {"t": "Identify and address the underlying feelings, such as fear or helplessness", "c": true, "w": ""}, {"t": "Directly confront the client with evidence disproving the delusion", "c": false, "w": "Direct confrontation with evidence tends to increase defensiveness and reinforce the delusional belief rather than help the client, so this is not an appropriate intervention."}, {"t": "Stand directly in front of the client and maintain continuous direct eye contact", "c": false, "w": "Direct, face-to-face positioning and continuous eye contact can be perceived as confrontational; standing beside the client and avoiding direct eye contact is more appropriate for a paranoid or delusional client."}], "rationale": "Appropriate nursing interventions for delusions include avoiding argument or logical correction, avoiding unexpected touch, and addressing underlying feelings rather than the delusional content itself; direct confrontation and face-to-face positioning with continuous eye contact can increase defensiveness and are avoided.", "tip": "NCLEX tip: Delusion management interventions consistently emphasize avoiding confrontation and validating underlying emotion rather than debating the factual content of the delusion.", "id": "m7_141", "module": 7}, {"type": "sata", "stem": "Which of the following are recognized components of the DIG FAST mnemonic used to assess for a manic episode? Select all that apply.", "options": [{"t": "Distractibility", "c": true, "w": ""}, {"t": "Grandiosity", "c": true, "w": ""}, {"t": "Talkativeness or pressured speech", "c": true, "w": ""}, {"t": "Anhedonia", "c": false, "w": "Anhedonia, the inability to experience pleasure, is a negative symptom associated with schizophrenia and depression, not a component of the DIG FAST manic episode mnemonic."}, {"t": "Avolition", "c": false, "w": "Avolition, a lack of motivation, is a negative symptom associated with schizophrenia, not a component of the DIG FAST manic episode mnemonic."}], "rationale": "DIG FAST includes Distractibility, Impulsivity, Grandiosity, Flight of ideas, Activity/energy increase, Sleep needs diminish, and Talkativeness — all reflecting symptoms of a manic episode, distinct from negative symptoms like anhedonia and avolition, which are associated with schizophrenia.", "tip": "NCLEX tip: If an answer choice describes a symptom of reduced function or motivation (anhedonia, avolition), it does not belong in the DIG FAST mania mnemonic, which describes increased, excessive symptoms.", "id": "m7_142", "module": 7}, {"type": "sata", "stem": "Which of the following clients would be at increased risk for developing tardive dyskinesia? Select all that apply.", "options": [{"t": "A client who has taken a first-generation antipsychotic for over two years", "c": true, "w": ""}, {"t": "A client taking haloperidol at a high, long-term maintenance dose", "c": true, "w": ""}, {"t": "A client who has recently started an antipsychotic within the past 48 hours", "c": false, "w": "Tardive dyskinesia develops after months to years of antipsychotic use, not within the first 48 hours, which is more consistent with the timeframe for an acute dystonic reaction."}, {"t": "A client taking an antipsychotic medication for the first time this week at a low dose", "c": false, "w": "Tardive dyskinesia is a long-term complication developing after months to years of use, not something expected after only a week of low-dose therapy."}, {"t": "A client who has been on long-term antipsychotic therapy without any drug holidays", "c": true, "w": ""}], "rationale": "Tardive dyskinesia risk increases with longer duration of antipsychotic use (occurring in 15-20% of those on antipsychotics for more than 2 years) and higher doses, distinguishing it from early-onset EPS like acute dystonic reactions, which occur within hours to days of starting therapy.", "tip": "NCLEX tip: Duration of therapy is the single most important risk factor to identify for tardive dyskinesia — always check how long the client has been taking the antipsychotic.", "id": "m7_143", "module": 7}, {"type": "sata", "stem": "A nurse is reviewing risk factors for neuroleptic malignant syndrome (NMS) with a nursing student. Which of the following are accurate risk factors? Select all that apply.", "options": [{"t": "Rapid titration of antipsychotic dosage", "c": true, "w": ""}, {"t": "Use of a long-acting depot antipsychotic formulation", "c": true, "w": ""}, {"t": "Female gender", "c": true, "w": ""}, {"t": "Slow, gradual antipsychotic dose increases over several months", "c": false, "w": "Slow, gradual titration is protective compared to rapid titration, which is the risk factor specifically identified for NMS."}, {"t": "Younger age at the start of antipsychotic therapy", "c": false, "w": "Older, not younger, age is identified as a risk factor for NMS."}], "rationale": "Risk factors for NMS include rapid dose titration, use of long-acting depot formulations, older age, female gender (3:2 ratio), presence of a mood disorder, higher dosages, and concomitant use of multiple psychotropic medications.", "tip": "NCLEX tip: NMS risk factors emphasize speed and intensity of dosing changes — rapid titration and depot formulations both increase risk compared to slower, more gradual dosing approaches.", "id": "m7_144", "module": 7}, {"type": "sata", "stem": "Which of the following are appropriate components of psychoeducation for a family caring for a member with bipolar disorder, according to Box 16.3? Select all that apply.", "options": [{"t": "Providing information about the disease process, medications, and treatment options", "c": true, "w": ""}, {"t": "Facilitating emotional discharge by allowing family members to discuss frustrations", "c": true, "w": ""}, {"t": "Supporting medication adherence and developing a relapse-prevention plan", "c": true, "w": ""}, {"t": "Discouraging the family from seeking any additional support resources or groups", "c": false, "w": "Psychoeducation encourages, rather than discourages, family engagement with support resources and self-help strategies as part of comprehensive care."}, {"t": "Teaching self-help strategies such as sleep hygiene and stress management techniques", "c": true, "w": ""}], "rationale": "The four broad goals of psychoeducation for bipolar disorder include providing information, facilitating emotional discharge, supporting medication adherence and relapse prevention, and teaching self-help strategies such as sleep hygiene, avoiding alcohol/drugs, and stress management — discouraging support resource use is inconsistent with these goals.", "tip": "NCLEX tip: Psychoeducation is always about building the family's capacity and resources, never about limiting their access to information or support.", "id": "m7_145", "module": 7}]};
