<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adults I Exam 3 Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1A2B;
  --bg-deep:#0A1420;
  --panel:#132338;
  --panel-2:#182B45;
  --line:#28405E;
  --line-soft:#1E3350;
  --text:#EAF2F8;
  --text-dim:#9FB4CC;
  --text-mute:#6C7F98;
  --teal:#3FE0B0;
  --teal-dim:#1E6B57;
  --amber:#F5B942;
  --amber-dim:#7A5A1E;
  --coral:#FF6E63;
  --coral-dim:#7A2E28;
  --green:#5FE08A;
  --violet:#B79CFF;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at top, #102338 0%, var(--bg-deep) 70%);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  line-height:1.5;
}
.app{max-width:900px;margin:0 auto;padding:28px 20px 80px;}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;margin:0;}
.mono{font-family:'IBM Plex Mono',monospace;}
.hidden{display:none !important;}

/* ---- Top bar / vitals strip ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:38px;height:38px;flex-shrink:0;}
.brand-text h1{font-size:20px;letter-spacing:0.2px;}
.brand-text p{margin:2px 0 0;font-size:12px;color:var(--text-mute);font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;}
.home-btn{
  background:var(--panel);border:1px solid var(--line);color:var(--text-dim);
  border-radius:10px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:border-color .15s, color .15s;
}
.home-btn:hover{border-color:var(--teal-dim);color:var(--teal);}

/* ---- ECG waveform divider ---- */
.ecg-strip{width:100%;height:34px;margin-bottom:26px;overflow:hidden;}
.ecg-strip svg{width:100%;height:100%;display:block;}
.ecg-line{fill:none;stroke:var(--teal);stroke-width:1.6;opacity:0.75;}

/* ---- Home screen ---- */
.hero{margin-bottom:30px;}
.hero .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--amber);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.hero h2{font-size:34px;line-height:1.15;max-width:600px;}
.hero p{color:var(--text-dim);max-width:560px;margin-top:12px;font-size:15px;}

.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:22px;}
.mod-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:transform .15s,border-color .15s;position:relative;overflow:hidden;
}
.mod-card:hover{transform:translateY(-3px);border-color:var(--teal-dim);}
.mod-card .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-mute);letter-spacing:1px;text-transform:uppercase;}
.mod-card h3{font-size:19px;margin:8px 0 6px;}
.mod-card .desc{font-size:13px;color:var(--text-dim);margin-bottom:14px;}
.mod-card .stats{display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-mute);}
.mod-card .stats b{color:var(--teal);font-weight:600;}
.mod-card .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal-dim);}
.mod-card{cursor:default;}
.qcount-row{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.qcount-row label{font-size:12px;color:var(--text-mute);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:6px;}
.qcount-input{width:66px;background:var(--bg-deep);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:7px 8px;font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:center;}
.qcount-input:focus{outline:none;border-color:var(--teal-dim);}
.qcount-input::-webkit-outer-spin-button,.qcount-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.btn-start{padding:9px 16px;font-size:13px;white-space:nowrap;}
.qcount-hint{font-size:11px;color:var(--text-mute);width:100%;margin-top:2px;}

.remediation-banner{
  margin-top:22px;background:var(--panel-2);border:1px solid var(--amber-dim);border-radius:var(--radius);
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
}
.remediation-banner .txt strong{color:var(--amber);}
.remediation-banner .txt p{margin:4px 0 0;font-size:13px;color:var(--text-dim);}

/* ---- Buttons ---- */
.btn{
  border-radius:10px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);background:var(--panel);color:var(--text);
  transition:all .15s;font-family:'Inter',sans-serif;
}
.btn:hover{border-color:var(--teal-dim);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-primary{background:var(--teal);color:#062A22;border-color:var(--teal);}
.btn-primary:hover{background:#57e8bd;}
.btn-primary:disabled{background:var(--teal-dim);color:#0b1f1a;border-color:var(--teal-dim);}
.btn-ghost{background:transparent;}
.btn-amber{background:var(--amber);color:#3A2900;border-color:var(--amber);}
.btn-amber:hover{background:#ffca63;}
.btn-sm{padding:7px 13px;font-size:12.5px;}

/* ---- Quiz header ---- */
.quiz-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.quiz-head .modname{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px;}
.progress-wrap{display:flex;align-items:center;gap:10px;}
.progress-track{width:150px;height:6px;background:var(--line-soft);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .3s;}
.progress-txt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);}
.score-pill{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--panel);border:1px solid var(--line);padding:5px 12px;border-radius:20px;color:var(--green);}

/* ---- Question card ---- */
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px 26px 22px;margin-bottom:18px;}
.qtype-badge{
  display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-bottom:14px;
}
.qtype-mc{background:rgba(63,224,176,0.12);color:var(--teal);}
.qtype-sata{background:rgba(183,156,255,0.14);color:var(--violet);}
.qtype-fill{background:rgba(245,185,66,0.14);color:var(--amber);}
.qtype-bowtie{background:rgba(255,110,99,0.13);color:var(--coral);}
.qtype-hotspot{background:rgba(95,224,138,0.14);color:var(--green);}
.qstem{font-size:17px;line-height:1.55;margin-bottom:18px;}
.qstem b{color:var(--teal);}
.sata-hint{font-size:12px;color:var(--text-mute);margin:-10px 0 14px;font-style:italic;}

.opt{
  display:flex;align-items:flex-start;gap:12px;background:var(--panel-2);border:1px solid var(--line);
  border-radius:10px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:border-color .15s, background .15s;position:relative;
}
.opt:hover{border-color:var(--line);background:#1c3151;}
.opt .letter{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--bg-deep);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);
}
.opt .otext{font-size:14.5px;color:var(--text);padding-top:2px;}
.opt.selected{border-color:var(--teal);background:rgba(63,224,176,0.08);}
.opt.selected .letter{background:var(--teal);color:#062A22;border-color:var(--teal);}

.opt.correct-reveal{border-color:var(--green);background:rgba(95,224,138,0.1);}
.opt.correct-reveal .letter{background:var(--green);color:#08300f;border-color:var(--green);}
.opt.incorrect-reveal{border-color:var(--coral);background:rgba(255,110,99,0.08);}
.opt.incorrect-reveal .letter{background:var(--coral);color:#3a0a05;border-color:var(--coral);}
.opt .why-tip{
  display:none;position:absolute;left:0;top:calc(100% + 6px);z-index:5;background:var(--bg-deep);border:1px solid var(--coral-dim);
  border-radius:8px;padding:10px 13px;font-size:12.5px;color:var(--text-dim);width:100%;box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.opt.incorrect-reveal:hover .why-tip{display:block;}

.fill-row{display:flex;gap:10px;align-items:center;margin-top:6px;}
.fill-row input{
  flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;color:var(--text);
  padding:12px 14px;font-size:14.5px;font-family:'Inter',sans-serif;
}
.fill-row input:focus{outline:none;border-color:var(--teal);}
.fill-result{margin-top:10px;font-size:13.5px;padding:10px 13px;border-radius:8px;}
.fill-result.ok{background:rgba(95,224,138,0.1);color:var(--green);border:1px solid var(--green);}
.fill-result.no{background:rgba(255,110,99,0.1);color:var(--coral);border:1px solid var(--coral-dim);}

.bowtie-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.bowtie-col{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;}
.bowtie-col h4{font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-mute);margin:0 0 10px;font-family:'IBM Plex Mono',monospace;}
.bowtie-opt{font-size:13px;padding:9px 10px;border-radius:7px;border:1px solid var(--line);margin-bottom:7px;cursor:pointer;background:var(--bg-deep);}
.bowtie-opt.selected{border-color:var(--violet);background:rgba(183,156,255,0.12);}
.bowtie-opt.correct-reveal{border-color:var(--green);background:rgba(95,224,138,0.12);}
.bowtie-opt.incorrect-reveal{border-color:var(--coral);background:rgba(255,110,99,0.1);}
@media (max-width:640px){.bowtie-wrap{grid-template-columns:1fr;}}

.hotspot-passage{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:18px 20px;font-size:15px;line-height:1.8;}
.hs-span{cursor:pointer;border-bottom:1px dashed var(--text-mute);padding:1px 2px;border-radius:3px;}
.hs-span:hover{background:rgba(63,224,176,0.1);}
.hs-span.selected{background:rgba(183,156,255,0.18);border-bottom:1px dashed var(--violet);}
.hs-span.correct-reveal{background:rgba(95,224,138,0.22);border-bottom:1px solid var(--green);}
.hs-span.incorrect-reveal{background:rgba(255,110,99,0.18);border-bottom:1px solid var(--coral);}

/* ---- Reveal panels ---- */
.reveal{margin-top:18px;border-top:1px dashed var(--line);padding-top:18px;}
.reveal-block{border-radius:10px;padding:15px 17px;margin-bottom:12px;}
.reveal-rationale{background:rgba(63,224,176,0.07);border:1px solid var(--teal-dim);}
.reveal-tip{background:rgba(245,185,66,0.07);border:1px solid var(--amber-dim);}
.reveal-block .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.reveal-rationale .lbl{color:var(--teal);}
.reveal-tip .lbl{color:var(--amber);}
.reveal-block p{margin:0;font-size:14px;color:var(--text-dim);line-height:1.6;}

/* ---- Footer controls ---- */
.qfooter{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:6px;}
.nav-group{display:flex;gap:8px;flex-wrap:wrap;}

/* ---- Celebration ---- */
.celebrate{text-align:center;padding:50px 20px;}
.celebrate .big{font-size:64px;font-family:'Fraunces',serif;font-weight:600;color:var(--teal);}
.celebrate h2{font-size:26px;margin-top:6px;}
.celebrate p{color:var(--text-dim);max-width:480px;margin:14px auto 0;}
.celebrate .stat-row{display:flex;justify-content:center;gap:26px;margin:30px 0;flex-wrap:wrap;}
.celebrate .stat-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 26px;min-width:120px;}
.celebrate .stat-box .num{font-family:'IBM Plex Mono',monospace;font-size:28px;color:var(--teal);}
.celebrate .stat-box .lbl{font-size:12px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;}

/* ---- Remediation list ---- */
.rem-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.rem-item{background:var(--panel);border:1px solid var(--coral-dim);border-radius:10px;padding:14px 17px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;}
.rem-item .qtxt{font-size:13.5px;color:var(--text-dim);max-width:560px;}
.rem-item .qmod{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--text-mute);text-transform:uppercase;margin-bottom:4px;}

.empty-note{color:var(--text-mute);font-size:14px;text-align:center;padding:30px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const MOD8 = {
  key:'renal', title:'Module 8', subtitle:'Renal & Urologic Disorders',
  questions: [
{id:'r1',type:'mc',stem:'A client admitted after a motor vehicle crash has been hypotensive for several hours before IV fluids were started. Which category of acute kidney injury (AKI) is this presentation most consistent with?',
 options:[
  {t:'Postrenal AKI, because trauma frequently causes ureteral transection that blocks urine flow before it reaches the bladder',c:false,why:'Postrenal AKI is caused by an outflow obstruction (stones, clots, strictures, tumor), not by a period of hypotension. Ureteral transection is possible after trauma but is not the mechanism implied by prolonged low blood pressure.'},
  {t:'Prerenal AKI, because sustained hypotension reduces perfusion to otherwise healthy kidney tissue',c:true,why:''},
  {t:'Intrarenal AKI, because the impact of the crash directly bruises the glomeruli and tubular epithelium',c:false,why:'Direct structural trauma to the kidney can cause intrarenal injury, but the scenario specifically describes hypotension, not a direct blow to the flank; the more likely mechanism here is hypoperfusion.'},
  {t:'A nonoliguric variant of AKI that occurs only after exposure to nephrotoxic contrast dye',c:false,why:'Nonoliguric AKI is a pattern that can occur with nephrotoxic exposure, but nothing in the scenario mentions contrast dye, and this option does not address the hypotension described.'},
 ],
 rationale:'Prolonged hypotension decreases renal blood flow before intrinsic kidney damage occurs, which is the defining feature of prerenal AKI — the nephrons themselves are initially undamaged, they are simply underperfused.',
 tip:'NCLEX tip: when a stem gives you a cause of decreased blood flow to the kidney (hemorrhage, hypotension, dehydration, decreased cardiac output) before any mention of direct kidney damage, think prerenal first.'},

{id:'r2',type:'mc',stem:'The nurse is reviewing urine studies on a client with suspected AKI. Which finding is most consistent with a prerenal cause rather than an intrarenal cause?',
 options:[
  {t:'Urine sodium of 55 mEq/L with casts noted on microscopy',c:false,why:'An elevated urine sodium above 40 mEq/L along with casts/debris reflects tubular damage and is characteristic of intrarenal injury, the opposite of what the question asks for.'},
  {t:'Urine osmolality nearly identical to serum osmolality',c:false,why:'When the kidney can no longer concentrate urine, urine osmolality approaches serum osmolality — this is the intrarenal pattern, not the prerenal one.'},
  {t:'Concentrated urine with a urine sodium below 20 mEq/L',c:true,why:''},
  {t:'Gross hematuria with clots visible in the collection bag',c:false,why:'Visible clots and gross hematuria point toward a structural or postrenal problem such as obstruction from a clot, not a prerenal hemodynamic issue.'},
 ],
 rationale:'In prerenal AKI the kidney tissue itself still works normally, so it appropriately conserves sodium and concentrates the urine in response to poor perfusion, giving a low urine sodium and high osmolality.',
 tip:'NCLEX tip: think of prerenal AKI as a kidney that is "trying its best" with too little blood — it still concentrates urine and holds onto sodium.'},

{id:'r3',type:'mc',stem:'A client in the oliguric phase of AKI has a potassium level of 6.8 mEq/L with peaked T waves on the monitor. Which intervention should the nurse anticipate first?',
 options:[
  {t:'Administer sodium polystyrene sulfonate (Kayexalate) and recheck the level in six hours',c:false,why:'Kayexalate works over several hours and is appropriate for non-urgent hyperkalemia, but with ECG changes already present the client needs a faster-acting intervention first.'},
  {t:'Prepare for immediate hemodialysis as the sole initial treatment before any medications are given',c:false,why:'Dialysis is often still needed to remove the excess potassium, but arranging dialysis takes time; the client with ECG changes needs an immediate temporizing measure while dialysis is arranged.'},
  {t:'Administer IV regular insulin with dextrose and IV calcium gluconate',c:true,why:''},
  {t:'Restrict oral potassium intake and reassess the ECG in the morning',c:false,why:'Dietary restriction is appropriate longer-term management but does nothing to address the immediate, life-threatening ECG change happening right now.'},
 ],
 rationale:'IV dextrose with insulin shifts potassium intracellularly within minutes, and calcium stabilizes the cardiac membrane against the effects of hyperkalemia. These are temporary measures — the potassium is not removed from the body until dialysis is performed.',
 tip:'NCLEX tip: "shift it, then get rid of it." Insulin/dextrose and calcium buy time by shifting potassium into cells; only dialysis (or Kayexalate, more slowly) actually removes potassium from the body.'},

{id:'r4',type:'mc',stem:'Which phase of AKI places the client at the greatest risk for dehydration despite the kidneys beginning to recover?',
 options:[
  {t:'Initiation phase',c:false,why:'The initiation phase is the period when the injury first occurs, before oliguria develops; dehydration risk from excessive output is not the concern at this point.'},
  {t:'Oliguric phase',c:false,why:'During the oliguric phase urine output is low (commonly under 400 mL/day), so the concern is fluid overload and waste accumulation, not dehydration.'},
  {t:'Diuretic phase',c:true,why:''},
  {t:'Recovery phase',c:false,why:'By the recovery phase, which unfolds over months, urine output and concentrating ability have largely normalized, so the acute dehydration risk of the diuretic phase has passed.'},
 ],
 rationale:'In the diuretic phase, GFR is recovering but the tubules cannot yet concentrate urine well, so output can be very high before the kidney regains its regulatory ability — strict I&O is essential to catch dehydration early.',
 tip:'NCLEX tip: pair each AKI phase with its priority nursing focus — initiation: identify cause; oliguric: watch potassium; diuretic: watch for dehydration; recovery: monitor trend of labs over months.'},

{id:'r5',type:'sata',stem:'A client is diagnosed with intrarenal (intrinsic) AKI secondary to acute tubular necrosis. Which of the following are recognized causes of this category of AKI? Select all that apply.',
 options:[
  {t:'Prolonged exposure to aminoglycoside antibiotics',c:true,why:''},
  {t:'Severe rhabdomyolysis with myoglobinuria',c:true,why:''},
  {t:'A ureteral stone lodged at the ureterovesical junction',c:false,why:'A ureteral stone blocks urine outflow and is a classic postrenal cause, not an intrarenal one — the kidney tissue itself is not directly damaged by the stone.'},
  {t:'Radiographic contrast dye administered without adequate hydration',c:true,why:''},
  {t:'Severe hemorrhage causing sustained hypotension',c:false,why:'Sustained hypotension from hemorrhage reduces perfusion to the kidney, which is the mechanism of prerenal AKI, not direct intrarenal tissue injury.'},
  {t:'Heavy metal exposure',c:true,why:''},
 ],
 rationale:'Intrarenal AKI results from direct damage to the nephron itself. Nephrotoxic drugs, contrast dye, myoglobin from rhabdomyolysis, and heavy metals all directly injure tubular cells, producing acute tubular necrosis.',
 tip:'NCLEX tip: sort AKI causes by asking "is blood getting to the kidney (prerenal), is urine getting out (postrenal), or is the kidney tissue itself hurt (intrarenal)?"'},

{id:'r6',type:'sata',stem:'The nurse is teaching a client scheduled for a contrast-enhanced CT scan about strategies to reduce the risk of contrast-induced AKI. Which teaching points are appropriate? Select all that apply.',
 options:[
  {t:'"We will give you IV normal saline before and after the scan to keep your kidneys well hydrated."',c:true,why:''},
  {t:'"You will receive a dose of N-acetylcysteine an hour before the procedure to protect your kidneys."',c:false,why:'N-acetylcysteine was previously used for this purpose but is no longer recommended, since current evidence does not support a protective benefit.'},
  {t:'"Please let us know about any medications you take, including NSAIDs, so we can discuss holding them around the procedure."',c:true,why:''},
  {t:'"It is fine to come to the procedure fasting and dehydrated since the contrast itself will not affect your kidneys."',c:false,why:'This statement is inaccurate and dangerous — dehydration going into a contrast procedure significantly increases the risk of contrast-induced AKI, particularly in older adults or those with baseline kidney impairment.'},
  {t:'"We will check your baseline creatinine before the procedure since prior kidney impairment raises your risk."',c:true,why:''},
 ],
 rationale:'IV normal saline prehydration before and after a contrast procedure is the most effective proven strategy for preventing contrast-induced AKI. Reviewing baseline renal function and holding nephrotoxic medications when possible are also appropriate precautions.',
 tip:'NCLEX tip: remember that N-acetylcysteine has fallen out of favor for contrast-AKI prevention — if you see it as an answer choice for this purpose, be suspicious.'},

{id:'r7',type:'fill',stem:'A client in the oliguric phase of AKI is producing 280 mL of urine over 24 hours. According to the classic definition, oliguria in AKI is generally defined as urine output less than _____ mL/day.',
 answers:['400','400 ml','400ml','400 ml/day'],
 rationale:'Oliguria in AKI is generally defined as urine output below 400 mL/day (or less than 0.5 mL/kg/hr), reflecting a significant drop in glomerular filtration.',
 tip:'NCLEX tip: memorize the numeric cutoffs for urine output terms — oliguria <400 mL/day, anuria <100 mL/day — because the NCLEX often tests them as exact values.'},

{id:'r8',type:'fill',stem:'The classification system that grades AKI severity using the categories Risk, Injury, Failure, Loss, and End-stage kidney disease is called the _____ classification.',
 answers:['rifle','rifle classification'],
 rationale:'The RIFLE classification (Risk, Injury, Failure, Loss, ESKD) grades AKI severity based on changes in GFR/creatinine and urine output.',
 tip:'NCLEX tip: RIFLE is a helpful acronym — each letter also roughly corresponds to worsening severity, which can help you rank a client\'s AKI stage on an exam item.'},

{id:'r9',type:'mc',stem:'Which nursing action is the priority for a client who has an arteriovenous (AV) fistula in the left forearm for hemodialysis?',
 options:[
  {t:'Take blood pressures in the left arm to avoid disturbing the client\'s dominant right arm',c:false,why:'Blood pressure cuffs must never be applied to the access arm because the pressure can damage the fistula and compromise blood flow needed for dialysis.'},
  {t:'Auscultate for a bruit and palpate for a thrill over the fistula each shift',c:true,why:''},
  {t:'Encourage the client to keep the fistula arm immobilized in a sling at all times between treatments',c:false,why:'Routine immobilization is not required and can actually reduce circulation and increase clot risk; gentle normal use of the arm (without trauma or pressure) is encouraged.'},
  {t:'Draw all routine laboratory specimens from the fistula since it provides the most reliable venous access',c:false,why:'Venipuncture in the fistula arm is avoided whenever possible to protect the access from clotting, infection, or damage; other sites should be used for labs.'},
 ],
 rationale:'A patent AV fistula produces a palpable thrill and an audible bruit from turbulent blood flow. Assessing for both each shift is the key nursing action to detect early signs of clotting or occlusion before it becomes a full access failure.',
 tip:'NCLEX tip: "no BP, no IV, no blood draws" on the access arm is a classic must-know fact — pair it with checking for bruit/thrill as your two key nursing actions.'},

{id:'r10',type:'mc',stem:'A client receiving peritoneal dialysis calls the clinic to report that today\'s dialysate effluent looks cloudy. What should the nurse do first?',
 options:[
  {t:'Reassure the client that cloudy effluent is a normal variant related to dietary intake',c:false,why:'Cloudy effluent is not a benign or expected finding — it is the classic first sign of peritonitis and requires prompt evaluation, not reassurance.'},
  {t:'Instruct the client to come in for evaluation, including an effluent cell count and culture',c:true,why:''},
  {t:'Advise the client to increase the dextrose concentration of the next dialysate exchange',c:false,why:'Changing the dextrose concentration affects ultrafiltration and fluid removal, but does nothing to address a possible infection and is not an appropriate first response to cloudy effluent.'},
  {t:'Tell the client this is expected after several months of peritoneal dialysis and no action is needed',c:false,why:'Cloudy effluent is never an expected finding regardless of how long the client has been on PD; it must always be evaluated for peritonitis.'},
 ],
 rationale:'Cloudy dialysate effluent is the earliest and most common sign of peritonitis in a PD client, often accompanied later by abdominal pain and tenderness. It requires prompt in-person assessment along with effluent WBC count and culture.',
 tip:'NCLEX tip: "cloudy effluent equals peritonitis until proven otherwise" is a high-yield PD fact — expect it to appear as a scenario-based question.'},

{id:'r11',type:'mc',stem:'The nurse is caring for a client during the diuresis phase of AKI. Which assessment finding requires the most immediate follow-up?',
 options:[
  {t:'Urine output of 3800 mL over the past 24 hours',c:false,why:'A high urine output is expected during the diuresis phase as GFR recovers; it is not itself the most urgent finding unless paired with signs of volume depletion.'},
  {t:'Serum creatinine that has decreased slightly compared with yesterday',c:false,why:'A gradually declining creatinine reflects improving renal function and is a reassuring, expected trend during recovery, not a concerning finding.'},
  {t:'Postural blood pressure drop of 24 mmHg with reported dizziness on standing',c:true,why:''},
  {t:'Client reports mild fatigue that has been present throughout the hospitalization',c:false,why:'Ongoing mild fatigue is a nonspecific, longstanding symptom and is far less urgent than new orthostatic changes suggesting acute volume depletion.'},
 ],
 rationale:'The diuresis phase carries a real risk of dehydration because tubular concentrating ability lags behind the return of glomerular filtration. A significant orthostatic drop with dizziness signals volume depletion and needs prompt intervention.',
 tip:'NCLEX tip: orthostatic vital sign changes are a fast, low-tech way NCLEX tests for hypovolemia — always prioritize a new finding of dizziness with position change.'},

{id:'r12',type:'mc',stem:'A client with CKD has a glomerular filtration rate (GFR) of 42 mL/min/1.73m². According to the CKD staging system, this corresponds to which stage?',
 options:[
  {t:'Stage 2, mild decrease in kidney function',c:false,why:'Stage 2 CKD corresponds to a GFR of 60–89 mL/min/1.73m², which is a much higher value than the one given in the stem.'},
  {t:'Stage 3, moderate decrease in kidney function',c:true,why:''},
  {t:'Stage 4, severe decrease in kidney function',c:false,why:'Stage 4 corresponds to a GFR of 15–29 mL/min/1.73m², which is lower than the value given here.'},
  {t:'Stage 5, end-stage kidney disease requiring renal replacement therapy',c:false,why:'Stage 5 (ESKD) is defined as a GFR below 15 mL/min/1.73m², well below the value stated in this scenario.'},
 ],
 rationale:'CKD stage 3 spans a GFR of 30–59 mL/min/1.73m² and reflects a moderate decrease in kidney function; a GFR of 42 falls within this range.',
 tip:'NCLEX tip: memorize the CKD stage boundaries (≥90, 60-89, 30-59, 15-29, <15) — this is frequently tested as a straightforward numeric matching question.'},

{id:'r13',type:'mc',stem:'Which combination of conditions accounts for the majority of chronic kidney disease cases in the United States?',
 options:[
  {t:'Polycystic kidney disease and renal cell carcinoma',c:false,why:'These are recognized causes of CKD but together they account for only a small minority of overall cases compared with the leading causes.'},
  {t:'Diabetes mellitus and hypertension',c:true,why:''},
  {t:'Chronic pyelonephritis and recurrent nephrolithiasis',c:false,why:'Recurrent infection and stone disease can contribute to kidney damage over time but are not the leading causes of CKD nationally.'},
  {t:'Long-term NSAID use and glomerulonephritis',c:false,why:'NSAID nephrotoxicity and glomerulonephritis are contributing causes for some clients, but they do not account for the majority of CKD cases as a combined category.'},
 ],
 rationale:'Diabetes and hypertension together are responsible for roughly 70% of CKD cases, making blood glucose and blood pressure control central to CKD prevention and slowing progression.',
 tip:'NCLEX tip: whenever a question describes a client with long-standing diabetes or hypertension who develops kidney changes, connect the dots to CKD risk immediately.'},

{id:'r14',type:'sata',stem:'A client with stage 5 CKD (ESKD) is being assessed by the nurse. Which findings would the nurse expect related to mineral and bone disorders of CKD? Select all that apply.',
 options:[
  {t:'Elevated serum phosphorus',c:true,why:''},
  {t:'Low serum calcium',c:true,why:''},
  {t:'Elevated parathyroid hormone (PTH)',c:true,why:''},
  {t:'Elevated active vitamin D level',c:false,why:'Active vitamin D is typically decreased in CKD because the diseased kidney loses its ability to hydroxylate vitamin D into its active form, contributing further to hypocalcemia.'},
  {t:'Renal osteodystrophy with increased fracture risk',c:true,why:''},
 ],
 rationale:'As GFR falls, phosphorus is retained, which drives serum calcium down and stimulates secondary hyperparathyroidism. Active vitamin D production also falls. Together these changes produce renal osteodystrophy and raise fracture risk.',
 tip:'NCLEX tip: picture a chain reaction — phosphorus up, calcium down, PTH up, vitamin D down — and you can predict almost every CKD mineral-bone lab value from that one chain.'},

{id:'r15',type:'sata',stem:'The nurse is teaching a client newly diagnosed with CKD about dietary management. Which statements by the client indicate correct understanding? Select all that apply.',
 options:[
  {t:'"I should work with a renal dietitian to individualize my protein, sodium, and potassium intake."',c:true,why:''},
  {t:'"Cutting back on certain foods is meant to protect my remaining kidney function, not to punish me."',c:true,why:''},
  {t:'"I should choose high-biologic-value proteins like eggs and lean meat over lower-quality protein sources."',c:true,why:''},
  {t:'"Since my kidneys are damaged, I should eat as much protein as possible to help them heal."',c:false,why:'Excess protein intake increases the nitrogenous waste load the damaged kidneys must process, which can worsen uremic symptoms rather than help the kidneys heal.'},
  {t:'"I don\'t need to worry about my fluid intake as long as my potassium stays normal."',c:false,why:'Fluid intake must also be individualized and monitored in CKD; potassium level alone does not indicate whether fluid restriction is needed to prevent volume overload.'},
 ],
 rationale:'CKD nutrition therapy individualizes protein, sodium, potassium, and fluid intake with a renal dietitian, favors high-biologic-value protein, and should be framed supportively rather than punitively to support long-term adherence.',
 tip:'NCLEX tip: watch for "the kidneys will heal if I eat more protein" as a classic wrong-understanding distractor — protein restriction, not addition, is the appropriate CKD teaching point.'},

{id:'r16',type:'mc',stem:'A nurse is providing discharge teaching to a client with CKD who is being considered for a kidney transplant. Which statement best reflects current evidence on transplant timing?',
 options:[
  {t:'"Outcomes are generally the same whether you receive a transplant before or after starting dialysis."',c:false,why:'This is inaccurate; evidence favors pre-emptive transplantation over transplantation after a period of dialysis.'},
  {t:'"A pre-emptive transplant, done before you start dialysis, is associated with the best long-term outcomes."',c:true,why:''},
  {t:'"You must complete at least one year of dialysis before you can be considered for a transplant."',c:false,why:'There is no requirement to complete a mandatory dialysis period before transplant evaluation; in fact, earlier transplantation before dialysis is preferred when feasible.'},
  {t:'"Transplant is only appropriate once you reach Stage 5 CKD and are symptomatic from uremia."',c:false,why:'Transplant evaluation and pre-emptive transplantation can occur before a client becomes symptomatic from uremia or reaches full ESKD, and earlier transplantation is actually associated with better outcomes.'},
 ],
 rationale:'A pre-emptive kidney transplant, performed before the client requires dialysis, is associated with better long-term graft and patient survival compared with transplantation after a period on dialysis.',
 tip:'NCLEX tip: "pre-emptive transplant = best outcomes" is a specific, testable fact from this module — commit it to memory as a standalone statement.'},

{id:'r17',type:'mc',stem:'Which statement about continuous renal replacement therapy (CRRT) is accurate?',
 options:[
  {t:'CRRT is typically reserved for stable clients on a general medical-surgical unit who prefer a slower dialysis schedule',c:false,why:'CRRT requires ICU-level monitoring and is used specifically for hemodynamically unstable clients, not stable clients who simply prefer a different schedule.'},
  {t:'CRRT provides continuous, gentler fluid and solute removal for hemodynamically unstable clients in the ICU',c:true,why:''},
  {t:'CRRT sessions run for a fixed three to four hours, three times weekly, similar to standard hemodialysis',c:false,why:'This describes the typical schedule for intermittent hemodialysis, not CRRT, which runs continuously rather than in fixed intermittent sessions.'},
  {t:'CRRT uses the peritoneal membrane as the filtering surface instead of an artificial filter',c:false,why:'CRRT uses an extracorporeal filter, not the peritoneal membrane; using the peritoneal membrane is the defining feature of peritoneal dialysis, a different modality.'},
 ],
 rationale:'CRRT is used mainly in the ICU for hemodynamically unstable clients who cannot tolerate the rapid shifts of intermittent hemodialysis. It runs continuously, producing slower and gentler solute and fluid removal.',
 tip:'NCLEX tip: match modality to stability — stable outpatient = HD; unstable ICU client = CRRT; client wanting independence/flexibility = PD.'},

{id:'r18',type:'bowtie',stem:'A client with ESKD on hemodialysis reports a pericardial friction rub, increasing confusion, and a potassium level of 7.1 mEq/L. Complete the bowtie: select the most likely condition, two actions the nurse should take, and two parameters the nurse should monitor.',
 sections:[
   {label:'Likely condition (select 1)', correctCount:1, options:[
     {t:'Uremic pericarditis with impending complications from hyperkalemia',c:true},
     {t:'Acute viral gastroenteritis',c:false},
     {t:'Community-acquired pneumonia',c:false},
     {t:'Peritonitis from peritoneal dialysis',c:false},
   ]},
   {label:'Priority actions (select 2)', correctCount:2, options:[
     {t:'Notify the provider immediately and prepare for urgent dialysis',c:true},
     {t:'Administer IV calcium gluconate and dextrose/insulin per protocol',c:true},
     {t:'Encourage a high-potassium diet to help stabilize potassium levels',c:false},
     {t:'Apply a blood pressure cuff to the dialysis access arm for frequent readings',c:false},
     {t:'Delay any intervention until the next scheduled dialysis session in two days',c:false},
   ]},
   {label:'Parameters to monitor (select 2)', correctCount:2, options:[
     {t:'Cardiac rhythm/ECG changes',c:true},
     {t:'Level of consciousness',c:true},
     {t:'Ankle range of motion',c:false},
     {t:'Visual acuity',c:false},
   ]},
 ],
 rationale:'A pericardial friction rub is an urgent indicator for dialysis, and a potassium of 7.1 with confusion signals life-threatening hyperkalemia and uremia. The nurse must notify the provider, begin emergent temporizing hyperkalemia treatment, and closely monitor cardiac rhythm and neurologic status while urgent dialysis is arranged.',
 tip:'NCLEX tip: in bowtie items, first identify the single most dangerous problem in the stem, then work outward to actions and monitoring parameters that specifically address that problem.'},

{id:'r19',type:'hotspot',stem:'A client on hemodialysis reports the following during a treatment session. Click the finding that most requires the nurse to slow or stop the dialysis treatment and notify the provider.',
 passage:[
  {t:'The client mentions feeling "a little tired" today, which is typical for them after treatment.',c:false},
  {t:'Blood pressure drops from 128/76 to 84/50 mmHg and the client reports dizziness and nausea.',c:true},
  {t:'The client asks to adjust the TV volume in the dialysis unit.',c:false},
  {t:'The client\'s AV fistula continues to have a palpable thrill and audible bruit throughout the session.',c:false},
 ],
 rationale:'A significant drop in blood pressure with dizziness and nausea during hemodialysis indicates symptomatic hypotension, a common and potentially serious complication of fluid removal during treatment that requires the nurse to slow the ultrafiltration rate, reposition the client, and notify the provider if it does not resolve.',
 tip:'NCLEX tip: hotspot items reward reading every option as a possible distractor — a normal finding (patent fistula, mild fatigue) is included specifically to test whether you can distinguish it from a true complication.'},

{id:'r20',type:'mc',stem:'A client asks the nurse why peritoneal dialysis might be recommended over hemodialysis. Which response is most accurate?',
 options:[
  {t:'"Peritoneal dialysis removes toxins faster than hemodialysis, so most people prefer it."',c:false,why:'Peritoneal dialysis actually provides slower, more gradual clearance than hemodialysis; speed of toxin removal is not the reason it may be preferred.'},
  {t:'"Peritoneal dialysis avoids needle sticks and offers a more flexible schedule, which some people prefer, especially if they have cardiovascular instability."',c:true,why:''},
  {t:'"Peritoneal dialysis requires dialysis treatment only once a week, unlike hemodialysis."',c:false,why:'Peritoneal dialysis actually requires exchanges essentially every day, which is more frequent than the typical three-times-weekly hemodialysis schedule.'},
  {t:'"Peritoneal dialysis has a lower risk of infection than hemodialysis in every case."',c:false,why:'PD carries its own significant infection risk, particularly peritonitis; it is not accurate to say it is uniformly lower-risk than hemodialysis.'},
 ],
 rationale:'PD avoids needle sticks and the hemodynamic swings of hemodialysis, offers a more liberal diet, and can be scheduled more flexibly (including overnight with CCPD), making it appealing for clients with cardiovascular instability or who want more independence.',
 tip:'NCLEX tip: when comparing dialysis modalities, focus on lifestyle and hemodynamic tradeoffs rather than assuming one method is simply "better" at removing toxins.'},

{id:'r21',type:'mc',stem:'Which client statement indicates a need for further teaching about continuous ambulatory peritoneal dialysis (CAPD)?',
 options:[
  {t:'"I will perform manual exchanges about four to five times throughout the day, every day of the week."',c:false,why:'This statement accurately describes the typical CAPD schedule and does not require correction.'},
  {t:'"I don\'t need to use sterile technique for my bag changes as long as my hands look clean."',c:true,why:''},
  {t:'"I should watch for cloudy fluid coming back out, since that could mean an infection."',c:false,why:'This is an accurate and important safety statement, showing correct understanding rather than a need for further teaching.'},
  {t:'"CAPD doesn\'t require a machine, unlike the automated cycler used for CCPD."',c:false,why:'This statement is accurate — CAPD is performed manually without a cycler, distinguishing it from CCPD, which uses an automated overnight cycler.'},
 ],
 rationale:'Meticulous aseptic technique during every bag exchange and connection is essential in PD to reduce the risk of peritonitis; "looking clean" is not equivalent to proper sterile technique, so this statement reflects a dangerous misunderstanding.',
 tip:'NCLEX tip: "needs further teaching" questions ask you to find the incorrect statement — read carefully, since three of the four choices will often be accurate on purpose.'},

{id:'r22',type:'mc',stem:'A nurse assesses a client with suspected pyelonephritis. Which combination of findings would most strongly support this diagnosis over simple cystitis?',
 options:[
  {t:'Suprapubic discomfort and urinary frequency only',c:false,why:'Suprapubic discomfort and frequency without systemic signs are more typical of a lower tract infection (cystitis) rather than an upper tract infection.'},
  {t:'Fever, chills, and costovertebral angle (flank) tenderness',c:true,why:''},
  {t:'Mild dysuria that has been present for one day without other symptoms',c:false,why:'Isolated mild dysuria without systemic signs is more consistent with uncomplicated lower urinary tract infection than with kidney involvement.'},
  {t:'Clear urine with no leukocyte esterase or nitrites on dipstick',c:false,why:'A clear urine with a negative dipstick makes any active urinary tract infection, upper or lower, less likely rather than supporting pyelonephritis specifically.'},
 ],
 rationale:'Pyelonephritis is an upper urinary tract infection involving the kidney itself, so systemic signs such as fever and chills along with flank/costovertebral angle tenderness point to kidney involvement rather than a bladder-only infection.',
 tip:'NCLEX tip: lower UTI = local bladder symptoms (dysuria, frequency, urgency); upper UTI/pyelonephritis = add systemic signs (fever, flank pain, chills).'},

{id:'r23',type:'mc',stem:'An older adult client is brought to the emergency department by family who report the client has become confused over the past day with no other complaints. Urinalysis reveals bacteriuria and pyuria. What should the nurse recognize about this presentation?',
 options:[
  {t:'Confusion in an older adult is unlikely to be related to a urinary tract infection and warrants a separate neurologic workup only',c:false,why:'While a neurologic workup may still be reasonable, this statement dismisses a well-documented and common presentation of UTI in older adults, which is often overlooked.'},
  {t:'New-onset confusion may be the primary or only presenting symptom of a UTI in an older adult',c:true,why:''},
  {t:'This client cannot have a UTI because there is no reported dysuria or urinary frequency',c:false,why:'Older adults frequently do not present with classic dysuria or frequency; absence of these symptoms does not rule out a UTI in this population.'},
  {t:'Pyuria in an older adult is a normal, expected finding and does not require further evaluation',c:false,why:'Pyuria is not a normal or expected finding at any age and should prompt further evaluation, particularly when paired with a change in mental status.'},
 ],
 rationale:'Older adults often present atypically with a UTI, and new confusion or delirium may be the primary or only symptom rather than the classic dysuria, frequency, or urgency seen in younger adults.',
 tip:'NCLEX tip: "sudden confusion in an older adult" is one of the most frequently tested UTI-related NCLEX scenarios — always consider infection, including UTI, in your differential.'},

{id:'r24',type:'sata',stem:'The nurse is teaching a client about preventing recurrent urinary tract infections. Which teaching points should be included? Select all that apply.',
 options:[
  {t:'Wipe from front to back after voiding or having a bowel movement',c:true,why:''},
  {t:'Void as soon as possible after sexual intercourse',c:true,why:''},
  {t:'Take frequent bubble baths to keep the perineal area clean',c:false,why:'Bubble baths and harsh soaps can irritate the urethra and increase UTI risk; showers are generally preferred over baths for this reason.'},
  {t:'Increase fluid intake unless another condition requires fluid restriction',c:true,why:''},
  {t:'Delay voiding for as long as possible to build bladder capacity',c:false,why:'Delaying voiding and infrequent emptying of the bladder actually increases UTI risk by allowing bacteria more time to multiply in retained urine.'},
 ],
 rationale:'Front-to-back hygiene, voiding after intercourse, adequate fluid intake, and avoiding harsh soaps/bubble baths and voiding delay are all evidence-based teaching points for reducing UTI recurrence.',
 tip:'NCLEX tip: for UTI prevention SATA items, group your answer choices into "things that flush bacteria out" versus "things that let bacteria linger" to quickly sort correct from incorrect options.'},

{id:'r25',type:'mc',stem:'A client with a suspected UTI has a urine culture pending. Which result would be considered a significant positive finding supporting the diagnosis?',
 options:[
  {t:'Colony count of 500 CFU/mL',c:false,why:'A count this low is generally not considered a significant positive finding for a UTI in an otherwise asymptomatic client.'},
  {t:'Colony count greater than 100,000 CFU/mL',c:true,why:''},
  {t:'A urine specimen showing zero white blood cells',c:false,why:'The absence of white blood cells (pyuria) makes an active UTI less likely rather than supporting the diagnosis.'},
  {t:'A urine pH of exactly 6.0 with no other findings',c:false,why:'A urine pH of 6.0 is within a fairly normal range and, by itself, provides no meaningful information about the presence of infection.'},
 ],
 rationale:'A clean-catch midstream urine culture with a colony count greater than 100,000 CFU/mL is generally considered a significant, positive result supporting a UTI diagnosis, although lower counts can still be clinically significant in symptomatic or catheterized clients.',
 tip:'NCLEX tip: memorize the "100,000 CFU/mL" threshold — it is one of the most frequently tested exact numbers in the UTI content area.'},

{id:'r26',type:'fill',stem:'A hospitalized client develops a urinary tract infection three days after an indwelling urinary catheter was inserted. This type of infection is specifically referred to by the abbreviation _____.',
 answers:['cauti','cauti (catheter-associated urinary tract infection)'],
 rationale:'A urinary tract infection associated with an indwelling urinary catheter is called a CAUTI (catheter-associated urinary tract infection), and it accounts for the majority of hospital-acquired UTIs.',
 tip:'NCLEX tip: link CAUTI prevention directly to nursing action — aseptic insertion, maintaining a closed drainage system, and prompt catheter removal are the core prevention strategies to remember.'},

{id:'r27',type:'mc',stem:'Which laboratory finding would the nurse expect in a client with severe, longstanding AKI who has developed metabolic acidosis?',
 options:[
  {t:'Elevated serum bicarbonate with a rising pH',c:false,why:'This describes a metabolic alkalosis pattern, which is the opposite of what develops in AKI-related metabolic acidosis.'},
  {t:'Low serum bicarbonate with a decreased blood pH',c:true,why:''},
  {t:'Normal anion gap with no change in respiratory rate',c:false,why:'AKI-related metabolic acidosis is typically accompanied by compensatory changes in respiratory rate (such as Kussmaul respirations), not an absence of respiratory change.'},
  {t:'Elevated serum calcium with decreased serum phosphorus',c:false,why:'AKI more typically causes hyperphosphatemia with a reciprocal drop in calcium, the opposite pattern described in this option.'},
 ],
 rationale:'Failing kidneys cannot adequately excrete hydrogen ions or regenerate bicarbonate, leading to a fall in serum bicarbonate and blood pH — classic metabolic acidosis — often accompanied by compensatory Kussmaul respirations.',
 tip:'NCLEX tip: connect AKI/CKD acid-base findings to the underlying physiology — a kidney that cannot excrete acid will always trend toward metabolic acidosis, not alkalosis.'},

{id:'r28',type:'mc',stem:'A client recovering from AKI asks how long it may take for kidney function to fully stabilize. What is the most accurate response?',
 options:[
  {t:'"Your kidney function should be back to normal within about 48 to 72 hours."',c:false,why:'This timeframe is far too short; recovery from AKI unfolds over a much longer period than a few days.'},
  {t:'"Recovery often continues over the next three to twelve months, and a small permanent reduction in function is common."',c:true,why:''},
  {t:'"Once you leave the oliguric phase, your kidney function is considered fully recovered."',c:false,why:'Leaving the oliguric phase marks entry into the diuresis phase, not full recovery; significant improvement continues to occur over the following months.'},
  {t:'"AKI recovery is unpredictable and cannot be estimated in any way."',c:false,why:'While individual recovery varies, there is a well-established general timeframe (three to twelve months) that can be shared with clients for planning and reassurance.'},
 ],
 rationale:'The recovery phase of AKI can continue for three to twelve months, and a small (roughly 1-3%) permanent reduction in GFR is common but usually not clinically significant unless the client already has underlying CKD.',
 tip:'NCLEX tip: know the general timeframes for each AKI phase so you can accurately counsel clients about expected recovery — this is a common patient-teaching item stem.'},

{id:'r29',type:'mc',stem:'A client with CKD has a hemoglobin of 9.2 g/dL and reports fatigue and shortness of breath with minimal exertion. What is the most likely underlying cause of this anemia?',
 options:[
  {t:'Decreased erythropoietin production by the diseased kidneys',c:true,why:''},
  {t:'Excessive production of red blood cells by the bone marrow',c:false,why:'CKD-related anemia results from decreased, not excessive, red blood cell production, largely due to insufficient erythropoietin.'},
  {t:'A dietary excess of iron leading to red blood cell suppression',c:false,why:'Iron excess is not the mechanism of CKD anemia; if anything, many CKD clients require iron supplementation rather than restriction.'},
  {t:'Increased red blood cell lifespan causing a buildup of old cells',c:false,why:'CKD is actually associated with a shortened, not increased, red blood cell lifespan, which contributes to anemia rather than a buildup of cells.'},
 ],
 rationale:'The kidneys normally produce erythropoietin, which stimulates red blood cell production. In CKD, decreased erythropoietin production, combined with a shortened RBC lifespan and possible GI blood loss, leads to chronic anemia.',
 tip:'NCLEX tip: erythropoietin is the "why" behind CKD anemia — if a stem describes a CKD client with fatigue and low hemoglobin, think low erythropoietin before anything else.'},

{id:'r30',type:'mc',stem:'A client with ESKD is scheduled for hemodialysis three times a week. The nurse should time the client\'s water-soluble, non-protein-bound medications with which principle in mind?',
 options:[
  {t:'These medications should typically be given after, not before, a hemodialysis session',c:true,why:''},
  {t:'These medications should always be given at double the normal dose immediately before dialysis',c:false,why:'Doubling the dose is not an appropriate or safe way to manage medication timing around dialysis and could cause toxicity.'},
  {t:'Timing of medications does not need to be adjusted around dialysis sessions',c:false,why:'Timing matters significantly for drugs that are readily removed by dialysis; ignoring this can lead to reduced drug effectiveness if a dose is dialyzed out shortly after being given.'},
  {t:'These medications should be held completely on dialysis days',c:false,why:'Holding medications entirely on dialysis days is not appropriate for most necessary medications and could compromise the client\'s treatment plan.'},
 ],
 rationale:'Water-soluble, non-protein-bound medications are readily removed by hemodialysis. To avoid the medication being dialyzed out before it can take effect, these drugs are generally best given after the dialysis session rather than immediately before.',
 tip:'NCLEX tip: think "protein-bound stays, water-soluble goes" — protein-bound drugs remain in the blood during dialysis, while water-soluble ones are more easily filtered out and need careful timing.'},

{id:'r31',type:'mc',stem:'Which type of AKI is characterized by normal or even increased urine output despite significant kidney injury, and is often seen after nephrotoxic drug exposure or burns?',
 options:[
  {t:'Anuric AKI',c:false,why:'Anuric AKI refers to urine output below about 100 mL/day, the opposite of the pattern described here.'},
  {t:'Nonoliguric AKI',c:true,why:''},
  {t:'Postrenal AKI with complete obstruction',c:false,why:'Complete postrenal obstruction typically causes anuria, not preserved or increased urine output.'},
  {t:'Oliguric AKI',c:false,why:'Oliguric AKI is defined by urine output under 400 mL/day, which contradicts the description in the stem.'},
 ],
 rationale:'Nonoliguric AKI preserves or even increases urine output despite significant kidney injury, and is classically associated with nephrotoxic exposures, burns, and trauma.',
 tip:'NCLEX tip: don\'t assume AKI always means low urine output — the nonoliguric variant is a recognized exception, especially after nephrotoxic drugs or burns.'},

{id:'r32',type:'mc',stem:'A client\'s ABG during the oliguric phase of AKI shows pH 7.28, HCO3 16 mEq/L. Which acid-base disturbance does this reflect?',
 options:[
  {t:'Respiratory acidosis',c:false,why:'A primary respiratory acidosis would show an elevated PaCO2 as the driving abnormality, not a low bicarbonate.'},
  {t:'Metabolic acidosis',c:true,why:''},
  {t:'Respiratory alkalosis',c:false,why:'Respiratory alkalosis would present with an elevated pH and low PaCO2, not a low pH and low bicarbonate.'},
  {t:'Metabolic alkalosis',c:false,why:'Metabolic alkalosis would show an elevated pH and elevated bicarbonate, the opposite of this ABG pattern.'},
 ],
 rationale:'A low pH with a low bicarbonate reflects metabolic acidosis, which is expected in AKI because the kidneys cannot adequately excrete hydrogen ions or regenerate bicarbonate.',
 tip:'NCLEX tip: read ABGs by first checking whether pH and the metabolic value (HCO3) move in the same direction (metabolic problem) or opposite directions (respiratory problem).'},

{id:'r33',type:'mc',stem:'Which nutritional approach is generally recommended during the early oliguric phase of AKI, before dialysis needs are fully established?',
 options:[
  {t:'A high-protein diet to prevent muscle wasting',c:false,why:'High protein intake increases nitrogenous waste that the kidneys cannot clear well during oliguria, so it is not the preferred early approach.'},
  {t:'A high-carbohydrate diet to spare protein breakdown',c:true,why:''},
  {t:'Unrestricted potassium and sodium intake',c:false,why:'Potassium and sodium are typically restricted during the oliguric phase because impaired excretion increases the risk of dangerous accumulation.'},
  {t:'Complete parenteral nutrition for every client regardless of oral tolerance',c:false,why:'Parenteral nutrition is not the default first approach for every AKI client; oral or enteral intake is used when tolerated.'},
 ],
 rationale:'A high-carbohydrate diet is often used initially in AKI because it is protein-sparing, reducing nitrogenous waste production while the kidneys recover; the diet later transitions to higher protein/calorie intake in the recovery phase.',
 tip:'NCLEX tip: remember the nutrition sequence in AKI — protein-sparing/high-carb early, transitioning to high-protein/high-calorie once recovery is underway.'},

{id:'r34',type:'mc',stem:'A client with AKI is receiving digoxin. Which nursing consideration is most important given the client\'s renal status?',
 options:[
  {t:'Digoxin levels do not need to be monitored in AKI since it is not renally cleared',c:false,why:'Digoxin is renally cleared, so impaired kidney function increases the risk of toxicity, making this statement inaccurate.'},
  {t:'Monitor digoxin levels closely and watch for signs of toxicity since renal clearance is reduced',c:true,why:''},
  {t:'Increase the digoxin dose to compensate for poor kidney function',c:false,why:'Increasing the dose would raise toxicity risk rather than compensate appropriately; renally cleared drugs generally require dose reduction, not increase, in AKI.'},
  {t:'No adjustment or monitoring is needed as long as the client is asymptomatic',c:false,why:'Even asymptomatic clients need close monitoring, since early digoxin toxicity may not be obvious before significant accumulation occurs.'},
 ],
 rationale:'Digoxin is renally excreted, so reduced kidney function in AKI increases the risk of drug accumulation and toxicity; levels should be monitored closely and doses adjusted accordingly.',
 tip:'NCLEX tip: build a short list of renally-cleared, AKI-sensitive drugs to watch for on exams — digoxin, aminoglycosides, phenytoin, and magnesium-containing agents are classic examples.'},

{id:'r35',type:'mc',stem:'Which statement best reflects nursing priorities related to pulmonary function in a client with AKI?',
 options:[
  {t:'Encourage turning, coughing, and deep breathing since drowsiness can limit the client\'s ability to protect the airway',c:true,why:''},
  {t:'Restrict all ambulation and positioning changes to conserve the client\'s energy',c:false,why:'Restricting movement entirely would actually increase the risk of pulmonary complications like atelectasis rather than protect the client.'},
  {t:'Pulmonary function is not typically affected by AKI and requires no special nursing focus',c:false,why:'Uremic symptoms such as lethargy and drowsiness can impair the client\'s ability to mobilize secretions and protect the airway, making pulmonary support an important nursing focus.'},
  {t:'Administer sedating medications liberally to keep the client calm and comfortable',c:false,why:'Sedating medications can worsen drowsiness and further impair airway protection and secretion clearance, which is counterproductive in this context.'},
 ],
 rationale:'Uremic toxins can cause lethargy and drowsiness that limit a client\'s ability to protect the airway and clear secretions, so turning, coughing, and deep breathing are important nursing priorities in AKI.',
 tip:'NCLEX tip: connect uremia\'s CNS effects (lethargy, confusion) to downstream respiratory risk — an altered level of consciousness always raises airway protection concerns.'},

{id:'r36',type:'mc',stem:'A client is recovering from AKI caused by a nephrotoxic antibiotic. Which class of antibiotics was most likely responsible?',
 options:[
  {t:'Aminoglycosides',c:true,why:''},
  {t:'Penicillins',c:false,why:'Penicillins are not typically classified among the classic nephrotoxic antibiotic groups associated with intrinsic AKI.'},
  {t:'Macrolides',c:false,why:'Macrolide antibiotics are not commonly implicated as a leading nephrotoxic drug class.'},
  {t:'Tetracyclines',c:false,why:'While some tetracyclines require renal dose adjustment, they are not the classic nephrotoxic antibiotic class highlighted for causing intrinsic AKI.'},
 ],
 rationale:'Aminoglycoside antibiotics are well known nephrotoxic agents that can cause acute tubular necrosis and intrinsic AKI, particularly with prolonged use or in dehydrated clients.',
 tip:'NCLEX tip: aminoglycosides (e.g., gentamicin) are a classic nephrotoxic drug class — pair this fact with the need for peak/trough level monitoring.'},

{id:'r37',type:'mc',stem:'A client with rhabdomyolysis after a prolonged seizure develops dark, tea-colored urine and rising creatinine. What is the mechanism of kidney injury in this scenario?',
 options:[
  {t:'Myoglobin released from damaged muscle is directly toxic to renal tubular cells',c:true,why:''},
  {t:'Excess glucose from the seizure is directly toxic to the glomeruli',c:false,why:'Glucose is not the toxic substance implicated in rhabdomyolysis-related kidney injury; myoglobin from muscle breakdown is the causative agent.'},
  {t:'The seizure caused a ureteral obstruction from clot formation',c:false,why:'This scenario does not describe an obstructive process; rhabdomyolysis causes intrarenal injury through myoglobin release, not obstruction.'},
  {t:'Dehydration alone accounts for all of the kidney injury in this case',c:false,why:'While dehydration can worsen the injury, the primary mechanism specific to rhabdomyolysis is myoglobin-induced tubular toxicity.'},
 ],
 rationale:'Rhabdomyolysis releases myoglobin from damaged muscle tissue into the bloodstream; myoglobin is directly toxic to renal tubular cells and causes intrarenal (intrinsic) AKI, often evidenced by dark, tea-colored urine.',
 tip:'NCLEX tip: myoglobinuria from rhabdomyolysis, hemoglobinuria from transfusion reactions, and heavy metals are all classic causes of intrinsic AKI through direct tubular toxicity.'},

{id:'r38',type:'sata',stem:'The nurse is caring for a client in the oliguric phase of AKI. Which nursing actions are appropriate? Select all that apply.',
 options:[
  {t:'Obtain daily weights at the same time each day',c:true,why:''},
  {t:'Restrict sodium, potassium, and phosphorus-rich foods as appropriate',c:true,why:''},
  {t:'Encourage unrestricted fluid intake to flush out toxins',c:false,why:'Fluid intake should be carefully monitored and often restricted during the oliguric phase, since the client cannot excrete excess fluid effectively.'},
  {t:'Monitor for signs of infection and remove indwelling catheters as soon as possible',c:true,why:''},
  {t:'Apply lotion and keep skin clean to manage uremia-related pruritus',c:true,why:''},
 ],
 rationale:'During the oliguric phase, nursing priorities include daily weights, dietary restriction of sodium/potassium/phosphorus, infection prevention (including timely catheter removal), and skin care for uremic pruritus, while fluid intake is carefully monitored, not liberalized.',
 tip:'NCLEX tip: oliguric-phase nursing care is about conservation and restriction (fluid, electrolytes) paired with protection (skin, infection prevention) — group these together in your review.'},

{id:'r39',type:'mc',stem:'Which statement accurately reflects the general mortality risk associated with AKI?',
 options:[
  {t:'AKI mortality is uniformly low, generally under 5%, regardless of severity',c:false,why:'This understates the risk; AKI mortality varies widely and can be quite high depending on severity and comorbidities.'},
  {t:'AKI mortality can range broadly, roughly from 10% to 80%, depending on severity and comorbidities',c:true,why:''},
  {t:'AKI is always fatal once the oliguric phase begins',c:false,why:'AKI is often reversible, and entering the oliguric phase does not mean the condition is uniformly fatal.'},
  {t:'AKI mortality is identical across all age groups and is not affected by comorbid conditions',c:false,why:'Mortality risk is significantly affected by comorbidities and overall severity, not uniform across all clients.'},
 ],
 rationale:'AKI mortality is highly variable, often cited as ranging from roughly 10% to 80% depending on the severity of the injury and the client\'s underlying comorbidities.',
 tip:'NCLEX tip: remember that AKI has a wide mortality range rather than one fixed number — severity and comorbidities are the key variables driving outcomes.'},

{id:'r40',type:'mc',stem:'A client asks why furosemide might be given during AKI if it does not reverse the underlying kidney injury. What is the best explanation?',
 options:[
  {t:'"Furosemide may help manage fluid volume, though its benefit on overall AKI outcomes is not firmly established."',c:true,why:''},
  {t:'"Furosemide is proven to reverse AKI and restore normal kidney function."',c:false,why:'This overstates the evidence; furosemide is not proven to reverse AKI itself, only to assist with fluid management in some cases.'},
  {t:'"Furosemide replaces the need for dialysis in most clients with AKI."',c:false,why:'Furosemide does not replace dialysis; clients with refractory fluid overload, hyperkalemia, acidosis, or uremia still require renal replacement therapy.'},
  {t:'"Furosemide is given only to clients with postrenal AKI."',c:false,why:'Furosemide use is not restricted to postrenal AKI specifically; it may be considered for fluid management across AKI categories, though its benefit is not firmly established.'},
 ],
 rationale:'Loop diuretics like furosemide may be used to help manage fluid volume in AKI, but there is no firm consensus on their overall benefit in altering the course of AKI itself.',
 tip:'NCLEX tip: don\'t assume every medication given in a disease process is curative — furosemide in AKI is a supportive fluid-management tool, not a treatment that reverses kidney injury.'},

{id:'r41',type:'mc',stem:'Which finding would most concern the nurse in a client recovering from AKI who has some residual, mild reduction in GFR?',
 options:[
  {t:'A 1-3% permanent reduction in GFR with no other symptoms, in a client with no prior kidney disease',c:false,why:'This is described as a common and generally not clinically significant finding in an otherwise healthy kidney recovery, unlike the scenario needing more concern.'},
  {t:'A similar small residual GFR reduction in a client who already had underlying CKD before the AKI episode',c:true,why:''},
  {t:'Serum creatinine trending downward over the weeks following the injury',c:false,why:'A downward creatinine trend reflects expected recovery and is a reassuring finding, not one of concern.'},
  {t:'Urine output that has returned to a normal daily range',c:false,why:'A return to normal urine output is a positive, expected sign of recovery, not a concerning finding.'},
 ],
 rationale:'A small permanent reduction in GFR after AKI is common and often not clinically significant, but it becomes more consequential in a client who already had underlying CKD, since their kidney reserve was already reduced before the AKI episode.',
 tip:'NCLEX tip: always factor in a client\'s baseline kidney function when interpreting the significance of a "small" residual change after AKI.'},

{id:'r42',type:'mc',stem:'A nurse reviewing RIFLE classification criteria for a client with worsening AKI recognizes that as the client progresses from "Risk" toward "Failure," what generally happens to the diagnostic criteria?',
 options:[
  {t:'The creatinine multiplier used to define the stage increases and the allowed oliguria duration generally shortens',c:true,why:''},
  {t:'The creatinine multiplier decreases while the allowed oliguria duration lengthens',c:false,why:'This is the reverse of the actual pattern; more severe RIFLE categories require a higher creatinine multiplier and shorter oliguria duration, not the opposite.'},
  {t:'RIFLE criteria remain identical regardless of stage and are based only on urine color',c:false,why:'RIFLE criteria use specific GFR/creatinine and urine output thresholds that change with stage, not a subjective assessment of urine color.'},
  {t:'RIFLE staging is based entirely on blood pressure trends rather than renal labs',c:false,why:'RIFLE is based on GFR/creatinine changes and urine output criteria, not blood pressure trends.'},
 ],
 rationale:'As AKI severity worsens through the RIFLE categories (Risk, Injury, Failure), the required creatinine multiplier for that stage increases while the oliguria duration threshold used to define the stage generally shortens, reflecting more severe kidney compromise.',
 tip:'NCLEX tip: you don\'t need to memorize every RIFLE number, but understand the general trend — each step up means "worse" by both a bigger creatinine change and a shorter time window.'},

{id:'r43',type:'mc',stem:'A client with AKI has a serum phosphorus of 6.2 mg/dL and a reciprocal drop in calcium. What is the most likely explanation for this pairing?',
 options:[
  {t:'Decreased GFR leads to phosphorus retention, which reciprocally lowers serum calcium',c:true,why:''},
  {t:'Excess dietary calcium intake is directly suppressing phosphorus levels',c:false,why:'This scenario shows elevated, not suppressed, phosphorus, and dietary calcium intake is not the primary driver of this pairing in AKI.'},
  {t:'Increased vitamin D activation by the kidney is raising both phosphorus and calcium simultaneously',c:false,why:'Kidney injury typically decreases active vitamin D production and calcium, so this option incorrectly describes both values rising together.'},
  {t:'The client\'s parathyroid hormone level has dropped to zero, causing these changes',c:false,why:'In this setting, PTH would be expected to rise, not fall, as a compensatory response to declining calcium, making this explanation inaccurate.'},
 ],
 rationale:'As GFR falls in AKI, the kidney cannot excrete phosphorus effectively, causing phosphorus retention; this reciprocally lowers serum calcium, which can stimulate a compensatory rise in parathyroid hormone.',
 tip:'NCLEX tip: the phosphorus-calcium reciprocal relationship applies in both AKI and CKD — when one rises, expect the other to fall due to their linked physiology.'},

{id:'r44',type:'mc',stem:'Which client scenario best illustrates a postrenal cause of AKI?',
 options:[
  {t:'An older adult male with benign prostatic hyperplasia who develops sudden anuria',c:true,why:''},
  {t:'A client in septic shock with sustained hypotension for several hours',c:false,why:'Septic shock with hypotension is a prerenal mechanism related to hypoperfusion, not an outflow obstruction.'},
  {t:'A client who received IV contrast dye without adequate hydration',c:false,why:'Nephrotoxic contrast exposure is an intrarenal (intrinsic) cause of AKI, not a postrenal outflow obstruction.'},
  {t:'A client with severe dehydration from prolonged vomiting',c:false,why:'Severe dehydration reduces perfusion to the kidney, representing a prerenal mechanism rather than an outflow obstruction.'},
 ],
 rationale:'Postrenal AKI results from obstruction of urine outflow. BPH is a classic cause of bladder outlet obstruction that can lead to sudden anuria and postrenal AKI, distinct from prerenal (perfusion) or intrarenal (tissue damage) causes.',
 tip:'NCLEX tip: BPH, stones, strictures, and tumors are the classic postrenal causes — think "something is blocking the pipe" for this category.'},

{id:'r45',type:'mc',stem:'A client\'s creatinine rises from a baseline of 0.9 mg/dL to 1.5 mg/dL over 48 hours. Using the common diagnostic threshold described for AKI, how would the nurse interpret this change?',
 options:[
  {t:'This does not meet the commonly cited threshold since the rise is less than 50%',c:false,why:'A rise from 0.9 to 1.5 is roughly a 67% increase, which does exceed the commonly cited 50% threshold, making this interpretation incorrect.'},
  {t:'This meets the commonly cited AKI threshold of a 50% or greater rise in creatinine above baseline',c:true,why:''},
  {t:'This change is not clinically significant because both values remain below 2.0 mg/dL',c:false,why:'Absolute value is less important than the percentage change from baseline; even values under 2.0 mg/dL can reflect a clinically significant rise.'},
  {t:'AKI cannot be diagnosed based on creatinine trends alone under any circumstances',c:false,why:'A rise in creatinine relative to baseline is, in fact, one of the primary diagnostic tools used to identify AKI.'},
 ],
 rationale:'A rise from 0.9 to 1.5 mg/dL represents roughly a 67% increase over baseline, which exceeds the commonly cited diagnostic threshold of a 50% or greater rise in serum creatinine used to identify AKI.',
 tip:'NCLEX tip: practice quick percentage-change math on creatinine values — this is a common way NCLEX tests the AKI diagnostic threshold without stating the percentage directly.'},

{id:'r46',type:'mc',stem:'A client with CKD reports intense itching, especially at night. What is the most likely underlying cause of this symptom?',
 options:[
  {t:'Accumulation of uremic toxins affecting the skin',c:true,why:''},
  {t:'A new allergic reaction to laundry detergent',c:false,why:'While environmental allergens are possible, pruritus in a client with CKD is much more directly explained by uremic toxin accumulation than by an unrelated allergy.'},
  {t:'Excess vitamin D activation causing skin changes',c:false,why:'CKD is associated with decreased, not excess, active vitamin D production, making this an unlikely explanation for the itching.'},
  {t:'Overhydration causing skin stretching and irritation',c:false,why:'Pruritus in CKD is linked to uremic toxin buildup rather than a mechanical stretching effect from fluid overload.'},
 ],
 rationale:'Uremic toxins that accumulate as kidney function declines can cause dry, itchy skin (pruritus), a common and often distressing symptom of CKD requiring skin care and moisturizing interventions.',
 tip:'NCLEX tip: pruritus, uremic frost, and dry/flaky skin are all tied to the same root cause in CKD — toxin buildup from reduced clearance.'},

{id:'r47',type:'sata',stem:'The nurse is assessing a client with advanced CKD. Which findings reflect the multisystem effects of uremia? Select all that apply.',
 options:[
  {t:'Peripheral neuropathy with burning sensation in the feet',c:true,why:''},
  {t:'Pericarditis with a friction rub',c:true,why:''},
  {t:'Uremic fetor, an ammonia-like breath odor',c:true,why:''},
  {t:'Improved fertility and regular menstrual cycles',c:false,why:'CKD is more commonly associated with amenorrhea, decreased libido, and infertility, not improved reproductive function.'},
  {t:'Restless legs and asterixis',c:true,why:''},
 ],
 rationale:'Uremia in advanced CKD affects nearly every body system, producing neurologic changes (neuropathy, restless legs, asterixis), cardiovascular complications (pericarditis), and characteristic uremic fetor, while reproductive function is typically impaired rather than improved.',
 tip:'NCLEX tip: uremia questions often test breadth — expect exam items to combine neuro, cardiac, GI, and reproductive findings into a single client scenario.'},

{id:'r48',type:'mc',stem:'What is the leading cause of death in clients with end-stage kidney disease?',
 options:[
  {t:'Infection',c:false,why:'Infection is a significant risk in ESKD but is not the leading cause of death overall in this population.'},
  {t:'Cardiovascular disease',c:true,why:''},
  {t:'Gastrointestinal bleeding',c:false,why:'GI bleeding can occur in uremia but is not the leading cause of mortality in ESKD.'},
  {t:'Bone fractures from renal osteodystrophy',c:false,why:'While renal osteodystrophy increases fracture risk and morbidity, it is not the leading cause of death in ESKD.'},
 ],
 rationale:'Cardiovascular disease is the leading cause of death in clients with ESKD, driven by chronic volume overload, hypertension, vascular calcification, and lipid abnormalities associated with long-term kidney failure.',
 tip:'NCLEX tip: "cardiovascular disease is the #1 killer in ESKD" is one of the single most important standalone facts in this content area — memorize it directly.'},

{id:'r49',type:'mc',stem:'A client with CKD is prescribed an erythropoiesis-stimulating agent (ESA). What is the therapeutic purpose of this medication?',
 options:[
  {t:'To stimulate red blood cell production and treat CKD-related anemia',c:true,why:''},
  {t:'To lower serum phosphorus by binding it in the gut',c:false,why:'This describes the function of a phosphate binder, not an erythropoiesis-stimulating agent.'},
  {t:'To reduce blood pressure by blocking the renin-angiotensin system',c:false,why:'ESAs do not act on blood pressure regulation; this describes the mechanism of medications like ACE inhibitors or ARBs.'},
  {t:'To increase active vitamin D levels for bone health',c:false,why:'This describes vitamin D supplementation, not the mechanism of an erythropoiesis-stimulating agent.'},
 ],
 rationale:'Erythropoiesis-stimulating agents replace the erythropoietin that damaged kidneys can no longer adequately produce, stimulating red blood cell production to treat the anemia commonly seen in CKD.',
 tip:'NCLEX tip: pair ESAs with iron and folic acid supplementation, since all three are often needed together to effectively treat CKD-related anemia.'},

{id:'r50',type:'mc',stem:'A nurse is teaching a client with CKD about blood pressure control. What goal blood pressure is generally recommended to help slow disease progression?',
 options:[
  {t:'Less than 160/100 mmHg',c:false,why:'This target is too high and would not adequately protect kidney function or slow CKD progression.'},
  {t:'Approximately less than 125-130/80 mmHg',c:true,why:''},
  {t:'Blood pressure control is not a priority in CKD management',c:false,why:'Blood pressure control is actually one of the central goals of CKD management, since hypertension both causes and accelerates kidney damage.'},
  {t:'Systolic pressure should be kept above 160 mmHg to maintain renal perfusion',c:false,why:'Keeping systolic pressure this high would worsen, not protect, kidney function and cardiovascular risk in CKD.'},
 ],
 rationale:'Blood pressure control, generally targeting less than about 125-130/80 mmHg, is a key goal of CKD management to help preserve remaining kidney function and reduce cardiovascular risk.',
 tip:'NCLEX tip: tight blood pressure control is one of the few interventions proven to slow CKD progression — pair it with glucose control in diabetic CKD clients.'},

{id:'r51',type:'mc',stem:'A client asks why African American patients are noted to have a higher risk of hypertension-related ESKD. Which response reflects the information from the course material?',
 options:[
  {t:'"Research has identified African American patients as having a markedly higher risk of hypertension-related ESKD, likely related to nephrosclerosis."',c:true,why:''},
  {t:'"This is not an accurate statement and has no basis in clinical research."',c:false,why:'This is incorrect; the association between hypertension-related ESKD and African American patients is a recognized epidemiologic finding.'},
