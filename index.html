  {t:'"This risk applies equally to all racial and ethnic groups without any difference."',c:false,why:'This statement contradicts the recognized epidemiologic disparity discussed in relation to nephrosclerosis and ESKD risk.'},
  {t:'"This is related only to dietary differences and has nothing to do with blood pressure."',c:false,why:'The increased risk is specifically tied to hypertension and nephrosclerosis, not isolated to dietary factors alone.'},
 ],
 rationale:'African American patients have a markedly higher risk of hypertension-related ESKD, often related to nephrosclerosis, a hardening of the renal arteries from long-standing hypertension.',
 tip:'NCLEX tip: nephrosclerosis links long-standing hypertension, diabetes, and aging to CKD/ESKD progression — remember the racial disparity noted in hypertension-related ESKD risk.'},

{id:'r52',type:'mc',stem:'Which combination of assessment findings is most consistent with nephrosclerosis?',
 options:[
  {t:'Slowly rising BUN/creatinine with mild proteinuria in a client with long-standing hypertension',c:true,why:''},
  {t:'Sudden anuria after a bladder outlet obstruction',c:false,why:'Sudden anuria from obstruction describes postrenal AKI, not the gradual pattern typical of nephrosclerosis.'},
  {t:'Acute flank pain with fever and pyuria',c:false,why:'This presentation is more consistent with pyelonephritis, an infectious process, rather than the slow vascular changes of nephrosclerosis.'},
  {t:'Massive proteinuria with rapid onset of anasarca over 24 hours',c:false,why:'This rapid, severe presentation is more typical of nephrotic syndrome or acute glomerulonephritis rather than the gradual course of nephrosclerosis.'},
 ],
 rationale:'Nephrosclerosis, the hardening of renal arteries usually from long-standing hypertension, diabetes, and aging, presents with a slowly rising BUN/creatinine and mild proteinuria, reflecting gradual vascular damage rather than an acute process.',
 tip:'NCLEX tip: nephrosclerosis is a "slow burn" cause of CKD — contrast its gradual labs with the sudden changes seen in AKI or acute glomerulonephritis.'},

{id:'r53',type:'mc',stem:'How many U.S. adults are estimated to have CKD, according to the course material?',
 options:[
  {t:'About 1 in 25 adults',c:false,why:'This understates the estimated prevalence discussed in the course material.'},
  {t:'About 1 in 7 adults, roughly 37 million people',c:true,why:''},
  {t:'About 1 in 100 adults',c:false,why:'This significantly understates the estimated prevalence of CKD in the U.S. adult population.'},
  {t:'Nearly half of all U.S. adults',c:false,why:'This overstates the estimated prevalence; the course material cites a much lower, though still substantial, proportion.'},
 ],
 rationale:'Roughly 1 in 7 U.S. adults, an estimated 37 million people, has CKD, and most of them are unaware of their diagnosis.',
 tip:'NCLEX tip: "most don\'t know they have it" is an important companion fact to the CKD prevalence statistic — it underscores the importance of screening at-risk populations.'},

{id:'r54',type:'mc',stem:'A client with CKD asks about calciphylaxis. What is the best explanation of this complication?',
 options:[
  {t:'A rare but serious, painful skin complication related to vascular calcification',c:true,why:''},
  {t:'A common, mild skin rash unrelated to kidney disease severity',c:false,why:'Calciphylaxis is described as a rare and serious complication, not a common, mild finding.'},
  {t:'A benign finding that requires no monitoring or intervention',c:false,why:'Calciphylaxis is a serious complication associated with vascular calcification and requires careful management, not simple observation without concern.'},
  {t:'An infection specific to peritoneal dialysis catheters',c:false,why:'Calciphylaxis is related to vascular calcification in advanced CKD/ESKD, not specifically to PD catheter infection.'},
 ],
 rationale:'Calciphylaxis is a rare but serious, painful skin complication resulting from vascular calcification, seen in some clients with ESKD and related to the mineral and bone disorder changes of advanced kidney disease.',
 tip:'NCLEX tip: calciphylaxis is a rare but high-stakes complication of CKD/ESKD mineral-bone disease — remember it as an extension of the phosphorus/calcium/vascular calcification cascade.'},

{id:'r55',type:'mc',stem:'Which client teaching point is most appropriate regarding the emotional impact of a new CKD diagnosis?',
 options:[
  {t:'Frame dietary and lifestyle changes as protective measures rather than punishment',c:true,why:''},
  {t:'Emphasize that CKD is entirely the client\'s fault due to lifestyle choices',c:false,why:'This framing is judgmental and unhelpful; it does not reflect a supportive, therapeutic nursing approach to chronic disease education.'},
  {t:'Avoid discussing the diagnosis to prevent causing distress',c:false,why:'Avoiding discussion of the diagnosis denies the client important information and support needed to manage a chronic, lifestyle-altering condition.'},
  {t:'Minimize the seriousness of CKD to keep the client from worrying',c:false,why:'Minimizing the seriousness could reduce adherence to necessary lifestyle changes and monitoring; honest, supportive education is more appropriate.'},
 ],
 rationale:'Nursing support for CKD/ESKD includes helping clients understand that dietary and lifestyle restrictions are protective measures for their remaining kidney function, not punishment, which supports better long-term coping and adherence.',
 tip:'NCLEX tip: psychosocial support questions often test whether you frame restrictions supportively rather than punitively — look for this framing in answer choices.'},

{id:'r56',type:'mc',stem:'Which of the three core principles of hemodialysis is primarily responsible for removing excess fluid through pressure-driven movement across the membrane?',
 options:[
  {t:'Diffusion',c:false,why:'Diffusion is the process responsible for removing solutes/toxins down a concentration gradient, not primarily for fluid removal.'},
  {t:'Osmosis',c:false,why:'Osmosis contributes to water removal but is less efficient than ultrafiltration, which is the pressure-driven mechanism specifically described in the stem.'},
  {t:'Ultrafiltration',c:true,why:''},
  {t:'Active transport',c:false,why:'Active transport is not one of the three core principles (diffusion, osmosis, ultrafiltration) underlying hemodialysis.'},
 ],
 rationale:'Ultrafiltration is the pressure-driven process that removes excess fluid during hemodialysis, and is more efficient at fluid removal than osmosis alone.',
 tip:'NCLEX tip: keep the three HD principles straight — diffusion for solutes, osmosis and ultrafiltration for water, with ultrafiltration being pressure-driven and more efficient.'},

{id:'r57',type:'mc',stem:'A client asks how the hemodialysis machine actually filters the blood. Which explanation is most accurate?',
 options:[
  {t:'Blood flows through hollow semipermeable fibers in the dialyzer while dialysate flows around them, allowing solutes and fluid to cross while keeping blood cells and large proteins in the blood',c:true,why:''},
  {t:'The dialyzer directly injects filtered dialysate into the bloodstream to dilute toxins',c:false,why:'This does not describe how the dialyzer functions; dialysate does not get injected directly into the blood, but instead flows around the fiber bundle to allow diffusion and ultrafiltration.'},
  {t:'The dialyzer works by completely replacing the client\'s blood volume with new fluid',c:false,why:'The dialyzer filters and returns the client\'s own blood; it does not replace the client\'s entire blood volume.'},
  {t:'The dialyzer relies solely on the client\'s own kidneys working alongside the machine',c:false,why:'Hemodialysis is used specifically because the client\'s kidneys cannot adequately perform this function on their own; the dialyzer substitutes for that lost function.'},
 ],
 rationale:'The dialyzer ("artificial kidney") contains thousands of hollow semipermeable fibers; blood flows through the fibers while dialysate flows around them, allowing solutes and fluid to cross the membrane while blood cells and large proteins remain in the blood.',
 tip:'NCLEX tip: visualize the dialyzer as a bundle of straws (fibers) bathed in dialysate — this mental picture helps you reason through HD physiology questions.'},

{id:'r58',type:'mc',stem:'A client is scheduled to have an AV fistula placed for future hemodialysis access. What should the nurse teach about the expected timeline?',
 options:[
  {t:'The fistula can typically be used for dialysis within 24 to 48 hours of placement',c:false,why:'This timeline is far too short; an AV fistula requires much longer to mature before it can be safely used.'},
  {t:'The fistula generally needs several weeks to months to mature before it can be used',c:true,why:''},
  {t:'The fistula never needs to mature and can be used immediately after surgery',c:false,why:'Immediate use is not appropriate; the fistula must mature to handle the increased blood flow required for dialysis.'},
  {t:'Maturation time is identical to that of an AV graft',c:false,why:'AV grafts mature faster than fistulas, so the maturation timelines are not identical between the two access types.'},
 ],
 rationale:'An AV fistula needs weeks to months to mature before it can be safely used for hemodialysis, which is why it is considered the preferred long-term access but requires early planning and placement before it is needed.',
 tip:'NCLEX tip: contrast fistula maturation (weeks to months, but lowest complication rate) with graft maturation (faster, but higher infection/thrombosis risk) — expect this comparison on exams.'},

{id:'r59',type:'mc',stem:'A client asks why a temporary double-lumen catheter is not preferred for long-term hemodialysis access. What is the best explanation?',
 options:[
  {t:'It carries a higher risk of infection compared with a fistula or graft',c:true,why:''},
  {t:'It cannot provide adequate blood flow for any dialysis session',c:false,why:'Temporary catheters can provide adequate blood flow for dialysis; the concern is long-term infection risk, not inadequate flow.'},
  {t:'It requires surgical maturation just like an AV fistula',c:false,why:'Temporary catheters do not require a maturation period; they can be used quickly, which is actually one of their few advantages.'},
  {t:'It is used only for peritoneal dialysis, not hemodialysis',c:false,why:'Double-lumen catheters placed in central veins are used for hemodialysis access, not peritoneal dialysis.'},
 ],
 rationale:'A temporary double-lumen catheter provides quick vascular access but carries a higher risk of infection compared with an AV fistula or graft, which is why it is generally reserved for short-term or urgent use rather than long-term dialysis access.',
 tip:'NCLEX tip: rank HD access types by infection risk from lowest to highest — fistula, then graft, then temporary catheter — to help answer access-comparison questions.'},

{id:'r60',type:'mc',stem:'A client on hemodialysis develops a headache, nausea, and confusion during a treatment session, particularly after a very high pre-treatment BUN. What complication should the nurse suspect?',
 options:[
  {t:'Disequilibrium syndrome',c:true,why:''},
  {t:'Peritonitis',c:false,why:'Peritonitis is a complication of peritoneal dialysis, not hemodialysis, and would not explain this presentation.'},
  {t:'Access site clotting',c:false,why:'Access clotting would present with loss of thrill/bruit at the fistula or graft site, not headache, nausea, and confusion.'},
  {t:'Uremic fetor',c:false,why:'Uremic fetor refers to breath odor associated with uremia, not the acute neurologic symptoms described in this scenario.'},
 ],
 rationale:'Disequilibrium syndrome results from a rapid shift of fluid into the brain during hemodialysis, particularly when BUN is very high before treatment or dialysis is aggressive early on, causing headache, nausea, and confusion.',
 tip:'NCLEX tip: disequilibrium syndrome is more likely early in a client\'s dialysis course or with very high pre-treatment BUN — connect this timing detail to the diagnosis.'},

{id:'r61',type:'sata',stem:'The nurse is caring for a client during a hemodialysis session. Which findings would require prompt intervention? Select all that apply.',
 options:[
  {t:'Blood pressure drop from 130/80 to 82/54 mmHg with dizziness',c:true,why:''},
  {t:'New muscle cramping in the legs during treatment',c:true,why:''},
  {t:'A palpable thrill and audible bruit over the AV fistula',c:false,why:'A palpable thrill and audible bruit are expected, reassuring findings indicating a patent access, not a concern requiring intervention.'},
  {t:'New arrhythmia noted on the cardiac monitor',c:true,why:''},
  {t:'Client resting quietly and watching television during treatment',c:false,why:'This is a normal, unremarkable finding during a routine dialysis session and does not require intervention.'},
 ],
 rationale:'Hypotension with dizziness, muscle cramping, and new arrhythmias are recognized hemodialysis complications requiring prompt nursing attention, while a patent access site and a calm, resting client are expected, reassuring findings.',
 tip:'NCLEX tip: HD complication SATA items often mix in normal findings as distractors — read carefully to separate expected findings from true complications.'},

{id:'r62',type:'mc',stem:'Which statement about continuous venovenous hemofiltration (CVVH) is accurate?',
 options:[
  {t:'CVVH removes solutes primarily through convection via ultrafiltration rather than a dialysate bath',c:true,why:''},
  {t:'CVVH uses a dialysate bath around the filter fibers as its primary solute removal mechanism',c:false,why:'This describes CVVHD, not CVVH; CVVH primarily uses convection through ultrafiltration rather than a dialysate bath.'},
  {t:'CVVH is performed three times weekly for four hours each session',c:false,why:'This schedule describes standard intermittent hemodialysis, not CRRT modalities like CVVH, which run continuously.'},
  {t:'CVVH is typically used for stable clients on a general medical unit',c:false,why:'CRRT modalities like CVVH are reserved for hemodynamically unstable ICU clients, not stable clients on a general unit.'},
 ],
 rationale:'CVVH removes solutes primarily through convection via ultrafiltration, distinguishing it from CVVHD, which adds a dialysate bath around the filter fibers to enhance clearance through diffusion as well.',
 tip:'NCLEX tip: differentiate CVVH (convection/ultrafiltration only) from CVVHD (convection plus diffusion via dialysate) — both are CRRT forms used for unstable ICU clients.'},

{id:'r63',type:'mc',stem:'A client on peritoneal dialysis asks about the role of dextrose in the dialysate solution. What is the best explanation?',
 options:[
  {t:'Dextrose creates the osmotic gradient needed for ultrafiltration and fluid removal',c:true,why:''},
  {t:'Dextrose directly kills bacteria in the peritoneal cavity to prevent infection',c:false,why:'Dextrose does not have an antibacterial function; aseptic technique, not dextrose, is what helps prevent peritonitis.'},
  {t:'Dextrose is added only to improve the taste of the dialysate solution',c:false,why:'Dextrose has a specific osmotic function related to fluid removal, not a purpose related to taste, since the solution is not ingested.'},
  {t:'Dextrose replaces the need for the peritoneal membrane in filtering the blood',c:false,why:'Dextrose works with the peritoneal membrane to create an osmotic gradient; it does not replace the membrane\'s filtering role.'},
 ],
 rationale:'Dextrose in the peritoneal dialysate creates the osmotic gradient needed to draw fluid out of the blood and into the peritoneal cavity, enabling ultrafiltration during the exchange.',
 tip:'NCLEX tip: connect dextrose concentration in PD fluid to ultrafiltration strength — higher dextrose concentrations pull more fluid, which is a common teaching and calculation point.'},

{id:'r64',type:'mc',stem:'A client using continuous cyclic peritoneal dialysis (CCPD) asks how this differs from CAPD. What is the best explanation?',
 options:[
  {t:'CCPD uses an automated cycler to perform exchanges overnight while the client sleeps, freeing up daytime hours',c:true,why:''},
  {t:'CCPD requires manual exchanges performed by the client four to five times during the day',c:false,why:'This describes CAPD, not CCPD, which uses an automated cycler rather than manual daytime exchanges.'},
  {t:'CCPD is used only for clients who are hemodynamically unstable in the ICU',c:false,why:'CCPD is a home-based, chronic PD modality, not a modality reserved for unstable ICU clients, which is more consistent with acute intermittent PD or CRRT.'},
  {t:'CCPD eliminates the need for any dialysate exchanges altogether',c:false,why:'CCPD still performs dialysate exchanges; it simply automates them overnight using a cycler rather than eliminating the need for exchanges.'},
 ],
 rationale:'CCPD uses an automated cycler to perform dialysate exchanges overnight while the client sleeps, freeing up daytime hours, in contrast to CAPD, which requires manual exchanges performed by the client several times throughout the day.',
 tip:'NCLEX tip: remember the split — CAPD is manual/daytime, CCPD is automated/overnight — as the key distinguishing feature between these two chronic PD approaches.'},

{id:'r65',type:'mc',stem:'Which complication is most associated with long-term peritoneal dialysis due to continuous dextrose absorption?',
 options:[
  {t:'Hypertriglyceridemia',c:true,why:''},
  {t:'Hypoglycemia',c:false,why:'Continuous dextrose absorption from PD fluid is more likely to contribute to elevated triglycerides and glucose issues, not hypoglycemia.'},
  {t:'Severe hypercalcemia',c:false,why:'Hypercalcemia is not the complication classically linked to continuous dextrose absorption in PD; hypertriglyceridemia is the recognized association.'},
  {t:'Metabolic alkalosis',c:false,why:'Continuous dextrose absorption is linked to lipid changes such as hypertriglyceridemia, not to an acid-base disturbance like metabolic alkalosis.'},
 ],
 rationale:'Long-term peritoneal dialysis with continuous dextrose absorption from the dialysate is associated with hypertriglyceridemia, an important long-term complication to monitor for in chronic PD clients.',
 tip:'NCLEX tip: connect ongoing dextrose exposure in PD to a metabolic complication (hypertriglyceridemia) — this is a less obvious but testable long-term PD consequence.'},

{id:'r66',type:'mc',stem:'A client on PD develops an abdominal hernia. What is the most likely contributing factor?',
 options:[
  {t:'Chronic increased intra-abdominal pressure from repeated dialysate instillation',c:true,why:''},
  {t:'A vitamin deficiency unrelated to the dialysis process',c:false,why:'Vitamin deficiency is not the recognized cause of abdominal hernias in PD clients; increased intra-abdominal pressure from repeated fluid instillation is the mechanism.'},
  {t:'Excessive potassium loss through the dialysate',c:false,why:'Potassium loss through dialysate is a separate PD-related concern and does not directly explain hernia formation.'},
  {t:'An allergic reaction to the PD catheter material',c:false,why:'An allergic reaction would more likely present with local skin irritation, not a structural hernia.'},
 ],
 rationale:'Repeated instillation of dialysate fluid into the peritoneal cavity increases intra-abdominal pressure over time, which can contribute to the development of abdominal hernias in clients on long-term peritoneal dialysis.',
 tip:'NCLEX tip: group abdominal hernias with other mechanical PD complications (catheter kinks, constipation, fibrin clots) as a category distinct from infectious complications like peritonitis.'},

{id:'r67',type:'mc',stem:'A client asks whether IV fluids can be given quickly to a dialysis-dependent client who appears mildly dehydrated. What is the best nursing response?',
 options:[
  {t:'"IV fluids should be given cautiously and slowly, since dialysis clients can\'t reliably excrete excess free water."',c:true,why:''},
  {t:'"IV fluids can be given as rapidly as needed since dialysis will remove any excess."',c:false,why:'This is inaccurate and unsafe; rapid infusion risks pulmonary edema before the next scheduled dialysis session can remove the excess fluid.'},
  {t:'"IV fluids are contraindicated in all dialysis clients under any circumstance."',c:false,why:'IV fluids are not universally contraindicated; they may be needed but must be given cautiously and slowly rather than being avoided entirely.'},
  {t:'"Fluid administration rate does not matter for clients on dialysis."',c:false,why:'Rate absolutely matters because dialysis clients have limited ability to excrete excess free water between treatments, increasing pulmonary edema risk with rapid infusion.'},
 ],
 rationale:'Dialysis clients cannot reliably excrete excess free water on their own, so IV fluids must be given cautiously and slowly to avoid precipitating pulmonary edema before the next scheduled dialysis session.',
 tip:'NCLEX tip: "slow and cautious" IV fluid administration is a universal safety principle for any client with significantly reduced kidney function, dialysis-dependent or not.'},

{id:'r68',type:'mc',stem:'Which of the following is considered an urgent indication for acute dialysis?',
 options:[
  {t:'A pericardial friction rub in a client with uremia',c:true,why:''},
  {t:'A serum potassium of 4.8 mEq/L with no ECG changes',c:false,why:'A potassium of 4.8 mEq/L is within normal limits and would not represent an urgent indication for dialysis.'},
  {t:'Mild, stable peripheral edema unchanged over several days',c:false,why:'Mild, stable edema without other signs of volume overload or respiratory compromise is not an urgent indication for dialysis.'},
  {t:'A client\'s report of mild fatigue after a long day',c:false,why:'General fatigue alone, without other signs of severe uremia or metabolic derangement, is not an urgent dialysis indication.'},
 ],
 rationale:'A pericardial friction rub in a uremic client suggests uremic pericarditis, which is considered an urgent indicator for dialysis, alongside severe hyperkalemia, impending pulmonary edema, worsening acidosis, and advanced uremia unresponsive to other treatment.',
 tip:'NCLEX tip: memorize the classic list of urgent dialysis indications together — severe hyperkalemia, fluid overload, worsening acidosis, uremic pericarditis, and advanced uremia.'},

{id:'r69',type:'mc',stem:'Which statement best reflects the psychosocial impact of long-term dialysis that the nurse should address?',
 options:[
  {t:'Dialysis can be physically exhausting and may affect employment, relationships, and mental health, so ongoing psychosocial support is important',c:true,why:''},
  {t:'Dialysis has no significant psychosocial impact once a client adjusts to the schedule',c:false,why:'This understates the real and ongoing psychosocial burden dialysis can place on a client\'s life, relationships, and mental health.'},
  {t:'Psychosocial support is only necessary during the first week of starting dialysis',c:false,why:'Psychosocial needs related to dialysis are ongoing, not limited to the first week, given the chronic and life-altering nature of the treatment.'},
  {t:'Psychosocial concerns should be addressed only by family members, not the healthcare team',c:false,why:'The healthcare team, including nursing, plays an active role in providing ongoing psychosocial support, not just family members alone.'},
 ],
 rationale:'Dialysis is physically exhausting and can significantly affect a client\'s employment, relationships, body image, and mental health; nurses play an important ongoing role in helping clients build coping and resilience strategies.',
 tip:'NCLEX tip: don\'t overlook psychosocial support items in dialysis-related NCLEX questions — they are frequently tested alongside the more technical physical care content.'},

{id:'r70',type:'fill',stem:'A client with an AV fistula for hemodialysis should have blood pressure measurements, IV insertions, and venipuncture avoided in the _____ arm.',
 answers:['access','fistula','access arm','fistula arm'],
 rationale:'The access arm (the arm containing the AV fistula or graft) must be protected from blood pressure cuffs, IV insertion, and venipuncture to prevent damage to the vascular access needed for dialysis.',
 tip:'NCLEX tip: this is one of the most consistently tested single facts in the renal unit — commit "no BP, no IV, no draws" on the access arm to memory without hesitation.'},

{id:'r71',type:'fill',stem:'The complication of peritoneal dialysis that presents with cloudy dialysate effluent and abdominal pain is called _____.',
 answers:['peritonitis'],
 rationale:'Peritonitis is the most common and serious complication of peritoneal dialysis, typically first identified by cloudy dialysate effluent, often accompanied by abdominal pain and tenderness.',
 tip:'NCLEX tip: cloudy effluent should always trigger you to think peritonitis first in a PD client scenario.'},

{id:'r72',type:'bowtie',stem:'A client on peritoneal dialysis calls reporting cloudy effluent, low-grade fever, and abdominal tenderness. Complete the bowtie: select the most likely condition, two priority nursing actions, and two parameters to monitor.',
 sections:[
  {label:'Likely condition (select 1)', correctCount:1, options:[
    {t:'Peritonitis',c:true},
    {t:'Acute pyelonephritis',c:false},
    {t:'AV fistula thrombosis',c:false},
    {t:'Disequilibrium syndrome',c:false},
  ]},
  {label:'Priority actions (select 2)', correctCount:2, options:[
    {t:'Instruct the client to come in for evaluation and effluent culture',c:true},
    {t:'Begin prescribed intraperitoneal or IV antibiotics once confirmed',c:true},
    {t:'Increase the dextrose concentration to clear the infection faster',c:false},
    {t:'Tell the client this is a normal variant and no action is needed',c:false},
    {t:'Discontinue all future PD exchanges permanently without further evaluation',c:false},
  ]},
  {label:'Parameters to monitor (select 2)', correctCount:2, options:[
    {t:'Effluent white blood cell count',c:true},
    {t:'Abdominal pain and tenderness',c:true},
    {t:'Visual acuity',c:false},
    {t:'Range of motion in the fistula arm',c:false},
  ]},
 ],
 rationale:'Cloudy effluent with fever and abdominal tenderness is the classic presentation of PD-related peritonitis. Management includes prompt evaluation with effluent WBC count/culture and antibiotic therapy, with close monitoring of the effluent appearance/cell count and abdominal symptoms.',
 tip:'NCLEX tip: for any bowtie involving a PD client, connect "cloudy effluent" directly to peritonitis before considering other options.'},

{id:'r73',type:'mc',stem:'A client asks why urosepsis is considered a medical emergency. What is the best explanation?',
 options:[
  {t:'"Urosepsis means the infection has spread from the urinary tract into the bloodstream, causing systemic sepsis."',c:true,why:''},
  {t:'"Urosepsis simply means you have more bacteria in your urine than usual."',c:false,why:'This describes bacteriuria, not urosepsis, which specifically involves systemic bloodstream infection rather than just elevated bacteria counts in urine.'},
  {t:'"Urosepsis is a mild condition that resolves without antibiotics."',c:false,why:'Urosepsis is a serious, potentially life-threatening condition requiring prompt treatment, not a mild, self-resolving issue.'},
  {t:'"Urosepsis only affects the kidneys and does not involve the rest of the body."',c:false,why:'Urosepsis specifically involves systemic spread beyond the urinary tract into the bloodstream, affecting the whole body, not just the kidneys.'},
 ],
 rationale:'Urosepsis occurs when infection spreads from the urinary tract into the bloodstream, causing systemic sepsis — a medical emergency requiring prompt recognition and escalation of care.',
 tip:'NCLEX tip: watch for fever, tachycardia, hypotension, and altered mental status in a UTI client as red flags for urosepsis requiring prompt escalation.'},

{id:'r74',type:'mc',stem:'Which term describes the backward flow of urine from the bladder up into one or both ureters?',
 options:[
  {t:'Urethrovesical reflux',c:false,why:'Urethrovesical reflux describes backward flow from the urethra into the bladder, not from the bladder up into the ureters.'},
  {t:'Vesicoureteral (ureterovesical) reflux',c:true,why:''},
  {t:'Urosepsis',c:false,why:'Urosepsis refers to systemic bloodstream infection originating from the urinary tract, not a reflux mechanism.'},
  {t:'Bacteriuria',c:false,why:'Bacteriuria simply refers to the presence of bacteria in the urine, not a reflux mechanism.'},
 ],
 rationale:'Vesicoureteral (ureterovesical) reflux is the backward flow of urine from the bladder up into one or both ureters, which can carry bacteria toward the kidneys and increase the risk of pyelonephritis.',
 tip:'NCLEX tip: distinguish urethrovesical reflux (urethra to bladder) from vesicoureteral reflux (bladder to ureter) — the direction of flow is the key differentiator.'},

{id:'r75',type:'mc',stem:'Which organism most commonly causes urinary tract infections via the ascending (transurethral) route?',
 options:[
  {t:'Escherichia coli (E. coli)',c:true,why:''},
  {t:'Staphylococcus aureus',c:false,why:'While S. aureus can cause infections elsewhere, it is not the most common organism responsible for ascending UTIs from fecal contamination.'},
  {t:'Candida albicans',c:false,why:'Candida can cause urinary infections in certain populations but is not the most common cause of typical ascending bacterial UTIs.'},
  {t:'Mycobacterium tuberculosis',c:false,why:'Tuberculosis can rarely involve the urinary tract but is not the common cause of ordinary ascending UTIs.'},
 ],
 rationale:'Most urinary tract infections arise from fecal organisms, most commonly E. coli, ascending the urethra into the bladder, which is why good perineal hygiene is a key prevention strategy.',
 tip:'NCLEX tip: E. coli via the ascending route is the highest-yield, most frequently tested UTI organism/route combination.'},

{id:'r76',type:'mc',stem:'A client with suspected UTI also reports vaginal discharge and pelvic discomfort. What should the nurse consider?',
 options:[
  {t:'Testing for sexually transmitted infections, since organisms like Chlamydia or Trichomonas can mimic UTI symptoms',c:true,why:''},
  {t:'Assuming the symptoms are unrelated and require no further evaluation',c:false,why:'Given the overlapping symptoms, further evaluation is warranted rather than dismissing the new findings as unrelated.'},
  {t:'Starting antibiotics for a UTI without considering any other possible cause',c:false,why:'Treating for a UTI alone without considering an STI as a possible cause could result in an incomplete or incorrect treatment plan.'},
  {t:'Recommending the client simply increase fluid intake and wait to see if symptoms resolve',c:false,why:'Given the additional symptoms suggesting a possible STI, further diagnostic evaluation is more appropriate than a wait-and-see approach.'},
 ],
 rationale:'Organisms such as Chlamydia, Neisseria gonorrhoeae, herpes, Trichomonas, and Candida can mimic UTI symptoms, so STI testing may be warranted when additional findings like vaginal discharge or pelvic discomfort are present.',
 tip:'NCLEX tip: whenever a stem includes vaginal or pelvic-specific symptoms alongside "UTI-like" complaints, consider STI testing as part of the differential.'},

{id:'r77',type:'mc',stem:'A client with an uncomplicated case of cystitis is prescribed a short course of antibiotics. Which client population would typically require a longer treatment course instead?',
 options:[
  {t:'Pregnant women and men with UTIs',c:true,why:''},
  {t:'Nonpregnant women with a first-time uncomplicated infection',c:false,why:'This group is the one most likely to be treated successfully with a short single-dose, 3-day, or 7-day regimen, not a longer course.'},
  {t:'Clients with no history of any urinary symptoms',c:false,why:'This description does not represent a population needing a longer antibiotic course, since it does not describe a complicated infection at all.'},
  {t:'Adolescents with a single episode of mild dysuria only',c:false,why:'A single episode of mild dysuria in an adolescent without complicating factors would not typically require an extended antibiotic course.'},
 ],
 rationale:'Longer antibiotic courses are generally used for men, pregnant women, and clients with complicated UTIs or pyelonephritis, while uncomplicated cystitis in nonpregnant women is often treated with a shorter course.',
 tip:'NCLEX tip: remember which populations "graduate" from short-course to longer-course UTI therapy — pregnancy, male sex, and complicated infection are the key triggers.'},

{id:'r78',type:'mc',stem:'A client asks whether phenazopyridine (Pyridium) will cure their UTI. What is the best nursing response?',
 options:[
  {t:'"Phenazopyridine relieves the burning and discomfort of a UTI but does not treat the underlying infection itself."',c:true,why:''},
  {t:'"Phenazopyridine is a first-line antibiotic that will cure your infection."',c:false,why:'Phenazopyridine is a urinary analgesic, not an antibiotic, and does not treat the underlying infection.'},
  {t:'"Phenazopyridine prevents future UTIs from occurring."',c:false,why:'Phenazopyridine does not have a preventive effect on future infections; it only provides symptomatic relief during an active infection.'},
  {t:'"Phenazopyridine should be taken instead of any prescribed antibiotic."',c:false,why:'Phenazopyridine should be used alongside, not instead of, a prescribed antibiotic, since it does not treat the infection itself.'},
 ],
 rationale:'Phenazopyridine is a urinary analgesic that can relieve the burning and discomfort of a UTI, but it does not treat the underlying infection and should be used alongside, not in place of, appropriate antibiotic therapy.',
 tip:'NCLEX tip: phenazopyridine also commonly turns urine orange — a helpful, testable side-effect detail to remember alongside its role as a symptomatic (not curative) treatment.'},
{id:'r79',type:'mc',stem:'A client with CKD stage 4 asks about dialysis planning. When should referral for dialysis or transplant education typically begin?',
 options:[
  {t:'Only after the client reaches stage 5 and becomes symptomatic',c:false,why:'Waiting until stage 5 and symptomatic uremia delays planning and can worsen outcomes; earlier referral is preferred.'},
  {t:'Early, as CKD progresses through the stages, to allow time for planning and access preparation',c:true,why:''},
  {t:'Only if the client specifically requests information about dialysis',c:false,why:'Proactive nursing and provider education should be offered rather than waiting for the client to request it, given the complexity of dialysis planning.'},
  {t:'Referral is unnecessary since dialysis decisions can be made the same day treatment is needed',c:false,why:'Same-day decision-making is not appropriate, since vascular access (like an AV fistula) requires weeks to months of advance planning.'},
 ],
 rationale:'Early referral for dialysis or transplant planning as CKD progresses allows time for education, vascular access planning (which can take months to mature), and consideration of a pre-emptive transplant, which is associated with the best outcomes.',
 tip:'NCLEX tip: early planning is a recurring theme in CKD management — tie it back to the fact that AV fistulas need weeks to months to mature.'},

{id:'r80',type:'mc',stem:'Which lab value is generally considered the most reliable single marker for tracking a client\'s kidney function trend over time?',
 options:[
  {t:'Serum creatinine',c:true,why:''},
  {t:'BUN',c:false,why:'BUN is influenced by many other variables such as hydration status, diet, GI bleeding, and steroid use, making it less reliable than creatinine as a trend marker.'},
  {t:'Serum albumin',c:false,why:'Albumin reflects nutritional and synthetic liver function more than kidney function specifically.'},
  {t:'Serum calcium',c:false,why:'While calcium is affected by kidney disease, it is not considered the primary marker for tracking overall kidney function trends.'},
 ],
 rationale:'Serum creatinine is generally considered the most reliable single marker of kidney function trend because, unlike BUN, it is less influenced by hydration status, diet, GI bleeding, or steroid use.',
 tip:'NCLEX tip: remember why creatinine is preferred over BUN as a kidney function marker — BUN has too many confounding variables affecting its level.'},

{id:'r81',type:'mc',stem:'A client with CKD has been prescribed a phosphate binder to be taken with meals. What is the priority teaching point?',
 options:[
  {t:'Take the medication with food, since it works by binding dietary phosphorus in the GI tract',c:true,why:''},
  {t:'Take the medication on an empty stomach, at least one hour before any meal',c:false,why:'Phosphate binders need to be taken with food to bind the phosphorus present in the meal, not on an empty stomach.'},
  {t:'This medication should be taken only once a week regardless of meal frequency',c:false,why:'Phosphate binders are generally taken with each meal, not on a weekly schedule, to bind phosphorus from each meal\'s food intake.'},
  {t:'This medication treats hypocalcemia directly and has no effect on phosphorus',c:false,why:'Phosphate binders primarily work by binding dietary phosphorus, which indirectly helps normalize calcium-phosphorus balance, rather than treating hypocalcemia directly.'},
 ],
 rationale:'Phosphate binders must be taken with meals because they work by binding dietary phosphorus in the gastrointestinal tract, preventing its absorption and helping control serum phosphorus levels in CKD.',
 tip:'NCLEX tip: phosphate binder timing (with meals) is a classic medication-administration teaching point tested across CKD and dialysis content.'},

{id:'r82',type:'mc',stem:'Which finding would the nurse expect in a client with well-compensated CKD who has not yet reached ESKD?',
 options:[
  {t:'Mild to moderate elevation in creatinine with the client remaining largely asymptomatic',c:true,why:''},
  {t:'Complete anuria requiring immediate dialysis',c:false,why:'Complete anuria requiring immediate dialysis is more characteristic of advanced ESKD or acute severe kidney failure, not well-compensated earlier-stage CKD.'},
  {t:'Severe, symptomatic uremia with marked confusion',c:false,why:'Severe symptomatic uremia is more typical of advanced, poorly compensated CKD/ESKD rather than earlier, well-compensated stages.'},
  {t:'No detectable abnormality in any kidney-related lab value',c:false,why:'By definition, CKD involves some measurable kidney damage or decreased GFR, so a completely normal lab profile would not be consistent with a CKD diagnosis.'},
 ],
 rationale:'Earlier-stage, well-compensated CKD often presents with mild to moderate laboratory changes while the client remains largely asymptomatic, whereas more advanced or decompensated CKD produces overt uremic symptoms.',
 tip:'NCLEX tip: connect CKD stage severity to expected symptom burden — earlier stages are often silent, which is why routine screening in at-risk clients matters so much.'},

{id:'r83',type:'mc',stem:'A client with CKD reports decreased libido and irregular menstrual cycles. What is the most likely explanation?',
 options:[
  {t:'Hormonal disturbances related to uremia and CKD affecting reproductive function',c:true,why:''},
  {t:'A normal, expected change unrelated to kidney disease at any stage',c:false,why:'These reproductive changes are a recognized manifestation of CKD-related hormonal disturbance, not an unrelated normal variant.'},
  {t:'An adverse effect specifically caused by antihypertensive medication only',c:false,why:'While medications can have side effects, the primary explanation described in CKD content is hormonal disturbance from uremia itself, not medication alone.'},
  {t:'A sign that the client\'s kidney function has fully recovered',c:false,why:'These findings are a manifestation of ongoing CKD-related dysfunction, not a sign of recovery.'},
 ],
 rationale:'CKD is associated with reproductive manifestations such as amenorrhea, decreased libido, and infertility, related to the broader hormonal and uremic disturbances caused by declining kidney function.',
 tip:'NCLEX tip: remember reproductive changes as part of the "uremia affects every system" theme in CKD, alongside neuro, cardiac, GI, and integumentary findings.'},

{id:'r84',type:'mc',stem:'Which of the following best distinguishes an AV graft from an AV fistula for hemodialysis access?',
 options:[
  {t:'A graft uses synthetic tubing to connect an artery to a vein and matures faster, but has higher infection/thrombosis rates',c:true,why:''},
  {t:'A graft uses the client\'s own vessels directly connected together, just like a fistula',c:false,why:'This describes a fistula, not a graft; a graft specifically uses synthetic tubing rather than a direct native vessel connection.'},
  {t:'A graft has a lower infection risk than a fistula',c:false,why:'A graft actually has a higher infection and thrombosis risk compared with a fistula, not a lower one.'},
  {t:'A graft is only used for temporary, short-term dialysis access',c:false,why:'While an AV graft may mature faster than a fistula, it is still intended for longer-term use, not simply a temporary short-term access like a central venous catheter.'},
 ],
 rationale:'An AV graft uses synthetic tubing to connect an artery to a vein, is used when a client\'s own vessels are unsuitable for a fistula, matures faster than a fistula, but carries higher rates of infection and thrombosis.',
 tip:'NCLEX tip: build a simple mental table comparing fistula vs. graft vs. catheter across maturation time and infection risk — this comparison shows up often.'},

{id:'r85',type:'mc',stem:'A client with ESKD asks why medication timing matters around their hemodialysis schedule. Which explanation is most accurate?',
 options:[
  {t:'"Some medications, especially water-soluble ones that aren\'t protein-bound, can be removed by dialysis, so timing affects how well they work."',c:true,why:''},
  {t:'"Medication timing has no relationship to dialysis and can be given whenever is convenient."',c:false,why:'This is inaccurate; certain medications are significantly affected by removal during dialysis, making timing clinically important.'},
  {t:'"All medications are completely removed by dialysis regardless of their properties."',c:false,why:'Not all medications are removed by dialysis; protein-bound drugs generally remain in the blood, unlike water-soluble, non-protein-bound drugs.'},
  {t:'"Medication timing only matters for antibiotics, not other drug classes."',c:false,why:'Medication timing relative to dialysis can matter for various drug classes with the relevant water-solubility and protein-binding properties, not exclusively antibiotics.'},
 ],
 rationale:'Medications that are water-soluble and not protein-bound are readily removed by hemodialysis, so their dosing and timing must be coordinated with treatment days to avoid reduced effectiveness.',
 tip:'NCLEX tip: "water-soluble and not protein-bound" is the specific phrase to look for when identifying medications affected by dialysis removal.'},

{id:'r86',type:'mc',stem:'A client with ESKD develops uremic pericarditis. Which finding would the nurse expect to auscultate?',
 options:[
  {t:'A pericardial friction rub',c:true,why:''},
  {t:'A bruit over the carotid artery',c:false,why:'A carotid bruit relates to vascular narrowing elsewhere, not to pericardial inflammation.'},
  {t:'Crackles localized only to the bases of both lungs',c:false,why:'Crackles suggest a pulmonary process such as fluid overload, not the classic auscultation finding of pericarditis.'},
  {t:'A systolic ejection murmur at the aortic area',c:false,why:'A systolic ejection murmur suggests a valvular abnormality, not the classic friction rub heard with pericarditis.'},
 ],
 rationale:'Uremic pericarditis produces a pericardial friction rub on auscultation, which is considered an urgent indicator for dialysis in a client with advanced kidney disease.',
 tip:'NCLEX tip: pericardial friction rub plus uremia should immediately trigger consideration of urgent dialysis need.'},

{id:'r87',type:'mc',stem:'Which teaching point should the nurse include for a client newly started on peritoneal dialysis regarding bag exchanges?',
 options:[
  {t:'Use meticulous aseptic technique with every bag change and connection',c:true,why:''},
  {t:'Bag exchanges do not require any special hand hygiene since the system is closed',c:false,why:'Even with a closed system, meticulous aseptic technique remains essential to reduce the risk of peritonitis during each exchange.'},
  {t:'It is acceptable to reuse dialysate bags to reduce cost',c:false,why:'Reusing dialysate bags is not appropriate and would significantly increase infection risk.'},
  {t:'Aseptic technique is only necessary for the first exchange after catheter placement',c:false,why:'Aseptic technique must be used for every exchange throughout the client\'s time on PD, not just the first one after placement.'},
 ],
 rationale:'Meticulous aseptic technique with all bag changes and connections is essential in peritoneal dialysis to reduce the risk of peritonitis, the most common and serious PD complication.',
 tip:'NCLEX tip: aseptic technique for every single PD exchange, without exception, is one of the highest-yield PD safety teaching points.'},

{id:'r88',type:'mc',stem:'A client with AKI has a serum potassium of 5.9 mEq/L without ECG changes. Which initial approach would the nurse anticipate?',
 options:[
  {t:'Administration of a cation-exchange resin such as sodium polystyrene sulfonate',c:true,why:''},
  {t:'Emergency IV calcium gluconate as the very first intervention',c:false,why:'IV calcium is generally reserved for cardiac membrane stabilization when ECG changes are present; without ECG changes, a slower-onset approach is typically used first.'},
  {t:'Immediate hemodialysis as the only appropriate response',c:false,why:'Without ECG changes, an immediate jump to hemodialysis is not necessarily the first step; slower-acting measures may be tried initially depending on the full clinical picture.'},
  {t:'No treatment is needed since this potassium level is within normal limits',c:false,why:'A potassium of 5.9 mEq/L is elevated above normal limits and does require treatment, even without ECG changes.'},
 ],
 rationale:'For non-emergent hyperkalemia without ECG changes, a cation-exchange resin such as sodium polystyrene sulfonate (Kayexalate) may be used, given its slower onset (over several hours) compared with the rapid, temporary shifts produced by insulin/dextrose and calcium.',
 tip:'NCLEX tip: match the urgency of the hyperkalemia treatment to the clinical picture — ECG changes call for rapid, temporary shifting agents; stable, non-emergent elevations may be managed more slowly.'},

{id:'r89',type:'mc',stem:'Which of the following would be an appropriate discharge teaching point for a client recovering from pyelonephritis?',
 options:[
  {t:'Complete the full prescribed course of antibiotics even if symptoms improve early',c:true,why:''},
  {t:'Stop antibiotics as soon as flank pain resolves to avoid overuse',c:false,why:'Stopping antibiotics early, even when symptoms improve, increases the risk of incomplete treatment and recurrence, so the full course should be completed.'},
  {t:'Avoid drinking extra fluids since this could worsen kidney inflammation',c:false,why:'Adequate fluid intake is generally encouraged, unless contraindicated, to help flush the urinary tract, not avoided.'},
  {t:'No follow-up is needed once the antibiotic course is finished',c:false,why:'Follow-up may still be appropriate to confirm resolution of infection and to prevent recurrence, especially after upper urinary tract involvement.'},
 ],
 rationale:'Completing the full prescribed antibiotic course, even after symptoms improve, is essential to fully eradicate the infection and reduce the risk of recurrence or progression to complications.',
 tip:'NCLEX tip: "complete the full antibiotic course" is a universal medication-adherence teaching point tested across nearly every infectious disease topic, including UTIs and pyelonephritis.'},

{id:'r90',type:'mc',stem:'A client asks how cranberry supplementation relates to UTI prevention. What is the most accurate response?',
 options:[
  {t:'"Cranberry supplementation has some evidence for reducing UTI recurrence, but antibiotics remain more effective for treating an active infection."',c:true,why:''},
  {t:'"Cranberry supplementation is proven to cure an active UTI without antibiotics."',c:false,why:'Cranberry supplementation is not considered an effective cure for an active infection; antibiotics remain the standard treatment.'},
  {t:'"Cranberry supplementation has no evidence supporting any benefit for UTI prevention."',c:false,why:'This understates the evidence; cranberry supplementation does have some supportive evidence for reducing recurrence, even though it is not a substitute for antibiotics in active infection.'},
  {t:'"Cranberry supplementation should replace antibiotics for all UTI treatment going forward."',c:false,why:'This is inappropriate and inaccurate; antibiotics remain necessary for treating active infections despite any preventive role cranberry supplementation may have.'},
 ],
 rationale:'Cranberry supplementation has some evidence supporting a reduction in UTI recurrence, but antibiotics remain more effective for treating an active, established infection.',
 tip:'NCLEX tip: cranberry supplementation is a prevention strategy, not a treatment — keep this distinction clear when answering related teaching questions.'},

{id:'r91',type:'mc',stem:'Which client is at highest risk for developing a catheter-associated urinary tract infection (CAUTI)?',
 options:[
  {t:'A client with a long-term indwelling urinary catheter left in place for an extended period',c:true,why:''},
  {t:'A client who voids independently without any catheter in place',c:false,why:'Without an indwelling catheter, this client does not carry the specific risk factor that defines a CAUTI.'},
  {t:'A client using intermittent self-catheterization with strict technique and short duration',c:false,why:'While any catheterization carries some risk, an indwelling catheter left in place long-term carries a substantially higher CAUTI risk than well-performed intermittent catheterization.'},
  {t:'A client who is fully continent with no history of urinary retention',c:false,why:'This client profile does not include the key risk factor (indwelling catheter use) associated with CAUTI development.'},
 ],
 rationale:'CAUTI risk increases the longer an indwelling urinary catheter remains in place, which is why prompt removal as soon as clinically appropriate is a core nursing prevention strategy.',
 tip:'NCLEX tip: "remove the catheter as soon as possible" is the single most important, most tested CAUTI prevention nursing action.'},

{id:'r92',type:'sata',stem:'The nurse is reviewing dipstick urinalysis results for a client with suspected UTI. Which findings support this diagnosis? Select all that apply.',
 options:[
  {t:'Positive leukocyte esterase',c:true,why:''},
  {t:'Positive nitrites',c:true,why:''},
  {t:'Urine specific gravity within normal limits with no other findings',c:false,why:'A normal specific gravity alone does not support or refute a UTI diagnosis and is not a specific urinary infection marker.'},
  {t:'Visible red blood cells (hematuria) in some cases',c:true,why:''},
  {t:'A urine pH of exactly 6.0 with no other abnormal findings',c:false,why:'A urine pH of 6.0 alone, without other supporting findings, does not provide meaningful evidence of infection.'},
 ],
 rationale:'Positive leukocyte esterase (indicating white blood cells), positive nitrites (indicating certain bacteria), and hematuria in some cases all support a UTI diagnosis, while an isolated normal specific gravity or unremarkable pH does not.',
 tip:'NCLEX tip: leukocyte esterase and nitrites are the two dipstick findings most specifically linked to UTI — memorize them as a pair.'},

{id:'r93',type:'sata',stem:'A client is diagnosed with acute pyelonephritis. Which findings would the nurse expect to assess? Select all that apply.',
 options:[
  {t:'Fever and chills',c:true,why:''},
  {t:'Costovertebral angle (flank) tenderness',c:true,why:''},
  {t:'Nausea and vomiting',c:true,why:''},
  {t:'Complete absence of any urinary symptoms',c:false,why:'While presentation can vary, complete absence of any urinary symptoms would be an unusual and unlikely finding in acute pyelonephritis overall.'},
  {t:'Possible progression to gram-negative septic shock if untreated',c:true,why:''},
 ],
 rationale:'Acute pyelonephritis presents with systemic signs including fever, chills, flank/costovertebral angle tenderness, and GI symptoms such as nausea and vomiting, and can progress to gram-negative septic shock if left untreated.',
 tip:'NCLEX tip: remember that pyelonephritis can range from mild systemic symptoms all the way to septic shock — always assess for signs of clinical deterioration.'},

{id:'r94',type:'sata',stem:'The nurse is teaching a client about factors that increase the risk of developing a UTI. Which factors should be included? Select all that apply.',
 options:[
  {t:'Pregnancy',c:true,why:''},
  {t:'Diabetes mellitus',c:true,why:''},
  {t:'Neurogenic bladder or incomplete bladder emptying',c:true,why:''},
  {t:'Regular daily exercise with adequate hydration',c:false,why:'Regular exercise and adequate hydration are protective behaviors, not recognized UTI risk factors.'},
  {t:'Recent urinary catheterization or cystoscopy',c:true,why:''},
 ],
 rationale:'Recognized UTI risk factors include pregnancy, diabetes, neurologic disorders affecting bladder emptying, and recent catheterization or cystoscopy, while regular exercise and adequate hydration are protective rather than risk-increasing behaviors.',
 tip:'NCLEX tip: group UTI risk factors into "impaired emptying" (neurogenic bladder, obstruction) and "impaired defenses" (diabetes, pregnancy, decreased host defenses) to organize your review.'},

{id:'r95',type:'sata',stem:'A client on hemodialysis is being taught about maintaining their AV fistula. Which statements indicate correct understanding? Select all that apply.',
 options:[
  {t:'"I will check for a thrill by feeling over my fistula each day."',c:true,why:''},
  {t:'"I will avoid carrying heavy bags on the arm with my fistula."',c:true,why:''},
  {t:'"I can let my blood pressure be checked on the fistula arm if the other arm is inconvenient."',c:false,why:'Blood pressure should never be taken on the fistula arm regardless of convenience, since the pressure can damage the access.'},
  {t:'"I will notify my care team right away if I no longer feel the thrill."',c:true,why:''},
  {t:'"It\'s fine for lab draws to be done from my fistula arm since it\'s already accessed for dialysis."',c:false,why:'Blood draws should be avoided in the fistula arm to protect the access from potential damage or infection, using alternative sites for labs instead.'},
 ],
 rationale:'Correct AV fistula self-care includes daily thrill checks, avoiding pressure or heavy lifting on the access arm, prompt reporting of a lost thrill, and avoiding blood pressure measurements or blood draws in that arm.',
 tip:'NCLEX tip: fistula self-care teaching combines protection (no BP/draws/heavy lifting) with monitoring (daily thrill checks and prompt reporting of changes).'},

{id:'r96',type:'mc',stem:'A client with AKI has been prescribed a medication that requires renal dosing adjustment. Which nursing action best reflects safe practice?',
 options:[
  {t:'Verify the client\'s current renal function and confirm the dose has been adjusted accordingly before administration',c:true,why:''},
  {t:'Administer the standard adult dose regardless of renal function, since dosing charts are only a general guideline',c:false,why:'This ignores an important patient safety step; renal dosing adjustments must be verified before administering medications that require them.'},
  {t:'Assume the pharmacy has already adjusted every medication correctly without independent verification',c:false,why:'While pharmacy plays a role, nursing verification remains an important independent safety check before administering medications requiring renal adjustment.'},
  {t:'Skip the medication entirely without notifying the provider',c:false,why:'Skipping a needed medication without provider notification is not an appropriate independent nursing action; verifying and clarifying the order is the correct approach.'},
 ],
 rationale:'For medications requiring renal dose adjustment, the nurse should verify the client\'s current renal function and confirm the dose has been appropriately adjusted before administration, as part of safe medication practice in AKI/CKD.',
 tip:'NCLEX tip: renal dosing verification is a recurring safe medication administration theme across kidney disease content — always double-check before giving a renally-adjusted drug.'},

{id:'r97',type:'mc',stem:'Which statement about hemodialysis scheduling is accurate for most long-term ESKD clients?',
 options:[
  {t:'Typical outpatient hemodialysis is performed three times weekly for three to four hours per session',c:true,why:''},
  {t:'Hemodialysis is typically performed once a month for a full day',c:false,why:'This schedule does not reflect the typical, much more frequent outpatient hemodialysis regimen used for ESKD clients.'},
  {t:'Hemodialysis is performed continuously, 24 hours a day, every day',c:false,why:'This describes CRRT, which is used in the ICU for unstable clients, not typical outpatient maintenance hemodialysis.'},
  {t:'Hemodialysis frequency is the same for every client regardless of their clinical status',c:false,why:'While three times weekly is typical, frequency and duration can be individualized based on a client\'s specific clinical needs.'},
 ],
 rationale:'Typical outpatient hemodialysis for ESKD clients is performed three times weekly for three to four hours each session, though home hemodialysis is also an option for motivated, trained clients and caregivers.',
 tip:'NCLEX tip: "three times weekly, three to four hours" is the standard HD schedule fact to keep at the ready for scheduling-related questions.'},

{id:'r98',type:'mc',stem:'A client asks the nurse to explain the difference between hemodialysis and peritoneal dialysis in terms of hemodynamic effects. What is the best response?',
 options:[
  {t:'"Peritoneal dialysis is generally gentler on your blood pressure and circulation compared with hemodialysis."',c:true,why:''},
  {t:'"Hemodialysis is always gentler on the circulation than peritoneal dialysis."',c:false,why:'This reverses the accurate comparison; hemodialysis is more likely to cause rapid hemodynamic shifts than peritoneal dialysis.'},
  {t:'"There is no meaningful difference between the two modalities in terms of hemodynamic effects."',c:false,why:'There is a meaningful difference; PD is generally gentler on hemodynamics, which is part of why it may be preferred for clients with cardiovascular instability.'},
  {t:'"Peritoneal dialysis causes more dramatic blood pressure swings than hemodialysis."',c:false,why:'This is inaccurate; peritoneal dialysis is generally associated with gentler, more gradual fluid shifts compared with hemodialysis.'},
 ],
 rationale:'Peritoneal dialysis produces more gradual fluid and solute shifts than hemodialysis, making it gentler on hemodynamics, which is one reason it may be preferred for clients with cardiovascular instability.',
 tip:'NCLEX tip: hemodynamic stability is a key differentiator between dialysis modalities — remember PD as the gentler option and standard intermittent HD as more likely to cause rapid shifts.'},

{id:'r99',type:'mc',stem:'A client asks about acute intermittent peritoneal dialysis. Which client population is this approach typically used for?',
 options:[
  {t:'Unstable clients who are not suited for hemodialysis and need shorter PD exchange cycles',c:true,why:''},
  {t:'Stable, chronic ESKD clients managing their own care entirely at home over the long term',c:false,why:'Chronic, stable home management is more typical of CAPD or CCPD rather than acute intermittent PD, which is used for less stable clients.'},
  {t:'Clients who require only one dialysis exchange per month',c:false,why:'Acute intermittent PD involves short, frequent exchange cycles, not a single monthly exchange.'},
  {t:'Clients who have already received a kidney transplant and no longer need dialysis',c:false,why:'Clients who have received a functioning kidney transplant would not require ongoing dialysis of any kind.'},
 ],
 rationale:'Acute intermittent PD uses short exchanges (such as roughly 10 minutes infusion, 30 minutes dwell, 20 minutes drain) and is used for unstable clients who are not suited for hemodialysis.',
 tip:'NCLEX tip: match each PD approach to its clinical setting — acute intermittent PD for unstable clients, CAPD/CCPD for stable, chronic home management.'},

{id:'r100',type:'mc',stem:'A client with AKI asks why the nurse keeps checking daily weights so closely. What is the best explanation?',
 options:[
  {t:'"Daily weights are the most accurate way to track your fluid balance, since a rapid weight change usually reflects fluid gain or loss rather than tissue changes."',c:true,why:''},
  {t:'"Daily weights are mainly used to calculate your medication doses."',c:false,why:'While weight can factor into some dosing calculations, the primary purpose emphasized in AKI management is tracking fluid balance, not medication dosing.'},
  {t:'"Daily weights are only needed once you start dialysis."',c:false,why:'Daily weights are important throughout AKI management, not just after dialysis has started.'},
  {t:'"Daily weights are a routine hospital policy with no real clinical significance."',c:false,why:'Daily weights have significant clinical value in tracking fluid status and are not merely a routine policy without meaning.'},
 ],
 rationale:'Daily weights are considered the most accurate indicator of fluid volume status in AKI, since short-term weight changes largely reflect fluid retention or loss rather than changes in tissue mass — a 1 kg weight change corresponds to roughly 1 liter of fluid.',
 tip:'NCLEX tip: "1 kg = about 1 L of fluid" is a simple, exam-favorite conversion to keep in mind whenever daily weight trends are discussed.'},
]};

const MOD9 = {
  key:'gi', title:'Module 9', subtitle:'GI Disorders & Electrolyte Imbalances',
  questions: [
{id:'g1',type:'mc',stem:'A client with GERD asks why alcohol worsens their heartburn. What is the best explanation?',
 options:[
  {t:'Alcohol increases stomach acid production directly without affecting the esophageal sphincter',c:false,why:'While alcohol can affect acid levels, its main contribution to GERD symptoms is through relaxing the lower esophageal sphincter, which this option omits.'},
  {t:'Alcohol relaxes the lower esophageal sphincter, allowing stomach contents to reflux more easily',c:true,why:''},
  {t:'Alcohol has no known effect on GERD and symptoms are likely coincidental',c:false,why:'This is inaccurate; alcohol is a well-documented contributor to GERD through its relaxing effect on the LES.'},
  {t:'Alcohol thickens gastric mucus, which paradoxically increases reflux episodes',c:false,why:'Alcohol does not work by thickening gastric mucus; this is not a recognized mechanism of GERD symptom worsening.'},
 ],
 rationale:'Alcohol relaxes the lower esophageal sphincter (LES), reducing the barrier that normally prevents stomach contents from refluxing into the esophagus, which worsens GERD symptoms.',
 tip:'NCLEX tip: for GERD teaching questions, connect each trigger (alcohol, smoking, fatty foods, overeating) to its specific mechanism of LES weakening or acid stimulation.'},

{id:'g2',type:'mc',stem:'Which diagnostic test is considered the gold standard for confirming GERD?',
 options:[
  {t:'Upper endoscopy (EGD) alone',c:false,why:'Endoscopy is valuable for assessing mucosal damage and complications, but ambulatory pH monitoring is considered the gold standard specifically for confirming reflux.'},
  {t:'Ambulatory pH monitoring',c:true,why:''},
  {t:'Abdominal ultrasound',c:false,why:'Abdominal ultrasound is not used to diagnose GERD; it is more useful for evaluating structures such as the gallbladder or biliary tree.'},
  {t:'Serum H. pylori antibody testing',c:false,why:'This test evaluates for H. pylori infection, which is relevant to gastritis and peptic ulcer disease, not to confirming a diagnosis of GERD.'},
 ],
 rationale:'Ambulatory pH monitoring, performed with a transnasal catheter or wireless capsule over about 24 hours, is considered the gold standard test for confirming and quantifying acid reflux in GERD.',
 tip:'NCLEX tip: differentiate diagnostic tools by disease — pH monitoring for GERD, H. pylori breath test for gastritis/PUD, and EGD with biopsy for Barrett esophagus surveillance.'},

{id:'g3',type:'mc',stem:'A client with Barrett esophagus asks the nurse why this condition is concerning. What is the best response?',
 options:[
  {t:'"Barrett esophagus always progresses to cancer within one year if untreated."',c:false,why:'This overstates the risk and timeline; not all cases progress to cancer, and progression, when it occurs, typically takes much longer than one year.'},
  {t:'"Barrett esophagus is the only known precursor to esophageal adenocarcinoma, so ongoing surveillance is important."',c:true,why:''},
  {t:'"Barrett esophagus is a completely benign finding that requires no further monitoring."',c:false,why:'This is inaccurate and could lead to missed cancer surveillance; Barrett esophagus requires ongoing monitoring due to its malignant potential.'},
  {t:'"Barrett esophagus means you already have esophageal cancer."',c:false,why:'Barrett esophagus is a precancerous change in the esophageal lining, not a diagnosis of cancer itself, though it can progress to cancer over time in some clients.'},
 ],
 rationale:'Barrett esophagus involves replacement of the normal esophageal squamous lining with columnar epithelium and is the only known precursor to esophageal adenocarcinoma, so ongoing surveillance biopsies are essential.',
 tip:'NCLEX tip: "only known precursor to esophageal adenocarcinoma" is a defining, testable fact about Barrett esophagus — expect it to appear verbatim or paraphrased on an exam.'},

{id:'g4',type:'sata',stem:'A client is newly diagnosed with peptic ulcer disease (PUD). Which teaching points should the nurse include? Select all that apply.',
 options:[
  {t:'Avoid NSAIDs, alcohol, caffeine, and smoking',c:true,why:''},
  {t:'Take sucralfate about one hour before meals',c:true,why:''},
  {t:'Eat three large meals per day to keep the stomach full and buffer acid',c:false,why:'Small, frequent, bland meals are generally recommended rather than three large meals, since large meals can increase gastric distention and acid stimulation.'},
  {t:'Report black, tarry stools or vomiting that looks like coffee grounds immediately',c:true,why:''},
  {t:'Stop taking prescribed acid-suppressing medications once symptoms improve to avoid dependence',c:false,why:'Acid-suppressing medications should be continued for the full prescribed course even after symptoms improve, since stopping early increases the risk of ulcer recurrence or bleeding.'},
 ],
 rationale:'PUD teaching includes avoiding irritants (NSAIDs, alcohol, caffeine, smoking), taking mucosal protectants like sucralfate before meals, and promptly reporting signs of GI bleeding such as melena or hematemesis.',
 tip:'NCLEX tip: melena (black, tarry stool) and coffee-ground emesis are two of the highest-yield "report immediately" findings across all GI bleeding content.'},

{id:'g5',type:'mc',stem:'A client recovering from gastric surgery reports sweating, dizziness, and palpitations shortly after eating a meal. Which postoperative complication is most likely occurring?',
 options:[
  {t:'Dumping syndrome',c:true,why:''},
  {t:'Vitamin B12 deficiency',c:false,why:'B12 deficiency develops gradually over time due to loss of intrinsic factor–producing stomach tissue; it does not cause acute symptoms shortly after a single meal.'},
  {t:'Wound dehiscence',c:false,why:'Wound dehiscence would present with separation of the incision or a sensation of the wound "giving way," not with sweating and palpitations tied to eating.'},
  {t:'Chronic constipation',c:false,why:'Constipation does not explain the acute, meal-related autonomic symptoms of sweating, dizziness, and palpitations described in this scenario.'},
 ],
 rationale:'Dumping syndrome occurs when food, particularly simple sugars, moves too quickly from the stomach into the small intestine after gastric surgery, causing rapid fluid shifts and autonomic symptoms such as sweating, dizziness, and palpitations shortly after eating.',
 tip:'NCLEX tip: postoperative gastric surgery complications to know together are hemorrhage, dumping syndrome, reactive hypoglycemia, and vitamin B12 deficiency — each has a distinct time course.'},

{id:'g6',type:'mc',stem:'A client with diverticulitis is in the acute inflammatory phase. Which diet order would the nurse expect?',
 options:[
  {t:'High-fiber diet with raw fruits and vegetables to promote bowel motility',c:false,why:'A high-fiber diet is appropriate once inflammation has resolved, but during the acute inflammatory phase it can worsen irritation of the diverticula.'},
  {t:'NPO status with clear liquids as tolerated',c:true,why:''},
  {t:'Regular diet with no specific restrictions',c:false,why:'A regular unrestricted diet does not allow the bowel to rest during the acute inflammatory phase and could aggravate symptoms.'},
  {t:'High-protein, high-fat diet to promote healing',c:false,why:'A high-fat diet is not the appropriate approach during acute diverticulitis; bowel rest with clear liquids is prioritized instead.'},
 ],
 rationale:'During the acute phase of diverticulitis, the bowel is rested with NPO status and clear liquids, with gradual reintroduction of a high-fiber diet only after the inflammation has resolved.',
 tip:'NCLEX tip: diverticulitis diet management flips over time — restrict fiber and rest the bowel during acute inflammation, then increase fiber once healed to prevent recurrence.'},

{id:'g7',type:'sata',stem:'The nurse is caring for a client with acute diverticulitis. Which findings would the nurse expect to assess? Select all that apply.',
 options:[
  {t:'Left lower quadrant abdominal pain that worsens with straining or coughing',c:true,why:''},
  {t:'Fever',c:true,why:''},
  {t:'Right upper quadrant pain radiating to the right shoulder',c:false,why:'Right upper quadrant pain radiating to the shoulder is characteristic of gallbladder disease (cholecystitis), not diverticulitis, which classically presents with left lower quadrant pain.'},
  {t:'Abdominal distention and tenderness',c:true,why:''},
  {t:'Blood in the stool',c:true,why:''},
 ],
 rationale:'Diverticulitis classically presents with left lower quadrant pain worsened by straining or coughing, fever, abdominal distention and tenderness, and sometimes blood in the stool, reflecting localized inflammation of the diverticula.',
 tip:'NCLEX tip: pair abdominal pain location with likely diagnosis — LLQ pain suggests diverticulitis, RUQ pain suggests gallbladder disease, and RLQ pain suggests appendicitis.'},

{id:'g8',type:'mc',stem:'A young adult client presents with periumbilical pain that has migrated to the right lower quadrant, along with nausea and low-grade fever. Which diagnosis should the nurse suspect?',
 options:[
  {t:'Appendicitis',c:true,why:''},
  {t:'Cholecystitis',c:false,why:'Cholecystitis typically presents with right upper quadrant pain, not migrating periumbilical to right lower quadrant pain as described in this scenario.'},
  {t:'Diverticulitis',c:false,why:'Diverticulitis classically presents with left lower quadrant pain rather than the right lower quadrant pattern described here.'},
  {t:'GERD',c:false,why:'GERD presents with heartburn and regurgitation, not migrating abdominal pain with fever, making this an unlikely explanation for the symptoms described.'},
 ],
 rationale:'The classic presentation of appendicitis is pain that begins periumbilically and migrates to the right lower quadrant (McBurney point), often with nausea, anorexia, and low-grade fever.',
 tip:'NCLEX tip: "pain that migrates from the umbilicus to the right lower quadrant" is one of the most reliable, testable descriptions of appendicitis you will see.'},

{id:'g9',type:'mc',stem:'Before diagnostic imaging is performed for suspected appendicitis in a woman of childbearing age, which action should the nurse anticipate first?',
 options:[
  {t:'Administering a laxative to clear the bowel for better visualization',c:false,why:'Bowel prep with laxatives is not appropriate for suspected appendicitis and could worsen the client\'s condition or increase perforation risk.'},
  {t:'Obtaining a pregnancy test',c:true,why:''},
  {t:'Starting broad-spectrum antibiotics before any imaging is performed',c:false,why:'Imaging and diagnosis typically guide antibiotic therapy; starting antibiotics before basic screening such as a pregnancy test is not the appropriate first step.'},
  {t:'Scheduling immediate appendectomy without any further workup',c:false,why:'Confirmatory workup, including ruling out pregnancy-related causes of abdominal pain, should occur before proceeding straight to surgery whenever possible.'},
 ],
 rationale:'A pregnancy test should be obtained in women of childbearing age before radiologic studies are performed for suspected appendicitis, both to guide imaging choices (such as using transvaginal ultrasound as an alternative) and to consider pregnancy-related differential diagnoses.',
 tip:'NCLEX tip: whenever a scenario involves imaging or medication for a woman of childbearing age, consider whether a pregnancy test should come first.'},

{id:'g10',type:'mc',stem:'Which position would the nurse encourage for a client recovering from an appendectomy to reduce abdominal tension and ease breathing?',
 options:[
  {t:'Supine, flat position',c:false,why:'A flat supine position does not reduce abdominal tension as effectively and can make breathing more difficult after abdominal surgery.'},
  {t:'High Fowler position',c:true,why:''},
  {t:'Trendelenburg position',c:false,why:'Trendelenburg position (head down, feet elevated) increases pressure on the diaphragm and abdominal organs, which would worsen rather than ease postoperative discomfort.'},
  {t:'Left lateral Sims position',c:false,why:'While this position has uses in other clinical situations, it is not the position specifically recommended to reduce abdominal tension after appendectomy.'},
 ],
 rationale:'High Fowler position reduces tension on the abdominal incision and allows for easier diaphragmatic excursion, supporting more effective breathing, coughing, and use of the incentive spirometer after appendectomy.',
 tip:'NCLEX tip: high Fowler is the go-to position after most abdominal surgeries to reduce tension and support respiratory effort — remember it alongside incentive spirometry and early ambulation.'},

{id:'g11',type:'mc',stem:'Which combination of causes accounts for approximately 80% of acute pancreatitis cases?',
 options:[
  {t:'Viral infection and blunt abdominal trauma',c:false,why:'These are recognized but less common causes of acute pancreatitis compared with the two leading causes.'},
  {t:'Cholelithiasis and chronic heavy alcohol use',c:true,why:''},
  {t:'Hypercalcemia and corticosteroid use',c:false,why:'These are recognized contributing causes of pancreatitis but do not account for the large majority of cases the way gallstones and alcohol use do.'},
  {t:'Hereditary pancreatitis and idiopathic causes',c:false,why:'Hereditary pancreatitis is rare, and idiopathic pancreatitis accounts for only about 10% of cases, far less than the leading combined causes.'},
 ],
 rationale:'Gallstones (cholelithiasis) lodging at the ampulla of Vater and chronic heavy alcohol use together account for roughly 80% of acute pancreatitis cases.',
 tip:'NCLEX tip: "gallstones plus alcohol equals most pancreatitis" is one of the highest-yield single facts in this content area — expect it tested directly or through a scenario.'},

{id:'g12',type:'mc',stem:'A client with acute pancreatitis has a serum calcium of 7.2 mg/dL. What should the nurse do in response to this finding?',
 options:[
  {t:'Recognize this as an expected, benign finding requiring no action',c:false,why:'Hypocalcemia in acute pancreatitis correlates with disease severity and is not a benign, expected finding to be ignored; it requires monitoring and readiness to intervene.'},
  {t:'Keep IV calcium gluconate readily available and monitor for signs of tetany',c:true,why:''},
  {t:'Restrict all IV fluids until the calcium level normalizes',c:false,why:'Restricting IV fluids is not the appropriate response to hypocalcemia and could worsen the client\'s overall hemodynamic status in acute pancreatitis.'},
  {t:'Administer a stat dose of potassium chloride to correct the electrolyte imbalance',c:false,why:'Potassium chloride treats a low potassium level, not a low calcium level, and would not address this client\'s hypocalcemia.'},
 ],
 rationale:'Hypocalcemia is common in acute pancreatitis and correlates with disease severity. The nurse should monitor for signs of tetany (such as Trousseau or Chvostek signs) and keep IV calcium gluconate available in case of hypocalcemic tetany.',
 tip:'NCLEX tip: hypocalcemia is one of the Ranson criteria used to predict pancreatitis severity/mortality — a low calcium is a red flag, not a routine finding to overlook.'},

{id:'g13',type:'mc',stem:'A client with severe acute pancreatitis requires nutritional support. Which approach is preferred based on current evidence?',
 options:[
  {t:'Total parenteral nutrition (TPN) for all clients regardless of GI tolerance',c:false,why:'TPN is reserved for clients who cannot tolerate enteral feeding; it is not the preferred first-line approach when enteral feeding is possible.'},
  {t:'Enteral feeding when tolerated, as it is safer and reduces infection risk compared with parenteral nutrition',c:true,why:''},
  {t:'Strict long-term NPO status with no nutritional support planned',c:false,why:'While initial NPO status rests the pancreas, ongoing nutritional support is still needed; prolonged NPO without any nutrition plan is not appropriate.'},
  {t:'A high-fat oral diet started immediately upon admission to promote healing',c:false,why:'A high-fat diet started immediately would stimulate pancreatic secretion and worsen the condition; oral intake is reintroduced gradually and cautiously, typically low-fat.'},
 ],
 rationale:'Enteral nutrition, when tolerated, is preferred over parenteral nutrition in acute pancreatitis because it is safer, more cost-effective, and reduces infection risk; parenteral nutrition is reserved for those who cannot tolerate enteral feeds.',
