) and kidney function (creatinine, BUN, GFR) — since both are commonly tested.", "id": "m7_39", "module": 7}, {"type": "mc", "stem": "A client on long-term lithium therapy is found to have nephrogenic diabetes insipidus. Which nursing action reflects appropriate long-term monitoring for this complication?", "options": [{"t": "Regularly monitor serum creatinine, BUN, and glomerular filtration rate", "c": true, "w": ""}, {"t": "Regularly monitor serum potassium as the primary marker of kidney function", "c": false, "w": "While electrolyte monitoring is important in general nursing care, the specific markers highlighted for lithium-related kidney dysfunction are creatinine, BUN, and GFR, not potassium specifically."}, {"t": "Monitor liver enzymes weekly for the first eight weeks of therapy", "c": false, "w": "Weekly liver enzyme monitoring for the first eight weeks is specifically associated with carbamazepine therapy, not lithium, which is monitored for kidney and thyroid effects."}, {"t": "Obtain a baseline eye examination prior to starting therapy", "c": false, "w": "Baseline eye examinations are not part of the standard long-term monitoring protocol for lithium; kidney function and thyroid function are the key monitoring targets."}], "rationale": "Long-term lithium therapy carries a risk of kidney dysfunction, including nephrogenic diabetes insipidus, so creatinine, BUN, and GFR should be monitored regularly as part of ongoing lithium safety surveillance.", "tip": "NCLEX tip: Nephrogenic diabetes insipidus from lithium reflects the kidney's reduced ability to concentrate urine — watch for very dilute, high-volume urine output as a clinical clue.", "id": "m7_40", "module": 7}, {"type": "mc", "stem": "A client asks the nurse whether lithium is addictive and whether it is safe to stop taking it abruptly if feeling well. What is the nurse's best response?", "options": [{"t": "\"Lithium is not addictive, but it should be tapered gradually rather than stopped abruptly to prevent relapse.\"", "c": true, "w": ""}, {"t": "\"Lithium is highly addictive, so you should never stop taking it under any circumstances.\"", "c": false, "w": "Lithium is not addictive; the concern with abrupt discontinuation is relapse of the underlying mood disorder, not physical dependence or addiction."}, {"t": "\"It is safe to stop lithium abruptly at any time once your symptoms have resolved.\"", "c": false, "w": "Abrupt discontinuation is not recommended, since it increases the risk of relapse; lithium should be tapered gradually under provider guidance."}, {"t": "\"Lithium only needs to be taken during active manic episodes and can be stopped between episodes.\"", "c": false, "w": "Lithium is typically used for both acute treatment and long-term prevention of future episodes, so it is not appropriate to stop between episodes without provider guidance."}], "rationale": "Lithium is not an addictive substance, but it should not be stopped abruptly; gradual tapering under provider supervision helps prevent relapse of the underlying mood disorder.", "tip": "NCLEX tip: Distinguish between physical addiction (not a concern with lithium) and relapse risk from abrupt discontinuation (a very real concern) when counseling clients about long-term mood stabilizer use.", "id": "m7_41", "module": 7}, {"type": "mc", "stem": "Which teaching point should the nurse include for a client newly started on lithium regarding dietary sodium and fluid intake?", "options": [{"t": "Maintain consistent salt and fluid intake, including 8 to 12 glasses of fluid per day", "c": true, "w": ""}, {"t": "Significantly restrict sodium and fluid intake to reduce the risk of lithium toxicity", "c": false, "w": "Restricting sodium and fluid intake actually increases the risk of lithium toxicity, since the kidney compensates for low sodium by retaining more lithium; consistent, not restricted, intake is recommended."}, {"t": "Increase sodium intake substantially each week to build tolerance to lithium", "c": false, "w": "Substantially increasing sodium intake is not recommended; the goal is consistency in sodium and fluid intake, not progressive increases."}, {"t": "Sodium and fluid intake have no bearing on lithium levels and require no specific teaching", "c": false, "w": "Sodium and fluid intake directly affect lithium levels; sudden changes in either can significantly raise the risk of toxicity, making this an essential teaching point."}], "rationale": "Clients on lithium should maintain consistent salt and fluid intake, generally 8 to 12 glasses of fluid per day, since sudden reductions in either sodium or fluid intake can cause the kidney to retain more lithium, increasing the risk of toxicity.", "tip": "NCLEX tip: Think of sodium and lithium as competing for reabsorption in the kidney — when sodium intake drops suddenly, lithium reabsorption increases, raising toxicity risk.", "id": "m7_42", "module": 7}, {"type": "mc", "stem": "A client with bipolar disorder and a co-occurring alcohol use disorder is being started on a mood stabilizer. Which medication is considered first-line and particularly helpful given this comorbidity?", "options": [{"t": "Valproic acid (Depakote)", "c": true, "w": ""}, {"t": "Carbamazepine (Tegretol)", "c": false, "w": "While carbamazepine is used for manic and mixed episodes, valproic acid is specifically noted as helpful with comorbid alcohol use, anxiety, PTSD, and sleep disorders."}, {"t": "Lamotrigine (Lamictal)", "c": false, "w": "Lamotrigine is first-line specifically for bipolar depression, not for acute manic or mixed episodes with comorbid alcohol use disorder."}, {"t": "Topiramate", "c": false, "w": "Topiramate is used off-label for treatment-resistant mania, but it is not specifically highlighted as first-line for comorbid alcohol use disorder in this content."}], "rationale": "Valproic acid (Depakote) is first-line treatment for manic episodes, mixed episodes, and rapid cycling, and is particularly helpful for clients with comorbid alcohol use, anxiety, PTSD, or sleep disorders.", "tip": "NCLEX tip: Valproic acid's comorbidity profile (alcohol use, anxiety, PTSD, sleep disorders) is a distinguishing detail that can help you select it over other AEDs in a scenario-based question.", "id": "m7_43", "module": 7}, {"type": "mc", "stem": "A client taking valproic acid (Depakote) for bipolar disorder is planning to become pregnant. What is the most important safety concern the nurse should address?", "options": [{"t": "Valproic acid is contraindicated in pregnancy due to the risk of neural tube defects", "c": true, "w": ""}, {"t": "Valproic acid has no known risks during pregnancy and can be continued without concern", "c": false, "w": "This is inaccurate and unsafe; valproic acid carries a significant risk of neural tube defects and is contraindicated in pregnancy."}, {"t": "Valproic acid only poses risk during the third trimester of pregnancy", "c": false, "w": "The risk of neural tube defects from valproic acid is a first-trimester concern related to early fetal neural development, not limited to the third trimester."}, {"t": "Valproic acid should simply be doubled in dose during pregnancy for maternal safety", "c": false, "w": "This is inaccurate and dangerous; valproic acid is contraindicated in pregnancy due to teratogenic risk, not a medication to be increased during pregnancy."}], "rationale": "Valproic acid (Depakote) is contraindicated in pregnancy due to the risk of neural tube defects, making preconception counseling and alternative treatment planning essential for women of childbearing age taking this medication.", "tip": "NCLEX tip: Valproic acid and carbamazepine are both contraindicated in pregnancy — build a mental \"avoid in pregnancy\" list for AEDs used in bipolar disorder.", "id": "m7_44", "module": 7}, {"type": "mc", "stem": "A client taking carbamazepine (Tegretol) is scheduled for routine laboratory monitoring. Which monitoring schedule is appropriate during the early weeks of therapy?", "options": [{"t": "Weekly liver enzyme monitoring for the first eight weeks of treatment", "c": true, "w": ""}, {"t": "A single baseline liver panel with no further monitoring needed", "c": false, "w": "A single baseline panel is insufficient; carbamazepine requires close, ongoing liver enzyme monitoring, specifically weekly for the first eight weeks, due to the risk of hepatic disease."}, {"t": "Monthly thyroid function tests, with no need for liver enzyme monitoring", "c": false, "w": "Thyroid monitoring is specifically associated with lithium therapy, not carbamazepine, which requires close liver enzyme monitoring due to hepatotoxicity risk."}, {"t": "Daily complete blood counts for the duration of therapy", "c": false, "w": "While blood dyscrasias are a risk with carbamazepine, the specific schedule described in this content is weekly liver enzyme monitoring for the first eight weeks, not daily blood counts indefinitely."}], "rationale": "Carbamazepine (Tegretol) requires weekly liver enzyme monitoring for the first eight weeks of therapy due to the risk of hepatic disease, in addition to monitoring for blood dyscrasias such as agranulocytosis and aplastic anemia.", "tip": "NCLEX tip: The \"weekly for eight weeks\" liver monitoring schedule is a specific, testable detail unique to carbamazepine among the bipolar AEDs.", "id": "m7_45", "module": 7}, {"type": "mc", "stem": "A client taking lamotrigine (Lamictal) for bipolar depression develops a new widespread rash. What is the priority nursing action?", "options": [{"t": "Instruct the client to seek immediate medical evaluation due to the risk of Stevens-Johnson syndrome", "c": true, "w": ""}, {"t": "Reassure the client that rashes are a normal, expected reaction to lamotrigine that will resolve on its own", "c": false, "w": "A new rash while taking lamotrigine must never be dismissed as normal; it requires immediate evaluation due to the risk of life-threatening Stevens-Johnson syndrome."}, {"t": "Advise the client to simply apply an over-the-counter topical steroid cream and continue the medication", "c": false, "w": "Self-treating a new rash with topical steroids while continuing lamotrigine is inappropriate and dangerous given the risk of a life-threatening reaction requiring prompt medical evaluation and likely discontinuation."}, {"t": "Tell the client to double the next dose to build tolerance to the medication", "c": false, "w": "Doubling the dose in the presence of a new rash is dangerous and could worsen a life-threatening hypersensitivity reaction."}], "rationale": "A new rash in a client taking lamotrigine must be evaluated immediately due to the risk of Stevens-Johnson syndrome, a life-threatening skin reaction that requires prompt recognition and reporting.", "tip": "NCLEX tip: \"New rash + lamotrigine\" should immediately trigger the response \"report this immediately\" — this is one of the most consistently tested medication safety pairings in psychiatric nursing.", "id": "m7_46", "module": 7}, {"type": "mc", "stem": "Which anticonvulsant is specifically identified as first-line treatment for bipolar depression, both acutely and for maintenance therapy?", "options": [{"t": "Lamotrigine (Lamictal)", "c": true, "w": ""}, {"t": "Valproic acid (Depakote)", "c": false, "w": "Valproic acid is first-line for manic and mixed episodes and rapid cycling, not specifically identified as first-line for bipolar depression."}, {"t": "Carbamazepine (Tegretol)", "c": false, "w": "Carbamazepine is used for manic/mixed episodes, rapid cycling, and relapse prevention, but it is not specifically identified as first-line for bipolar depression."}, {"t": "Topiramate", "c": false, "w": "Topiramate is used off-label for treatment-resistant mania, not specifically identified as first-line for bipolar depression."}], "rationale": "Lamotrigine (Lamictal) is identified as first-line treatment for bipolar depression, used both in acute treatment and for maintenance therapy, distinguishing it from the other AEDs, which are more focused on manic or mixed presentations.", "tip": "NCLEX tip: Match each AED to its primary bipolar target — valproic acid and carbamazepine for mania/mixed/rapid cycling, lamotrigine for bipolar depression.", "id": "m7_47", "module": 7}, {"type": "mc", "stem": "A client taking oxcarbazepine for bipolar disorder is also taking oral contraceptives. What should the nurse include in patient teaching?", "options": [{"t": "Oxcarbazepine may reduce the effectiveness of birth control pills, so a backup contraceptive method should be discussed", "c": true, "w": ""}, {"t": "Oxcarbazepine has no interaction with oral contraceptives and no additional precautions are needed", "c": false, "w": "This is inaccurate; oxcarbazepine may reduce the effectiveness of oral contraceptives, which is an important safety teaching point."}, {"t": "Oxcarbazepine will make oral contraceptives more effective, reducing the need for backup contraception", "c": false, "w": "This is inaccurate and reverses the actual effect; oxcarbazepine may reduce, not enhance, the effectiveness of oral contraceptives."}, {"t": "Oral contraceptives should be permanently discontinued while taking any anticonvulsant", "c": false, "w": "Permanent discontinuation is not necessarily required; the key teaching point is discussing a backup contraceptive method given the potential reduced effectiveness of oral contraceptives with oxcarbazepine."}], "rationale": "Oxcarbazepine may reduce the effectiveness of hormonal birth control, similar to carbamazepine, so clients should be counseled about using a backup contraceptive method to prevent unintended pregnancy.", "tip": "NCLEX tip: Both carbamazepine and oxcarbazepine can reduce oral contraceptive effectiveness — group these two AEDs together for this specific teaching point.", "id": "m7_48", "module": 7}, {"type": "mc", "stem": "Which second-generation antipsychotic, in combination with fluoxetine, is considered first-line treatment for bipolar depression?", "options": [{"t": "Olanzapine", "c": true, "w": ""}, {"t": "Risperidone", "c": false, "w": "Risperidone is used for acute mania management but is not specifically identified as the SGA combined with fluoxetine as first-line treatment for bipolar depression."}, {"t": "Ziprasidone", "c": false, "w": "Ziprasidone is used for acute mania but is not the SGA specifically combined with fluoxetine as first-line treatment for bipolar depression."}, {"t": "Asenapine", "c": false, "w": "Asenapine is used for acute mania but is not the SGA specifically identified in combination with fluoxetine for bipolar depression."}], "rationale": "Olanzapine combined with fluoxetine is identified as a first-line treatment option for bipolar depression, along with quetiapine monotherapy and lurasidone for acute bipolar depression.", "tip": "NCLEX tip: Remember the three first-line options for bipolar depression together — quetiapine monotherapy, olanzapine plus fluoxetine, and lurasidone.", "id": "m7_49", "module": 7}, {"type": "mc", "stem": "A client with bipolar disorder and a history of alcohol use disorder is experiencing psychomotor agitation during an acute manic episode. Which medication class should the nurse anticipate using with extra caution in this client?", "options": [{"t": "Benzodiazepine anxiolytics such as lorazepam or clonazepam", "c": true, "w": ""}, {"t": "Second-generation antipsychotics such as olanzapine or quetiapine", "c": false, "w": "SGAs are not specifically associated with the same cross-tolerance and misuse concerns in clients with substance use disorders as benzodiazepines are."}, {"t": "Lithium", "c": false, "w": "Lithium is not specifically associated with the same misuse or dependence concerns in substance use disorder clients as benzodiazepines."}, {"t": "Lamotrigine", "c": false, "w": "Lamotrigine is not associated with the misuse or dependence concerns relevant to a client with a substance use disorder in the way that benzodiazepines are."}], "rationale": "Benzodiazepines such as clonazepam and lorazepam are used to manage psychomotor agitation in acute mania but should be avoided or used with extreme caution in clients with substance use disorders due to their own potential for misuse and dependence.", "tip": "NCLEX tip: Anxiolytic use in bipolar disorder always requires screening for a substance use history first, given the high comorbidity between bipolar disorder and substance use disorders.", "id": "m7_50", "module": 7}, {"type": "mc", "stem": "A client with bipolar disorder is prescribed an SSRI for co-occurring depressive symptoms without a mood stabilizer. What is the primary safety concern with this approach?", "options": [{"t": "SSRIs can trigger a manic episode when used without a mood stabilizer", "c": true, "w": ""}, {"t": "SSRIs have no relevant safety concerns in clients with bipolar disorder", "c": false, "w": "This is inaccurate and unsafe; SSRIs carry a specific risk of triggering mania in bipolar disorder when used without concurrent mood stabilization."}, {"t": "SSRIs will permanently cure the client's bipolar disorder if used consistently", "c": false, "w": "SSRIs do not cure bipolar disorder; used alone, they carry a risk of precipitating a manic episode rather than providing a cure."}, {"t": "SSRIs are only a concern in clients with Bipolar II disorder, not Bipolar I disorder", "c": false, "w": "The risk of SSRI-induced mania applies broadly across the bipolar spectrum, not exclusively to Bipolar II disorder."}], "rationale": "SSRIs used without a concurrent mood stabilizer can trigger a manic episode in clients with bipolar disorder, so extreme caution and concurrent mood stabilizer use are essential when treating depressive symptoms in this population.", "tip": "NCLEX tip: \"Antidepressant without a mood stabilizer in bipolar disorder\" is a classic scenario testing your recognition of the risk for triggering mania — always pair antidepressant use with a mood stabilizer in this population.", "id": "m7_51", "module": 7}, {"type": "mc", "stem": "Which of the following is a recognized indication for electroconvulsive therapy (ECT) in a client with bipolar disorder?", "options": [{"t": "Severe depression or mania occurring during pregnancy", "c": true, "w": ""}, {"t": "Mild, uncomplicated hypomania with no functional impairment", "c": false, "w": "ECT is reserved for severe, treatment-resistant, or urgent presentations, not mild hypomania without significant impairment."}, {"t": "A first-time diagnosis of cyclothymic disorder with no prior treatment attempts", "c": false, "w": "ECT is not a first-line or early intervention for cyclothymic disorder; it is reserved for more severe presentations such as catatonia, treatment-resistant episodes, or need for rapid symptom control."}, {"t": "Routine maintenance treatment for a client who is stable on an oral mood stabilizer", "c": false, "w": "ECT is not used as routine maintenance for a stable client; it is reserved for specific severe or treatment-resistant indications."}], "rationale": "ECT is indicated for catatonic symptoms, treatment-resistant manic or depressed symptoms, need for rapid symptom control, severe suicidal or violent behavior, and severe depression or mania occurring during pregnancy, when medication options may be limited.", "tip": "NCLEX tip: ECT indications in bipolar disorder overlap significantly with those in severe major depression — catatonia, treatment resistance, pregnancy, and urgent safety concerns are the shared themes.", "id": "m7_52", "module": 7}, {"type": "mc", "stem": "Which psychosocial therapy for bipolar disorder specifically addresses disruptions in daily routines and interpersonal problems, and has shown effectiveness in shortening depressive episodes?", "options": [{"t": "Interpersonal and Social Rhythm Therapy (IPSRT)", "c": true, "w": ""}, {"t": "Family-Focused Therapy (FFT)", "c": false, "w": "FFT focuses on psychoeducation and family communication and problem-solving skills rather than specifically targeting interpersonal problems and daily routine disruptions in the individual client."}, {"t": "Cognitive-Behavioral Therapy (CBT)", "c": false, "w": "CBT focuses on recognizing, challenging, and changing distorted thoughts, rather than specifically targeting interpersonal problems and daily routine disruptions."}, {"t": "Program of Assertive Community Treatment (PACT)", "c": false, "w": "PACT is a case-management-focused, 24/7 team approach for marginally functioning clients, not a psychosocial therapy specifically addressing interpersonal problems and routine disruptions in bipolar disorder."}], "rationale": "Interpersonal and Social Rhythm Therapy (IPSRT) addresses interpersonal problems and disruptions in daily routines and social rhythms, and has demonstrated effectiveness in shortening depressive episodes in Bipolar I disorder.", "tip": "NCLEX tip: IPSRT connects directly to the social rhythm theory of bipolar disorder etiology — disrupted routines can trigger episodes, so IPSRT works to stabilize those routines.", "id": "m7_53", "module": 7}, {"type": "mc", "stem": "Which psychosocial intervention for bipolar disorder emphasizes psychoeducation along with communication and problem-solving skills training for the family unit, improving relationship quality and reducing rehospitalization?", "options": [{"t": "Family-Focused Therapy (FFT)", "c": true, "w": ""}, {"t": "Cognitive-Behavioral Therapy (CBT)", "c": false, "w": "CBT is an individual-focused therapy targeting distorted thoughts and cognitive restructuring, not specifically a family-based intervention."}, {"t": "Interpersonal and Social Rhythm Therapy (IPSRT)", "c": false, "w": "IPSRT focuses on the individual client's routines and interpersonal relationships, not specifically a family psychoeducation and communication skills model."}, {"t": "Program of Assertive Community Treatment (PACT)", "c": false, "w": "PACT is a case-management model for marginally functioning clients, not specifically a family-focused psychoeducation and communication skills intervention."}], "rationale": "Family-Focused Therapy (FFT) combines psychoeducation with communication and problem-solving skills training for the family unit, improving the quality of family relationships and reducing rehospitalization rates for the client with bipolar disorder.", "tip": "NCLEX tip: FFT's core outcome measures — improved family relationships and reduced rehospitalization — are frequently tested as the defining benefits of this therapy.", "id": "m7_54", "module": 7}, {"type": "mc", "stem": "According to Box 16.3, which of the following represents one of the four broad goals of psychoeducation for clients with bipolar disorder and their families?", "options": [{"t": "Providing information about the disease process, medications, and treatment", "c": true, "w": ""}, {"t": "Eliminating the need for ongoing medication management once education is complete", "c": false, "w": "Psychoeducation supports, rather than eliminates, the need for ongoing medication adherence and relapse prevention planning."}, {"t": "Discouraging any emotional discussion of frustrations related to the illness", "c": false, "w": "Psychoeducation specifically encourages emotional discharge, including exchanging ideas and discussing frustrations, rather than discouraging this."}, {"t": "Replacing the need for a relapse-prevention plan with medication alone", "c": false, "w": "Psychoeducation specifically supports developing a relapse-prevention plan alongside medication adherence, not replacing the need for one with medication alone."}], "rationale": "The four broad goals of psychoeducation for bipolar disorder include providing information about the disease process, medications, and treatment; facilitating emotional discharge; supporting medication adherence and relapse prevention; and teaching self-help strategies such as sleep hygiene and stress management.", "tip": "NCLEX tip: Memorize the four psychoeducation goals as a set — information, emotional discharge, adherence/relapse prevention, and self-help strategies — since these appear across multiple psychiatric conditions in this course.", "id": "m7_55", "module": 7}, {"type": "mc", "stem": "Which self-help strategy is specifically recommended as part of psychoeducation for clients with bipolar disorder to help prevent relapse?", "options": [{"t": "Maintaining consistent sleep hygiene and a regular daily routine", "c": true, "w": ""}, {"t": "Increasing alcohol intake to help manage stress associated with the illness", "c": false, "w": "Alcohol use is specifically discouraged as part of self-help strategies for bipolar disorder, since it can worsen mood instability and interact with medications."}, {"t": "Avoiding all discussion of the illness with family or support groups", "c": false, "w": "Psychoeducation specifically encourages open discussion with family and participation in support groups, not avoidance of these discussions."}, {"t": "Deliberately varying sleep and wake times to prevent boredom", "c": false, "w": "Deliberately varying sleep and wake times is contrary to recommended self-help strategies, which emphasize maintaining a regular routine and consistent sleep hygiene to support mood stability."}], "rationale": "Self-help strategies for bipolar disorder include maintaining sleep hygiene, avoiding alcohol and drugs, following regular routines, and practicing stress management techniques, all aimed at supporting mood stability and preventing relapse.", "tip": "NCLEX tip: Sleep hygiene and routine consistency directly tie back to social rhythm theory — protecting regular routines is both an etiological and a relapse-prevention concept in bipolar disorder.", "id": "m7_56", "module": 7}, {"type": "bowtie", "stem": "A client with bipolar disorder is brought to the emergency department by family after four days of decreased sleep (2 hours per night), pressured speech, grandiose statements about being a famous inventor, and reckless spending of the family's savings. Vital signs are stable, but the client appears disheveled and reports not eating much in the past two days. Complete the bowtie: select the most likely condition, two priority nursing actions, and two parameters to monitor.", "left": {"label": "Likely condition", "opts": ["Acute manic episode", "Major depressive episode", "Panic disorder", "Delirious mania with catatonia"], "correct": [0]}, "center": {"label": "Priority nursing actions", "opts": ["Offer frequent high-calorie finger foods and monitor fluid intake", "Use a firm, calm approach with short, concise explanations", "Encourage the client to make important financial decisions independently right away", "Engage the client in a lengthy, detailed group therapy discussion", "Leave the client alone in a brightly lit, high-stimulation area"], "correct": [0, 1]}, "right": {"label": "Parameters to monitor", "opts": ["Hydration status and skin turgor", "Sleep pattern and total hours of rest", "Visual acuity", "Ankle range of motion"], "correct": [0, 1]}, "rationale": "This presentation of decreased sleep, pressured speech, grandiosity, and reckless spending over four days with preserved but impaired functioning is consistent with an acute manic episode. Priority nursing actions include ensuring adequate nutrition and hydration through accessible finger foods, along with calm, firm, and simply worded communication to help contain escalating behavior. Hydration status and sleep pattern are essential physiological parameters to monitor given the risk of dehydration and exhaustion in acute mania.", "tip": "NCLEX tip: When a bowtie stem describes classic DIG FAST symptoms (grandiosity, decreased sleep need, reckless spending) over several days, confirm mania first, then build your nursing priorities around physiological safety and calm, structured communication.", "id": "m7_57", "module": 7}, {"type": "mc", "stem": "What is the approximate lifetime prevalence of schizophrenia worldwide, and how does it vary by demographic factors?", "options": [{"t": "Approximately 1%, with no significant differences by race, social status, culture, gender, or environment", "c": true, "w": ""}, {"t": "Approximately 10%, occurring far more often in men than women", "c": false, "w": "This significantly overstates the lifetime prevalence of schizophrenia, which is approximately 1% worldwide, and does not accurately reflect the lack of significant gender-based prevalence differences."}, {"t": "Approximately 25%, occurring almost exclusively in urban environments", "c": false, "w": "This significantly overstates the lifetime prevalence of schizophrenia; while urban environments are a recognized risk factor, prevalence itself does not vary this dramatically by environment alone."}, {"t": "Less than 0.01%, making it an exceedingly rare condition", "c": false, "w": "This significantly understates the lifetime prevalence of schizophrenia, which affects approximately 1% of the population worldwide."}], "rationale": "Schizophrenia has a lifetime prevalence of approximately 1% worldwide, with no significant differences by race, social status, culture, gender, or environment, though certain factors like urban environment and immigration are associated with increased risk.", "tip": "NCLEX tip: The 1% lifetime prevalence figure for schizophrenia, consistent across demographics, is a foundational epidemiological fact worth memorizing.", "id": "m7_58", "module": 7}, {"type": "mc", "stem": "A client presents with psychotic symptoms identical to schizophrenia that have been present for two months. According to DSM-5, which diagnosis is most appropriate given this duration?", "options": [{"t": "Schizophreniform disorder", "c": true, "w": ""}, {"t": "Schizophrenia", "c": false, "w": "A full schizophrenia diagnosis typically requires a longer duration of symptoms and functional decline than the two-month presentation described here, which corresponds more closely to schizophreniform disorder."}, {"t": "Brief psychotic disorder", "c": false, "w": "Brief psychotic disorder is characterized by a duration of usually less than one month, which is shorter than the two-month presentation described in this scenario."}, {"t": "Delusional disorder", "c": false, "w": "Delusional disorder involves nonbizarre delusions without the full symptom picture of schizophrenia and typically without the same degree of impaired functioning, which does not match this client's presentation of schizophrenia-identical symptoms."}], "rationale": "Schizophreniform disorder involves symptoms identical to schizophrenia but lasting between one and six months, distinguishing it from the more chronic course required for a schizophrenia diagnosis.", "tip": "NCLEX tip: Duration is the key differentiator among the psychotic disorders — schizophreniform (1–6 months), brief psychotic disorder (usually <1 month), and schizophrenia (longer, chronic course).", "id": "m7_59", "module": 7}, {"type": "mc", "stem": "A client develops sudden psychotic symptoms following the unexpected death of a spouse, with no prior psychiatric history. The symptoms resolve within three weeks, and the client returns to their prior level of functioning. Which diagnosis is most consistent with this presentation?", "options": [{"t": "Brief psychotic disorder", "c": true, "w": ""}, {"t": "Schizophreniform disorder", "c": false, "w": "Schizophreniform disorder involves a longer duration (one to six months) than the three-week course described in this scenario, which is more consistent with brief psychotic disorder."}, {"t": "Schizoaffective disorder", "c": false, "w": "Schizoaffective disorder requires features of both schizophrenia and a mood disorder occurring together, which is not described in this scenario of a brief, stress-precipitated psychotic episode with full recovery."}, {"t": "Delusional disorder", "c": false, "w": "Delusional disorder involves a persistent nonbizarre delusion lasting at least one month without the sudden onset and full return to premorbid functioning described in this scenario."}], "rationale": "Brief psychotic disorder involves sudden onset of psychotic symptoms, usually lasting less than one month, frequently precipitated by extreme stress, with the individual returning to their premorbid level of functioning afterward.", "tip": "NCLEX tip: A clear precipitating stressor (such as a sudden loss) combined with a short duration and full return to baseline functioning points strongly toward brief psychotic disorder.", "id": "m7_60", "module": 7}, {"type": "mc", "stem": "A client has experienced psychotic symptoms alongside a major depressive episode that does not fully meet criteria for either schizophrenia or major depressive disorder alone. Which diagnosis is most appropriate, and how should treatment be approached?", "options": [{"t": "Schizoaffective disorder, with treatment addressing both the psychosis and the mood disorder", "c": true, "w": ""}, {"t": "Schizotypal personality disorder, with treatment focused solely on social skills training", "c": false, "w": "Schizotypal personality disorder is a distinct diagnosis on the schizophrenia spectrum without the full psychotic and mood symptom combination described here, and its treatment focus differs from schizoaffective disorder."}, {"t": "Delusional disorder, with treatment focused only on the nonbizarre delusion", "c": false, "w": "Delusional disorder involves an isolated nonbizarre delusion without a full combination of psychotic and mood symptoms, which does not match this client's presentation."}, {"t": "Substance-induced psychotic disorder, with treatment focused on withdrawal management", "c": false, "w": "Substance-induced psychotic disorder is caused by ingestion of or withdrawal from a substance, which is not indicated in this scenario describing a combination of mood and psychotic symptoms."}], "rationale": "Schizoaffective disorder involves features of both schizophrenia and a mood disorder (bipolar or major depressive) occurring together, without fully meeting criteria for either alone, and has a somewhat better prognosis than schizophrenia; treatment must address both the psychotic and mood components.", "tip": "NCLEX tip: Schizoaffective disorder requires a dual treatment approach — both antipsychotic medication for psychosis and mood-stabilizing or antidepressant treatment for the mood component.", "id": "m7_61", "module": 7}, {"type": "mc", "stem": "Which primary psychotic disorder is most commonly characterized by nonbizarre delusions, such as believing one is being followed or infected, without the broader symptom picture or functional impairment typically seen in schizophrenia?", "options": [{"t": "Delusional disorder", "c": true, "w": ""}, {"t": "Schizophreniform disorder", "c": false, "w": "Schizophreniform disorder presents with the same broad symptom picture as schizophrenia, including hallucinations and disorganized speech, not the isolated nonbizarre delusion pattern with preserved functioning described here."}, {"t": "Brief psychotic disorder", "c": false, "w": "Brief psychotic disorder involves a sudden, short-duration psychotic episode, not the specific, more chronic pattern of an isolated nonbizarre delusion with preserved functioning."}, {"t": "Schizotypal personality disorder", "c": false, "w": "Schizotypal personality disorder involves broader eccentric traits and social/interpersonal deficits rather than the isolated nonbizarre delusion pattern described in delusional disorder."}], "rationale": "Delusional disorder is characterized by one or more nonbizarre delusions (such as being followed, infected, or loved at a distance) lasting at least one month, with functioning not markedly impaired; persecutory delusions are the most common type.", "tip": "NCLEX tip: The key distinguishing feature of delusional disorder is that functioning remains largely intact despite the fixed false belief — this preserved functioning helps differentiate it from schizophrenia.", "id": "m7_62", "module": 7}, {"type": "mc", "stem": "A client develops psychotic symptoms shortly after abrupt discontinuation of alcohol. Which diagnosis best explains this presentation?", "options": [{"t": "Substance-/medication-induced psychotic disorder", "c": true, "w": ""}, {"t": "Schizophreniform disorder", "c": false, "w": "Schizophreniform disorder is not caused by ingestion of or withdrawal from a substance; it describes a schizophrenia-like presentation with an independent, non-substance-related course."}, {"t": "Schizotypal personality disorder", "c": false, "w": "Schizotypal personality disorder is a longstanding pattern of eccentric traits, not an acute presentation directly caused by substance withdrawal."}, {"t": "Delusional disorder", "c": false, "w": "Delusional disorder is not specifically caused by substance ingestion or withdrawal; it involves a persistent, isolated nonbizarre delusion unrelated to a substance-related trigger."}], "rationale": "Substance-/medication-induced psychotic disorder is caused by ingestion of or withdrawal from a substance, and symptoms usually resolve once the substance is cleared from the body or the withdrawal process is appropriately managed.", "tip": "NCLEX tip: Always rule out substance-induced causes of new psychotic symptoms before assuming a primary psychotic disorder diagnosis, especially in the context of a recent history of substance use or withdrawal.", "id": "m7_63", "module": 7}, {"type": "mc", "stem": "Which phase of schizophrenia is characterized by social withdrawal, deteriorating functioning, depressive mood, and perceptual disturbances, sometimes appearing up to a year before the first psychotic break?", "options": [{"t": "Prodromal phase", "c": true, "w": ""}, {"t": "Acute phase", "c": false, "w": "The acute phase is characterized by florid, well-developed positive symptoms such as hallucinations and delusions, not the subtler withdrawal and functional decline of the prodromal phase."}, {"t": "Stabilization phase", "c": false, "w": "The stabilization phase involves a decrease in the severity of acute (positive) symptoms after treatment, not the pre-psychotic changes described in the prodromal phase."}, {"t": "Maintenance phase", "c": false, "w": "The maintenance phase involves symptoms in remission with possible milder residual symptoms, occurring after treatment, not the pre-psychotic changes described in the prodromal phase."}], "rationale": "The prodromal phase involves signs and symptoms preceding the acute phase of schizophrenia, including social withdrawal, deteriorating functioning, depressive mood, perceptual disturbances, and magical thinking, and can appear one month to one year before the first psychotic break; up to 80-90% of individuals experience prodromal symptoms.", "tip": "NCLEX tip: Recognizing prodromal symptoms (subtle withdrawal, functional decline) is key to early intervention, since 80-90% of individuals experience this phase before their first psychotic break.", "id": "m7_64", "module": 7}, {"type": "mc", "stem": "Without ongoing medication, what is the approximate relapse rate for schizophrenia within one year, compared with individuals who remain on medication?", "options": [{"t": "70%-80% relapse without medication, compared to about 20% relapse with medication", "c": true, "w": ""}, {"t": "Approximately equal relapse rates (around 20%) whether or not medication is continued", "c": false, "w": "This is inaccurate; relapse rates differ substantially, with a much higher rate (70-80%) without medication compared to about 20% with medication."}, {"t": "Nearly 100% relapse with medication, compared to almost no relapse without medication", "c": false, "w": "This reverses the actual relationship; relapse rates are far higher without medication (70-80%) than with medication (about 20%)."}, {"t": "Less than 5% relapse without medication, reflecting a generally favorable natural course", "c": false, "w": "This drastically understates the relapse risk without medication, which is 70-80% within one year according to this content."}], "rationale": "Without medication, approximately 70-80% of individuals with schizophrenia relapse within one year, compared to about 20% relapse within one year for those who remain on medication, underscoring the importance of medication adherence.", "tip": "NCLEX tip: The stark contrast between 70-80% relapse (no medication) and 20% relapse (with medication) is one of the most compelling statistics for teaching clients about the importance of adherence.", "id": "m7_65", "module": 7}, {"type": "mc", "stem": "A client with schizophrenia states, \"The billboard on the highway had a hidden message just for me, telling me to prepare for what's coming.\" Which type of delusion does this best represent?", "options": [{"t": "Ideas of reference", "c": true, "w": ""}, {"t": "Persecutory delusion", "c": false, "w": "A persecutory delusion involves a false belief of being singled out for harm, whereas this client is attributing personal significance to a neutral event, which is characteristic of ideas of reference."}, {"t": "Somatic delusion", "c": false, "w": "A somatic delusion involves a false belief about changes to one's own body, which is not represented in this client's statement about a billboard message."}, {"t": "Erotomanic delusion", "c": false, "w": "An erotomanic delusion involves a false belief that a famous or high-status person is in love with the client, which is not represented in this statement about a billboard message."}], "rationale": "Ideas of reference involve attributing personal, private meaning to neutral or unrelated environmental events, such as believing a billboard message is intended specifically for oneself.", "tip": "NCLEX tip: Ideas of reference are identified by the client assigning special personal significance to something objectively neutral or unrelated to them, distinguishing this from more elaborate delusion types.", "id": "m7_66", "module": 7}, {"type": "mc", "stem": "A client insists that government agents are tracking their movements and attempting to poison their food. Which type of delusion is this?", "options": [{"t": "Persecutory delusion", "c": true, "w": ""}, {"t": "Grandiose delusion", "c": false, "w": "A grandiose delusion involves an unrealistic sense of superiority or special powers, not a false belief of being targeted or harmed, which is characteristic of a persecutory delusion."}, {"t": "Nihilistic delusion", "c": false, "w": "A nihilistic delusion involves belief in the futility of everything or that one may already be dead, which does not match this client's belief about being targeted and poisoned."}, {"t": "Thought broadcasting", "c": false, "w": "Thought broadcasting involves the belief that one's thoughts can be heard by others, which is a distinct symptom from the belief of being targeted for harm described here."}], "rationale": "Persecutory delusions involve a false belief of being singled out for harm, such as believing one is being followed, tracked, or poisoned, and are the most common type of delusion encountered in clinical practice.", "tip": "NCLEX tip: Persecutory delusions are the most common delusion type overall — when in doubt on an exam item describing being targeted, tracked, or harmed, persecutory delusion is often the answer.", "id": "m7_67", "module": 7}, {"type": "mc", "stem": "A client with schizophrenia reports, \"Snakes are living inside my stomach and eating my organs from the inside.\" Which type of delusion does this best illustrate?", "options": [{"t": "Somatic delusion", "c": true, "w": ""}, {"t": "Erotomanic delusion", "c": false, "w": "An erotomanic delusion involves a false belief that a famous or high-status person is in love with the client, which does not match this client's belief about their own body being invaded by snakes."}, {"t": "Nihilistic delusion", "c": false, "w": "A nihilistic delusion involves belief in the futility of everything or that the world will end, or that one may already be dead, which is distinct from a false belief about specific bodily changes."}, {"t": "Bizarre delusion", "c": false, "w": "While this delusion is implausible, the specific category that best matches a false belief about one's own body is a somatic delusion; \"bizarre\" is reserved for delusions that are clearly implausible and incomprehensible beyond typical experience, such as aliens replacing brain parts."}], "rationale": "Somatic delusions involve false beliefs about changes to one's own body, such as believing that organs are being eaten by parasites or that a body part is diseased or missing, despite no medical evidence supporting this belief.", "tip": "NCLEX tip: Somatic delusions specifically involve the client's own body — pair this with the classic textbook example of believing snakes are eating one's stomach.", "id": "m7_68", "module": 7}, {"type": "mc", "stem": "A client states, \"I know you can hear everything I'm thinking right now — everyone can hear my thoughts, that's why I stopped talking to people.\" Which symptom does this best represent?", "options": [{"t": "Thought broadcasting", "c": true, "w": ""}, {"t": "Thought insertion", "c": false, "w": "Thought insertion involves the belief that others are placing their thoughts into one's mind, which is distinct from the belief that one's own thoughts can be heard by others."}, {"t": "Thought withdrawal", "c": false, "w": "Thought withdrawal involves the belief that thoughts are being removed by an outside agency, which is different from the belief that one's thoughts can be heard by others."}, {"t": "Thought blocking", "c": false, "w": "Thought blocking is a disruption in speech where thoughts and speech are suddenly interrupted by silence, not a delusional belief about others hearing one's thoughts."}], "rationale": "Thought broadcasting is the delusional belief that one's thoughts can be heard by others, often leading to significant social withdrawal as the client attempts to protect their private thoughts.", "tip": "NCLEX tip: Distinguish the three thought-related delusions carefully — broadcasting (others can hear my thoughts), insertion (others are putting thoughts into my mind), and withdrawal (an outside force is removing my thoughts).", "id": "m7_69", "module": 7}, {"type": "mc", "stem": "A client abruptly stops speaking mid-sentence during an interview and later reports, \"Someone took the thought right out of my head.\" Which symptom does this best represent?", "options": [{"t": "Thought blocking", "c": true, "w": ""}, {"t": "Circumstantiality", "c": false, "w": "Circumstantiality involves excessive irrelevant detail before eventually completing a thought, not a sudden interruption of speech with a sense that the thought was removed."}, {"t": "Tangentiality", "c": false, "w": "Tangentiality involves the train of thought wandering off and never returning to the original point, which differs from an abrupt interruption with a sense that the thought was taken away."}, {"t": "Echolalia", "c": false, "w": "Echolalia involves pathological repetition of another person's words, which is unrelated to a sudden interruption in one's own speech with a sense that a thought was removed."}], "rationale": "Thought blocking involves a sudden interruption of speech by silence, often experienced by the client as though their thought had been removed or taken away, which is distinct from thought withdrawal (a delusional belief about an external force specifically removing thoughts).", "tip": "NCLEX tip: Thought blocking is identified by the abrupt pause in speech itself, while the client's explanation for that pause (feeling a thought was \"taken\") may overlap conceptually with thought withdrawal — read the full context of the question carefully.", "id": "m7_70", "module": 7}, {"type": "mc", "stem": "Which type of hallucination is most common in individuals with schizophrenia, and what specific feature requires the nurse to initiate immediate safety measures?", "options": [{"t": "Auditory hallucinations, particularly when they involve command hallucinations", "c": true, "w": ""}, {"t": "Visual hallucinations, particularly when they involve seeing deceased relatives", "c": false, "w": "Visual hallucinations are less frequent in schizophrenia than auditory hallucinations, and it is command hallucinations (a feature of auditory hallucinations) that specifically require immediate safety measures, not visual hallucinations of relatives."}, {"t": "Olfactory hallucinations, particularly when associated with a pleasant smell", "c": false, "w": "Olfactory hallucinations are more commonly associated with temporal lobe epilepsy than schizophrenia, and a pleasant smell would not be the safety-critical feature described here."}, {"t": "Tactile hallucinations, particularly when described as a tingling sensation", "c": false, "w": "Tactile hallucinations are more commonly associated with substance withdrawal (such as from amphetamines, cocaine, or alcohol) than schizophrenia, and a general tingling sensation is not the safety-critical feature described here."}], "rationale": "Auditory hallucinations are the most common type in schizophrenia, involving voices speaking to or commenting on the person; command hallucinations, in which the voice commands harm to self or others, represent a psychiatric emergency requiring immediate safety intervention.", "tip": "NCLEX tip: Command hallucinations are a psychiatric emergency — always assess whether the client feels compelled to act on the voices' instructions and initiate safety precautions accordingly.", "id": "m7_71", "module": 7}, {"type": "mc", "stem": "A nurse observes a client with schizophrenia frequently tilting their head, blinking rapidly, and appearing to track a moving object that is not present in the room. What should the nurse suspect?", "options": [{"t": "The client may be experiencing a hallucination", "c": true, "w": ""}, {"t": "The client is displaying signs of tardive dyskinesia", "c": false, "w": "Tardive dyskinesia involves involuntary facial and limb movements such as tongue protrusion or choreic movements, not head tilting and eye tracking behaviors suggestive of responding to internal stimuli."}, {"t": "The client is exhibiting waxy flexibility", "c": false, "w": "Waxy flexibility involves maintaining unusual postures for long periods, which is a catatonic feature distinct from the head tilting and eye tracking behaviors described here."}, {"t": "The client is demonstrating echopraxia", "c": false, "w": "Echopraxia involves mimicking another person's movements, which does not match the behavior of tracking an unseen object described in this scenario."}], "rationale": "Behavioral signs of hallucinations include head tilting or turning, appearing to talk to someone who is not present, frequent eye blinking, tracking a moving object that is not there, and grimacing; recognizing these cues allows the nurse to intervene early.", "tip": "NCLEX tip: Learning to recognize the behavioral cues of hallucinations (head tilting, tracking, muttering) allows the nurse to intervene before the client becomes further distressed or unsafe.", "id": "m7_72", "module": 7}, {"type": "mc", "stem": "A client with schizophrenia states, \"I went to the store yesterday to buy milk, but first I had to find my keys, and my neighbor was outside so I talked to her about her garden, and then I remembered I needed eggs too, so I got the eggs and the milk.\" Despite the excessive detail, the client eventually answers the original question. Which thought disorder does this best represent?", "options": [{"t": "Circumstantiality", "c": true, "w": ""}, {"t": "Tangentiality", "c": false, "w": "Tangentiality involves the train of thought wandering off and never returning to the original point, whereas this client, despite excessive detail, does eventually arrive at the answer to the original question."}, {"t": "Neologisms", "c": false, "w": "Neologisms involve made-up words with special meaning, which is not demonstrated in this example of excessive but real, meaningful detail."}, {"t": "Word salad", "c": false, "w": "Word salad involves a jumble of meaningless, disconnected words, which is very different from this client's excessively detailed but coherent and logically connected account."}], "rationale": "Circumstantiality involves excessive, irrelevant detail in speech before the person eventually completes and answers the original thought or question, distinguishing it from tangentiality, in which the person never returns to the original point.", "tip": "NCLEX tip: The key distinguishing test between circumstantiality and tangentiality is whether the client eventually answers the original question (circumstantiality) or never does (tangentiality).", "id": "m7_73", "module": 7}, {"type": "mc", "stem": "A client responds to the question \"What brought you to the hospital today?\" by answering, \"A cab.\" Which thought disturbance does this best illustrate?", "options": [{"t": "Concrete thinking", "c": true, "w": ""}, {"t": "Associative looseness", "c": false, "w": "Associative looseness involves haphazard, illogical, and confused thinking with shifting topics, not a literal, overly concrete interpretation of a figurative question."}, {"t": "Echolalia", "c": false, "w": "Echolalia involves repeating another person's words, which is not demonstrated by this client's literal but original response."}, {"t": "Word salad", "c": false, "w": "Word salad involves a jumble of disconnected, meaningless words, which is very different from this client's single, literal, but coherent response."}], "rationale": "Concrete thinking involves an overemphasis on specific details and literal interpretation of questions or figures of speech, as illustrated by answering a figurative question about the reason for admission with a literal description of the mode of transportation.", "tip": "NCLEX tip: Concrete thinking is classically tested using the exact 'What brought you here?' → 'A cab' example — recognize this pattern of literal interpretation of a figurative question.", "id": "m7_74", "module": 7}, {"type": "mc", "stem": "A nurse reviewing a client's chart notes documentation describing 'associative looseness.' Which of the following behaviors would the nurse expect to observe based on this term?", "options": [{"t": "Haphazard, illogical thinking with abrupt, confused shifts between topics", "c": true, "w": ""}, {"t": "A single made-up word used repeatedly with a private, special meaning", "c": false, "w": "This describes neologisms, a distinct thought disorder feature, not associative looseness, which involves broader illogical and haphazard shifts in thinking."}, {"t": "Repetition of another person's exact words and phrases", "c": false, "w": "This describes echolalia, which is distinct from associative looseness and is more commonly associated with catatonia."}, {"t": "A jumble of completely meaningless and disconnected words strung together", "c": false, "w": "This describes word salad, which is a more severe and disorganized presentation than associative looseness, though both fall under formal thought disorder."}], "rationale": "Associative looseness refers to haphazard, illogical, and confused thinking, characterized by illogical shifts between topics without clear connections, reflecting disorganized thought processes in schizophrenia.", "tip": "NCLEX tip: Associative looseness sits on a thought-disorder severity spectrum with tangentiality and circumstantiality on the milder end and word salad on the most severe end.", "id": "m7_75", "module": 7}, {"type": "mc", "stem": "A nurse is caring for a client with schizophrenia who repeatedly copies the nurse's hand gestures and body movements without any apparent purpose. Which term describes this behavior?", "options": [{"t": "Echopraxia", "c": true, "w": ""}, {"t": "Echolalia", "c": false, "w": "Echolalia specifically refers to the repetition of another person's spoken words, not the mimicking of physical movements or gestures."}, {"t": "Waxy flexibility", "c": false, "w": "Waxy flexibility involves maintaining an externally positioned posture for an extended period, not actively mimicking another person's movements."}, {"t": "Automatic obedience", "c": false, "w": "Automatic obedience involves performing all simple commands in a robot-like manner, which is distinct from spontaneously mimicking another person's movements without being commanded to do so."}], "rationale": "Echopraxia is the pathological mimicking of another person's movements, often observed in catatonia alongside echolalia, the mimicking of another person's speech.", "tip": "NCLEX tip: Pair echopraxia (mimicking movements) with echolalia (mimicking speech) as the two 'echo' phenomena most commonly associated with catatonia.", "id": "m7_76", "module": 7}, {"type": "mc", "stem": "A client with chronic schizophrenia demonstrates a flat, unchanging facial expression, minimal eye contact, and a bland, monotone voice. Which negative symptom is this?", "options": [{"t": "Affective blunting (flat affect)", "c": true, "w": ""}, {"t": "Anergia", "c": false, "w": "Anergia refers to a lack of energy and passivity in behavior, not specifically the reduced emotional expression on the face and in vocal tone described here."}, {"t": "Avolition", "c": false, "w": "Avolition refers to a lack of motivation and inability to initiate tasks, which is distinct from the specific reduction in facial and vocal emotional expression described here."}, {"t": "Poverty of speech", "c": false, "w": "Poverty of speech refers to a restricted amount of speech, such as one-word answers, which is distinct from the flat facial expression and bland vocal tone described here."}], "rationale": "Affective blunting (flat affect) involves a severe reduction in emotional expression on the face, minimal eye contact, and bland vocal intonation, and is one of the core negative symptoms of schizophrenia.", "tip": "NCLEX tip: Negative symptoms often begin with 'a' — anergia, anhedonia, avolition, affective blunting — which can help you group and recall them as a category distinct from positive symptoms.", "id": "m7_77", "module": 7}, {"type": "mc", "stem": "A client with schizophrenia reports no longer finding any enjoyment in hobbies that were previously important, including music and time with friends. Which negative symptom does this best represent?", "options": [{"t": "Anhedonia", "c": true, "w": ""}, {"t": "Anergia", "c": false, "w": "Anergia refers to a general lack of energy and passivity, which is distinct from the specific inability to experience pleasure described in anhedonia."}, {"t": "Poverty of content of speech", "c": false, "w": "Poverty of content of speech refers to speech that is adequate in amount but conveys little meaningful information, which is unrelated to the loss of pleasure in previously enjoyed activities."}, {"t": "Avolition", "c": false, "w": "Avolition refers to a lack of motivation and inability to initiate tasks, which is related to but distinct from the specific inability to experience pleasure described in anhedonia."}], "rationale": "Anhedonia is the inability to experience pleasure in activities that were previously enjoyable, representing a core negative symptom of schizophrenia that significantly affects quality of life.", "tip": "NCLEX tip: Anhedonia (loss of pleasure) and avolition (loss of motivation) often occur together but are technically distinct symptoms — avolition affects the ability to start tasks, while anhedonia affects the experience of enjoyment.", "id": "m7_78", "module": 7}, {"type": "mc", "stem": "According to current research (APA, 2013), which two negative symptoms are considered the most prominent in schizophrenia?", "options": [{"t": "Avolition and affective blunting", "c": true, "w": ""}, {"t": "Anergia and poverty of speech", "c": false, "w": "While anergia and poverty of speech are recognized negative symptoms, avolition and affective blunting are specifically identified as the most prominent negative symptoms according to this content."}, {"t": "Anhedonia and poverty of content of speech", "c": false, "w": "While anhedonia and poverty of content of speech are recognized negative symptoms, avolition and affective blunting are specifically identified as the most prominent according to this content."}, {"t": "Concrete thinking and echolalia", "c": false, "w": "Concrete thinking and echolalia are not classified as negative symptoms at all; concrete thinking is a formal thought disorder feature and echolalia is associated with catatonia."}], "rationale": "Avolition (lack of motivation) and affective blunting (flat affect) are identified as the most prominent negative symptoms of schizophrenia according to the APA (2013), significantly impacting the individual's ability to engage in daily activities and social relationships.", "tip": "NCLEX tip: When a question asks which negative symptoms are 'most prominent,' avolition and affective blunting are the specific, named answer according to this content.", "id": "m7_79", "module": 7}, {"type": "mc", "stem": "A client with schizophrenia has significant difficulty organizing information, making decisions, and sustaining attention during a conversation with the treatment team. Which symptom domain does this best reflect?", "options": [{"t": "Cognitive/neurocognitive symptoms", "c": true, "w": ""}, {"t": "Positive symptoms", "c": false, "w": "Positive symptoms include hallucinations, delusions, and disorganized speech or behavior, which are distinct from the executive functioning and attention difficulties described here."}, {"t": "Negative symptoms", "c": false, "w": "Negative symptoms involve reduced emotional expression, motivation, and speech output, which are distinct from the executive functioning and attention problems described in cognitive symptoms."}, {"t": "Mood symptoms", "c": false, "w": "Mood symptoms involve depression, anxiety, and dysphoria, which are distinct from the cognitive processing and attention difficulties described in this scenario."}], "rationale": "Cognitive/neurocognitive symptoms, affecting 40-60% of people with schizophrenia, include poor executive functioning, inability to sustain attention, and problems with working memory, and are considered the most debilitating symptom domain affecting the ability to work, socialize, and live independently.", "tip": "NCLEX tip: Cognitive symptoms are described as the most debilitating domain of schizophrenia because they most directly impair a person's functional independence, even more so than positive symptoms.", "id": "m7_80", "module": 7}, {"type": "mc", "stem": "Which symptom is described as a hallmark of schizophrenia, referring to a client's inability to recognize that they have a psychiatric illness?", "options": [{"t": "Impairment of insight", "c": true, "w": ""}, {"t": "Avolition", "c": false, "w": "Avolition refers to a lack of motivation and inability to initiate tasks, which is distinct from a client's inability to recognize their own illness."}, {"t": "Anergia", "c": false, "w": "Anergia refers to a general lack of energy, which is distinct from a client's inability to recognize their own illness."}, {"t": "Concrete thinking", "c": false, "w": "Concrete thinking refers to an overly literal interpretation of language, which is distinct from a client's inability to recognize their own illness."}], "rationale": "Impairment of insight, the inability to recognize that one has a psychiatric illness, is considered a hallmark cognitive symptom of schizophrenia and significantly affects a client's willingness to engage in and adhere to treatment.", "tip": "NCLEX tip: Impaired insight directly explains why medication nonadherence is such a common and persistent challenge in schizophrenia — the client may not believe they are ill in the first place.", "id": "m7_81", "module": 7}, {"type": "mc", "stem": "Approximately what percentage of individuals with schizophrenia develop postpsychotic depressive disorder after an acute psychotic episode, and what is the associated risk?", "options": [{"t": "Up to 25%, with an increased risk of suicide", "c": true, "w": ""}, {"t": "Nearly 90%, with minimal impact on suicide risk", "c": false, "w": "This significantly overstates the prevalence of postpsychotic depressive disorder, which occurs in up to 25% of cases, and understates the associated increased suicide risk."}, {"t": "Less than 1%, representing an exceedingly rare complication", "c": false, "w": "This significantly understates the prevalence of postpsychotic depressive disorder, which occurs in up to 25% of individuals following an acute psychotic episode."}, {"t": "Approximately 25%, but with no change in suicide risk compared to baseline", "c": false, "w": "While the 25% prevalence figure is accurate, this option incorrectly denies the well-documented increased suicide risk associated with postpsychotic depressive disorder."}], "rationale": "Postpsychotic depressive disorder occurs in up to 25% of individuals following an acute psychotic episode and is associated with an increased risk of suicide, making mood assessment an essential component of ongoing care after psychosis resolves.", "tip": "NCLEX tip: Don't assume the danger has passed once positive symptoms resolve — postpsychotic depression and its associated suicide risk require ongoing vigilance in the recovery period.", "id": "m7_82", "module": 7}, {"type": "mc", "stem": "A client with catatonia actively resists having their arm repositioned by the nurse and does the opposite of any instruction given, such as clenching their jaw shut when asked to open their mouth. Which catatonic feature does this represent?", "options": [{"t": "Active negativism", "c": true, "w": ""}, {"t": "Passive negativism", "c": false, "w": "Passive negativism involves failing to perform normal expected activities, such as not getting up or eating, rather than actively doing the opposite of what is asked, which is characteristic of active negativism."}, {"t": "Waxy flexibility", "c": false, "w": "Waxy flexibility involves maintaining an externally positioned posture for a long period, not actively resisting or opposing instructions."}, {"t": "Automatic obedience", "c": false, "w": "Automatic obedience involves performing all simple commands in a robot-like manner, which is the opposite of the active resistance and opposition described in this scenario."}], "rationale": "Active negativism is a catatonic feature in which the client does the opposite of what is asked or resists external attempts at movement, distinguishing it from passive negativism, in which the client simply fails to perform normal expected activities.", "tip": "NCLEX tip: Distinguish active negativism (doing the opposite of instructions) from passive negativism (simply not performing expected activities like eating or getting up) as two distinct catatonic presentations.", "id": "m7_83", "module": 7}, {"type": "mc", "stem": "A nurse repositions a catatonic client's arm into an unusual, uncomfortable position, and the client maintains that exact position for over 20 minutes without moving. Which catatonic feature does this best illustrate?", "options": [{"t": "Waxy flexibility", "c": true, "w": ""}, {"t": "Automatic obedience", "c": false, "w": "Automatic obedience involves performing simple commands in a robot-like manner, whereas waxy flexibility specifically describes maintaining a passively positioned posture, without requiring a verbal command."}, {"t": "Bizarre posturing", "c": false, "w": "Bizarre posturing refers to the voluntary assumption of inappropriate or bizarre postures by the client, rather than maintaining a posture that was passively placed by someone else."}, {"t": "Stereotyped behavior", "c": false, "w": "Stereotyped behaviors are repetitive motor patterns that were originally meaningful but have become mechanical and purposeless, which is distinct from maintaining an externally imposed posture."}], "rationale": "Waxy flexibility is a catatonic feature in which the client maintains an unusual posture, often one placed by another person, for a prolonged period, reflecting the profound abnormalities in motor behavior seen in catatonia.", "tip": "NCLEX tip: Waxy flexibility is specifically tested by having the client's limb repositioned by someone else and observing whether that position is passively maintained.", "id": "m7_84", "module": 7}, {"type": "mc", "stem": "According to the revised dopamine hypothesis, which pattern of dopamine activity is associated with the negative and cognitive symptoms of schizophrenia?", "options": [{"t": "Hypoactive dopamine activity in the prefrontal cortex", "c": true, "w": ""}, {"t": "Hyperactive dopamine activity in the mesolimbic pathway", "c": false, "w": "Hyperactive dopamine activity in the mesolimbic pathway is associated with positive symptoms, not the negative and cognitive symptoms described in this question."}, {"t": "Hyperactive dopamine activity in the prefrontal cortex", "c": false, "w": "The revised dopamine hypothesis describes hypoactive, not hyperactive, dopamine activity in the prefrontal cortex as the mechanism underlying negative and cognitive symptoms."}, {"t": "Equal dopamine activity across all brain regions with no regional variation", "c": false, "w": "The revised dopamine hypothesis specifically describes regional variation, with hyperactivity in the mesolimbic area and hypoactivity in the prefrontal cortex, rather than uniform activity across all regions."}], "rationale": "The revised dopamine hypothesis describes hyperactive dopamine activity in the mesolimbic areas contributing to positive symptoms, combined with hypoactive dopamine activity in the prefrontal cortex contributing to negative and cognitive symptoms of schizophrenia.", "tip": "NCLEX tip: Remember the dual dopamine pattern in schizophrenia — too much in the mesolimbic pathway (positive symptoms), too little in the prefrontal cortex (negative/cognitive symptoms).", "id": "m7_85", "module": 7}, {"type": "mc", "stem": "Which neurochemical hypothesis proposes that hypofunction of NMDA receptors contributes to psychotic, negative, and cognitive symptoms of schizophrenia?", "options": [{"t": "NMDA receptor hypofunction hypothesis (glutamate)", "c": true, "w": ""}, {"t": "Dopamine hypothesis", "c": false, "w": "The dopamine hypothesis centers on abnormal dopamine activity in different brain regions, whereas the NMDA receptor hypofunction hypothesis centers on glutamate signaling."}, {"t": "Serotonin hypothesis", "c": false, "w": "While abnormal serotonin levels are linked to negative and mood symptoms, the specific hypothesis centered on NMDA receptor hypofunction relates to glutamate, not serotonin."}, {"t": "BAS dysregulation model", "c": false, "w": "The BAS dysregulation model is a behavioral activation system theory associated with bipolar disorder, not the neurochemical NMDA receptor hypothesis associated with schizophrenia."}], "rationale": "The NMDA receptor hypofunction hypothesis proposes that reduced function of NMDA glutamate receptors contributes to psychotic, negative, and cognitive symptoms of schizophrenia, complementing the dopamine hypothesis in explaining the disorder's neurochemistry.", "tip": "NCLEX tip: Schizophrenia's neurochemistry involves multiple systems — dopamine, serotonin, and glutamate (NMDA receptors) — rather than a single neurotransmitter abnormality.", "id": "m7_86", "module": 7}, {"type": "mc", "stem": "A client's identical (monozygotic) twin has been diagnosed with schizophrenia. What is the approximate risk that this client will also develop schizophrenia?", "options": [{"t": "Up to 50%", "c": true, "w": ""}, {"t": "Approximately 5%-6%, the same as having one affected parent", "c": false, "w": "The 5-6% risk applies to having one parent with schizophrenia; the risk for an identical twin of an affected individual is substantially higher, up to 50%."}, {"t": "Approximately 10%, the same as for a sibling", "c": false, "w": "The 10% risk applies to siblings; an identical twin carries a substantially higher risk, up to 50%, due to sharing identical genetic material."}, {"t": "Nearly 100%, since identical twins share all genetic material", "c": false, "w": "Despite sharing identical genetic material, the risk is not 100%, reflecting the significant contribution of environmental and epigenetic factors; the risk is up to 50%."}], "rationale": "An identical (monozygotic) twin of a person with schizophrenia has up to a 50% risk of also developing the disorder, reflecting a strong but not absolute genetic contribution, since environmental factors also play a significant role.", "tip": "NCLEX tip: Memorize the schizophrenia genetic risk ladder — one parent (5-6%), sibling (10%), fraternal twin (14%), identical twin (up to 50%), two parents (46%) — since these are frequently tested comparative statistics.", "id": "m7_87", "module": 7}, {"type": "mc", "stem": "Which gene is specifically implicated in excessive synaptic pruning during the teenage years in individuals who develop schizophrenia?", "options": [{"t": "The C-4 gene", "c": true, "w": ""}, {"t": "The APOE gene", "c": false, "w": "The APOE gene is associated with Alzheimer's disease risk, not the synaptic pruning process implicated in schizophrenia."}, {"t": "The BRCA1 gene", "c": false, "w": "The BRCA1 gene is associated with breast and ovarian cancer risk, not the synaptic pruning process implicated in schizophrenia."}, {"t": "The HTT gene", "c": false, "w": "The HTT gene is associated with Huntington's disease, not the synaptic pruning process implicated in schizophrenia."}], "rationale": "The C-4 gene is responsible for synaptic pruning, a normal process that becomes excessive during the teenage years in individuals who develop schizophrenia, contributing to the structural brain changes associated with the disorder.", "tip": "NCLEX tip: The C-4 gene and excessive synaptic pruning represent a specific, modern genetic mechanism worth memorizing as a standalone fact distinct from the general family-risk statistics.", "id": "m7_88", "module": 7}, {"type": "mc", "stem": "Which of the following is a recognized prenatal risk factor for the later development of schizophrenia?", "options": [{"t": "Maternal influenza infection during pregnancy", "c": true, "w": ""}, {"t": "Advanced maternal age at the time of the client's birth", "c": false, "w": "Advanced paternal age (over 45 years), not specifically advanced maternal age, is the parental age factor identified as a risk factor for schizophrenia in this content."}, {"t": "Cesarean delivery without other complications", "c": false, "w": "It is birth complications and lack of oxygen (perinatal factors), not cesarean delivery itself without complications, that are identified as risk factors."}, {"t": "Full-term delivery with no reported complications", "c": false, "w": "A full-term delivery without complications is not identified as a risk factor; it is specifically birth complications and lack of oxygen that increase risk."}], "rationale": "Prenatal risk factors for schizophrenia include maternal viral infection (such as influenza or toxoplasmosis), poor maternal nutrition, and exposure to toxins during pregnancy, all of which may affect fetal neurodevelopment.", "tip": "NCLEX tip: Organize schizophrenia's nongenetic risk factors by timing — prenatal (maternal infection, poor nutrition, toxin exposure), perinatal (birth complications, hypoxia), and postnatal (head injuries, substance use).", "id": "m7_89", "module": 7}, {"type": "mc", "stem": "Which substance use pattern is most strongly associated with increased risk of developing schizophrenia, particularly when use begins early?", "options": [{"t": "Cannabis use beginning before age 21", "c": true, "w": ""}, {"t": "Occasional moderate alcohol use beginning in the mid-30s", "c": false, "w": "Occasional moderate alcohol use beginning later in adulthood is not the substance use pattern specifically identified as a schizophrenia risk factor in this content; early cannabis, methamphetamine, and LSD use are highlighted instead."}, {"t": "Rare, one-time caffeine intake in adolescence", "c": false, "w": "Caffeine is not identified as a substance use risk factor for schizophrenia in this content."}, {"t": "Nicotine use limited to occasional social settings in adulthood", "c": false, "w": "Nicotine use in adulthood is not the substance use pattern specifically identified as a schizophrenia risk factor in this content; early use of cannabis, methamphetamine, and LSD are highlighted instead."}], "rationale": "Cannabis, methamphetamine, and LSD use, especially when begun under age 21, are recognized nongenetic risk factors for the later development of schizophrenia, reflecting the vulnerability of the developing brain to these substances.", "tip": "NCLEX tip: The 'under age 21' cutoff for cannabis and other substance use as a schizophrenia risk factor reflects the ongoing brain development occurring through young adulthood.", "id": "m7_90", "module": 7}, {"type": "mc", "stem": "Which neuroanatomical finding on brain imaging is characteristic of schizophrenia?", "options": [{"t": "Larger lateral and third ventricles with decreased gray and white matter volume", "c": true, "w": ""}, {"t": "Smaller lateral and third ventricles with increased gray matter volume", "c": false, "w": "This is the opposite of the actual finding; schizophrenia is associated with larger, not smaller, ventricles and decreased, not increased, gray matter volume."}, {"t": "No detectable structural differences on brain imaging compared to unaffected individuals", "c": false, "w": "This is inaccurate; schizophrenia is associated with detectable structural brain changes, including decreased brain volume and larger ventricles."}, {"t": "Isolated changes limited only to the occipital lobe", "c": false, "w": "The structural changes in schizophrenia are not isolated to the occipital lobe; they particularly involve the frontal lobes along with overall decreased brain volume and enlarged ventricles."}], "rationale": "Schizophrenia is associated with decreased gray and white matter volume (especially in the frontal lobes), decreased overall brain volume, and larger lateral and third ventricles, along with faulty neural circuitry between the prefrontal cortex and thalamus.", "tip": "NCLEX tip: PET scans in schizophrenia also show lower blood flow and glucose metabolism in the frontal lobes, reinforcing the frontal lobe-centered pattern of structural and functional abnormality.", "id": "m7_91", "module": 7}, {"type": "mc", "stem": "A client with paranoid features of schizophrenia is guarded, tense, and displays a superior, sarcastic attitude toward staff. Which communication technique is most appropriate?", "options": [{"t": "Speak indirectly, avoiding excessive use of \"you\" and \"I\" statements", "c": true, "w": ""}, {"t": "Maintain direct, sustained eye contact and sit directly face-to-face with the client", "c": false, "w": "Direct eye contact and face-to-face positioning can be perceived as confrontational by a paranoid client; sitting beside the client and avoiding direct eye contact is more therapeutic."}, {"t": "Firmly confront the client's guarded and suspicious behavior to build trust quickly", "c": false, "w": "Direct confrontation of a paranoid client's guardedness can increase defensiveness; sharing mistrust and identifying with the client's need to feel guarded is a more effective approach."}, {"t": "Encourage the client to abandon their guardedness immediately to build a therapeutic relationship", "c": false, "w": "Attempting to have the client abandon guarde
